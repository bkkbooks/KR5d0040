front:
  text: 黃帝內經素問補注釋文卷之二慎二
  hash: sha256:b3248c403934fed6f010124eae80475eadde75089e93e0d35faf1ecb6b0fa37a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_002-001a, image: hfl/0649/0649-050.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤四氣調神大論篇春三月此謂發陳春陽上升氣潛發能生育庶物陳其姿容故曰發陳也謂春三月者皆因節候而命之夏秋冬亦然天地俱生萬物以榮天氣溫地氣發溫發相合故萬物滋榮夜卧早起廣步於庭溫氣生寒氣散故夜卧早起廣步於庭被髮緩形以使志生法象也春氣發生於萬物之首故被髮緩形以使志意發生也生而勿殺豫而勿奪賞而勿罰春氣發生施無求報故養生者必順於時也豫音與此春氣之應養生之道也所謂因時之序也然立春之節初五日東風解凍次五日蟄蟲始振後五日魚上氷次雨水氣初五日獺祭魚次五日鴻雁來後五日草木萌動次仲春驚蟄之節初五日小桃華新校正云詳小桃華月令作桃始華次五日倉庚鳴後五日鷹化為鳩次春分氣初五日玄鳥至次五日雷乃發聲芍藥榮後五日始電次季春清明之節初五日桐始華次五日田鼠化為鴽牡丹華後五日虹始見次穀雨氣初五日萍始生次五日鳴鳩拂其羽後五日戴勝降於桑凡此六氣一十八候皆春陽布發生之令故養生者必謹奉天時也新校正云詳芍藥榮牡丹華今月令無獺多達切鴽音如鶉也逆之則傷肝夏為寒變奉長者少逆謂反行秋令也肝象木王於春故行秋令則肝氣傷夏火王而木廢故病生於夏然四時之氣春生夏長逆春傷肝故少氣以奉於夏長之令也夏三月此謂蕃秀陽自春生至夏洪盛物生以長故蕃秀也蕃茂也盛也秀華也美也天地氣交萬物華實舉夏至也脈要精微論曰夏至四十五日陰氣微上陽氣微下由是則天地氣交也然陽氣施化陰氣結成成化相合故萬物華實也陰陽應象大論曰陽化氣陰成形夜卧早起無厭於日使志無怒使華英成秀使氣得泄若所愛在外緩陽氣則物化寬志意則氣泄物化則華英成秀氣泄則膚腠宣通時令發陽故所愛亦順陽而在外也此夏氣之應養長之道也立夏之節初五日螻蟈鳴次五日蚯蚓出後五日赤箭生新校正按月令作王瓜生次小滿氣初五日吳葵華新校正按月令作苦菜秀次五日靡草死後五日小暑至次仲夏芒種之節初五日螳螂生次五日始鳴後五日反舌無聲次夏至氣初五日鹿角解次五日蜩始鳴後五日半夏生木堇榮次季夏小暑之節初五日溫風至次五日蟋蟀居壁後五日鷹乃學習次大暑氣初五日腐草化為螢次五日土潤溽暑後五日大雨時行凡此六氣一十八候皆夏氣揚蕃秀之令故養生者必敬順天時也新校正詳木堇榮今月令無鵙古閴切搏勞鳥逆之則傷心秋為痎瘧奉收者少冬至重病逆謂反行冬令也痎痎瘦之瘧也心象火王於夏故行冬令則心氣傷秋金王而火廢故病發於秋而為痎瘧也然四時之氣秋收冬藏逆夏傷心故少氣以奉於秋收之令也冬水勝火故重病於冬至之時也痎音皆秋三月此謂容平萬物夏長華實已成容狀至秋平而定也天氣以急地氣以明天氣以急風聲切也地氣以明物色變也早卧早起與雞俱興懼中寒露故早卧欲使安寧故早起使志安寧以緩秋刑志氣躁則不愼其動不愼其動則助秋刑急順殺伐生故使志安寧緩秋刑也收斂神氣使秋氣平神蕩則欲熾欲熾則傷和氣既傷則秋氣不平調也故收斂神氣使秋氣平也無外其志使肺氣清亦順秋氣之收斂也此秋氣之應養收之道也立秋之節初五日涼風至次五日白露降後五日寒蟬鳴次處暑氣初五日鷹乃祭鳥次五日天地始肅後五日禾乃登次仲秋白露之節初五日育風至鴻雁來次五日玄鳥歸後五日群鳥養羞次秋分氣初五日雷乃收聲次五日蟄蟲垤户景天華後五日水始涸次季秋寒露之節初五日鴻雁來賔次五日雀入大水為蛤後五日菊有黃華次霜降氣初五日豺乃祭獸次五日草木黃落後五日蟄蟲咸俯凡此六氣一十八候皆秋氣正收斂之令故養生者必謹奉天時也新校正云詳景天華三字今月令無垤步回切逆之則傷肺冬為飧泄奉藏者少逆謂反行夏令也肺象金王於秋故行夏令則氣傷冬水王而金廢故病發於冬飱泄者食不化而泄出也逆秋傷肺故少氣以奉於冬藏之令也飧音孫冬三月此謂閉藏草木凋蟄蟲去地户閉塞陽氣伏藏水冰地坼無擾乎陽陽氣下沉水冰地坼故宜周密不欲煩勞擾謂煩也勞也早卧晚起必待日光避於寒也使志若伏若匪今詳匪字當作匿若有私意若已有得皆謂不欲妄出於外觸冒寒氣也故下文云去寒就溫無泄皮膚使氣亟奪去寒就溫言居深室也靈樞經曰冬日在骨蟄蟲周密君子居室無泄皮膚謂勿汗也汗則陽氣發泄陽氣發泄則數為寒氣所迫奪之亟數也亟去吏切此冬氣之應養藏之道也立冬之節初五日水始冰次五日地始凍後五日雉入大水為蜃次小雪氣初五日虹藏不見次五日天氣上騰地氣下降後五日閉塞而成冬次仲冬大雪之節初五日冰益壯地始坼鵙鳥不鳴次五日虎始交後五日藝始生荔挺出次冬至氣初五日蚯蚓結次五日麋角解後五日水泉動次季冬小寒之節初五日雁北鄉次五日鷙鳥厲疾後五日水澤腹堅凡此六氣一十八候皆冬氣正養藏之令故養生者必謹奉天時也荔音利挺大頂切鄉音向逆之則傷腎春為痿厥奉生者少逆謂反行夏令也腎象水王於冬故行夏令則腎氣傷春木王而水廢故病發於春也逆冬傷腎故少氣以奉於春生之令也天氣清靜光明者也言天明不竭以清靜故致之人壽延長亦由順動而得故言天氣以示於人也藏德不止新校正云按别本止一作上故不下也四時成序七曜周行天不形言是藏德也德隱則應用不屈故不下也老子曰上德不德是以有德也言天至尊高德猶見隱也况全生之道而不順天乎天明則日月不明邪害空竅天所以藏德者為其欲隱大明故大明見則小明滅故大明之德不可不藏天若自明則日月之明隱矣所諭者何言人之真氣亦不可泄露當清靜法道以保天真苟離於道則虛邪入於空竅空音孔陽氣者閉塞地氣者冒明陽謂天氣亦風熱也地氣謂濕亦云霧也風熱之害人則九竅閉塞露濕之為病則掩翳精明取類者在天則日月不光在人則兩目藏曜也靈樞經曰天有日月人有眼目易曰喪明於易豈非失養生之道耶雲霧不精則上應白露不下霧者雲之類露者雨之類夫陽盛則地不上應陰虛則天不下交故雲霧不化精微之氣上應於天而為白露不下之咎矣陰陽應象大論曰地氣上為雲天氣下為雨雨出地氣雲出天氣明二氣交合乃成雨露方盛衰論曰至陰虛天氣絶至陽盛地氣不足明氣不相召亦不能交合也交通不表萬物命故不施不施則名木多死夫雲霧不化其精微雨露不沾於原澤是為天氣不降地氣不騰變化之道既虧生育之源斯泯故萬物之命無稟而生然其死者則名木先應故云名木多死也名謂名果珍木表謂表陳其狀也易繫辭曰天地絪緼萬物化醇然不表交通則為否也易曰天地不交否否部鄙切惡氣不發風雨不節白露不下則菀稿不榮惡謂害氣也發謂發散也節謂節度也菀謂藴積也稿謂枯稿也言害氣伏藏而不散發風雨無度折傷復多稿物藴積春不榮也豈惟其物獨遇是而有之哉人離於道亦有之矣賊風數至暴雨數起天地四時不相保與道相失則未央絶滅不順四時之和數犯八風之害與道相失則天真之氣未期久遠而致滅亡央久也遠也唯聖人從之故身無奇病萬物不失生氣不竭道非遠於人人心遠於道惟聖人心合於道故壽命無窮從猶順也謂順四時之令也然四時之令不可逆之逆之則五臟內傷而他疾起逆春氣則少陽不生肝氣內變生謂動出也陽氣不出內鬱於肝則肝氣混糅變而傷矣逆夏氣則太陽不長心氣內洞長謂外茂也洞謂中空也陽不外茂內薄於心燠熱內消故心中空也燠音欲逆秋氣則太陰不收肺氣焦滿收謂收斂焦謂上焦也太陰行氣主化上焦故肺氣不收上焦滿也新校正云按焦滿全元起本作進滿甲乙太素作焦滿逆冬氣則少陰不藏腎氣獨沉沉謂沉伏也少陰之氣內通於腎故少陰不伏腎氣獨沉新校正云詳獨沉太素作沉獨夫四時陰陽者萬物之根本也時序運行陰陽變化天地合氣生育萬物故萬物之根悉歸於此所以聖人春夏養陽秋冬養陰以從其根陽氣根於陰陰氣根於陽無隂則陽無以生無陽則陰無以化全陰則陽氣不極全陽則陰氣不窮春食涼夏食寒以養於陽秋食溫冬食熱以養於陰滋苗者必固其根伐下者必枯其上故以斯調節從順其根二氣常存蓋由根固百刻曉暮食亦宜然故與萬物沉浮於生長之門聖人所以身無奇病生氣不竭者以順其根也逆其根則伐其本壞其真矣是則失四時陰陽之道也故陰陽四時者萬物之終始也死生之本也逆之則災害生從之則苛疾不起是謂得道謂得養生之道苛者重也道者聖人行之愚者佩之聖人心合於道故勤而行之愚者性守於迷故佩服而已老子曰道者同於道德者同於德失者同於失同於道者道亦得之同於德者德亦得之同於失者失亦得之愚者未同於道德則可謂失道者也從陰陽則生逆之則死從之則治逆之則亂反順為逆是謂內格格拒也謂內性格拒於天道也是故聖人不治已病治未病不治已亂治未亂此之謂也知之至也夫病已成而後藥之亂已成而後治之譬猶渴而穿井鬥而鑄兵不亦晚乎知不及時也備禦虛邪事符握虎噬而後藥雖悔何為黃帝內經素問補注釋文卷之二

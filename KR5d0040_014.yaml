front:
  text: 黃帝內經素問補注釋文卷之十四慎十二
  hash: sha256:e3763dc90bb82f16b2148b7e90b1249f0a58116a32016faea8212d7db1bc40de
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_014-001a, image: hfl/0651/0651-154.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤平人氣象論篇黃帝問曰平人何如平人謂氣候平調之人也岐伯對曰人一呼脈再動一吸脈亦再動呼吸定息脈五動閏以太息命曰平人平人者不病也經脈一周於身凡長十六丈二尺呼吸脈各再動定息脈又一動則五動也計二百七十定息氣可環周然盡五十營以一萬三千五百定息則氣都行八百一十丈如是則應天常度脈氣無不及太過氣象平調故曰平人常以不病調病人醫不病故為病人平息以調之為法人一呼脈一動一吸脈一動曰少氣呼吸脈各一動準候減平人之半計二百七十定息氣行八丈一尺以一萬三千五百定息都行四百五丈少氣之理從此可知人一呼脈三動一吸脈三動而躁尺熱曰病溫尺不熱脈滑曰病風脈澀曰痹呼吸脈各三動準過平人之半計二百七十息氣凡行二十四丈三尺病生之兆由斯著矣夫尺者陰分位也寸者陽分位也然陰陽俱熱是則為溫陽獨躁盛則風中陽也脈要精微論曰中風者陽氣受也滑為陽盛故病為風澀為無血故為𤸷痹躁謂煩躁新校正云按甲乙經云脈澀曰痹一句下文亦重人一呼脈四動以上曰死脈絶不至曰死乍踈乍數曰死呼吸脈各四動準候過平人之倍計二百七十息氣凡行三十二丈四尺况其以上耶脈法曰脈四至曰脫精五至曰死然四至以上亦近五至也故死矣然脈絶不至天真之氣已無乍數乍踈胃穀之精亦斯此皆死之候是以下文曰新校正云按别本斯一作敗平人之常氣稟於胃胃者平人之常氣也常平之氣胃海致之靈樞經曰胃為水穀之海也正理論曰穀入於胃脈道乃行人無胃氣曰逆逆者死逆謂反平人之候也新校正云按甲乙經云人常稟氣於胃脈以胃氣為本無胃氣曰逆逆者死春胃微弦曰平言微似弦不謂微而弦也鈎及耎弱毛石義并同弦多胃少曰肝病但弦無胃曰死謂急而益徑如新張弓弦也胃而有毛曰秋病毛秋脈金氣也毛甚曰今病木受金邪故今病藏真散於肝肝藏筋膜之氣也象陽氣之散發故藏真散也藏氣法時論曰肝欲散急食辛以散之取其順氣夏胃微鈎曰平鈎多胃少曰心病但鈎無胃曰死謂前曲後居如操帶鈎也胃而有石曰冬病石冬脈水氣也石甚曰今病火被水侵故今病藏真通於心心藏血脈之氣也象陽氣之炎盛也藏氣法時論曰心欲耎急食鹹以耎之取其順氣長夏胃微耎弱曰平弱多胃少曰脾病但代無胃曰死謂動而中止不能自還也耎弱有石曰冬病石冬脈水氣也次其勝剋石當為弦長夏土絶故云石也弱甚曰今病弱甚為土氣不足故今病新校正云按甲乙經弱作石藏真濡於脾脾藏肌肉之氣也以含藏水穀故藏真濡也秋胃微毛曰平毛多胃少曰肺病但毛無胃曰死謂如物之浮如風吹毛也毛而有弦曰春病弦春脈木氣也次其乘克弦當為鈎金氣逼肝則脈弦來見故不鈎而反弦也弦甚曰今病木氣逆來乘金則今病藏真高於肺以行榮衛陰陽也肺處上焦故藏真高也靈樞經曰榮氣之道內穀為實穀入於胃氣傳與肺流溢於中布散於外精專者行於經隧以其自肺宣布故云以行榮衛陰陽也新校正云按别本實一作寶冬胃微石曰平石多胃少曰腎病但石無胃曰死謂如奪索辟辟如彈石也石而有鈎曰夏病鈎夏脈火兼土氣也次其乘剋鈎當云弱土王長夏不見正形故石而有鈎兼其土也鈎甚曰今病水受火土之邪故今病藏真下於腎腎藏骨髓之氣也腎居下焦故云藏真下也腎化骨髓故藏骨髓之氣也胃之大絡名曰虛里貫鬲絡肺出於左乳下其動應衣脈宗氣也宗尊也主也謂十二經脈之尊主也貫鬲絡肺出於左乳下者自鬲而出於乳下乃絡肺也盛喘數絶者則病在中絶謂暫斷絶也結而橫有積矣絶不至曰死皆左乳下脈動狀也中謂腹中也乳之下其動應衣宗氣泄也泄謂發泄新校正云按全元起本無此十一字甲乙經亦無詳上下文義多此十一字當去欲知寸口太過與不及寸口之脈中手短者曰頭痛寸口脈中手長者曰足脛痛短為陽氣不及故病於頭長為陰氣太過故病於足寸口脈中手促上擊者曰肩背痛陽盛於上故肩背痛寸口脈沉而堅者曰病在中寸口脈浮而盛者曰病在外沉堅為陰故病在中浮盛為陽故病在外也寸口脈沉而弱曰寒熱及疝瘕少腹痛沉為寒弱為熱故曰寒熱也又沉為陰盛弱為陽餘餘盛相薄正當寒熱不當為疝瘕而少腹痛應古之錯簡爾新校正云按甲乙經無此十五字况下文已有寸口脈沉而喘曰寒熱脈急者曰疝瘕少腹痛此文衍當去寸口脈沉而橫曰脅下有積腹中有橫積痛亦陰氣內結也寸口脈沉而喘曰寒熱喘為陽吸沉為陰爭爭吸相薄故寒熱也脈盛滑堅者曰病在外脈小實而堅者病在內盛滑為陽小實為陰陰病病在內陽病病在外脈小弱以澀謂之久病小為氣虛澀為無血血氣虛弱故云久遠之病也脈滑浮而疾者謂之新病滑浮為陽足脈疾為氣全陽足氣全故云新淺之病也脈急者曰疝瘕少腹痛此覆前疝瘕少腹痛之脈也言沉弱不必為疝瘕沉急乃與診相應脈滑曰風脈澀曰痹滑為陽陽受病則為風澀為陰陰受病則為痹緩而滑曰熱中盛而緊曰脹緩謂縱緩之狀非動之遲緩也陽盛於中故脈滑緩寒氣否滿故脈盛緊也盛緊盛滿也脈從陰陽病易已脈逆陰陽病難已脈病相應謂之從脈病相反謂之逆脈得四時之順曰病無他脈反四時及不間藏曰難已春得秋脈夏得冬脈秋得夏脈冬得四季脈皆謂反四時氣不相應故難已也臂多青脈曰脫血血少脈空客寒因入寒凝血汁故脈色青也尺脈緩澀謂之解㑊尺為陰部腹腎主之緩為熱中澀為無血熱而無血故解㑊而不可名之然寒不寒熱不熱弱不弱壯不壯儜不可名謂之解㑊也脈要精微論曰尺外以候腎尺裏以候腹中則腹腎主尺之義也儜音能困弱也安卧脈盛謂之脫血卧久傷氣氣傷則脈診應微今脈盛而不微則血去而氣無所主乃爾盛謂數急而大鼓也尺澀脈滑謂之多汗謂尺膚澀而尺脈滑也膚澀者榮血內涸脈滑為陽氣內餘血涸而陽氣尚餘多汗而脈乃如是也尺寒脈細謂之後泄尺主下焦診應腸腹故膚寒脈細泄利乃然脈法曰陰微即下言尺氣虛少脈尺粗常熱者謂之熱中謂下焦中也肝見庚辛死庚辛為金伐肝木也心見壬癸死壬癸為水滅心火也脾見甲乙死甲乙為木剋脾土也肺見丙丁死丙丁為火鑠肺金也腎見戊己死戊己為土刑腎水也是謂真藏見皆死此亦通明三部九候論中真藏脈見者勝死也尺粗而藏見亦然頸脈動喘疾咳曰水水氣上溢則肺被熱熏陽氣上逆故頸脈盛鼓而咳喘也頸脈謂耳下及結喉傍人迎脈也目裹微腫如卧蠶起之狀曰水評熱病論曰水者陰也目下亦陰也腹者至陰之所居也故水在腹中者必使目下腫也溺黃赤安卧者黃疸疸勞也腎勞胞熱故溺黃赤也正理論曰謂之勞疸以女勞得之也新校正云詳王注以疸為勞義非若謂女勞得疸則可若以疸為勞則非也已食如飢者胃疸是則胃熱也熱則消穀故食已如飢也面腫曰風加之面腫則胃風之診也何者胃陽明脈起於鼻交頞中下循鼻外故爾足脛腫曰水是謂下焦有水也腎少陰脈出於足心上循脛過陰股從腎上貫肝鬲故下焦有水足脛腫也目黃者曰黃疸陽怫於上熱積胸中陽熱上燔故目黃也靈樞經曰目黃者病在胸婦人手少陰新校正云按全元起本作足少陰脈動甚者任子也手少陰脈謂掌後陷者中當小指動而應手者也靈樞經曰少陰無輸心不病乎岐伯云其外經病而藏不病故獨取其經於掌後鋭骨之端此之謂也動謂動脈也動脈者大如豆厥厥動搖也正理論曰脈陰陽相薄名曰動也又經脈别論曰陰薄陽别謂之有子新校正云按經脈别論中無此文脈有逆從四時未有藏形春夏而脈瘦新校正云按玉機真藏論注瘦作沉澀秋冬而脈浮大命曰逆四時也春夏脈瘦謂沉細也秋冬浮大不應時也大法春夏當浮大而反沉細秋冬當沉細而反浮大故曰不應時也風新校正云按玉機真藏論風作病熱而脈靜泄而脫血脈實新校正云按玉機真藏論篇注作泄而脈大脫血而脈實病在中脈虛病在外新校正云按玉機真藏論作脈實堅病在外脈澀堅者新校正云按玉機真藏論作脈不實堅者皆難治風熱當脈躁而反靜泄而脫血當脈虛而反實邪氣在內當脈實而反虛病氣在外當脈虛滑而反堅澀故皆難治也命曰反四時也皆反四時之氣乃如是矣新校正云詳命曰反四時也此六字應古錯簡當去自前未有藏形春夏至此五十三字與後玉機真藏論文相重人以水穀為本故人絶水穀則死脈無胃氣亦死所謂無胃氣者但得真藏脈不得胃氣也所謂脈不得胃氣者肝不弦腎不石也不弦不石皆謂不微似也太陽脈至洪大以長氣盛故能爾新校正云按扁鵲陰陽脈法云太陽之脈洪大以長其來浮於筋上動搖九分三月四月甲子王吕廣云太陽王五月六月其氣大盛故其脈洪大而長也少陽脈至乍數乍踈乍短乍長以氣有暢未暢者也新校正云按扁鵲陰陽法云少陽之脈乍小乍大乍長乍短搖動六分王十一月甲子夜半正月二月甲子王吕廣云少陽王正月二月其氣尚微故其脈來進退無常陽明脈至浮大而短穀氣滿盛故也新校正云詳無三陰脈應古文闕也按難經云太陰之至緊大而長少陰之至緊細而微厥陰之至沉短以敦吕廣云陽明王三月四月其氣始萌未盛故其脈來浮大而短扁鵲陰陽脈法云少陰之脈緊細動搖六分王五月甲子日中七月八月王太陰之脈緊細以長乘於筋上動搖九分九月十月甲子王厥陰之脈沉短以緊動搖三分十一月十二月甲子王也夫平心脈來纍纍如連珠如循琅玕曰心平言脈滿而盛微似珠形之中手琅玕珠之類也夏以胃氣為本脈有胃氣則纍纍而微似連珠也病心脈來喘喘連屬其中微曲曰心病曲謂中手而偃曲也新校正云詳越人云啄啄連屬其中微曲曰腎病與素問異死心脈來前曲後居如操帶鈎曰心死居不動也操執持也鈎謂革帶之鈎平肺脈來厭厭聶聶如落榆莢曰肺平浮薄而虛者也新校正云詳越人云厭厭聶聶如循榆莢曰春平脈藹藹如車蓋按之益大曰秋平脈與素之説不同張仲景云秋脈靄靄如車蓋者名曰陽結春脈聶聶如吹榆莢者名曰數恐越人之説誤也秋以胃氣為本脈有胃氣則微似榆莢之輕虛也病肺脈來不上不下如循雞羽曰肺病謂中央堅而兩傍虛死肺脈來如物之浮如風吹毛曰肺死如物之浮瞥瞥然如風吹毛紛紛然也新校正云詳越人云按之消索如風吹毛曰死平肝脈來耎弱招招如揭長竿末梢曰肝平如竿末梢言長耎也春以胃氣為本脈有胃氣乃長耎如竿之末梢矣病肝脈來盈實而滑如循長竿曰肝病長而不耎故若循竿死肝脈來急益徑如新張弓弦曰肝死徑謂徑強急之甚也平脾脈來和柔相離如雞踐地曰脾平言脈來動數相離緩急和而調長夏以胃氣為本胃少則脈實數病脾脈來實而盈數如雞舉足曰脾病胃少故脈實急矣舉足謂如雞走之舉足也新校正云詳越人以為心病死脾脈來鋭堅如烏之喙新校正云按千金方作如雞之喙也如鳥之距如屋之漏如水之流曰脾死烏喙鳥距言鋭堅也水流屋漏言其至也水流謂平至不鼓屋漏謂時動復住平腎脈來喘喘纍纍如鈎按之而堅曰腎平謂如心脈而鈎按之小堅爾新校正云按越人云其來上大下兊濡滑如雀之啄曰平吕廣云上大者足太陽下兊者足少陰陰陽得所為胃氣強故謂之平雀喙者本大而末兊也冬以胃氣為本胃少則不按亦堅也病腎脈來如引葛按之益堅曰腎病形如引葛言不按且堅明按之則尤甚也死腎脈來發如奪索辟辟如彈石曰腎死發如奪索猶蛇之走辟辟如彈石言促又堅也黃帝內經素問補注釋文卷之十四

front:
  text: 黄帝内經素問補註釋文卷之十四慎十二
  hash: sha256:6121ba00dbf7c5222965ad6effd824fa6a93c7a7c49e1a675e83b383f8db643b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_014-001a, image: hfl/0651/0651-154.png}
body:
  text: 唐太僕令啓玄子王氷次註宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤平人氣象論篇黄帝問曰平人何如平人謂氣候平調之人也岐伯對曰人一呼脉再動一吸脉亦再動呼吸定息脉五動閏以太息命曰平人平人者不病也經脉一周於身凡長十六丈二尺呼吸脉各再動定息脉又一動則五動也計二百七十定息氣可環周然盡五十營以一萬三千五百定息則氣都行八百一十丈如是則應天常度脉氣无不及太過氣象平調故曰平人常以不病調病人醫不病故爲病人平息以調之爲法人一呼脉一動一吸脉一動曰少氣呼吸脉各一動準候减平人之半計二百七十定息氣行八丈一尺以一萬三千五百定息都行四百五丈少氣之理從此可知人一呼脉三動一吸脉三動而躁尺熱曰病温尺不熱脉滑曰病風脉澀曰痹呼吸脉各三動準過平人之半計二百七十息氣凡行二十四丈三尺病生之兆由斯著矣夫尺者陰分位也寸者陽分位也然陰陽俱熱是則爲温陽獨躁盛則風中陽也脉要精微論曰中風者陽氣受也滑爲陽盛故病爲風濇爲无血故爲𤸷痹躁謂煩躁新校正云按甲乙經云脉濇曰痹一句下文亦重人一呼脉四動以上曰死脉絶不至曰死乍踈乍數曰死呼吸脉各四動準候過平人之倍計二百七十息氣凡行三十二丈四尺况其以上耶脉法曰脉四至曰脫精五至曰死然四至以上亦近五至也故死矣然脉絶不至天眞之氣已无乍數乍踈胃穀之精亦斯此皆死之候是以下文曰新校正云按别本斯一作敗平人之常氣禀於胃胃者平人之常氣也常平之氣胃海致之靈樞經曰胃爲水穀之海也正理論曰穀入於胃脉道乃行人無胃氣曰逆逆者死逆謂反平人之候也新校正云按甲乙經云人常禀氣於胃脉以胃氣爲本無胃氣曰逆逆者死春胃微弦曰平言微似弦不謂微而弦也鈎及耎弱毛石義并同弦多胃少曰肝病但弦無胃曰死謂急而益勁如新張弓弦也胃而有毛曰秋病毛秋脉金氣也毛甚曰今病木受金邪故今病藏眞散於肝肝藏筋膜之氣也象陽氣之散發故藏眞散也藏氣法時論曰肝欲散急食辛以散之取其順氣夏胃微鈎曰平鈎多胃少曰心病但鈎無胃曰死謂前曲後居如操帶鈎也胃而有石曰冬病石冬脉水氣也石甚曰今病火被水侵故今病藏眞通於心心藏血脉之氣也象陽氣之炎盛也藏氣法時論曰心欲耎急食鹹以耎之取其順氣長夏胃微耎弱曰平弱多胃少曰脾病但代無胃曰死謂動而中止不能自還也耎弱有石曰冬病石冬脉水氣也次其勝剋石當爲弦長夏土絶故云石也弱甚曰今病弱甚爲土氣不足故今病新校正云按甲乙經弱作石藏眞濡於脾脾藏肌肉之氣也以含藏水穀故藏眞濡也秋胃微毛曰平毛多胃少曰肺病但毛無胃曰死謂如物之浮如風吹毛也毛而有弦曰春病弦春脉木氣也次其乘克弦當爲鈎金氣逼肝則脉弦來見故不鈎而反弦也弦甚曰今病木氣逆來乘金則今病藏眞高於肺以行榮衛陰陽也肺處上焦故藏眞高也靈樞經曰榮氣之道内穀爲實穀入於胃氣傳與肺流溢於中布散於外精專者行於經隧以其自肺宣布故云以行榮衛陰陽也新校正云按别本實一作寳冬胃微石曰平石多胃少曰腎病但石無胃曰死謂如奪索辟辟如彈石也石而有鈎曰夏病鈎夏脉火兼土氣也次其乘剋鈎當云弱土王長夏不見正形故石而有鈎兼其土也鈎甚曰今病水受火土之邪故今病藏真下於腎腎藏骨髓之氣也腎居下焦故云藏眞下也腎化骨髓故藏骨髓之氣也胃之大絡名曰虚里貫鬲絡肺出於左乳下其動應衣脉宗氣也宗尊也主也謂十二經脉之尊主也貫鬲絡肺出於左乳下者自鬲而出於乳下乃絡肺也盛喘數絶者則病在中絶謂暫斷絶也結而横有積矣絶不至曰死皆左乳下脉動狀也中謂腹中也乳之下其動應衣宗氣泄也泄謂發泄新校正云按全元起本无此十一字甲乙經亦无詳上下文義多此十一字當去欲知寸口太過與不及寸口之脉中手短者曰頭痛寸口脉中手長者曰足脛痛短爲陽氣不及故病於頭長爲陰氣太過故病於足寸口脉中手促上擊者曰肩背痛陽盛於上故肩背痛寸口脉沉而堅者曰病在中寸口脉浮而盛者曰病在外沉堅爲陰故病在中浮盛爲陽故病在外也寸口脉沉而弱曰寒熱及疝瘕少腹痛沉爲寒弱爲熱故曰寒熱也又沉爲陰盛弱爲陽餘餘盛相薄正當寒熱不當爲疝瘕而少腹痛應古之錯簡爾新校正云按甲乙經无此十五字况下文已有寸口脉沉而喘曰寒熱脉急者曰疝瘕少腹痛此文衍當去寸口脉沉而横曰脇下有積腹中有横積痛亦陰氣内結也寸口脉沉而喘曰寒熱喘爲陽吸沉爲陰爭爭吸相薄故寒熱也脉盛滑堅者曰病在外脉小實而堅者病在内盛滑爲陽小實爲陰陰病病在内陽病病在外脉小弱以澀謂之久病小爲氣虚澀爲無血血氣虚弱故云久遠之病也脉滑浮而疾者謂之新病滑浮爲陽足脉疾爲氣全陽足氣全故云新淺之病也脉急者曰疝瘕少腹痛此覆前疝瘕少腹痛之脉也言沉弱不必爲疝瘕沉急乃與診相應脉滑曰風脉濇曰痹滑爲陽陽受病則爲風濇爲陰陰受病則爲痹緩而滑曰熱中盛而緊曰脹緩謂縱緩之狀非動之遲緩也陽盛於中故脉滑緩寒氣否滿故脉盛緊也盛緊盛滿也脉從陰陽病易已脉逆陰陽病難已脉病相應謂之從脉病相反謂之逆脉得四時之順曰病無他脉反四時及不間藏曰難已春得秋脉夏得冬脉秋得夏脉冬得四季脉皆謂反四時氣不相應故難已也臂多青脉曰脫血血少脉空客寒因入寒凝血汁故脉色青也尺脉緩濇謂之解㑊尺爲陰部腹腎主之緩爲熱中濇爲无血熱而无血故解㑊而不可名之然寒不寒熱不熱弱不弱壯不壯儜不可名謂之解㑊也脉要精微論曰尺外以候腎尺裏以候腹中則腹腎主尺之義也儜音能困弱也安卧脉盛謂之脫血卧久傷氣氣傷則脉診應微今脉盛而不微則血去而氣无所主乃爾盛謂數急而大鼓也尺澀脉滑謂之多汗謂尺膚澀而尺脉滑也膚澀者榮血内涸脉滑爲陽氣内餘血涸而陽氣尚餘多汗而脉乃如是也尺寒脉細謂之後泄尺主下焦診應腸腹故膚寒脉細泄利乃然脉法曰陰微即下言尺氣虚少脉尺粗常熱者謂之熱中謂下焦中也肝見庚辛死庚辛爲金伐肝木也心見壬癸死壬癸爲水滅心火也脾見甲乙死甲乙爲木剋脾土也肺見丙丁死丙丁爲火鑠肺金也腎見戊己死戊己爲土刑腎水也是謂眞藏見皆死此亦通明三部九候論中眞藏脉見者勝死也尺粗而藏見亦然頸脉動喘疾咳曰水水氣上溢則肺被熱熏陽氣上逆故頸脉盛鼓而咳喘也頸脉謂耳下及結喉傍人迎脉也目裹微腫如卧蠶起之狀曰水評熱病論曰水者陰也目下亦陰也腹者至陰之所居也故水在腹中者必使目下腫也溺黄赤安卧者黄疸疸勞也腎勞胞熱故溺黄赤也正理論曰謂之勞癉以女勞得之也新校正云詳王注以疸爲勞義非若謂女勞得疸則可若以疸爲勞則非也已食如饑者胃疸是則胃熱也熱則消穀故食已如饑也面腫曰風加之面腫則胃風之診也何者胃陽明脉起於鼻交頞中下循鼻外故爾足脛腫曰水是謂下焦有水也腎少陰脉出於足心上循脛過陰股從腎上貫肝鬲故下焦有水足脛腫也目黄者曰黄疸陽怫於上熱積胸中陽熱上燔故目黄也靈樞經曰目黄者病在胸婦人手少陰新校正云按全元起本作足少陰脉動甚者任子也手少陰脉謂掌後陷者中當小指動而應手者也靈樞經曰少陰无輸心不病乎岐伯云其外經病而藏不病故獨取其經於掌後鋭骨之端此之謂也動謂動脉也動脉者大如豆厥厥動摇也正理論曰脉陰陽相薄名曰動也又經脉别論曰陰薄陽别謂之有子新校正云按經脉别論中无此文脉有逆從四時未有藏形春夏而脉瘦新校正云按玉機真藏論注瘦作沉澀秋冬而脉浮大命曰逆四時也春夏脉瘦謂沉細也秋冬浮大不應時也大法春夏當浮大而反沉細秋冬當沉細而反浮大故曰不應時也風新校正云按玉機真藏論風作病熱而脉靜泄而脫血脉實新校正云按玉機眞藏論篇注作泄而脉大脫血而脉實病在中脉虚病在外新校正云按玉機眞藏論作脉實堅病在外脉濇堅者新校正云按玉機眞藏論作脉不實堅者皆難治風熱當脉躁而反靜泄而脫血當脉虚而反實邪氣在内當脉實而反虚病氣在外當脉虚滑而反堅濇故皆難治也命曰反四時也皆反四時之氣乃如是矣新校正云詳命曰反四時也此六字應古錯簡當去自前未有藏形春夏至此五十三字與後玉機真藏論文相重人以水穀爲本故人絶水穀則死脉無胃氣亦死所謂無胃氣者但得真藏脉不得胃氣也所謂脉不得胃氣者肝不弦腎不石也不弦不石皆謂不微似也太陽脉至洪大以長氣盛故能爾新校正云按扁鵲陰陽脉法云太陽之脉洪大以長其來浮於筋上動摇九分三月四月甲子王吕廣云太陽王五月六月其氣大盛故其脉洪大而長也少陽脉至乍數乍踈乍短乍長以氣有暢未暢者也新校正云按扁鵲陰陽法云少陽之脉乍小乍大乍長乍短摇動六分王十一月甲子夜半正月二月甲子王吕廣云少陽王正月二月其氣尚微故其脉來進退无常陽明脉至浮大而短穀氣滿盛故也新校正云詳無三陰脉應古文闕也按難經云太陰之至緊大而長少陰之至緊細而微厥陰之至沉短以敦吕廣云陽明王三月四月其氣始萌未盛故其脉來浮大而短扁鵲陰陽脉法云少陰之脉緊細動摇六分王五月甲子日中七月八月王太陰之脉緊細以長乘於筋上動摇九分九月十月甲子王厥陰之脉沉短以緊動摇三分十一月十二月甲子王也夫平心脉來累累如連珠如循琅玕曰心平言脉滿而盛微似珠形之中手琅玕珠之類也夏以胃氣爲本脉有胃氣則累累而微似連珠也病心脉來喘喘連屬其中微曲曰心病曲謂中手而偃曲也新校正云詳越人云啄啄連屬其中微曲曰腎病與素問異死心脉來前曲後居如操帶鈎曰心死居不動也操執持也鈎謂革帶之鈎平肺脉來厭厭聶聶如落榆莢曰肺平浮薄而虚者也新校正云詳越人云厭厭聶聶如循榆莢曰春平脉藹藹如車蓋按之益大曰秋平脉與素之說不同張仲景云秋脉靄靄如車蓋者名曰陽結春脉聶聶如吹榆莢者名曰數恐越人之說誤也秋以胃氣爲本脉有胃氣則微似榆莢之輕虚也病肺脉來不上不下如循鷄羽曰肺病謂中央堅而兩傍虚死肺脉來如物之浮如風吹毛曰肺死如物之浮瞥瞥然如風吹毛紛紛然也新校正云詳越人云按之消索如風吹毛曰死平肝脉來耎弱招招如揭長竿末梢曰肝平如竿末梢言長耎也春以胃氣爲本脉有胃氣乃長耎如竿之末梢矣病肝脉來盈實而滑如循長竿曰肝病長而不耎故若循竿死肝脉來急益勁如新張弓弦曰肝死勁謂勁强急之甚也平脾脉來和柔相離如鷄踐地曰脾平言脉來動數相離緩急和而調長夏以胃氣爲本胃少則脉實數病脾脉來實而盈數如鷄舉足曰脾病胃少故脉實急矣舉足謂如鷄走之舉足也新校正云詳越人以爲心病死脾脉來鋭堅如烏之喙新校正云按千金方作如鷄之喙也如鳥之距如屋之漏如水之流曰脾死烏喙鳥距言鋭堅也水流屋漏言其至也水流謂平至不鼓屋漏謂時動復住平腎脉來喘喘累累如鈎按之而堅曰腎平謂如心脉而鈎按之小堅爾新校正云按越人云其來上大下兊濡滑如雀之啄曰平吕廣云上大者足太陽下兊者足少陰陰陽得所爲胃氣强故謂之平雀喙者本大而末兊也冬以胃氣爲本胃少則不按亦堅也病腎脉來如引葛按之益堅曰腎病形如引葛言不按且堅明按之則尤甚也死腎脉來發如奪索辟辟如彈石曰腎死發如奪索猶蛇之走辟辟如彈石言促又堅也黄帝内經素問補註釋文卷之十四

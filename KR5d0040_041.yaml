front:
  text: 黄帝内經素問補註釋文卷之四十一今六
  hash: sha256:610f391beede4822e524a3497d0f98642c1a46401ee21775f2821140dca90169
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_041-001a, image: hfl/0657/0657-065.png}
body:
  text: 唐太僕令啓玄子王氷次註宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤氣交變大論篇新校正云詳此論專明氣交之變乃五運太過不及德化政令灾變勝復爲病之事黄帝問曰五運更治上應天期陰陽往復寒暑迎隨眞邪相薄内外分離六經波蕩五氣傾移太過不及專勝兼并願言其始而有常名可得聞乎期三百六十五日四分日之一也專勝謂五運主歲太過也兼并謂主歲之不及也常名謂布化於太虚人身參應病之形診也新校正云按天元紀大論云五運相襲而皆治之終期之日周而復始又云五氣運行各終期日太始天元册文曰萬物資始五運終天即五運更治上應天期之義也岐伯稽首再拜對曰昭乎哉問也是眀道也此上帝所貴先師傳之臣雖不敏往聞其㫖言非己心之生知備聞先人往古受傳之遺㫖也帝曰余聞得其人不教是謂失道傳非其人慢泄天寳余誠菲德未足以受至道然而衆子哀其不終願夫子保於無窮流於無極余司其事則而行之奈何至道者非傳之難非知之艱行之艱聖人愍念蒼生同居永壽故屈身降志請受於天師太上貴德故後己先人苟非其人則道無虚授黄帝欲仁慈惠遠博愛流行尊道下身拯乎黎庶乃曰余司其事則而行之也岐伯曰請遂言之也上經曰夫道者上知天文下知地理中知人事可以長久此之謂也夫道者大无不包細无不入故天文地理人事咸通新校正云詳夫道者一節與著至教論文重帝曰何謂也岐伯曰本氣位也位天者天文也位地者地理也通於人氣之變化者人事也故太過者先天不及者後天所謂治化而人應之也三隂三陽司天司地以表定陰陽生化之紀是謂位天位地也五運居中司人氣之變化故曰通於人氣也先天後天謂生化氣之變化所主時也太過歲化先時至不及歲化後時至帝曰五運之化太過何如太過謂歲氣有餘也新校正云詳太過五化具五常政大論中岐伯曰歲木太過風氣流行脾土受邪木餘故土氣卑屈民病飧泄食减體重煩冤腸鳴腹支滿上應歲星飧泄謂食不化而下出也脾虚故食减體重煩冤腸鳴腹支滿也歲木氣太盛歲星光明逆守星屬分皆灾也新校正云按藏氣法時論云脾虚則腹滿腸鳴飧泄食不化甚則忽忽善怒眩冒巔疾凌犯太甚則遇於金故自病新校正云按玉機眞藏論云肝脉太過則令人喜怒忽忽眩冒巔疾爲肝實而然則此病不獨木太過遇金自病肝實亦自病也化氣不政生氣獨治雲物飛動草木不寧甚而摇落反脅痛而吐甚衝陽絶者死不治上應太白星諸陽歲也木餘土抑故不能布政於萬物也生氣木氣也太過故獨治而生化也風不務德非分而動則太虚之中雲物飛動草木不寧動而不止金則勝之故甚則草木摇落也脅反痛木乘土也衝陽胃脉也木氣勝而土氣乃絶故死也金復而太白逆守屬星者危也其灾之發害於東方人之内應則先害於脾後傷肝也書曰滿招損此其類也新校正云詳此太過三化言星之例有三木與土運先言歲鎮後言勝己之星火與金運先言熒惑太白次言勝己之星後再言熒惑太白水運先言辰星次言鎮星後再言辰星兼見己勝之星也歲火太過炎暑流行肺金受邪火不以德則邪害於金若以德行則政和平也民病瘧少氣咳喘血溢血泄注下嗌燥耳聾中熱肩背熱上應熒惑星少氣謂氣少不足以息也血泄謂泄利便血也血溢謂血上出於七竅也注下謂水利也中熱謂胷心中也背者胷中之府肩接近之故胷心中及肩背熱也火氣太盛則熒惑光芒逆臨宿屬分皆灾也新校正云詳火盛而剋金寒熱交爭故爲瘧按藏氣法時論云肺病者咳喘肺虚者少氣不能報息耳聾嗌乾甚則胷中痛脅支滿脅痛膺背肩胛間痛兩臂内痛新校正云按藏氣法時論云心病者胷中痛脅支滿脅下痛膺背肩甲間痛兩臂内痛身熱骨痛而爲浸淫火無德令縱熱害金水爲復讎故火自病新校正云按玉機眞藏論云心脉太過則令人身熱而膚痛爲浸淫此云骨痛者誤也收氣不行長氣獨明雨水霜寒今詳水字當作冰上應辰星金氣退避火氣獨行水氣折之故雨零冰雹及遍降霜寒而殺物也水復於火天象應之辰星逆凌及寒災於物也上辰星者常在日之前後三十度其灾發之當至南方在人之應則内先傷肺後反傷心新校正云按五常政大論雨水霜寒作雨冰霜雹上臨少陰少陽火燔焫水泉涸物焦槁新校正云按五常政大論云赫曦之紀上徵而收氣後又六元正紀大論云戊子戊午太徵上臨少陰戊寅戊申太徵上臨少陽臨者太過不及皆曰天符病反譫妄狂越咳喘息鳴下甚血溢泄不已太淵絶者死不治上應熒惑星諸戊歲也戊午戊子歲少陰上臨戊寅戊申歲少陽上臨是謂天符之歲也太淵肺脉也火勝而金絶故死火既太過又火熱上臨兩火相合故形斯候熒惑逆犯宿屬皆危新校正云詳戊辰戊戌歲上見太陽是謂天刑運故當盛而不得盛則火化減半非太過又非不及也歲土太過雨濕流行腎水受邪土無德乃爾民病腹痛清厥意不樂體重煩冤上應鎮星腹痛謂大腹小腹痛也清厥謂足逆冷也意不樂如有隱憂也土來刑水天象應之鎮星逆犯宿屬則灾新校正云按藏氣法時論云腎病者身重腎虚者大腹小腹痛清厥意不樂甚則肌肉萎足萎不收行善瘈脚下痛飲發中滿食減四支不舉脾主肌肉外應四支又其脉起於足中指之端循核骨内側斜岀絡跗故病如是新校正云按藏氣法時論云脾病者身重善饑肉萎足萎不收行善瘈脚下痛又玉機真藏論云脾太過則令人四支不舉變生得位新校正云詳太過五化獨此言變生得位者舉一而四氣可知也又以土王時月難知故此詳言之也藏氣伏化氣獨治之泉涌河衍涸澤生魚風兩大至土崩潰鱗見於陸病腹滿溏泄腸鳴反下甚而太谿絶者死不治上應歲星諸甲歲也得位謂季月也藏水氣也化土氣也土化太過故水藏伏匿百化氣獨治土勝木復故風雨大至水泉涌河渠溢乾澤生魚濕既甚矣風又鼓之故土崩潰土崩潰謂垣頽岸仆山落地入也河溢泉涌枯澤水滋鱗物豐盛故見於陸也太谿腎脉也土勝而水絶故死木來折土天象逆臨加其宿屬正可憂也新校正云按藏氣法時論云脾虚則腹滿腸鳴飧泄食不化歲金太過燥氣流行肝木受邪金暴虐乃爾民病兩脅下少腹痛目赤痛眦瘍耳無所聞兩脅謂兩乳下脅之下也少腹謂臍下兩傍髎骨内也目赤謂白睛色赤也痛謂髎痛也眦謂四際瞼睫之本也瞼音檢肅殺而甚則體重煩冤胸痛引背兩脅滿且痛引少腹上應太白星金氣已過肅殺又甚木氣内畏感而病生金盛應天太白明大加臨宿屬心受災害新校正云按藏氣法時論云肝病者兩脅下痛引少腹肝虚則目𥆨𥆨无所見耳無所聞又玉機眞藏論云肝脉不及則令人胷痛引背下則兩脅胠滿甚則喘咳逆氣肩背痛尻陰股膝髀腨胻足皆病上應熒惑星火氣復之自生病也天象示應在熒惑逆加守宿屬則可憂也新校正云按藏氣法時論云肺病者喘咳逆氣肩背痛汗出尻陰股膝髀腨胻足皆痛收氣峻生氣下草木斂蒼乾雕隕病反暴痛胠脅不可反側新校正云詳此云反暴痛不言何所痛者按至眞要大論云心脅暴痛不可反側則此乃心脅暴痛也欬逆甚而血溢太衝絶者死不治上應太白星諸庚歲也金氣峻瘧木氣被刑火未來復則如是也歛謂已生枝葉歛附其身也太衝肝脉也金勝而木絶故死當是之候太白應之逆守星屬病皆危也新校正云按庚子庚午庚寅庚申歲上見少陰少陽司天是謂天刑運金化減半故當盛而不得盛非太過又非不及也歲水太過寒氣流行邪害心火水不務德暴虐乃然民病身熱煩心躁悸陰厥上下中寒譫妄心痛寒氣早至上應辰星悸心跳動也譫亂語也妄妄見聞也天氣水盛辰星瑩明加其宿屬灾乃至新校正云按陰厥在後金不及復則陰厥有治甚則腹大脛腫喘咳寢汗出憎風新校正云按藏氣法時論云腎病者腹大脛腫喘咳身重寢汗出憎風再詳太過五化木言化氣不政生氣獨治火言收氣不行長氣獨明土言藏氣伏長氣獨治金言收氣峻生氣下水當言藏氣乃盛長氣失政今獨亡者闕文也大雨至埃霧朦鬱上應鎮星水盛不已爲土所乘故彰斯候埃霧朦鬱土之氣腎之脉從足下上行入腹從腎上貫肝鬲入肺中循喉嚨故生是病腎爲陰故寢則汗出而憎風也卧寢汗出即其病也夫土氣勝折水之强故鎮星明盛昭其應也上臨太陽雨冰雪霜不時降濕氣變物新校正云按五常政大論云流衍之紀上羽而長氣不化又六元正紀大論云丙辰丙戌太羽上臨太陽臨者太過不及皆曰天符病反腹滿腸鳴溏泄食不化新校正云按藏氣法時論云脾虚則腹滿腸鳴飧泄食不化渴而妄冒神門絶者死不治上應熒惑辰星諸丙歲也丙辰丙戌歲太陽上臨是謂天符之歲也寒氣太甚故雨化爲冰雪雨冰則雹也霜不時降彰其寒也土復其水則大雨霖霪濕氣内深故物皆濕變神門心脉也水盛而火絶故死水盛火甚則熒惑减曜辰星明瑩加以逆守宿屬則危亡也新校正云詳太過五化獨記火水之上臨者火臨火水臨水爲天符故也火臨水爲逆水臨木爲順火臨土爲順水臨土爲運勝天火臨金爲天刑運水臨金爲逆更不詳出也又此獨言上應熒惑辰星舉此一例餘從而可知也帝曰善其不及何如謂政化少也新校正云詳不及五化貝五常政大論中岐伯曰悉乎哉問也歲木不及燥乃大行清冷時至加之薄寒是謂燥氣燥金氣也生氣失應草木晚榮後時之謂失應也肅殺而甚則剛木辟著柔萎蒼乾上應太白星天地凄愴日見朦昩謂雨非雨謂晴非晴人意慘然氣象凝斂是爲肅殺甚也剛勁硬也辟著謂辟著枝莖乾而不落也柔軟也蒼青也柔木之葉青色不變而乾卷也木氣不及金氣乘之太白之明光芒而照其空也民病中清胠脅痛少腹痛腸鳴溏泄涼雨時至上應太白星新校正云按不及五化民病證中上應之星皆言運星失色畏星加臨宿屬爲灾此獨言畏星不言運星者經文闕也當云上應太白星歲星其穀蒼金氣乘木肝之病也乘此氣者腸中自鳴而溏泄也即無胠脅少腹之痛疾也微者善之甚者止之遇夏之氣亦自止也遇秋之氣而復有之凉雨時至謂應時而至也金土齊化故凉雨俱行火氣來復則夏雨少金氣勝木太白臨之加其宿屬分皆灾也金勝畢歲火氣不復則蒼色之穀不成實也新校正云詳中清胠脅痛少腹痛爲金乘木肝病之狀腸鳴溏泄乃脾病之證蓋以木少脾土無畏侮反受邪之故也上臨陽明生氣失政草木再榮化氣乃急上應太白鎮星其主蒼早諸丁歲也丁卯丁酉歲陽明上臨是謂天刑之歲也金氣承天下勝於木故生氣失政草木再榮生氣失政故木華晚啓金氣抑木故秋夏始榮結實成熟以化氣急速故晩結成就也金氣勝木天應同之故太白之見光芒眀盛木氣既少土氣無制故化氣生長急速木少金勝天氣應之故鎮星太白潤而明也蒼色之物又早凋落木少金乘故也新校正云按不及五化獨紀木上臨陽明土上臨厥陰水上臨太陰不紀木上臨厥陰土上臨太陰金上臨陽明者經之㫖各記其甚者也故於太過運中只言火臨火水臨水此不及運中只言木臨金土臨木水臨土故不言厥陰臨木太陰臨土陽明臨金也復則炎暑流火濕性燥柔脆草木焦槁下體再生華實齊化病寒熱瘡瘍疿胗癰痤上應熒惑太白其穀白堅火氣復金夏生大熱故萬物濕性時變爲燥流火爍物故柔脆草木及蔓延之類皆上乾死而下體再生若辛熱之草死不再生也小熱者死少大熱者死多火大復已土氣間至則凉雨降其酸苦甘鹹性寒之物乃再發生新開之與先結者齊承化而成熟火復其金太白减曜熒惑上應則溢光芒加其宿屬則皆災也以火反復故曰堅之穀秀而不實白露早降收殺氣行寒雨害物蟲食甘黄脾土受邪赤氣後化心氣晩治上勝肺金白氣屈其穀不成咳而鼽上應熒惑太白星陽明上臨金自用事故白露早降寒凉大至則收殺氣行以太陽居土濕之位寒濕相合故寒雨害物少於成實金行伐木假途於土子居母内蟲之象也故甘物黄物蟲蠹食之清氣先勝熱氣後復復已乃勝故火赤之氣後生化也赤後化謂草木赤華及赤實者皆後時而再榮秀也其五藏則心氣晚王勝於肺心勝於肺則金之白氣乃屈退也金穀稻也鼽鼻中水岀也金爲火勝天象應同故太白芒滅熒惑益眀歲火不及寒乃大行長政不用物榮而下凝慘而甚則陽氣不化乃折榮美上應辰星火少水勝故寒乃大行長政不用則物容卑下火氣既少水氣洪盛天象岀見辰星益明民病胷中痛脅支滿兩脅痛膺背肩胛間及兩臂内痛新校正云詳此證與火太過甚則反病之狀同傍見藏氣法時論鬱冒朦昧心痛暴瘖胷腹大脅下與腰背相引而痛新校正云按藏氣法時論云心虚則胷腹大脅下與腰背相引而痛甚則屈不能伸髖髀如别上應熒惑辰星其穀丹諸癸歲也患以其脉行於是也火氣不行寒氣禁固髖髀如别屈不得伸水行乘火故熒惑芒滅丹穀不成辰星臨其宿屬之分則皆灾也復則埃鬱大雨且至黑氣乃辱病鶩溏腹滿食飲不下寒中腸鳴泄注腹痛暴攣痿痹足不任身上應鎮星辰星玄穀不成埃鬱雲雨土之用也復寒之氣必以濕濕氣内淫則生腹疾身重故如是也黑氣水氣也辱屈辱也鶩鴨也土復於水故鎮星明潤臨犯宿屬則民受病災矣鶩音木歲土不及風乃大行化氣不令草木茂榮飄揚而甚秀而不實上應歲星木無德也木氣專行故化氣不令生氣獨擅故草木茂榮飄揚而甚是木不以德土氣薄少故物實不成不實謂粃惡也土不及木乘之故歲星之見潤而明也民病飧泄霍亂體重腹痛筋骨繇復肌肉瞤酸善怒藏氣舉事蟄蟲早附咸病寒中上應歲星鎮星其穀黅諸己歲也風客於胃故病如是土氣不及水與齊化故藏氣舉事蟄蟲早附於陽氣之所人皆病中寒之疾也繇摇也筋骨摇動已復常則已繇復也土抑不伸若歲星臨宿屬則皆灾新校正云詳此文云筋骨繇復王氏雖注義不可解按至眞要大論云筋骨繇併疑此復字併字之誤復則收政嚴峻名木蒼凋胸脅暴痛下引少腹善太息蟲食甘黄氣客於脾黅穀乃减民食少失味蒼穀乃損金氣復木故名木蒼凋金入於土母懷子也故甘物黄物蟲食其中金入土中故氣客於脾金氣大來與土仇復故黅咸實穀不成也上應太白歲星太白芒盛歲減明也經少此六字缺文上臨厥陰流水不冰蟄蟲來見藏氣不用白乃不復上應歲星民乃康己巳己亥歲厥陰上臨其歲少陽在泉火司於地故蟄蟲來見流水不冰也金不得復故歲星之象如常民康不病新校正云詳木不及上臨陽明水不及上臨太陰俱後言復此先言復而後舉上臨之候者蓋白乃不復嫌於此年有復也歲金不及炎火乃行生氣乃用長氣專勝庶物以茂燥爍以行上應熒惑星火不務德而襲金危炎火既流則夏生大熱生氣舉用故庶物蕃茂燥爍氣至物不勝之爍勝之爍石流金涸泉焦草山澤燔燎雨乃不降炎火大盛天象應之熒惑之見而大明也民病肩背瞀重鼽嚏血便注下收氣乃後上應太白星其穀堅芒諸乙歲也瞀謂悶也受熱邪故生是病收金氣也火先勝故收氣後火氣勝金金不能盛若熒惑逆守宿屬之分皆受病新校正云詳其穀堅芒白色可見故不云其穀白也經云上應太白以前後例相照經脫熒惑二字及詳王注言熒惑逆守之事益知經中之闕也復則寒雨暴至乃零冰雹霜雪殺物陰厥且格陽反上行頭腦户痛延及腦頂發熱上應辰星新校正云詳不及之運剋我者行勝我者之子來復當來復之後勝星減曜復星明大此只言上應辰星而不言熒惑者闕文也當云上應辰星熒惑丹穀不成民病口瘡甚則心痛寒氣折火則見冰雹霜雪冰雹先傷而霜雪後損皆寒氣之常也其災害乃傷於赤化也諸不及而爲勝所犯子氣復之者皆歸其方也陰厥謂寒逆也格至也亦拒也水行折火以救困金天象應之辰星明瑩赤色之穀爲霜雹損之歲水不及濕乃大行長氣反用其化乃速暑雨數至上應鎮星濕大行謂數雨也化速謂物早成也火濕齊化故暑雨數至乘水不及而土勝之鎮星之象增益光明逆凌留犯其又甚矣民病腹滿身重濡泄寒瘍流水腰股痛發膕腨股膝不便煩冤足痿清厥脚下痛甚則胕腫藏氣不政腎氣不衡上應辰星其穀秬藏氣不能申其政令故腎氣不能内致和平衡平也辰星之應當减其明或遇鎮星臨屬宿者乃災新校正云詳經云上應辰星注言鎮星以前後例相校此經闕鎮星二字上臨太陰則大寒數舉蟄蟲早藏地積堅冰陽光不治民病寒疾於下甚則腹滿浮腫上應鎮星新校正云詳木不及上臨陽明上應太白鎮星此獨言鎮星而不言熒惑者文闕也蓋水不及而又上臨太陰則鎮星明盛以應土氣專盛水既益弱則熒惑無畏而明大其主黅穀諸辛歲也辛丑辛未歲上臨太陰太陽在泉故大寒數舉也土氣專盛故鎮星益明黅穀應天歲成也復則大風暴發草偃木零生長不鮮面色時變筋骨并辟肉瞤瘈目視𥆨𥆨物踈璺肌肉胗發氣并鬲中痛於心腹黄氣乃損其穀不登上應歲星木復其土故黄氣反損而黅穀不登也謂實不成無以登祭器也木氣暴復歲星下臨宿屬分者災新校正云詳此當云上應歲星鎮星爾璺音間帝曰善願聞其時也岐伯曰悉乎哉問也木不及春有鳴條律暢之化則秋有霧露清凉之政春有慘凄殘賊之勝則夏有炎暑燔爍之復其眚東化和氣也勝金氣也復火氣也火復於金悉因其木故灾眚之作皆在東方餘眚同新校正云按木火不及先言春夏之化秋冬之政者先言木火之政化次言勝復之變也其藏肝其病内舍胠脅外在關節東方肝之主也火不及夏有炳明光顯之化則冬有嚴肅霜寒之政夏有慘凄凝冽之勝則不時有埃昏大雨之復其眚南化火德也勝水虐也復土變也南方火也其藏心其病内舍膺脅外在經絡南方心之主也土不及四維有埃雲潤澤之化則春有鳴條鼓拆之政四維發振拉飄騰之變則秋有肅殺霖霪之復其眚四維東南東北西南西北方也維隅也謂日在四隅月也新校正云詳土不及亦先言政化次言勝復也其藏脾其病内舍心腹外在肌肉四支四維中央脾之主也金不及夏有光顯鬱蒸之令則冬有嚴凝整肅之應夏有炎爍燔燎之變則秋有冰雹霜雪之復其眚西其藏肺其病内舍膺脅肩背外在皮毛西方肺之主也水不及四維有湍潤埃雲之化則不時有和風生發之應四維發埃昏驟注之變則不時有飄蕩振拉之復其眚北飄蕩振拉大風所作新校正云詳金水不及先言火土之化令與應故不當秋冬而言也次言者火土勝復之變也與木火土之例不同者互文也其藏腎其病内舍腰脊骨髓外在谿谷踹膝肉之大會爲谷肉之小會爲谿肉分之間谿谷之會以行榮衛以會大氣夫五運之政猶權衡也高者抑之下者舉之化者應之變者復之此生長化成收藏之理氣之常也失常則天地四塞矣失常之理則天地四時之氣閉塞而無所運行故動必有靜勝必有復乃天地陰陽之道故曰天地之動靜神明爲之紀陰陽之往復寒暑彰其兆此之謂也新校正云按故曰已下與五運行大論同上兩句又與陰陽應象大論文重彼云陰陽之升降寒暑彰其兆也帝曰夫子之言五氣之變四時之應可謂悉矣夫氣之動亂觸遇而作發無常會卒然災合何以期之岐伯曰夫氣之動變固不常在而德化政令灾變不同其候也帝曰何謂也岐伯曰東方生風風生木其德敷和其化生榮其政舒啓其令風其變振發其灾散落敷布也和和氣也榮滋榮也舒展也啓開也振怒也發出也散謂物飄零而散落也新校正云按五運行大論云其德爲和其化爲榮其政爲散其令宣發其變摧拉其眚爲隕義與此通南方生熱熱生火其德彰顯其化蕃茂其政明曜其令熱其變銷爍其灾燔焫新校正云詳五運行大論云其德爲顯其化爲茂其政爲明其令鬱蒸其變炎爍其眚燔焫中央生濕濕生土其德溽蒸其化豐備其政安靜其令濕其變驟注其災霖潰溽濕也蒸熱也驟注急雨也霖乆雨也潰爛泥也新校正云按五運行大論云其德爲濡其化爲盈其政爲謐其令雲雨其變動注其眚淫潰謐音宻西方生燥燥生金其德清潔其化緊斂其政勁切其令燥其變肅殺其災蒼隕緊縮也斂收也勁銳也切急也燥乾也肅殺謂風動草樹聲若乾也殺氣太甚則木青乾而落也新校正云按五運行大論云其德爲清其化爲斂其政爲勁其令霧露其變肅殺其眚蒼落北方生寒寒生水其德凄滄其化清謐其政凝肅其令寒其變凓冽其灾冰雪霜雹凄滄薄寒也謐靜也肅中外嚴整也凓冽甚寒也冰雪霜雹寒氣凝結所成水復火則非時而有也新校正云按五運行大論云其德爲寒其化爲肅其政爲靜其變凝冽其眚冰雹是以察其動也有德有化有政有令有變有灾而物由之而人應之也夫德化政令和氣也其動靜勝復施於萬物皆悉生成變與灾殺氣也其用暴速其動驟急其行損傷雖皆天地自爲動靜之用然物有不勝其動者且損且病且死焉帝曰夫子之言歲候其不及太過而上應五星今夫德化政令災眚變易非常而有也卒然而動其亦爲之變乎岐伯曰承天而行之故無妄動無不應也卒然而動者氣之交變也其不應焉故曰應常不應卒此之謂也德化政令氣之常也災眚變易氣卒交會而有勝負者也常謂歲四時之氣不差晷刻者不常不乆也帝曰其應奈何岐伯曰各從其氣化也歲星之化以風應之熒惑之化以熱應之鎮星之化以濕應之太白之化以燥應之辰星之化以寒應之氣變則應故各從其氣化也上文言復勝皆上應之今經言應常不應卒所謂無大變易而不應然其勝復當色有枯燥潤澤之異無見小大以應之帝曰其行之徐疾逆順何如岐伯曰以道留久逆守而小是謂省下以道謂順行留久謂過應留之日數也省下謂察天下人君之有德有過者也以道而去去而速來曲而過之是謂省遺過也順行已去已去輒逆行而速委曲而經過是謂遺其過而輒省察之也行急行緩往多往少蓋謂罪之有大有小按其遺而斷之久留而環或離或附是謂議灾與其德也環謂如環而繞盤迴而不去也火議罪金議殺土木水議德應近則小應遠則大近謂犯星常在遠謂犯星去久大小謂喜慶及罰罪事芒而大倍常之一其化甚大常之二其眚即也甚謂政令大行也發謂起也即至也金火有之小常之一其化減小常之二是謂臨視省下之過與其德也省謂省察萬國人吏侯王有德有過者也故侯王人吏安可不深思誡愼耶德者福之過者伐之有德者則天降福以應之有過者天降禍以淫之則知禍福無門惟人所召耳是以象之見也高而遠則小下而近則大見物之理也故大則喜怒邇小則禍福遠象見高而小既未即禍亦未即福象見下而大福既不遠禍亦未遥但當修德省過以候厥終苟未能愼禍而務求福祐豈有是者哉歲運太過則運星北越火運火星木運木星之類也北越謂北而行也運氣相得則各行以道無剋伐之嫌故守常而各行於中道故歲運太過畏星失色而兼其母木失色而兼玄火失色而兼蒼土失色而兼赤金失色而兼黄水失色而兼白是謂兼其母也不及則色兼其所不勝木兼白色火兼玄色土兼蒼色金兼赤色水兼黄色是謂兼不勝也肖者瞿瞿莫知其妙閔閔之當孰者爲良新校正云詳肖者至爲良與靈蘭秘典論重彼有注妄行無徵示畏侯王不識天意心私度之妄言灾咎卒無徵驗適足以示畏之兆於侯王熒惑於庶民矣帝曰其灾應何如岐伯曰亦各從其化也故時至有盛衰凌犯有逆順留守有多少形見有善惡宿屬有勝負徵應有吉凶矣五星之至相王爲時盛囚死爲衰東行凌犯爲順灾輕西行凌犯爲逆灾重留守日多則灾深留守日少則灾淺星喜潤則爲見善星怒燥憂喪則爲見惡宿屬謂所生月之屬二十八宿及十二辰相分所屬之位也命勝星不灾不害不勝星爲灾小重命與星相得雖灾無害灾者獄訟疾病之謂也雖五星凌犯之事時遇星之囚死時月雖灾不成然火犯留守逆臨則有誣譖獄訟之憂金犯則有刑殺氣鬱之憂木犯則有震驚風鼓之憂土犯則有中滿下利胕腫之憂水犯則有寒氣衝搐之憂故曰徵應有吉凶也帝曰其善惡何謂也岐伯曰有喜有怒有憂有喪有澤有燥此象之常也必謹察之夫五星之見也從夜深見之人見之喜星之喜也見之畏星之怒也光色微曜乍明乍暗星之憂也光色迥然不彰不瑩不與衆同星之喪也光色圓眀不盈不縮怡然瑩然星之喜也光色勃然臨人芒彩滿溢其象懔然星之怒也澤洪潤也燥乾枯也帝曰六者高下異乎岐伯曰象見高下其應一也故人亦應之觀象覩色則中外之應人天咸一矣帝曰善其德化政令之動靜損益皆何如岐伯曰夫德化政令灾變不能相加也天地動靜陰陽往復以德報德以化報化政令灾眚及動復亦然故曰不能相加也勝復盛衰不能相多也勝盛復盛勝微復微不應以盛報微以化報變故曰不能相多也往來小大不能相過也勝復日數多少皆同故曰不能相過用之升降不能相無也木之勝金必報火土金水皆然未有勝而無服者故氣不能相使無也各從其動而復之耳動必有復察動以言復也易曰吉凶悔吝生乎動此之謂歟天雖高不可度地雖廣不可量以氣動復言之其猶視掌矣帝曰其病生何如岐伯曰德化者氣之祥政令者氣之章變易者復之紀災眚者傷之始氣相勝者和不相勝者病重感於邪則甚也祥善應也章程也式也復紀謂報復之綱紀也重感謂年氣已不及天氣又見剋殺之氣是爲重感重謂重累也帝曰善所謂精光之論大聖之業宣明大道通於無窮究於無極也余聞之善言天者必應於人善言古者必驗於今善言氣者必彰於物善言應者同天地之化善言化言變者通神明之理非夫子孰能言至道歟太過不及歲化無窮氣交遷變流於無極然天垂象聖人則之以知吉凶何者歲太過而星大或明瑩歲不及而星小或失色故吉凶可指而見也吉凶者何謂物禀五常之氣以生成莫不上參應之有否有宜故曰吉凶斯至矣故曰善言天者必應於人也言古之道而今必應之故曰善言古者必驗於今也化氣生成萬物皆禀故言氣應者以物明之故曰善言應者必彰於物也彰明也氣化之應如四時行萬物備故善言應者必同天地之造化也物生謂之化物極謂之變言萬物化變終始必契於神明運爲故言化變者通於神明之理聖人智周萬物無所不通故言必有發動無不應之也乃擇良兆而藏之靈室每旦讀之命曰氣交變非齋戒不敢發愼傳也靈室謂靈蘭室黄帝之書府也新校正云詳此文與六元正紀大論末同黄帝内經素問補註釋文卷之四十一

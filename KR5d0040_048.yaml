  text: 黄帝内經素問補註釋文卷之四十八榮六
  hash: sha256:4093c038f4b94afce942eafd561ba5f926d9eff0161861d221390703eb8590e4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_048-001a, image: hfl/0660/0660-004.png}
body:
  text: 唐太僕令啓玄子王氷次註宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤至眞要大論篇下帝曰氣之上下何謂也岐伯曰身半以上其氣三矣天之分也天氣主之身半以下其氣三矣地之分也地氣主之以名命氣以氣命處而言其病半所謂天樞也身之半正謂臍中也或以腰爲身半是以居中爲義過天中也中原之人悉如此矣當伸臂指天舒足指地以繩量之中正當臍也故又曰半所謂天樞也天樞正當臍兩傍同身寸之二寸也其氣三者假如少陰司天則上有熱中有太陽兼之三也六氣皆然司天者其氣三司地者其氣三故身半以上三氣身半以下三氣也以名言其氣以氣言其處以氣處寒熱而言其病之形證也則如足厥陰氣居足及股脛之内側上行於少腹循脅足陽明氣在足之上胻之外股之前上行腹臍之傍循胷乳上面足太陽氣起於目上額絡頭下項背過腰横過髀樞股後下行入胕貫腨出外踝之後足小指外側足太陰氣循足及股脛之内側上行腹脅之前足少陰同之足少陽氣循脛外側上行腹脅之側循頰耳至目銳眥在首之側此足六氣之部主也手厥陰少陰太陰氣從心胸横出循臂内側至中指小指大指之端手陽明少陽太陽氣并起手表循臂外側上肩及甲上頭此手六氣之部主也欲知病診當隨氣所在以言之當陰之分冷病歸之當陽之分熱病歸之故勝復之作先言病生寒熱者必依此物理也新校正云按六微㫖大論云天樞之上天氣主之天樞之下地氣主之氣交之分人氣從之故上勝而下俱病者以地名之下勝而上俱病者以天名之彼氣既勝此未能復抑鬱不暢而無所行進則困於讎嫌退則窮於怫塞故上勝至則下與俱病下勝至則上與俱病上勝下病地氣鬱也故從地鬱以名地病下勝上病天氣塞也故從天塞以名天病夫以天名者方順天氣爲制逆地氣而攻之以地名者方從天氣爲制則可假如陽明司天少陰在泉上勝而下俱病者是怫於下而生也天氣正勝天可逆之故順天之氣方同清也少陰等司天上下勝同法新校正云按六元正紀大論云上勝則天氣降而下下勝則地氣逆而上此之謂也所謂勝至報氣屈伏而未發也復至則不以天地異名皆如復氣爲法也勝至未復而病生以天地異名爲式復氣已發則所生無問上勝下勝悉皆依復氣爲病寒熱之主也帝曰勝復之動時有常乎氣有必乎岐伯曰時有常位而氣無必也雖位有常而發動有無不必定之也帝曰願聞其道也岐伯曰初氣終三氣天氣主之勝之常也四氣盡終氣地氣主之復之常也有勝則復無勝則否帝曰善復已而勝何如岐伯曰勝至則復無常數也衰乃止耳勝微則復微故復已而又勝勝甚則復甚故復已則少有再勝者也假有勝者亦隨微甚而復之爾然勝復之道雖無常數至其衰謝則勝復皆自止也復已而勝不復則害此傷生也有勝無復是復氣已衰衰不能復是天眞之氣已傷敗甚而生意盡帝曰復而反病何也岐伯曰居非其位不相得也大復其勝則主勝之故反病也捨己宫觀適於他邦已力已衰主不相得怨隨其後唯便是求故力極而復主反龔之反自病者也所謂火燥熱也少陽火也陽明燥也少陰熱也少陰少陽在泉爲火居水位陽明司天爲金居火位金復其勝則火主勝之火復其勝則水主勝之餘氣勝復則無主勝之病氣也故又曰所謂火燥熱也帝曰治之奈何岐伯曰夫氣之勝也微者隨之甚者制之氣之復也和者平之暴者奪之皆隨勝氣安其屈伏無問其數以平爲期此其道也隨謂隨之安謂順勝氣以和之也制謂制止平謂平調奪謂奪其勝氣也治此者不以數之多少但以氣平和爲準度爾帝曰善客主之勝復奈何客謂天之六氣主謂五行之位也氣有宜否故各有勝復之者岐伯曰客主之氣勝而無復也客主自有多少以其爲勝與常勝殊帝曰其逆從何如岐伯曰主勝逆客勝從天之道也客承天命部統其方主爲之下固宜祗奉天命不順而勝則天命不行故爲逆也客勝於主承天而行理之道故爲順也帝曰其生病何如岐伯曰厥陰司天客勝則耳鳴掉眩甚則咳主勝則胸脅痛舌難以言五巳五亥歲也少陰司天客勝則鼽嚏頸項强肩背瞀熱頭痛少氣發熱耳聾目瞑甚則胕腫血溢瘡瘍咳喘主勝則心熱煩躁甚則脅痛支滿五子五午歲也太陰司天客勝則首面胕腫呼吸氣喘主勝則胸腹滿食已而瞀五丑五未歲也少陽司天客勝則丹胗外發及爲丹熛瘡瘍嘔逆喉痹頭痛嗌腫耳聾血溢内爲瘛瘲主勝則胸滿咳仰息甚而有血手熱五寅五申歲也陽明司天清復内餘則咳衄嗌塞心鬲中熱咳不止而白血出者死復謂復舊居也白血謂咳出淺紅色血似肉似肺者五卯五酉歲也新校正云詳此不言客勝主勝者以金居火位無客勝之理故不言也太陽司天客勝則胷中不利出清涕感寒則咳主勝則喉嗌中鳴五辰五戌歲也厥陰在泉客勝則大關節不利内爲痙强拘瘛外爲不便主勝則筋骨繇併腰腹時痛五寅五申歲也大關節腰膝也少陰在泉客勝則腰痛尻股膝髀腨胻足病瞀熱以酸胕腫不能乆立溲便變主勝則厥氣上行心痛發熱鬲中衆痹皆作發於胠脅魄汗不藏四逆而起五卯五酉歲也太陰在泉客勝則足痿下重便溲不時濕客下焦發爲濡寫及爲腫隱曲之疾主勝則寒氣逆滿食飲不下甚則爲疝五辰五戌歲也隱曲之疾謂隱蔽委曲之處病也少陽在泉客勝則腰腹痛而反惡寒甚則下白溺白主勝則熱反上行而客於心心痛發熱格中而嘔少陰同候五巳五亥歲也陽明在泉客勝則清氣動下少腹堅滿而數便寫主勝則腰重腹痛少腹生寒下爲鶩溏則寒厥於腸上衝胸中甚則喘不能久立五子五午歲也鶩鴨也言如鴨之後也太陽在泉寒復内餘則腰尻痛屈伸不利股脛足膝中痛五丑五未歲也新校正云詳此不言客主勝者蓋太陽以水居水位故不言也帝曰善治之奈何岐伯曰高者抑之下者舉之有餘者折之不足者補之佐以所利和以所宜必安其主客適其寒温同者逆之異者從之高者抑之制其勝也下者舉之濟其弱也有餘者折之屈其銳也不足者補之全其氣也雖制勝扶弱而客主須安一氣失所則矛楯更作榛棘互興各伺其便不相得者内淫外併而危敗之由作矣同謂寒熱温清氣相比和者異謂水火金木土不比和者氣相得者則逆所勝之氣以治之不相得者則順所不勝氣以治之治火勝負欲益者以其味欲寫者亦以其味勝與不勝皆折其氣也何者以其性躁動也治熱亦然帝曰治寒以熱治熱以寒氣相得者逆之不相得者從之余已知之矣其於正味何如岐伯曰木位之主其寫以酸其補以辛木位春分前六十一日初之氣也火位之主其寫以甘其補以鹹君火之位春分之後六十一日二之氣也相火之位夏至前後各三十日三之氣也二火之氣則殊然其氣用則一矣土位之主其寫以苦其補以甘土之位秋分前六十一日四之氣也金位之主其寫以辛其補以酸金之位秋分後六十一日五之氣也水位之主其寫以鹹其補以苦水之位冬至前後各三十日終之氣也厥陰之客以辛補之以酸寫之以甘緩之少陰之客以鹹補之以甘寫之以鹹收之新校正云按藏氣法時論云心苦緩急食酸以收之心欲耎急食鹹以耎之此云以鹹收之者誤也太陰之客以甘補之以苦寫之以甘緩之少陽之客以鹹補之以甘寫之以鹹耎之陽明之客以酸補之以辛寫之以苦泄之太陽之客以苦補之以鹹寫之以苦堅之以辛潤之開發腠理致津液通氣也客之部主各六十一日居無常所隨歲遷移客勝則寫客而補主主勝則寫主而補客應隨當緩當急以治之帝曰善願聞陰陽之三也何謂岐伯曰氣有多少異用也太陰爲正陰太陽爲正陽次少者爲少陰次少者爲少陽又次爲陽明又次爲厥陰厥陰爲盡義具靈樞繫日月論中新校正云按六元正紀大論云何謂氣有多少鬼臾區曰陰陽之氣各有多少故曰三陰三陽也帝曰陽明何謂也岐伯曰兩陽合明也靈樞繫日月論曰辰者三月主左足之陽明巳者四月主右足之陽明兩陽合於前故曰陽明也帝曰厥陰何也岐伯曰兩陰交盡也靈樞繫日月論曰戌者九月主右足之厥陰亥者十月主左足之厥陰兩陰盡故曰厥陰也帝曰氣有多少病有盛衰新校正云按六元正紀大論曰形有盛衰治有緩急方有大小願聞其約奈何岐伯曰氣有高下病有遠近證有中外治有輕重適其至所爲故也藏位有高下府氣有遠近病證有表裏藥用有輕重調其多少和其緊慢令藥氣至病所爲故勿太過與不及也大要曰君一臣二奇之制也君二臣四偶之制也君二臣三奇之制也君三臣六偶之制也奇謂古之單方偶謂古之復方也單復之制皆有小大故奇方云君一臣二君二臣三偶方云君二臣四君三臣六也病有小大氣有遠近治有輕重所宜故云制也故曰近者奇之遠者偶之汗者不以奇下者不以偶補上治上制以緩補下治下制以急急則氣味厚緩則氣味薄適其至所此之謂也汗藥不以偶方氣不可以外發泄下藥不以奇制藥毒攻而致過治上補上方迅急則上不住而迫下治下補下方緩慢則滋道路而力又微制急方而氣味薄則力與緩等制緩方而氣味厚則勢與急同如是爲緩不能緩急不能急厚而不厚薄而不薄則大小非制輕重無度則虚實寒熱藏府紛撓無由致理豈神靈而可望安哉病所遠而中道氣味之者食而過之無越其制度也假如病在腎而心之氣味飼而冷足仍急過之不飼以氣味腎藥凌心心復益衰餘上下遠近不同是故平氣之道近而奇偶制小其服也遠而奇偶制大其服也大則數少小則數多多則九之少則二之湯丸多少凡如此也近遠謂府臓之位也心肺爲近肝腎爲遠脾胃居中三陽胞䐈膽亦有遠近身三分之上爲近下爲遠也或識見高遠權以合宜方奇而分兩偶方偶而分兩奇如是者近而偶制多數服之遠而奇制少數服之則肺服九心服七脾服五肝服三腎服一爲奇制矣故曰小則數多大則數少新校正云詳注云三陽胞䐈膽一本作三腸胞䐈膽再詳三陽無義三腸亦未爲得腸有大小并䐈腸爲三今已云胞䐈則不得云三腸三當作二䐈之力切奇之不去則偶之是謂重方偶之不去則反佐以取之所謂寒熱温凉反從其病也方與其重也寧輕與其毒也寧善與其大也寧小是以奇方不去偶方主之偶方病在則反其一佐以伺病之氣而取之也夫熱與寒背寒與熱違微小之熱爲寒所折微小之冷爲熱所消甚大寒熱則必能與違性者爭雄能與異氣者相格聲不同不相應氣不同不相合如是則且憚而不敢攻之攻之則病氣與藥氣抗衡而自爲寒熱以開閉固守矣是以聖人反其佐以伺其氣令身氣應合復令其熱參合使其終異始同燥潤而敗堅剛强必折柔脆自消爾脆須醉切帝曰善病生於本余知之矣生於標者治之奈何岐伯曰病反其本得標之病治反其本得標之方言少陰太陽之二氣餘四氣標本同帝曰善六氣之勝何以候之岐伯曰乘其至也清氣大來燥之勝也風木受邪肝病生焉流於膽熱氣大來火之勝也金燥受邪肺病生焉流於迴腸大腸新校正云詳注云迴腸大腸按甲乙經迴腸即大腸也寒氣大來水之勝也火熱受邪心病生焉流於三焦小腸濕氣大來土之勝也寒水受邪腎病生焉流於膀胱風氣大來木之勝也土濕受邪脾病生焉流於胃所謂感邪而生病也外否其氣而内惡之中外不喜因而遂病是謂感也乘年之虚則邪甚也年木不足外有清邪年火不足外有寒邪年土不足外有風邪年金不足外有熱邪年水不足外有濕邪是年之虚也歲氣不足外邪凑甚也失時之和亦邪甚也六氣臨統與位氣相剋感之而病亦隨所不勝而與内藏相應邪復甚也遇月之空亦邪甚也謂上弦前下弦後月輪中空也重感於邪則病危矣年已不足邪氣大至是重感也年已不足天氣剋之此時感邪是重感也内氣召邪天氣不祐欲病之不危可乎有勝之氣其必來復也天地之氣不能相無故有勝之氣其必來復也帝曰其脉至何如岐伯曰厥陰之至其脉弦軟虚而滑端直以長是謂弦實而强則病不實而微亦病不端直長亦病不當其位亦病位不能弦亦病少陰之至其脉鈎來盛去衰如偃帶鈎是謂鈎來不盛去反盛則病來盛去盛亦病來不盛去不盛亦病不偃帶鈎亦病位不能鈎亦病太陰之至其脉沉沉下也按之乃得下諸位脉也沉甚則病不沉亦病不當其位亦病位不能沉亦病少陽之至大而浮浮高也大謂稍大諸位脉也大浮甚則病浮而不大亦病大而不浮亦病不大不浮亦病不當其位亦病位不能大浮亦病陽明之至短而濇往來不利是謂濇也往來不遠是謂短也短甚則病濇甚則病不短不濇亦病不當其位亦病位不能短濇亦病太陽之至大而長往來遠是謂長大甚則病長甚則病長而不大亦病大而不長亦病不當其位亦病位不能長大亦病至而和則平不大甚則爲平調不弱不强是謂和也至而甚則病弦似張弓弦滑如連珠沉而附骨浮高於皮濇而止住短如麻黍大如帽簪長如引繩皆謂至而大甚也至而反者病應弦反濇應大反細應沉反浮應浮反沉應短濇反長滑應軟虚反强實應細反大是皆爲氣反常平之候有病乃如此見也至而不至者病氣位已至而脉氣不應也未至而至者病按曆占之凡得節氣當年六位之分當如南北之歲脉象改易而應之氣序未移而脉先變易是先天而至故病陰陽易者危不應天常氣見交錯失其常位更易見之陰位見陽脉陽位見陰脉是易位而見也二氣錯亂故氣危新校正云按六微㫖大論云帝曰其有至而至有至而不至有至而太過何也岐伯曰至而至者和至而不至來氣不及也未至而至來氣有餘也帝曰至而不至未至而至何如岐伯曰應則順否則逆逆則變生變生則病帝曰請言其應岐伯曰物生其應也氣脉其應也所謂脉應即此脉應也帝曰六氣標本所從不同奈何岐伯曰氣有從本者有從標本者有不從標本者也帝曰願卒聞之岐伯曰少陽太陰從本少陰太陽從本從標陽明厥陰不從標本從乎中也少陽之本火太陰之本濕本末同故從本也少陰之本熱其標陰太陽之本寒其標陽本末異故從本從標陽明之中太陰厥陰之中少陽本末與中不同故不從標本從乎中也從本從標從中皆以其爲化生之用也故從本者化生於本從標本者有標本之化從中者以中氣爲化也化謂氣化之元主也有病以元主氣用寒熱治之新校正云按六微㫖大論云少陽之上火氣治之中見厥陰陽明之上燥氣治之中見太陰太陽之上寒氣治之中見少陰厥陰之上風氣治之中見少陽少陰之上熱氣治之中見太陽太陰之上濕氣治之中見陽明所謂本也本之下中之見也見之下氣之標也本標不同氣應異象此之謂也帝曰脉從而病反者其診何如岐伯曰脉至而從按之不鼓諸陽皆然言病熱而脉數按之不動乃寒盛格陽而致之非熱也帝曰諸陰之反其脉何如岐伯曰脉至而從按之鼓甚而盛也形證是寒按之而脉氣鼓擊於手下盛者此爲熱盛拒陰而生病非寒也是故百病之起有生於本者有生於標者有生於中氣者有取本而得者有取標而得者有取中氣而得者有取標本而得者有逆取而得者有從取而得者反佐取之是爲逆取奇偶取之是爲從取寒病治以寒熱病治以熱是爲逆取從順也逆正順也若順逆也寒盛格陽治熱以熱熱盛拒陰治寒以寒之類皆時謂之逆外雖用逆中乃順也此逆乃正順也若寒格陽而治以寒熱拒寒而治以熱外則雖順中氣乃逆故方若順是逆也故曰知標與本用之不殆明知逆順正行無間此之謂也不知是者不足以言診足以亂經故大要曰粗工嘻嘻以爲可知言熱未已寒病復始同氣異形迷診亂經此之謂也嘻嘻悅也言心意怡悅以爲知道終盡也六氣之用粗之與工得其半也厥陰之化粗以爲寒其乃是温太陽之化粗以爲熱其乃是寒於此差互用失其道故其學問識用不達工之道半矣夫太陽少陰各有寒化然量其標本應用則正反矣何以言之太陽本爲寒標爲熱少陰本爲熱標爲寒方之用亦如是也厥陰陽明中氣亦爾厥陰之中氣爲熱陽眀之中氣爲濕此二氣亦反其類太陽少陰也然太陽與少陰有標本用與諸氣不同故曰同氣異形也夫一經之標本寒熱既殊言本當究其標論標合尋其本言氣不窮其標本論病未辨其陰陽雖同二氣而主且阻寒温之候故心迷正理治亦亂經呼曰粗工允膺其稱夫標本之道要而博小而大可以言一而知百病之害言標與本易而勿損察本與標氣可令調明知勝復爲萬民式天之道畢矣天地變化尚可盡知况一人之診而云冥昩得經之要持法之宗爲天下師尚卑其道萬民之式豈曰大哉新校正云按標本病傳論云有其在標而求之於標有其在本而求之於本有其在本而求之於標有其在標而求之於本故治有取標而得者有取本而得者有逆取而得者有從取而得者故知逆與從正行無間知標本者萬舉萬當不知標本是爲妄行夫陰陽逆從標本之爲道也小而大言一而知百病之害少而多淺而博可以言一而知百也以淺而知深察近而知遠言標與本易而勿及治反爲逆治得爲從先病而後逆者治其本先逆而後病者治其本先寒而後生病者治其本先熱而後生病者治其本先熱而後生中滿者治其標先病而後泄者治其本先泄而後生他病者治其本必且調之乃治其他病先病而後生中滿者治其標先中滿而後煩心者治其本人有客氣有同氣小大不利治其標小大利治其本病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本謹察間甚以意調之間者并行甚者獨行先小大不利而後生病者治其本此經論標本尤詳帝曰勝復之變早晏何如岐伯曰夫所勝者勝至已病病已愠愠而復已萌也復心之愠不遠而有夫所復者勝盡而起得位而甚勝有微甚復有少多勝和而和勝虚而虚天之常也帝曰勝復之作動不當位或後時而至其故何也言陽盛於夏陰盛於冬清盛於秋温盛於春天之常候然其勝復氣用四序不同其何由哉岐伯曰夫氣之生與其化衰盛異也寒暑温凉盛衰之用其在四維故陽之動始於温盛於暑陰之動始於清盛於寒春夏秋冬各差其分言春夏秋冬四正之氣在於四維之分也即事驗之春之温正在辰巳之月夏之暑正在未申之月秋之凉正在戌亥之月冬之寒正在丑寅之月春始於仲春夏始於仲夏秋始於仲秋冬始於仲冬故丑之月陰結層冰於厚地未之月陽焰電掣於天垂戌之月霜清肅殺而庶物堅辰之月風扇和舒而陳柯榮秀此則氣差其分昭然而不可蔽也然陰陽之氣生發收藏與常法相會徵其氣化及在人之應則四時每差其日數與常法相違從差法乃正可之也故大要曰彼舂之暖爲夏之暑彼秋之忿爲冬之怒謹按四維斥候皆歸其終可見其始可知此之謂也言氣之少壯也陽之少爲暖其壯也爲暑陰之少爲忿其壯也爲怒此悉謂少壯之異氣證用之盛衰但立盛衰於四維之位則陰陽終始應用皆可知矣帝曰差有數乎岐伯曰又凡三十度也度日也新校正云按六元正紀大論云差有數乎曰後皆三十度而有奇也此云三十度也者此文爲畧帝曰其脉應皆何如岐伯曰差同正法待時而去也脉亦差以隨氣應也待差日足應王氣至而乃去也脉要曰春不沉夏不弦冬不澀秋不數是謂四塞天地四時之氣閉塞而無所運行也沉甚曰病弦甚曰病澀甚曰病數甚曰病但應天和氣是則爲平形見大甚則爲力致以力而致安能乆乎故甚皆病參見曰病復見曰病未去而去曰病去而不去曰病參謂參和諸氣來見復見謂再見已衰已死之氣去謂王已而去者也日行之度未出於差是爲天氣未出日度過差是爲天氣已去而脉尚在既非得應故曰病反者死夏見沉秋見數冬見緩春見濇是謂反也犯違天命生其能乆乎新校正云詳上文秋不數是謂四塞此注云秋見數是謂反蓋以脉差只在仲月差之度盡而數不去謂秋之季月而脉尚數則爲反也故曰氣之相守司也如權衡之不得相失也權衡秤也天地之氣寒暑相對温清相望如持秤也高者否下者否兩者齊等無相奪倫則清靜而生化各得其分也夫陰陽之氣清靜則生化治動則苛疾起此之謂也動謂變動常平之候而爲災眚也苛重也新校正云按六微㫖大論云成敗倚伏生乎動動而不已則變作矣帝曰幽明何如岐伯曰兩陰交盡故曰幽兩陽合明故曰明幽明之配寒暑之異也兩陰交盡於戌亥兩陽合明於辰已靈樞繫日月論云亥十月左足之厥陰戌九月右足之厥陰此兩陰交盡故曰厥陰辰三月左足之陽明巳四月右足之陽明此兩陽合於前故曰陽明然陰交則幽陽合則明幽明之象當由是也寒暑位西南東北幽明位西北東南幽明之配寒暑之位誠斯異也新校正云按太始天元册文云幽明既位寒暑弛張帝曰分至何如岐伯曰氣至之謂至氣分之謂分至則氣同分則氣異所謂天地之正紀也因幽明之問而形斯義也言冬夏二至是天地氣主歲至其所在也舂秋二分是間氣初二四五四氣各分其政於主歲左右也故曰至則氣同分則氣異也所言二至二分之氣配者此所謂是天地氣之正紀也帝曰夫子言春秋氣始於前冬夏氣始於後余已知之矣然六氣往復主歲不常也其補寫奈何以分至明六氣分位則初氣四氣始於立春立秋前各一十五日爲紀法三氣六氣始於立夏立冬後各一十五日爲紀法由是四氣前後之紀則三氣六氣之中正當二至日也故曰舂秋氣始於前冬夏氣始於後也然以三百六十五日易一氣一歲已往氣則改新新氣既來舊氣復去所宜之時大地不同補寫之方應知先後故復以問之也岐伯曰上下所主隨其攸利正其味則其要也左右同法大要曰少陽之主先甘後鹹陽明之主先辛後酸太陽之主先鹹後苦厥陰之主先酸後辛少陰之主先甘後鹹太陰之主先苦後甘佐以所利資以所生是謂得氣主謂主歲得謂得其性用也得其性用則舒卷由人不得性用則動生乖忤豈驅邪之可望乎適足以伐天眞之妙氣爾如是先後之味皆謂有病先寫之而後補之也帝曰善夫百病之生也皆生於風寒暑濕燥火以之化之變也風寒暑濕燥火天之六氣也靜而順者爲化動而變者爲變故曰之化之變也經言盛者寫之虚者補之余錫以方士而方士用之尚未能十全余欲令要道必行桴鼓相應猶拔刺雪污工巧神聖可得聞乎針曰工巧藥曰神聖新校正云按難經云望而知之謂之神聞而知之謂之聖問而知之謂之工切脉而知之謂之巧以外知之曰聖以内知之曰神岐伯曰審察病機無失氣宜此之謂也得其機要則動小而功大用淺而功深也帝曰願聞病機何如岐伯曰諸風掉眩皆屬於肝風性動木氣同之諸寒收引皆屬於腎收謂斂也引謂急也寒物收縮水氣同也諸氣膹鬱皆屬於肺高秋氣凉霧氣烟集凉至則氣熱復甚則氣殫徵其物象屬可知矣膹謂膹滿鬱謂奔迫也氣之爲用金氣同之諸濕腫滿皆屬於脾土薄則水淺土厚則水深土平則乾土高則濕濕氣之有土氣同之諸熱瞀瘛皆屬於火火象徵諸痛癢瘡皆屬於心心寂則痛微心躁則痛甚百端之起皆息生痛癢瘡瘍生於心也諸厥固泄皆屬於下下謂下焦肝腎氣也夫守司於下腎之氣也門户束要肝之氣也故諸厥固泄皆屬下也厥謂氣逆固謂禁固諸有氣逆上行及固不禁出入無度燥濕不恒皆由下焦之主守也諸痿喘嘔皆屬於上上謂上焦心肺氣也炎熱薄爍心之氣也承熱分化肺之氣也熱鬱化上故病屬上焦新校正云詳痿之爲病似非上病王注不解所以屬上之由使後人疑議今按痿論云五藏使人痿者因肺熱葉焦發爲痿躄故云屬於上也痿又謂肺痿也諸禁鼓慄如喪神守皆屬於火熱之内作諸痙項强皆屬於濕太陽傷濕諸逆衝上皆屬於火炎上之性用也諸脹腹大皆屬於熱熱鬱於内肺脹所生諸躁狂越皆屬於火熱盛於胃及四未也諸暴强直皆屬於風陽内鬱而陰行於外諸病有聲鼓之如鼓皆屬於熱謂有聲也諸病胕腫疼酸驚駭皆屬於火熱氣多也諸轉反戾水液渾濁皆屬於熱反戾筋轉也水液小便也諸病水液澄澈清泠皆屬於寒上下所出及吐出溺出也諸嘔吐酸暴注下迫皆屬於熱酸酸水及沫也故大要曰謹守病機各司其屬有者求之無者求之盛者責之虚者責之必先五勝踈其血氣令其調達而致和平此之謂也深乎聖人之言理宜然也有無求之虚盛責之言悉由也夫如大寒而甚熱之不熱是無火也熱來復去晝見夜伏夜發晝止時節而動是無火也當助其心又如火熱而甚寒之不寒是無水也熱動復止倏忽往來時動時止是無水也當助其腎内格嘔逆食不得入是有火也病嘔而吐食入反出是無火也暴速注下食不及化是無水也溏泄而久止發無恒是無水也故心盛則生熱腎盛則生寒腎虚則寒動於中心虚則熱收於内又熱不得寒是無火也寒不得熱是無水也夫寒之不寒責其無水熱之不熱責其無火熱之不久責心之虚寒之不久責腎之少有者寫之無者補之虚者補之盛者寫之居其中間疏者壅塞令上下無礙氣血通調則寒熱自和陰陽調達矣是以方有治熱以寒寒之而水食不入攻寒以熱熱之而昏躁以生此則氣不疏通壅而爲是也紀於水火餘氣可知故曰有者求之無者求之盛者責之虚者責之令氣通調妙之道也五勝謂五行更勝也先以五行寒暑温凉濕酸鹹甘辛苦相勝爲法也帝曰善五味陰陽之用何如岐伯曰辛甘發散爲陽酸苦涌泄爲陰鹹味涌泄爲陰淡味滲泄爲陽六者或收或散或緩或急或燥或潤或耎或堅以所利而行之調其氣使其平也涌吐也泄利也滲泄小便也言水液自迴腸沁别汁滲入膀胱之中胞氣化之而爲溺以泄出也新校正云按藏氣法時論云辛散酸收甘緩苦堅鹹耎又云辛酸甘苦鹹各有所利或散或收或緩或急或堅或軟四時五藏病隨五味所宜也帝曰非調氣而得者治之奈何有毒無毒何先何後願聞其道夫病生之類其有四焉一者始因氣動而内有所成二者因氣動而外有所成三者不因氣動而病生於内四者不因氣動而病生於外夫因氣動而内成者謂積聚癥瘕瘤氣癭起結核癲癇之類也外成者謂癰腫瘡瘍痂疥疽痔掉瘛浮腫目赤熛胗胕腫痛癢之類也不因氣動而病生於内者謂留飲癖食饑飽勞損宿食霍亂悲恐喜怒想慕憂結之類也生於外者謂瘴氣賊魅蟲蛇蠱毒蜚尸鬼擊衝薄墜墮風寒暑濕斫射刺割捶仆之類也如是四類有獨治内而愈者有兼治内而愈者有獨治外而愈者有兼治外而愈者有先治内而後治外而愈者有先治外後治内而後愈者有須齊毒而攻擊者有須無毒而調引者凡此之類方法所施或重或輕或緩或急或收或散或潤或燥或耎或堅方士之用見解不同各擅己心好用非素故復問之岐伯曰有毒無毒所治爲主適大小爲制也言但非緩積愈疾解急脫死則爲良方非必要言以先毒爲是後毒爲非無毒爲非有毒爲是必量病輕重大小制之也帝曰請言其制岐伯曰君一臣二制之小也君一臣三佐五制之中也君一臣三佐九制之大也寒者熱之熱者寒之微者逆之甚者從之夫病之微小者猶大火也遇草而焫得木而燔可以濕伏可以水滅故逆其性氣以折之攻之病之大甚者猶龍火也得濕而焰遇水而燔不知其性以水濕折之適足以光焰詣天物窮方止矣識其性者反常之理以火逐之則燔灼自消焰光撲滅然逆之謂以寒攻熱以熱攻寒從之謂攻以寒熱雖從其性用不必皆同是以下文曰逆者正治從者反治從少從多觀其事也此之謂乎新校正云按神農云藥有君臣佐使以相宣攝合和宜用一君二臣三佐五使又可一君二臣九佐使也堅者制之客者除之勞者温之結者散之留者攻之燥者濡之急者緩之散者收之損者益之逸者行之驚者平之上之下之摩之浴之薄之劫之開之發之適事爲故量病證候適事用之帝曰何謂逆從岐伯曰逆者正治從者反治從少從多觀其事也言逆者正治也從者反治也逆病氣而正治則以寒攻熱以熱攻寒雖從順病氣乃反治法也從少謂一同而二異從多謂二同而三異也言不同者是謂制也帝曰反治何謂岐伯曰熱因寒用寒因熱用塞因塞用通因通用必伏其所主而先其所因其始則同其終則異可使破積可使潰堅可使氣和可使必已夫大寒内結蓄聚疝瘕以熱攻除寒格熱反縱反縱之則痛發尤甚攻之則熱不得前方以蜜煎烏頭佐之以熱蜜多其藥服已便消是則張公從此而以熱因寒用也有火氣動服冷已過熱爲寒格而身冷嘔噦嗌乾口苦惡熱好寒衆議攸同咸呼爲熱冷治則甚其如之何逆其好則拒治順其心則加病若調寒熱逆冷熱必行則熱物冷服下嗌之後冷體既消熱性便發由是病氣隨愈嘔噦皆除情且不違而致大益醇酒冷飲則其類矣是則熱因寒用也所謂惡熱者凡諸食餘氣主於生者新校正云詳主字疑誤上見之已嘔也又病熱者寒攻不入惡其寒勝熱乃消除從其氣則熱增寒攻之則不入以豉豆諸冷藥酒漬或温而服之酒熱氣同固無違忤酒熱既盡寒藥已行從其服食熱便隨散此則寒因熱用也或以諸冷物熱齊和之服之食之熱復圍解是亦寒因熱用也又熱食猪肉及粉葵乳以椒薑橘熱齊和之亦其類也又熱在下焦治亦然假如下氣虚乏中焦氣壅胠脅滿甚食已轉增粗工之見無能斷也欲散滿則恐虚其下補下則滿甚於中散氣則下焦轉虚補虚則中滿滋甚醫病參議言意皆同不救其虚且攻其滿藥入則減藥過依然故中滿下虚其病常在乃不知踈啓其中峻補於下少服則資壅多服則宣通由是而療中滿自除下虚斯實此則塞因塞用也又大熱内結注泄不止熱宜寒療結復已除以寒下之結散利止此則通因通用也又大熱凝内久利溏泄愈而復發綿歷歲年以熱下之寒去利止亦其類也投寒以熱凉而行之投熱以寒温而行之始同終異斯之謂也諸如此等其徒寔繫略舉宗兆猶是反治之道斯其類也新校正云按五常政大論云治熱以寒温而行之治寒以熱凉而行之亦熱因寒用寒因熱用之義也帝曰善氣調而得者何如岐伯曰逆之從之逆而從之從而逆之踈氣令調則其道也逆謂逆病氣以正治從謂從病氣而反療逆其氣以正治使其從順從其病以反取令彼和調故曰逆從也不疏其氣令道路開通則氣感寒熱而爲變始生化多端也帝曰善病之中外何如岐伯曰從内之外者調其内從外之内者治其外各絶其源從内之外而盛於外者先調其内而後治其外從外之内而盛於内者先治其外而後調其内皆謂先除其根屬後削其枝條中外不相及則治主病中外不相及自各一病也帝曰善火熱復惡寒發熱有如瘧狀或一日發或間數日發其故何也岐伯曰勝復之氣會遇之時有多少也陰氣多而陽氣少則其發日遠陽氣多而陰氣少則其發日近此勝復相薄盛衰之節瘧亦同法陰陽齊等則一日之中寒熱相半陽多陰少則一日之發而但熱不寒陽少陰多則隔日發而先寒後熱雖勝復之氣若氣微則一發後六七日乃發時謂之愈而復發或頻三日發而六七日止或隔十日發而四五日止者皆由氣之多少會遇與不會遇也俗見不遠乃謂鬼神暴疾而乆祈禱避匿病勢已過旋至其斃病者殞殁自謂其分致令冤魂塞於廣路夭死盈於曠野仁愛鑒兹能不傷楚習俗既乆難卒釐革非復可改未如之何悲哉悲哉帝曰論言治寒以熱治熱以寒而方士不能廢繩墨而更其道也有病熱者寒之而熱有病寒者熱之而寒二者皆在新病復起奈何治謂治之而病不衰退反因藥寒熱而隨生寒熱病之新者也亦有止而復發者亦有藥在而除藥去而發者亦有全不息者方士若廢此繩墨則無更新之法欲依標格則病勢不除捨之則阻彼凡情治之則藥無能驗心迷意惑無由通悟不知其道何恃而爲因藥病生新舊相對欲求其愈安可奈何岐伯曰諸寒之而熱者取之陰熱之而寒者取之陽所謂求其屬也言益火之源以消陰翳壯水之主以制陽光故曰求其屬也夫粗工褊淺學未精深以熱攻寒以寒療熱治熱未已而冷疾已生攻寒日深而熱病更起熱起而中寒尚在寒生而外熱不除欲攻寒則懼熱不前欲療熱則思寒又止進退交戰危亟已臻豈知藏府之源有寒熱温凉之主哉夫取心者不必齊以熱取腎者不必齊以寒但益心之陽寒亦通行强腎之陰熱之猶可觀斯之故或治熱以熱治寒以寒萬舉萬生孰知其意思方智極理盡辭窮嗚呼人之死者豈謂命不謂方士愚昩而殺之耶帝曰善服寒而反熱服熱而反寒其故何也岐伯曰治其王氣是以反也物體有寒熱氣性有陰陽觸王之氣則强其用也夫肝氣温和心氣暑熱肺氣清凉腎氣寒冽脾氣兼并之故也春以清治肝而反温夏以冷治心而反熱秋以温治肺而反清冬以熱治腎而反寒蓋由補益王氣太甚也補王太甚則藏之寒熱氣自多矣帝曰不治王而然者何也岐伯曰悉乎哉問也不治五味屬也夫五味入胃各歸所喜攻酸先入肝苦先入心甘先入脾辛先入肺鹹先入腎新校正云按宣明五氣篇云五味所入酸入肝辛入肺苦入心鹹入腎甘入脾是謂五入久而增氣物化之常也氣增而乆夭之由也夫入肝爲温入心爲熱入肺爲清入腎爲寒入脾爲至陰而四氣兼之皆爲增其味而益其氣故各從本藏之氣用爾故久服黄連苦參而反熱者此其類也餘味皆然但人意踈忽不能精候耳故曰久而增氣物化之常也氣增不已益歲年則藏氣偏勝氣有偏勝則有偏絶藏有偏絶則有暴夭者故曰氣增而乆夭之由也是以正理觀化藥集商較服餌曰藥不具五味不備四氣而乆服之雖且獲勝益乆必致暴夭此之謂也絶粒服餌則不暴亡斯何由哉無五穀味資助故也復令食穀其亦夭焉帝曰善方制君臣何謂也岐伯曰主病之謂君佐君之謂臣應臣之謂使非上中下三品之謂也上藥爲君中藥爲臣下藥爲佐使所以異善惡之名位服餌之道當從此爲法治病之道不必皆然以主病者爲君佐君者爲臣應臣之用者爲使皆所以贊成方用也帝曰三品何謂岐伯曰所以明善惡之殊貫也三品上中下三品此名藥善惡不同性用也新校正云按神農云上藥爲君主養命以應天中藥爲臣主養性以應人下藥爲佐使主治病以應地帝曰善病之中外何如前問病之中外謂調氣之法今此未盡故復問之此下對當次前求其屬也之下應古之錯簡也岐伯曰調氣之方必别陰陽定其中外各守其鄉内者内治外者外治微者調之其次平之盛者奪之汗之下之寒熱温凉衰之以屬隨其攸利病有中外治有表裏在内者以内治法和之在外者以外治法和之氣微不和以平氣法平之盛甚不已則奪其氣令其衰也假如小寒之氣温以和之大寒之氣熱以取之甚寒之氣則下奪之奪之不已則逆折之折之不盡則求其屬以衰之小熱之氣凉以和之大熱之氣寒以取之甚熱之氣則汗發之發之不盡則逆制之制之不盡則求其屬以衰之故曰汗之下之寒熱温凉衰之以屬隨其攸利攸所也謹道如法萬舉萬全氣血正平長有天命守道以行舉無不中故能驅役草石召遣神靈調御陰陽蠲除衆疾血氣保平和之候天眞無耗竭之由夫如是者蓋以舒卷在心去留從意故精神内守壽命靈長帝曰善黄帝内經素問補註釋文卷之四十八

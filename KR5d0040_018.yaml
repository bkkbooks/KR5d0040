  text: 黃帝內經素問補注釋文卷之十八終四
  hash: sha256:1914cf57e49469ffdecdd0b9659c1ddb7eab9aa6a01fbe1679eb7104d7c6fb5e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_018-001a, image: hfl/0652/0652-131.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤宣明五氣篇五味所入酸入肝肝合木而味酸也辛入肺肺合金而味辛也苦入心心合火而味苦也鹹入腎腎合水而味鹹也甘入脾脾合土而味甘也新校正云按太素又云淡入胃是謂五入新校正云按至真要大論云夫五味入胃各歸所喜故酸先入肝苦先入心甘先入脾辛先入肺鹹先入腎五氣所病心為噫象火炎上煙隨焰出心不受穢故噫出之肺為咳象金堅徑扣之有聲邪擊於肺故為咳也咳苦蓋切肝為語象木枝條而形支别語宜委曲故出於肝脾為吞象土包容物歸於內翕如皆受故為吞也翕音吸腎為欠為嚏象水下流上生雲霧氣鬱於胃故欠生焉太陽之氣和利而滿於心出於鼻則生嚏嚏音帝胃為氣逆為噦為恐以為水穀之海腎與為關關閉不利則氣逆而上行也以包容水穀性喜受寒寒穀相薄故為噦也寒盛則噦起熱盛則恐生何者胃熱則腎氣微弱故為恐也下文曰精氣并於腎則恐也噦呼會切鳥聲也大腸小腸為泄下焦溢為水大腸為傳道之府小腸為受盛之府受盛之氣既虛傳道之司不禁故為泄利也下焦為分注之所氣窒不寫則溢而為水窒陟栗切膀胱不利為癃不約為遺溺膀胱為津液之府水注由之然足三焦脈實約下焦而不通則不得小便足三焦脈虛不約下焦則還溺也靈樞經曰足三焦者太陽之别也并太陽之正入絡膀胱約下焦實則閉癃虛則遺溺膽為怒中正決斷無私無偏其性剛決故為怒也六節藏象論曰凡十一藏取決於膽也是謂五病五精所并精氣并於心則喜精氣謂火之精氣也肺虛而心精并之則為喜靈樞經曰喜樂無極則傷魄魄為肺神明心火并於肺金也并於肺則悲肝虛而肺氣并之則為悲靈樞經曰悲哀動中則傷魂魂為肝神明肺金并於肝木也并於肝則憂脾虛而肝氣并之則為憂靈樞經曰愁憂不解則傷意意為脾神明肝木并於脾土并於脾則畏本經云飢也腎虛而脾氣并之則為畏畏為畏懼也靈樞經曰恐懼而不解則傷精精為腎神明脾土并於腎水也并於腎則恐心虛而腎氣并之則為恐靈樞經曰怵惕思慮則傷神神為心主明腎水并於心火也怵惕驚懼也此皆正氣不足而勝氣并之乃為是矣故下文曰是謂五并虛而相并者也五藏所惡心惡熱熱則脈潰濁肺惡寒肝惡風肺惡寒者寒則氣留滯肝惡風者風則筋燥急也脾惡濕濕則肉痿腫腎惡燥燥則精竭涸新校正云按楊上善云若今則云肺惡燥今此肺惡寒腎惡燥者燥在於秋寒之始也寒在於冬燥之終也肺在於秋以肺惡寒之甚故言其終腎在於冬腎惡不甚故言其始也是謂五惡五藏化液心為汗泄於皮腠也肺為涕肝為泪肺為涕者潤於鼻竅也肝為泪者注於眼目也脾為涎腎為唾脾為涎者溢於唇口也腎為唾者生於牙齒也是謂五液五味所禁辛走氣氣病無多食辛病謂力少不自勝也鹹走血血病無多食鹹苦走骨骨病無多食苦新校正云按皇甫士安云鹹先走腎此云走血者腎合三焦血脈雖屬肝心而為中焦之道故鹹入而走血也苦走心此云走骨者水火相濟骨氣通於心也甘走肉肉病無多食甘酸走筋筋病無多食酸是皆為行其氣速故不欲多食多食則病甚故病者無多食也是謂五禁無令多食新校正云按太素五禁云肝病禁辛心病禁鹹脾病禁酸肺病禁苦腎病禁甘名此為五裁楊上善云口嗜而飲食之不可多也必自裁之命曰五裁五病所發陰病發於骨陽病發於血陰病發於肉骨肉陰靜故陽氣從之血脈陽動故陰氣乘之陽病發於冬陰病發於夏夏陽氣盛故陰病發於夏冬陰氣盛故陽病發於冬各隨其少也是謂五發五邪所亂邪入於陽則狂邪入於陰則痹邪居於陽脈之中則四支熱盛故為狂邪入於陰脈之內則六經凝泣而不通故為痹泣音澀搏陽則為巔疾邪內摶於陽則脈流薄疾故為上巔之疾搏陰則為瘖邪內摶於陰則脈不流故令瘖不能言新校正云按難經云重陽者狂重陰者癲巢元方云邪入於陰則為癲脈經云陰附陽則狂陽附陰則癲孫思邈云邪入於陽則為狂邪入於陰則為血痹邪入於陽傳則為癲痙邪入於陰傳則為痛瘖全元起云邪已入陰復傳於陽邪氣盛府藏受邪使其氣不朝榮氣不復周身邪與正氣相擊發動為癲疾邪已入陽陽今復傳於陰藏府受邪故不能言是勝正也諸家之論不同今具載之陽入之陰則靜陰出之陽則怒隨所之而為疾也之往也新校正云按全元起云陽入陰則為靜出則為恐千金方云陽入於陰病靜陰出於陽病怒是謂五亂五邪所見春得秋脈夏得冬脈長夏得春脈秋得夏脈冬得長夏脈名曰陰出之陽病善怒不治是謂五邪皆同命死不治新校正云按陰出之陽病善怒已見前條此再言之文義不倫必古文錯簡也五藏所藏心藏神精氣之化成也靈樞經曰兩精相薄謂之神肺藏魄精氣之匡佐也靈樞經曰并精而出入者謂之魄肝藏魂神氣之輔弼也靈樞經曰隨神而往來者謂之魂脾藏意記而不忘者也靈樞經曰心有所憶謂之意腎藏志專意而不移者也靈樞經曰意之所存謂之志腎受五藏六府之精元氣之本生成之根為胃之關是以志能則命通新校正云按楊上善云腎有二枚左為腎藏志右為命門藏精也是謂五藏所藏五藏所主心主脈壅遏榮氣應息而動也肺主皮包裹筋肉閉拒諸邪也肝主筋束絡機關隨神而運也脾主肉腎主骨脾主肉覆藏筋骨通行衛氣也腎主骨張筋化髓幹以立身也是謂五主五勞所傷久視傷血勞於心也久卧傷氣勞於肺也久坐傷肉久立傷骨久行傷筋久坐傷肉者勞於脾也久立傷骨者勞於腎也久行傷筋者勞於肝也是謂五勞所傷五脈應象肝脈弦耎虛而滑端直以長也心脈鈎如鈎之偃來盛去衰也脾脈代肺脈毛腎脈石脾脈代者耎而弱也肺脈毛者輕浮而虛如毛羽也腎脈石者沉堅而搏如石之投也是謂五藏之脈血氣形志篇夫人之常數太陽常多血少氣少陽常少血多氣陽明常多氣多血少陰常少血多氣厥陰常多血少氣太陰常多氣少血此天之常數血氣多少此天之常數故用針之道常寫其多也新校正云按甲乙經十二經水篇云陽明多血多氣刺深四分留十呼太陽多血多氣刺深五分留七呼少陽少血多氣刺深四分留五呼太陰多血少氣刺深三分留四呼少陰少血多氣刺深二分留三呼厥陰多血少氣刺深一分留二呼太陽太陰血氣多少與素問不同又陰陽二十五人形性血氣不同篇與素問同蓋皇甫疑而兩存之也足太陽與少陰為表裏少陽與厥陰為表裏陽明與太陰為表裏是為足陰陽也手太陽與少陰為表裏少陽與心主為表裏陽明與太陰為表裏是為手之陰陽也今知手足陰陽所苦凡治病必先去其血乃去其所苦伺之所欲然後寫有餘補不足先去其血謂見血脈盛滿獨異於常者乃去之不謂常刺則先去其血也欲知背俞先度其兩乳間中折之更以他草度去半已即以兩隅相拄也乃舉以度其背令其一隅居上齊脊大椎兩隅在下當其下隅者肺之俞也度謂度量也言以草量其乳間四分去一使斜與橫等折為三隅以上隅齊脊大椎則兩隅下當肺俞也拄知俞切復下一度心之俞也謂以上隅齊脊三椎也復下一度左角肝之俞也右角脾之俞也復下一度腎之俞也是謂五藏之俞灸刺之度也靈樞經及中誥咸云肺俞在三椎之傍心俞在五椎之傍肝俞在九椎之傍脾俞在十一椎之傍腎俞在十四椎之傍尋此經草量之法則合度之人其初度兩隅之下約當肺俞再度兩隅之下約當心俞三度兩隅之下約當七椎七椎之傍乃鬲俞之位此經云左角肝之俞右角脾之俞殊與中誥等經不同又四度則兩隅之下約當九椎九椎之傍乃肝俞也經云腎俞未究其源形樂志苦病生於脈治之以灸刺形謂身形志謂心志細而言之則七神殊守通而論之則約形志以為中外爾然形樂謂不甚勞役志苦謂結慮深思不甚勞役則筋骨平調結慮深思則榮衛乖否氣血不順故病生於脈焉夫盛寫虛補是灸刺之道猶當去其血絡而後調之故上文曰凡治病必先去其血乃去其所苦伺之所欲然後寫有餘補不足則其義也形樂志樂病生於肉治之以針石志樂謂悅懌忘憂也然筋骨不勞心神悅懌則肉理相比氣道滿填衛氣怫結故病生於肉也夫衛氣留滿以針寫之結聚膿血石而破之石謂石針則砭石也今亦以扉針代之扉音鈹形苦志樂病生於筋治之以尉引形苦謂修業就役也然修業以為就役而作一過其用則致勞傷勞用以傷故病生於筋尉謂藥尉引謂導引形苦志苦病生於咽嗌治之以百藥修業就役結慮深思憂則肝氣併於脾肝與膽合嗌為之使故病生於嗌也宣明五氣篇曰精氣併於肝則憂竒病論曰肝者中之將也取決於膽咽為之使也新校正云按甲乙經咽嗌作困竭百藥作甘藥形數驚恐經絡不通病生於不仁治之以按摩醪藥驚則脈氣併恐則神不收脈併神遊故經絡不通而為不仁之病矣夫按摩者所以開通閉塞導引陰陽醪藥者所以養正祛邪調中理氣故方之為用宜以此焉醪藥謂酒藥也不仁謂不應其用則𤸷痹矣是謂五形志也刺陽明出血氣刺太陽出血惡氣刺少陽出氣惡血刺太陰出氣惡血刺少陰出氣惡血刺厥陰出血惡氣也明前三陽三陰血氣多少之刺約也新校正云按太素云刺陽明出血氣刺太陰出血氣楊上善注云陽明太陰雖為表裏其血氣俱盛故并寫血氣如是則太陰與陽明等俱為多血多氣前文太陰一云多血少氣一云多氣少血莫可的知詳太素血氣并寫之旨則二説俱未為得自與陽明同爾又此刺陽明一節宜續前寫有餘補不足下不當隔在草度法五形志後寶命全形論篇黃帝問曰天覆地載萬物悉備莫貴於人人以天地之氣生四時之法成天以德流地以氣化德氣相合而乃生焉易曰天地氤氲萬物化醇此之謂也則假以溫涼寒暑生長收藏四時運行而方成立君王衆庶盡欲全形貴賤雖殊然其寶命一矣故好生惡死者貴賤之常情也形之疾病莫知其情留淫日深著於骨髓心私慮之新校正云按太素慮作患余欲針除其疾病為之奈何虛邪之中人微先見於色不知於身有形無形故莫知其情狀也留而不去淫衍日深邪氣襲虛故著於骨髓帝矜不度故請行其針新校正云按别本不度作不庶岐伯對曰夫鹽之味鹹者其氣令器津泄鹹謂鹽之味苦浸淫而潤物者也夫鹹為苦而生鹹從水而有水也潤下而苦泄故能令器中水津液潤滲泄焉凡虛中而受物者皆謂之器其於體外則謂陰囊其於身中所同則謂膀胱矣然以病配於五藏則心氣伏於腎中而不去乃為是矣何者腎象水而味鹹心合火而味苦苦流汗液鹹走胞囊火為水持故陰囊之外津潤如汗而滲泄不止也凡鹹之為氣天陰則潤在土則浮在人則囊濕而皮膚剝起弦絶者其音嘶敗陰囊津泄而脈弦絶者診當言音嘶嗄敗易舊聲爾何者肝氣傷也肝氣傷則金本缺金本缺則肺氣不全肺主音聲故言音嘶嗄嗄所嫁切木敷者其葉發敷布也言木氣散布外榮於所部者其病當發於肺葉之中也何者以木氣發散故也平人氣象論曰藏真散於肝肝又合木也病深者其聲噦噦謂聲濁惡也肺藏惡血故如是人有此三者是謂壞府府謂胸也以肺處胸中故也壞謂損壞其府而取病也抱朴子云仲景開胸以納赤餅由此則胸可啓之而取病矣三者謂脈弦絶肺葉發聲濁噦也毒藥無治短針無取此皆絶皮傷肉血氣爭黑病內潰於肺中故毒藥無治外不在於經絡故短針無取是以絶皮傷肉乃可攻之以惡血久與肺氣交爭故當血見而色黑也新校正云詳岐伯之對與黃帝所問不相當别按太素云夫鹽之味鹹者其氣令器津泄弦絶者其音嘶敗木陳者其葉落病深者其聲噦人有此三者是謂壞府毒藥無治短針無取此皆絶皮傷肉血氣爭異三字與此經不同而注意大異楊上善注云言欲知病微者須知其候鹽之在於器中津液泄於外見津而知鹽之有鹹也聲嘶知琴瑟之弦將絶葉落者知陳木之已盡舉此三物衰壞之微以比聲噦識病深之候人有聲噦同三譬者是為府壞之候中府壞者病之深也其病既深故針藥不能取以其皮肉血氣各不相得故也再詳上善作此等注義方與黃帝上下問答義相貫穿王氏解鹽鹹器津義雖淵微至於注弦絶音嘶木敷葉發殊不與帝問相協考之不若楊義之得多也帝曰余念其痛心為之亂惑反甚其病不可更代百姓聞之以為殘賊為之奈何殘謂殘害賊謂損劫言恐涉於不仁致慊於黎庶也岐伯曰夫人生於地懸命於天天地合氣命之曰人形假物成故生於地命惟天賦故懸於天德氣同歸故謂之人也靈樞經曰天之在我者德地之在我者氣德流氣薄而生者也然德者道之用氣者生之母也人能應四時者天地為之父母人能應四時和氣而養生者天地恆畜養之故為父母四氣調神大論曰夫四時陰陽者萬物之根本也所以聖人春夏養陽秋冬養陰以從其根故與萬物沉浮於生長之門也知萬物者謂之天子知萬物之根本者天地常育養之故謂曰天之子天有陰陽人有十二節節謂節氣外所以應十二月內所以主十二經脈也天有寒暑人有虛實寒暑有盛衰之紀虛實表多少之殊故人以虛實應天寒暑也能經天地陰陽之化者不失四時知十二節之理者聖智不能欺也經常也言能常應順天地陰陽之道而修養者則合四時生長之宜能知十二節氣之所遷至者雖聖智亦不欺侮而奉行之也能存八動之變五勝更立能達虛實之數者獨出獨入呿吟至微秋毫在目存謂心存達謂明達呿謂欠呿吟謂吟嘆秋毫在目言細必察也八動謂八節之風變動五勝謂五行之氣相勝立謂當其王時變謂氣至而變易知是三者則應效明著速猶影響此自神之獨出獨入亦非鬼靈能召遣也新校正云按楊上善云呿校遮切謂露齒出氣帝曰人生有形不離陰陽天地合氣别為九野分為四時月有小大日有短長萬物并至不可勝量虛實呿吟敢問其方請説用針之意岐伯曰木得金而伐火得水而滅土得木而達金得火而缺水得土而絶萬物盡然不可勝竭達通也言物類雖不可竭盡而數要之皆如五行之氣而有勝負之性分爾故針有懸布天下者五黔首共餘食莫知之也言針之道有若高懸示人彰布於天下者五矣而百姓共知餘食咸棄蔑之不務於本而崇乎末莫知真要深在其中所謂五者次如下句新校正云按全元起本餘食作飽食注云人愚不解陰陽不知針之妙飽食終日莫能知其妙益又太素作飲食楊上善注云黔首共服用此道然不能得其意黔音鈐一曰治神專精其心不妄動亂也所以云手如握虎神無營於衆物蓋欲調治精神專其心也新校正云按楊上善云存生之道知此五者以為攝養可得長生也魂神意魄志以為神主故皆名神欲為針者先須治神故人無悲哀動中則魂不傷肝得無病秋無難也無怵惕思慮則神不傷心得無病冬無難也無愁憂不解則意不傷脾得無病春無難也無喜樂不極則魄不傷肺得無病夏無難也無盛怒者則志不傷腎得無病季夏無難也是以五過不起於心則神清性明五神各安其藏則壽延遐算也二曰知養身知養己身之法亦如養人之道矣陰陽應象大論曰用針者以我知彼用之不殆此之謂也新校正云按太素身作形楊上善云飲食男女節之以限風寒暑濕攝之以時有異單豹外凋之害即內養形也實慈恕以愛人和塵勞而不迹有殊張毅高門之傷即外養形也內外之養周備則不求生而久生無期壽而長壽此則針布養形之極也玄元皇帝曰太上養神其次養形詳王氏之注專治神養身於用針之際其説甚狹不若上善之説為優若必以此五者解為用針之際則下文知毒藥為真王氏亦不專用針為解也三曰知毒藥為真毒藥攻邪順宜而用正真之道其在兹乎四曰制砭石小大古者以砭石為針故不舉九針但言砭石爾當制其大小者隨病所宜而用之新校正云按全元起云砭石者是古外治之法有三名一針石二砭石三鑱石其實一也古來未能鑄鐵故用石為針故名之針石言工必砥礪鋒利制其小大之形與病相當黃帝造九針以代鑱石上古之治者各隨方所宜東方之人多癰腫聚結故砭石生於東方五曰知府藏血氣之診諸陽為府諸陰為藏故血氣形志篇曰太陽多血少氣少陽少血多氣陽明多氣少血少陰少血多氣厥陰多血少氣太陰多氣少血是以刺陽明出血氣刺太陽出血惡氣刺少陽出氣惡血刺太陰出氣惡血刺少陰出氣惡血刺厥陰出血惡氣也精知多少則補寫萬全五法俱立各有所先事宜則應者先用今末世之刺也虛者實之滿者泄之此皆衆工所共知也若夫法天則地隨應而動和之者若響隨之者若影道無鬼神獨來獨往隨應而動言其效也若影若響言其近也夫如影之隨形響之應聲豈復有鬼神之召遣耶蓋由隨應而動之自得爾帝曰願聞其道岐伯曰凡刺之真必先治神專其精神寂無動亂刺之真要其在斯焉五藏已定九候已備後乃存針先定五藏之脈備循九候之診而有太過不及者然後乃存意於用針之法衆脈不見衆凶弗聞外內相得無以形先衆脈謂七診之脈衆凶謂五藏相乘外內相得言形氣相得也無以形先言不以己形之衰盛寒溫料病人之形氣使同於己也故下文曰可玩往來乃施於人玩謂玩弄言精熟也標本病傳論曰謹熟陰陽無與衆謀此其類也新校正云按此文出陰陽别論此云標本病傳論者誤也人有虛實五虛勿近五實勿遠至其當發間不容人之虛實非其遠近而有之蓋由血氣一時之盈縮爾然其未發則如雲垂而視之可久至其發也則如電滅而指所不及遲速之殊有如此矣新校正云按甲乙經作瞚全元起本及太素作眴音舜手動若務針耀而勻手動用針心如專務於一事也針經曰一其形聽其動靜而知邪正此之謂也針耀而勻謂針形光淨上下勻平也靜意視義觀適之變是謂冥冥莫知其形冥冥言血氣變化之不可見也故靜意視息以義斟酌觀所調適經脈之變易爾雖且針下用意精微而測量之猶不知變易形容誰為其象也新校正云按八正神明論云觀其冥冥者言形氣榮衛之不形於外而工獨知之以日之寒溫月之虛盛四時氣之浮沉參伍相合而調之工常先見之然而不形於外故曰觀於冥冥焉見其烏烏見其稷稷從見其飛不知其誰烏烏歏其氣至稷稷嗟其已應言所針得戾如從空中見飛鳥之往來豈復知其所使之元主耶是但見經脈盈虛而為信亦不知其誰之所召遣爾伏如橫弩起如發機血氣之未應針則伏如橫弩之安靜其應針也則起如機發之迅疾帝曰何如而虛何如而實言血氣既伏如橫弩起如發機然其虛實豈留呼而可為準定耶虛實之形何如而約之岐伯曰刺虛者須其實刺實者須其虛言要以氣至有效而為約不必守息數而為定法也經氣已至愼守勿失無變法而失經氣也深淺在志遠近若一如臨深淵手如握虎神無營於衆物言精心專一也所針經脈雖深淺不同然其補寫皆如一俞之專意故手如握虎神不外營焉新校正云按針解論云刺實須其虛者留針陰氣隆至乃去針也刺虛須其實者陽氣隆至針下熱乃去針也經氣已至愼守勿失者勿變更也深淺在志者知病之內外也遠近如一者深淺其候等也如臨深淵者不敢墮也手如握虎者欲其壯也神無營於衆物者靜志觀病人無左右視也黃帝內經素問補注釋文卷之十八

front:
  text: 黃帝內經素問補注釋文卷之二十一終七
  hash: sha256:63317cf7f94e697b704124a83b0ce6ba6bc2304c2b79b548e7a62661697470e1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_021-001a, image: hfl/0653/0653-037.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤熱論篇黃帝問曰今夫熱病者皆傷寒之類也或愈或死其死皆以六七日之間其愈皆以十日已上者何也不知其解願聞其故寒者冬氣也冬時嚴寒萬類深藏君子固密不傷於寒觸冒之者乃名傷寒其傷於四時之氣者皆能為病以傷寒為毒者最乘殺厲之氣中而即病名曰傷寒不即病者寒毒藏於肌膚至夏至前變為溫病夏至後變為熱病然其發起皆為傷寒致之故曰熱病者皆傷寒之類也新校正云按傷寒論云至春變為溫病至夏變為暑病與王注異王注本素問為説傷寒論本陰陽大論為説故此不同岐伯對曰巨陽者諸陽之屬也巨大也太陽之氣經絡氣血榮衛於身故諸陽氣所宗屬其脈連於風府風府穴名也在項上入髮際同身寸之一寸宛宛中是故為諸陽主氣也足太陽脈浮氣之在頭中者凡五行故統主諸陽之氣人之傷於寒也則為病熱熱雖甚不死寒毒薄於肌膚陽氣不得散發而內怫結故傷寒者反為病熱其兩感於寒而病者必不免於死藏府相應而俱受寒謂之兩感帝曰願聞其狀謂非兩感者之形證岐伯曰傷寒一日巨陽受之三陽之氣太陽脈浮脈浮者外在於皮毛故傷寒一日太陽先受之故頭項痛腰脊強上文云其脈連於風府略言也細而言之者足太陽脈從巔入絡腦還出别下項循肩膊內俠脊抵腰中故頭項痛腰脊強新校正云按甲乙經及太素作頭項腰脊皆強二日陽明受之以陽感熱同氣相求故自太陽入陽明也陽明主肉其脈俠鼻絡於目故身熱曰疼而鼻乾不得卧也身熱者以肉受邪胃中熱煩故不得卧餘隨脈絡之所生也三日少陽受之少陽主膽新校正云按全元起本膽作骨元起注云少陽者肝之表肝候筋筋會於骨是少陽之氣所榮故言主於骨甲乙經太素等并作骨其脈循脅絡於耳故胸脅痛而耳聾三陽經絡皆受其病而未入於藏者故可汗而已以病在表故可汗也新校正云按全元起本藏作府元起注云傷寒之病始入皮膚之腠理漸勝於諸陽而未入府故須汗發其寒熱而散之太素亦作府四日太陰受之陽極而陰受也太陰脈布胃中絡於嗌故腹滿而嗌乾五日少陰受之少陰脈貫腎絡於肺繫舌本故口燥舌乾而渴六日厥陰受之厥陰脈循陰器而絡於肝故煩滿而囊縮三陰三陽五藏六府皆受病榮衛不行五藏不通則死矣死猶澌也言精氣皆澌也是以其死皆病六七日間者此也澌息次切其不兩感於寒者七日巨陽病衰頭痛少愈邪氣漸退經氣漸和故少愈八日陽明病衰身熱少愈九日少陽病衰耳聾微聞十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止不滿舌乾已而𡁲十二日厥陰病衰囊縱少腹微下大氣皆去病日已矣大氣謂大邪之氣也是故其愈皆病十日已上者以此也帝曰治之奈何岐伯曰治之各通其藏脈病日衰已矣其未滿三日者可汗而已其滿三日者可泄而已此言表裏之大體也正理傷寒論曰脈大浮數病為在表可發其汗脈細沉數病為在裏可下之由此則雖日過多但有表證而脈大浮數猶宜發汗日數雖少即有裏證而脈細沉數猶宜下之正應隨脈證以汗下之帝曰熱病已愈時有所遺者何也邪氣衰去不盡如遺之在人也岐伯曰諸遺者熱甚而強食之故有所遺也若此者皆病已衰而熱有所藏因其穀氣相薄兩熱相合故有所遺也帝曰善治遺奈何岐伯曰視其虛實調其逆從可使必已矣審其虛實而補寫之則必已帝曰病熱當何禁之岐伯曰病熱少愈食肉則復多食則遺此其禁也是所謂戒食勞也熱雖少愈猶未盡除脾胃氣虛故未能消化肉堅食駐故熱復生復謂復舊病也帝曰其病兩感於寒者其脈應與其病形何如岐伯曰兩感於寒者病一日則巨陽與少陰俱病則頭痛口乾而煩滿新校正云按傷寒論云煩滿而渴二日則陽明與太陰俱病則腹滿身熱不欲食譫言譫言謂妄謬而不次也新校正云按楊上善云多言也譫之閻切三日則少陽與厥陰俱病則耳聾囊縮而厥水漿不入不知人六日死巨陽與少陰為表裏陽明與太陰為表裏少陽與厥陰為表裏故兩感寒氣同受其邪帝曰五藏已傷六府不通榮衛不行如是之後三日乃死何也岐伯曰陽明者十二經脈之長也其血氣盛故不知人三日其氣乃盡故死矣以上承氣海故三日氣盡乃死凡病傷寒而成溫者先夏至日者為病溫後夏至日者為病暑暑當與汗皆出勿止此以熱多少盛衰而為義也陽熱未盛為寒所制故為病曰溫陽熱大盛寒不能制故為病曰暑然暑病者當與汗之令愈勿反止之令其甚也新校正云按凡病傷寒已下全元起本在奇病論中王氏移於此楊上善云冬傷於寒輕者夏至以前發為溫病冬傷於寒甚者夏至以後發為暑病刺熱篇肝熱病者小便先黃腹痛多卧身熱肝之脈環陰器抵少腹而上故小便不通先黃腹痛多卧也寒薄生熱身故熱焉熱爭則狂言及驚脅滿痛手足躁不得安卧經絡雖已受熱而神藏猶未納邪邪正相薄故云爭也餘爭同之又肝之脈從少腹上俠胃貫鬲布脅肋循喉嚨之後絡舌本故狂言脅滿痛也肝性靜而主驚駭故病則驚手足躁擾卧不得安庚辛甚甲乙大汗氣逆則庚辛死肝主木庚辛為金金克木故甚死於庚辛也甲乙為木故大汗於甲乙刺足厥陰少陽厥陰肝脈少陽膽脈其逆則頭痛員員脈引衝頭也肝之脈自舌本循喉嚨之後上出額與督脈會於巔故頭痛員員然脈引衝於頭中也員員謂似急也心熱病者先不樂數日乃熱夫所以任治於物者謂心病氣入於經絡則神不安治故先不樂數日乃熱也熱爭則卒心痛煩悶善嘔頭痛面赤無汗心手少陰脈起於心中其支别者從心系上俠咽小腸之脈直行者循咽下鬲抵胃其支别者從缺盆循頸上頰至目外眥故卒心痛煩悶善嘔頭痛面赤也心在液為汗今病熱故無汗以出新校正云按甲乙經外眥作兊眥王注厥論亦作兊眥外當作兊壬癸甚丙丁大汗氣逆則壬癸死心主火任癸為水水滅火故甚死於壬癸也丙丁為火故大汗於丙丁氣逆之證經闕其文也刺手少陰太陽少陰心脈太陽小腸脈脾熱病者先頭重頰痛煩心顔青欲嘔身熱胃之脈起於鼻交頞中下循鼻外入上齒中還出俠口環唇下交承漿却循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱故先頭重頰痛顔青也脾之脈支别者復從胃别上鬲注心中其直行者上鬲俠咽故煩心欲嘔而身熱也新校正云按甲乙經太素云脾熱病先頭重頰痛無顔青二字熱爭則腰痛不可用俯仰腹滿泄兩頷痛胃之脈支别者起胃下口循腹裏下至氣街中而合以下髀氣街者腰之前故腰痛也脾之脈入腹屬脾絡胃又胃之脈自交承漿却循頷後下廉出大迎循頰車故腹滿泄而兩頷痛頷胡感切甲乙甚戊己大汗氣逆則甲乙死脾主土甲乙為木木伐土故甚死於甲乙也戊己為土故大汗於戊己氣逆之證經所未論刺足太陰陽明太陰脾脈陽明胃脈新校正云按甲乙經熱病下篇云病先頭重頰痛煩心身熱熱爭則腰痛不可用俯仰腹滿兩頷痛其暴泄善飢而不欲食善噫熱中足清腹脹食不化善嘔泄有膿血苦嘔無所出先取三里後取太白章門肺熱病者先淅然厥起毫毛惡風寒舌上黃身熱肺主皮膚外養於毛故熱中之則先淅然惡風寒起毫毛也肺之脈起於中焦下絡大腸還循胃口今肺熱入胃胃熱上升故舌上黃而身熱熱爭則喘咳痛走胸膺背不得大息頭痛不堪汗出而寒肺居鬲上氣主胸膺復在變動為咳又藏氣而主呼吸背復為胸中之府故喘咳痛走胸膺背不得息也肺之絡脈上會耳中今熱氣上熏故頭痛不堪汗出而寒丙丁甚庚辛大汗氣逆則丙丁死肺主金丙丁為火火爍金故甚死於丙丁也庚辛為金故大汗於庚辛也氣逆之證經闕未書刺手太陰陽眀出血如大豆立已太陰肺脈陽明大腸脈當視其絡脈盛者乃刺而出之腎熱病者先腰痛胻痠苦渴數飲身熱膀胱之脈從肩膊內俠脊抵腰中又腰為腎之府故先腰痛也又腎之脈自循內踝之後上腨內出膕內廉又直行者從腎上貫肝鬲入肺中循喉嚨俠舌本故胻痠苦渴數飲身熱瘦音酸胻户當切熱爭則項痛而強胻寒且痠足下熱不欲言膀胱之脈從腦出别下項又腎之脈起於小指之下斜趨足心出於然骨之下循內踝之後别入跟中以上胻內又其直行者從腎上貫肝鬲入肺中循喉嚨俠舌本故項痛而強胻寒且酸足下熱不欲言也新校正云按甲乙經然骨作然谷跟音根其逆則項痛員員淡淡然腎之筋循脊內俠膂上至項結於枕骨與膀胱之筋合膀胱之脈又并下於項故項痛員員然也淡淡為似欲不定也戊己甚壬癸大汗氣逆則戊己死腎主水戊己為土土刑水故甚死於戊己也壬癸為水故大汗於壬癸刺足少陰太陽少陰腎脈太陽膀胱脈諸汗者至其所勝日汗出也氣王日為所勝王則勝邪故各當其王日汗肝熱病者左頰先赤肝氣合木木氣應春南面正理之則其左頰也心熱病者顔先赤心氣合火火氣炎上指象明候故候於顔顔額也脾熱病者鼻先赤脾氣合土土王於中鼻處面中故占鼻也肺熱病者右頰先赤肺氣合金金氣應秋南面正理之則其右頰也腎熱病者頤先赤腎氣合水水惟潤下指象明候故候於頤也病雖未發見赤色者刺之名曰治未病聖人不治已病治未病不治已亂治未亂此之謂也熱病從部所起者至期而已期為大汗之日也如肝甲乙心丙丁脾戊己肺庚辛腎壬癸是為期日也其刺之反者三周而已反謂反取其氣也如肝病刺脾脾病刺腎腎病刺心心病刺肺肺病刺肝者皆是反刺五藏之氣也三周謂三周於三陰三陽之脈狀也又太陽病而刺寫陽明陽明病而刺寫少陽少陽病而刺寫太陰太陰病而刺寫少陰少陰病而刺寫厥陰如此是為反取三陰三陽之脈氣也重逆則死先刺已反病氣流傳又反刺之是為重逆一逆刺之尚至三周乃已况其重逆而得生邪諸當汗者至其所勝日汗大出也王則勝邪故各當其王日汗新校正云按此條文注二十四字與前文重復當刪去甲乙經太素亦不重出諸治熱病以飲之寒水乃刺之必寒衣之居止寒處身寒而止也寒水在胃陽氣外盛故飲寒乃刺熱退則涼生故身寒而止針熱病先胸脅痛手足躁刺足少陽補足太陰此則舉正取之例然足少陽木病而寫足少陽之木氣補足太陰之土氣者恐木傳於土也胸脅痛丘虛主之丘虛在足外踝下如前陷者中足少陽脈之所過也刺可入同身寸之五分留七呼若灸者可灸三壯熱病手足躁經無所主治之旨然補足太陰之脈當於井榮取之也新校正云詳足太陰全元起本及太素作手太陰楊上善云手太陰上屬肺從肺出腋下故胸脅痛又按靈樞經云熱病而胸脅痛手足躁取之筋間以第四針索筋於肝不得索之於金金肺也以此決之作手太陰者為是病甚者為五十九刺五十九刺者謂頭上五行行五者以越諸陽之熱逆也大杼膺俞缺盆背俞此八者以寫胸中之熱也氣街三里巨虛上下廉此八者以寫胃中之熱也雲門髃骨委中髓空此八者以寫四支之熱也五藏俞傍五此十者以寫五藏之熱也凡此五十九穴者皆熱之左右也故病甚則爾刺之然頭上五行者當中行謂上星囟會前頂百會後頂次兩傍謂五處承光通天絡却玉枕又刺兩傍謂臨泣目窗正營承靈腦空也上星在顱上直鼻中央入髮際同身寸之一寸陷者中容豆刺可入同身寸之四分新校正云按甲乙經四分作三分水熱穴論注亦作三分詳此注下文云刺如上星法又云刺如囟會法既有二法則當依甲乙經及水熱穴論注上星刺入三分囟會刺入四分囟會在上星後同身寸之一寸陷者刺如上星法前頂在囟會後同身寸之一寸五分骨間陷者中刺如囟會法百會在前頂後同身寸之一寸三分頂中央旋毛中陷容指督脈足太陽脈之交會刺如上星法後頂在百會後後同身寸之一寸五分枕骨上刺如囟會法然是五者皆督脈氣之所發也上星留六呼若灸者并灸五壯次兩傍穴五處在上星兩傍同身寸之一寸五分承光在五處後同身寸之一寸通天在承光後同身寸之一寸五分絡却在通天後同身寸之一寸五分玉枕在絡却後同身寸之七分然是五者并足太陽脈氣所發刺可入同身寸之三分五處通天各留七呼絡却留五呼玉枕留三呼若灸者可灸三壯新校正云按甲乙經承光不可灸玉枕刺入二分又次兩傍臨泣在頭直目上入髮際同身寸之五分足太陽少陽陽維三脈之會目窗正營遞相去同身寸之一寸承靈腦空遞相去同身寸之一寸五分然是五者并足少陽陽維二脈之會腦空一穴刺可入同身寸之四分餘并可刺入同身寸之三分臨泣留七呼若灸者可灸五壯大杼在項第一椎下兩傍相去各同身寸之一寸半陷者中督脈别絡足太陽手太陽三脈氣之會刺可入同身寸之三分留七呼若灸者可灸五壯新校正云按甲乙經作七壯氣穴注作七壯刺瘧注熱穴注作五壯膺俞者膺中俞也正名中府在胸中行兩傍相去同身寸之六寸雲門下一寸乳上三肋間動脈應手陷者中仰而取之手足太陰脈之會刺可入同身寸之三分留五呼若灸者可灸五壯缺盆在肩上橫骨陷者中手陽明脈氣所發刺可入同身寸之三分留七呼若灸者可灸三壯背俞當是風門熱府在第二椎下兩傍各同身寸之一寸半督脈足太陽脈之會刺可入同身寸之五分留七呼若灸者可灸五壯驗今明堂中誥圖經不著背俞未詳果何處也新校正云按王注水熱穴論以風門熱府為背俞又注氣穴論以大杼為背俞此注云未詳蓋疑之也氣衝在腹齊下橫骨兩端鼠鼷上同身寸之一寸動應手足陽明脈氣所發刺可入同身寸之三分留七呼若灸者可灸五壯三里在膝下同身寸之三寸胻外廉兩筋內分間足陽明脈之所入也刺可入同身寸之一寸留七呼若灸者可灸三壯巨虛上廉足陽明與太陽合在三里下同身寸之三寸足陽明脈氣所發刺可入同身寸之八分若灸者可灸三壯巨虛下廉足陽明與少陽合在上廉下同身寸之三寸足陽明脈氣所發刺可入同身寸之三分若灸者可灸三壯雲門在巨骨下胸中行兩傍新校正云按氣穴論注胸中行兩傍作俠任脈傍橫去任脈文雖異穴之處所則同相去同身寸之六寸動脈應手中府當其下同身寸之一寸雲門手太陰脈氣所發舉臂取之刺可入同身寸之七分若灸者可灸五壯驗今明堂中誥圖經不載髃骨穴尋其穴以寫四支之熱恐是肩髃穴穴在肩端兩骨間手陽明蹻脈之會刺可入同身寸之六分留六呼若灸者可灸三壯委中在足膝後屈處膕中央約文中動脈新校正云詳委中穴與氣穴注骨空注刺瘧論注并此王氏四處注之彼三注無足膝後屈處五字與此注異者非實有異蓋注有詳略爾足太陽脈之所入也刺可入同身寸之五分留七呼若灸者可灸三壯髓空者正名腰俞在脊中第二十一椎節下間督脈氣所發刺可入同身寸之一分新校正云按甲乙經作二寸水熱穴論注亦作二寸氣府論注骨空論注作一分留七呼若灸者可灸三壯五藏俞傍五者謂魄户神堂魂門意舍志室五穴也在俠脊兩傍各相去同身寸之三寸并足太陽脈氣所發也魄户在第三椎下兩傍正坐取之刺可入同身寸之五分若灸者可灸五壯神堂在第五椎下兩傍刺可入同身寸之三分若灸者可灸五壯魂門在第九椎下兩傍正坐取之刺可入同身寸之五分若灸者可灸三壯意舍在十一椎下兩傍正坐取之刺可入同身寸之五分若灸者可灸三壯志室在十四椎下兩傍正坐取之刺可入同身寸之五分若灸者可灸三壯是所謂此經之五十九刺法也若針經所指五十九刺則殊與此經不同雖俱治熱病之要穴然合用之理全向背猶當以病候形證所應經法即隨所證而刺之熱病始手臂痛者刺手陽明太陰而汗出止手臂痛列缺主之列缺者手太陰之絡去腕上同身寸之二寸半别走陽明者也刺可入同身寸之三分留三呼若灸者可灸五壯欲出汗商陽主之商陽者手陽明脈之井在手大指次指內側去爪甲角如韭葉手陽明脈之所出也刺可入同身寸之一分留一呼若灸者可灸一壯熱病始於頭首者刺項太陽而汗出止天柱主之天柱在俠項後髮際大筋外廉陷者中足太陽脈氣所發刺可入同身寸之二分留六呼若灸者可灸三壯熱病始於足脛者刺足陽明而汗出止新校正云按此條素問本無太素亦無今按甲乙經添入熱病先身重骨痛耳聾好瞑刺足少陰據經無正主穴當補寫井滎爾新校正云按靈樞經云熱病而身重骨痛耳聾而好暝取之骨以第四針索骨於不得索之土土脾也病甚為五十九刺如古法熱病先眩冒而熱胸脅滿刺足少陰少陽亦井滎也太陽之脈色榮顴骨熱病也榮飾也謂赤色見於顴骨如榮飾也顴骨謂目下當外眥也太陽合火故見色赤新校正云按楊上善云赤色榮顴者骨熱病也與王氏注不同榮未交新校正云按甲乙經太素作榮未夭下文榮未交亦作夭曰今且得汗待時而已榮一為營字之誤也曰者引古經法之端由也言色雖明盛但陰陽之氣不交錯者故法云今且得汗之而已待時者謂肝病待甲乙心病待丙丁脾病待戊己肺病待庚辛腎病待壬癸是謂待時而已所謂交者次如下句與厥陰脈爭見者死期不過三日外見太陽之赤色內應厥陰之弦脈然太陽受病當傳入陽明今又厥陰之脈來見者是土敗而木賊之也故死然土氣已敗木復狂行木主數三故期不過三日其熱病內連腎少陽之脈色也病或為氣恐字誤也若赤色氣內連鼻兩傍者是少陽之脈色非厥陰色何者腎部近於鼻也新校正云詳或者欲改腎作鼻按甲乙經太素并作腎楊上善云太陽水也厥陰木也水以生木木盛水衰故太陽水色見時有木爭見者水死以其熱病內連於腎腎為熱傷故死本舊無少陽之脈色也六字乃王氏所添王注非當從上善之義少陽之脈色榮頰前熱病也頰前即顴骨下近鼻兩傍也新校正云按甲乙經太素前字作筋楊上善云足少陽部在頰赤色榮之即知筋熱病也榮未交曰今且得汗待時而已與少陰脈爭見者死期不過三日少陽受病當傳入於太陰今又少陰少陰脈來見亦土敗而木賊之也故死不過三日亦木之數然新校正云詳或者欲改少陰作厥陰按甲乙經太素作少陰楊上善云少陽為木少陰為水少陽色見之時有少陰爭見者是母勝子故木死王作此注亦非舊本及甲乙經太素并無死期不過三日六字此是王氏足成此文也熱病氣穴三椎下間主胸中熱四椎下間主鬲中熱五椎下間主肝熱六椎下間主脾熱七椎下間主腎熱榮在骶也脊節之謂椎脊窮之謂骶言腎熱之氣外通尾骶也尋此文椎間所主神藏之熱又不正當其藏俞而云主療在理未詳項上三椎陷者中也此舉數脊之大法也言三椎下間主胸中熱者何以數之言皆當以陷者中為氣發之所也頰下逆顴為大瘕下牙車為腹滿顴後為脅痛頰上者鬲上也此所以候面部之色發明腹中之病診黃帝內經素問補注釋文卷之二十一

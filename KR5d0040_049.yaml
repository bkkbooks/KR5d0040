front:
  text: 黃帝內經素問補注釋文卷之四十九榮七
  hash: sha256:0445e098bee8ac947ceba2c6f8a0e03ec0f320205335c096a546fb961c05d3fe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_049-001a, image: hfl/0660/0660-091.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤著至教論篇新校正云按全元超本在四時病類論之本末黃帝坐明堂召雷公而問之曰子知醫之道乎明堂布政之宫也八窗四闥上圓下方在國之南故稱明堂夫求民之瘼恤民之隱大聖之用心故召引雷公問拯濟生靈之道雷公對曰誦而頗能解解而未能别别而未能明明而未能彰言所知解但得法守數而已猶未能深盡精微之妙用也新校正云按楊上善云習道有五一謫二解三别四明五彰足以治群僚不足至侯王公不敢自高其道然則布衣與血食主療亦殊矣願得受樹天之度四時陰陽合之别星辰與日月光以彰經術後世益明樹天之度言高遠不極四時陰陽合之言順氣序也别星辰與日月光言别學者二明大小異也新枝正云按太素别作列字上通神農著至教疑於二皇公欲其經法明著通於神農使後世見之疑是二皇并行之教新校正云按全元起本及太素疑作擬帝曰善無失之此皆陰陽表裏上下雌雄相輸應也而道上知天文下知地理中知人事可以長久以教衆庶亦不疑殆醫道論篇可傳後世可以為寶以明著故雷公曰請受道諷誦用解誦亦諭也諷諭者所以比切近而令解也帝曰子不聞陰陽傳乎曰不知曰夫三陽天為業天為業言三陽之氣在人身形所行居上也陰陽傳上古書名化者新枝正云按大素天作大上下無常合而病至偏害陰陽上下無常言氣乖通不定在上下也合而病至謂手足三陽氣相合而為病至也陽并至則精氣微故偏損害陰陽之用也雷公曰三陽莫當請聞其解莫當言氣并至而不可當帝曰三陽獨至者是三陽并至井至如風雨上為巔疾下為漏病并至謂手三陽足三陽氣并合而至也足太陽脈起於目內毗上額交巔上其支别者從巔至耳上角其直行者從巔入絡腦遣出别下項從肩髀內俠脊抵腰中入循膂絡腎屬膀胱手太陽脈起於手循臂上行交肩上入缺盆絡心循咽下鬲抵胃屬小腸故上為巔疾下為漏病也漏血膿出所謂并至如風雨者言無常凖也故下文曰新枝正云按楊上善云漏病謂膀胱漏泄大小便數不禁守也外無期內無正不中經紀診無上下以書别言三陽并至上下無常外無色氣可期內無正經常爾所至之時皆不中經脈綱紀所病之證又復上下無常以書記銓量乃應分别爾雷公曰臣治踈愈説意而己雷公言臣之所治稀得痊愈請言深意而已疑心已止也謂得説則疑心乃止帝曰三陽者至陽也六陽并合故曰至盛之陽也積并則為驚病超疾風至如躃礰九竅皆塞陽氣滂溢乾嗌喉塞積謂重也言六陽重并洪盛莫當陽憤鬱惟盛是為滂溢無涯故九竅塞也并於陰則上下無常薄為腸澼陰謂藏也然陽薄於藏為病亦上下無常定之診若在下為病便數赤白此謂三陽直心坐不得超卧者便身今三陽之病足太陽脈循肩下至腰故坐不得起卧便身全也所以然者起則陽盛鼓故常欲得卧卧則經氣均故身安全新校正云按甲乙經便身全作身重且以知天下何以别陰陽應四時合之五行言知未備也雷公曰新枝正云按自此至篇末全元起本别為一篇名方盛衰也陽言不别陰言不理請超受解以為至道帝未許為深知故重請也帝曰子若受傳不知合至道以惑師教語子至道之要不知其要流散無窮後世相習去聖久逺而學者各自是其法則惑亂於師氏之教旨矣病傷五藏筋骨以消子言不明不别是世主學盡矣言病之深重尚不明别然輕微者亦何開愈令得遍知耶然猶是不知明世主學教之道從斯盡矣腎且絶惋慷日暮從容不出人事不殷舉藏之易知者也然腎脈且絶則心神內爍筋骨脈肉日晚酸空也暮晚也若以此之類諸藏氣但少不出者當人事萎弱不復殷多所以爾者是則腎不足非傷損故也新枝正云按太素作腎且絶死死旦暮惋烏貫切示從容論篇新校正云按全元超本名從容别白黑黃帝燕坐召雷公而問之曰汝受術誦書者若能覽觀雜學及於比類通合道理為余言子所長五臟六府膽胄大小腸脾胞膀胱腦髓涕唾哭泣悲哀水所從行此皆人之所生治之過失五臟别論黃帝問曰佘聞方士或以髓腦為臟或以腸胃為臟或以為府敢問更相反皆自謂是不知其道願聞其説岐伯曰腦髓骨脈膽女子胞此六者地氣所生也皆藏於陰而象於地故藏而不寫名曰奇恆之府夫胃大腸小腸三焦膀胱此五者天氣之所生也其氣象天寫而不藏此受五臟濁氣故名曰傳化之府是以古之治病者以為過失也子務明之可以十全即不能知為世所怨不能知之動傷生者故人聞議論多有怨咎之心焉雷公曰臣請誦脈經上下篇甚衆多矣别異比類猶未能以十全又安足以明之言臣所請謫脈經雨篇衆多别異比類例猶未能以義而會見十全又何足以心眀至理乎安猶何也帝曰子别試通五臟之過六府之所不和針石之敗毒藥所宜湯液滋味具言其狀悉言以對請問不知過謂過失所謂不率常候而生病者也毒藥攻邪滋味充養試公之問知與不知爾新枝正云按太素别試作誠别雷公曰肝虛腎虛脾虛皆令人體重煩冤當投毒藥刺炙砭石湯液或已或不已願聞其解公以帝問使言而藏之過毒藥湯液滋味故問此病也帝曰公何年之長而問之少余真問以自謬也言問之不相應也以問不相應故言佘真發問以自招謬誤之對也吾問子窈冥子言上下篇以對何也窈冥謂不可見者則形氣榮衛也八正神明論岐伯對黃帝曰觀其冥冥者言形氣榮衛之不形於外而工獨知之以日之寒溫月之虛盛四時氣之浮沉參伍相合而調之工常先見之然而不形於外故曰觀於冥冥焉由此帝故曰吾問子窈冥也然肝虛腎虛牌虛則上下篇之旨帝故曰子言上下篇以對何也夫牌虛浮似肺腎小浮似牌肝急沉散似腎此皆工之所時亂也然從容得之脾虛脈浮候則似肺腎小浮上候則似脾肝急沉散候則似腎者何以然以三藏相近故脈象參差而相類也是以工惑亂之為治之過失矣雖爾乎猶宜從容安緩審比類之而待三藏之形候矣何以取之然浮而緩曰牌浮而短曰肺小浮而滑曰心急緊而散曰肝摶沉而滑曰腎不能比類則疑亂彌甚若夫三藏土木水參居此童子之所知問之何也脾合土肝合木腎合水三藏皆在鬲下居止相近也雷公曰於此有人頭痛筋攣骨重怯然少氣噦噫腹滿時驚不嗜卧此何藏之發也脈浮而弦切之石堅不知其解復問所以三藏者以知其比類也脈有浮弦石堅故云問所以三藏者以知其比類也帝曰夫從容之謂也言比類也夫年長則求之於府年少則求之於經年壯則求之於藏年之長者甚於味年之少者勞於使年之壯者過於內過於內則耗傷精氣勞於使則經中風邪甚於味則傷於府故求之異也今子所言皆失八風菀熟五藏消爍傳邪相受夫浮而弦者是腎不足也脈浮為虛弦為肝氣以腎氣不足故脈浮弦也菀胡阮切沉而石者是腎氣內薯也石之言堅也著謂腎氣內薄著而不行也怯然少氣者是水道不行形氣消索也腎氣不足故水道不行肺藏被衝故形氣消散索盡也咳嗽煩冤者是腎氣之逆也腎氣內著上歸於母也一人之氣病在一藏也若言三藏俱行不在法也經不然也雷公曰於此有人四支解墮喘咳血泄而愚診之以為傷肺切脈浮大而緊愚不敢治粗工下砭石病愈多出血血止身輕此何物也帝曰子所能治知亦衆多與此病失矣以為傷肺而不敢治是乃狂見法所失矣砭方念切譬以鴻飛亦衝於天鴻飛衝天偶然而得豈其羽翮之所能哉粗工下砭石亦猶是矣夫聖人之治病循法守度援物比類化之冥冥循上及下何必守經經謂經脈非經法也今夫脈浮大虛者是牌氣之外絶去胄外歸陽明也足太陰絡支别者入絡腸胃是以脾氣外絶不至胃外歸陽明也夫二火不勝三水是以脈亂而無常也二火謂二陽藏三水謂三陰藏二陽藏者心肺也以在鬲上故三陰藏者肝脾腎也以在鬲下故然三陰之氣上勝二陽陽不勝陰故脈亂而無常也四支解墮此脾精之不行也土主四支故四支解墮脾精不化故使之然喘咳者是水氣并陽明也腎氣逆入於胃故水氣井於陽明血泄者脈急血無所行也泄謂泄出也然脈氣數急血溢於中血不入經故為血泄以脈奔急而血溢故曰血無所行也若夫以為傷肺者由失以狂也不引比類是知不明也言所識不明不能比類以為傷肺由失狂言耳夫傷肺者脾氣不守胃氣不清經氣不為使真藏壞決經脈傍絶五藏漏泄不衄則嘔此二者不相類也肺氣傷則牌外救故云脾氣不守肺藏損則氣不行氣不行則胃滿故云胃氣不清肺者主行榮衛陰陽故肺傷則經脈不能為之行使也真藏謂肺藏也若肺藏損壞皮膜決破經脈傍絶而不流行五藏之氣上溢而漏泄者不衄血則嘔血也何者肺主鼻胃應口也然口鼻者氣之門户也今肺藏已損胃氣不清不上衄則血下流於胃中故不衄出則嘔出也然傷肺傷脾衄血泄血標出且異本歸亦殊故此二者不相類也譬如天之無形地之無理白與黑相去遠矣言傷肺傷脾形證懸别譬天地之相遠如黑白之異象也是失吾過矣以子知之故不告子是猶此也言雷公子之此見病疏者是吾不教子比類之道故自謂過也明引比類從容是以名曰診輕新枝正云按太素輕作經是謂至道也明引形證比量類例今從容之旨則輕微之者亦不失矣所以然者何哉以道之至妙而能爾也從容上古經篇名也何以合之陰陽類論雷公曰臣悉盡意受傳經脈須得從容之道以合從容明古文有從容矣疏五過論篇新校正云按全元起本名論過失黃帝曰嗚呼遠哉閔閔乎若視深淵若迎浮雲視深淵尚可測迎浮雲莫知其際嗚呼遠哉嘆至道之不極也閔閔乎言妙用之不窮也深洲清澄見之必定故可測浮雲漂寓際不守常故莫知新校正云詳此文與六微旨論文重聖人之術為萬民式論裁志意必有法則循經守數按循醫事為萬民副故事有五過四德汝知之乎愼五過則敬順四時之德氣矣然德者道之用生之主故不可不敬順之也上古天真論曰所以能年皆度百歲而動作不衰者以其德全不危也靈樞經曰天之在我者德也由此則天降德氣人賴而生生氣抱神上通於天生氣通天論曰夫自古通天者生之本此之謂也新校正云按為萬民副楊上善云副助也雷公避席再拜曰臣年幼小蒙愚以惑不聞五過與四德比類形名虛引其經心無所對經未師授心匪生知功業微薄故卑辭也帝曰凡未診病者必問嘗貴後賤雖不中邪病從內生名曰脫營神屈故也貴之尊榮賤之屈辱心懷眷慕志結憂惶故雖不中邪而病從內生血脈虛減故曰脫營嘗富後貧名曰失精五氣留連病有所并富而從欲貧奪豐財內結憂煎外悲過物然則心從想慕神隨往計榮衛之道閉以遲留氣血不行積并為病醫工診之不在藏府不變軀形診之而疑不知病名言病之初也病由想戀所為故未居藏府事因情念所超故不變軀形醫不悉之故診而疑也身體日減氣虛無精言病之次也氣血相迫形肉消爍故身體日減陰陽應象大論曰氣歸精精食氣本氣虛不化精無所滋故也病深無氣灑灑然時驚言病之深也病氣深穀氣盡陽氣內薄故惡寒而驚灑灑寒貌病深者以其外耗於衛內奪於榮血為憂煎氣隨悲減故外耗於衛內奪於榮病深者何以此耗奪故爾新校正云按太素病深者以其作病深以甚也良工所失不知病清此亦治之一過也失謂失問其所始也凡欲診病者必問飮食居處飲食居處五方不同故問之也異法方宜論曰東方之域天地之所始生魚鹽之地海濱傍水其民食魚而嗜鹹安其處美其食西方金玉之域沙石之處天地之所收引其民陵居而多風水土剛強其民不衣而褐薦其民華食而脂肥北方者天地所閉藏之域其地高陵居風寒冰列其民樂野處而乳食南方者天地所長養陽之所盛處其地下水土弱霧露之所聚其民嗜酸而食附中央者其地平以濕天地所以生萬物也衆其民食雜而不勞由此則診病之道當先問焉故聖人雜合以法各得其所宜此之謂矣暴樂暴苦始樂後苦新枝正云按太素作始苦皆傷精氣精氣竭絶形體毁沮喜則氣緩悲則氣消然悲哀動中者竭絶而失生故精氣竭絶形體殘毁心神沮喪矣暴怒傷陰暴喜傷陽怒則氣逆故傷陰喜則氣緩故傷陽厥氣上行滿脈去形厥氣逆也逆氣上行滿於經絡則神氣憚散去離形骸矣愚醫治之不知補寫不知病情精華日脫邪氣乃并此治之二過也不知喜怒哀樂之殊情概為補寫而同貫則五藏精華之氣日脫邪氣薄蝕而乃并於正真之氣矣善為脈者必以比類奇恆從容知之為工而不知道此診之不足貴此治之三過也竒恆謂氣候奇異於恆常之候也從容謂分别藏氣虛實脈見高下幾相似也示從容論曰脾虛浮似肺腎小浮似脾肝急沉散似腎此皆工之所時亂然從容分别而得之矣診有三常必問貴賤封君敗傷及欲侯王貴則形樂志樂賤則形苦志苦苦樂殊貫故先問也封君敗傷降君之位封公卿也及欲侯王謂情慕尊貴而妄為不已也新校正云按太素欲作公故貴脫勢雖不中邪精神內傷身必敗亡憂惶煎迫怫結所為始富後貧雖不傷邪皮焦筋屈痿躄為攣以五藏氣留連病有所并而為是也醫不能嚴不能動神外為柔弱亂至失常病不能移則醫事不行此治之四過也嚴謂戒所以禁非也所以令從命也外為柔弱言委隨而順從也然戒不足以禁非動不足以從令委隨任物亂失天常病且不移何醫之有也凡診者必知終始有知餘緒切脈問名當合男女終始謂氣色也脈要精微論曰知外者終而始之明知五色氣象終而復始也餘緒謂病發端之餘緒也切謂以指按脈也問名謂問病證之名也男子陽氣多而左脈大為順女子陰氣多而右脈大為順故宜以候常先合之也離絶菀結憂恐喜怒五藏空虛血氣離守工不能知何術之語離謂離間親愛絶謂絶念所懷菀謂菀積思慮結謂結固餘怨夫間親愛者魂逰絶所懷者意喪積所慮者神勞結餘怨者志苦憂愁者閉塞而不行恐懼者蕩憚而失守盛怒者迷惑而不治喜樂者憚散而不藏由是八者故五藏空虛血氣離守工不思曉又何言哉新枝正云按蕩憚而失守甲乙經作不收憚音但嘗富大傷斬筋絶脈身體復行令澤不息斬筋絶脈言非分之過損也身體雖已復舊而行且令津液不為滋息也何者精氣耗減也澤液也故傷敗結留薄歸陽膿積寒炅陽謂諸陽脈及六府也炅謂熱也言非分傷敗筋脈之氣血氣內結留而不去薄於陽脈則化為膿久積腹中而外為寒熱也粗工治之亟刺陰陽身體解散四支轉筋死日有期不知寒熱為膿積所生以為常熱之疾概施其法數刺陰陽經脈氣奪病甚故身體解散而不用四支廢運而轉筋如是故死日有期豈謂命不謂醫耶醫不能明不問所發惟言死日亦為粗工此治之五過也言粗工不必謂解不備學者縱備盡三世經法診不備二常療不順五過不求餘緒不問持身亦足為粗略之醫爾凡此五者皆受術不通人事不明也言是五者粗名受術之徒未足以通悟精微之理人間之事尚猶懵然故曰聖人之治病也必知天地陰陽四時經紀五藏六府雌雄表裏刺炎砭石毒藥所主從容人事以明經道貴賤貧富各異品理問年少長勇怯之理審於部分知病本始八正九候診必副矣聖人之備識也如此工宜勉之治病之道氣內為寶循求其理求之不得過在表裏言之治病必行於形氣之內求有過者是為聖人之寶也求之不得則以藏府之氣陰陽表裏而察之新校正云按全元超本及太素作氣內為實楊上善云天地間氣為外氣人身中氣為內氣外氣裁成萬物是為外實內氣榮街裁生故為內實治病能求內氣之理是治病之要也守數據治無失俞理能行此術終身不殆守數謂血氣多少及刺深淺之數也據治謂據穴俞所治之旨而用之也但守數據治而用之則不失穴俞之理矣殆者危也不知俞理五藏菀熟癰發六府菀積也熟熱也五藏積熱六府受之陽熱相薄熱之所過則為癰診病不審是謂失常謂失常經術正用之道也謹守此治與經相明謂前氣內循求俞會之理也上經下經揆度陰陽奇恆五中決以明堂審於終始可以橫行所謂上經者言氣之通天也下經者言病之變化也言此二經揆度陰陽之氣奇恆五中者皆決於明堂之部分也揆度者度病之深淺也奇恆者言奇病也五中者謂五藏之氣色也夫明堂者所以視萬物别白黑審長短故曰決以明堂也審於終始者謂審察五色囚王終而復始也夫道循如是應用不窮目牛無全萬舉萬當由斯高遠故可以橫行於世間矣黃帝內經素問補注釋文卷之四十九

  text: 黃帝內經素問補注釋文卷之三十七今二
  hash: sha256:833e3a1dfd1ebbbe9e68f34496bd4967d62ab2df7ff48909f5869e5f82d0b842
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_037-001a, image: hfl/0656/0656-039.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤繆刺論篇黃帝問曰余聞繆刺未得其意何謂繆刺繆刺言所刺之穴應用如紕繆綱紀也岐伯對曰夫邪之客於形也必先舍於皮毛留而不去入舍於孫脈留而不去入舍於絡脈留而不去入舍於經脈內連五藏散於腸胃陰陽俱感五臟乃傷此邪之從皮毛而入極於五臟之次也如此則治其經焉今邪客於皮毛入舍於孫絡留而不去閉塞不通不得入於經流溢於大絡而生奇病也病在血絡是謂奇邪新校正云按全元起云大絡十五絡也夫邪客大絡者左注右右注左上下左右與經相干而布於四末其氣無常處不入於經俞命曰繆刺四末謂四支也帝曰願聞繆刺以左取右以右取左奈何其與巨刺何以别之岐伯曰邪客於經左盛則右病右盛則左病亦有移易者新校正云按甲乙經作病易且移左痛未已而右脈先病如此者必巨刺之必中其經非絡脈也先病者謂彼痛未止而此先病以承之故絡病者其痛與經脈繆處故命曰繆刺絡謂正經之傍支非正别也亦兼公孫飛揚等之别絡也新校正云按王氏云非正别也按本論邪客足太陰絡令人腰痛注引從髀合陽明上絡嗌貫舌中乃太陰之正也亦是兼脈之正安得謂之非正别也帝曰願聞繆刺奈何取之何如岐伯曰邪客於足少陰之絡令人卒心痛暴脹胸脅支滿以其絡之别者并正經從腎上貫肝鬲走於心包故邪客之則病如是無積者刺然骨之前出血如食頃而已然骨之前然谷穴也在足內踝前起大骨下陷者中足少陰滎也刺可入同身寸之三分留三呼若灸者可灸三壯刺此多見血令人立飢欲食不已左取右右取左言痛在左取之右痛在右取之左餘如此例病新發者取五日已素有此病而新發先刺之五日乃愈已邪客於手少陽之絡令人喉痹舌卷口乾心煩臂外廉痛手不及頭以其脈循手表出臂外上肩入缺盆布膻中散絡心包其支者從膻中上出缺盆上項又心主其舌故病如是刺手中指次指爪甲上去端如韭葉各一痏謂關衝穴少陽之井也刺可入同身寸之一分留三呼若灸者可灸三壯左右手皆刺之故言各一痏痏瘡也新校正云按甲乙經關衝穴出手小指次指之端今言中指者誤也壯者立已老者有頃已左取右右取左此新病數日已邪客於足厥陰之絡令人卒疝暴痛以其絡去內踝上同身寸之五寸别走少陽其支别者循脛上皋結於莖故令人卒疝暴痛皋陰丸也刺足大指爪甲上與肉交者各一痏謂大敦穴足大指之端去爪甲角如韭葉厥陰之井也刺可入同身寸之三分留十呼若灸者可灸三壯男子立已女子有頃已左取右右取左邪客於足太陽之絡令人頭項肩痛以其經之正者從腦出别下項支别者從膊內左右别下又其絡自足上行循背上頭故頭項肩痛也新校正云按甲乙經云其支者從巔入絡腦還出别下項王氏云經之正者正當作支刺足小指爪甲上與肉交者各一痏立已謂至陰穴太陽之井也刺可入同身寸之一分留五呼若灸者可灸三壯新校正云按甲乙經云在足小指外側去爪甲角如韭葉不已刺外踝下三痏左取右右取左如食頃已謂金門穴足太陽郤也在外踝下刺可入同身寸之三分若灸者可灸三壯邪客於手陽明之絡令人氣滿胸中喘息而支胠胸中熱以其經自肩端入缺盆絡脈其支别者從缺盆中直而上頸故病如是刺手大指次指爪甲上去端如韭葉各一痏左取右右取左如食頃已謂商陽穴手陽明之井也刺可入同身寸之一分留一呼若灸者可灸一壯新校正云按甲乙經云商陽在手大指次指內側去爪甲角如韭葉邪客於臂掌之間不可得屈刺其踝後新校正云按全元起本云是人手之本節踝也先以指按之痛乃刺之以月死生為數月生一日一痏二日二痏十五日十五痏十六日十四痏隨日數也月半已前謂之生月半以後謂之死虧滿而異也邪客於足陽蹻之脈令人目痛從內眥始以其脈起於足上行至頭而屬目內眥故病令人目痛從內眥始也何以明之八十一難經曰陽蹻脈者起於跟中循外踝上行入風池針經曰陰蹻脈入鼽屬目內眥合於太陽陽蹻而上行尋此則至於目內眥也刺外躁之下半寸所各二痏謂申脈穴陽蹻之所生也在外踝下陷者中容爪甲刺可入同身寸之三分留六呼若灸者可灸三壯新校正云按刺腰痛注云外踝下五分左刺右右刺左如行十里頃而已人有所墮墜惡血留內腹中滿脹不得前後先飲利藥此上傷厥陰之脈下傷少陰之絡刺足內躁之下然骨之前血脈出血此少陰之絡也新校正云詳血脈出血脈字疑是絡字刺足跗上動脈謂衝陽穴胃之原也刺可入同身寸之三分留十呼若灸者可灸三壯主腹大不嗜食以腹脹滿故取之不已刺三毛上各一痏見血立已左刺右右刺左謂大敦穴厥陰之井也善悲驚不樂刺如右方善悲驚不樂亦如上法刺之邪客於手陽明之絡令人耳聾時不聞音以其經支者從缺盆上頸貫頰又其絡支别者入耳會於宗脈故病令人耳聾時不聞聲者刺手大指次指爪甲上去端如韭葉各一痏立聞亦同前商陽穴不已刺中指爪甲上與肉交者立聞謂中衝穴手心主之井也在手中指端去爪甲如韭葉陷者中刺可入一分留三呼灸可三壯古經脫簡無絡可尋恐是刺小指爪甲與肉交者也何以言之下文云手少陰絡會於耳中也若小指之端是謂少衝手少陰之井刺可入一分留一呼灸者可一壯新校正云按王氏云恐是小指爪甲上少衝穴按甲乙經手心主之正上循喉嚨出耳後少陽完骨之下如是則安得不刺中衝而疑為少衝也其不時聞者不可刺也不時聞者絡氣已絶故不可刺耳中生風者亦刺之如此數左刺右右刺左凡痹往來行無常處者在分肉間痛而刺之以月死生為數用針者隨氣盛衰以為痏數針過其日數則脫氣不及日數則氣不寫左刺右右刺左病已止不已復刺之如法言所以約月死生為數者何以隨氣之盛衰也月生一日一痏二日二痏漸多之十五日十五痏十六日十四痏漸少之如是刺之則無過數無不及也邪客於足陽明之經令人鼽衄上齒寒以其脈起於鼻交頞中下循鼻外入上齒中還出俠口環唇下交承漿却循頤後下廉出大迎循頰車上耳前故病令人鼽衄上齒寒也復以其脈左右交於面部故舉經脈之病以明繆處之類故下文云新校正云按全元起本與甲乙經陽明之經作陽明之絡刺足中指次指爪甲上與肉交者各一痏左刺右右刺左中當為大亦傳寫中大之誤也據靈樞經孔穴圖經中指次指爪甲上無穴當言刺大指次指爪甲上乃厲兌穴陽明之井不當更有次指二字也厲兌者刺可入同身寸之一分留一呼若灸者可灸三壯新校正云按甲乙經云刺足中指爪甲上無次指二字蓋以大指次指為中指義與王注同下文云足陽明中指爪甲上亦謂此穴也厲兌在足大指次指之端去爪甲角如韭葉邪客於足少陽之絡令人脅痛不得息咳而汗出以其脈支别者從目兌眥下大迎合手少陽於䪼下加頰車下頸合缺盆以下胸中貫鬲絡肝屬膽循脅故令人脅痛咳而汗出䪼之六切刺足小指次指爪甲上與肉交者各一痏謂竅陰穴少陽之井也刺可入同身寸之一分留一呼若灸者可灸三壯新校正云按甲乙經竅陰在足小指次指之端去爪甲角如韭葉不得息立已汗出立止咳者溫衣飲食一日已左刺右右刺左病立已不已復刺如法邪客於足少陰之絡令人嗌痛不可內食無故善怒氣上走賁上以其經支别者從肺出絡心注胸中又其正經從腎上貫肝鬲入肺中循喉嚨俠舌本故病令人嗌乾痛不可內食無故善怒氣上走賁上也賁謂氣奔也新校正云詳王注以賁上為氣奔者非按難經胃為賁門楊操云賁鬲也是氣上走鬲上也經既云氣上走安得更以賁為奔上之解刺足下中央之脈各三痏凡六刺立已左刺右右刺左謂涌泉穴少陰之井也在足心陷者中屈足踡指宛宛中刺可入同身寸之三分留三呼若灸者可灸三壯嗌中腫不能內唾時不能出唾者刺然骨之前出血立已左刺右右刺左亦足少陰之絡也以其絡并大經喉嚨故爾刺之此二十九字本錯簡在邪客手足少陰太陰足陽明之絡前今遷於此新校正云詳王注以其絡并大經循喉嚨差互按甲乙經足少陰之絡并經上走心包少陰之經循喉嚨今王氏之注經與絡交互當以甲乙經為正也邪客於足太陰之絡令人腰痛引少腹控䏚不可以仰息足太陰之絡從髀合陽明上貫尻骨中與厥陰少陽結於下髎而循尻骨內入腹上絡嗌貫舌中故腰痛則引少腹控於䏚中也䏚謂季脅下之空軟處也受邪氣則絡拘急故不可以仰伸而喘息也刺腰痛篇中無息字新校正云詳王注云足太陰之絡按甲乙經乃太陰之正非絡也王氏謂之絡者未詳其旨刺腰尻之解兩胂之上是腰俞以月死生為痏數發針立已左刺右右刺左腰尻骨間曰解當中有腰俞刺可入同身寸之二寸新校正云按氣府論注作二分刺熱論注作二分水穴篇注作二分熱穴篇注作三寸甲乙經作二寸留七呼注與經同中誥孔穴經云左取右右取左穴當中不應爾也次腰下俠尻有骨空各四皆主腰痛下髎注與經同是足太陰厥陰少陽所結刺可入同身寸之二寸留十呼若灸者可灸三壯胂謂兩髀胂也腰俞髁伸皆當取之也新校正云按此邪客足太陰之絡并刺法一項己見刺腰痛篇中彼注甚詳此特多是腰俞三字耳别按全元起本舊無此三字王氏頗知腰俞無左右取之理而注之而不知全元起本舊無邪客於足太陽之絡令人拘攣背急引脅而痛以其經從膊內左右别下貫胂合膕中故病令人拘攣背急引脅而痛新校正云按全元起本及甲乙經引脅而痛下更云內引心而痛刺之從項始數脊椎俠脊疾按之應手如痛刺之傍三痏立已從項始數脊椎者謂從大椎數之至第二椎兩傍各同身寸之一寸五分內循脊兩傍按之有痛應手則邪客之處也隨痛應手深淺即而刺之邪客在脊骨兩傍故言刺之傍也邪客於足少陽之絡令人留於樞中痛髀不可舉以其經出氣街繞髦際橫入髀厭中故痛令人留於髀樞後痛解不可舉樞謂髀樞刺樞中以毫針寒則久留針以月死生為數立已髀樞之後則環銚穴也正在髀樞後故言刺髀樞後也環銚者足少陽脈氣所發刺可入同身寸之一寸留二呼若灸者可灸三壯毫針者第七針也新校正云按甲乙經環跳在髀樞中氣穴論云在兩髀厭分中此經云刺樞中而王氏以謂髀樞之後者誤也治諸經刺之所過者不病則繆刺之正言也經不病則邪在絡故繆刺之若經所過有病是則經病不當繆刺矣耳聾刺手陽明不已刺其通脈出耳前者手陽明謂前手大指次指去端如韭葉者也是謂商陽據中誥孔穴圖經手陽明脈中商陽合谷陽溪偏歷四穴并主耳聾今經所指謂前商陽不謂此合谷等穴也耳前通脈手陽明脈正當聽會之分可入同身寸之四分若灸者可灸三壯齒齲刺手陽明不已刺其脈入齒中者立已據甲乙流注圖經手陽明脈中商陽二間三間合谷陽溪偏歷溫留七穴并主齒痛手陽明脈貫頰入下齒中足陽明脈循鼻外入上齒中也齲丘禹切邪客於五藏之間其病也脈引而痛時來時止視其病繆刺之於手足爪甲上各刺其井左取右右取左視其脈出其血間日一刺一刺不已五刺已有血脈者則刺之如此數繆傳引上齒齒唇寒痛視其手背脈血者去之若病繆傳而引上齒齒唇寒痛者刺手背陽明絡也足陽明中指爪甲上一痏手大指次指爪甲上各一痏立已左取右右取左謂第二指厲兌穴也手大指次指謂商陽穴手陽明井也針經曰齒痛不惡清飲取足陽明惡清飲取手陽明新校正云詳前文邪客足陽明刺中指次指爪甲上是誤剩次指二字當如此只言中指爪甲上乃是邪客於手足少陰太陰足陽明之絡此五絡皆會於耳中上絡左角手少陰真心脈足少陰腎脈手太陰肺脈足太陰脾脈足陽明胃脈此五絡皆會於耳中而出絡左額角也五絡俱竭令人身脈皆動而形無知也其狀若尸或曰尸厥言其卒冒悶而如死尸身脈猶如常人而動也然陰氣盛於上則下氣重上而邪氣逆邪氣逆則陽氣亂陽氣亂則五絡閉結而不通故其狀若尸也以是從厥而生故或曰尸厥刺其足大指內側爪甲上去端如韭葉謂隱白穴足太陰之井也刺可入同身寸之一分留三呼若灸者可灸三壯後刺足心謂涌泉穴足少陰之井也刺同前取涌泉穴法後刺足中指爪甲上各一痏謂第二指足陽明之井也刺同前取厲兌穴法後刺手大指內側去端如韭葉謂少商穴手太陰之井也刺可入同身寸之一分留三呼若灸者可灸三壯後刺手心主謂中衝穴手心主之井也刺可入同身寸之一分留三呼若灸者可灸一壯新校正云按甲乙經不刺手心主詳此五絡之數亦不及手心主而此刺之是有六絡未會王冰相隨注之不為明辨之旨也少陰鋭骨之端各一痏立已謂神門穴在掌後鋭骨之端陷者中手少陰之俞也刺可入同身寸之三分留七呼若灸者可灸三壯不已以竹管吹其兩耳言使氣入耳中內助五絡令氣復通也當內管入耳以手密擫之勿令氣泄而極吹之氣蹙然後絡脈通也新校正云按陶隱居云吹其左耳極三度復吹其右耳三度也鬄其左角之髮方一寸燔治飲以美酒一杯不能飲者灌之立已左角之髮是五絡血之餘故鬄之燔治飲之以美酒也酒者所以行藥勢又炎上而內走於心心主脈故以美酒服之鬄音易凡刺之數先視其經脈切而從之審其虛實而調之不調者經刺之有痛而經不病者繆刺之因視其皮部有血絡者盡取之此繆刺之數也四時刺逆從論篇厥陰有餘病陰痹痹謂痛也陰謂寒也有餘謂厥陰氣盛滿故陰發於外而為寒痹新校正云詳王氏以痹為痛未通不足病生熱痹陰不足則陽有餘故為熱痹滑則病狐疝風澀則病少腹積氣厥陰脈循股陰入髦中環陰器抵少腹又其絡支别者循脛上皋結於莖故為狐疝少腹積氣也新校正云按楊上善云狐夜不得尿日出方得人之所病與狐同故曰孤疝一曰狐疝謂三焦孤府為疝故曰孤疝少陰有餘病皮痹隱軫不足病肺痹腎水逆連於肺母故也足少陰脈從腎上貫肝鬲入肺中故有餘病皮痹隱軫不足病肺痹也滑則病肺風疝澀則病積溲血以其正經入肺貫腎絡膀胱故為肺疝及積溲血也太陰有餘病肉痹寒中不足病脾痹脾主肉故如是滑則病脾風疝澀則病積心腹時滿太陰之脈入腹屬脾絡胃其支别者復從胃别上鬲注心中故為脾疝心腹時滿也陽明有餘病脈痹身時熱不足病心痹胃有餘則上歸於心不足則心下痹故為是滑則病心風疝澀則病積時善驚心主之脈起於胸中出屬心包下鬲歷絡三焦故為心疝時善驚太陽有餘病骨痹身重不足病腎痹太陽與少陰為表裏故有餘不足皆病歸於腎也滑則病腎風疝澀則病積善時巔疾太陽之脈交於巔上入絡腦下循膂絡腎故為腎風及巔病也少陽有餘病筋痹脅滿不足病肝痹少陽與厥陰為表裏故病歸於肝滑則病肝風疝澀則病積時筋急目痛肝主筋故時筋急厥陰之脈上出額與督脈會於巔其支别者從目系下頰裏故目痛是故春氣在經脈夏氣在孫絡長夏氣在肌肉秋氣在皮膚冬氣在骨髓中帝曰余願聞其故岐伯曰春者天氣始開地氣始泄凍解冰釋水行經通故人氣在脈夏者經滿氣溢入孫絡受血皮膚充實長夏者經絡皆盛內溢肌中秋者天氣始收腠理閉塞皮膚引急引謂牽引以縮急也冬者蓋藏血氣在中內著骨髓通於五藏是故邪氣者常隨四時之氣血而入客也至其變化不可為度然必從其經氣辟除其邪除其邪則亂氣不生得氣而調故不亂帝曰逆四時而生亂氣奈何岐伯曰春刺絡脈血氣外溢令人少氣血氣溢於外則中不足故少氣新校正云按自春刺絡脈至令人目不明與診要經終論義同文異彼注甚詳於此彼分四時此分五時然此有長夏刺肌肉之分而逐時各闕刺秋分之事疑此肌肉之分即彼秋皮膚之分也春刺肌肉血氣環逆令人上氣血逆氣上故上氣新校正云按經闕春刺秋分春刺筋骨血氣內著令人腹脹內著不散故脹夏刺經脈血氣乃竭令人解㑊血氣竭少故解㑊然不可名之也解㑊謂寒不寒熱不熱壯不壯弱不弱故不可名之也夏刺肌肉血氣內却令人善恐却閉也血氣內閉則陽氣不通故善恐夏刺筋骨血氣上逆令人善怒血氣上逆則怒氣相應故善怒新校正云按經闕夏刺秋分秋刺經脈血氣上逆令人善忘血氣上逆滿於肺中故善忘秋刺絡脈氣不外行新校正云按别本作血氣不行全元起本作氣不衛外太素同令人卧不欲動以虛甚故新校正云按經闕秋刺長夏分秋刺筋骨血氣內散令人寒栗血氣內散則中氣虛故寒栗冬刺經脈血氣皆脫令人目不明以血氣無所營故也冬刺絡脈內氣外泄留為大痹冬刺肌肉陽氣竭絶令人善忘陽氣不壯至春而竭故善忘新校正云按經闕冬刺秋分凡此四時刺者大逆之病新校正云按全元起本作六經之病不可不從也反之則生亂氣相淫病焉淫不次也不次而行如浸淫相染而生病也故刺不知四時之經病之所生以從為逆正氣內亂與精相薄必審九候正氣不亂精氣不轉不轉謂不逆轉也帝曰善刺五藏中心一日死其動為噫診要經終論曰中心者環死刺禁論曰一日死其動為噫中肝五日死其動為語診要經終論闕而不論刺禁論曰中肝五日死其動為語新校正云按甲乙經語作欠中肺三日死其動為咳診要經終論曰中肺五日死刺禁論曰中肺三日死其動為咳中腎六日死新校正云按甲乙經作三日死其動為嚏欠診要經終論曰中腎七日死刺禁論曰中腎六日死其動為嚏新校正云按甲乙經無欠字中脾十日死新校正云按甲乙經作十五日死其動為吞診要經終論曰中脾五日死刺禁論曰中脾十日死其動為吞然此三論皆岐伯之言而死日動變不同傳之誤也刺傷人五藏必死其動則依其藏之所變候知其死也變謂氣動變也中心下至此并為逆從重文也標本病傳論篇新校正云按全元起本在皮部論篇前黃帝問曰病有標本刺有逆從奈何岐伯對曰凡刺之方必别陰陽前後相應逆從得施標本相移故曰有其在標而求之於標有其在本而求之於本有其在本而求之於標有其在標而求之於本故治有取標而得者有取本而得者有逆取而得者有從取而得者得病之情知治大體則逆從皆可施必中焉故知逆與從正行無問知標本者萬舉萬當道不疑惑識斷深明則無問於人正行皆當不知標本是謂妄行識猶褊淺道未高深舉且見違故行多妄夫陰陽逆從標本之為道也小而大言一而知百病之害著之至也言别陰陽知逆順法明著見精微觀其所舉則小尋其所利則大以斯明著故言一而知百病之害少而多淺而博可以言一而知百也言少可以貫多舉淺可以料大者何法之明故非聖人之道孰能至於是耶故學之者猶可以言一而知百病也博大也以淺而知深察近而知遠言標與本易而勿及雖事極深玄人非咫尺略以淺近而悉貫之然標本之道雖易可為言而世人識見無能及者治反為逆治得為從先病而後逆者治其本先逆而後病者治其本先寒而後生病者治其本先病而後生寒者治其本先熱而後生病者治其本先熱而後生中滿者治其標先病而後泄者治其本先泄而後生他病者治其本必且調之乃治其他病先病而後生中滿者治其標先中滿而後煩心者治其本人有客氣有同氣新校正云按全元起本同作固小大不利治其標小大利治其本本先病標後病必謹察之病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本本而標之謂有先病復有後病也以其有餘故先治其本後治其標也標而本之謂先發輕微緩者後發重大急者以其不足故先治其標後治其本也謹察間甚以意調之間謂多也甚謂少也多謂多形證而輕易少謂少形證而重難也以意調之調審量標本不足有餘非謂捨法而以意妄為調之也間者并行甚者獨行先小大不利而後生病者治其本并謂他脈共受邪氣而合病也獨為一經受病而無異氣相參也并甚則相傳傳急則亦死夫病傳者心病先心痛臟真通於心故心先痛一日而咳心火勝金傳於肺也肺在變動為咳故爾三日脅支痛肺金勝木傳於肝也以其脈循脅肋故如是五日閉塞不通身痛體重肝木勝土傳於脾也脾性安鎮木氣乘之故閉塞不通身痛體重三日不已死以勝相伐唯弱是從五藏四傷豈其能久故為即死冬夜半夏日中謂正子午之時也或言冬夏有異非也晝夜之半事甚昭然新校正云按靈樞經大氣入藏病先發於心一日而之肺三日而之肝五日而之脾三日不已死冬夜半夏日中甲乙經曰病先發於心心痛一日之肺而咳三日之肝肋支痛五日之脾閉塞不通身病體重三日不已死冬夜半夏日中詳素問言其病靈樞言其臟甲乙經及并素問靈樞二經之文而病與臟兼舉之肺病喘咳臟真高於肺而主息故喘咳三日而脅支滿痛肺傳於肝一日身重體痛肝傳於脾五日而脹自傳於府十日不已死冬日入夏日出孟冬之中日入於申之八刻二分仲冬之中日入於申之七刻三分季冬之中日入於申與孟月等孟夏之中日出於寅之八刻一分仲夏之中日出於寅之七刻三分季夏之中日出於寅與孟月等也肝病頭目眩脅支滿臟真散於肝脈內連目脅故如是三日體重身痛肝傳於肺五日而脹自傳於府三日腰脊少腹痛脛酸謂胃傳於腎以其脈起於足循腨內出膕內廉上股內後廉貫脊屬腎絡膀胱故如是也腰為腎之府故腰痛三日不已死冬日入新校正云按甲乙經作日中夏早食日入早晏如冬法也早食謂早於食時則卯正之時也脾病身痛體重臟真濡於脾而主肌肉故爾一日而脹自傳於府二日少腹腰脊痛脛酸胃傳於腎三日背呂筋痛小便閉自傳於府及之呂也呂音吕十日不已死冬人定夏晏食人定謂申後二十五刻晏食謂寅後二十五刻腎病少腹腰脊痛胻痠臟真下於腎故如是三日背呂筋痛小便閉自傳於府新校正云按靈樞經云之呂膀胱是自傳於府及之呂也三日腹脹膀胱傳小腸新校正云按甲乙經三日上之心心脹三日兩脅支痛府傳於臟新校正云按靈樞經云三日之小腸三日上之心今云兩脅支痛是小腸府傳心臟而發痛也三日不已死冬大晨夏晏晡大晨謂寅後九刻大明之時也晏晡謂申後九刻向昏之時也胃病脹滿以其脈循腹故如是五日少腹腰脊痛胻痠胃傳於腎三日背呂筋痛小便閉自傳於府及之呂也五日身體重膀胱水府傳於脾也新校正云按靈樞經及甲乙經各云五日上之心是膀胱傳心為相勝而身體重今王氏言傳脾者誤也六日不已死冬夜半後夏日昳夜半後謂子後八刻丑正時也日昳謂午後八刻未正時也昳徒結切膀胱病小便閉以其為津液之府故爾五日少腹脹腰脊痛胻痠自歸於臟一日腹脹腎復傳於小腸一日身體痛小腸傳於脾新校正云按靈樞經云一日上之心是府傳於臟也甲乙經作之脾與王注同二日不已死冬雞鳴夏下晡雞鳴謂早雞鳴丑正之分也下晡謂日下於晡時申之後五刻也諸病以次是相傳如是者皆有死期不可刺五藏相移皆如此有緩傳者有急傳者緩者或一歲二歲三歲而死其次或三月若六月而死急者一日二日三日四日或五六日而死則此類也尋此病傳之法皆五行之氣考其日數理不相應夫以五行為紀以不勝之數傳於所勝者謂火傳於金當云一日金傳於木當云二日木傳於土當云四日土傳於水當云三日水傳於火當云五日也若以己勝之數傳於不勝者則木三日傳於土土五日傳於水水一日傳於火火二日傳於金金四日傳於木經之傳日似法三陰三陽之氣玉機真臟論曰五臟相通移階有次不治三月若六月若三日若六日傳而當死此與同也雖爾猶當臨病詳視日數方悉是非間一臟止新校正云按甲乙經無止字及至三四臟者乃可刺也間一臟止者謂隔過前一臟而不更傳也則謂木傳土土傳水水傳火火傳金金傳木而止皆間隔一臟也及至三四臟者皆謂至前第三第四臟也諸至三臟者皆是其己不勝之氣也至四臟者皆至己所生之父母也不勝則不能為害於彼所生則父子無剋伐之期氣順以行故刺之可矣黃帝內經素問補注釋文卷之三十七

front:
  text: 黄帝内經素問補註釋文卷之三慎三
  hash: sha256:9e8e4fa220ac6212a22a8c3e1bddd971a047a3b96e1ed89ccc900e9203eff779
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_SJB_003-210013a, image: sjb/21/210013a.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤生氣通天論篇黄帝曰夫自古通天者生之本本於陰陽天地之間六合之内其氣九州九竅五臓十二節皆通乎天氣六合謂四方上下也九州謂冀兖青徐楊荆豫梁雍也外布九州而内應九竅故云九州九竅也五臓謂五神臓也五神臓者肝臓魂心臓神脾臓意肺臓𩲸腎臓志而此成形矣十二節者十二氣也天之十二節氣人之十二經脉而外應之咸同天紀故云皆通乎天氣也十二經脉者謂手三陰三陽足三陰三陽也新校正云詳通天者生之本六節藏象注甚詳又按鄭康成云九竅者謂陽竅七陰竅二也其生五其氣三數犯此者則邪氣傷人此壽命之本也言人生之所運爲則内依五氣以立然其鎮塞天地之内則氣應三元以成三謂天氣地氣運氣也犯謂邪氣觸犯於生氣也邪氣數犯則生氣傾危故寳養天眞以爲壽命之本也庚桑楚曰聖人之制萬物也以全其天天全則神全矣靈樞經曰血氣者人之神不可不謹養此之謂也蒼天之氣清靜則志意治順之則陽氣固春爲蒼天發生之主也陽氣者天氣也陰陽應象大論曰清陽爲天則其義也本天全神全之理全則形亦全矣雖有賊邪弗能害也此因時之序以因天四時之氣序故賊邪之氣不能害也故聖人傳精神服天氣而通神明夫精神可傳惟聖人得道者乃能爾乆服天眞之氣則妙用自通於神明也失之則内閉九竅外壅肌肉衛氣散解失謂逆蒼天清净之理也然衛氣者合天之陽氣也上篇曰陽氣者閉塞謂陽氣之病人則竅寫閉塞也靈樞經曰衛氣者所以温分肉而充皮膚肥腠理而司開闔故失其度則内閉九竅外壅肌肉以衛不營運故言散解也分上聲此謂自傷氣之削也夫逆蒼天之氣違清靜之理使正眞之氣如削去之者非天降之人自爲之爾陽氣者若天與日失其所折壽而不彰此明前陽氣之用也諭人之有陽若天之有日天失其所則日不明人失其所則陽不固日不明則天暗暝昩陽不固則人壽夭折故天運當以日光明言人之生固宜藉其陽氣也是故陽因而上衛外者也此所以明陽氣運行之部分輔衛人身之正用也因於寒欲如運樞起居如驚神氣乃浮欲如運樞謂内動也起居如驚謂暴卒也言因天之寒當深居周宻如樞紐之内動不當煩擾筋骨使陽氣發泄於皮膚而傷於寒毒也若起居暴卒馳騁荒佚則神氣浮越无所緩寧矣脉要精微論曰冬日在骨蟄蟲周宻君子居室四氣調神大論曰冬三月此謂閉藏水冰地坼无擾乎陽又曰使志若伏若匿若有私意若己有得去寒就温无泄皮膚使氣亟奪此之謂也新校正云全元起本作連樞元起云陽氣定如連樞者動繫也卒倉没切佚音逸因於暑汗煩則喘喝靜則多言此則不能靜愼傷於寒毒至夏而變暑病也煩謂煩躁靜謂安靜喝謂大呵出聲也言病因於暑則當汗泄不爲發表邪熱内攻中外俱熱故煩躁喘數大呵而出其聲也若不煩躁内熱外凉瘀熱攻中故多言而不次也喝一爲鳴躁則到切喝呼葛切瘀依倨切體若燔炭汗出而散此重明可汗之理也然體若燔炭之炎熱者何以救之必以汗出乃熱氣施散燔一爲躁非也因於濕首如裹濕熱不攘大筋緛短小筋弛長緛短爲拘弛長爲痿表熱爲病當汗泄之反濕其首若濕物裹之望除其熱熱氣不釋兼濕内攻大筋受熱則縮而短小筋得濕則引而長縮短故拘攣而不伸引長故痿弱而无力弛引也攘汝陽切除也緛音軟縮也痿於危切弱也因於氣爲腫四維相代陽氣乃竭素常氣疾濕熱加之氣濕熱爭故爲腫也然邪氣漸盛正氣浸微筋骨血肉互相代負故云四維相代也致邪代正氣不宣通衛无所從便至衰竭故言陽氣乃竭也衛者陽氣也陽氣者煩勞則張精絶辟積於夏使人煎厥此又誡起居暴卒煩擾陽和也然煩擾陽和勞疲筋骨動傷神氣耗竭天眞則筋脉䐜脹精氣竭絶既傷腎氣又損膀胱故當於夏時使人煎厥以煎迫而氣逆因以煎厥爲名厥謂氣逆也煎厥之狀當如下說新校正云按脉解云所謂少氣善怒者陽氣不治陽氣不治則陽氣不得出肝氣當治而未得故善怒善怒者名曰煎厥目盲不可以視耳閉不可以聽潰潰乎若壞都汨汨乎不可止既且傷腎又竭膀胱腎經内屬於耳中膀胱脉生於目眥故目盲所視耳閉厥聽大矣哉斯乃房之患也既盲目視又閉耳聰則志意心神筋骨腸胃潰潰乎若壞都汨汨乎煩悶而不可止也汩古没切眥在計切陽氣者大怒則形氣絶而血菀於上使人薄厥此又誡喜怒不節過用病生也然怒則傷腎甚則氣絶大怒則氣逆而陽不下行陽逆故血積於心胸之内矣上謂心胸也然陰陽相薄氣血奔并因薄厥生故名薄厥舉痛論曰怒則氣逆甚則嘔血靈樞經曰盛怒而不止則傷志陰陽應象大論曰喜怒傷氣由此則怒甚氣逆血積於心胸之内矣菀積也并去聲有傷於筋縱其若不容怒而過用氣或迫筋筋絡内傷機關縱緩形容痿廢若不維持汗出偏沮使人偏枯夫人之身常偏汗出而潤濕者乆乆偏枯半身不隨新校正云按沮千金作祖全元起本作恒沮子魚切潤也汗出見濕乃生痤痱陽氣發泄寒冰制之熱怫内餘鬱於皮裏甚爲痤癤微作痱瘡痱風癮也痤昨和切痱方味切怫符弗切高梁之變足生大丁受如持虚高膏也梁粱也不忍之人汗出淋洗則結爲痤痱膏梁之人内多滯熱皮厚肉宻故内變爲丁矣外濕既侵中熱相感如持虚器受此邪毒故曰受如持虚所以丁生於足者四支爲諸陽之本也以其甚費於下邪毒襲虚故爾新校正云按丁生之處不常於足蓋謂膏梁之變饒生大丁非偏著足也勞汗當風寒薄爲齇鬱乃痤時月寒凉形勞汗發凄風外薄膚腠居寒脂液遂凝蓄於玄府依空滲涸齇刺長於皮中形如米或如針乆者上黑長分餘色白黄而瘛於玄府中俗曰粉刺解表已玄府謂汗空也痤謂色赤䐜憤内藴血膿形小而大如酸棗或如按豆此皆陽氣内鬱所爲待耎攻之大甚爇出之被織加切蓄許竹切瘛尺制切爇而劣切陽氣者精則養神柔則養筋此又明陽氣之運養也然陽氣者内化精微養於神氣外爲柔耎以固於筋動靜失宜則生諸疾開闔不得寒氣從之乃生大僂開謂皮腠發泄闔謂玄府閉封然開闔失宜爲寒所襲内深筋器結固虚寒則筋絡拘緛形容僂俯矣靈樞經曰寒則筋急此其類也僂力主切陷脉爲瘻留連肉腠陷脉謂寒氣陷缺其脉也積寒留舍經血稽凝久瘀内攻結於肉里故發爲瘍瘻肉腠相連瘻力鬥切癰瘻俞氣化薄傳爲善畏及爲驚駭言若寒中於背俞之氣變化入深而薄於藏府者則善爲恐畏及發爲驚駭也俞音庶營氣不從逆於肉理乃生癰腫營逆則血鬱血鬱則熱聚爲膿故爲癰腫也正理論云熱之所過則爲癰腫魄汗未盡形弱而氣爍穴俞以閉發爲風瘧汗出未止形弱氣消風寒薄之穴俞隨閉熱藏不出以至於秋秋陽復收兩熱相合故令振慄寒熱相移以所起爲風故名風瘧也金匱眞言論曰夏暑汗不出者秋成風瘧蓋論從風而爲是也故下文曰故風者百病之始也清靜則肉腠閉拒雖有大風苛毒弗之能害此因時之序也夫嗜欲不能勞其目淫邪不能惑其心不妄作勞是爲清靜以其清靜故能肉腠閉皮膚宻眞正内拒虚邪不侵然大風苛毒不必常求於人蓋由人之冒犯爾故清靜則肉腠閉陽氣拒大風苛毒弗能害之清靜者謂因循四時氣序養生調節之宜不妄作勞起居有度則生氣不竭永保康寧故病久則傳化上下不并良醫弗爲并謂氣交通也然病之深乆變化相傳上下不通陰陽否隔雖醫良法妙亦何以爲之陰陽應象大論曰夫善用針者從陰引陽從陽引陰以右治左以左治右若是氣相格拒故良醫弗可爲也否塞也故陽畜積病死而陽氣當隔隔者當寫不亟正治粗乃敗之言三陽蓄積怫結不通不急寫之亦病而死何者蓄積不已亦上下不并矣何以驗之隔塞不便則其證也若不急寫粗工輕侮必見敗亡也陰陽别論曰三陽結謂之隔又曰剛與剛陽氣破散陰氣乃消亡淖則剛柔不和經氣乃絶淖奴教切下并同故陽氣者一日而主外晝則陽氣在外周身行二十五度靈樞經曰目開則氣上行於頭衛氣行於陽二十五度也平旦人氣生日中而陽氣隆日西而陽氣已虚氣門乃閉隆猶高也盛也夫氣之有者皆自少而之壯積暖以成炎炎極又凉物之理也故陽氣平曉生日中盛日西而已减虚也氣門謂玄府也所以發泄經脉營衛之氣故謂之氣門也是故暮而收拒無擾筋骨無見霧露反此三時形乃困薄皆所以順陽氣也陽出則出陽藏則藏暮陽氣衰内行陰分故宜收斂以拒虚邪擾筋骨則逆陽精耗見霧露則寒濕具侵故順此三時乃天眞乆遠也岐伯曰新校正云詳篇首云帝曰此岐伯曰非相對問也陰者藏精而起亟也陽者衛外而爲固也言在人之用也亟數也陰不勝其陽則脉流薄疾并乃狂薄疾謂極虚而急數也并謂盛實也狂謂狂走或妄攀登也陽并於四支則狂陽明脉解曰四支者諸陽之本也陽盛則四支實實則能登高而歌熱盛於身故棄衣欲走也夫如是者皆爲陰不勝其陽也陽不勝其陰則五藏氣爭九竅不通九竅者内屬於藏外設爲官故五藏氣爭則九竅不通也言九竅謂前陰後陰不通兼言上七竅也若兼則目爲肝之官鼻爲肺之官口爲脾之官耳爲腎之官舌爲心之官舌非通竅也金匱眞言論曰南方赤色入通於心開竅於耳北方黑色入通於腎開竅於二陰故也是以聖人陳陰陽筋脉和同骨髓堅固氣血皆從從順也言循陰陽法近養生道則筋脉骨髓各得其宜故氣血皆能順時和氣也如是則内外調和邪不能害耳目聦明氣立如故邪氣不剋故眞氣獨立而如常若失聖人之道則致疾於身故下文引曰風客淫氣精乃亡邪傷肝也自此已下四科并謂失聖人之道也風氣應肝故風淫精亡則傷肝也陰陽應象大論曰風氣通於肝也風薄則熱起熱盛則水乾水乾則腎氣不營故精乃无也亡无也新校正云按全元起云淫氣者陰陽之亂氣因其相亂而風客之則傷精傷精則邪入於肝也因而飽食筋脉横解腸澼爲痔甚飽則腸胃横滿腸胃滿則筋脉解而不屬故腸澼而爲痔也痹論曰飲食自倍腸胃乃傷此傷之信也澼普擊切因而大飲則氣逆飲多則肺布葉舉故氣逆而上奔也因而强力腎氣乃傷高骨乃壞强力謂强力入房也高骨謂腰高之骨也然强力入房則精耗精耗則腎傷腎傷則髓氣内枯故高骨壞而不用也聖人交會則不如此當如下句云凡陰陽之要陽宻乃固陰陽交會之要者正在於陽氣閉宻而不妄泄爾宻不妄泄乃生氣强固而能乆長此聖人之道也兩者不和若春無秋若冬無夏兩謂陰陽和謂和合則交會也若如也言絶陰陽和合之道者如天四時有春無秋有冬无夏也所以然者絶廢於生成也故聖人不絶和合之道但貴於閉宻以守固天真法也因而和之是謂聖度因陽氣盛發中外相應賈勇有餘乃相交合則聖人交會之制度也故陽强不能宻陰氣乃絶陽自强而不能閉宻則陰泄寫而精氣竭絶矣陰平陽秘精神乃治陰氣和平陽氣閉宻則精神之用日益治也陰陽離决精氣乃絶若陰不和平陽不閉宻强用施寫損耗天真二氣分離經絡决憊則精氣不化乃絶流通也因於露風乃生寒熱因於露體觸冒風邪風氣外侵陽氣内拒風陽相薄故寒熱生是以春傷於風邪氣留連乃爲洞泄風氣通肝春肝木王木勝脾土故洞泄生也新校正云按陰陽應象大論曰春傷於風夏生飱泄夏傷於暑秋爲痎瘧夏熱已甚秋陽復收陽熱相攻則爲痎瘧痎老也亦曰瘦也秋傷於濕上逆而欬濕謂地濕氣也秋濕既勝冬水復王水來乘肺故咳逆病生新校正云按陰陽應象大論云秋傷於濕冬生咳嗽發爲痿厥濕氣内攻於藏府則咳逆外散於筋脉則痿弱也陰陽應象大論曰地之濕氣感則害皮肉筋脉故濕氣之資發爲痿厥厥謂逆氣也冬傷於寒春必温病冬寒且凝春陽氣發寒不爲釋陽怫於中寒怫相持故爲温病新校正云按此與陰陽應象大論重彼注甚詳四時之氣更傷五藏寒暑温凉遞相勝負故四時之氣更傷五藏之和也陰之所生本在五味陰之五宫傷在五味所謂陰者五神藏也宫者五神之舍也言五神所生本資於五味五味宣化各凑於本宫雖因五味以生亦因五味以損正爲好而過節乃見傷也故下文曰是故味過於酸肝氣以津脾氣乃絶酸多食之令人癃小便不利則肝多津液津液内溢則肝葉舉肝葉舉則脾經之氣絶而不行何者木制土也味過於鹹大骨氣勞短肌心氣抑鹹多食之令人肌膚縮短又令心氣抑滯而不行何者鹹走血也大骨氣勞鹹歸腎也味過於甘心氣喘滿色黑腎氣不衡甘多食之令人心悶甘性滯緩故令氣喘滿而腎不平何者土抑水也衡平也味過於苦脾氣不濡胃氣乃厚苦性堅燥又養脾胃故脾氣不濡胃氣强厚味過於辛筋脉沮弛精神乃央沮潤也弛緩也央乆也辛性潤澤散養於筋故令筋緩脉潤精神長乆何者辛補肝也藏氣法時論曰肝欲散急食辛以散之用辛補之新校正云按此論味過所傷難作精神長乆之解央乃殃也古文通用如膏粱之作高梁草滋之作草兹之類蓋古文簡畧字多假借用者是故謹和五味骨正筋柔氣血以流腠理以宻如是則氣骨以精謹道如法長有天命是所謂修養天真之至道也黄帝内經素問補註釋文卷之三

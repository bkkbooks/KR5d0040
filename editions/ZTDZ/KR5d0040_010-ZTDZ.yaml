front:
  text: 黄帝内經素問補註釋文卷之十慎八
  hash: sha256:8c6b33c84eebb13554ba82e212c3802e82b24aa6ce7e549d1261b18b642af8db
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_SJB_010-210051b, image: sjb/21/210051b.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤五藏生成篇新校正云按此篇云五藏生成篇而不云論者蓋此篇直記五藏生成之事而无問答論議之辭故不云論後不言論者義皆仿此心之合脉也火氣動躁脉類齊同心藏應火故合脉也其榮色也火炎上而色赤故榮美於面而赤色新校正云詳王以赤色爲面榮美未通大抵發見於面之色皆心之榮也豈專爲赤哉其主腎也主謂主與腎相畏也火畏於水水與爲官故畏於腎肺之合皮也金氣堅定皮象亦然肺藏應金故合皮也其榮毛也毛附皮革故外榮其主心也金畏於火火與爲宫故主畏於心也肝之合筋也木性曲直筋體亦然肝藏應木故合筋也其榮爪也爪者筋之餘故外榮也其主肺也木畏於金金與爲官故主畏於肺也脾之合肉也土性柔厚肉體亦然脾藏應土故合肉也其榮唇也口爲脾之官故榮於唇唇謂四際白色之處非赤色也其主肝也土畏於木木與爲官故主畏於肝也腎之合骨也水性流濕精氣亦然骨通精髓故合骨也其榮髮也腦爲髓海腎氣主之故外榮髮也其主脾也水畏於土土與爲官故主畏於脾也是故多食鹹則脉凝泣而變色心合脉其榮色鹹益腎勝於心心不勝故脉凝泣而顔色變易也多食苦則皮槁而毛拔肺合皮其榮毛苦益心勝於肺肺不勝故皮枯槁而毛拔去也多食辛則筋急而爪枯肝合筋其榮爪辛益肺勝於肝肝不勝故筋急而爪乾枯也多食酸則肉胝䐢而唇揭脾合肉其榮唇酸益肝勝於脾脾不勝故肉胝䐢而唇皮揭舉也胝丁尼切䐢側救切多食甘則骨痛而髮落腎合骨其榮髮甘益脾勝於腎腎不勝故骨痛而髮墮落此五味之所傷也五味入口輸於腸胃而内養五藏各有所養有所欲欲則互有所傷故下文曰故心欲苦肺欲辛肝欲酸脾欲甘腎欲鹹故心欲苦合火故也肺欲辛合金故也肝欲酸合木故也脾欲甘合土故也腎欲鹹合水故也此五味之所合也各隨其欲而歸凑之五藏之氣新校正云按全元起本云此五味之合五藏之氣也連上文太素同故色見青如草兹者死兹滋也言如草初生之青色也黄如枳實者死色青黄也黑如炱者死炱謂炱煤也炱音苔赤如衃血者死衃血謂敗惡凝聚之血赤黑也衃方杯切白如枯骨者死白而枯槁如乾骨之白也此五色之見死也藏敗故見死色也三部九候論曰五藏已敗其色必夭夭必死矣此之謂也青如翠羽者生赤如鷄冠者生黄如蟹腹者生白如豕膏者生黑如烏羽者生此五色之見生也皆謂光潤也色雖可愛若見朦朣尤善矣故下文曰生於心如以縞裹朱生於肺如以縞裏紅生於肝如以縞裏紺生於脾如以縞裏栝樓實生於腎如以縞裏紫是乃眞見生色也縞白色紺薄青色此五藏所生之外榮也榮美色也色味當五藏白當肺辛赤當心苦青當肝酸黄當脾甘黑當腎鹹各當其所應而爲色味也故白當皮赤當脉青當筋黄當肉黑當骨各當其所養之藏氣也諸脉者皆屬於目脉者血之府宣明五氣篇曰久視傷血由此明諸脉皆屬於目也新校正云按皇甫士安云九卷曰心藏脉脉舍神神明通體故云屬目諸髓者皆屬於腦腦爲髓海故諸髓屬之諸筋者皆屬於節筋氣之堅結者皆絡於骨節之間也宣明五氣篇曰乆行傷筋由此明諸筋皆屬於節也諸血者皆屬於心血居脉内屬於心也八正神明論曰血氣者人之神然神者心之主由此故諸血皆屬於心也諸氣者皆屬於肺肺藏主氣故也此四支八谿之朝夕也谿者肉之小會名也八谿謂肘膝腕也如是氣血筋脉互有盛衰故爲朝夕矣故人卧血歸於肝肝藏血心行之人動則血運於諸經人靜則血歸於肝藏何者肝主血海故也肝受血而能視言其用也目爲肝之官故肝受血而能視足受血而能步氣行乃血流故足受血而能行步也掌受血而能握以當把握之用指受血而能攝以當攝受之用也血氣者人之神故所以受血者皆能運用卧出風吹之血凝於膚者爲痹謂𤸷痹也𤸷音頃又音君凝於脉者爲泣泣謂血行不利凝於足者爲厥厥謂足逆冷也此三者血行而不得反其空故爲痹厥也空者血流之道大經隧也隧音遂人有大谷十二分大經所會謂之大谷也十二分者謂十二經脉之部分小谿三百五十四名少十二俞小絡所會謂之小谿也然以三百六十五小絡言之者除十二俞外則當三百五十三名經言三百五十四者傳寫行書誤以三爲四也新校正云按别本及全元起本太素俞作關此皆衛氣之所留止邪氣之所客也衛氣滿填以行邪氣不得居止衛氣虧缺留止則爲邪氣所客故言邪氣所客針石縁而去之縁謂寅縁行去之貌言邪氣所客衛氣留止針其谿谷則邪氣寅縁隨脉而行去也診病之始五决爲紀五决謂以五藏之脉爲决生死之綱紀也欲知其始先建其母建立也母謂應時之王氣也先立應時王氣而後乃求邪正之氣也所謂五决者五脉也謂五藏脉也是以頭痛巔疾下虚上實過在足少陰巨陽甚則入腎足少陰腎脉巨陽膀胱脉膀胱之脉者起於目内眦上額交巅上其支别者從巅至耳上角其直行者從巔入絡腦還出别下項循肩膞内俠脊抵腰中入循膂絡腎屬膀胱然腎虚不能引巨陽之氣故頭痛而爲上巅之疾也經病甚已則入於藏矣徇蒙招尤目冥耳聾下實上虚過在足少陽厥陰甚則入肝徇疾也蒙不明也言目暴疾而不明招謂掉也摇掉不定也尤甚也目疾不明首掉尤甚謂暴病也目冥耳聾謂漸病也足少陽膽脉厥陰肝脉也厥陰之脉從少腹上俠胃屬肝絡膽貫鬲布脅肋循喉嚨之後入頏顙上出額與督脉會於巅其支别者從目系下頰裏足少陽之脉起於目鋭眥上抵頭角下耳後循頸入缺盆其支别者從耳後入耳中又支别者别目鋭眥下顴加頰車下頸合缺盆以下胷中貫鬲絡肝屬膽今氣不足故爲是病新校正云按王注徇蒙言目暴疾而不明義未甚顯徇蒙者蓋謂目臉膶動疾數而蒙暗又少陽之脉下顴甲乙經作下䪼頏胡浪切顙蘇郎切系奚帝切顴音權腹滿䐜脹支鬲胠脅下厥上冒過在足太陰陽明胠謂脅上也下厥上冒者謂氣從下逆上而冒於目也足太陰脾脉陽明胃脉也足太陰脉自股内前廉入腹屬脾絡胃上鬲足陽明脉起於鼻交於頞下循鼻外下絡頤頷從喉嚨入缺盆屬胃絡脾其直行者從缺盆下乳内廉下俠齊入氣街中其支别者起胃下口循腹裏至氣街中而合以下髃故爲是病胠去魚切髃音虞咳嗽上氣厥在胷中過在手陽明太陰手陽明大腸脉太陰肺脉也手陽明脉自肩髃前廉上出於柱骨之會上下入缺盆絡肺下鬲屬大腸手太陰脉起於中焦下絡大腸還循胃口上鬲屬肺從肺系横出掖下故爲咳嗽上氣厥在胷中也新校正云按甲乙經厥作病心煩頭痛病在鬲中過在手巨陽少陰手巨陽小腸脉少陰心脉也巨陽之脉從肩上入缺盆絡心循咽下鬲抵胃屬小腸其支别者從缺盆循頸上頰至目鋭眦手少陰之脉起於心中出屬心系下鬲絡小腸故心煩頭痛病在胸中也新校正云按甲乙經云胸中痛支滿腰背相引而痛過在手少陰太陽也夫脉之大小滑澀浮沉可以指别夫脉小者細小大者滿大滑者往來流利濇者往來蹇難浮者浮於手下沉者按之乃得也如是雖衆狀不同然手巧心諦而指可分别也五藏之象可以類推象謂氣象也言五藏雖隱而不見然其氣象性用猶可以物類推之何者肝象木而曲直心象火而炎上脾象土而安靜肺象金而剛决腎象水而潤下夫如是皆大舉宗兆其中隨事變化象法傍通者可以同類而推之爾五藏相音可以意識音謂五音也夫肝音角心音徵脾音宫肺音商腎音羽此其常應也然其互相勝負聲見否臧則耳聰心敏者猶可以意識而知之五色微診可以目察色謂顔色也夫肝色青心色赤脾色黄肺色白腎色黑此其常色也然其氣象交互微見吉凶則目明智遠者可以占視而知之能合脉色可以萬全色青者其脉弦色赤者其脉鈎色黄者其脉代色白者其脉毛色黑者其脉堅此其常色脉也然其參校異同斷言成敗則審而不惑萬舉萬全色脉之病例如下說赤脉之至也喘而堅診曰有積氣在中時害於食名曰心痹喘謂脉至如卒喘狀也藏居高病則脉爲喘狀故心肺二藏而獨言之爾喘爲心氣不足堅則病氣有餘心脉起於心胸之中故積氣在中時害於食也積謂病氣積聚痹謂藏氣不宣行也得之外疾思慮而心虚故邪而從之思慮心虚故外邪因之而居止矣白脉之至也喘而浮上虚下實驚有積氣在胸中喘而虚名曰肺痹寒熱喘爲不足浮者肺虚肺不足是謂心虚上虚則下當滿實矣以其不足故善驚而氣積胸中矣然脉喘而浮是肺自不足喘而虚者是心氣上乘肺受熱而氣不得營名肺痹而外爲寒熱也得之醉而使内也酒味苦燥内益於心醉甚入房故心氣上勝於肺矣青脉之至也長而左右彈有積氣在心下支胠名曰肝痹脉長而彈是爲弦緊緊爲寒氣中濕乃弦肝主胠脅近於心故氣積心下又支胠也正理論脉名例曰緊脉者如切繩狀言左右彈人手也得之寒濕與疝同法腰痛足清頭脉緊爲寒脉長爲濕疝之爲病亦寒濕所生故言與疝同法也寒濕在下故腰痛也肝脉者起於足上行至頭出額與督脉會於巔故病則足冷而頭痛也清亦冷也疝所晏切黄脉之至也大而虚有積氣在腹中有厥氣名曰厥疝脉大爲氣脉虚爲虚既氣又虚故脾氣積於腹中也若腎氣逆上則是厥疝腎氣不上則俱虚而脾氣積也女子同法得之疾使四支汗出當風女子同法言同其候也風氣通於肝故汗出當風則脾氣積滿於腹中黑脉之至也上堅而大有積氣在小腹與陰名曰腎痹上謂寸口也腎主下焦故氣積聚於小腹與陰也得之沐浴清水而卧濕氣傷下自歸於腎况沐浴而卧得无病平靈樞經曰身半以下濕之中也凡相五色之奇脉面黄目青面黄目赤面黄目白面黄目黑者皆不死也奇脉謂與色不相偶合也凡色見黄皆爲有胃氣故不死也新校正云按甲乙經無之奇脉三字面青目青面赤目白面青目黑面黑目白面赤目青皆死也无黄色而皆死者以無胃氣也五藏以胃氣爲本故无黄色皆曰死焉黄帝内經素問補註釋文卷之十

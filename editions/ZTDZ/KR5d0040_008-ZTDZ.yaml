front:
  text: 黄帝内經素問補註釋文卷之八九同卷慎七
  hash: sha256:3774b9789bc5fc86f9774c7d6ddde74d2d24ef44b96741b95940dfa0406d8c54
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_SJB_008-210042c, image: sjb/21/210042c.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤靈蘭秘典論篇新校正按全元起本名十二藏相使黄帝問曰願聞十二藏之相使貴賤何如藏藏也言腹中之所藏者非復有十二形神之藏也岐伯對曰悉乎哉問也請遂言之心者君主之官也神明出焉任治於物故爲君主之官清靜栖靈故曰神明出焉肺者相傅之官治節出焉位高非君故官爲相傳主行榮衛故治節由之肝者將軍之官謀慮出焉勇而能斷故曰將軍潜發未萌故謀慮出焉膽者中正之官决斷出焉剛正果决故官爲中正直而不疑故决斷出焉膻中者臣使之官喜樂出焉膻中者在胸中兩乳間爲氣之海然心主爲君以脉宣教令膻中主氣以氣布陰陽氣和志適則喜樂由生分布陰陽故官爲臣使也膻徒亶切脾胃者倉廪之官五味出焉包容五穀是爲倉廪之官營養四傍故云五味岀焉大腸者傳道之官變化出焉傳道謂傳不潔之道變化謂變化物之形故云傳道之官變化出焉小腸者受盛之官化物出焉承奉胃司受盛糟粕受已復化傳入大腸故云受盛之官化物出焉腎者作强之官伎巧出焉强於作用故曰作强造化形容故云伎巧在女則當其伎巧在男則正曰作强三焦者决瀆之官水道出焉引導陰陽開通閉塞故官司决瀆水道出焉膀胱者州都之官津液藏焉氣化則能出矣位當孤府故謂都官居下内空故藏津液若得氣海之氣施化則溲便注泄氣海之氣不及則閟隱不通故曰氣化則能出矣靈樞經曰腎上連肺故將兩藏膀胱是孤府則此之謂也溲所鳩切小便也凡此十二官者不得相失也失則灾害至故不得相失新校正云詳此乃十一官脾胃二藏共一官故也故主明則下安以此養生則壽殁世不殆以爲天下則大昌主謂君主心之官也夫主賢明則刑賞一刑賞一則吏奉法吏奉法則民不獲罪於枉濫矣故主明則天下安也夫心内明則銓善惡銓善惡則察安危察安危則身不夭傷於非道矣故以此養生則壽殁世不至於危殆矣然施之於養生殁世不殆施之於君主天下獲安以其爲天下主則國祚昌盛矣主不明則十二官危使道閉塞而不通形乃大傷以此養生則殃以爲天下者其宗大危戒之戒之使道謂神氣行使之道也夫心不明則邪正一邪正一則損益不分損益不分則動之凶咎陷身於羸瘠矣故形乃大傷以此養生則殃也夫主不明則委於左右委於左右則權勢妄行權勢妄行則吏不得奉法吏不得奉法則人民失所而皆受枉曲矣且人惟邦本本固邦寧本不獲安國將何有宗廟之立安有不至於傾危乎故曰戒之戒之者言深愼也瘠音藉至道在微變化無窮孰知其原孰誰也言至道之用也小之則微妙而細无不入大之則廣遠而變化無窮然其淵源誰所知察窘乎哉消者瞿瞿新校正云按太素作肖者濯濯瞿音劬孰知其要閔閔之當孰者爲良窘要也瞿瞿勤勤也人身之要者道也然以消息異同求諸物理而欲以此知變化之原本者雖瞿瞿勤勤以求明悟然其要妙誰得知乎既未得知轉成深遠閔閔玄妙復不知誰者爲善知其要妙哉玄妙深遠固不以理求而可得近取諸身則十二官粗可探尋而爲治身之道爾閔閔深遠也良善也新校正云詳此四句與氣交變大論文重意同彼消字作肖字恍惚之數生於毫釐恍惚者謂似有似無也忽亦數也似無似有而毫釐之數生其中老子曰恍恍惚惚其中有物此之謂也算書曰似有似無爲忽毫釐之數起於度量千之萬之可以益大推之大之其形乃制毫釐雖小積而不已命數乘之則起至於尺度斗量之繩準千之萬之亦可增益而至載之大數推引其大則應通人形之制度也黄帝曰善哉余聞精光之道大聖之業而宣明大道非齋戒擇吉日不敢受也深敬故也韓康伯曰洗心曰齋防患曰戒黄帝乃擇吉日良兆而藏靈蘭之室以傳保焉祕之至也黄帝内經素問補註釋文卷之八

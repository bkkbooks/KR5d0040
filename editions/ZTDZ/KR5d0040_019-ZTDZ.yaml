body:
  text: 唐太僕令啓玄子王氷次註宋光禄卿直秘閣林億等校正宋守尚書屯田郎孫兆重改誤八正神明論篇黄帝問曰用針之服必有法則焉今何法何則服事也法象也則準也約也岐伯對曰法天則地合以天光謂合日月星辰之行度帝曰願卒聞之岐伯曰凡刺之法必候日月星辰四時八正之氣氣定乃刺之候日月者謂候日之寒温月之空滿也星辰者謂先知二十八宿之分應水漏刻者也畧而言之常以日加之於宿上則知人氣在太陽否日行一舍人氣在三陽與陰分矣細而言之從房至畢十四宿水下五十刻半日之度也從昴至心亦十四宿水下五十刻終日之度也是故從房至畢者爲陽從昴至心者爲陰陽主晝陰主夜也凡日行一舍故水下三刻與七分刻之四也靈樞經曰水下一刻人氣在太陽水下二刻人氣在少陽水下三刻人氣在陽明水下四刻人氣在陰分水下不止氣行亦爾又曰日行一舍人氣行於身一周與十分身之八日行二舍人氣行於身三周與十分身之六日行三舍人氣行於身五周與十分身之四日行四舍人氣行於身七周與十分身之二日行五舍人氣行於身九周然日行二十八舍人氣亦行於身五十周與十分身之四由是故必侯日月星辰也四時八正之氣者謂四時正氣八節之風來朝於太一者也謹候其氣之所在而刺之氣定乃刺之者謂八節之風氣靜定乃可以刺經脉調虚實也故曆忌云八節前後各五日不可刺灸凶是則謂氣未定故不可刺灸也新校正云按八節風朝太一具天元玉册中是故天温日明則人血淖液而衛氣浮故血易寫氣易行天寒日陰則人血凝泣而衛氣沉泣謂如水中居雪也淖奴教切多也月始生則血氣始精衛氣始行月郭滿則血氣實肌肉堅月郭空則肌肉减經絡虚衛氣去形獨居是以因天時而調血氣也是以天寒無刺血凝泣而衛氣沉也天温無凝血淖液而氣易行也月生無寫月滿無補月郭空無治是謂得時而調之謂得天時也因天之序盛虚之時移光定位正立而待之候日遷移定氣所在南面正立待氣至而調之也故日月生而寫是謂藏虚血氣弱也新校正云按全元起本藏作咸藏當作減月滿而補血氣揚溢絡有留血命曰重實絡亦爲經誤血氣盛也留一爲流非也月郭空而治是謂亂經陰陽相錯眞邪不别沉以留止外虚内亂淫邪乃起氣失紀故淫邪起帝曰星辰八正何候岐伯曰星辰者所以制日月之行也制謂制度星辰則可知日月行之制度矣畧而言之周天二十八宿三十六分人氣行一周天凡一千八分周身十六丈二尺以應二十八宿合漏水百刻都行八百一十丈以分晝夜也故人十息氣行六尺日行二分二百七十息氣行十六丈二尺一周於身水下二刻日行二十分五百四十息氣行再周於身水下四刻日行四十分二千七百息氣行十周於身水下二十刻日行五宿二十分一萬三千五百息氣行五十周於身水下百刻日行二十八宿也細而言之則常以一十周加之一分又十分分之六乃奇分盡矣是故星辰所以制日月之行度也新校正云詳周天二十八宿至日行二十八宿也本靈樞經文今具甲乙經中八正者所以候八風之虚邪以時至者也八正謂八節之正氣也八風者東方嬰兒風南方大弱風西方剛風北方大剛風東北方凶風東南方弱風西南方謀風西北方折風也虚邪謂乘人之虚而爲病者也以時至謂天應太一移居以八節之前後風朝中宫而至者也新校正云詳太一移居風朝中宫義貝天元玉册四時者所以分春秋冬夏之氣所在以時調之也八正之虚邪而避之勿犯也四時之氣所在者謂春氣在經脉夏氣在孫絡秋氣在皮膚冬氣在骨髓也然觸冒虚邪動傷眞氣避而勿犯乃不病焉靈樞經曰聖人避邪如避矢石蓋以其能傷眞氣也以身之虚而逢天之虚兩虚相感其氣至骨入則傷五藏以虚感虚同氣而相應也工候救之弗能傷也候之而止故弗能傷之救止也故曰天忌不可不知也人忌於天故云天忌犯之則病故不可不知也帝曰善其法星辰者余聞之矣願聞法往古者岐伯曰法往古者先知針經也驗於來今者先知日之寒温月之虚盛以候氣之浮沉而調之於身觀其立有驗也候氣不差故立有驗也觀其冥冥者言形氣榮衛之不形於外而工獨知之明前篇靜意視義觀適之變是謂冥冥莫知其形也雖形氣榮衛不形見於外而工以心神明悟獨得知其衰盛焉善惡悉可明之新校正云按前篇乃寳命全形論以日之寒温月之虚盛四時氣之浮沉參伍相合而調之工常先見之然而不形於外故曰觀於冥冥焉工所以常先見者何哉以守法而神通明也通於無窮者可以傳於後世也是故工之所以異也法著故可傳後世後世不絶則應用通於無窮矣以獨見知故工所以異於人也然而不形見於外故俱不能見也工異於粗者以粗俱不能見也視之無形嘗之無味故謂冥冥若神髣髴言形氣榮衛不形於外以不可見故視無形嘗無味伏如横弩起如發機窈窈冥冥莫知元主謂如神運髣髴焉若如也髣音仿髴音弗虚邪者八正之虚邪氣也八正之虚邪謂八節之虚邪也以從虚之鄉來襲虚而入爲病故謂之八正虚邪正邪者身形若用力汗出腠理開逢虚風其中人也微故莫知其情莫見其形正邪者不從虚之鄉來也以中人微故莫知其情意莫見其形狀上工救其萌牙必先見三部九候之氣盡調不敗而救之故曰上工下工救其已成救其已敗救其已成者言不知三部九候之相失因病而敗之也義備離合眞邪論中知其所在者知診三部九候之病脉處而治之故曰守其門户焉莫知其情而見邪形也三部九候爲候邪之門户也守門户故見邪形以中人微故莫知其情狀也帝曰余聞補寫未得其意岐伯曰寫必用方方者以氣方盛也以月方滿也以日方温也以身方定也以息方吸而内針乃復候其方吸而轉鍼乃復候其方呼而徐引鍼故曰寫必用方其氣而行焉方猶正也寫邪氣出則眞氣流行矣補必用員員者行也行者移也行謂宣不行之氣令必宣行移謂移未復之脉俾其平復刺必中其榮復以吸排鍼也鍼入至血謂之中榮故員與方非鍼也所言方員者非謂針形正謂行移之義也故養神者必知形之肥瘦榮衛血氣之盛衰血氣者人之神不可不謹養神安則壽延神去則形弊故不可不謹養也帝曰妙乎哉論也合人形於陰陽四時虚實之應冥冥之期其非夫子孰能通之然夫子數言形與神何謂神何謂形願卒聞之神謂神智通悟形謂形診可觀岐伯曰請言形形乎形目冥冥問其所病新校正云按甲乙經作捫其所痛義亦通索之於經慧然在前按之不得不知其情故曰形外隱其無形故目冥冥而不見内藏其有象故以診而可索於經也慧然在前按之不得言三部九候之中卒然逢之不可爲之期準也離合眞邪論曰在陰與陽不可爲度從而察之三部九候卒然逢之早遏其路此其義也帝曰何謂神岐伯曰請言神神乎神耳不聞目明心開而志先慧然獨悟口弗能言俱視獨見適若昏昭然獨明若風吹雲故曰神耳不聞言神用之微宻也目明心開而志先者言心之通如昏昩開卷目之見如氣翳闢明神雖内融志已先往矣慧然謂清爽也悟猶了達也慧然獨悟口弗能言者謂心中清爽而了達口不能宣吐以寫心也俱視獨見適若昏者嘆見之異速也言與衆俱視我忽獨見適猶若昏昩爾既獨見了心眼昭然獨能明察若雲隨風卷日麗天明至哉神乎妙用如是不可得而言也三部九候爲之原九鍼之論不必存也以三部九候經脉爲之本原則可通神悟之妙用若以九鍼之論僉議則其㫖惟博其知彌遠矣故曰三部九候爲之原九鍼之論不必存也離合眞邪論篇黄帝問曰余聞九鍼九篇夫子乃因而九之九九八十一篇余盡通其意矣經言氣之盛衰左右傾移以上調下以左調右有餘不足補寫於滎輸余知之矣此皆榮衛之傾移虚實之所生非邪氣從外入於經也余願聞邪氣之在經也其病人何如取之奈何岐伯對曰夫聖人之起度數必應於天地故天有宿度地有經水人有經脉宿謂二十八宿度謂天之三百六十五度也經水者謂海水涇水渭水湖水沔水汝水江水淮水漯水河水漳水濟水也以其内合經脉故名之經水焉經脉者謂手足三陰三陽之脉所以言者以内外參合人氣應通故言之也新校正云按甲乙經云足陽明外合於海水内屬於胃足太陽外合於涇水内屬膀胱足少陽外合於渭水内屬於膽足太陰外合於湖水内屬於脾足厥陰外合於沔水内屬於肝足少陰外合於汝水内屬於腎手陽明外合於江水内屬於大腸手太陽外合於淮水内屬於小腸手少陽外合於漯水内屬於三焦手太陰外合於河水内屬於肺手心主外合於漳水内屬於心包手少陰外合於濟水内屬於心天地温和則經水安靜天寒地凍則經水凝泣天暑地熱則經水沸溢卒風暴起則經水波涌而隴起大經脉亦應之夫邪之入於脉也寒則血凝泣暑則氣淖澤虚邪因而入客亦如經水之得風也經之動脉其至也亦時隴起其行於脉中循循然循循然順動貌言隨順經脉之動息因循呼吸之往來但形狀或異耳循循一爲輴輴輴敕倫切其至寸口中手也時大時小大則邪至小則平其行無常處大謂大常平之形診小者非細小之謂也以其比大則謂之小若無大以比則自是平常之經氣耳然邪氣者因其陰氣則入陰經因其陽氣則入陽脉故其行無常處也在陰與陽不可爲度以隨經脉之流運也從而察之三部九候卒然逢之早遏其路逢謂逢遇遏謂遏絶三部之中九候之位卒然逢遇當按而止之即而寫之逕路既絶則大邪之氣無能爲也所謂寫者如下文云吸則内針無令氣忤靜以久留無令邪布吸則轉針以得氣爲故候呼引針呼盡乃去大氣皆出故命曰寫按經之㫖先補眞氣乃寫其邪也何以言之下文補法呼盡内鍼靜以久留此段寫法吸則内鍼又靜以乆留然呼盡則次其吸吸至則不兼呼内針之候既同久留之理復一則先補之義昭然可知針經云寫曰迎之迎之意必持而内之放而出之排陽出鍼疾氣得泄補曰隨之隨之意若忘之若行若悔如蚊虻止如留如還則補之必久留也所以先補者眞氣不足鍼乃寫之則經不滿邪氣無所排遣故先補眞氣令足後乃寫出其邪矣引謂引出去謂離穴候呼而引至其門呼盡乃離穴户則經氣審以平定邪氣無所拘留故大邪之氣隨針而出也呼謂氣出吸謂氣入轉謂轉動也大氣謂大邪之氣錯亂陰陽者也帝曰不足者補之奈何岐伯曰必先捫而循之切而散之推血按之彈而怒之抓而下之通而取之外引其門以閉其神捫循謂手摸切謂指按也捫而循之欲氣舒緩切而散之使經脉宣散推而按之排蹙其皮也彈而怒之使脉氣䐜滿也抓而下之置鍼準也通而取之以常法也外引其門以閉其神則椎而按之者也謂蹙按穴外之皮令當應鍼之處鍼已放去則不破之皮蓋其所刺之門門户不開則神氣内守故云以閉其神也調經論曰外引其皮令當其門户又曰推闔其門令神氣存此之謂也新校正云按王引調經論文今詳非本論之文傍見甲乙經鍼道篇又曰已下乃當篇之文也捫音門抓側交切呼盡内鍼靜以久留以氣至爲故呼盡内鍼亦同吸也言必以氣至而爲去針之故不以息之多數而便去鍼也鍼經曰刺之而氣不至無問其數刺之氣至去之勿復鍼此之謂也無問息數以爲遲速之約要當以氣至而鍼去不當以針下氣木至而鍼出乃更爲也如待所貴不知日暮諭人事於候氣也暮晩也其氣以至適而自護適調適也護愼守也言氣已平調則當愼守勿令改變使疾更生也鍼經曰經氣已至愼守勿失此其義也所謂愼守當如下說新校正云詳王引鍼經之言乃素問寳命全形論篇文兼見於鍼解論耳候吸引鍼氣不得出各在其處推闔其門令神氣存大氣留止故命曰補正言也外門已閉神氣復存候吸引鍼大氣不泄補之爲義斷可知焉然此大氣謂大經之氣流行榮衛者帝曰候氣奈何謂候可取之氣也岐伯曰夫邪去絡入於經也舍於血脉之中繆刺論曰邪之客於形也必先舍於皮毛留而不去入舍於孫脉留而不去入舍於絡脉留而不去入舍於經脉故云去絡入於經也其寒温未相得如涌波之起也時來時去故不常在以周游於十六丈二尺經脉之分故不常在於所候之處也故曰方其來也必按而止之止而取之無逢其衝而寫之衝謂應水刻數之平氣也靈樞經曰水下一刻人氣在太陽水下二刻人氣在少陽水下三刻人氣在陽明水下四刻人氣在陰分然氣在太陽則太陽獨盛氣在少陽則少陽獨盛夫見獨盛者便謂邪來以針寫之則反傷眞氣故下文曰眞氣者經氣也經氣大虚故曰其來不可逢此之謂也經氣應刻乃謂爲邪工若寫之則深誤也故曰其來不可逢故曰候邪不審大氣已過寫之則眞氣脫脫則不復邪氣復至而病益蓄不悟其邪反誅無罪則眞氣泄脫邪氣復侵經氣大虚故病彌蓄積故曰其往不可追此之謂也已隨經脉之流去不可復追召使還不可挂以髮者待邪之至時而發鍼寫矣言輕微而有尚且知之况若涌波不知其至也若先若後者血氣已盡其病不可下言不可取而取失時也新校正云按全元起本作血氣已虚盡字當作虚字之誤也故曰知其可取如發機不知其取如扣椎故曰知機道者不可挂以髮不知機者扣之不發此之謂也機者動之微言貴知其微也帝曰補寫奈何岐伯曰此攻邪也疾出以去盛血而復其眞氣視有血者乃取之此邪新客溶溶未有定處也推之則前引之則止逆而刺之温血也言邪之新客未有定居推針補之則隨補而前進若引針致之則隨引而留止也若不出盛血而反温之則邪氣内勝反增其害故下文曰刺出其血其病立已帝曰善然眞邪以合波隴不起候之奈何岐伯曰審捫循三部九候之盛虚而調之盛者寫之虚者補之不盛不虚以經取之則其法也察其左右上下相失及相減者審其病藏以期之氣之在陰則候其氣之在於陰分而刺之氣之在陽則候其氣之在於陽分而刺之是謂逢時靈樞經曰水下一刻人氣在太陽水下四刻人氣在陰分也積刻不已氣亦隨在周而復始故審其病藏以期其氣而刺之不知三部者陰陽不别天地不分地以候地天以候天人以候人調之中府以定三部故曰刺不知三部九候病脉之處雖有大過且至工不能禁也禁謂禁止也然候邪之處尚未能知豈復能禁止其邪氣耶誅罰無過命曰大惑反亂大經眞不可復用實爲虚以邪爲眞用針無義反爲氣賊奪人正氣以從爲逆榮衛散亂眞氣已失邪獨内著絶人長命予人夭殃不知三部九候故不能久長識非精辯學未該明且亂大經又爲氣賊動爲殘害安可久乎因不知合之四時五行因加相勝釋邪攻正絶人長命非惟昩三部九候之爲弊若不知四時五行之氣序亦足以殞絶其生靈也邪之新客來也未有定處推之則前引之則止逢而寫之其病立已再言之者其法必然黄帝内經素問補註釋文卷之十九

  text: 黄帝内經素問補註釋文卷之十二慎十
  hash: sha256:d3e816a180019e9428d479942abf03630ea428ccd28064933c01818e0ee76662
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_SJB_012-210061c, image: sjb/21/210061c.png}
body:
  text: 唐太僕令啓玄子王氷次註宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤湯液醪醴論篇黄帝問曰爲五穀湯液及醪醴奈何液謂清液醪醴謂酒之屬也岐伯對曰必以稻米炊以稻薪稻米者完稻薪者堅堅謂資其堅勁完謂取其完全完全則酒清冷堅勁則氣迅疾而效速也帝曰何以然言何以能完堅邪岐伯曰此得天地之和高下之宜故能至完伐取得時故能至堅也夫稻者生於陰水之精首戴天陽之氣二者和合然乃化成故云得天地之和而能至完秋氣勁切霜露凝結稻以冬採故云伐取得時而能至堅帝曰上古聖人作湯液醪醴爲而不用何也岐伯曰自古聖人之作湯液醪醴者以爲備耳言聖人愍念生靈先防萌漸陳其法制以備不虞耳夫上古作湯液故爲而弗服也聖人不治已病治未病故但爲備用而不服也中古之世道德稍衰邪氣時至服之萬全雖道德稍衰邪氣時至以心猶近道故服用萬全也帝曰今之世不必已何也言不必如中古之世用也岐伯曰當今之世必齊毒藥攻其中鑱石鍼艾治其外也言法殊於往古也帝曰形弊血盡而功不立者何岐伯曰神不使也帝曰何謂神不使岐伯曰鍼石道也言神不能使針石之妙用也何者志意違背於師爾故也精神不進志意不治故病不可愈動離於道耗散天眞故爾新校正云按全元起本云精神進志意定故病可愈太素云精神越志意散故病不可愈今精壞神去榮衛不可復收何者嗜欲無窮而憂患不止精氣弛壞榮泣衛除故神去之而病不愈也精神者生之源榮衛者氣之主氣主不輔生源復消神不内居病何能愈哉帝曰夫病之始生也極微極精必先入結於皮膚今良工皆稱曰病成名曰逆則針石不能治良藥不能及也今良工皆得其法守其數親戚兄弟遠近音聲日聞於耳五色日見於目而病不愈者亦何暇不早乎新校正云按别本暇一作謂岐伯曰病爲本工爲標標本不得邪氣不服此之謂也言醫與病不相得也然工人或親戚兄弟該明情疑勿用工先備識不謂知方針艾之妙靡容藥石之攻匪預如是則道雖昭著萬舉萬全病不許治欲奚爲療五藏别論曰拘於鬼神者不可與言至德惡於針石者不可與言至巧病不許治者病不必治治之無功此皆謂工病不相得邪氣不賔服也豈惟針艾之有惡哉藥石亦有之矣新校正云按移精變氣論曰標本已得邪氣乃服帝曰其有不從毫毛生而五藏陽以竭也新校正云按全元起本及太素陽作傷義亦通津液充郭其魄獨居孤精於内氣耗於外形不可與衣相保此四極急而動中是氣拒於内而形施於外治之奈何不從毫毛言生於内也陰氣内盛陽氣竭絶不得入於腹中故言五藏陽以竭也津液者水也充滿也郭皮也陰蓄於中水氣脹滿上攻於肺肺氣孤危魄者肺神腎爲水害子不救母故云其魄獨居也夫陰精損削於内陽氣耗减於外則三焦閉溢水道不通水滿皮膚身體否腫故云形不可與衣相保也凡此之類皆四支脉數急而内鼓動於肺中也肺動者謂氣急而咳也言如是者皆水氣格拒於腹膜之内浮腫施張於身形之外欲窮標本其可得乎四極言四末則四支也左傳曰風淫末疾靈樞經曰陽受氣於四末新校正云詳形施於外施字疑誤岐伯曰平治於權衡去宛陳莝新校正云按太素莝作莖是以微動四極温衣繆刺其處以復其形開鬼門潔净府精以時服五陽已布疏滌五藏故精自生形自盛骨肉相保巨氣乃平平治權衡謂察脉浮沉也脉浮爲在表脉沉爲在裏在裏者泄之在外者汗之故下文云開鬼門潔净府也去宛陳莖謂去積乆之水物猶如草莖之不可久留於身中也全本作草莝微動四極謂微動四支令陽氣漸以宣行故文曰温衣也經脉滿則絡脉溢絡脉溢則繆刺之以調其絡脉使形容如舊而不腫故云繆刺其處以復其形也開鬼門是啓玄府遣氣也五陽是五藏之陽氣也潔净府謂寫膀胱水去也脉和則五精之氣以時賔服於腎藏也然五藏之陽漸而宣布五藏之外氣穢復除也如是故精髓自生形肉自盛藏府既和則骨肉之氣更相保抱大經脉氣然乃平復爾帝曰善玉版論要篇黄帝問曰余聞揆度奇恒所指不同用之奈何岐伯對曰揆度者度病之淺深也奇恒者言奇病也請言道之至數五色脉變揆度奇恒道在於一一謂色脉之應也知色脉之應則可以揆度奇恒矣新校正云按全元起本請作謂神轉不回回則不轉乃失其機血氣者神氣也八正神明論曰血氣者人之神不可不謹養也夫血氣應順四時遞遷囚王循環五氣無相奪倫是則神轉不回也回謂却行也然血氣隨王不合却行却行則反常反常則回而不轉也回而不轉乃失生氣之機矣何以明之夫木衰則火王火衰則土王土衰則金王金衰則水王水衰則木王終而復始循環此之謂神轉不回也若木衰水王水衰金王金衰土王土衰火王火衰木王此之謂回而不轉也然反天常軌生之何有耶至數之要迫近以微言五色五脉變化之要道迫近於天常而又微妙著之玉版命曰合玉機玉機篇名也言以此回轉之要㫖著之玉版合同於玉機論文也新校正云詳道之至數至此與玉機眞藏論文相重注頗不同容色見上下左右各在其要容色者他氣也如肝木部内見赤黄白黑色皆謂他氣也餘藏率如此例所見皆在明堂上下左右要察候處故云各在其要新校正云按全元起本容作客視色之法具在甲乙經中其色見淺者湯液主治十日已色淺則病微故十日乃已其見深者必齊主治二十一日已色深則病甚故必終齊乃已其見大深者醪酒主治百日已病深甚故日多色夭面脫不治色見大深兼之天惡面肉又脫不可治也百日盡已色不夭面不脫治之百日盡可已新校正云詳色夭面脫雖不治然期當百日乃已盡也脉短氣絶死脉短已虚加之漸絶眞氣將竭故必死病温虚甚死甚虚而病温温氣涸其精血故死色見上下左右各在其要上爲逆下爲從色見於下者病生之氣也故從色見於上者傷神之兆也故逆女子右爲逆左爲從男子左爲逆右爲從左爲陽故男子右爲從而左爲逆右爲陰故女子右爲逆而左爲從易重陽死重陰死女子色見於左男子色見於右是變易也男子色見於左是曰重陽女子色見於右是曰重陰氣極則反故皆死也陰陽反他新校正云按陰陽應象大論云陰陽反作治在權衡相奪奇恒事也揆度事也權衡相奪謂陰陽二氣不得高下之宜是奇於恒常之事當揆度其氣隨宜而處療之搏脉痹躄寒熱之交脉擊摶於手而病𤸷痹及攣躄者皆寒熱之氣交合所爲非邪氣虚實之所生也脉孤爲消氣虚泄爲奪血夫脉有表無裏有裏無表皆曰孤亡之氣也若有表有裏而氣不足者皆曰虚衰之氣也孤爲逆虚爲從孤無所依故曰逆虚衰可復故曰從行奇恒之法以太陰始凡揆度奇恒之法先以氣口太陰之脉定四時之正氣然後度量奇恒之氣也行所不勝曰逆逆則死木見金脉金見火脉火見水脉水見土脉土見木脉如是皆行所不勝也故曰逆賊勝不已故逆則死焉行所勝曰從從則活木見水火土脉火見金木土脉土見金水火脉金見土木水脉水見金火木脉如是者皆可勝之脉故曰從從則无所剋殺傷敗故從則活也八風四時之勝終而復始以不越於五行故雖相勝猶循環終而復始也逆行一過不復可數論要畢矣過謂遍也然逆行一過遍於五氣者不復可數爲平和矣診要經終論篇黄帝問曰診要何如岐伯對曰正月二月天氣始方地氣始發人氣在肝方正也言天地氣正發生其萬物也木治東方王七十二日猶當三月節後一十二日是木之用事以月而取則正月二月人氣在肝三月四月天氣正方地氣定發人氣在脾天氣正方以陽氣明盛地氣定發爲萬物華而欲實也然季終土寄而王土又生於丙故人氣在脾五月六月天氣盛地氣高人氣在頭天陽赫盛地焰高升故言天氣盛地氣高火性炎上故人氣在頭七月八月陰氣始殺人氣在肺七月三陰爻生八月陰始肅殺故云陰氣始殺也然陰氣肅殺類合於金肺氣象金故人氣在肺九月十月陰氣始冰地氣始閉人氣在心陰氣始凝地氣始閉隨陽而入故人氣在心十一月十二月冰復地氣合人氣在腎陽氣深伏故氣在腎也夫氣之變也故發生於木長茂於土盛高而上肅殺於金避寒於火伏藏於水斯皆隨順陰陽氣之升沉也五藏生成篇曰五藏之象可以類推此之謂氣類也故春刺散俞及與分理血出而止散俞謂間穴分理謂肌肉分理新校正云按四時刺逆從論云春氣在經脉此散俞即經脉之俞也又水熱穴論云春取絡脉分肉甚者傳氣間者環也辨疾氣之間甚也傳謂相傳環謂循環也相傳則傳所不勝循環則周迴於五氣也新校正云按太素環也作環已夏刺絡俞見血而止盡氣閉環痛病必下盡氣謂出血而盡針下取所絡脉盛邪之氣也邪氣盡已穴俞閉宻則經循環而痛病之氣必下去矣以陽氣大盛故爲是法刺之新校正云按四時刺逆從論云夏氣在孫絡此絡俞即孫絡之俞也又水熱穴論云夏取盛經分腠秋刺皮膚循理上下同法神變而止循理謂循肌肉之分理也上謂手脉下謂足脉神變謂脉氣變易與未刺時異也脉者神之用故爾言之新校正云按四時刺逆從論云秋氣在皮膚義與此合又水熱穴論云取俞以寫陰邪取合以虚陽邪皇甫士安云是始秋之始變冬刺俞竅於分理甚者直下間者散下直下謂直爾下之散下謂散布下之新校正云按四時刺逆從論云冬氣在骨髓此俞竅即骨髓之俞竅也又水熱穴論云冬取井榮皇甫士安云是末冬之治變也春夏秋冬各有所刺法其所在春刺夏分脉亂氣微入淫骨髓病不能愈令人不嗜食又且少氣心主脉故脉亂氣微水受氣於夏腎主骨故入淫於骨髓也心火微則胃土不足故不嗜食而少氣也新校正云按四時刺逆從論云春刺絡脉血氣外溢令人少氣春刺秋分筋攣逆氣環爲咳嗽病不愈令人時驚又且哭木受氣於秋肝主筋故刺秋分則筋攣也若氣逆環周則爲咳嗽肝主驚故時驚肺主氣故氣逆又且哭也新校正云按四時刺逆從論云春刺肌肉血氣環逆令人上氣也春刺冬分邪氣著藏令人脹病不愈又且欲言語冬主陽氣伏藏故邪氣著藏腎實則脹故刺冬分則令人脹也火受氣於冬心主言故欲言語也新校正云按四時刺逆從論云春刺筋骨血氣内著令人腹痛夏刺春分病不愈令人解惰肝養筋肝氣不足故筋力解惰新校正云按四時刺逆從論云夏刺經脉血氣乃竭令人解㑊夏刺秋分病不愈令人心中欲無言惕惕如人將捕之肝木爲語傷秋分則肝木虚故恐如人將捕之肝不足故欲無言而復恐也新校正云按四時刺逆從論云夏刺肌肉血氣内却令人善恐甲乙經作悶夏刺冬分病不愈令人少氣時欲怒夏傷於腎肝肺勃之志内不足故令人少氣時欲怒也新校正云按四時刺逆從論云夏刺筋骨血氣上逆令人善怒秋刺春分病不已令人暢然欲有所爲起而忘之肝虚故也刺不當也新校正云按四時刺逆從論云秋刺經脉血氣上逆令人善忘秋刺夏分病不已令人益嗜卧又且善夢心氣少則脾氣孤故令嗜卧心主夢神爲之故令善夢新校正云按四時刺逆從論云秋刺絡脉氣不外行令人卧不欲動秋刺冬分病不已令人洒洒時寒陰氣上干故時寒也洒洒寒貌新校正云按四時刺逆從論云秋刺筋骨血氣内散令人寒慄冬刺春分病不已令人欲卧不能眠眠而有見肝氣少故令欲卧不能眠肝主目故眠而如見有物之形狀也新校正云按四時刺逆從論云冬刺經脉血氣皆脫令人目不明冬刺夏分病不愈氣上發爲諸痹泄脉氣故也新校正云按四時刺逆從論云冬刺絡脉血氣外泄留爲大痹冬刺秋分病不已令人善渴肺氣不足故發渴新校正云按四時刺逆從論云冬刺肌肉陽氣竭絶令人善忘凡刺胷腹者必避五藏心肺在鬲上腎肝在鬲下脾象土而居中故刺胷腹必避之五藏者所以藏精神魂𩲸意志損之則五神去神去則死至故不可不愼也中心者環死氣行如環之一周則死也正謂周十二辰也新校正云按刺禁論云一日死其動爲噫四時刺逆從論同此經闕刺中肝死日刺禁論云中肝五日死其動爲語四時刺逆從論同中脾者五日死土數五也新校正云按刺禁論云中脾十日死其動爲吞四時刺逆從論同中腎者七日死水成數六水數畢當至七日而死一云十日死字之誤也新校正云按刺禁論云中腎六日死其動爲嚏四時刺逆從論云中腎六日死其動爲嚏欠中肺者五日死金生數四金數畢當至五日而死一云三日死亦字誤也新校正云按刺禁論云中肺三日死其動爲咳四時刺逆從論同王注四時刺逆從論云此三論皆岐伯之言而不同者傳之誤也中鬲者皆爲傷中其病雖愈不過一歲必死五藏之氣同主一年鬲傷則五藏之氣互相克伐故不過一歲必死刺避五藏者知逆從也所謂從者鬲與脾腎之處不知者反之腎著於脊脾藏居中鬲連於脅際知者爲順不知者反傷其藏刺胸腹者必以布憿著之乃從單布上刺形定則不誤中於五藏也新校正云按别本憿一作𢅎又作撽憿古尧切著直略切刺之不愈復刺要以氣至爲故也鍼經曰刺之氣不至无問其數刺之氣至去之勿復針此之謂也刺鍼必肅肅謂靜肅所以候氣之存亡刺腫摇鍼以出大膿血故經刺勿摇經氣不欲泄故此刺之道也帝曰願聞十二經脉之終奈何終謂盡也岐伯曰太陽之脉其終也戴眼反折瘈瘲其色白絶汗乃出出則死矣戴眼謂睛不轉而仰視也然足太陽脉起於目内眦上額交巔上從巔入絡腦還出别下項循肩髆内俠脊抵腰中其支别者下循足至小指外側手太陽脉起於手小指之端循臂上肩入缺盆其支别者上頰至目内眦抵足太陽新校正云按甲乙經作斜絡於顴又其支别者從缺盆循頸上頰至目外眦新校正云按甲乙經外作兊故戴眼反折瘈瘲色白絶汗乃出也絶汗謂汗暴出如珠而不流旋復乾也太陽極則汗出故出則死少陽終者耳聾百節皆縱目睘絶系絶系一日半死其死也色先青白乃死矣足少陽脉起於目鋭眥上抵頭角下耳後其支别者從耳後入耳中出走耳前手少陽脉其支别者從耳後亦入耳中出走耳前故終則耳聾目睘絶系也少陽主骨故氣終則百節縱緩色青白者金木相薄也故見死矣睘謂直視如驚貌睘音瓊陽明終者口目動作善驚妄言色黄其上下經盛不仁則終矣足陽明脉起於鼻交頞中下循鼻外入上齒縫中還出俠口環唇下交承漿却循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支别者從大迎前下人迎循喉嚨入缺盆下鬲手陽明脉起於手循臂至肩上出於柱骨之會上下入缺盆絡肺其支别者從缺盆上頸貫頰下入齒中還出俠口交人中左之右右之左上俠鼻鼽抵足陽明新校正云按甲乙經鼽作孔無抵足陽明四字故終則口目動作也口目動作謂目睒睒而鼓頷也胃病則惡人與火聞木音則惕然而驚又罵詈罵詈而不避親踈故善驚妄言也黄者上色上謂手脉下謂足脉也經盛謂面目頸頷足跗腕脛皆躁盛而動也不仁謂不知善惡如是者皆氣竭之微也故終矣睒音閃少陰終者面黑齒長而垢腹脹閉上下不通而終矣手少陰氣絶則血不流足少陰氣絶則骨不耎骨硬則齦上宣故齒長而積垢污血壞則皮色死故面色如漆而不赤也足少陰脉從腎上貫肝鬲入肺中手少陰脉起於心中出屬心系下鬲絡少腹故其終則腹脹閉上下不通也新校正云詳王注云骨不耎骨硬按難經及甲乙經云骨不濡則肉弗能著當作骨不濡手少陰脉絡少腹甲乙經作絡小腸太陰終者腹脹閉不得息善噫善嘔足太陰脉行從股内前廉入腹屬脾絡胃上鬲手太陰脉起於中焦下絡大腸還循胃口上鬲屬肺故終則如是也靈樞經曰足太陰之脉動則病食則嘔腹脹善噫也嘔則逆逆則面赤嘔則氣逆故面赤新校正云按靈樞經作善噫噫則嘔嘔則逆不逆則上下不通不通則面黑皮毛焦而終矣嘔則上通故但面赤不嘔則下已閉上復不通心氣外燔故皮毛焦而終矣何者足太陰脉支别者復從胃别上鬲注心中由是則皮毛焦乃心氣外燔而然也厥陰終者中熱嗌乾善溺心煩甚則舌卷卵上縮而終矣足厥陰絡循脛上皋結於莖其正經入毛中下過陰器上抵少腹俠胃上循喉嚨之後入頏顙手厥陰脉起於胸中出屬心包故終則中熱嗌乾善溺心煩矣靈樞經曰肝者筋之合也筋者聚於陰器而脉絡於舌本故甚則舌卷卵上縮也又以厥陰之脉過陰器故爾新校正云按甲乙經皋作睾過作環此十二經之所敗也手三陰三陽足三陰三陽則十二經也敗謂氣終盡而敗壞也新校正云詳十二經終又出靈樞經與素問重黄帝内經素問補註釋文卷之十二

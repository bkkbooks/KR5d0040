front:
  text: 黄帝内經素問補註釋文卷之三十六今一
  hash: sha256:40c9304b4f6ccd6ec644dab69f092d8d37a15106ccf8ea7ccb30eab65a4db662
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_SJB_036-210225a, image: sjb/21/210225a.png}
body:
  text: 唐太僕令啓玄子王氷次註宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤調經論篇黄帝問曰余聞刺法言有餘寫之不足補之何謂有餘何謂不足岐伯對曰有餘有五不足亦有五帝欲何問帝曰願盡聞之岐伯曰神有餘有不足氣有餘有不足血有餘有不足形有餘有不足志有餘有不足凡此十者其氣不等也神屬心氣屬肺血屬肝形屬脾志屬腎以各有所宗故不等也帝曰人有精氣津液四支九竅五藏十六部三百六十五節乃生百病百病之生皆有虚實今夫子乃言有餘有五不足亦有五何以生之乎針經曰兩神相薄合而成形常先身生是謂精上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣腠理發泄汗出腠理是謂津津之滲於空竅留而不行者爲液也十六部者謂手足二九竅九五藏五合爲十六部也三百六十五節者非謂骨節是神氣岀入之處也針經曰所謂節之交三百六十五會皆神氣出入游行之所非骨節也言人身所有則多所舉則少病生之數何以論之岐伯曰皆生於五藏也謂五神藏也夫心藏神肺藏氣肝藏血脾藏肉腎藏志而此成形言所以病皆生於五臓者何哉以内臓五神而成形也志意通内連骨髓而成身形五臓志意者通言五神之大凡也骨髓者通言表裏之成化也言五神通泰骨髓化成身形既立乃五臓互相爲有矣新校正云按甲乙經無五臓二字五臓之道皆出於經隧以行血氣血氣不和百病乃變化而生是故守經隧焉隧潜道也經脉伏行而不見故謂之經隧焉血氣者人之神邪侵之則血氣不正血氣不正故變化而百病乃生矣然經脉者所以决死生處百病調虚實故守經隧焉新校正云按甲乙經經隧作經渠義各同帝曰神有餘不足何如岐伯曰神有餘則笑不休神不足則悲心之藏也針經曰心藏脉脉舍神心氣虚則悲實則笑不休也悲一爲憂誤也新校正云詳王注云悲一爲憂誤也按甲乙經及太素并全元起注本并作憂皇甫士安云心虚則悲悲則憂心實則笑笑則喜夫心之與肺脾之與心互相成也故喜發於心而成於肺思發於脾而成於心一過其節則二臓俱傷楊上善云心之憂在心變動也肺之憂在肺之志是則肺主秋憂爲正也心主於夏變而生憂也血氣未并五臓安定邪客於形灑淅起於毫毛未入於經絡也故命曰神之微并謂并合也未與邪合故曰未并也灑淅寒貌也始起於毫毛尚在於小絡神之微病故命曰神之微也新校正云按甲乙經灑淅作悽厥太素作洫泝楊上善云洫毛孔也水逆流曰泝謂邪氣入於腠理如水逆流於洫帝曰補寫奈何岐伯曰神有餘則寫其小絡之血出血勿之深斥無中其大經神氣乃平邪入小絡故可寫其小絡之脉出其血勿深推針針深則傷肉以邪居小絡故不欲令針中大經也絡血既出神氣自平斥推也小絡孫絡也針經曰經脉爲裏支而横者爲絡絡之别者爲孫絡平謂平調也新校正云詳此注引針經曰與三部九候論注兩引之在彼云靈樞而此曰針經則王氏之意指靈樞爲針經也按今素問注中引針經者多靈樞之文但以靈樞今不全故未得盡知也神不足者視其虚絡按而致之刺而利之無出其血無泄其氣以通其經神氣乃平但通經脉令其和利抑按虚絡令其氣致以神不足故不欲出血及泄氣也新校正云按甲乙經按作切利作和帝曰刺微奈何覆前初起於毫毛未入於經絡者岐伯曰按摩勿釋著針勿斥移氣於不足神氣乃得復按摩其病處手不釋散著針於病處亦不推之使其人神氣内朝於針移其人神氣令自充足則微病自去神氣乃得復常新校正云按甲乙經及太素云移氣於足无不字楊上善云按摩使氣至於踵也帝曰善氣有餘不足奈何岐伯曰氣有餘則喘欬上氣不足則息利少氣肺之臓也肺臓氣息不利則喘針經曰肺氣虚則鼻息利少氣實則喘喝胷憑仰息也血氣未并五臓安定皮膚微病命曰白氣微泄肺合皮其色白故皮膚微病命曰白氣微泄帝曰補寫奈何岐伯曰氣有餘則寫其經隧無傷其經無出其血無泄其氣不足則補其經隧無出其氣氣謂榮氣也針寫若傷其經則血出而榮氣泄脫故不欲出血泄氣但寫其衛氣而已針補則又宜謹閉穴俞然其衛氣亦不欲泄之新校正云按楊上善云經隧者手太陰之别從手太陰走手陽明乃是手太陰向手陽明之道欲道藏府陰陽故補寫皆從正經别走之絡寫其陰經别走之路不得傷其正經也帝曰刺微奈何覆前白氣微泄者岐伯曰按摩勿釋出針視之曰我將深之適人必革精氣自伏邪氣散亂無所休息氣泄腠理眞氣乃相得亦謂按摩其病處也革皮也我將深之適人必革者謂其深而淺刺之也如是脇從則人懷懼色故精氣潜伏也以其調適於皮精氣潜伏邪無所據故亂散而無休息發泄於腠理也邪氣既泄眞氣乃與皮腠相得矣新校正云按楊上善云革改也夫人聞樂至則身心忻悅聞痛及體情必改異忻悅則百體俱縱改革則情志必拒拒則邪氣消伏帝曰善血有餘不足奈何岐伯曰血有餘則怒不足則恐肝之藏也針經曰肝藏血肝氣虚則恐實則怒新校正云按全元起本恐作悲甲乙經及太素同血氣未并五臓安定孫絡外溢則經有留血絡有邪盛則入於經故云孫絡外溢則經有留血帝曰補寫奈何岐伯曰血有餘則寫其盛經出其血不足則視其虚經内針其脉中久留而視新校正云按甲乙經云乆留之血至太素同脉大疾出其針無令血泄脉盛滿則血有餘故出之經氣虚則血不足故無令血泄也乆留疾出是謂補之針解論曰徐而疾則實義與此同帝曰刺留血奈何岐伯曰視其血絡刺出其血無令惡血得入於經以成其疾血絡滿者刺按出之則惡色之血不得入於經脉帝曰善形有餘不足奈何岐伯曰形有餘則腹脹涇溲不利不足則四支不用脾之藏也針經曰脾氣虚則四支不用五臓不安實則腹脹涇溲不利涇大便溲小便也新校正云按楊上善云涇作經女人月經也血氣未并五臓安定肌肉蠕動命曰微風邪薄肉分衛氣不通陽氣内鼓故肉蠕動新校正云按全元起本及甲乙經蠕作溢太素作濡帝曰補寫奈何岐伯曰形有餘則寫其陽經不足則補其陽絡并謂之經絡帝曰刺微奈何岐伯曰取分肉間無中其經無傷其絡衛氣得復邪氣乃索衛氣者所以温分肉而充皮膚肥腠理而司開闔故肉蠕動即取分肉間但開肉分以出其邪故無中其經無傷其絡衛氣復舊而邪氣盡索散盡也帝曰善志有餘不足奈何岐伯曰志有餘則腹脹飧泄不足則厥腎之藏也針經曰腎藏精精含志腎氣虚則厥實則脹脹謂脹起厥謂逆行上衝也足少陰脉下行令氣不足故隨衝脉逆行而上衝也血氣未并五臓安定骨節有動腎合骨故骨有邪薄則骨節叚動或骨節之中如有物鼓動之也帝曰補寫奈何岐伯曰志有餘則寫然筋血新校正云按甲乙經及太素云寫然筋血者出其血楊上善云然筋當是然谷下筋再詳諸處引然谷者多云然骨之前血者疑少骨之二字前字誤作筋字不足則補其復溜然謂然谷足少陰滎也在内踝之前大骨之下陷者中血絡盛則泄之其刺可入同身寸之三分留三呼若灸者可灸三壯復溜足少陰經也在内踝上同身寸之二寸陷者中刺可入同身寸之三分留三呼若灸者可灸五壯帝曰刺未并奈何岐伯曰即取之無中其經邪所乃能立虚不求穴俞而直取居邪之處故云即取之新校正云按甲乙經邪所作以去其邪帝曰善余已聞虚實之形不知其何以生岐伯曰氣血以并陰陽相傾氣亂於衛血逆於經血氣離居一實一虚衛行脉外故氣亂於衛血行經内故血逆於經血氣不和故一虚一實血并於陰氣并於陽故爲驚狂氣并於陽則陽氣外盛故爲驚狂血并於陽氣并於陰乃爲炅中氣并於陰則陽氣内盛故爲熱中炅熱也血并於上氣并於下心煩惋善怒血并於下氣并於上亂而喜忘上謂鬲上下謂鬲下帝曰血并於陰氣并於陽如是血氣離居何者爲實何者爲虚岐伯曰血氣者喜温而惡寒寒則泣不能流温則消而去之泣謂如雪在水中凝住而不行去也是故氣之所并爲血虚血之所并爲氣虚氣并於血則血少故血虚血并於氣則氣少故氣虚帝曰人之所有者血與氣耳今夫子乃言血并爲虚氣并爲虚是無實乎岐伯曰有者爲實無者爲虚氣并於血則血無血并於氣則氣無故氣并則無血血并則無氣今血與氣相失故爲虚焉氣并於血則血失其氣血并於氣則氣失其血故曰血與氣相失絡之與孫脉俱輸於經血與氣并則爲實焉血之與氣并走於上則爲大厥厥則暴死氣復反則生不反則死帝曰實者何道從來虚者何道從去虚實之要願聞其故岐伯曰夫陰與陽皆有俞會陽注於陰陰滿之外陰陽匀平以充其形九候若一命曰平人平人謂平和之人夫邪之生也或生於陰或生於陽其生於陽者得之風雨寒暑其生於陰者得之飲食居處陰陽喜怒帝曰風雨之傷人奈何岐伯曰風雨之傷人也先客於皮膚傳入於孫脉孫脉滿則傳入於絡脉絡脉滿則輸於大經脉血氣與邪并客於分腠之間其脉堅大故曰實實者外堅充滿不可按之按之則痛帝曰寒濕之傷人奈何岐伯曰寒濕之中人也皮膚不收新校正云按全元起云不收不仁也甲乙經及太素云皮膚收无不字肌肉堅緊榮血泣衛氣去故曰虚虚者聶辟氣不足按之則氣足以温之故快然而不痛聶謂聶皺辟謂辟叠也新校正云按甲乙經作攝辟太素作攝辟帝曰善陰之生實奈何實謂邪氣盛也岐伯曰喜怒不節則陰氣上逆上逆則下虚下虚則陽氣走之故曰實矣新校正云按經云喜怒不節則陰氣上逆疑剩喜字帝曰陰之生虚奈何虚謂精氣奪也岐伯曰喜則氣下悲則氣消消則脉虚空因寒飲食寒氣熏滿新校正云按甲乙經作動臓則血泣氣去故曰虚矣帝曰經言陽虚則外寒陰虚則内熱陽盛則外熱陰盛則内寒余已聞之矣不知其所由然也經言謂上古經言也岐伯曰陽受氣於上焦以温皮膚分肉之間今寒氣在外則上焦不通上焦不通則寒氣獨留於外故寒慄慄謂振慄也帝曰陰虚生内熱奈何岐伯曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通新校正云按甲乙經作下焦不通胃氣熱熱氣熏胸中故内熱甚用其力致勞倦也貪役不食故穀氣不盛也帝曰陽盛生外熱奈何岐伯曰上焦不通利則皮膚緻宻腠理閉塞玄府不通新校正云按甲乙經及太素無玄府二字衛氣不得泄越故外熱外傷寒毒内薄諸陽寒外盛則皮膚收皮膚收則腠理宻故衛氣蓄聚無所流行矣寒氣外薄陽氣内爭積火内燔故生外熱也帝曰陰盛生内寒奈何岐伯曰厥氣上逆寒氣積於胷中而不寫不寫則温氣去寒獨留則血凝泣凝則脉不通新校正云按甲乙經作腠理不通其脉盛大以濇故中寒温氣謂陽氣也陰逆内滿則陽氣去於皮外也帝曰陰與陽并血氣以并病形以成刺之奈何岐伯曰刺此者取之經隧取血於營取氣於衛用形哉因四時多少高下營主血陰氣也衛主氣陽氣也夫行針之道必先知形之長短骨之廣狹循三備法通計身形以施分寸故曰用形也四時多少高下具在下篇帝曰血氣以并病形以成陰陽相傾補寫奈何岐伯曰寫實者氣盛乃内針針與氣俱内以開其門如利其户針與氣俱出精氣不傷邪氣乃下外門不閉以出其疾摇大其道如利其路是謂大寫必切而出大氣乃屈言欲開其穴而泄其氣也切謂急也言急出其針也針經論曰疾而徐則虚者疾出針而徐按之也大氣謂大邪氣也屈謂退屈也帝曰補虚奈何岐伯曰持針勿置以定其意候呼内針氣出針入針空四塞精無從去方實而疾出針氣入針出熱不得還閉塞其門邪氣布散精氣乃得存動氣候時新校正云按甲乙經作動無後時近氣不失遠氣乃來是謂追之言但宻閉穴俞勿令其氣散泄也近氣謂已至之氣遠氣謂未至之氣也欲動經氣而爲補補者皆必候水刻氣之所在而刺之是謂得時而調之追言補也針經曰追而濟之安得無實則此謂也帝曰夫子言虚實者有十生於五臓五臓五脉耳夫十二經脉皆生其病新校正云按甲乙經云皆生百病太素同今夫子獨言五臓夫十二經脉者皆絡三百六十五節節有病必被經脉經脉之病皆有虚實何以合之岐伯曰五臓者故得六府與爲表裏經絡支節各生虚實其病所居隨而調之從其左右經氣支節而調之病在脉調之血脉者血之府脉實血實脉虚血虚由此脉病而調之血也新校正云按全元起本及甲乙經云病在血調之也病在血調之絡血病則絡脉易故調之於絡也病在氣調之衛衛主氣故氣病而調之衛也病在肉調之分肉候寒熱而取之病在筋調之筋適緩急而刺熨之病在骨調之骨察輕重而調之燔針劫刺其下及與急者調筋法也筋急則燒針而劫刺之病在骨焠針藥熨調骨法也焠針火針也病不知所痛兩蹻爲上兩蹻謂陰陽蹻脉陰蹻之脉出於照海陽蹻之脉出於申脉申脉在足外踝下陷者中容爪甲新校正云按刺腰痛注云在踝下五分刺可入同身寸之三分留六呼若灸者可灸三壯照海在足内踝下刺可入同身寸之四分留六呼若灸者可灸三壯身形有痛九候莫病則繆刺之莫病謂無病也繆刺者刺絡脉左痛刺右右痛刺左痛在於左而右脉病者巨刺之巨刺者刺經脉脉左痛刺右右痛刺左必謹察其九候針道備矣黄帝内經素問補註釋文卷之三十六

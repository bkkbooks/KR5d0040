front:
  text: 黄帝内經素問補註釋文卷之二十九宜五
  hash: sha256:8e3282f7ec8d33a6121407f4ddb8ddad6a38816738091c83aaa863db4bf25766
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_SJB_029-210177b, image: sjb/21/210177b.png}
body:
  text: 唐太僕令啓玄子王氷次註宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤大奇論篇肝滿腎滿肺滿皆實即爲腫滿謂脉氣滿實也腫謂癰腫也藏氣滿乃如是肺之雍喘而兩胠滿肺藏氣而外主息其脉支别者從肺系横岀腋下故喘而兩胠滿也新校正云詳肺雍肝雍腎雍甲乙經俱作癰肝雍兩胠滿卧則驚不得小便肝之脉循股陰入髦中環陰器抵少腹上貫肝鬲布脇肋故胠滿不得小便也肝主驚駭故卧則驚腎雍脚下至少腹滿新校正云按甲乙經脚下作胠下脚當作胠不得言脚下至少腹也脛有大小髀胻大跛易偏枯衝脉者經脉之海與少陰之絡俱起於腎下出於氣街循陰股内廉斜入膕中循胻骨内廉并少陰之經下入内踝之後入足下其上行者出齊下同身寸之三寸故如是若血氣變易爲偏枯也心脉滿大癇瘛筋攣心脉滿大則肝氣下流熱氣内薄筋乾血涸故癇瘛而筋攣肝脉小急癇瘛筋攣肝養筋内藏血肝氣受寒故癇瘛而筋攣脉小急者寒也肝脉騖暴有所驚駭騖謂馳騖言其迅急也陽氣内薄故發爲驚也脉不至若瘖不治自已肝氣若厥厥則脉不通厥退則脉復通矣又其脉布脅肋循喉嚨之後故脉不至若瘖不治亦自已腎脉小急肝脉小急心脉小急不鼓皆爲瘕小急爲寒甚不鼓則血不流血不流而寒薄故血内凝而爲瘕也腎肝并沉爲石水肝脉入陰内貫少腹腎脉貫脊中絡膀胱兩藏并藏氣熏衝脉自腎下絡於胞令水不行化故堅而結然腎主水水冬冰水宗於腎腎象水而沉故氣并而沉名爲石水新校正云詳腎肝并沉至下并小弦欲驚全元起本在厥論中王氏移於此并浮爲風水脉浮爲風下焦主水風薄於下故名風水并虚爲死腎爲五藏之根肝爲發生之主二者不足是生主俱微故死并小弦欲驚脉小弦爲肝腎俱不足故爾腎脉大急沉肝脉大急沉皆爲疝疝者寒氣結聚之所爲也夫脉沉爲實脉急爲痛氣實寒薄聚故爲絞痛爲疝心脉搏滑急爲心疝肺脉沉搏爲肺疝皆寒薄於藏故也三陽急爲瘕三陰急爲疝太陽受寒血凝爲瘕太陰受寒氣聚爲疝二陰急爲癇厥二陽急爲驚二陰少陰也二陽陽明也新校正云詳三陽急爲瘕至此全元起本在厥論王氏移於此脾脉外鼓沉爲腸澼乆自已外鼓謂鼓動於臂外也肝脉小緩爲腸澼易治肝脉小緩爲脾乘肝故易治腎脉小搏沉爲腸澼下血小爲陰氣不足摶爲陽氣乘之熱在下焦故下血也血温身熱者死血温身熱是陰氣喪敗故死心肝澼亦下血肝藏血心養血故澼皆下血也二藏同病者可治心火肝木木火相生故可治之其脉小沉濇爲腸澼心肝脉小而沉濇者澼也其身熱者死熱見七日死腸澼下血而身熱者是火氣内絶去心而歸於外也故死火成數七故七日死胃脉沉鼓濇胃外鼓大心脉小堅急皆鬲偏枯外鼓謂不當尺寸而鼓擊於臂外側也男子發左女子發右陽主左陰主右故爾陰陽應象大論曰左右者陰陽之道路此其義也不瘖舌轉可治三十日起偏枯之病瘖不能言腎與胞脉内絶也胞脉繫於腎腎之脉從腎上貫肝鬲入肺中循喉嚨俠舌本故氣内絶則瘖不能言也其從者瘖三歲起從謂男子發左女子發右也病順左右而瘖不能言三歲治之乃能起年不滿二十者三歲死以其五藏始定血氣方剛藏始定則易傷氣方剛則甚費易傷甚費故三歲死脉至而搏血血刃身熱者死血衂爲虚脉不應搏今反脉摶是氣極乃然故死脉來懸鈎浮爲常脉以其爲血衂者之常脉也脉至如喘名曰暴厥喘謂卒來盛急去而便衰如人之喘狀也暴厥者不知與人言所謂暴厥之候如此脉至如數使人暴驚脉數爲熱熱則内動肝心故驚三四日自已數爲心脉木被火干病非肝生不與邪合故三日後四日自除所以爾者木生數三也脉至浮合如浮波之合後至者凌前速疾而動無常候也浮合如數一息十至以上是經氣予不足也微見九十日死脉至如火薪然是心精之予奪也草乾而死薪然之火焰瞥瞥不定其形而便絶也焰弋念切脉至如散葉是肝氣予虚也木葉落而死如散葉之隨風不常其狀新校正云按甲乙經散葉作叢棘脉至如省客省客者脉塞而鼓是腎氣予不足也懸去棗華而死脉塞而鼓謂纔見不行旋復去也懸謂如懸物物動而絶去也脉至如丸泥是胃精予不足也榆莢落而死如珠之轉是謂九泥脉至如横格是膽氣予不足也禾熟而死脉長而堅如横木之在指下也脉至如弦縷是胞精予不足也病善言下霜而死不言可治胞之脉繫腎腎之脉俠舌本今氣不足者則當不能言今反善言是眞氣内絶去腎外歸於舌也故死脉至如交漆交漆者左右傍至也微見三十日死左右傍至言如歷漆之交左右反戾新校正云按甲乙經交漆作交棘脉至如涌泉浮鼓肌中太陽氣予不足也少氣味韭英而死如水泉之動但出而不入脉至如頽土之狀按之不得是肌氣予不足也五色先見黑白壘發死頽土之狀謂浮之大而虚耎按之則無新校正云按甲乙經頽土作委土脉至如懸雍懸雍者浮揣切之益大是十二俞之予不足也水凝而死如顙中之懸雍也新校正云按全元起本懸雍作懸離元起注云懸離者言脉與肉不相得也脉至如偃刀偃刀者浮之小急按之堅大急五藏菀熟寒熱獨并於腎也如此其人不得坐立春而死菀積也熟熱也脉至如丸滑不直手不直手者按之不可得也是大腸氣予不足也棗葉生而死脉至如華者令人善恐不欲坐卧行立常聽是小腸氣予不足也季秋而死脉至如華謂似華虚弱不可正取也小腸之脉上入耳中故常聽也脉解篇太陽所謂腫腰脽痛者正月太陽寅寅太陽也脽謂臀肉也正月三陽生主建寅三陽謂之太陽故曰寅太陽也正月陽氣出在上而陰氣盛陽未得自次也正月雖三陽生而天氣尚寒以其尚寒故曰陰氣盛陽未得自次次謂立王之次也故腫腰脽痛也以其脉抵腰中入貫臀過髀樞故爾病偏虚爲跛者正月陽氣凍解地氣而出也所謂偏虚者冬寒頗有不足者故偏虚爲跛也以其脉循股内後廉合膕中下循腨過外踝之後循京骨至小指外側故也新校正詳王氏其脉循股内殊非按甲乙經太陽流注不到股内股内乃髀外之誤當云髀外後廉所謂强上引背者陽氣大上而爭故强上也强上謂頸項禁强也甚則引背矣所以爾者以其脉從腦出别下項背故也所謂耳鳴者陽氣萬物盛上而躍故耳鳴也以其脉支别者從巔至耳上角故爾所謂甚則狂巅疾者陽盡在上而陰氣從下下虚上實故狂巔疾也以其脉上額交巅上入絡腦還出其支别者從巅至耳上角故狂巅疾也頂上曰巔所謂浮爲聾者皆在氣也亦以其脉至耳故也所謂入中爲瘖者陽盛已衰故爲瘖也陽氣盛入中而薄於胞腎則胞絡腎絡氣不通故瘖也胞之脉繫於腎腎之脉俠舌本故瘖不能言内奪而厥則爲瘖俳此腎虚也俳廢也腎之脉與衝脉并出於氣街循陰股内廉斜入膕中循胻骨内廉及内踝之後入足下故腎氣因奪而不順則舌瘖足廢故云此腎虚也新校正云詳王注云腎之脉與衝脉并出按甲乙經是腎之絡非腎之脉况王注痿論并奇病論大奇論并云腎之絡則此脉字當爲絡少陰不至者厥也少陰腎脉也若腎氣内脫則少陰脉不至也少陰之脉不至則太陰之氣逆上而行也少陽所謂心脅痛者言少陽盛也盛者心之所表也心氣逆則少陽盛心氣宜木外鑠肺金故盛者心之所表也九月陽氣盡而陰氣盛故心脅痛也足少陽脉循脅裏出氣街心主脉循胷出脇故爾火墓於戌故九月陽氣盡而陰氣盛也所謂不可反側者陰氣藏物也物藏則不動故不可反側也所謂甚則躍者躍謂跳躍也九月萬物盡衰草木畢落而墮則氣去陽而之陰氣盛而陽之下長故謂躍亦以其脉循髀陽岀膝外廉下入外輔之前直下抵絶骨之端下出外踝之前循足跗故氣盛則令人跳躍也陽明所謂洒洒振寒者陽明者午也五月盛陽之陰也陽盛以明故云午也五月夏至一陰氣上陽氣降下故云盛陽之陰也陽盛而陰氣加之故洒洒振寒也陽氣下陰氣升故云陽氣盛而陰氣加之也所謂脛腫而股不收者是五月盛陽之陰也陽者衰於五月而一陰氣上與陽始爭故脛腫而股不收也以其脉下髀抵伏菟下入膝髕中下循胻外廉下足跗入中指内間又其支别者下膝三寸而别以下入中指外間故爾所謂上喘而爲水者陰氣下而復上上則邪客於藏府間故爲水也藏脾也府胃也足太陰脉從足走腹足陽明脉從頭走足今陰氣微下而太陰上行故云陰氣下而復上也復上則所下之陰氣不散客於脾胃之間化爲水也所謂胷痛少氣者水氣在藏府也水者陰氣也陰氣在中故胷痛少氣也水停於下則氣鬱於上氣鬱於上則肺滿故胷痛少氣也所謂甚則厥惡人與火聞木音則惕然而驚者陽氣與陰氣相薄水火相惡故惕然而驚也所謂欲獨閉户牖而處者陰陽相薄也陽盡而陰盛故欲獨閉户牖而居惡喧故爾所謂病至則欲乘高而歌棄衣而走者陰陽復爭而外并於陽故使之棄衣而走也新校正云詳所謂甚則厥至此與前陽明脉解論相通所謂客孫脉則頭痛鼻劓腹腫者陽明并於上上者則其孫絡太陰也故頭痛鼻劓腹腫也太陰所謂病脹者太陰子也十一月萬物氣皆藏於中故曰病脹陰氣太盛太陰始於子故云子也以其脉入腹屬脾絡胃故病脹也所謂上走心爲噫者陰盛而上走於陽明陽明絡屬心故曰上走心爲噫也按靈樞經說足陽明流注并無至心者太陰脉說云其支别者復從胃别上鬲注心中法應以此絡爲陽明絡也新校正云詳王氏以足陽明流注并無至心者按甲乙經陽明之脉上通於心循咽出於口宜其經言陽明絡屬心爲噫王氏安得謂之無所謂食則嘔者物盛滿而上溢故嘔也以其脉屬脾絡胃上鬲俠咽故也所謂得後與氣則快然如衰者十一月陰氣下衰而陽氣且出故曰得後與氣則快然如衰也少陰所謂腰痛者少陰者腎也十月萬物陽氣皆傷故腰痛也少陰者腎脉也腰爲腎府故腰痛也所謂嘔咳上氣喘者陰氣在下陽氣在上諸陽氣浮無所依從故嘔咳上氣喘也以其脉從腎上貫肝鬲入肺中故病如是所謂色色新校正云詳色色字疑誤不能乆立乆坐起則目𥆨𥆨無所見者萬物陰陽不定未有主也秋氣始至微霜始下而方殺萬物陰陽内奪故目𥆨𥆨無所見也所謂少氣善怒者陽氣不治陽氣不治則陽氣不得出肝氣當治而未得故善怒善怒者名曰煎厥所謂恐如人將捕之者秋氣萬物未有畢去陰氣少陽氣入陰陽相薄故恐也所謂惡聞食臭者胃無氣故惡聞食臭也所謂面黑如地色者秋氣内奪故變於色也所謂咳則有血者陽脉傷也陽氣未盛於上而脉滿滿則咳故血見於鼻也厥陰所謂㿗疝婦人少腹腫者厥陰者辰也三月陽中之陰邪在中故曰㿗疝少腹腫也以其脉循陰股入髦中環陰器抵少腹故爾所謂腰脊痛不可以俯仰者三月一振榮華萬物一俯而不仰也所謂㿗癃疝膚脹者曰陰亦盛而脉脹不通故曰㿗癃疝也所謂甚則嗌乾熱中者陰陽相薄而熱故嗌乾也此一篇殊與前後經文不相連接别釋經脉發病之源與靈樞經流注略同所指殊異新校正云詳此篇所解多甲乙經是動所生之病雖復少有異處大概則不殊矣刺要論篇黄帝問曰願聞刺要岐伯對曰病有浮沉刺有淺深各至其理無過其道道謂氣所行之道也過之則内傷不及則生外壅壅則邪從之過之内傷以太深也不及外壅以妄益他分之氣也氣益而外壅故邪氣隨虚而從之也淺深不得反爲大賊内動五藏後生大病賊謂私害動謂動亂然不及則外壅過之則内傷既且外壅内傷是爲大病之階漸爾故曰後生大病也故曰病有在毫毛腠理者有在皮膚者有在肌肉者有在脉者有在筋者有在骨者有在髓者毛之長者曰毫皮之文理曰腠理然二者皆皮之可見也是故刺毫毛腠理無傷皮皮傷則内動肺肺動則秋病温瘧泝泝然寒慄針經曰凡刺有五以應五藏一曰半刺半刺者淺内而疾發針令針傷多如拔髮狀以取皮氣此肺之應也然此其淺以應於肺腠理毫毛猶應更淺當取髮根淺深之半爾肺之合皮王於秋氣故肺動則秋病温瘧泝泝然寒慄也泝音素刺皮無傷肉肉傷則内動脾脾動則七十二日四季之月病腹脹煩不嗜食脾之合肉寄王四季又其脉從股内前廉入腹屬脾絡胃上鬲俠咽連舌本散舌下其支别者復從胃别上鬲注心中故傷肉則痛脾脾動則四季之月病腹脹煩而不嗜食也七十二日四季之月者謂三月六月九月十二月各十二日後土寄王十八日也刺肉無傷脉脉傷則内動心心動則夏病心痛心之合脉王於夏氣眞心少陰之脉起於心中出屬心系心包心主之脉起於胸中出屬心包平人氣象論曰藏眞通於心故脉傷則動心心動則夏病心痛刺脉無傷筋筋傷則内動肝肝動則春病熱而筋弛肝之合筋王於春氣針經曰熱則筋緩故筋傷則動肝肝動則春病熱而筋弛緩弛猶縱緩也弛施是切刺筋無傷骨骨傷則内動腎腎動則冬病脹腰痛腎之合骨王於冬氣腰爲腎府故骨傷則動腎腎動則冬病腰痛也腎之脉直行者從腎上貫肝鬲故脹也刺骨無傷髓髓傷則銷鑠胻酸體解㑊然不去矣髓者骨之充針經曰髓海不足則腦轉耳鳴胻酸眩冒故髓傷則腦髓銷鑠胻酸體解㑊然不去也銷鑠謂髓腦銷鑠解㑊謂强不强弱不弱熱不熱寒不寒解解㑊㑊然不可名之也腦髓銷鑠骨空之所致也鑠詩若切眩音懸黄帝内經素問補註釋又卷之二十九

body:
  text: 唐太僕令啓玄子王氷次註宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤六元正紀大論篇下帝曰善五運氣行主歲之紀其有常數乎岐伯曰臣請次之甲子甲午歲上少隂火中太宫土運下陽明金熱化二新校正云詳對化從標成數正化從本生數甲子之年熱化七燥化九甲午之年熱化二燥化四雨化五新校正云按本論正文云太過不及其數何始太過者其數成不及者其數生土常以生也甲年太宫土運太過故言雨化五五土數也燥化四所謂正化日也正氣化也其化上鹹寒中苦熱下酸熱所謂藥食宜也新校正云按玄珠云下苦熱又按至真要大論云熱淫所勝平以鹹寒燥淫於内治以苦温此云下酸熱疑誤也乙丑乙未歲上太陰土中少商金運下太陽水熱化寒化勝復同所謂邪氣化日也灾七宫新校正云詳七宫西室兌位天任司也灾之方位以運之當方言濕化五新校正云詳太陰正司於未對司於丑其化皆五以生數也不以成數者土王四季不得正方又天有九宫不可至十清化四新校正云按本論下文云不及者其數生乙年少商金運不及故言清化四四金生數也寒化六新校正云詳乙丑寒化六乙未寒化一所謂正化日也其化上苦熱中酸和下甘熱所謂藥食宜也新校正云按玄珠云上酸平下甘温又按至眞要大論云濕淫所勝平以苦熱寒淫於内治以甘熱丙寅丙申歲新校正云詳丙申之歲申金生水水化之令轉盛司天相火爲病減半上少陽相火中太羽水運下厥隂木火化二新校正云詳丙寅火化二丙申火化七寒化六風化三新校正云詳丙寅風化八丙申風化三所謂正化日也其化上鹹寒中鹹温下辛温所謂藥食宜也新校正云按玄珠云下辛凉又按至眞要大論云火淫所勝平以鹹冷風淫於内治以辛凉丁卯歲會丁酉歲新校正云詳丁年正月壬寅爲干德符便爲平氣勝復不至運同正角金不勝木木亦不灾土又丁卯年得卯木佐之即上陽明不能灾之上陽明金中少角木運下少陰火清化熱化勝復同所謂邪氣化日也灾三宫新校正云詳三宫東室震位天衝司燥化九新校正云詳丁卯燥化九丁酉燥化四風化三熱化七新校正云詳丁卯熱化二丁酉熱化七所謂正化日也其化上苦小温中辛和下鹹寒所謂藥食宜也新校正云按至眞要大論云燥淫所勝平以苦熱熱淫於内治以鹹寒又玄珠云上苦熱戊辰戊戌歲上太陽水中大徵火運新校正云詳此上見太陽火化减半下太陰土寒化六新校正云詳戊辰寒化六戊戌寒化一熱化七濕化五所謂正化日也其化上苦温中甘和下甘温所謂藥食宜也新校正云按至真要大論云寒淫所勝平以辛熱濕淫於内治以苦熱又玄珠云上甘温下酸平己巳己亥歲上厥陰木中少宫土運新校正云詳至九月甲戌月己得甲戌方還正宫下少陽相火風化清化勝復同所謂邪氣化日也災五宫新校正云按五常政大論云其眚四維又天元玉册云中室天禽司非維宫同正宫寄位二宫坤位風化三新校正云詳己巳風化八己亥風化三濕化五火化八新校正云詳己巳熱化七己亥熱化三所謂正化日也其化上辛涼中甘和下鹹寒所謂藥食宜也新校正云按至眞要大論云風淫所勝平以辛凉火淫於内治以鹹冷庚午同天符庚子歲同天符上少陰火中太商金運新校正云詳庚午金令减半以上見少陰君火年干亦爲火故也庚子年子是水金氣相得與庚午年又異下陽明金熱化七新校正云詳庚午年熱化二燥化四庚子年熱化七燥化九清化九燥化九所謂正化日也其化上鹹寒中辛温下酸温所謂藥食宜也新校正云按玄珠云下苦熱又按至眞要大論云燥淫於内治以苦熱辛未同歲會辛丑歲同歲會上太陰土中少羽水運新校正云詳此至七月丙申月水還正羽下太陽水雨化風化勝復同所謂邪氣化日也灾一宫新校正云詳一宫北室坎位天玄司雨化五寒化一新校正云詳此以運與在泉俱水故只言寒化一寒化一者少羽之化氣也若太陽在泉之化則辛未寒化一辛丑寒化六所謂正化日也其化上苦熱中苦和下苦熱所謂藥食宜也新校正云按玄珠云上酸和下甘温又按至眞要大論云濕淫所勝平以苦熱寒淫於内治以甘熱壬申同天符壬寅歲同天符上少陽相火中太角木運下厥陰木火化二新校正云詳壬申熱化七壬寅熱化二風化八新校正云詳此以運與在泉俱木故只言風化八風化八乃大角之運化也若厥陰在泉之化則壬申風化三壬寅風化八所謂正化日也其化上鹹寒中酸和下辛凉所謂藥食宜也癸酉同歲會癸卯歲同歲會上陽明金中少徵火運新校正云詳此五月遇戊午月火還正徵下少陰火寒化雨化勝復同所謂邪氣化日也災九宫新校正云詳九宫離位南室天英司燥化九新校正云詳癸酉燥化四癸卯燥化九熱化二新校正云詳此以運與在泉俱火故只言熱化二熱化二者少徵之運化也若少陰在泉之化則癸酉熱化七癸卯熱化二所謂正化日也其化上苦小温中鹹温下鹹寒所謂藥食宜也新校正云按玄珠云上苦熱甲戌歲會同天符甲辰歲歲會同天符上太陽水中太宫土運下太陰土寒化六新校正云詳甲戌寒化一甲辰寒化六濕化五新校正云詳此以運與在泉俱土故只言濕化五所謂正化日也其化上苦熱中苦温下苦温所謂藥食宜也新校正云按玄珠云上甘温下酸平又按至眞要大論云寒淫所勝平以辛熱濕淫於内治以苦熱乙亥乙巳歲上厥陰木中少商金運新校正云詳乙亥年三月得庚辰月見干德符即氣還正商火未得王而先平火不勝則水不復又亥是水得力年故火不勝也乙巳年火來小勝巳爲火佐於勝也即於二月中氣君火時化日火來行勝不得水復遺三月庚辰月乙見庚而氣自全金還正商下少陽相火熱化寒化勝
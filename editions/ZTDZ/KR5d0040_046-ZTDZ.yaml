如是者皆通微甚甚者發速微者發徐也山行之候則以松虎期之凉行亦以麻黄爲候秋冬則以梧桐蟬葉候之火鬱之發太虚腫翳大明不彰腫翳謂赤氣也大明日也新校正云詳經注中腫字疑誤炎火行大暑至山澤燔燎材木流津廣厦騰烟土浮霜鹵止水乃减蔓草焦黄風行惑言濕化乃後太陰太陽在上寒濕流於太虚心火應天鬱抑而莫能彰顯寒濕盛已火乃與行陽氣火光故山澤燔燎井水减少妄作訛言雨已愆期也濕化乃後謂陽亢主時氣不爭長故先旱而後雨也故民病少氣瘡瘍癰腫脅腹胸背面首四支䐜憤臚脹瘍痱嘔逆瘈瘲骨痛節乃有動注下温瘧腹中暴痛血溢流注精液乃少目赤心熱甚則瞀悶懊憹善暴死火鬱而怒爲土水相持客主皆然悉無深犯則無咎也但熱已勝寒則爲摧敵而熱從心起是神氣孤危不速救之天眞將竭故死火之用速故善暴死憹音農刻中大温汗濡玄府其乃發也其氣四刻終謂晝夜水刻終盡之時也大温次熱也玄府謂汗空也汗濡玄府謂早行身蒸熱也刻盡之時陰盛於此反無凉氣是陰不勝陽熱既已萌故當怒發也新校正云詳土火俱發四氣者何蓋火有二位爲水發之所又大熱發於申未故火鬱之發動復則靜陽極反陰濕令乃化乃成火怒燥金陽極過亢畏火求救土中土救熱金發爲飄驟繼爲時雨氣乃和平故萬物由是乃生長化成壯極則反盛亦何長也華發水凝山川冰雪焰陽午澤怫之先兆也謂君火王時有寒至也故歲君火發亦待時也有怫之應而後報也皆觀其極而乃發也大發無時水隨火也應爲先兆發必後至故先應而後發也物不可以終壯觀其壯極則怫氣作焉有鬱則發氣之常也謹候其時病可與期失時反歲五氣不行生化收藏政無恒也人失其時則候無期準也帝曰水發而雹雪土發而飄驟木發而毁折金發而清明火發而曛昧何氣使然岐伯曰氣有多少發有微甚微者當其氣甚者兼其下徵其下氣而見可知也六氣之下各有承氣也則如火位之下水氣承之水位之下土氣承之土位之下木氣承之木位之下金氣承之金位之下火氣承之君位之下陰精承之各徵其下則象可見矣故發兼其下則與本氣殊異帝曰善五氣之發不當位者何也言不當其正月也岐伯曰命其差謂差四時之正月位也新校正云按至眞要大論云勝復之作動不當位或後時而至其故何也岐伯曰夫氣之生化與其衰盛異也寒暑温凉盛衰之用其在四維故陽之動始於温盛於暑陰之動始於清盛於寒春夏秋冬各差其分故大要曰彼春之暖爲夏之暑彼秋之忿爲冬之怒謹按四維斥候皆歸其終可見其始可知彼論勝復之不當位此論五氣之發不當位所論勝復五發之事則異而命其差之義則同帝曰差有數乎言日數也岐伯曰後皆三十度而有奇也後謂四時之後也差三十日餘八十七刻半氣猶未去而甚盛也度日也四時之後今當爾新校正云詳注云八十七刻半當作四十三刻又四十分刻之三十帝曰氣至而先後者何謂未應至而至太早應至而至反太遲之類也正謂氣至在期先後岐伯曰運太過則其至先運不及則其至後此候之常也帝曰當時而至者何也岐伯曰非太過非不及則至當時非是者眚也當時謂應日刻之期也非應先後至而有先後至者皆爲灾眚灾也帝曰善氣有非時而化者何也岐伯曰太過者當其時不及者歸其己勝也冬雨春凉秋熱冬寒之類皆爲歸己勝也帝曰四時之氣至有早晏高下左右其候何如岐伯曰行有逆順至有遲速故太過者化先天不及者化後天氣有餘故化先氣不足故化後帝曰願聞其行何謂也岐伯曰春氣西行夏氣北行秋氣東行冬氣南行觀萬物生長收藏如斯言故春氣始於下秋氣始於上夏氣始於中冬氣始於標春氣始於左秋氣始於右冬氣始於後夏氣始於前此四時正化之常察物以明之可知也故至高之地冬氣常在至下之地春氣常在高山之巔盛夏冰雪污下川澤嚴冬草生常在之義足明矣新校正云按五常政大論云地有高下氣有温凉高者氣寒下者氣熱必謹察之帝曰善天地陰陽視而可見何必思諸冥昩演法推求智極心勞而無所得耶黄帝問曰五運六氣之應見六化之正六變之紀何如岐伯對曰夫六氣正紀有化有變有勝有復有用有病不同其候帝欲何平帝曰願盡聞之岐伯曰請遂言之遂盡也夫氣之所至也厥陰所至爲和平初之氣木之化少陰所至爲暄二之氣君火也太陰所至爲埃溽四之氣土之化少陽所至爲炎暑三之氣相火也陽明所至爲清勁五之氣金之化太陽所至爲寒雰終之氣水之化時化之常也四時氣正化之常候厥陰所至爲風府爲璺啓璺微裂也啓開拆也少隂所至爲大火府爲舒榮太陰所至爲雨府爲員盈物承土化質皆盈滿又雨界地緑文見如環爲員化明矣少陽所至爲熱府爲行出藏熱者出行也陽明所至爲司殺府爲庚蒼庚更也更易也代也太陽所至爲寒府爲歸藏物寒故歸藏也司化之常也厥陰所至爲生爲風摇木之化少陰所至爲榮爲形見火之化太陰所至爲化爲雲雨土之化少陽所至爲長爲蕃鮮火之化陽明所至爲收爲霧露金之化太陽所至爲藏爲周宻水之化氣化之常也厥陰所至爲風生終爲肅風化以生則風生也肅靜也新校正云按六微㫖大論云風位之下金氣承之故厥陰爲風生而終爲肅也少陰所至爲熱生中爲寒熱化以生則熱生也陰精承上故中爲寒也新校正云按六微㫖大論云少陰之上熱氣治之中見太陽故爲熱生而中爲寒也又云君位之下陰精承之亦爲寒之義也太陰所至爲濕生終爲注雨濕化以生則濕生也太陰在上故終爲注雨新校正云按六微㫖大論云土位之下風氣承之王注云疾風之後雨乃零濕爲風吹化而爲雨故太陰爲濕生而終爲注雨也少陽所至爲火生終爲蒸溽火化以生則火生也陽在上故終爲蒸溽新校正云按六微㫖大論云相火之下水氣承之故少陽爲火生而終爲蒸溽也陽明所至爲燥生終爲涼燥化以生則燥生也陰在上故終爲涼新校正云詳此六氣俱先言本化次言所反之氣而獨陽明之化言燥生終爲涼未見所反之氣再尋上下文義當云陽明所至爲涼生終爲燥方與諸氣之義同貫蓋以金位之下火氣承之故陽明爲清生而終爲燥也太陽所至爲寒生中爲温寒化以生則寒生也陽在内故中爲温新校正云按五運行大論云太陽之上寒氣治之中見少陰故爲寒生而中爲温德化之常也風生毛形熱生翮形濕生倮形火生羽形燥生介形寒生鱗形六化皆爲主歲及間氣所在而各化生常無替也非德化則無能化生也翮胡革切厥隂所至爲毛化形之有毛者少陰所至爲羽化有羽翮飛行之類太陰所至爲倮化無毛羽鱗甲之類少陽所至爲羽化薄明羽翼蜂蟬之類非翎羽之羽也陽明所至爲介化有甲之類太陽所至爲鱗化身有鱗也德化之常也厥隂所至爲生化温化也少隂所至爲榮化暄化也太隂所至爲濡化濕化也少陽所至爲茂化熱化也陽明所至爲堅化涼化也太陽所至爲藏化寒化也布政之常也厥陰所至爲飄怒大凉飄怒木也大凉下承之金氣也少陰所至爲大暄寒大暄君火也寒下承之陰精也太陰所至爲雷霆驟注烈風雷霆驟注土也烈風下承之木氣也少陽所至爲飄風燔燎霜凝飄風旋轉風也霜凝下承之水氣也陽明所至爲散落温散落金也温下承之火氣也太陽所至爲寒雪冰雹白埃霜雪冰雹水也白埃下承之土氣也氣變之常也變謂變常平之氣而爲甚用也甚用不已則下承之氣兼行故皆非本氣也厥陰所至爲撓動爲迎隨風之性也少陰所至爲高明焰爲曛焰陽焰也曛赤黄色也太陰所至爲沉陰爲白埃爲晦暝暗蔽不明也少陽所至爲光顯爲彤雲爲曛光顯電也流光也明也彤赤色也少陰氣同陽明所至爲烟埃爲霜爲勁切爲凄鳴殺氣也太陽所至爲剛固爲堅芒爲立寒化也令行之常也令行則庶物無違厥隂所至爲裏急筋緛縮故急少陰所至爲瘍胗身熱火氣生也太陰所至爲積飲否隔土氣也少陽所至爲嚏嘔爲瘡瘍火氣生也陽明所至爲浮虚浮虚薄腫按之復起也太陽所至爲屈伸不利病之常也厥陰所至爲支痛少陰所至爲驚惑惡寒戰慄譫妄譫亂言也今詳慄字當作慓太陰所至爲蓄滿少陽所至爲驚躁瞀昧暴病陽明所至爲鼽尻陰股膝髀腨胻足病太陽所至爲腰痛病之常也厥陰所至爲緛戾少陰所至爲悲妄衂衊爲行勁太陰所至爲中滿霍亂吐下少陽所至爲喉痹耳鳴满謂溢食不下也陽明所至爲脅痛皴揭身皮䴸象太陽所至爲寢汗痙寢汗謂睡中汗發於胸嗌頸掖之間也俗誤呼爲盜汗痙巨郢切病之常也厥陰所至爲脅痛嘔泄泄謂利也少陰所至爲語笑太陰所至爲重胕腫胕腫謂肉汎按之不起也少陽所至爲暴注瞤瘛暴死陽明所至爲鼽嚏太陽所至爲流泄禁止病之常也凡此十二變者報德以德報化以化報政以政報令以令氣高則高氣下則下氣後則後氣前則前氣中則中氣外則外位之常也氣報德報化謂天地氣也高下前後中外謂生病所也手之陰陽其氣高足之陰陽其氣下足太陽氣在身後足陽明氣在身前足少陰太陰厥陰氣在身中足少陽氣在身側各隨所在言氣變生病象也故風勝則動不寧也新校正云詳風勝則動至濕勝則濡泄五句與陰陽應象大論文重而注不同熱勝則腫熱勝氣則爲丹熛勝血則爲癰膿勝骨肉則爲跗腫按之不起燥勝則乾乾於外則皮膚皺揭乾於内則精血枯涸乾於氣及津液則肉乾而皮著於骨寒勝則浮浮謂浮起按之起見也濕勝則濡泄甚則水閉胕腫濡泄水利也跗腫肉汎按之陷而不起也水閉則逸於皮中也隨氣所在以言其變耳帝曰願聞其用也岐伯曰夫六氣之用各歸不勝而爲化用謂施其化氣故太陰雨化施於太陽太陽寒化施於少陰新校正云詳此當云少陰少陽少陰熱化施於陽眀陽明燥化施於厥陰厥陰風化施於太陰各命其所在以徵之也帝曰自得其位何如岐伯曰自得其位常化也帝曰願聞所在也岐伯曰命其位而方月可知也隨氣所在以定其方六分占之則日及地分無差也帝曰六位之氣盈虚何如岐伯曰太少異也太者之至徐而常少者暴而亡力强而作不能乆長故暴而無也亡無也帝曰天地之氣盈虚何如岐伯曰天氣不足地氣隨之地氣不足天氣從之運居其中而常先也運謂木火土金水各主歲者也地氣勝則歲運上升天氣勝則歲運下降上升下降運氣常先遷降也惡所不勝歸所同和隨運歸從而生其病也非其位則變生變生則病作故上勝則天氣降而下下勝則地氣遷而上勝謂多也上多則自降下多則自遷多少相移氣之常也新校正云按六微㫖要大論云升已而降降者謂天降已而升升者謂地天氣下降氣流於地地氣上升氣騰於天故高下相召升降相因而變作矣此亦升降之義也勝多少而差其分多則遷降多少則遷降少多少之應有微有甚之異也微者小差甚者大差甚則位易氣交易則大變生而病作矣大要曰甚紀五分徵紀七分其差可見此之謂也以其五分七分之所以知天地陰陽過差矣帝曰善論言熱無犯熱寒無犯寒余欲不遠寒不遠熱奈何岐伯曰悉乎哉問也發表不遠熱攻裏不遠寒汗泄故用熱不遠熱下利故用寒不遠寒皆以其不住於中也如是則夏可用熱冬可用寒不發不泄而無畏忌是謂妄造法所禁也皆謂不獲已而用之也差秋冬亦同法新校正云按至眞要大論云發不遠熱無犯温凉帝曰不發不攻而犯寒犯熱何如岐伯曰寒熱内賊其病益甚以水濟水以火濟火適足以更生病豈唯本病之益甚乎帝曰願聞無病者何如岐伯曰無者生之有者甚之無病者犯禁猶能生病况有病者而求輕减不亦難乎帝曰生者何如岐伯曰不遠熱則熱至不遠寒則寒至寒至則堅否腹滿痛急下利之病生矣食已不饑吐利腥穢亦寒之疾也熱至則身熱吐下霍亂癰疽瘡瘍瞀鬱注下瞤瘛腫脹嘔鼽衂頭痛骨節變肉痛血溢血泄淋閟之病生矣暴瘖冒味目不識人躁擾狂越妄見妄聞罵詈驚癇亦熱之病帝曰治之奈何岐伯曰時必順之犯者治以勝也春宜凉夏宜寒秋宜温冬宜熱此時之宜用不可不順然犯熱治以寒犯寒治以熱犯春宜用凉犯秋宜用温是以勝也犯熱治以鹹寒犯寒治以甘熱犯凉治以苦温犯温治以辛凉亦勝之道也黄帝問曰婦人重身毒之何如岐伯曰有故無殞亦無殞也故謂有大堅癥瘕痛甚不堪則治以破積愈痛之藥是謂不救必死盡死救之蓋存其大也雖服毒不死也上無殞言母必全亦無殞言子亦不死也帝曰願聞其故何謂也岐伯曰大積大聚其可犯也衰其大半而止過者死衰其大半不足以害生故雖大半則止其藥若過禁待盡毒氣内餘無病可攻以當毒藥毒攻不已則敗損中和故過則死新校正云詳此婦人身重二節與上下文義不接疑他卷脫簡於此帝曰善鬱之甚者治之奈何天地五行應運有鬱折不伸之甚者岐伯曰木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之然調其氣達謂吐之令其條達也發謂汗之令其疏散也奪謂下之令無壅礙也泄謂滲泄解表利小便也折謂抑之制之衝逆也通是五法乃氣可平調後乃觀其虚盛而調理之也過者折之以其畏也所謂寫之過大過也大過者以其味寫之以鹹寫腎酸寫肝辛寫肺甘寫脾苦寫心過者畏寫故謂寫爲畏也帝曰假者何如岐伯曰有假其氣則無禁也正氣不足臨氣陷之假寒熱温凉以資四正之氣則可以熱犯熱以寒犯寒以温犯温以凉犯涼也所謂主氣不足客氣勝也客氣謂六氣更臨之氣主氣謂五藏應四時正王春夏秋冬也帝曰至哉聖人之道天地大化運行之節臨御之紀陰陽之政寒暑之令非夫子孰能通之請藏之靈蘭之室署曰六元正紀非齋戒不敢示愼傳也新校正云詳此與氣交變大論末文重黄帝内經素問補註釋文卷之四十六

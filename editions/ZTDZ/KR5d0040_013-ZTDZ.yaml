front:
  text: 黄帝内經素問補註釋文卷之十三慎十一
  hash: sha256:0362aba19034482ffa8381e43963cfbda769d4336758d0ae5fb18a9232a63846
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_SJB_013-210069a, image: sjb/21/210069a.png}
body:
  text: 唐太僕令啓玄子王氷次註宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤脉要精微論篇黄帝問曰診法何如岐伯對曰診法常以平旦陰氣未動陽氣未散飲食未進經脉未盛絡脉調匀氣血未亂故乃可診有過之脉動謂動而降卑散謂散布而出也過謂異於常候也新校正云按脉經及千金方有過之脉作過此非也王注陰氣未動謂動而降卑按金匱眞言論云平旦至日中天之陽陽中之陽也則平旦爲一日之中純陽之時陰氣未動耳何有降卑之義切脉動靜而視精眀察五色觀五藏有餘不足六府强弱形之盛衰以此參伍决死生之分切謂以指切近於脉也精明穴名也在明堂左右兩目内青也以近於目故曰精明言以形氣盛衰脉之多少視精明之間氣色觀藏府不足有餘參其類伍以决死生之分夫脉者血之府也府聚也言血之多少皆聚見於經脉之中也故刺法論曰脉實血實脉虚血虚此其常也反此者病由是故也長則氣治短則氣病數則煩心大則病進夫脉長爲氣和故治短爲不足故病數急爲熱故煩心大爲邪盛故病進也長脉者往來長短脉者往來短數脉者往來急遠大脉者往來滿大也上盛則氣高新校正云按全元起本高作鬲下盛則氣脹代則氣衰細則氣少新校正云按太素細作滑濇則心痛上謂寸口下謂尺中盛謂盛滿代脉者動而中止不能自還細脉者動如莠蓬濇脉者往來時不利而蹇濇也渾渾革至如涌泉病進而色弊綿綿其去如弦絶死渾渾言脉氣濁亂也革至者謂脉來弦而大實而長也如涌泉者言脉汨汨但出而不返也綿綿言微微似有而不甚應手也如弦絶者言脉卒斷如弦之絶去也若病候日進而色弊惡如此之脉皆必死也新校正云按甲乙經及脉經作渾渾革革至如涌泉病進而危弊弊綽綽其去如弦絶者死夫精明五色者氣之華也五氣之精華者上見爲五色變化於精明之間也六節藏象論曰天食人以五氣五氣入鼻藏於心肺上使五色修明此則明察五色也赤欲如帛裹朱不欲如赭白欲如鵝羽不欲如鹽新校正云按甲乙經作白欲如白璧之澤不欲如堊太素兩出之青欲如蒼璧之澤不欲如藍黄欲如羅裏雄黄不欲如黄土黑欲如重漆色不欲如地蒼新校正云按甲乙經作炭色五色精微象見矣其壽不久赭色鹽色籃色黃土色地蒼色見者皆精微之敗象故其壽不乆夫精明者所以視萬物別白黑審短長以長爲短以白爲黑如是則精衰矣誡其誤也夫如是垎皆精明衰乃誤也五藏者中之守也身形之中五神安守之所也此皆明觀五藏也新校正云按甲乙經及太素守作府中威藏滿氣勝傷恐者聲如從室中言是中氣之濕也中謂腹中盛謂氣盛藏謂肺藏氣勝謂勝於呼吸而喘息變易也夫腹中氣盛肺藏充滿氣勝息變善傷於恐言聲不發如在室中者皆腹中有濕氣乃爾也言而徹終日乃復言者此奪氣也若言音徹細聲斷不續甚奪其氣乃如是也衣被不斂言語善惡不避親疏者此神明之亂也倉廪不藏者是門户不要也倉廪謂脾胃門户謂魄門靈蘭秘典論曰脾胃者倉廪之官也五藏别論曰魄門亦爲五藏使水穀不得乆藏也魄門則肚門也要謂禁要水泉不止者是膀胱不藏也水泉謂前陰之流注也得守者生失守者死夫如是倉廪不藏氣勝傷恐衣被不斂水泉不止者皆神氣得其所守則生失其所守則死也夫何以知神氣之不守即衣被不斂言語善惡不避親踈則亂之證也亂甚則不守於藏也夫五藏者身之强也藏安則神守神守則身强故曰身之强也頭者精明之府頭傾視深精神將奪矣背者胷中之府背曲肩隨府將壞矣腰者腎之府轉摇不能腎將憊矣膝者筋之府屈伸不能行則僂附新校正云按别本附一作俯太素作跗筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣皆以所居所由而爲之府也得强則生失强則死强謂中氣强固以鎮守也岐伯曰新校正云詳此岐伯曰前無問反四時者有餘爲精不足爲消應太過不足爲精應不足有餘爲消陰陽不相應病名曰關格廣陳其脉應也夫反四時者諸不足皆爲血氣消損諸有餘皆爲邪氣勝精也陰陽之氣不相應合不得相營故曰關格帝曰脉其四時動奈何知病之所在奈何知病乍在内奈何知病乍在外奈何請問此五者可得聞乎言欲順四時及陰陽相應之狀候也岐伯曰新校正云詳此對與問不甚相應脉四時動病之所在病之所變按文頗對病在内在外之說後文殊不相當請言其與天運轉大也指可見陰陽之運轉以明陰陽之不可見也萬物之外六合之内天地之變陰陽之應彼春之暖爲夏之暑彼秋之忿爲冬之怒四變之動脉與之上下六合謂四方上下也春暖爲夏暑言陽生而至盛秋忿爲冬怒言陰少而之壯也忿一爲急言秋氣勁急也新校正云按全元起本注暖作緩以春應中規春脉耎弱輕虚而滑如規之象中外皆然故以春應中規夏應中矩夏脉洪大兼之滑數如矩之象可正平之故以夏應中矩秋應中衡秋脉如毛輕濇而散如稱衡之象高下必平故以秋應中衡冬應中權冬脉如石兼沉而滑如秤權之象下遠於衡故以冬應中權也以秋中衡冬中權者言脉之高下異處如此爾此則隨陰陽之氣故有斯四應不同也是故冬至四十五日陽氣微上陰氣微下夏至四十五日陰氣微上陽氣微下陰陽有時與脉爲期期而相失如脉所分分之有期故知死時察陰陽升降之準則知經脉遞遷之象審氣候遞遷之失則知氣血分合之期分期不差故知人死之時節微妙在脉不可不察察之有紀從陰陽始推陰陽升降精微妙用皆在經脉之氣候是以不可不察故始以陰陽爲察候之綱紀始之有經從五行生生之有度四時爲宜言始所以知有經脉之察候司應者何哉蓋從五行衰王而爲準度也徵求太過不及之形證皆以應四時者爲生氣所宜也新校正云按太素宜作數補寫勿失與天地如一有餘者寫之不足者補之是則應天地之常道也然天地之道損有餘而補不足是法天地之道也寫補之宜工切審之其治氣亦然得一之情以知死生曉天地之道補寫不差既得一情亦可知生死之準的是故聲合五音色合五行脉合陰陽聲表宫商角徵羽故合五音色見青黄赤白黑故合五行脉彰寒暑之休王故合陰陽之氣也是知陰盛則夢涉大水恐懼陰爲水故夢涉水而恐懼也陰陽應象大論曰水爲陰陽盛則夢大火燔灼陽爲火故夢大火而燔灼也陰陽應象大論曰火爲陽陰陽俱盛則夢相殺毁傷亦類交爭之氣象也上盛則夢飛下盛則夢墮氣上則夢上故飛氣下則夢下故墮甚飽則夢予内有餘故甚饑則夢取内不足故肝氣盛則夢怒肝在志爲怒肺氣盛則夢哭肺聲哀故夢哭新校正云詳是知陰盛則夢涉大水恐懼至此乃靈樞之文誤置於斯仍少心脾腎氣盛所夢今具甲乙經中短蟲多則夢聚衆身中短蟲多則夢聚衆長蟲多則夢相擊毁傷長蟲動則内不安内不安則神躁擾故夢是矣新校正云詳此二句亦不當出此應他經脫簡文也是故持脉有道虚靜爲保前明脉應此舉持脉所由也然持脉之道必虚其心靜其志乃保定盈虚而不失新校正云按甲乙經保作寳春日浮如魚之遊在波雖岀猶未全浮夏日在膚泛泛乎萬物有餘泛泛平貌陽氣大盛脉氣亦象萬物之有餘易取而洪大也秋日下膚蟄蟲將去隨陽氣之漸降故曰下膚何以明陽氣之漸降蟄蟲將欲藏去也冬日在骨蟄蟲周宻君子居室在骨言脉深沉也蟄蟲周宻言陽氣伏藏君子居室此人事也故曰知内者按而紀之知内者謂知脉氣也故按而爲之綱紀知外者終而始之知外者謂知色象故以五色終而復始此六者持脉之大法見是六者然後可以知脉之遷變也新校正云詳此前對帝問脉其四時動奈何之事心脉搏堅而長當病舌卷不能言搏謂搏擊於手也諸脉摶堅而長者皆爲勞心而藏脉氣虚極也心手少陰脉從心系上俠咽喉故令舌卷短而不能言也其耎而散者當消環自已諸脉耎散皆爲氣實血虚也消謂消散環謂環周言其經氣如環之周當其火王自消散也新校正云按甲乙經環作渴肺脉搏堅而長當病唾血肺虚極則絡逆絡逆則血泄故唾出也其耎而散者當病灌汗至令不復散發也汗泄玄府津液奔凑寒水灌洗皮宻汗藏因灌汗藏故言灌汗至令不復散發也灌謂灌洗盛暑多爲此也新校正云詳下文諸藏各言色而心肺二藏不言色者疑闕文也肝脉搏堅而長色不青當病墜若搏因血在脅下令人喘逆諸脉見本經之氣而色不應者皆非病從内生是外病來勝也夫肝藏之脉端直以長故言曰色不青當病墜若搏也肝主兩脅故曰因血在脅下也肝厥陰脉布脅肋循喉嚨之後其支别者復從肝别貫鬲上注肺今血在脅下則血氣上熏於肺故令人喘逆也其耎而散色澤者當病溢飲溢飲者渴暴多飲而易入肌皮腸胃之外也面色浮澤是爲中濕血虚中濕水液不消故言當病溢飲也以水飲滿溢故滲溢易而入肌皮腸胃之外也新校正云按甲乙經易作溢胃脉搏堅而長其色赤當病折髀胃虚色赤火氣救之心象於火故色赤也胃陽明脉從氣衝下髀抵伏兔故病則髀如折也其耎而散者當病食痹痹痛也胃陽明脉其支别者從大迎前下人迎循喉嚨入缺盆下鬲屬胃絡脾故食則痛悶而氣不散也新校正云詳謂痹爲痛其義則未通脾脉搏堅而長其色黄當病少氣脾虚則肺无所養肺主氣故少氣也其耎而散色不澤者當病足胻腫若水狀也色氣浮澤爲水之候色不潤澤故言若水狀也脾太陰脉自上内踝前廉上踹内循胻骨後交出厥陰之前上循膝股内前廉入腹故病足胻腫也腎脉搏堅而長其色黄而赤者當病折腰色氣黄赤是心脾干腎腎受客陽故腰如折也腰爲腎府故病發於中其耎而散者當病少血至令不復也腎主水以生化津液今腎氣不化故當病少血至令不復也帝曰新校正云詳帝曰至以其勝治之愈全元起本在湯液篇診得心脉而急此爲何病病形何如岐伯曰病名心疝少腹當有形也心爲牡藏其氣應陽今脉反寒故爲疝也諸脉勁急者皆爲寒形謂病形也帝曰何以言之岐伯曰心爲牡藏小腸爲之使故曰少腹當有形也少腹小腸也靈蘭秘典論曰小腸者受盛之宫以其受盛故形居於内也帝曰診得胃脉病形何如岐伯曰胃脉實則脹虚則泄脉實者氣有餘故脹滿脉虚者氣不足故泄利新校正云詳此前對帝問知病之所在帝曰病成而變何謂岐伯曰風成爲寒熱生氣通天論曰因於露風乃生寒熱故風成爲寒熱也癉成爲消中癉謂濕熱也熱積於内故變爲消中也消中之證善食而瘦新校正云詳王注以善食而瘦爲消中按本經多食數溲爲之消中善食而瘦乃是食㑊之證當云善食而溲數厥成爲巔疾厥謂氣逆也氣逆上而不已則變爲上巅之疾也久風爲飧泄久風不變但在胃中則食不化而泄利也以肝氣内合而乘胃故爲是病焉陰陽應象大論曰風氣通於肝故内應於肝也脉風成爲癘經風論曰風寒客於脉而不去名曰癘風又曰癘者有榮氣熱胕其氣不清故使其鼻柱壞而色敗皮膚瘍潰然此則癩也夫如是者皆脉風成結變而爲也病之變化不可勝數新校正云詳此前對帝問知病之所變奈何帝曰諸癰腫筋攣骨痛此皆安生安何也言何以生之岐伯曰此寒氣之腫八風之變也八風八方之風也然癰腫者傷東南西南風之變也筋攣骨痛者傷東風北風之變也靈樞經曰風從東方來名曰嬰兒風其傷人也外在筋紐風從東南來名曰弱風其傷人也外在於肌風從西南來名曰謀風其傷人也外在於肉風從北方來名曰大剛風其傷人也外在於骨由此四風之變而三病乃生故下問對是也帝曰治之奈何岐伯曰此四時之病以其勝治之愈也勝謂勝剋也如金勝木木勝土土勝水水勝火火勝金此則相勝也帝曰有故病五藏發動因傷脉色各何以知其乆暴至之病乎重以色氣明前五藏堅長之脉有自病故病及因傷候也岐伯曰悉乎哉問也徵其脉小色不奪者新病也氣乏而神猶强也徵其脉不奪其色奪者此乆病也神持而邪凌其氣也徵其脉與五色俱奪者此乆病也神與氣俱衰也徵其脉與五色俱不奪者新病也神與氣俱强也肝與腎脉并至其色蒼赤當病毁傷不見血已見血濕若中水也肝色蒼心色赤赤色見當脉洪腎脉見當色黑今腎脉來反見心色故當因傷而血不見也若已見血則是濕氣及水在腹中也何者以心腎脉色中外之候不相應也尺内兩傍則季脇也尺内謂尺澤之内也兩傍各謂尺之外側也季脇近腎尺主之故尺内兩傍則季脇也尺外以候腎尺裏以候腹中尺外謂尺之外側尺裏謂尺之内側也次尺外下兩傍則季脇之分季脇之上腎之分季脇之内則腹之分也附上左外以候肝内以候鬲肝主賁賁鬲也右外以候胃内以候脾脾居中故以内候之胃爲市故以外候之上附上右外以候肺内以候胸中肺葉垂外故以外候之胸中主氣管故以内候之左外以候心内以候膻中心主鬲中也膻中則氣海也嗌也新校正云詳王氏以膻中爲嗌也疑誤前以候前後以候後上前謂左寸口下前謂胷之前膺及氣海也上後謂右寸口下後謂胷之後背及氣管也上竟上者胷喉中事也下竟下者少腹腰股膝脛足中事也上竟上至魚際也下竟下謂盡尺之脉動處也少腹胞氣海在膀胱腰股膝脛足中之氣動靜皆分其近遠及連接處所名目以候之知其善惡也粗大者陰不足陽有餘爲熱中也粗大謂脉洪大也脉洪爲熱故曰熱中來疾去徐上實下虚爲厥巅疾來徐去疾上虚下實爲惡風也亦脉狀也故中惡風者陽氣受也以上虚故陽氣受也有脉俱沉細數者少陰厥也尺中之有脉沉細數者是腎少陰氣逆也何者尺脉不當見數有數故言厥也俱沉細數者言左右尺中也沉細數散者寒熱也陽干於陰陰氣不足故寒熱也正理論曰數爲陽浮而散者爲胷仆脉浮爲虚散爲不足氣虚而血不足故爲頭眩而仆倒也胷音順諸浮不躁者皆在陽則爲熱其有躁者在手言大法也但浮不躁則病在足陽脉之中躁者病在手陽脉之中也故又曰其有躁者在手也陽爲火氣故爲熱諸細而沉者皆在陰則爲骨痛其有靜者在足細沉而躁則病生於手陰脉之中靜者病生於足陰脉之中也故又曰其有靜者在足也陰主骨故骨痛數動一代者病在陽之脉也泄及便膿血代止也數動一代是陽氣之生病故云病在陽之脉所以然者以泄利及膿血脉乃爾諸過者切之澀者陽氣有餘也滑者陰氣有餘也陽氣有餘則血少故脉澀陰氣有餘則氣多故脉滑也新校正云詳氣多疑誤當是血多也陽氣有餘爲身熱無汗陰氣有餘爲多汗身寒血少氣多斯可知也陰陽有餘則無汗而寒陽餘無汗陰餘身寒若陰陽有餘則當無汗而寒也推而外之内而不外有心腹積也脉附臂筋取之不審推筋令遠使脉外行内而不出外者心腹中有積乃爾推而内之外而不内身有熱也脉遠臂筋推之令近遠而不近是陽氣有餘故身有熱也推而上之上而不下腰足清也推筋按之尋之而上脉上涌盛是陽氣有餘故腰足冷也新校正云按甲乙經上而不下作下而不上推而下之下而不上頭項痛也推筋按之尋之而下脉沉下掣是陽氣有餘故頭項痛也新校正云按甲乙經下而不上作上而不下按之至骨脉氣少者腰脊痛而身有痹也陰氣大過故爾黄帝内經素問補註釋文卷之十三

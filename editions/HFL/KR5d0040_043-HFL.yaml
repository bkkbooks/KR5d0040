front:
  text: 黄帝内經素問補註釋文卷之四十三榮一
  hash: sha256:3933268ec41d58f6b0c1659a87679bafcf5c7f54ed03c25ab547ae97ca5a6775
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_043-001a, image: hfl/0658/0658-004.png}
body:
  text: 唐太僕令啓玄子王氷次註宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤五常政大論篇下黄帝曰天不足西北左寒而右凉地不滿東南右熱而左温其故何也面巽言也岐伯曰隂陽之氣高下之理大小之異也高下謂地形大小謂隂陽之氣盛衰之異今中原地形西北方高東南方下西方凉北方寒東方温南方熱氣化猶然矣東南方陽也陽者其精降於下故右熱而左温陽精下降故地氣以温而和之於下矣陽氣生於東而盛於南故東方温而南方熱氣之多少明矣西北方陰也陰者其精奉於上故左寒而右涼陰精奉上故地以寒而和之於上矣陰氣生於西而盛於北故西方凉而北方寒君面巽而言臣面乾而對也新校正云詳天地不足陰陽之說亦具陰陽應象大論中是以地有高下氣有温凉高者氣寒下者氣熱新校正云按六元正紀大論云至高之地冬氣常在至下之地春氣常在故適寒凉者脹之温熱者瘡下之則脹已汗之則瘡已此湊理開閉之常大小之異耳西北東南言其大也夫以氣候驗之中原地形所居者悉以居高則寒處下則熱嘗試觀之高山多雪平川多雨高山多寒平川多熱則高下寒熱可徵見矣中華之地凡有高下之大者東西南北各三分也其一者自漢蜀江南至海也二者自漢江北至平遥縣也三者自平遥北山北至蕃界北海也故南分大熱中分寒熱兼半北分大寒南北分外寒熱尤極大熱之分其寒微大寒之分其熱微然而登涉極高山頂則南面北面寒熱懸殊榮枯倍異也又東西高下之别亦三矣其一者自汧源縣西至沙州二者自開封縣西至汧源縣三者自開封縣東至滄海也故東分大温中分温凉兼半西分大凉大温之分其寒五分之二大凉之分其熱五分之二温凉分外温凉尤極變爲大暄大寒也約其大凡如此然九分之地寒極於東北熱極於西南九分之地其中有高下不同地高處則濕下處則燥此一方之中小異也若大而言之是則高下之有二也何者中原地形西高北高東下南下今百川滿凑東之滄海則東南西北高下可知一爲地形高下故寒熱不同二則陰陽之氣有少有多故表温凉之異爾今以氣候驗之乃春氣西行秋氣東行冬氣南行夏氣北行以中分校之自開封至汧源氣候正與歷候同以東行校之自開封至滄海每一百里秋氣至晩一日春氣發早一日西行校之自汧源縣西至蕃界磧石其以南向及西北東南者每四十里春氣發晩一日秋氣至早一日北向及東北西南者每一十五里春氣發晚一日秋氣至早一日南行校之川形有北向東北西南者每五百里新校正云按别本作十五里陽氣行晚一日陰氣行早一日南向及東南西北川每一十五里熱氣至早一日寒氣至晚一日廣平之地則每五十里陽氣發早一日寒氣至晩一日北行校之川形有南向及東南西北者每二十五里陽氣行晚一日陰氣行早一日北向及東北西南川每一十五里寒氣至早一日熱氣至晩一日廣平之地則每二十里熱氣行晩一日寒氣至早一日大率如此然高處峻處冬氣常在平處下處夏氣常在觀其雪零草茂則可知矣然地土固有弓形川蛇形川月形川地勢不同生殺榮枯地同而天異凡此之類有離向丙向巽向乙向震向處則春氣早至秋氣晩至早晩校十五日有丁向坤向庚向兌向辛向乾向坎向艮向處則秋氣早至春氣晩至早晩亦校二十日是所謂帶山之地也審觀向背氣候可知寒凉之地凑理開少而閉多閉多則陽氣不散故適寒凉腹必脹也濕熱之地凑理開多而閉少開多則陽氣發散故往温熱皮必瘡也下之則中氣不餘故脹已汗之則陽氣外泄故瘡已帝曰其於壽夭何如言土地居人之壽夭岐伯曰陰精所奉其人壽陽精所降其人夭陰精所奉高之地也陽精所降下之地也陰方之地陽不妄泄寒氣外持邪不數中而正氣堅守故壽延陽方之地陽氣耗散發泄無度風濕數中眞氣傾竭故夭折即事驗之今中原之境西北方衆人壽東南方衆人夭其中猶各有微甚爾此壽夭之大異也方者審之乎帝曰善其病者治之奈何岐伯曰西北之氣散而寒之東南之氣收而温之所謂同病異治也西方北方人皮膚閉腠理宻人皆食熱故宜散宜寒東方南方人皮膚踈腠理開人皆食冷故宜收宜温散謂温浴使中外條達收謂温中不解表也今土俗皆反之依而療之則反甚矣新校正云詳分方爲治亦具異法方宜論中故曰氣寒氣凉治以寒凉行水漬之氣温氣熱治以温熱强其内守必同其氣可使平也假者反之寒方以寒熱方以熱温方以温凉方以凉是正法也是同氣也行水漬之謂湯浸漬也平謂平調也若西方北方有冷病假熱方温方以除之東方南方有熱疾須凉方寒方以療者則反上正法以取之帝曰善一州之氣生化壽夭不同其故何也岐伯曰高下之理地勢使然也崇高則陰氣治之污下則陽氣治之陽勝者先天陰勝者後天先天謂先天時也後天謂後天時也悉言天地生化榮枯零落之先後也物既有之人亦如然此地理之常生化之道也帝曰其有壽夭乎岐伯曰高者其氣壽下者其氣夭地之小大異也小者小異大者大異大謂東南西北相遠萬里許也小謂居所高下相近二十里三十里或百里許也地形高下懸倍不相計者以近爲小則十里二十里高下平慢氣相接者以遠爲小則三百里二百里地氣不同生乃異也故治病者必明天道地理陰陽更勝氣之先後人之壽夭生化之期乃可以知人之形氣矣不明天地之氣又昩陰陽之候則以壽爲夭以夭爲壽雖盡上聖救生之道畢經脉藥石之妙猶未免世中之誣斥也帝曰善其歲有不病而藏氣不應不用者何也岐伯曰天氣制之氣有所從也從謂從事於彼不及營於私應用之帝曰願卒聞之岐伯曰少陽司天火氣下臨肺氣上從白起金用草木眚火見燔焫革金且耗大暑以行咳嚏鼽衂鼻窒曰瘍寒熱胕腫寅申之歲侯也臨謂御於下從謂從事於上起謂價高於市用謂用行刑罰也臨從起用同之革謂皮革亦謂革易也金謂器屬也耗謂費用也火氣燔灼故曰生瘡瘡身瘡也瘍頭瘡也寒熱謂先寒而後熱則瘧疾也肺爲熱害水且救之水守肺中故爲胕腫胕腫謂腫滿按之不起此天氣之所生也新校正云詳注云故曰生瘡瘡身瘡也瘍頭瘡也今經只言曰瘍疑經脫一瘡之别本曰字作口風行於地塵沙飛揚心痛胃脘痛厥逆鬲不通其主暴速厥陰在泉故風行於地凡淫所勝故是病生焉少陽厥陰其化急速故病氣起發疾速而爲故云其主暴速此地氣不順而生是也新校正云詳厥陰與少陽在泉言其主暴速其發機速故不言甚則某病也陽明司天燥氣下臨肝氣上從蒼起木用而立土乃眚凄滄數至木伐草萎脅痛目赤掉振鼓栗筋痿不能乆立卯酉之歲候也木用亦謂木功也凄滄大凉也此病之起天氣生焉暴熱至土乃暑陽氣鬱發小便變寒熱如瘧甚則心痛火行干槁流水不氷蟄蟲乃見少陰在泉熱盛於地而爲是也病之所有地氣生焉太陽司天寒氣下臨心氣上從而火且明新校正云詳火且明三字當作火用二字丹起金乃眚寒清時舉勝則水冰火氣高明心熱煩嗌乾善渴鼽嚏喜悲數欠熱氣妄行寒乃復霜不時降善忘甚則心痛辰戌之歲候也寒清時舉太陽之令也火氣高明謂燔灼於物也不時謂太早及偏害不循時令不普及於物也病之所起天氣生焉土乃潤水豐衍寒客至沉陰化濕氣變物水飲内蓄中滿不食皮𤸷肉苛筋脉不利甚則胕腫身後癰太陰在泉濕盛於地而爲是也病之源始地氣生焉新校正云詳身後癰當作身後難厥陰司天風氣下臨脾氣上從而土且隆黄起水乃眚土用革體重肌肉萎食减口爽風行大虚雲物摇動目轉耳鳴巳亥之歲候也土隆土用革謂土氣有用而革易其體亦謂土功事也雲物摇動是謂風高此病所生天之氣也火縱其暴地乃暑大熱消爍赤沃下蟄蟲數見流水不冰少陽在泉火成於地而爲是也病之宗兆地氣生焉其發機速少陽厥陰之氣變化卒急其爲疾病速若發機故曰其發機速少陰司天熱氣下臨肺氣上從白起金用草木眚喘嘔寒熱嚏鼽衂鼻窒大暑流行子午之歲候也熱司天氣故是病生天氣之作也甚則瘡瘍燔灼金爍石流天之交也地乃燥凄滄數至脅痛善太息肅殺行草木變變謂變易客質也脅痛太息地氣生也太隂司天濕氣下臨腎氣上從黑起水變新校正云詳前後文此少火乃眚三字埃冒雲雨胷中不利隂痿氣大衰而不起不用新校正云詳不用二字當作水用當其時反腰脽痛動轉不便也丑未之歲候也水變謂甘泉變鹹也埃土霧也冒不分遠也雲雨土化也脽謂臀肉也病之有者天氣生焉厥逆新校正云詳厥逆二字疑當連上文地乃藏陰大寒且至蟄蟲早附心下否痛地裂冰堅少腹痛時害於食乘金則止水增味廼鹹行水減也止水井泉也行水河渠流注者也止水雖長廼變常甘美而爲鹹味也病之有者地氣生焉新校正云詳太陰司天之化不言甚則病某而云當其時又云乘金則云云者與前條互相發明也帝曰歲有胎孕不育治之不全何氣使然岐伯曰六氣五類有相勝制也同者盛之異者衰之此天地之道生化之常也故厥隂司天毛蟲靜羽蟲育介蟲不成謂乙巳丁巳己巳辛巳癸巳乙亥丁亥己亥辛亥癸亥之歲也靜无聲也亦謂靜退不先用事也羽爲火蟲氣同地也火制金化故介蟲不成謂白色有甲之蟲少孕育也在泉毛蟲育倮蟲耗羽蟲不育地氣制土黄倮耗損歲乘木運其又甚也羽蟲不育少陽自抑之是則五寅五申歲也凡稱不育不成皆謂少非悉无也少陰司天羽蟲靜介蟲育毛蟲不成謂甲子丙子戊子庚子壬子甲午丙午戊午庚午壬午之歲也靜謂胡越燕百舌鳥之類也是歲黑色毛蟲孕育少成在泉羽蟲育介蟲耗不育地氣制金白介蟲不育歲乗火運斯復甚焉是則五卯五酉歲也新校正云詳介蟲耗以少陰在泉火剋金也介蟲不育以陽明在天自抑之也太陰司天倮蟲靜鱗蟲育羽蟲不成是謂乙丑丁丑己丑辛丑癸丑乙未丁未己未辛未癸未之歲也倮蟲者謂人及蝦蟆之類也羽蟲謂青緑色者則鸚鵡鴷鳥翠碧鳥之類諸青緑色之有羽者歲乘金運其復甚哉在泉倮蟲育鱗蟲新校正云詳此少一耗字不成地氣制水黑鱗不育歲乘土運而又甚焉是則五辰五戌是也少陽司天羽蟲靜毛蟲育倮蟲不成謂甲寅丙寅戊寅庚寅壬寅甲申丙申戊申庚申壬申之歲也倮蟲謂青緑色者也羽蟲謂黑色諸有羽翼者則越燕百舌鳥之類是也在泉羽蟲育介蟲耗毛蟲不育地氣制金白介耗損歲乘火運其又甚也毛蟲不育天氣制之是則五巳五亥歲也陽明司天介蟲靜羽蟲育介蟲不成謂乙卯丁卯已卯辛卯癸卯乙酉丁酉已酉辛酉癸酉之歲也羽爲火蟲故蕃育也介蟲諸有赤色甲殻者也赤介不育天氣制之在泉介蟲育毛蟲耗羽蟲不成地氣制木黑毛蟲耗歲乗金運損復甚焉是則五子五午歲也羽蟲不就以上見少陰也太陽司天鱗蟲靜倮蟲育謂甲辰丙辰戊辰庚辰壬辰丙戌甲戌戊戌庚戌壬戌歲也倮蟲育地氣同也鱗蟲靜謂黄鱗不用也是歲雷霆少舉以天氣抑之也新校正云詳此當云鱗蟲不成在泉鱗蟲耗倮蟲不育天氣制勝黄黑鱗耗是則五丑五未歲也新校正云詳此當爲鱗蟲育羽蟲耗倮蟲不育注中鱗字亦當作羽諸乘所不成之運則甚也乘木之運倮蟲不成乘火之運介蟲不成乘土之運鱗蟲不成乘金之運毛蟲不成乘水之運羽蟲不成當是歲者與上文同悉少能孕育也斯并運與氣同者運乗其勝復遇天符及歲會者十孕不全一二也故氣主有所制歲立有所生地氣制己勝天氣制勝己天制色地制形天氣隨已不勝者制之謂制其色也地氣隨己所勝者制之謂制其形也故又曰天制色地制形焉是以天地之間五類生化互有所勝互有所化互有所生互有所制五類衰盛各隨其氣之所宜也宜則蕃息故有胎孕不育治之不全此氣之常也天地之間有生之物凡此五類也五謂毛羽倮鱗介也故曰毛蟲三百六十麟爲之長羽蟲三百六十鳳爲之長倮蟲三百六十人爲之長鱗蟲三百六十龍爲之長介蟲三百六十龜爲之長凡諸有形蚑行飛走喘息胎息大小高下青黄赤白黑身被毛羽鱗介者通而言之皆謂之蟲矣不貝是四者皆謂倮蟲凡此五物皆有胎生卵生濕生化生因人致問言及五類也所謂中根也生氣之根本發自身形之中中根也非是五類則生氣根系悉因外物以成立去之則生氣絶矣根於外者亦五謂五味五色類也然木火土金水之形類悉假外物色藏乃能生化外物既去則生氣離絶故皆是根於外也新校正云詳注中色藏二字當作已成故生化之别有五氣五味五色五類五宜也然是二十五者皆中根外悉有之五氣謂臊焦香腥腐也五味謂酸苦甘辛鹹也五色謂青黄赤白黑也五類有二矣其一者謂毛羽倮鱗介其二者謂燥濕液堅軟也夫如是等於萬物之中互有所宜也帝曰何謂也岐伯曰根於中者命曰神機神去則機息根於外者命曰氣立氣止則化絶諸有形之類根於中者生源繫天其所動浮皆神氣爲機發之主故其所爲也物莫之知是以神捨去則機發動用之道息矣根於外者生源繫地故其所生長化成收藏皆爲造化之氣所成立故其所出也物亦莫之知是以氣止息則生化結成之道絶滅矣其木火土金水燥濕液堅柔雖常性不易及乎外物去生氣離根化絶止則其常體性顔色皆必小變移其日也新校正云按六微㫖大論云岀入廢則神機化滅昇降息則氣立孤危故非岀入則無以生長壯老已非升降則無以生長化收藏故各有制各有勝各有生各有成根中根外悉如是故曰不知年之所加氣之同異不足以言生化此之謂也新校正云按六節藏象論云不知年之所加氣之盛衰虚實之所起不可以爲工矣帝曰氣始而生化氣散而有形氣布而蕃育氣終而象變其致一也始謂始發動散謂流散於物中布謂布化於結成之形所終極於收藏之用也故始動而生化流散而有形布化而成結終極而萬象皆變也即事驗之天地之間有形之類其生也柔弱其死也堅强凡如此類皆謂變易生死之時形質是謂氣之終極新校正云按天元紀大論云物生謂之化物極謂之變又六微㫖大論云物之生從於化物之極由乎變變化相薄成敗之所由也然而五味所資生化有薄厚成熟有少多終始不同其故何也岐伯曰地氣制之也非天不生地不長也天地雖無情於生化而生化之氣自有異同爾何者以地體之中有六入故也氣有同異故有生有化有不生有不化有少生少化有廣生廣化矣故天地之間無必生必化必不生必不化必少生少化必廣生廣化也各隨其氣分所好所惡所異所同也帝曰願聞其道岐伯曰寒熱燥濕不同其化也舉寒熱燥濕四氣不同則温清異化可知之矣故少陽在泉寒毒不生其味辛其治苦酸其穀蒼丹巳亥歲氣化也夫毒者皆五行慄盛暴烈之氣所爲也今火在地中其氣正熱寒毒之物氣與地殊生死不同故生少也火制金氣故味辛者不化也少陽之氣上奉厥陰故其歲化苦與酸也六氣主歲唯此歲通和木火相承故無間氣也苦丹地氣所化酸蒼天氣所生也余所生化悉有上下勝剋故皆有間氣矣陽明在泉濕毒不生其味酸其氣濕新校正云詳在泉六惟陽明與太陰在泉之歲云其氣濕其氣熱蓋以濕燥未見寒温之氣故再云其氣也其治辛苦甘其穀丹素子午歲氣化也燥在地中其氣涼清故濕温毒藥少生化也金木相制故味酸者少化也陽明之氣上奉少陰故其歲化辛與苦也辛素地氣也苦丹天氣也甘間氣也所以間金火之勝剋故兼治甘太陽在泉熱毒不生其味苦其治淡鹹其穀黅秬丑未歲氣化也寒在地中與熱殊化故其歲物熱毒不生木勝火味故當苦也太陽之氣上奉太陰故其氣化生淡鹹也太陰土氣上生於天氣遠而高故甘之化薄而爲淡也所以淡亦屬甘甘之類也淡黅天化也鹹秬地化也黅黄也新校正云詳注云味故當苦當作故味苦者不化傳寫誤也厥陰在泉清毒不生其味甘其治酸苦其穀蒼赤寅申歲氣化也温在地中與清殊性故其歲物清毒不生木勝其土故味甘少化也厥隂之氣上合少陽所合之氣既无乖忤故其治化酸與苦也酸蒼地化也苦赤天化也氣无勝剋故不間氣以甘化也其氣專其味正厥隂少陽在泉之歲皆氣化專一其味純正然餘歲悉上下有勝剋之氣故皆有間氣間味矣少陰在泉寒毒不生其味辛其治辛苦甘其穀白丹卯酉歲氣化也熱在地中與寒殊化故其歲藥寒毒甚微火氣爍金故味辛少化與少陰陽明主天主地故其所治苦與辛焉苦丹爲地氣所生辛白爲天氣所生甘間氣殊化以間止剋伐也太陰在泉燥毒不生其味鹹其氣熱其治甘鹹其穀黅秬辰戌歲氣化也地中有濕與燥不同故乾毒之物不生化也土制於水故味鹹少化也太陰之氣上承太陽故其歲化甘與鹹也甘黅地化也鹹秬天化也寒濕不爲大忤故間氣同而氣熱者應之化淳則鹹守氣專則辛化而俱治淳和也化淳謂少陽在泉之歲也火來居水而反能化育是水鹹自守不與火爭化也氣專謂厥陰在泉之歲也木居於水而復下化金不受害故辛復生化與鹹俱王也唯此兩歲上下之氣無剋伐之嫌故辛得與鹹同應王而生化也餘歲皆上下有勝剋之變故其中間甘味兼化以緩其制抑餘苦鹹酸三味不同其生化也故天地之間藥物辛甘者多也故曰補上下者從之治上下者逆之以所在寒熱盛衰而調之上謂司天下謂在泉也司天地氣太過則逆其味以治之司天地氣不及則順其味以和之從順也故曰上取下取内取外取以求其過能毒者以厚藥不勝毒者以薄藥此之謂也上取謂以藥制有過之氣也制而不順則吐之下取謂以迅疾之藥除下病攻之不去則下之内取謂食及以藥内之審其寒熱而調之外取謂藥熨令所病氣調適也當寒反熱以冷調之當熱反寒以温和之上盛不已吐而脫之下盛不已下而奪之謂求得氣過之道也藥厚薄謂氣味厚薄者也新校正云按甲乙經云胃厚色黑大骨肉肥者皆勝毒其瘦而薄胃者皆不勝毒又按異法方宜論云西方之民陵居而多風水土剛强不衣而褐薦華食而脂肥故邪不能傷其形體其病生於内其治宜毒藥氣反者病在上取之下病在下取之上病在中傍取之下取謂寒逆於下而熱攻於上不利於下氣盈於上則温下以調之上取謂寒積於下温之不去陽藏不足則補其陽也傍取謂氣并於左則藥熨其右氣并於右則藥熨其左以和之必隨寒熱爲適凡是七者皆病無所逃動而必中斯爲妙用矣治熱以寒温而行之治寒以熱凉而行之治温以清冷而行之治清以温熱而行之氣性有剛柔形證有輕重方用有大小調制有寒温盛大則順氣性以取之小軟則逆氣性以伐之氣殊則主必不容力倍則攻之必以是則謂湯飲調氣之制也新校正云按至眞要大論云熱因寒用寒因熱用必伏其所主而先其所因其始則同其終則異可使破積可使潰堅可使氣和可使必已故消之制之吐之下之補之寫之久新同法量氣盛虚而行其法病之新久無異道也帝曰病在中而不實不堅且聚且散奈何岐伯曰悉乎哉問也无積者求其藏虚則補之隨病所在命其藏以補之藥以祛之食以隨之食以无毒之藥隨湯丸以迫逐之使其盡也行水漬之和其中外可使畢已中外通和氣無流礙則釋然消散眞氣自平帝曰有毒無毒服有約乎岐伯曰病有乆新方有大小有毒無毒固宜常制矣大毒治病十去其六下品藥毒毒之大也常毒治病十去其七中品藥毒次於下也小毒治病十去其八上品藥毒毒之小也無毒治病十去其九上品中品下品無毒藥悉謂之乎穀肉果菜食養盡之無使過之傷其正也大毒之性烈其爲傷也多小毒之性和其爲傷也少常毒之性減大毒之性一等加小毒之性一等所傷可知也故至約必止之以待來證爾然無毒之藥性雖平和久而多之則氣有偏勝則有偏絶乆攻之則藏氣偏弱既弱且困不可長也故十去其九而止服至約已則以五穀五肉五果五菜隨五藏宜者食之已盡其餘病藥食兼行亦通也新校正云按藏氣法時論云毒藥攻邪五穀爲養五果爲助五畜爲益五菜爲充不盡行復如法法謂前四約也餘病不盡然再行之毒之大小至約而止必無過也必先歲氣無伐天和歲有六氣分主有南面北面之政先知此六氣所在人脉至尺寸應之太陰所在其脉沉少陰所在其脉鈎厥陰所在其脉弦太陽所在其脉大而長陽明所在其脉短而濇少陽所在其脉大而浮如是六脉則謂天和不識不知呼爲寒熱攻寒令熱脉不變而熱疾已生制熱令寒脉如故而寒病又起欲求其適安可得乎夭枉之來率由於此無盛盛無虚虚而遺人夭殃不察虚實但思攻擊而盛者轉盛虚者轉虚萬端之病從兹而甚眞氣日消病勢日侵殃咎之來苦天之興難可逃也悲夫無致邪無失正絶人長命所謂伐天和也攻虚謂實是則致邪不識藏之虚斯爲失正氣既死則爲死之由矣帝曰其乆病者有氣從不康病去而瘠奈何從謂順也岐伯曰昭乎哉聖人之問也化不可代時不可違化謂造化也代大匠斫猶傷其手况造化之氣人能以力代之乎夫生長收藏各應四時之化雖巧智者亦無能先時而致之明非人力所及由是觀之則物之生長收藏化必待其時也物之成敗理亂亦待其時也物既有之人亦宜然或言力必可致而能代造化違四時者妄也夫經絡以通血氣以從復其不足與衆齊同養之和之靜以待時謹守其氣無使傾移其形乃彰生氣以長命曰聖王故大要曰無代化無違時必養必和待其來復此之謂也帝曰善大要上古經法也引古之要㫖以明時化之不可違不可以力代也黄帝内經素問補註釋文卷之四十三

front:
  text: 黄帝内經素問補註釋文卷之六七同卷慎六
  hash: sha256:40c2f051b06595891b58e0ef36cd408231a54c655d422d24b77d352a5258f759
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_006-001a, image: hfl/0650/0650-082.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤陰陽離合論篇黄帝問曰余聞天爲陽地爲陰日爲陽月爲陰大小月三百六十日成一歲人亦應之以四時五行運用於内故人亦應之新校正云詳天爲陽至成一歲與六節藏象篇重今三陰三陽不應陰陽其故何也岐伯對曰陰陽者數之可十推之可百數之可千推之可萬萬之大不可勝數然其要一也一謂離合也雖不可勝數然其要妙以離合推步悉可知之天覆地載萬物方生未出地者命曰陰處名曰陰中之陰處陰之中故曰陰處形未動出亦是爲陰以陰居陰故曰陰中之陰則出地者命曰陰中之陽形動出者是則爲陽以陽居陰故曰陰中之陽陽予之正陰爲之主陽施正氣萬物方生陰爲主持群形乃立予音與故生因春長因夏收因秋藏因冬失常則天地四塞春夏爲陽故生長也秋冬爲陰故收藏也若失其常道則春不生夏不長秋不收冬不藏夫如是則四時之氣閉塞陰陽之氣无所運行矣陰陽之變其在人者亦數之可數天地陰陽雖不可勝數在於人形之用者則數可知之帝曰願聞三陰三陽之離合也岐伯曰聖人南面而立前曰廣明後曰太衝廣大也南方丙丁火位主之陽氣盛明故曰大明也嚮明治物故聖人南面而立易曰相見乎離蓋謂此也然在人身中則心藏在南故謂前曰廣明衝脉在北故謂後曰太衝然太衝者腎脉與衝脉合而盛大故曰太衝是以下文云太衝之地名曰少陰此正明兩脉相合而爲表裏也少陰之上名曰太陽腎藏爲陰膀胱府爲陽陰氣在下陽氣在上此爲一合之經氣也靈樞經曰足少陰之脉者腎脉也起於小指之下斜趣足心又曰足太陽之脉者膀胱脉也循京骨至小指外側由此故少陰之上名太陽也是以下文曰太陽根起於至陰結於命門名曰陰中之陽至陰穴名在足小指外側命門者藏精光照之所則兩目也太陽之脉起於目而下至於足故根於指端結於目也靈樞經曰命門者目也此與靈樞義合以太陽居少陰之地故曰陰中之陽新校正云按素問太陽言根結於經不言結甲乙今具中身而上名曰廣明廣明之下名曰太陰靈樞經曰天爲陽地爲陰腰以上爲天腰以下爲地分身之㫖則中身之上屬於廣明廣明之下屬太陰也又心廣明藏下則太陰脾藏也太陰之前名曰陽明人身之中胃爲陽明脉行在脾脉之前脾爲太陰脉行於胃脉之後靈樞經曰足太陰之脉者脾脉也起於大指之端循指内側白肉際過核骨後上内踝前廉上腨内循胻骨之後足陽明之脉者胃脉也下膝三寸而别以下入中指外間由此故太陰之前名陽明也是以下文曰腨市兖切陽明根起於厲兊名曰陰中之陽厲兊穴名在足大指次指之端以陽明居太陰之前故曰陰中之陽厥陰之表名曰少陽人身之中膽少陽脉行肝脉之分外肝厥陰脉行膽脉之位内靈樞經曰足厥陰脉者肝脉也起於足大指聚毛之際上循足跗上廉足少陽之脉者膽脉也循足跗上出小指次指之端由此則厥陰之表名少陽也故下文曰跗甫無切少陽根起於竅陰名曰陰中之少陽竅陰穴名在足小指次指之端以少陽居厥陰之表故曰陰中之少陽是故三陽之離合也太陽爲開陽明爲闔少陽爲樞離謂别離應用合謂配合於陰别離則正位於三陽配合則表裏而爲藏府矣開闔樞者言三陽之氣多少不等動用殊也夫開者所以司動靜之基闔者所以執禁固之權樞者所以主動轉之微由斯殊氣之用故此三變之也新校正云按九墟太陽爲關陽明爲闔少陽爲樞故關折則肉節潰緩而暴病起矣故候暴病者取之太陽闔折則氣无所止息悸病起故悸者皆取之陽明樞折則骨摇而不能安於地故骨摇者取之少陽甲乙經同三經者不得相失也搏而勿浮命曰一陽三經之至搏擊於手而无輕重之異則正可謂一陽之氣無復有三陽差降之爲用也搏音轉帝曰願聞三陰岐伯曰外者爲陽内者爲陰言三陽爲外運之離合三陰爲内用之離合也然則中爲陰其衝在下名曰太陰衝脉在脾之下故言其衝在下也靈樞經曰衝脉者與足少陰之絡皆起於腎下上行者過於胞中由此則其衝之上太陰位也太陰根起於隱白名曰陰中之陰隱白穴名在足大指端以太陰居陰故曰陰中之陰太陰之後名曰少陰藏位及經脉之次也太陰脾也少陰腎也脾藏之下近後則腎之位也靈樞經曰足太陰之脉起於大指之端循指内之側及上内踝前廉上腨内循䯒骨後足少陰之脉起於小指下斜趨足心出於然骨之下循内踝後以上腨内由此則太陰之下名少陰也䯒音行少陰根起於涌泉名曰陰中之少陰涌泉穴名在足心下踡指宛宛中踡音卷少陰之前名曰厥陰亦藏位及經脉之次也少陰腎也厥陰肝也腎藏之前近上則肝之位也靈樞經曰足少陰脉循内踝之後上端内廉足厥陰脉循足跗上廉去内踝一寸上踝八寸交出太陰之後上膕内由此故少陰之前名厥陰也厥陰根起於大敦陰之絶陽名曰陰之絶陰大敦穴名在足大指之端三毛之中也兩陰相合故曰陰之絶陽厥盡也陰氣至此而盡故名曰陰之絶陰是故三陰之離合也太陰爲開厥陰爲闔少陰爲樞亦氣之不等也新校正云按九墟云關折則倉廪无所輸隔洞者取之太陰闔折則氣施而善悲悲者取之厥陰樞折則脉有所結而不通不通者取之少陰甲乙經同三經者不得相失也搏而勿沉名曰一陰沉言殊見也陽浮亦然若經氣應至無沉浮之異則悉可謂一陰之氣非復有三陰差降之殊用也陰陽衝𩅞積傳爲一周氣裏形表而爲相成也衝𩅞言氣之往來積謂積脉之動也傳謂陰陽之氣流傳也夫脉氣往來動而不止積其所動氣血循環應水下二刻而一周於身故曰積傳爲一周也然榮衛之氣因息遊布周流形表拒捍虚邪中外主司互相成立故言氣裏形表而爲相成也新校正云按别本𩅞𩅞作衝衝黄帝内經素問補註釋文卷之六

front:
  text: 黄帝内經素問補註釋文卷之二十七宜三
  hash: sha256:d6cc2e66abd6f886c6be9700494a88ab40c73ea1e94abe15497684f87c4556bf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_027-001a, image: hfl/0654/0654-094.png}
body:
  text: 唐太僕令啓玄子王氷次註宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤厥論篇黄帝問曰厥之寒熱者何也厥謂氣逆上也世謬傳爲脚氣廣飾方論焉岐伯對曰陽氣衰於下則爲寒厥陰氣衰於下則爲熱厥陽謂足之三陽脉陰謂足之三陰脉下謂足也帝曰熱厥之爲熱也必起於足下者何也陽主外而厥在内故問之岐伯曰陽氣起於足五指之表陰脉者集於足下而聚於足心故陽氣勝則足下熱也大約而言之足太陽脉出於足小指之端外側足少陽脉出於足小指次指之端足陽明脉出於足中指及大指之端并循足陽而上肝脾腎脉集於足下聚於足心陰弱故足下熱也新校正云按甲乙經陽氣起於足作走於足起當作走帝曰寒厥之爲寒也必從五指而上於膝者何也陰主內而厥在外故問之岐伯曰陰氣起於五指之裏集於膝下而聚於膝上故陰氣勝則從五指至膝上寒其寒也不從外皆從內也亦大約而言之也足太陰脉起於足大指之螭內側足厥陰脉起於足大指之端三毛中足少陰脉起於足小指之下斜趣足心並循足陰而上循殷陰入腹故云集於膝下而聚於膝之上也帝曰寒厥何失而然也岐伯曰前陰者宗筋之所聚太陰明之所合也宗筋俠齊下合於陰器故云前陰者宗筋之所聚也太陰者脾脉陽明者胷脉脾胃之脉皆輔近宗筋故云太陰陽明之所合新校正云按甲乙經前陰者宗筋之所聚作厥陰者衆筋之所聚全元起云前陰者厥陰也與王注義異亦自一說春夏則陽氣多而陰氣少秋冬則陰氣盛而陽氣衰此乃天之常道此人者質壯以秋冬奪於所用下氣上爭不能復精氣溢下邪氣因從之而上也質謂形質也奪於所用謂多欲而奪其精氣也氣因於中新校正云按甲乙經氣因於中作所中陽氣衰不能滲營其經絡陽氣日損陰氣獨在故手足爲之寒也帝曰熱厥何如而然也源其所由爾岐伯曰酒入於胃則絡脉滿而經脉虚脾主爲胃行其津液者也陰氣虚則陽氣入陽氣入則胃不和胃不和則精氣竭精氣竭則不營其四支也前陰爲太陰陽明之所合故謂不和則精氣竭也内精不足故四支無氣以營之此人必數醉若飽以入房氣聚於脾中不得散酒氣與穀氣相薄熱盛於中故熱遍於身内熱而溺赤也夫酒氣盛而慓悍腎氣日衰陽氣獨勝故手足爲之熱也醉飽入房内亡精氣中虚熱入由是腎衰陽盛陰虚故熱生於手足也帝曰厥或令人腹滿或令人暴不知人或至半日遠至一曰乃知人者何也暴猶卒也言卒然冒悶不醒覺也不知人謂悶甚不知識人也或謂尸厥岐伯曰陰氣盛於上則下虚下虚則腹脹滿陽氣盛於上則下氣重上而邪氣逆逆則陽氣亂陽氣亂則不知人也陰謂足太陰氣新校正云按甲乙經陽氣盛於上五字作腹滿二字當從甲乙經之說何以言之别按甲乙經云陽脉下墜陰脉上爭發尸厥焉有陰氣盛於上而又言陽氣盛於上又按張仲景云少陰脉不至腎氣微少精血奔氣促迫上入胷鬲宗氣反聚血結心下陽氣退下熱歸陰股與陰相動令身不仁此爲尸厥仲景言陽氣退下則是陽氣不得盛於上故知當從甲乙經也又王注陰謂足太陰亦爲未盡按繆刺論云邪客於手足少陰太陰足陽明之絡此五絡皆會於耳中上絡左角五絡俱竭令人身脉皆動而形無知其狀若尸或曰尸厥焉得專解陰爲太陰也帝曰善願聞六經脉之厥狀病能也爲前問解故請備聞諸經厥也岐伯曰巨陽之厥則腫首頭重足不能行發爲眴仆巨陽太陽也足太陽脉起於目内眥上額交巅上其支别者從巔至耳上角其直行者從巅入絡腦還岀别下項循肩髆内俠脊抵腰中入循膂絡腎屬膀胱其支别者從腰中下貫臀入膕中其支别者從髆内左右别下貫脾過髀樞循髀外後廉下合膕中以下貫腨内出外踝之後循京骨至小指之端外側由是厥逆外形斯證也腫或作踵非陽明之厥則癲疾欲走呼腹滿不得卧面赤而熱妄見而妄言足陽明脉起於鼻交頞中下循鼻外入上齒中還岀俠口環唇下交承漿却循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支别者從大迎前下人迎循喉嚨入缺盆下鬲屬胃絡脾其在行從缺盆下乳内廉下俠齊入氣街中其支别者起胃下口循腹裏下至氣街中而合以下髀抵伏菟下入膝髕中下循胻外廉下足跗入中指内間其支别者下膝三寸而别以下入中指外間其支别者跗上入大指間出其端故厥如是也癲一爲巔非少陽之厥則暴聾頰腫而熱脅痛胻不可以運足少陽脉起於目鋭眥上抵頭角下耳後循頸行手少陽之前至肩上交出手少陽之後入缺盆其支别者從耳後入耳中出走耳前至目鋭眥後其支别者目鋭眥下大迎合手少陽於顒下加頰車下頸合缺盆以下胸中貫鬲絡肝屬膽循脇裏出氣街繞髦際横入髀厭中其直行者從缺盆下掖循胸過季脅下合髀厭中以下循髀陽出膝外廉下入外輔骨之前直下抵絶骨之端下岀外踝之前循足跗出小指次指之端故厥如是太陰之厥則腹滿䐜脹後不利不欲食食則嘔不得卧足太陰脉起於大指之端上膝股内前廉入腹屬脾絡胃上鬲俠咽連舌本散舌下其支别者復從胃别上鬲注心中故厥如是少陰之厥則口乾溺赤腹滿心痛足少陰脉上股内後廉貫脊屬腎絡膀胱其直行者從腎上貫肝鬲入肺中循喉嚨俠舌本其支别者從肺出絡心注胷中故厥如是厥陰之厥則少腹腫痛腹脹涇溲不利好卧屈膝陰縮腫胻内熱足厥陰脉去内踝一寸上踝八寸交出太陰之後上膕内廉循股陰入髦中下環陰器抵小腹俠胃屬肝絡膽上貫鬲故厥如是矣胻内熱一本云胻外熱傳寫行書内外誤也盛則寫之虚則補之不盛不虚以經取之不盛不虚謂邪氣未盛眞氣未虚如是則以穴俞經法留呼多少而取之太陰厥逆胻急攣心痛引腹治主病者足太陰脉起於大指之端循指内側上内踝前廉上腨内循胻骨後上膝股内前廉入腹其支别者復從胃别上鬲注心中故胻急攣心痛引腹也太陰之脉行有左右候其有過者當發取之故言治主病也新校正云詳從太陰厥逆至篇末全元起本在第九卷王氏移於此少陰厥逆虚滿嘔變下泄清治主病者以其脉從腎上貫肝鬲入肺中循喉嚨故如是厥陰厥逆攣腰痛虚滿前閉譫言新校正云按全元起云譫言者氣虚獨言也譫音儼治主病者以其脉循股陰入髦中環陰器復上循喉嚨之後絡舌本故如是新校正云按甲乙經厥陰之經不絡舌本王氏注刺熱篇刺腰痛篇并此三注俱云絡舌本又注風論痹論各不云絡舌本王注自有異同當以甲乙經爲正三陰俱逆不得前後使人手足寒三日死三陰絶故三日死太陽厥逆僵仆嘔血善衂治主病者以其脉起目内眦又循脊絡腦故如是僵居良切仆音付少陽厥逆機關不利機關不利者腰不可以行項不可以顧以其脉循頸下繞髦際横入髀厭中故如是發腸癰不可治驚者死足少陽脉貫鬲絡肝屬膽循脇裏出氣街發腸癰則經氣絶故不可治驚者死也陽明厥逆喘咳身熱善驚衂嘔血以其脉循喉嚨入缺盆下鬲屬胃絡脾故如是手太陰厥逆虚滿而咳善嘔沫治主病者手太陰脉起於中焦下絡大腸還循胃口上鬲屬肺故如是手心主少陰厥逆心痛引喉身熱死不可治手心主脉起於胸中出屬心包手少陰脉其支别者從心系上俠咽喉故如是手太陽厥逆耳聾泣出項不可以顧腰不可以俯仰治主病者手太陽脉支别者從缺盆循頸上頰至目鋭眥却入耳中其支别者從頰上䪼抵鼻至目内眥故耳聾泣出項不可以願也腰不可以俯仰脉不相應恐古錯簡文手陽明少陽厥逆發喉痹嗌腫痓治主病者手陽明脉支别者從缺盆上頸手少陽脉支别者從膻中上出缺盆上項故如是新校正云按全元起本痓作痙黄帝内經素問補註釋文卷之二十七

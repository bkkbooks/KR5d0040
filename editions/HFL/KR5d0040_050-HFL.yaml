front:
  text: 寅帝内經素問補註釋文卷之五十榮八
  hash: sha256:b433fb92e1de8f11ad883990e25267cefde03704a9c0024fb720258e0eb3852a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_050-001a, image: hfl/0660/0660-135.png}
body:
  text: 唐太僕令啓玄子王氷次註宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤徵四失論篇新校正云按今元起本名方論得失明著寅帝在明堂雷公侍坐黄帝曰夫子所通書受事衆多矣試言得失之意所以得之所以失之雷公對曰循經受業皆言十全其時有過失者願聞其事解也言循學經師受傳事業皆謂十全於人庶及乎施用正術宣行至道或得失之於世中故請聞其解說也帝曰子年少智未及邪將言以雜合邪言謂年少智未及而不得十全耶爲復且以言而雜合衆人之用耶帝疑先知而反問也夫經脉十二絡脉三百六十五此皆人之所明知工之所循用也謂循學而用也所以不十全者精神不專志意不理外内相失故時疑殆外謂色内謂脉也然精神不專於循用志意不從於條理所謂粗略揆度失常故色脉相失而時自疑殆也診不知陰陽逆從之理此治之一失矣脉要精微論曰冬至四十五日陽氣微上陰氣微下夏至四十五日陰氣微上陽氣微下陰陽有時與脉爲期又曰微妙在脉不可不察察之有紀從陰陽始由此故診不知陰陽逆從之理爲一失矣受師不卒妄作離術繆言爲道更名白功新枝正云按太素功作巧妄用砭石後遺身咎此治之二失也不終師術惟妄是爲易古變常自功循已遣身之咎不亦宜乎故爲失二也老子曰無遣身殃是謂襲常蓋嫌其妄也不適貧富貴賤之居坐之薄厚形之寒温不適飲食之宜不别人之勇怯不知比類足以自亂不足以白明此治之三失也貧賤者勞富貴者佚佚則邪不能傷易傷以勞勞則易傷以邪其於勞也則富者近貴者之半其於邪也則貧者居賤者之半例率如此然世禄之家或此殊矣夫勇者難感怯者易傷二者不同蓋以其神氣有壯弱也觀其貧賤富貴之義則坐之薄厚形之寒温飲食之宜理可知矣不知比類用必乖哀則失足以汨亂心緒豈通明之可望乎故爲失三也診病不問其始憂患飲食之失節起居之過度或傷於毒不先言此卒持寸曰何病能中妄言作名爲粗所窮此治之四失也憂謂憂懼也患謂患難也飲食失節言甚飽也起居過度言漬耗也或傷於毒謂病不可拘於藏府相乘之法而爲療也卒持寸口謂不先持寸口之脉和平與不平也然工巧備識四術猶疑故診不能中病之形名言不能合經而妄作粗略醫者尚能中妄謬之違背况深明者見而不謂非乎故爲失四也是以世人之語者馳千里之外不明尺寸之論診無人事言工之得失毁譽在世人之言語皆可至千里之外然其不明尺寸之診論當以何事知見於人耶治數之道從容之葆治王也葆平也言診數當王之氣皆以氣高下而爲比類之原本也故下文曰葆音保坐持寸口診不中五脉百病所起始以自怨遺師其咎自不能深學道術而致診差違始上申怨謗之詞遺過咎於師氏者未之有也是故治不能循理棄術於市妄治時愈愚心自得不能修學至理乃衒賣於帀廛人不信之謂乎虚謬故云棄術於市也然愚者百慮而一得何自功之有耶新枝正云按全元起本自作巧太素作自功嗚呼窈窈㝠㝠熟知其道今詳熟當作孰道之大者擬於天地配於四海汝不知道之諭受以明爲晦嗚呼嘆也窈窈冥冥言玄逺也至道玄遠誰得知之孰誰也擬於天地言高下之不可量也配於四海言深廣之不可測也然不能曉諭於道則受明道而成暗昩也晦暗也陰陽類論篇孟春始至黄帝燕坐臨觀八極正八風之氣而問雷公曰陰陽之類經脉之道五中所主何藏最貴孟月春始至謂立春之日也燕安也觀八極謂視八方逺際之色正八風謂候八方所至之風朝會於太一者也五中謂五藏新校正云詳八風朝大一具天元玉册中又按楊上善云夫天爲陽地爲陰人爲和陰無其陽哀殺無已陽無其陰生長不止則傷於陰陰傷則陰灾起衰殺不已則傷於陽陽傷則陽禍生矣故須聖人在天地間和陰陽氣令萬物生也和氣之道謂先修身爲德則陰陽氣和陰陽氣和則八節風調八節風調則八虚風止於是疵癧不起嘉詳皆集此亦不知所以然而然也故黃帝問身之經脉貴賤依之調攝修德於身以正八風之氣雷公對曰春甲乙靑中主肝治七十二日是脉之主時臣以其藏最貴東方甲乙春氣主之自然青色内通肝也金匱眞言論曰東方青色入通於肝故曰青中主肝也然五行之氣各王七十二曰五七二五積而乘之則終一歳之數三百六十日故云治七十二曰也夫四時之氣以春爲始五藏之應肝藏合之公故以其藏爲最貴藏或爲道非也帝曰却念上下經陰陽從容子所言貴最其下也從容謂安緩比類也帝念脉經上下篇陰陽比類形氣不以肝藏爲貴故謂公之所貴最其下也雷公致齋七日旦復侍坐悟非致齋以洗心願益故坐而復請帝曰三陽爲經三陽爲維一陽爲游部經謂經綸所以濟成務維謂維持所以繫天眞游謂游行部謂身形部分也故生氣者濟成務化谷者繫天眞主色者散布精微游行諸部也新校正云按楊上善云三陽足太陽脉也從目内毗上頭分爲四道下項亦正别脉上下六道以行於背與身爲經二陽足陽明脉也從鼻而起下咽分爲四道亦正别脉六道上下行腹綱維於身一陽足少陽脉也起目外眥絡頭分爲四道下缺盆并正别脉六道上下主經營百節流氣三部故曰游部此知五藏終始觀其經綸維繫游部之義則五藏之終始可謂知矣三陽爲表二陰爲裏三陽太陽二陰少隂也少陰與太陽爲表裏故曰三陽爲表二陰爲裏陰至絶作朔晦却具合以正其理一陰厥陰也厥猶盡也靈樞經曰亥爲左足之厥陰戌爲右足之厥陰兩陰俱盡故曰厥陰夫陰盡爲晦陰生爲朔厥陰者以陰盡爲義也徵其氣王則朔適言其氣盡則晦既見其朔又當其晦故曰一陰至絶作朔晦也然徵彼俱盡之陰合此發生之木以正應五行之理而無替循環故云却具合以正其理也新枝正云按注言陰盡爲晦陰生爲朔疑是陽生爲朔雷公曰受業未能明言未明氣候之應見帝曰所謂三陽者太陽爲經陽氣盛大故曰太陽三陽脉至手太陰而弦浮而不沉决以度察以心合之陰陽之論太陰爲寸口也寸口者手太陰也脉氣之所行故脉皆至於寸口也太陽之脉洪大以長今弦浮不沈則當約以四時高下之度而斷决之察以五藏異同之候而參合之以應陰陽之論知其藏否耳所謂二陽者陽明也靈樞經曰辰爲左足之陽明巳爲右足之陽明兩陽合明故曰二陽者陽明也至手太陰弦而沉急不鼓炅至以病皆死鼓謂鼔動炅熱也陽明之脉浮大而短今弦而急沉不鼓者是陰氣勝陽木來乘土也然陰氣勝陽木來乘土而反熱病至者是陽氣之衰敗也猶燈之焰欲滅反明故皆死也一陽者少陽也陽氣未大故曰少陽至手太陰上連人迎弦急懸不絶此少陽之病也人迎謂結喉兩傍同身寸之一寸五分脉動應手者也弦爲少陽之脉今急懸不絶是經氣不足故曰少陽之病也懸者謂如懸物動摇者也專陰則死專獨也言其獨有陰氣而無陽氣則死三陰者六經之所主也三陰者太陰也言所以諸脉皆至手太陰者何耶以是六經之主故也六經謂三陰三陽之經脉也所以至手太陰者何以肺朝於百脉之氣皆交會於氣口也故下文曰交於太陰此正發明肺朝百脉之義也經脉别論云肺朝百脉伏鼓不浮上空志心脉伏鼓繫而不上浮者是心氣不足故上控引於心而爲病也志心謂小心也刺禁論曰七節之傍中有小心此之謂也新校正云按楊上善云肺脉浮濇此爲平也今見伏鼓是腎脉也足少陰脉貫脊屬腎上入肺中從肺出絡心肺氣下入腎忘上入心神也王氏謂志心爲小心義未通二陰至肺其氣歸膀胱外連脾冑二陰謂足少陰腎之脉少陰之脉别行者入跟中以上至股内後廉貫脊屬腎絡膀胱其直行者從腎上貫肝鬲入肺中故上至於肺其氣歸於膀胱外連於脾胃一陰獨至經絶氣浮不鼓鈎而滑若一陰獨至肺經氣内絶則氣浮不鼓於手若經不内絶則鈎而滑新校正云按楊上善云一陰厥陰也此六脉者乍陰乍陽交屬相并繆通五藏合於陰陽或陰見陽脉陽見陰脉故云乍陰乍陽也所以然者以氣交會故爾當審比類以知陰陽也先至爲主後至爲客脉氣乍陰見陽乍陽見陰何以别之當以先至爲主後至爲客也至謂至寸口也雷公曰臣悉盡意受傳經脉頌得從容之道以合從容不知陰陽不知雌雄頌謂今誦也公言臣所頌謫今從容之妙道欲合上古從容而比類形名猶不知陰陽尊卑之次不知雌雄殊目之義請行其㫖以明著至教陰陽雌雄相輸應也帝曰三陽爲父父所以督濟群小言高尊也二陽爲衛衛所以却禦諸邪言扶生也一陽爲紀紀所以綱紀形氣言其平也三陰爲母母所以育養諸子言滋生也二陰爲雌雌者陰之目也一陰爲獨使一陰之藏外合三焦三焦主謁導諸氣名爲使者故云獨使也二陽一陰陽明主病不勝一陰脉耎而動九竅皆沉一陰厥陰肝木氣也二陽陽明胃土氣也木土相薄故陽明主病也木伐其土土不勝木故云不勝一陰脉耎而動者耎爲胃氣動謂木刑土木相持則胃氣不轉故九竅沉滯而不通利也三陽一陰太陽脉勝一陰不能止内亂五藏外爲驚駭三陽是太陽之氣故曰太陽勝也木生火今盛陽燔木木復受之陽氣洪盛内爲狂熱故内亂五藏也肝主驚駭故外形驚駭之狀也二隂二陽病在肺少陰脉沉勝肺傷脾外傷四支二隂謂手少陰心之脉也二陽亦胃脉也心胃合病邪上下并故内傷牌外勝肺也所以然者胃爲牌府心火勝金故爾牌主四支故脾傷則外傷於四支矣少陰脉謂手掌後同身寸之五分當小指神門之脉也新枝正云詳此二陽乃手陽明大腸肺之府也少陰心火勝金之府故云病在肺王氏以二陽爲胃義未甚通况又以見胃病腎之說此乃是心病肺也又全元起本及甲乙經太素等并云二陰一陽二陰二陽皆交至病在腎罵詈妄行顛疾爲狂二陰爲腎水之藏也二陽爲胃土之府也土氣刑水故交至而病在腎也以腎水不勝故胃盛而顛爲狂二隂一陽病出於腎隂氣客遊於心脘下空竅堤閉塞不通四支别離一陽謂手少陽三焦心主火之府也水上干火故火病出於腎隂氣客逰於心也何者腎之脉從腎上貫肝鬲入肺中其支别者從肺中出絡心注胸中故如是也然空竅陰客上游胃不能制胃不能制是土氣衰故脘下空竅皆不通也言堤者謂如堤堰不容泄漏胃脉循足心脉絡手故四支如别離而不用也新枝正云按王氏云胃脉循足按此二陰一陽病出於腎胃當作腎一陰一陽代絶此陰氣至心上下無常出入不知咽喉乾燥病在上脾一陰厥陰脉一陽少陽脉并木之氣也代絶者動而中止也以其代絶故爲病也木氣生火故病生而陰氣至心也夫肝膽之氣上至頭首下至腰足中至腹脅故病發上下無常處也若受納不知其味竅寫不知其度而喉咽乾燥者喉嚨之後又咽屬爲膽之使故病則咽喉乾燥雖病在牌土之中蓋由肝膽之所爲爾二陽三陰至陰皆在陰不過陽陽氣不能止陰陰陽并絶浮爲血瘕沉爲膿附二陽陽明三陰手太陰至陰脾也故曰至陰皆在也然陰氣不能過越於陽陽氣不能制心今陰陽相薄故脉井絶斷而不相連續也脉浮爲陽氣薄陰故爲血瘕脉沉爲陰氣薄陽故爲膿聚而肺爛也陰陽皆壯下至陰陽若陰陽皆壯而相薄不已者漸下至陰陽之内爲大病矣陰陽者男子爲陽道女子爲陰器者以其盛受故也上合昭昭下合㝠㝠昭昭謂陽明之上㝠㝠謂至陰之内幽暗之所也診决死生之期遂合歲首謂下短期之㫖雷公曰請問短期寅帝不應欲其復問而實之也雷公復問寅帝曰在經論中上古經之中也新校正云按全元起本自雷公己下别爲一篇名四時病類雷公曰請問短期黄帝曰冬三月之病病合於陽者至春正月脉有死徵皆歸出春病合於陽謂前陰合陽而爲病者也雖正月脉有死徵陽已發生至王不死故岀春三月而至夏初也冬三月之病在理已盡草與柳葉皆殺裏謂二陰腎之氣也然腎病而正月脉有死徵者以枯草盡青松葉生出而皆死也理裏也已以也古用同春陰陽皆絶期在孟春立春之後而脉陰陽皆懸絶者期死不出正月新枝正云太素無春字春三月之病曰陽殺陽病不謂傷寒温熱之病謂非時病熱脉洪盛數也然春三月中陽氣尚少未當全盛而反病熱脉應夏氣者經云脉不再見夏脉當洪數無陽外應故必死於夏至也以死於夏至陽氣殺物之時故云陽殺陰陽皆絶期在草乾若不陽病但陰陽之脉皆懸絶者死在於霜降草乾之時也夏三月之病至陰不過十日謂熱病也脾熱病則五藏危土成數十故不過十日也陰陽交期在濓水評熱病論曰温病而汗岀輒復熱而脉躁疾不爲汗衰狂言不能食者病名曰陰陽交六月病暑陰陽復交二氣相持故乃死於立秋之候已新校正云按全元起本云溓水者七月也建申水生於申陰陽逆也楊上善云溓廉檢切水靜也七月水生時也秋三月之病三陽俱起不治自已秋陽氣衰陰氣漸岀陽不勝陰故自已也陰陽交合者立不能坐坐不能起以氣不由其正用故爾三陽獨至期在石水有陽無陰故云獨至也著至教論云三陽獨至者是三陽并至由此則但有陽而無陰也石水者謂冬月水冰如石之時故云石水也火墓於戌冬陽氣微故石水而死也新校正云詳石水之解本全元起之說王氏取之二陰獨至期在盛水亦所謂并至而無陽也盛水謂雨雪皆解爲水之時則正謂正月中氣也新枝正云按全元起本二陰作三陰方盛衰論篇雷公請問氣之多少何者爲逆何者爲從寅帝答曰陽從左陰從右陽氣之多少皆從左陰氣之多少皆從右從者爲順反者爲逆陰陽應象大論曰左右者陰陽之道路也老從上少從下老者穀衰故從上爲順少者欲甚故從下爲順是以春夏歸陽爲生歸秋冬爲死歸秋冬謂反歸陰也歸陰則順殺伐之氣故也反之則歸秋冬爲生反之謂秋冬秋冬則歸陰爲生也是以氣多少逆皆厥陽氣之多少反從右陰氣之多少反從左是爲不順故曰氣少多逆也如是從左從右之不順者皆爲厥厥謂氣逆故曰皆爲厥也問曰有餘者厥耶言少之不順者爲逆有餘者則成厥逆之病乎答曰一上不下寒厥到膝少者秋冬死老者秋冬生一經之氣厥逆上而陽氣不下者何以别之寒厥到膝是也四支者諸陽之本當温而反寒上故曰寒厥也秋冬謂歸陰歸陰則從右發生其病也少者以陽氣用事故秋冬死老者以陰氣用事故秋冬生新校正云按楊上善云虚者厥也陽氣一上於頭不下於足足脛虚故寒厥至膝氣上不下頭痛巔疾巔謂身之上巔疾則頭首之疾也求陽不得求隂不審五部隔無徵若居曠野若伏空室綿綿乎屬不滿日謂之陽乃脉似陰盛謂之陰又脉似陽盛故曰求陽不得求陰不審也五部謂五藏之部隔謂隔遠無徵無徵猶無可信驗也然求陽不得其熱求陰不審是寒五藏部不乆隔遠無可信驗故曰求陽不得求陰不審五部隔無徵也夫如是者乃從氣乆逆所作非由陰陽寒熱之氣所爲也若居曠野言心神散越若伏空室謂志意沉潜散越以氣逆而痛甚未止沉潜以痛定而復恐再來也綿綿乎謂動息微也身雖綿綿乎且存然其心所屬望將不得終其盡日也故曰綿綿乎屬不滿日也新校正云按太素云若伏空室爲陰陽之一有此五字疑此脫漏是以少陰之厥令人妄夢其極至迷氣之少有厥逆則令人妄爲夢寐其厥之盛極則令人夢至迷亂三陽絶三陰微是爲少氣三陽之脉懸絶三陰之診細微是爲少氣之候也新枝正云按太素云三陽絶氣是爲少氣是以肺氣虚則使人夢見白物見人斬血籍籍白物是象金之色也斬者金之用也籍籍夢死狀也得其時則夢見兵戰得時謂秋三月也金爲兵革故夢見兵戰腎氣虚則使人夢見舟船溺人舟船溺人皆水之用腎象水故夢形之得其時則夢伏水中若有畏恐冬三月也肝氣虚則夢見菌香生草菌香草生草木之類也肝合草木故夢見之新枝正云按全元起本云菌香是桂菌祛倫切得其時則夢伏樹下不敢起春三月也心氣虛則夢救火陽物心合火故夢之陽物亦火之類得其時則夢燔灼夏三月也脾氣虚則夢飮食不足脾約水穀故夢飲食不足得其時則夢築垣蓋屋得其時謂辰戌丑未之月來合十八日築垣蓋屋皆土之用此皆五藏氣虚陽氣有餘陰氣不足腑者陽氣藏者陰氣合之五診調之陰陽以在經脉靈樞經曰備有調陰陽合五診故引之曰以在經脉經脉則靈樞經之篇目也診有十度度人脉度藏度肉度筋度俞度度各有其二故二五爲十以量度陰陽氣盡人病自具診備盡陰陽虚盛之理則人病自具知之脉動無常散陰頗陽脉脫不具診無常行診必上下度民君卿脉動無常數者是陰散而陽頗調理也若脉診脫略而不具備者無以常行之診而察候之則當度量民及君卿三者調養之殊異爾何者憂樂苦分不同其秩故也受師不卒使術不明不察逆從是爲妄行持雌失雄棄陰附陽不知并合診故不明皆謂學不該備傳之後世反論白章章露也以不明而授與人反古之迹自然章露也至陰虛天氣絶至陽盛地氣不足至陰虚天氣絶而不降至陽盛地氣微而不升是所謂不交通也至謂至盛也陰陽并交至人之所行交謂交通也唯聖人乃能調理使行也陰陽并交者陽氣先至陰氣後至陰陽之氣井行而交通於一處者則當陽氣先至陰氣後至何者陽速而陰遲也靈樞經曰所謂交通者并行一數也由此則二氣亦交會於一處也是以聖人持診之道先後陰陽而持之奇恒之勢乃六十首診合微之事追陰陽之變章五中之情其中之論虛實之要定五度之事知此乃足以診奇恒勢六十首今世不傳是以切陰不得陽診消亡得陽不得陰守學不湛知左不知右知右不知左知上不知下知先不知後故治不乆知醜知善知病知不病知高知下知坐知起知行知止用之有診診道乃具萬世不殆聖人持診之明誡也起所有餘知所不足寳命全形論曰内外相得無以形先言起己身之有餘則當知病人之不足也度事上下脉事因格度事上下之宜脉事因而至於微妙矣格至也是以形弱氣虛死中外俱不足也形氣有餘脉氣不足死藏衰故脉不足也脉氣有餘形氣不足生藏盛故脉氣有餘是以診有大方坐起有常坐起有常則息力調適故診之方法必先用之出入有行以轉神明言所以貴坐起有常者何以出入行連皆神明隨轉也必清必靜上觀下觀司八正邪别五中部按脉動靜上觀謂氣色下觀謂形氣也八正謂八節之正候五中謂五藏之部分然後按寸尺之動靜而定死生矣循尺滑澀寒温之意视其大小合之病能逆從以得復知病名診可十全不失人情故診之或視息視意故不失條理數息之長短候脉之至數故診之法或視喘息也知息合脉病處必知聖人察候條理斯皆合也道甚眀察故能長乆不知此道失經絶理亡言妄期此謂失道謂失精微至妙道也解精微論篇新校正云按全元起本名方論解黄帝在明堂雷公請曰臣授業傳之行教以經論從容形法陰陽刺炎湯藥所滋行治有賢不肖未必能十全言所自授用可十全然傳所教習未能必爾也腎謂心明志遠不肖謂擁造不法若先言悲哀喜怒燥濕寒暑陰陽婦女請問其所以然者卑賤富貴人之形體所從群下通使臨事以適道術謹聞命矣皆以先聞聖㫖猶未究其意端請問有冕愚仆漏之問不在經者欲聞其狀言不智狡見頓問多也漏脫漏也謂經有所未解者也狡也愚不智見也仆猶頓也猶不漸也新枝正云按全元起本介作朴帝曰大矣人之所大要也公請問哭泣而汩不出者若出而少涕其故何也言何藏之不爲而致是乎帝曰在經有也靈樞經有悲哀涕泣之義復問不知水所從生涕所從出也復問重問也欲知水涕所生之由也帝曰若問此者無益於治也工之所知道之所生也言涕水者皆道氣之所生問之何也夫心者五藏之專精也專任也言五藏之精氣任心之所使以爲神明之府是故能目者其竅也神内守明外鑒故目其竅也華色者其榮也華色其神明之外飾是以人有德也則氣和於目有亡憂知於色德者道之用人之生也老子曰道生之德畜之氣者生之主神之舍也天布德地化氣故人因之以生也氣和則神安神安則外鑒明矣氣不和則神不守神不守則外榮減矣故曰人有德也氣和於目有亡也憂知於色也新枝正云按太素德作得是以悲哀則泣下泣下水所由生水宗者積水也新枝正云按甲乙經水宗作衆精積水者至陰也至陰者腎之精也宗精之水所以不出者是精持之也輔之裹之故水不行也夫水之精爲志火之精爲神水火相感神志俱悲是以目之水生也目爲上液之道故水火相感神忘俱悲水液上行乃主於目故諺言曰心悲名曰志悲志與心精共湊於目也水火相感故曰心悲名曰志悲神志俱升故志與心神共奔凑於目湊麄勾切是以俱悲則神氣傳於心精上不傳於志而志獨悲故泣出也泣涕者腦也腦者陰也五藏别論以腦爲地氣所生皆藏於陰而象於地故言腦者陰陽上爍也爍則銷也新枝正云按全元起本及甲乙經太素陰作陽髓者骨之充也充滿也言髓填於骨充而滿也故腦滲爲涕鼻竅通腦故腦滲爲涕流於鼻中矣志者骨之主也是以水流而涕從之者其行類也類謂同類夫涕之與泣者譬如人之兄弟急則俱死生則俱生同源故生死俱新枝正云按太素生則俱生作出則俱亡其志以早悲是以涕泣俱出而横行也行恐當爲流夫人涕泣俱出而相從者所屬之類也所屬謂於腦也何者上文云涕泣者腦也雷公曰大矣請問人哭泣而汩不出者若出而少涕不從之何也怪其所屬同而行出異也帝曰夫泣不出者哭不悲也不泣者神不慈也神不慈則志不悲陰陽相持泣安能獨來泣不出者謂汨也不泣者泣謂哭也水之精爲志火之精爲神水爲陰火爲陽故曰陰陽相持泣安能獨來也夫志悲者惋惋則衝陰衝陰則志去目志去則神不守精精神去目涕泣出也惋謂内爍也衝猶升也神志相感泣由是生故内爍則陽氣升於陰也陰腦也去目謂陰不守目也志去於目故神亦浮游失志去目則光無内照神失守則精不外明故曰精神去目涕泣出也且子獨不誦不念夫經言乎厥則目無所見夫人厥則陽氣并於上陰氣并於下并謂各井於本位也陽并於上則火獨光也陰并於下則足寒足寒則脹也夫一水不勝五火故目眥盲眥視也一水目也五火謂五藏之厥陽也新校正云按甲乙經無眥字是以氣衝風泣下而不止夫風之中目也陽氣内守於精是火氣燔目故見風則泣下也風迫陽伏不發故内燔也有以比之夫火疾風生乃能雨此之類也故陽并則火獨光盛於上不明於下是故目者陽之所生繫於藏故云陰陽和則精明也陽厥則光不上陰厥則足冷而脹也言一水不勝五火者是手足之陽爲五火下一陰者肝之氣也衝風泣下而不止者言風之中於目也是陽氣内守於精故陽氣盛而火氣燔於目風與熱交故泣下是故火疾而風生乃能雨以陽火之熱而風生於泣以此譬之類也新校正云按甲乙經無火宇太素云天之疾風乃能雨無生字黄帝内經素問補註釋文卷之五十

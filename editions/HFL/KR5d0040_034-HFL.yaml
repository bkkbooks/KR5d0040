front:
  text: 黄帝内經素問補註釋文卷之三十四宜十
  hash: sha256:4a8a79c13b51ca287b92c36f5ceb47a109534b15b416976e2c3e11a2e89eaedd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_034-001a, image: hfl/0655/0655-162.png}
body:
  text: 唐太僕令啓玄子王氷次註宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤骨空論篇黄帝問曰余聞風者百病之始也以鍼治之奈何始初也岐伯對曰風從外入令人振寒汗出頭痛身重惡寒風中身形則腠理閉宻陽氣内拒寒復外勝勝拒相薄榮衛失所故如是治在風府風府穴也在項上入髮際同身寸之一寸宛宛中督脉足太陽之會刺可入同身寸之四分若灸者可灸五壯新校正云按風府注氣穴論氣府論中各已注與甲乙經同此注云督脉足太陽之會可灸五壯者乃是風門熱府穴也當云督脉陽維之會留三呼不可灸乃是調其陰陽不足則補有餘則寫用針之道必法天常盛寫虚補此其常也大風頸項痛刺風府風府在上椎上椎謂大椎上入髮際同身寸之一寸大風汗出灸譩譆諱譆在背下俠脊傍三寸所厭之令病者呼諱譆諱譆應手譩譆穴也在肩膊内廉俠第六椎下兩傍各同身寸之三寸以手厭之令病人呼諳譆之聲則指下動矣足太陽脉氣所發刺可入同身寸之六分留七呼若灸者可灸五壯諳譆者因取爲名爾膊音博從風憎風刺眉頭謂攢竹穴也在眉頭陷者中脉動應手足太陽脉氣所發刺可入同身寸之三分若灸者可灸三壯失枕在肩上横骨間謂缺盆穴也在肩上横骨陷者中手陽明脉氣所發刺可入同身寸之二分留七呼若灸者可灸三壯刺入深令人逆息新校正云按氣府注作足陽明此云手陽明詳二經俱發於此故王注兩言之折使揄臂齊肘正灸脊中揄讀爲摇摇謂摇動也然失枕非獨取肩上横骨間亦當正形灸脊中也欲而驗之則使摇動其臂屈折其肘自項之下横齊肘端當其中間則其處也是曰陽關在第十六椎節下間督脉氣所發刺可入同身寸之五分若灸者可灸三壯新校正云詳陽關穴甲乙經無䏚絡季脇引少腹而痛脹刺譩譆䏚謂俠脊兩傍空軟處也少腹齊下也腰痛不可以轉摇急引陰卵刺八髎與痛上八髎在腰尻分間八或謂九驗眞骨及中誥孔穴經正有八髎無九髎也分謂腰尻筋肉分間陷下處鼠瘻寒熱還刺寒府寒府在附膝外解營膝外骨間也屈伸之處寒氣喜中故名寒府也解謂骨解營謂深刺而必中其營也取膝上外者使之拜取足心者使之跪拜而取者使膝外空開也跪而取之者令足心宛宛處深定也任脉者起於中極之下以上毛際循腹裏上關元至咽喉上頤循面入目新校正云按難經甲乙經無上頣循面入目六字衝脉者起於氣街并少陰之經新校正云按難經甲乙經作陽明俠齊上行至胸中而散任脉衝脉者奇經也任脉當齊中而上行衝脉俠齊兩傍而上行然中極者謂齊下同身寸之四寸也言中極之下者言中極從少腹之内上行而外出於毛際而上非謂本起於此也關元者謂齊下同身寸之三寸也氣街者穴名也在毛際兩傍鼠鼷上同身寸之一寸也言衝脉起於氣街者亦從少腹之内與任脉并行而至於是乃循腹也何以言之針經曰衝脉者十二經之海與少陰之絡起於腎下出於氣街又曰衝脉任脉者皆起於胞中上循脊裏爲經絡之海其浮而外者循腹各行會於咽喉别而絡唇口血氣盛則皮膚熱血獨盛則滲灌皮膚生毫毛由此言之則任脉乃從少腹之内上行至中極之下氣街之内明矣新校正云按氣街與氣府論刺熱篇水熱穴篇刺禁論等注重文雖不同處所無别備注氣府論中任脉爲病男子内結七疝女子帶下瘕聚衝脉爲病逆氣裏急督脉爲病脊强反折督脉亦奇經也然任脉衝脉督脉者一源而三歧也故經或謂衝脉爲督脉也何以明之今甲乙及古經脉流注圖經以任脉循背者謂之督脉自少腹直上者謂之任脉亦謂之督脉是則以背腹陰陽别爲名目爾以任脉自胞上過帶脉貫齊而上故男子爲病内結七疝女子爲病則帶下瘕聚也以衝脉俠齊而上并少陰之經上至胸中故衝脉爲病則逆氣裏急也以督脉上循脊裏故督脉爲病則脊强反折也督脉者起於少腹以下骨中央女子入繫廷孔起非初起亦猶任脉衝脉起於胞中也其實乃起於腎下至於少腹則下行於腰横骨圍之中央也繫廷孔者謂窈漏近所謂前陰穴也以其陰廷繫屬於中故名之其孔溺孔之端也孔則窈漏也窈漏之中其上有溺孔焉端謂陰廷在此溺孔之上端也而督脉自骨圍中央則至於是其絡循陰器合篡間繞簒後督脉别絡自溺孔之端分而各行下循陰器乃合簒間也所謂間者謂前陰後陰之兩間也自兩間之後已復分而行繞篡之後别繞臀至少陰與巨陽中絡者合少陰上股内後廉貫脊屬腎别謂别絡分而各行之於焦也足少陰之絡者自股内後廉貫脊屬腎足太陽絡之外行者循髀樞絡股陽而下其中行者下貫臀至膕中與外行絡合故言至少陰與巨陽中絡合少陰上股内後廉貫脊屬腎也新校正云詳各行於焦疑焦字誤與太陽起於目内眥上額交巔上入絡腦還出别下項循肩膊内俠脊抵腰中入循膂絡腎接繞臀而上行也其男子循莖下至篡與女子等其少腹直上者貫齊中央上貫心入喉上頤環唇上繫兩曰之下中央自與太陽起於目内下至女子等并督脉之别絡也其直行者自尻上循脊裏而至於鼻人也自其少腹直上至兩目之下中央并任脉之行而云是督脉所繫由此言之則任脉衝脉督脉名異而同一體也此生病從少腹上衝心而痛不得前後爲衝疝尋此生病正是任脉經云爲衝疝者正明督脉以别主而異目也何者若一脉一氣而無陰陽之異主則此生病者當心背俱痛豈獨衝心而爲疝乎其女子不孕癃痔遺溺嗌乾亦以衝脉任脉并自少腹上至於咽喉又以督脉循陰器合篡間繞篡後别繞臀故不孕癃痔遺溺嗌乾也所以謂之任脉者女子得之以任養也故經云此病其女子不孕也所以謂之衝脉者以其氣上衝也故經云此生病從少腹上衝心而痛也所以謂之督脉者以其督領經脉之海也由此三用故一源三歧經或通呼似相謬引故下文曰督脉生病治督脉治在骨上甚者在齊下營此亦正任脉之分也衝任督三脉異名同體亦明矣骨上謂腰横骨上髦際中曲骨穴也任脉足厥陰之會刺可入同身寸之一寸半若灸者可灸三壯齊下謂齊直下同身寸之一寸陰交穴任脉陰衝之會刺可入同身寸之八分若灸者可灸五壯其上氣有音者治其喉中央在缺盆中者中謂缺盆兩間之中天突穴在頸結喉下同身寸之四寸中央宛宛中陰維任脉之會低針取之刺可入同身寸之一寸留七呼若灸者可灸三壯其病上衝喉者治其漸漸者上俠頤也陽明之脉漸上頤而環唇故以俠頤名爲漸也是爲大迎大迎在曲頷前骨同身寸之一寸三分陷中動脉足陽明脉氣所發刺可入同身寸之三分留七呼若灸者可灸三壯蹇膝伸不屈治其楗蹇膝謂膝痛屈伸蹇難也楗謂髀輔骨上横骨下股外之中側立摇動取之筋動應手楗音健坐而膝痛治其機髖骨兩傍相接處立而暑解治其骸關暑熱也若膝痛立而膝骨解中熱者治其骸關骸關謂膝解也一經云起而引解言膝痛起立痛引膝骨解之中也暑引二字其義則異起立二字其意頗同膝痛痛及拇指治其膕膕謂膝解之後曲脚之中委中穴背面取之脉動應手足太陽脉之所入刺可入同身寸之五分留七呼若灸者可灸三壯坐而膝痛如物隱者治其關關在膕上當楗之後背立按之以動摇筋應手膝痛不可屈伸治其背内謂大杼穴也所在灸刺分壯與氣穴同法連胻若折治陽明中俞髎若膝痛不可屈伸連胻痛如折者則針陽明脉中俞髎也是則正取三里穴也若别治巨陽少陰滎若痛而膝如别離者則治足太陽少陰之滎也足太陽滎通谷也在足小指外側本節前陷者中刺可入同身寸之二分留五呼若灸者可灸三壯足少陰滎然谷也在足内踝前起大骨下陷者中刺可入同身寸之三分留三呼若灸者可灸三壯淫濼脛痠不能乆立治少陽之維新校正云按甲乙經外踝上五寸乃足少陽之絡此云維者字之誤也在外躁上五寸淫濼謂似酸痛而無力也五寸一云四寸中誥圖經外踝上四寸無穴五寸是光明穴也足少陽之絡刺可入同身寸之七分留十呼若灸者可灸五壯新校正云按甲乙經云刺入六分留七呼輔骨上横骨下爲楗俠髖爲機膝解爲骸關俠膝之骨爲連骸骸下爲輔輔上爲膕膕上爲關頭横骨爲枕由是則謂膝輔骨上腰髖骨下爲楗楗上爲機膝外爲骸關楗後爲關關下爲膕膕下爲輔骨輔骨上爲連骸運骸者是骸骨相連接處也頭上之横骨爲枕骨水俞五十七穴者尻上五行行五伏菟上兩行行五左右各一行行五踝上各一行行六穴所在刺灸分壯貝水熱穴論中此皆是骨空故氣穴篇内與此重言爾髓空在腦後五分在顱際銳骨之下是謂風府通腦中也一在齦基下當頤下骨陷中有穴容豆中誥圖經名下頣齦音銀一在項後中復骨下謂瘖門穴也在項髮際宛宛中入系舌本督脉陽維之會仰頭取之刺可入同身寸之四分禁不可灸一在脊骨上空在風府上上謂腦户穴也在枕骨上大羽後同身寸之一寸五分宛宛中督脉足太陽之會此别腦之户不可妄灸灸之不幸令人瘖刺可入同身寸之三分留三呼新校正云按甲乙經大羽者强間之别名氣府注云若灸者可灸五壯脊骨下空在尻骨下空不應主療經闕其名新校正云按甲乙經長强在脊骶端正在尻骨下王氏云不應主療經闕其名得非誤乎數髓空在面俠鼻謂顴髎等穴經不二指陳其處小小者爾或骨空在口下當兩肩謂大迎穴也所在刺灸分壯與前俠頤同法兩膊骨空在膊中之陽近肩髃穴經無名臂骨空在臂陽去躁四寸兩骨空之間在支溝上同身寸之一寸是謂通間新校正云按甲乙經去溝上一寸名三陽絡通間豈其别名歟股骨上空在股陽出上膝四寸在陰市上伏菟穴下在承楗也胻骨空在輔骨之上端謂犢鼻穴也在膝髕下胻骨上俠解大筋中足陽明脉氣所發刺可入同身六分灸者可灸三壯股際骨空在毛中動下經闕其名尻骨空在髀骨之後相去四寸是謂尻骨上八髎穴也扁骨有滲理凑無髓孔易髓無空肩骨謂尻間扁戾骨也其骨上有滲灌文理歸凑之無别髓孔也易亦也骨有空則髓有孔骨若無孔髓亦無孔也灸寒熱之法先灸項大椎以年爲壯數如患人之年數次灸橛骨以年爲壯數尾窮謂之橛骨視背俞陷者灸之背胛骨際有陷處也舉臂肩上陷者灸之肩髃穴也在肩端兩骨間手陽明蹻脉之會刺可入同身寸之六分留六呼若灸者可灸三壯也兩季脅之間灸之京門穴腎募也在髂骨與腰中季脅本俠脊刺可入同身寸之三分留七呼若灸者可灸三壯外踝上絶骨之端灸之陽輔穴也在足外踝上輔骨前絶骨之端如前同身寸之三分所去丘虚七寸足少陽脉之所行也刺可入同身寸之五分留七呼若灸者可灸三壯新校正云按甲乙經云在外踝上四寸足小指次指間灸之俠谿穴也在足小指次指歧骨間本節前陷者中足少陽脉之所流也刺可入同身寸之三分留三呼若灸者可灸三壯新校正云按甲乙經流當作留字腨下陷脉灸之承筋穴也在腨中央陷者中足太陽脉氣所發也禁不可刺可灸三壯新校正云按刺腰痛篇注云胻中央如外陷者中外躁後灸之崑崙穴也在足外踝後跟骨上陷者中細脉動應手足太陽脉之所行也刺可入同身寸之五分留十呼若灸者可灸三壯缺盆骨上切之堅動如筋者灸之經闕其名當隨其所有而灸之膺中陷骨間灸之天突穴也所在灸刺分壯與前缺盆中者同法掌束骨下灸之陽池穴也在手表腕上陷者中手少陽脉之所過也刺可入同身寸之二分留六呼若灸者可灸三壯臍下關元三寸灸之正在臍下同身寸之三寸足三陰任脉之會刺可入同身寸之二寸留七呼若灸者灸七壯新校正云按氣府注云刺可入一寸二分者非毛際動脉灸之以脉動應手爲處即氣街穴也膝下三寸分間灸之三里穴也在膝下同身寸之三寸胻骨外廉兩筋肉分間足陽明脉之所入也刺可入身寸之一寸留七呼若灸者可灸三壯足陽明跗上動脉灸之衝陽穴也在足跗上同身寸之五寸骨間動脉足陽明脉之所過也刺可入同身寸之三分留十呼若灸者可灸三壯新校正云按甲乙經及全元起本足陽明下有灸之二字并跗上動脉是二穴今王氏去灸之二字則見二穴今於注中却存灸之二字以闕疑耳巔上一灸之百會穴也在頂中央旋毛中陷容指督脉足太陽脉之交會刺可入同身寸之三分若灸者可灸五壯犬所嚙之處灸之三壯即以犬傷病法灸之犬傷而發寒熱者即以犬傷法三壯灸之嚙古結切凡當灸二十九處傷食灸之傷食爲病亦發寒熱故灸新校正云詳足陽明不别灸則有二十八處疑王氏去上文灸之二字者非不已者必視其經之過於陽者數刺其俞而藥之黄帝内經素問補註釋文卷之三十四

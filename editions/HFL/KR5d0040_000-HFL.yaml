body:
  text: 唐太僕令啓玄子王氷次注宋光禄𡖖直秘閣林億等校正宋守尚書屯田郎孫兆重改誤夫釋縳脫艱全真導氣拯黎元於仁壽濟羸劣以獲安者非三聖道則不能致之矣孔安國序尚書曰伏羲神農黄帝之書謂之三墳言大道也班固漢書藝文志曰黄帝内經十八卷素問即其經之九卷也兼靈樞九卷逎乃其數焉新校正云詳王氏此說蓋本皇甫士安甲乙經之序彼云七畧藝文志黄帝内經十八卷今有鍼經九卷素問九卷共十八卷即内經也故王氏遵而用之又素問外九卷漢張仲景及西𣈆王叔和脉經只爲之九卷皇甫士安名爲鍼經亦專名九卷楊玄操云黄帝内經二帙帙各九卷按隋書經籍志謂之九靈王冰名爲靈樞雖復年移代革而授學猶存懼非其人而時有所隱故第七一卷師氏藏之今之奉行惟八卷爾然而其文簡其意博其理奥其趣深天地之象分陰陽之候列變化之由表死生之兆彰不謀而遐邇自同勿約而幽明斯契稽其言有徵驗之事不忒誠可謂至道之宗養生之始矣假若天機迅發妙識玄通蕆謀雖屬乎生知標格亦資於詁訓未嘗有行不由徑出不由户者也然刻意研精探微索隱或識契眞要則目牛無全故動則有成猶鬼神幽贊而命世奇傑時時間出焉則周有秦公新校正云按别本一作和緩漢有淳于公魏有張公華公皆得斯妙道者也咸日新其用大濟蒸人華葉遞榮聲實相副蓋教之著矣亦天之假也冰弱齡慕道夙好養生幸遇眞經式爲龜鏡而世本紕繆篇目重叠前後不倫文義懸隔施行不易披會亦難歲月既淹襲以成弊或一篇重出而别立二名或兩論併吞而都爲一目或問答未已别樹篇題或脫簡不書而云世闕重合經而冠鍼服併方宜而爲咳篇隔虚實而爲逆從合經絡而爲論要節皮部爲經絡退至道以先針諸如此流不可勝數且將升岱嶽非徑奚爲欲詣扶桑無舟莫適乃精勤博訪而并有其人歷十二年方臻理要詢謀得失深遂夙心時於先生郭子齋堂受得先師張公秘本文字昭晰義理還周一以參詳群疑冰釋恐散於末學絶彼師資因而撰注用傳不朽兼舊藏之卷合八十一篇二十四卷勒成一部新校正云詳素問第七卷亡已久矣按皇甫士安𣈆人也序甲乙經云亦有亡失隋書經籍志載梁七録亦云止存八卷全元起隋人所注本乃無第七王冰唐寳應中人上至晋皇甫謐甘露中已六百餘年而冰自爲得舊藏之卷今竊疑之仍觀天元紀大論五運行論六微㫖論氣交變論五常政論六元正紀論至眞要論七篇居今素問四卷篇卷浩大不與素問前後篇卷等又且所載之事與素問餘篇略不相通竊疑此七篇乃陰陽大論之文王氏取以補所亡之卷猶周官無冬官以考工記補之之類也又按漢張仲景傷寒論序云撰用素問九卷八十一難經陰陽大論是素問與陰陽大論兩書甚明乃王氏并陰陽大論於素問中也要之陰陽大論亦古醫經終非素問第七矣冀乎究尾明首尋注會經開發童蒙宣揚至理而已其中簡脫文斷義不相接者搜求經論所有遷移以補其處篇目墜缺指事不明者量其意趣加字以昭其義篇論吞併義不相涉闕漏名目者區分事類别目以冠篇首君臣請問禮儀乖失者考校尊卑增益以光其意錯簡碎文前後重叠者詳其指趣削去繁雜以存其要辭理秘宻難粗論述者别撰玄珠以陳其道新校正云詳王氏玄珠世無傳者今有玄珠十卷昭明隱㫖三卷蓋後人附托之文也雖非王氏之書亦於素問第十九卷至二十二四卷頗有發明其隱㫖三卷與今世所謂天元玉册者正相表裏而與王冰之義多不同凡所加字皆朱書其文使今古必分字不雜糅女救切雜也庶厥昭彰聖㫖敷暢玄言有如列宿高懸奎張不亂深泉淨瀅音瑩鱗介咸分君臣無夭枉之期夷夏有延齡之望俾工徒勿誤學者惟明至道流行徽音累屬千載之後方知大聖之慈惠無窮時大唐寳應元年歲次壬寅序

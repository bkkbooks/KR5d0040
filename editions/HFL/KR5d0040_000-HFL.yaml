front:
  text: 黄帝内經素問表慎一臣聞安不忘危存不忘亡者往聖之先務求民之瘼恤民之隱者上主之深仁在昔黄帝之御極也以理身緒餘治天下坐於明堂之上臨觀八極考建五常以謂人之生也負陰而抱陽食味而被色外有寒暑之相盪内有喜怒之交侵夭昏札瘥國家代有將欲斂時五福以敷錫厥庶民乃與岐伯上窮天紀下極地理遠取諸物近取諸身更相問難垂法以福後世於是雷公之倫受業傳之而内經作矣歷代寳之未有失墜蒼周之興秦和述六氣之論具明於左史厥後越人得其一二演而述難經西漢倉公傳其舊學東漢仲景撰其遺論晋皇甫謐次而爲甲乙及隋楊上善纂而爲太素時則有全元起者始爲之訓解闕第七一通迄唐寳應中太僕王冰篤好之得先師所藏之卷大爲次注猶是三皇遺文爛然可觀惜乎唐令列之醫學付之執技之流而薦紳先生罕言之去聖已遠其術暗昧是以文注紛錯義理混淆殊不知三墳之餘帝王之高致聖賢之能事唐堯之授四時虞舜之齊七政神禹修六府以興帝功文王推六子以叙卦氣伊尹調五味以致君箕子陳五行以佐世其致一也奈何以至精至微之道傳之以至下至淺之人其不廢絶爲已幸矣頃在嘉祐中仁宗念聖祖之遺事將墜於地乃詔通知其學者俾之是正臣等承乏典校伏念旬歲遂乃搜訪中外裒集衆本浸尋其義正其訛舛十得其三四餘不能具竊謂未足以稱明詔副聖意而又採漢唐書録古醫經之存於世者得數十家叙而考正焉貫穿錯綜磅礴會通或端本以尋支或溯流而討源定其可知次以舊目正繆誤者六千餘字增注義者二千餘條一言去取必有稽考舛文疑義於是詳明以之治身可以消患於未兆施於有政可以廣生於無窮恭惟皇帝撫大同之運擁無疆之休述先志以奉成興微學而永正則和氣可召災害不生陶一世之民同躋於壽域矣國子博士臣高保衡光禄卿直秘閣臣林億等謹上黄帝内經素問序

front:
  text: 黄帝内經素問補註釋文卷之三十八今三
  hash: sha256:d80db4f5aaa7ec4b67162d2861c44313bf77fdeb76e5f0888c181eb16ed32ab1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_038-001a, image: hfl/0656/0656-106.png}
body:
  text: 唐太僕令啓玄子王氷次註宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤天元紀大論篇黄帝問曰天有五行御五位以生寒暑燥濕風人有五臓化五氣以生喜怒思憂恐御謂臨御化謂生化也天眞之氣無所不周氣象雖殊參應一也新校正云按陰陽應象大論云喜怒悲憂恐二論不同者思者脾也四臓皆受成焉悲者勝怒也二論所以互相成也論言五運相襲而皆治之終期之日周而復始余已知之矣願聞其與三陰三陽之候奈何合之論謂六節臓象論也運謂五行應天之五運各周三百六十五日而爲紀者也故曰終期之日周而復始也以六合五數未參同故問之也鬼臾區稽首再拜對曰昭乎哉問也夫五運陰陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也可不通乎道謂化生之道綱紀謂生長化成收藏之綱紀也父母謂萬物形之先也本始謂生殺皆因而有之也夫有形禀氣而不爲五運陰陽之所攝者未之有也所以造化不極能爲萬物生化之元始者何也以其是神明之府故也然合散不測生化無窮非以五運爲無能爾也新校正云詳陰陽者至神眀之府也與陰與應象大論同而兩論之注頗異耳故物生謂之化物極謂之變陰陽不測謂之神神用無方謂之聖所謂化變聖神之道也化施化也變散易也神無期也聖無思也氣之施化故曰生氣之散易故曰極無期禀候故曰神無思測量故曰聖由化與變故萬物無能逃五運陰陽由聖與神故衆妙無能出幽玄之理深乎妙用不可得而稱之新校正云按六微㫖大論云物之生從於化物之極由乎變變化之相薄成敗之所由也又五常政大論云氣始而生化氣散而有形氣布而蕃育氣終而象變其致一也夫變化之爲用也應萬化之用也在天爲玄玄遠也天道玄遠變化無窮傳曰天道遠人道邇在人爲道道謂妙用之道也經術政化非道不成在地爲化化謂生化也生萬物者也非土氣孕育則形質不成化生五味金石草木根葉華實酸苦甘淡辛鹹皆化氣所生隨時而有道生智智通妙用唯道所生玄生神玄遠幽深故生神也神之爲用觸遇玄通契物化成無不應也神在天爲風風者教之始天之使也天之號令也在地爲木東方之化在天爲熱應火爲用在地爲火南方之化在天爲濕應土爲用在地爲土中央之化在天爲燥應金爲用在地爲金西方之化在天爲寒應水爲用在地爲水北方之化神之爲用如上五化木爲風所生火爲熱所熾金爲燥所發水爲寒所資土爲濕所全蓋初因而成立也雖初因之以化成卒因之以敗散爾豈五行之獨有是哉凡因所因而成立者悉因所因而散落爾新校正云詳在天爲玄至此與陰陽應象大論及五運行大論文重注頗異故在天爲氣在地成形氣謂風熱濕燥寒形謂木火土金水形氣相感而化生萬物矣此造化生成之大紀然天地者萬物之上下也天覆地載上下相臨萬物化生無遺略也由是故萬物自生自長自化自成自盈自虚自復自變也夫變者何謂生之氣極本而更始化也孔子曰曲成萬物而不遺左右者陰陽之道路也天有六氣御下地有五行奉上當歲者爲上主司天承歲者爲下主司地不當歲者二氣居右北行轉之二氣居左南行轉之金木水火運北面正之常左爲右右爲左則左者南行右者北行而反也新校正云詳上下左右之說義具五運行大論中水火者陰陽之征兆也徵信也驗也兆先也以水火之寒熱彰信陰陽之先兆也金木者生成之終始也木主發生應春春爲生化之始金主收斂應秋秋爲成實之終終始不息其化常行故萬物生長化成收藏自乆新校正云按陰陽應象大論曰天地者萬物之上下也陰陽者血氣之男女左右者陰陽之道路水火者陰陽之徵兆陰陽者萬物之能始也與此論相出入也氣有多少形有盛衰上下相召而損益彰矣氣有多少謂天之陰陽三等多少不同秩也形有盛衰謂五運之氣有太過不及也由是少多盛衰天地相召而陰陽損益昭然彰著可見也新校正云詳陰陽三等之義具下文注中帝曰願聞五運之主時也何如時四時也鬼臾區曰五氣運行各終期日非獨主時也一運之日終三百六十五日四分度之一乃易之非主一時當其王相囚死而爲絶法也氣交之内迢然而别有之也帝曰請聞其所謂也鬼臾區曰臣積考太始天元册文曰天元册所以記天眞元氣運行之紀也自神農之世鬼臾區十世祖始誦而行之此太古占候靈文洎乎伏羲之時已鎸諸玉版命曰册文太古靈文故命曰太始天元册也新校正云詳今世有天元玉册或者以謂即此太始天元册文非是鎸子泉切太虚寥廓肇基化元太虚謂空玄之境眞氣之所充神明之宫府也眞氣精微無遠不至故能爲生化之本始運氣之眞元矣肇始也基本也萬物資始五運終天五運謂木火土金水運也終天謂一歲三百六十五日四分度之一也終始更代周而復始也言五運更統於太虚四時隨部而遷復六氣分居而異主萬物因之以化生非曰自然其誰能始故曰萬物資始易曰大哉乾元萬物資始乃統天雲行雨施品物流形孔子曰天何言哉四時行焉百物生焉此其義也布氣眞靈緫統坤元太虚眞氣無所不至也氣齊生有故禀氣含靈者抱眞氣以生焉緫統坤元言天元氣常司地氣化生之道也易曰至哉坤元萬物資生乃順承天也九星懸朗七曜周旋九星上古之時也上古世質人淳歸眞返朴九星懸朗五運齊宣中古道德稍衰標星藏曜故計星之見者七焉九星謂天蓬天内天衝天輔天禽天心天任天柱天英此蓋從標而爲始遁甲式法今猶用焉七曜謂日月五星今外蕃多以此曆爲舉動吉凶之信也周謂周天之度旋謂左循天度而行五星之行猶各有進退高下小大矣曰陰曰陽曰柔曰剛陰陽天道也柔剛地道也天以陽生陰長地以柔化剛成也易曰立天之道曰陰與陽立地之道曰柔與剛此之謂也幽顯既位寒暑弛張幽顯既位言人神各得其序寒暑弛張言陰陽不失其宜也人神各守所居無相干犯陰陽不失其序物得其宜天地之道且然人神之理亦猶也新校正云按至眞要大論云幽明何如岐伯曰兩陰交盡故曰幽兩陽合明故曰明幽明之配寒暑之異也生生化化品物咸章上生謂生之有情有識之類也下生謂生之無情無識之類也上化謂形容彰顯者也下化謂蔽匿形容者也有情有識彰顯形容天氣主之無情無識蔽匿形質地氣主之禀元靈氣之所化育爾易曰天地絪緼萬物化醇斯之謂歟臣斯十世此之謂也傳習斯文至鬼臾區十世於兹不敢失墜帝曰善何謂氣有多少形有盛衰鬼臾區曰陰陽之氣各有多少故曰三陰三陽也由氣有多少故隨其升降分爲三别也新校正云按至眞要大論云陰陽之三也何謂岐伯曰氣有多少異用王冰云太陰爲正陰太陽爲正陽次少者爲少陰次少者爲少陽又次爲陽明又次爲厥陰形有盛衰謂五行之治各有太過不及也太過有餘也不及不足也氣至不足太過迎之氣至太過不足隨之天地之氣虧盈如此故云形有盛衰也故其始也有餘而往不足隨之不足而往有餘從之知迎知隨氣可與期言虧盈無常互有勝負爾始謂甲子歲也六微㫖大論曰天氣始於甲地氣始於子子甲相合命曰歲立此之謂也則始甲子之歲三百六十五日所禀之氣當不足也次而推之終六甲也故有餘已則不足不足已則有餘亦有歲運非有餘非不足者蓋以同天地之化也若餘已復餘少已復少則天地之道變常而灾害作苛疾生矣新校正云按六微㫖大論云木運臨卯火運臨午土運臨四季金運臨酉水運臨子所謂歲會氣之平也又按五常政大論云委和之紀上角與正角同上商與正商同上宫與正宫同伏明之紀上商與正商同卑監之紀上宫與正宫同上角與正角同從革之紀上商與正商同上角與正角同涸流之紀上宫與正宫同赫曦之紀上羽與正徵同堅成之紀上徵與正商同又六元正紀大論云不及而加同歲會已前諸歲并爲正歲氣之平也今王注以同天之化爲非有餘不足者非也應天爲天符承歲爲歲直三合爲治應天謂木運之歲上見厥陰火運之歲上見少陽少陰土運之歲上見太陰金運之歲上見陽明水運之歲上見太陽此五者天氣下降如合符運故曰應天爲天符也承歲謂木運之歲歲當亥卯火運之歲歲當寅午土運之歲歲當辰戌丑未金運之歲歲當巳酉水運之歲歲當申子此五者歲之所直故曰承歲爲歲直也三合謂火運之歲上見少陰年辰臨午土運之歲上見太陰年辰臨丑未金運之歲上見陽明年辰臨酉此三者天氣運氣與年辰俱會故云三合爲治也歲直亦曰歲位三合亦爲天符六微㫖大論曰天符歲會曰太乙天符謂天運與歲俱會也新校正云按天符歲會之詳具六微㫖大論中又詳火運上少陰年辰臨午即戊午歲也土運上太陰年辰臨丑未即己丑己未歲也金運上陽明年辰臨酉即乙酉歲也帝曰上下相召奈何鬼臾區曰寒暑燥濕風火天之陰陽也三陰三陽上奉之太陽爲寒少陽爲暑陽明爲燥太陰爲濕厥陰爲風少陰爲火皆其元在天故曰天之陰陽也木火土金水火地之陰陽也生長化收藏下應之木初氣也火二氣也相火三氣也土四氣也金五氣也水終氣也以其在地應天故云下應也氣在地故曰地之陰陽也新校正云按六微㫖大論曰地理之應六節氣位何如岐伯曰顯明之右君火之位退行一步相火治之復行一步土氣治之復行一步金氣治之復行一步水氣治之復行一步木氣治之此即木火土金水火地之陰陽之義也天以陽生陰長地以陽殺陰藏生長者天之道藏殺者地之道天陽主生故以陽生陰長地陰主殺故以陽殺陰藏天地雖高下不同而各有陰陽之運用也新校正云詳此經與陰陽應象大論文重注頗異天有陰陽地亦有陰陽天有陰故能下降地有陽故能上騰是以各有陰陽也陰陽交泰故化變由之成也木火土金水火地之陰陽也生長化收藏故陽中有陰陰中有陽陰陽之氣極則過亢故各兼之陰陽應象大論曰寒極生熱熱極生寒又曰重陰必陽重陽必陰言氣極則變也故陽中兼陰陰中兼陽易之卦離中虚坎中滿此其義象也所以欲知天地之陰陽者應天之氣動而不息故五歲而右遷應地之氣靜而守位故六期而環會天有六氣地有五位天以六氣臨地地以五位承天蓋以天氣不加君火故也以六加五則五歲而餘一氣故遷一位若以五承六則常六歲乃備盡天元之氣故六年而環會所謂周而復始也地氣左行往而不返天氣東轉常自火運數五歲已其次氣正當君火之上法不加臨則右遷君火氣上以臨相火之上故曰五歲而右遷也由斯動靜上下相臨而天地萬物之情變化之機可見矣動靜相召上下相臨陰陽相錯而變由生也天地之道變化之微其由是矣孔子曰天地設位而易行乎其中此之謂也新校正云按五運行大論云上下相遘寒暑相臨氣相得則和不相得則病又云上者右行下者左行左右周天餘而復會帝曰上下周紀其有數乎鬼臾區曰天以六爲節地以五爲制周天氣者六期爲一備終地紀者五歲爲一周六節謂六氣之分五制謂五位之分位應一歲氣統一年故五歲爲一周六年爲一備備謂備歷天氣周謂周行地位所以地位六而言五者天氣不臨君火故也君火以明相火以位君火在相火之右但立名於君位不立歲氣故天之六氣不偶其氣以行君火之政守位而奉天之命以宣行火令爾以名奉天故曰君火以名守位禀命故云相火以位五六相合而七百二十氣爲一紀凡三十歲千四百四十氣凡六十歲而爲一周不及太過斯皆見矣歷法一氣十五日因而乘之積七百二十氣即三十年積千四百四十氣即六十年也經云有餘而往不足隨之不足而往有餘從之故六十年中不及太過斯皆見矣新校正云按六節藏象論云五日謂之候三候謂之氣六氣謂之時四時謂之歲而各從其主治焉五運相襲而皆治之終期之日周而復始時立布氣如環無端候亦同法故曰不知年之所加氣之盛衰虚實之所起不可爲工矣帝曰夫子之言上終天氣下畢地紀可謂悉矣余願聞而藏之上以治民下以治身使百姓昭著上下和親德澤下流子孫無憂傳之後世無有終時可得聞乎安不忘危存不忘亡大聖之至教也求民之瘼恤民之隱大聖之深仁也鬼臾區曰至數之機迫迮以微其來可見其往可追敬之者昌慢之者亡無道行私必得夭殃謂傳非其人授於情狹及寄求名利者也謹奉天道請言真要申誓戒於君王乃明言天道至真之要㫖也帝曰善言始者必會於終善言近者必知其遠數術明著應用不差故遠近於言始終無謬是則至數極而道不惑所謂明矣願夫子推而次之令有條理簡而不匱乆而不絶易用難忘爲之綱紀至數之要願盡聞之簡省要也匱乏也乆遠也要樞紐也鬼臾區曰昭乎哉問明乎哉道如鼓之應桴響之應聲也桴鼓椎也響應聲也臣聞之甲己之歲土運統之乙庚之歲金運統之丙辛之歲水運統之丁壬之歲木運統之戊癸之歲火運統之太始天地初分之時陰陽析位之際天分五氣地列五行五行定位布政於四方五氣分流散支於十干當是黄氣横於甲己白氣横於乙庚黑氣横於丙辛青氣横於丁壬赤氣横於戊癸故甲己應土運乙庚應金運丙辛應水運丁壬應木運戊癸應火運太古聖人望氣以書天册賢者謹奉以紀天元下論文義備矣新校正云詳運有太過不及平氣甲庚丙壬戊主太過乙辛丁癸己主不及大法如此取平氣之法其說不一具如諸篇帝曰其於三陰三陽合之奈何鬼臾區曰子午之歲上見少陰丑未之歲上見太陰寅申之歲上見少陽卯酉之歲上見陽眀辰戌之歲上見太陽巳亥之歲上見厥陰少陰所謂標也厥陰所謂終也標謂上首也終謂當三甲六甲之終新校正云詳午未申酉戌亥之歲爲正化正司化令之實子丑寅卯辰巳之歲爲對化對司化令之虚此其大法也厥陰之上風氣主之少陰之上熱氣主之太陰之上濕氣主之少陽之上相火主之陽明之上燥氣主之太陽之上寒氣主之所謂本也是謂六元三陰三陽爲標寒暑燥濕風火爲本故云所謂本也天真元氣分爲六化以統坤元生成之用徵其應用則六化不同本其所生則正是眞元之一氣故曰六元也新校正云按别本六元作天元帝曰光乎哉道明乎哉論請著之玉版藏之金匱署曰天元紀黄帝内經素問補註釋文卷之三十八

front:
  text: 黄帝内經素問補註釋文卷之四十九榮七
  hash: sha256:64dc9d04089481868c2a7db13a8b43d95575532c2979e1dfb8d5c4c42a15185f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_049-001a, image: hfl/0660/0660-091.png}
body:
  text: 唐太僕令啓玄子王氷次註宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤著至教論篇新校正云按全元超本在四時病類論之本末黄帝坐明堂召雷公而問之曰子知醫之道乎明堂布政之宫也八窗四闥上圓下方在國之南故稱明堂夫求民之瘼恤民之隱大聖之用心故召引雷公問拯濟生靈之道雷公對曰誦而頗能解解而未能别别而未能明明而未能彰言所知解但得法守數而已猶未能深盡精微之妙用也新校正云按楊上善云習道有五一謫二解三别四明五彰足以治群僚不足至侯王公不敢自高其道然則布衣與血食主療亦殊矣願得受樹天之度四時陰陽合之别星辰與日月光以彰經術後世益明樹天之度言高遠不極四時陰陽合之言順氣序也别星辰與日月光言别學者二明大小異也新枝正云按太素别作列字上通神農著至教疑於二皇公欲其經法明著通於神農使後世見之疑是二皇并行之教新校正云按全元起本及太素疑作擬帝曰善無失之此皆陰陽表裏上下雌雄相輸應也而道上知天文下知地理中知人事可以長乆以教衆庶亦不疑殆醫道論篇可傳後世可以爲寳以明著故雷公曰請受道諷誦用解誦亦諭也諷諭者所以比切近而令解也帝曰子不聞陰陽傳乎曰不知曰夫三陽天爲業天爲業言三陽之氣在人身形所行居上也陰陽傳上古書名化者新枝正云按大素天作大上下無常合而病至偏害陰陽上下無常言氣乖通不定在上下也合而病至謂手足三陽氣相合而爲病至也陽并至則精氣微故偏損害陰陽之用也雷公曰三陽莫當請聞其解莫當言氣并至而不可當帝曰三陽獨至者是三陽并至井至如風雨上爲巓疾下爲漏病并至謂手三陽足三陽氣并合而至也足太陽脉起於目内毗上額交巓上其支别者從巔至耳上角其直行者從巔入絡腦遣出别下項從肩髀内俠脊抵腰中入循膂絡腎屬膀胱手太陽脉起於手循臂上行交肩上入缺盆絡心循咽下鬲抵胃屬小腸故上爲巓疾下爲漏病也漏血膿出所謂并至如風雨者言無常凖也故下文曰新枝正云按楊上善云漏病謂膀胱漏泄大小便數不禁守也外無期内無正不中經紀診無上下以書别言三陽并至上下無常外無色氣可期内無正經常爾所至之時皆不中經脉綱紀所病之證又復上下無常以書記銓量乃應分别爾雷公曰臣治踈愈說意而己雷公言臣之所治稀得痊愈請言深意而已疑心已止也謂得說則疑心乃止帝曰三陽者至陽也六陽并合故曰至盛之陽也積并則爲驚病超疾風至如躃礰九竅皆塞陽氣滂溢乾嗌喉塞積謂重也言六陽重并洪盛莫當陽憤鬱惟盛是爲滂溢無涯故九竅塞也并於陰則上下無常薄爲腸澼陰謂藏也然陽薄於藏爲病亦上下無常定之診若在下爲病便數赤白此謂三陽直心坐不得超卧者便身今三陽之病足太陽脉循肩下至腰故坐不得起卧便身全也所以然者起則陽盛鼔故常欲得卧卧則經氣均故身安全新校正云按甲乙經便身全作身重且以知天下何以别陰陽應四時合之五行言知未備也雷公曰新枝正云按自此至篇末全元起本别爲一篇名方盛衰也陽言不别陰言不理請超受解以爲至道帝未許爲深知故重請也帝曰子若受傳不知合至道以惑師教語子至道之要不知其要流散無窮後世相習去聖久逺而學者各自是其法則惑亂於師氏之教㫖矣病傷五藏筋骨以消子言不明不别是世主學盡矣言病之深重尚不明别然輕微者亦何開愈令得遍知耶然猶是不知明世主學教之道從斯盡矣腎且絶惋忼日暮從容不出人事不殷舉藏之易知者也然腎脉且絶則心神内爍筋骨脉肉日晚酸空也暮晩也若以此之類諸藏氣但少不岀者當人事萎弱不復殷多所以爾者是則腎不足非傷損故也新枝正云按太素作腎且絶死死旦暮惋烏貫切示從容論篇新校正云按全元超本名從容别白黑黄帝燕坐召雷公而問之曰汝受術誦書者若能覽觀雜學及於比類通合道理爲余言子所長五臓六府膽冑大小腸脾胞膀胱腦髓涕唾哭泣悲哀水所從行此皆人之所生治之過失五臓别論黃帝問曰佘聞方士或以髓腦爲臓或以腸胃爲臓或以爲府敢問更相反皆自謂是不知其道願聞其說岐伯曰腦髓骨脉膽女子胞此六者地氣所生也皆藏於陰而象於地故藏而不寫名曰奇恒之府夫胃大腸小腸三焦膀胱此五者天氣之所生也其氣象天寫而不藏此受五臓濁氣故名曰傳化之府是以古之治病者以爲過失也子務明之可以十全即不能知爲世所怨不能知之動傷生者故人聞議論多有怨咎之心焉雷公曰臣請誦脉經上下篇甚衆多矣别異比類猶未能以十全又安足以明之言臣所請謫脉經雨篇衆多别異比類例猶未能以義而會見十全又何足以心眀至理乎安猶何也帝曰子别試通五臓之過六府之所不和鍼石之敗毒藥所宜湯液滋味具言其狀悉言以對請問不知過謂過失所謂不率常候而生病者也毒藥攻邪滋味充養試公之問知與不知爾新枝正云按太素别試作誠别雷公曰肝虚腎虚脾虚皆令人體重煩冤當投毒藥刺炙砭石湯液或已或不已願聞其解公以帝問使言而藏之過毒藥湯液滋味故問此病也帝曰公何年之長而問之少余眞問以自謬也言問之不相應也以問不相應故言佘眞發問以自招謬誤之對也吾問子窈冥子言上下篇以對何也窈冥謂不可見者則形氣榮衛也八正神明論岐伯對黃帝曰觀其冥冥者言形氣榮衛之不形於外而工獨知之以日之寒温月之虚盛四時氣之浮沉参伍相合而調之工常先見之然而不形於外故曰觀於冥冥焉由此帝故曰吾問子窈冥也然肝虚腎虚牌虚則上下篇之㫖帝故曰子言上下篇以對何也夫牌虚浮似肺腎小浮似牌肝急沉散似腎此皆工之所時亂也然從容得之脾虚脉浮候則似肺腎小浮上候則似脾肝急沉散候則似腎者何以然以三藏相近故脉象參差而相類也是以工惑亂之爲治之過失矣雖爾乎猶宜從容安緩審比類之而待三藏之形候矣何以取之然浮而緩曰牌浮而短曰肺小浮而滑曰心急緊而散曰肝摶沉而滑曰腎不能比類則疑亂彌甚若夫三藏土木水參居此童子之所知問之何也脾合土肝合木腎合水三藏皆在鬲下居止相近也雷公曰於此有人頭痛筋攣骨重怯然少氣噦噫腹滿時驚不嗜卧此何藏之發也脉浮而弦切之石堅不知其解復問所以三藏者以知其比類也脉有浮弦石堅故云問所以三藏者以知其比類也帝曰夫從容之謂也言比類也夫年長則求之於府年少則求之於經年壯則求之於藏年之長者甚於味年之少者勞於使年之壯者過於内過於内則耗傷精氣勞於使則經中風邪甚於味則傷於府故求之異也今子所言皆失八風菀熟五藏消爍傳邪相受夫浮而弦者是腎不足也脉浮爲虚弦爲肝氣以腎氣不足故脉浮弦也菀胡阮切沉而石者是腎氣内薯也石之言堅也著謂腎氣内薄著而不行也怯然少氣者是水道不行形氣消索也腎氣不足故水道不行肺藏被衝故形氣消散索盡也咳嗽煩冤者是腎氣之逆也腎氣内著上歸於母也一人之氣病在一藏也若言三藏俱行不在法也經不然也雷公曰於此有人四支解墮喘咳血泄而愚診之以爲傷肺切脉浮大而緊愚不敢治粗工下砭石病愈多出血血止身輕此何物也帝曰子所能治知亦衆多與此病失矣以爲傷肺而不敢治是乃狂見法所失矣砭方念切譬以鴻飛亦衝於天鴻飛衝天偶然而得豈其羽翮之所能哉粗工下砭石亦猶是矣夫聖人之治病循法守度援物比類化之冥冥循上及下何必守經經謂經脉非經法也今夫脉浮大虚者是牌氣之外絶去冑外歸陽明也足太陰絡支别者入絡腸胃是以脾氣外絶不至胃外歸陽明也夫二火不勝三水是以脉亂而無常也二火謂二陽藏三水謂三陰藏二陽藏者心肺也以在鬲上故三陰藏者肝脾腎也以在鬲下故然三陰之氣上勝二陽陽不勝陰故脉亂而無常也四支解墮此脾精之不行也土主四支故四支解墮脾精不化故使之然喘咳者是水氣并陽明也腎氣逆入於胃故水氣井於陽明血泄者脉急血無所行也泄謂泄出也然脉氣數急血溢於中血不入經故爲血泄以脉奔急而血溢故曰血無所行也若夫以爲傷肺者由失以狂也不引比類是知不明也言所識不明不能比類以爲傷肺由失狂言耳夫傷肺者脾氣不守胃氣不清經氣不爲使眞藏壞决經脉傍絶五藏漏泄不衂則嘔此二者不相類也肺氣傷則牌外救故云脾氣不守肺藏損則氣不行氣不行則胃滿故云胃氣不清肺者主行榮衛陰陽故肺傷則經脉不能爲之行使也眞藏謂肺藏也若肺藏損壞皮膜决破經脉傍絶而不流行五藏之氣上溢而漏泄者不衂血則嘔血也何者肺主鼻胃應口也然口鼻者氣之門户也今肺藏已損胃氣不清不上衂則血下流於胃中故不衂出則嘔出也然傷肺傷脾衂血泄血標出且異本歸亦殊故此二者不相類也譬如天之無形地之無理白與黑相去遠矣言傷肺傷脾形證懸别譬天地之相遠如黑白之異象也是失吾過矣以子知之故不告子是猶此也言雷公子之此見病疏者是吾不教子比類之道故自謂過也明引比類從容是以名曰診輕新枝正云按太素輕作經是謂至道也明引形證比量類例今從容之㫖則輕微之者亦不失矣所以然者何哉以道之至妙而能爾也從容上古經篇名也何以合之陰陽類論雷公曰臣悉盡意受傳經脉須得從容之道以合從容明古文有從容矣䟽五過論篇新校正云按全元起本名論過失黄帝曰嗚呼遠哉閔閔乎若视深淵若迎浮雲视深淵尚可測迎浮雲莫知其際嗚呼遠哉嘆至道之不極也閔閔乎言妙用之不窮也深洲清澄見之必定故可測浮雲漂寓際不守常故莫知新校正云詳此文與六微㫖論文重聖人之術爲萬民式論裁志意必有法則循經守數按循醫事爲萬民副故事有五過四德汝知之乎愼五過則敬順四時之德氣矣然德者道之用生之主故不可不敬順之也上古天眞論曰所以能年皆度百歳而動作不衰者以其德全不危也靈樞經曰天之在我者德也由此則天降德氣人賴而生生氣抱神上通於天生氣通天論曰夫自古通天者生之本此之謂也新校正云按爲萬民副楊上善云副助也雷公避席再拜曰臣年幼小蒙愚以惑不聞五過與四德比類形名虛引其經心無所對經未師授心匪生知功業微薄故卑辭也帝曰凡未診病者必問嘗貴後賤雖不中邪病從内生名曰脫營神屈故也貴之尊榮賤之屈辱心懷眷慕志結憂惶故雖不中邪而病從内生血脉虚减故曰脫營嘗富後貧名曰失精五氣留連病有所并富而從欲貧奪豐財内結憂煎外悲過物然則心從想慕神隨往計榮衛之道閉以遟留氣血不行積并爲病醫工診之不在藏府不變軀形診之而疑不知病名言病之初也病由想戀所爲故未居藏府事因情念所超故不變軀形醫不悉之故診而疑也身體日減氣虛無精言病之次也氣血相迫形肉消爍故身體日減陰陽應象大論曰氣歸精精食氣本氣虚不化精無所滋故也病深無氣灑灑然時驚言病之深也病氣深穀氣盡陽氣内薄故惡寒而驚灑灑寒貌病深者以其外耗於衛内奪於榮血爲憂煎氣隨悲减故外耗於衛内奪於榮病深者何以此耗奪故爾新校正云按太素病深者以其作病深以甚也良工所失不知病清此亦治之一過也失謂失問其所始也凡欲診病者必問飮食居處飲食居處五方不同故問之也異法方宜論曰東方之域天地之所始生魚鹽之地海濱傍水其民食魚而嗜鹹安其處美其食西方金玉之域沙石之處天地之所收引其民陵居而多風水土剛强其民不衣而褐薦其民華食而脂肥北方者天地所閉藏之域其地高陵居風寒冰列其民樂野處而乳食南方者天地所長養陽之所盛處其地下水土弱霧露之所聚其民嗜酸而食附中央者其地平以濕天地所以生萬物也衆其民食雜而不勞由此則診病之道當先問焉故聖人雜合以法各得其所宜此之謂矣暴樂暴苦始樂後苦新枝正云按太素作始苦皆傷精氣精氣竭絶形體毁沮喜則氣緩悲則氣消然悲哀動中者竭絶而失生故精氣竭絶形體殘毁心神沮喪矣暴怒傷陰暴喜傷陽怒則氣逆故傷陰喜則氣緩故傷陽厥氣上行滿脉去形厥氣逆也逆氣上行滿於經絡則神氣憚散去離形骸矣愚醫治之不知補寫不知病情精華日脫邪氣乃并此治之二過也不知喜怒哀樂之殊情概爲補寫而同貫則五藏精華之氣日脫邪氣薄蝕而乃并於正眞之氣矣善爲脉者必以比類奇恒從容知之爲工而不知道此診之不足貴此治之三過也竒恒謂氣候奇異於恒常之候也從容謂分别藏氣虚實脉見高下幾相似也示從容論曰脾虚浮似肺腎小浮似脾肝急沉散似腎此皆工之所時亂然從容分别而得之矣診有三常必問貴賤封君敗傷及欲侯王貴則形樂志樂賤則形苦志苦苦樂殊貫故先問也封君敗傷降君之位封公卿也及欲侯王謂情慕尊貴而妄爲不已也新校正云按太素欲作公故貴脫勢雖不中邪精神内傷身必敗亡憂惶煎迫怫結所爲始富後貧雖不傷邪皮焦筋屈痿躄爲攣以五藏氣留連病有所并而爲是也醫不能嚴不能動神外爲柔弱亂至失常病不能移則醫事不行此治之四過也嚴謂戒所以禁非也所以令從命也外爲柔弱言委隨而順從也然戒不足以禁非動不足以從令委隨任物亂失天常病且不移何醫之有也凡診者必知終始有知餘緒切脉問名當合男女終始謂氣色也脉要精微論曰知外者終而始之明知五色氣象終而復始也餘緒謂病發端之餘緒也切謂以指按脉也問名謂問病證之名也男子陽氣多而左脉大爲順女子陰氣多而右脉大爲順故宜以候常先合之也離絶菀結憂恐喜怒五藏空虚血氣離守工不能知何術之語離謂離間親愛絶謂絶念所懷菀謂菀積思慮結謂結固餘怨夫間親愛者䰟逰絶所懷者意喪積所慮者神勞結餘怨者志苦憂愁者閉塞而不行恐懼者蕩憚而失守盛怒者迷惑而不治喜樂者憚散而不藏由是八者故五藏空虚血氣離守工不思曉又何言哉新枝正云按蕩憚而失守甲乙經作不收憚音但嘗富大傷斬筋絶脉身體復行令澤不息斬筋絶脉言非分之過損也身體雖已復舊而行且令津液不爲滋息也何者精氣耗减也澤液也故傷敗結留薄歸陽膿積寒炅陽謂諸陽脉及六府也炅謂熱也言非分傷敗筋脉之氣血氣内結留而不去薄於陽脉則化爲膿乆積腹中而外爲寒熱也粗工治之亟刺陰陽身體解散四支轉筋死日有期不知寒熱爲膿積所生以爲常熱之疾概施其法數刺陰陽經脉氣奪病甚故身體解散而不用四支廢運而轉筋如是故死日有期豈謂命不謂醫耶醫不能明不問所發惟言死日亦爲粗工此治之五過也言粗工不必謂解不備學者縱備盡三世經法診不備二常療不順五過不求餘緒不問持身亦足爲粗略之醫爾凡此五者皆受術不通人事不明也言是五者粗名受術之徒未足以通悟精微之理人間之事尚猶懵然故曰聖人之治病也必知天地陰陽四時經紀五藏六府雌雄表裏刺炎砭石毒藥所主從容人事以明經道貴賤貧富各異品理問年少長勇怯之理審於部分知病本始八正九候診必副矣聖人之備識也如此工宜勉之治病之道氣内爲寳循求其理求之不得過在表裏言之治病必行於形氣之内求有過者是爲聖人之寳也求之不得則以藏府之氣陰陽表裏而察之新校正云按全元超本及太素作氣内爲實楊上善云天地間氣爲外氣人身中氣爲内氣外氣裁成萬物是爲外實内氣榮街裁生故爲内實治病能求内氣之理是治病之要也守數據治無失俞理能行此術終身不殆守數謂血氣多少及刺深淺之數也據治謂據穴俞所治之㫖而用之也但守數據治而用之則不失穴俞之理矣殆者危也不知俞理五藏菀熟癰發六府菀積也熟熱也五藏積熱六府受之陽熱相薄熱之所過則爲癰診病不審是謂失常謂失常經術正用之道也謹守此治與經相明謂前氣内循求俞會之理也上經下經揆度陰陽奇恒五中决以明堂審於終始可以橫行所謂上經者言氣之通天也下經者言病之變化也言此二經揆度陰陽之氣奇恒五中者皆决於明堂之部分也揆度者度病之深淺也奇恒者言奇病也五中者謂五藏之氣色也夫明堂者所以視萬物别白黑審長短故曰决以明堂也審於終始者謂審察五色囚王終而復始也夫道循如是應用不窮目牛無全萬舉萬當由斯高遠故可以横行於世間矣黄帝内經素問補註釋文卷之四十九

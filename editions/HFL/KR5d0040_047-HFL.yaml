front:
  text: 黄帝内經素問補註釋文卷之四十七榮五
  hash: sha256:a044c1496073a5722cae5d9ed89e42222e8bc0aac9aff8324f3a2fd169a75db2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_047-001a, image: hfl/0659/0659-097.png}
body:
  text: 唐太僕令啓玄子王氷次註宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤刺法論篇缺本病論篇缺新校正云詳此二篇缺在王注之前按病能論篇末在王冰注云世本既缺第七二篇謂此二篇也而今世有素問亡篇及昭明隱㫖論以謂此亡篇仍托名王冰爲注辭理鄙陋無足取者舊本此篇名在六元正紀論後列之爲後人移於此若以尚書亡篇之名皆在前篇之末則舊本爲得至眞要大論篇上黄帝問曰五氣交合盈虚更作余知之矣六氣分治司天地者其至何如五行主歲歲有少多故曰盈虚更作也天元正紀大論曰其始也有餘而往不足隨之不足而往有餘從之則其義也天分六氣散主太虚三之氣司天終之氣監地天地生化是爲大紀故言司天地者餘四可知矣岐伯再拜對曰明乎哉問也天地之大紀人神之通應也天地變化人神運爲中外雖殊然其通應則一也帝曰願聞上合昭昭下合冥冥奈何岐伯曰此道之所主工之所疑也不知其要流散無窮帝曰願聞其道也岐伯曰厥隂司天其化以風飛揚鼓拆和氣發生萬物榮枯皆因而化變成敗也少陰司天其化以熱炎蒸鬱燠故庶類蕃茂太陰司天其化以濕雲雨潤澤津液生成少陽司天其化以火炎熾赫烈以爍寒灾陽明司天其化以燥乾化以行物無濕敗太陽司天其化以寒對陽之化也新校正云詳注云對陽之化陽字疑誤以所臨藏位命其病者也肝木位東方心火位南方脾土位中央肺金位西方腎水位北方是五藏定位然六氣御五運所至氣不相得則病相得則和故先以六氣所臨後言五藏之病帝曰地化奈何岐伯曰司天同候間氣皆然六氣之本自有常性故雖位易而化治皆同帝曰間氣何謂岐伯曰司左右者是謂間氣也六氣分化常以二氣司天地爲上下吉凶勝復客主之理歲中悔吝從而明之餘四氣散居左右也故陰陽應象大論曰天地者萬物之上下左右者陰陽之道路此之謂也帝曰何以異之岐伯曰主歲者紀歲間氣者紀步也歲三百六十五日四分日之一步六十日餘八十七刻半也積步之日而成歲也帝曰善歲主奈何岐伯曰厥陰司天爲風化巳亥之歲風高氣遠雲飛物揚風之化也在泉爲酸化寅申之歲木司地氣故物化從酸司氣爲蒼化木運之氣丁壬之歲化蒼青也間氣爲動化遍主六十日餘八十七刻半也新校正云詳丑未之歲厥陰爲初之氣子午之歲爲二之氣辰戌之歲爲四之氣卯酉之歲爲五之氣少陰司天爲熱化子午之歲陽光熠耀暄暑流行熱之化也熠羊入切在泉爲苦化卯酉之歲火司地氣故物以苦生不司氣化君不主運新校正云按天元紀大論云君火以名相火以位謂君火不主運也居氣爲灼化六十日餘八十七刻半也居本位君火爲居不當間之也新校正云詳少陰不曰間氣而云居氣者蓋尊君火無所不居不當間之也王注云居本位爲居不當間之則居他位不爲居而可間也寅申之歲爲初之氣丑未之歲爲二之氣巳亥之歲爲四之氣辰戌之歲爲五之氣太陰司天爲濕化丑未之歲埃鬱曚昩雲雨潤濕之化也在泉爲甘化辰戌之歲也土司地氣故甘化先焉司氣爲黅化土運之氣甲己之歲黅黄也間氣爲柔化濕化行則庶物柔軟新校正云詳太陰卯酉之歲爲初之氣寅申之歲爲二之氣子午之歲爲四之氣巳亥之歲爲五之氣少陽司天爲火化寅申之歲也炎光赫烈燔灼焦然火之化也在泉爲苦化巳亥之歲也火司地氣故苦化先焉司氣爲丹化火運之氣戊癸歲也間氣爲明化明炳明也亦謂霞燒新校正云詳少陽辰戌之歲爲初之氣卯酉之歲爲二之氣寅申之歲爲四之氣丑未之歲爲五之氣陽明司天爲燥化卯酉之歲清切高明霧露蕭瑟燥之化也在泉爲辛化子午之歲也金司地氣故辛化先焉司氣爲素化金運之氣乙庚歲也間氣爲清化風生高勁草木清冷清之化也新校正云詳陽明巳亥之歲爲初之氣辰戌之歲爲二之氣寅申之歲爲四之氣丑未之歲爲五之氣太陽司天爲寒化辰戌之歲嚴肅峻整慘慄凝堅寒之化也在泉爲鹹化丑未之歲水司地氣故化從鹹司氣爲玄化水運之氣丙辛歲也間氣爲藏化隂凝而冷庶物斂容歲之化也新校正云詳子午之歲太陽爲初之氣巳亥之歲爲二之氣卯酉之歲爲四之氣寅申之歲爲五之氣故治病者必明六化分治五味五色所生五藏所宜乃可以言盈虚病生之緒也學不厭備習也帝曰厥陰在泉而酸化先余知之矣風化之行也何如岐伯曰風行於地所謂本也餘氣同法厥陰在泉風行於地少陰在泉熱行於地太隂在泉濕行於地少陽在泉火行於地陽明在泉燥行於地太陽在泉寒行於地故曰餘氣同法也本謂六氣之上元氣也本乎天者天之氣也本乎地者地之氣也化於天者爲天氣化於地者爲地氣新校正云按易曰本乎天者親上本乎地者親下此之謂也天地合氣六節分而萬物化生矣萬物居天地之間悉爲六氣所生化陰陽之用未嘗有逃生化出陰陽也故曰謹候氣宜無失病機此之謂也病機下文具矣帝曰其主病何如言采藥之歲也岐伯曰司歲備物則無遺主矣謹候司天地所生化者則其味正當其歲也故彼藥上專司歲氣所收藥物則一歲二歲其所主用無遺畧也今詳則字當作用帝曰先歲物何也岐伯曰天地之專精也專精之氣藥物肥濃又於使用當其正氣味也新校正云詳先歲疑作司歲帝曰司氣者何如司運氣也岐伯曰司氣者主歲同然有餘不足也五運主歲者有餘不足比之歲物恐有薄有餘之歲藥專精也帝曰非司歲物何謂也岐伯曰散也非專精則散氣散氣則物不純故質同而異等也形質雖同力用則異故不尚之氣味有薄厚性用有躁靜治保有多少力化有淺深此之謂也物與歲不同者何以此爾帝曰歲主藏害何謂岐伯曰以所不勝命之則其要也木不勝金金不勝火之類是也帝曰治之奈何岐伯曰上淫於下所勝平之外淫於内所勝治之淫謂行所不勝己者也上淫於下天之氣也外淫於内地之氣也隨所制勝而以平治之也制勝謂五味寒熱温凉隨勝用之下文備矣新校正云詳天氣主歲雖有淫勝但當平調之故不曰治而曰平也帝曰善平氣何如平謂診平和之氣岐伯曰謹察陰陽所在而調之以平爲期正者正治反者反治知隂陽所在則知尺寸應與不應不知隂陽所在則以得爲失以逆爲從故謹察之也陰病陽不病陽病陰不病是爲正病則正治之謂以寒治熱以熱治寒也陰位已見陽脉陽位又見陰脉是謂反病則反治之謂以寒治寒以熱治熱也諸方之制咸悉不然故曰反者反治也帝曰夫子言察陰陽所在而調之論言人迎與寸口相應若引繩小大齊等命曰平新校正云詳論言至曰平本靈樞之文今出甲乙經云寸口主中人迎主外兩者相應俱往俱來若引繩小大齊等春夏人迎微大秋冬寸口微大者名曰平也隂之所在寸曰何如隂之所在脉沉不應引繩齊等其候頗乖故問以明之岐伯曰視歲南北可知之矣帝曰願卒聞之岐伯曰北政之歲少隂在泉則寸曰不應木火金水運面北受氣凡氣之在泉者脉悉不見唯其左右之氣脉可見之在泉之氣善則不見惡者可見病以氣及客主淫勝名之在天之氣其亦然矣厥陰在泉則右不應少陰在右故太陰在泉則左不應少陰在左故南政之歲少陰司天則寸口不應土運之歲面南行令故少陰司天則二手寸口不應也厥陰司天則右不應太陰司天則左不應亦左右義也諸不應者反其診則見矣不應皆爲脉沉脉沉下者仰手而沉覆其手則沉爲浮細爲大也帝曰尺候何如岐伯曰北政之歲三隂在下則寸不應三隂在上則尺不應司天曰上在泉曰下南政之歲三陰在天則寸不應三隂在泉則尺不應左右同尺不應寸左右悉與寸不應義同故曰知其要者一言而終不知其要流散無窮此之謂也要謂知陰陽所在也知則用之不惑不知則尺寸之氣沉浮小大常三歲一差欲求其意猶繞樹間枝雖白首區區尚未知所詣况其旬月而可知乎帝曰善天地之氣内淫而病何如岐伯曰歲厥陰在泉風淫所勝則地氣不明平野昧草乃早秀民病灑灑振寒善伸數欠心痛支滿兩脅裏急飲食不下鬲咽不通食則嘔腹脹善噫得後與氣則快然如衰身體皆重謂甲寅丙寅戊寅庚寅壬寅甲申丙申戊申庚申壬申歲也地氣不明謂天圍之際氣色昏暗風行地上故平野皆然昩謂暗也脅謂兩乳之下及胠外也伸謂以欲伸努筋骨也新校正云按甲乙經灑灑振寒善伸數欠爲胃病食則嘔腹脹善噫得後與氣則快然如衰身體皆重爲脾病飲食不下鬲咽不通邪在胃管也蓋厥陰在泉之歲木王而剋脾胃故病如是又按脉解云所謂食則嘔者物盛滿而上溢故嘔也所謂得後與氣則快然如衰者十二月陰氣下衰而陽氣且出故曰得後與氣則快然如衰也歲少陰在泉熱淫所勝則焰浮川澤陰處反明民病腹中常鳴氣上衝胷喘不能乆立寒熱皮膚痛目瞑齒痛項腫惡寒發熱如瘧少腹中痛腹大蟄蟲不藏謂乙卯丁卯己卯辛卯癸卯乙酉丁酉己酉辛酉癸酉歲也陰處北方也不能乆立足無力也腹大謂心氣不足也金火相薄而爲是也新校正云按甲乙經齒痛項腫爲大腸病腹中雷鳴氣上衝胸喘不能久立邪在大腸也蓋少隂在泉之歲火剋金故大腸病也歲太陰在泉草乃早榮新校正云詳此四字疑衍濕淫所勝則埃昏岩谷黄反見黑至隂之交民病飲積心痛耳聾渾渾焞焞嗌腫喉痹隂病血見少腹痛腫不得小便病衝頭痛目似脫項似拔腰似折髀不可以回膕如結腨如别謂甲辰丙辰戊辰庚辰壬辰甲戌丙戌戊戌庚戌壬戌歲也太陰爲土色見應黄於天中而反見於北方黑處也水土同見故曰至陰之交合其氣色也衝頭痛謂腦後眉間痛也膕謂膝後曲脚之中也腨胻後軟肉處也新校正云按甲乙經耳聾渾渾焞焞嗌腫喉痹爲三焦病爲病衝頭痛目以脫項似拔腰似折髀不可以回膕如結腨如别爲膀胱足太陽病又少腹腫痛不得小便邪在三焦蓋太陰在泉之歲土王剋太陽故病如是也膕戈麥切歲少陽在泉火淫所勝則焰明郊野寒熱更至民病注泄赤白少腹痛溺赤甚則血便少陰同候謂乙巳丁巳已巳辛巳癸巳乙亥丁亥己亥辛亥癸亥歲也處寒之時熱更其氣熱氣既往寒氣後來故云更至也餘候與少陰在泉證同歲陽明在泉燥淫所勝則霿霧清暝民病喜嘔嘔有苦善太息心脅痛不能反側甚則嗌乾面塵身無膏澤足外反熱謂甲子丙子戊子庚子壬子甲午丙午戊午庚午壬午歲也霿霧謂霿暗不分似霧也清薄寒也言霧起霿暗不辯物形而薄寒也心脅痛謂心之傍脅中痛也面塵謂面上如有觸冒塵土之色也新校正云按甲乙經病喜嘔嘔有苦善太息心脅痛不能反側甚則面塵身無膏澤足外反熱爲膽病嗌乾面塵爲肝病蓋陽明在泉之歲金旺剋木故病如是又按脉解云少陽所謂心脅痛者言少陽盛也盛者心之所衰也九月陽氣盡而隂氣盛故心脅痛所謂不可反側者陰氣藏物也物藏不得動故不可反側也歲太陽在泉寒淫所勝則凝肅慘慄民病少腹控睾引腰脊上衝心痛血見嗌痛頷腫謂乙丑丁丑己丑辛丑癸丑乙未丁未已未辛未癸未歲也凝肅謂寒氣靄空凝而不動萬物靜肅其儀形也慘慄寒甚也控引也睾聸丸也頷頰車前牙之下也新校正云按甲乙經嗌痛頷腫爲小腸病又少腹控睾引腰脊上衝心肺邪在小腸也蓋太陽在泉之歲水剋火故病如是帝曰善治之奈何岐伯曰諸氣在泉風淫於内治以辛凉佐以苦以甘緩之以辛散之風性喜温而惡清故治之凉是以勝氣治之也佐以苦隨其所利也木苦急則以甘緩之苦抑則以辛散之藏氣法時論曰肝苦急急食甘以緩之肝欲散急食辛以散之此之謂也食亦音飼己曰食他曰飼也大法正味如此諸爲方者不必盡用之但一佐二佐病已則止餘氣皆然熱淫於内治以鹹寒佐以甘苦以酸收之以苦發之熱性惡寒故治以寒也熱之大盛甚於表者以苦發之不盡復寒制之寒制不盡復苦發之以酸收之甚者再方微者一方可使必已時發時止亦以酸收之濕淫於内治以苦熱佐以酸淡以苦燥之以淡泄之濕與燥反故治以苦熱佐以酸淡也燥除濕故以苦燥其濕也淡利竅故以淡滲泄也藏氣法時論曰脾苦濕急食苦以燥之靈樞經曰淡利竅也生氣通天論曰味過於苦脾氣不濡胃氣乃厚明苦燥也新校正云按六元正紀大論曰下太陰其化下甘温火淫於内治以鹹冷佐以苦辛以酸收之以苦發之火氣大行心腹心怒之所生也鹹性柔軟故以治之以酸收之大法候其須汗者以辛佐之不必要資苦味令其汗也欲柔軟者以鹹治之藏氣法時論曰心欲軟急食鹹以軟之心苦緩急食酸以收之此之謂也燥淫於内治以苦温佐以甘辛以苦下之温利凉性故以苦治之下謂利之使不得也新校正云按藏氣法時論曰肺苦氣上逆急食苦以泄之以辛寫之以酸補之又按下文司天燥淫所勝佐以酸辛此云甘辛者甘字疑當作酸天元正紀大論云下酸熱與苦温之治又異又云以酸收之而安其下甚則以苦泄之寒淫於内治以甘熱佐以苦辛以鹹寫之以辛潤之以苦堅之以熱治寒是爲摧勝折其氣用令不滋繁也苦辛之佐通事行之新校正云按藏氣法時論曰腎苦燥急食辛以潤之腎欲堅急食苦以堅之用苦補之鹹寫之舊注引此在濕淫於内之下無義今移於此帝曰善天氣之變何如岐伯曰厥隂司天風淫所勝則太虚埃昏雲物以擾寒生春氣流水不冰民病胃脘當心而痛上支兩脅鬲咽不通飲食不下舌本强食則嘔冷泄腹脹溏泄瘕水閉蟄蟲不出病本於脾謂乙已丁巳己巳辛巳癸巳乙亥丁亥己亥辛亥癸亥歲也是歲民病集於中也風自天行故太虚埃起風動飄蕩故云物擾也埃青塵也不分遠物是爲埃昏土之爲病其善泄利若病水則小便閉而不下若大泄利則經水亦多閉絶也新校正云按甲乙經舌本强食則嘔腹脹溏泄瘕水閉爲脾病又胃病者腹脾脹胃脘當心而痛上支兩脅鬲咽不通食飲不下蓋厥陰司天之歲木勝土故病如是衝陽絶死不治衝陽在足跗上動脉應手胃之氣也衝陽脉微則食飲減少絶則藥食不入亦下必還岀也攻之不入養之不生邪氣日强眞氣内絶故其必死不可復也少陰司天熱淫所勝怫熱至火行其政民病胸中煩熱嗌乾右胠滿皮膚痛寒熱咳喘大雨且至唾血血泄鼽衂嚏嘔溺色變甚則瘡瘍胕腫肩背臂臑及缺盆中痛心痛肺䐜腹大滿膨膨而喘咳病本於肺謂甲子丙子戊子庚子壬子甲午丙午戊午庚午壬午歲也怫熱至是火行其政乃爾是歲民病集於右蓋以小腸通心故也病自肺生故曰病本於肺也新校正云按甲乙經溺色變肩背臂臑及缺盆中痛腹脹滿膨膨而喘咳爲肺病鼽衄爲大腸病蓋少陰司天之歲火剋金故病如是又王注民病集於右以小腸通心故按甲乙經大腸附脊左環回腸附脊右環所說不應得非火盛剋金而大腸病歟尺澤絶死不治尺澤在肘内廉大文中動脉應手肺之氣也火爍於金承天之命金氣内絶故必危亡尺澤不至肺氣已絶榮衛之氣宣行無主眞氣内竭生之何有哉太隂司天濕淫所勝則沉隂且布雨變枯槁胕腫骨痛隂痹陰痹者按之不得腰脊頭項痛時眩大便難陰氣不用饑不欲食咳唾則有血心如懸病本於腎謂乙丑丁丑己丑辛丑癸丑乙未丁未己未辛未癸未歲也沉乆也腎氣受邪水無能潤下焦枯涸故大便難也新校正云按甲乙經饑不用食咳唾則有血心懸如饑狀爲腎病又邪在腎則骨痛隂痹隂痹者按之而不得腹脹腰痛大便難肩背頸項强痛時眩蓋太陰司天之歲土剋水故病如是太谿絶死不治太谿在足内踝後跟骨上動脉應手腎之氣也土邪勝水而腎氣内絶邪甚正微故方無所用矣少陽司天火淫所勝則温氣流行金政不平民病頭痛發熱惡寒而瘧熱上皮膚痛色變黄赤傳而爲水身面胕腫腹滿仰息泄注赤白瘡瘍咳唾血煩心胸中熱甚則鼽衄病本於肺謂甲寅丙寅戊寅庚寅壬寅甲申丙申戊申庚申壬申歲也火來用事則金氣受邪故曰金政不平也火炎於上金肺受邪客熱内燔水無能救故化生諸病也制火之客則己矣新校正云按甲乙經邪在肺則皮膚痛發寒熱蓋少陽司天之歲火剋金故病如是天府絶死不治天府在肘後内側上掖下同身寸之三寸動脉應手肺之氣也火盛而金脉絶故死陽明司天燥淫所勝則木乃晩榮草乃晩生筋骨内變民病左胠脅痛寒清於中感而瘧大凉革候咳腹中鳴注泄鶩溏名木歛生菀於下草焦上首心脅暴痛不可反側嗌乾面塵腰痛丈夫㿗疝婦人少腹痛目昧眥瘍瘡痤癰蟄蟲來見病本於肝謂乙卯丁卯己卯辛卯癸卯乙酉丁酉己酉辛酉癸酉歲也金勝故草木晩生榮也配於人身則筋骨内應而不用也大凉之氣變易時候則人寒清發於中内感寒氣則爲痎瘧也大腸居右肺氣通之今肺氣内淫肝居於左故左胠脅痛如刺割也其歲民自注泄則無淫勝之疾也大凉次寒也大凉且甚陽氣不行故木容收斂草榮悉晩生氣已升陽不布令故閉積生氣而蓄於下也在人之應則少腹之内痛氣居之發疾於仲夏瘡瘍之疾猶及秋中瘡痤之患生於上癰腫之患生於下瘡色雖赤中心正白物氣之常也新校正云按甲乙經腰痛不可以俯仰文夫㿗疝婦人少腹腫甚則嗌乾面塵爲肝病又胷滿洞泄爲肝病又心胷痛不能反側目脫眥瘍缺盆中腫痛掖下腫馬刀挾攖汗出振寒瘧爲膽病蓋陽明司天之歲金剋木故病如是又按脉解云厥陰所謂㿗疝婦人少腹腫者厥陰者辰也三月陽中之陰邪在中故曰㿗疝少腹腫也痤殂禾切大衝絶死不治大衝在足大指本節後二寸脉動應手肝之氣也金來伐木肝氣内絶眞不勝邪其宜也太陽司天寒淫所勝則寒氣反至水且氷血變於中發爲癰瘍民病厥心痛嘔血血泄鼽衂善悲時眩仆運火炎烈雨暴乃雹胸腹滿手熱肘攣掖腫心澹澹大動胸脅胃脘不安面赤目黄善噫嗌乾甚則色炲渴而欲飲病本於心謂甲辰丙辰戊辰庚辰壬辰甲戌丙戌戊戌庚戌壬戌歲也太陽司天寒氣布化故水且冰而血凝皮膚之間衛氣結聚故爲癰也若乘火運而火炎烈與水交戰故暴雨半珠形雹也心氣爲噫故善噫是歲民病集於心脅之中也陽氣内鬱濕氣下蒸故心厥痛而嘔血血泄鼽衂面赤目黄善噫手熱肘攣掖腫嗌乾甚則寒氣勝陽水行凌火火氣内鬱故渴而欲飲也病始心生爲陰凌犯故云病本於心也新校正云按甲乙經手熱肘攣掖腫甚則胸脅支滿心澹澹大動面赤目黄爲手心主病又邪在心則病心痛善悲時眩仆蓋太陽司天之歲水剋火故病如是神門絶死不治神門在手之掌後銳骨之端動脉應手真心氣也水行勝火而心氣内絶神氣已亡不死何待善知其診故不治也所謂動氣知其藏也所以診視而知死者何以皆是藏之經脉動氣知神藏之存亡爾帝曰善治之奈何謂可攻治者岐伯曰司天之氣風淫所勝平以辛凉佐以苦甘以甘緩之以酸寫之厥陰之氣未爲盛熱故以凉藥平之夫氣之用也積凉爲寒積温爲熱以熱少之其則温也以寒少之其則凉也以温多之其則熱也以凉多之其則寒也各當其分則寒寒也温温也熱熱也凉凉也方書之用可不務乎故寒熱温凉遷降多少善爲方者意必精通餘氣皆然從其制也新校正云按本論上文云上淫於下所勝平之外淫於内所勝治之故在泉曰治司天曰平也熱淫所勝平以鹹寒佐以苦甘以酸收之熱氣已退時發動者是爲心虚氣散不斂以酸收之雖以酸收之亦兼寒助乃能殄除其源本矣熱見太甚則以苦發之汗已便凉是邪氣盡勿寒冰之汗已猶熱是邪氣未盡則以酸收之已又熱則復汗之已汗復熱是藏虚也則補其心可矣法則合爾諸治熱者亦未必得再三發三治況四變而反覆者乎濕淫所勝平以苦熱佐以酸辛以苦燥之以淡泄之濕氣所淫皆爲腫滿但除其濕腫滿自衰因濕生病不腫不滿者亦爾治之濕氣在上以苦吐之濕氣在下以苦泄之以淡滲之則皆燥也泄謂滲泄以利水道下小便爲法然酸雖熱以用利小便去伏水也治濕之病不下小便非其法也新校正云按濕淫於内佐以酸淡此云酸辛者辛疑當作淡濕上甚而熱治以苦温佐以甘辛以汗爲故而止身半以上温氣餘火氣復鬱鬱濕相薄則以苦温甘辛之藥解表流汗而祛之故云以汗爲除病之故而已也火淫所勝平以鹹冷佐以甘苦以酸收之以苦發之以酸復之熱淫同同熱淫義熱亦如此法以酸復其本氣也不復其氣則淫氣空虚招其本燥淫所勝平以苦濕佐以酸辛以苦下之制燥之勝必以苦濕是火之氣味也宜下必以苦宜補必以酸宜寫必以辛清甚生寒留而不去則以苦濕下之氣有餘則以辛寫之諸氣同新校正云按上文燥淫於内治以苦温此云苦濕濕當爲温文注中濕字三并當作温又按六元正紀大論亦作苦小温寒淫所勝平以辛熱佐以苦甘以鹹寫之淫散止之不可過也新校正云按上文寒淫於内治以甘熱佐以苦辛此云平以辛熱佐以甘苦者此文爲誤又按六元正紀大論云太陽之政歲宜苦以燥之帝曰善邪氣反勝治之奈何不能淫勝於他氣反爲不勝之氣爲邪以勝之岐伯曰風司於地清反勝之治以酸温佐以苦甘以辛平之厥隂在泉則風司於地謂五寅歲五申歲邪氣勝盛故先以酸寫佐以苦甘邪氣退則正氣虚故以辛補養而平之熱司於地寒反勝之治以甘熱佐以苦辛以鹹平之少陰在泉則熱司於地謂五卯五酉歲也先寫其邪而後平其正氣也濕司於地熱反勝之治以苦冷佐以鹹甘以苦平之太陰在泉則濕司於地謂五辰五戌歲也補寫之義餘氣皆同火司於地寒反勝之治以甘熱佐以苦辛以鹹平之少陽在泉則火司於地謂五巳五亥歲也燥司於地熱反勝之治以平寒佐以苦甘以酸平之以和爲利陽明在泉則燥司於地謂五子五午歲也燥之性惡熱亦畏寒故以冷熱和平爲方利也寒司於地熱反勝之治以鹹冷佐以甘辛以苦平之太陽在泉則寒司於地謂五丑五未歲也此六氣方治與前勝法殊别其云治者寫客邪之勝氣也云佐者皆所利所宜也云平者補已弱之正氣也帝曰其司天邪勝何如岐伯曰風化於天清反勝之治以酸温佐以甘苦巳亥歲也熱化於天寒反勝之治以甘温佐以苦酸辛子午歲也濕化於天熱反勝之治以苦寒佐以苦酸丑未歲也火化於天寒反勝之治以甘熱佐以苦辛寅申歲也燥化於天熱反勝之治以辛寒佐以甘苦卯酉歲也寒化於天熱反勝之治以鹹冷佐以苦辛辰戌歲也帝曰六氣相勝奈何先舉其用爲勝岐伯曰厥陰之勝耳鳴頭眩憒憒欲吐胃隔如寒大風數舉倮蟲不滋胠脅氣并化而爲熱小便黄赤胃脘當心而痛上支兩脅腸鳴飧泄少腹痛注下赤白甚則嘔吐鬲咽不通五巳五亥歲也心下臍上胃之分胃鬲謂胃脘之上及大鬲之下風寒氣所生也氣并謂偏著一邊鬲咽謂食飲入而復出也新校正云按甲乙經胃病者胃脘當心而痛上支兩脅鬲咽不通少陰之勝心下熱苦饑臍下反痛氣游三焦炎暑至木乃津草乃萎嘔逆躁煩腹滿痛溏泄傳爲赤沃五子五午歲也沃沐也太陰之盛火氣内鬱瘡瘍於中流散於外病在胠脅甚則心痛熱格頭痛喉痹項强獨勝則濕氣内鬱寒迫下焦痛留頂互引眉間胃滿雨數至燥化乃見少腹滿腰脽重强内不便善注泄足下温頭重足脛胕腫飲發於中胕腫於上五丑五未歲也濕勝於上則火氣内鬱勝於中則寒迫下焦水溢河渠則鱗蟲離水也脽謂臀肉也不便謂腰重内强直屈伸不利也獨勝謂不兼鬱火也胕腫於上謂首面也足脛腫是火鬱所生也新校正云詳注云水溢河渠則鱗蟲離水也王作此注於經文無所解又按太陰之復云大雨時行鱗見於陸則此文於雨數至下脫少鱗見於陸四字不然則王注無因爲解也少陽之勝熱客於胃煩心心痛曰赤欲嘔嘔酸苦饑耳痛溺赤善驚譫妄暴熱消爍草萎水涸介蟲乃屈少腹痛下沃赤白五寅五申歲也熱暴甚故草萎水涸陰氣消爍介蟲金化也火氣大勝故介蟲屈伏酸醋水也陽明之勝清發於中左胠脅痛溏泄内爲嗌塞外發㿗疝大凉肅殺華英改容毛蟲乃殃胸中不便嗌塞而咳五卯五酉歲也大凉肅殺金氣勝木故草木華英爲殺氣損削改易形容而焦其上首也毛蟲木化氣不宜金故金政大行而毛蟲死耗也肝木之氣下主於陰故大凉行而㿗疝發也胸中不便謂呼吸回轉或痛或緩急而不利便也氣大盛故嗌塞而咳也嗌謂喉之下接連胸中肺兩葉之間也太陽之勝凝凓且至非時水冰羽乃後化痔瘧發寒厥入胃則内生心痛陰中乃瘍隱曲不利互引陰股筋肉拘苛血脉凝泣絡滿色變或爲血泄皮膚否腫腹滿食减熱反上行頭項囟頂腦户中痛目如脫寒入下焦傳爲濡寫五辰五戌歲也寒氣凌逼陽不勝之故非寒時而止水冰結也水氣大勝陽火不行故諸羽蟲生化而後也拘急也苛重也絡脉也太陽之氣僄在於巔故熱反上行於頭也以其脉起於目内眥上額交巔上入絡腦還出别下項故囟頂及腦户中痛目如欲脫也濡謂水利也新校正云按甲乙經痔瘧頭項囟頂及腦户中痛目如脫爲太陽經病帝曰治之奈何岐伯曰厥陰之勝治以甘清佐以苦辛以酸寫之少陰之勝治以辛寒佐以苦鹹以甘寫之太陰之勝治以鹹熱佐以辛甘以苦泄之少陽之勝治以辛寒佐以甘鹹以甘寫之陽明之勝治以酸温佐以辛甘以苦泄之太陽之勝治以甘熱佐以辛酸以鹹寫之六勝之至皆先歸其不勝己者之故不勝者當先寫之以通其道次寫所勝之氣令其退釋也治諸勝而不寫遣之則勝氣浸盛内生諸病也新校正云詳此爲治皆先寫其不勝而後寫其來勝獨太陽之勝治以甘熱爲異疑甘字苦之誤也若云治以苦熱則六勝之治皆一貫也帝曰六氣之復何如復謂報復報其勝也凡先有勝後必復新校正云按玄珠云六氣分正化對化厥陰正司於亥對化於巳少陰正司於午對化於子太陰正司於未對化於丑少陽正司於寅對化於申陽明正司於酉對化於卯太陽正司於戌對化於辰正司化令之實對司化令之虚對化勝而有復正化勝而不復此注云凡先有勝後必復似未然岐伯曰悉乎哉問也厥陰之復少腹堅滿裏急暴痛偃木飛沙倮蟲不榮厥心痛汗發嘔吐飲食不入入而復出筋骨掉眩清厥甚則入脾食痹而吐裏腹脅之中也木偃沙飛風之大也風爲木勝故土不榮氣厥謂氣衝胸脅而凌及心也胃受逆氣而上攻心痛也痛甚則汗發泄掉謂肉中動也清厥手足冷也食痹謂食已心下痛陰陰然不可名也不可忍也吐出乃止此爲胃氣逆而不下流也食飲不入入而復出肝乘脾胃故令爾也衝陽絶死不治衝陽胃脉氣也少陰之復燠熱内作煩躁鼽嚏少腹絞痛火見燔焫嗌燥分注時止氣動於左上行於右咳皮膚痛暴瘖心痛鬱冒不知人乃灑淅惡寒振慄譫妄寒已而熱渴而欲飲少氣骨萎隔腸不便外爲浮腫噦噫赤氣後化流水不冰熱氣大行介蟲不福病疿胗瘡瘍癰疽痤痔甚則入肺咳而鼻淵火熱之氣自小腸從臍下之左入大腸上行至左脅甚則上行於右而入肺故動於左上行於右皮膚痛也分注謂大小俱下也骨萎言骨弱無力也隔腸謂腸如隔絶而不便寫也寒熱甚則然陽明先勝故赤氣後化流水不冰少陰之本司於地也在人之應則冬脉不凝若高山窮谷已是至高之處水亦當冰平下川流則如經矣火氣内蒸金氣外拒陽熱内鬱故爲痱胗瘡瘍胗甚亦爲瘡也熱少則外生痱胗熱多則内結癰痤小腸有熱則户外爲痔其復熱之變皆病於身後及外側也瘡瘍痱胗生於上癰疽痤痔生於下反其處者皆爲逆也天府絶死不治天府肺脉氣也新校正云按上文少陰司天熱淫所勝尺澤絶死不治少陽司天火淫所勝天府絶死不治此云少陰之復天府絶死不治下文少陽之復尺澤絶死不治文如相反者蓋尺澤天府俱手太陰脉之所發動故此互文也太陰之復濕變乃舉體重中滿食飲不化陰氣上厥胷中不便飲發於中咳喘有聲大雨時行鱗見於陸頭頂痛重而掉瘛尤甚嘔而宻默唾吐清液甚則入腎竅寫無度濕氣内逆寒氣不行太陽上流故爲是病頭頂痛重則腦中掉瘛尤甚腸胃寒濕熱無所行熏灼胸府故胸中不便食飲不化嘔而宻默欲靜定也喉中惡冷故唾吐冷水也寒氣易位上入肺喉則息道不利故咳喘而喉中有聲也水居平澤則魚遊於市頭頂胸痛女人亦兼痛於眉間也新校正云按上文太陰在泉頭痛項似拔又太陰司天云頭頂疑當作項大谿絶死不治大谿腎脉氣也少陽之復大熱將至枯燥燔爇介蟲乃耗驚瘛咳衄心熱煩躁便數憎風厥氣上行面如浮埃目乃瞤瘛火氣内發上爲口糜嘔逆血溢血泄發而爲瘧惡寒鼓慄寒極反熱嗌絡焦槁渴飲水漿色變黄赤少氣脉萎化而爲水傳爲胕腫甚則入肺咳而血泄火氣專暴枯燥草木燔焰自生故燔爇也火内熾故驚瘛咳衂心熱煩躁便數憎風也火炎於上則庶物失色故如塵埃浮於面而目瞤動也火爍於内則口舌糜爛嘔逆及爲血溢血泄風火相薄則爲温瘧氣蒸熱化則爲水病傳爲胕腫胕謂皮肉俱腫按之陷下泥而不起也如是之證皆火氣所生也尺澤絶死不治尺澤肺脉氣也陽明之復清氣大舉森木蒼乾毛蟲乃厲病生胠脅氣歸於左善太息甚則心痛否滿腹脹而泄嘔苦咳噦煩心病在鬲中頭痛甚則入肝驚駭筋攣殺氣大舉木不勝之故蒼青之葉不及黄而乾燥也厲謂疵癘疾疫死也清甚於内熱鬱於外故也大衝絶死不治大衝肝脉氣也太陽之復厥氣上行水凝雨冰羽蟲乃死心胃生寒胷中不利心痛否滿頭痛善悲時眩仆食減腰脽反痛屈伸不便地裂冰堅陽光不治少腹控睾引腰脊上衝心唾出清水及爲噦噫甚則入心善忘善悲雨冰謂雹也寒而遇雹死亦其宜寒化於地其上復土故地體分裂水積冰堅乆而不釋是陽光之氣不治寒凝之物也太陽之復與不相持上濕下寒火無所往心氣内鬱熱由是生火熱内燔故生斯病新校正云詳注云與不相持不字疑作土神門絶死不治神門眞心脉氣帝曰善治之奈何復氣倍勝故先問以治之岐伯曰厥陰之復治以酸寒佐以甘辛以酸寫之以甘緩之不大緩之夏猶不已復重於勝故治以辛寒也新校正云按别本治以酸寒作治以辛寒也少陰之復治以鹹寒佐以苦辛以甘寫之以酸收之以苦發之以鹹耎之不大發汗以寒攻之持至仲秋熱内伏結而爲心熱少氣少力而不能起矣熱伏不散歸於骨也太陰之復治以苦熱佐以酸辛以苦寫之燥之泄之不燥泄之乆而爲身腫腹滿關節不利腨及伏兔怫滿内作膝腰脛内側胕腫病少陽之復治以鹹冷佐以苦辛以鹹耎之以酸收之辛苦發之發不遠熱無犯温凉少陰同法不發汗以奪盛陽則熱内淫於四支而爲解然不可名也謂熱不甚謂寒不甚謂强不甚謂弱不甚不可以名言故謂之解然粗醫呼爲鬼氣惡病也乆乆不已則骨熱髓涸齒乾乃爲骨熱病也發汗奪陽故無留熱故發汗者雖熱生病夏月及差亦用熱藥以發之當舂秋時縱火熱勝亦不得以熱藥發汗汗不發而藥熱内甚助病爲瘧逆犯神靈故曰無犯温凉少陰氣熱爲療則同故云與少陰同法也數奪其汗則津液竭涸故以酸收以鹹潤也新校正云按六元正紀大論云發表不遠熱陽明之復治以辛温佐以苦甘以苦泄之以苦下之以酸補之泄謂滲泄汗及小便湯浴皆是也秋分前後則亦發之舂有勝則依勝法或不已亦湯漬和其中外也怒復之後其氣皆虚故補之以安全其氣餘復治同太陽之復治以鹹熱佐以甘辛以苦堅之不堅則寒氣内變止而復發發而復止綿歷年歲生大寒疾治諸勝復寒者熱之熱者寒之温者清之清者温之散者收之抑者散之燥者潤之急者緩之堅者耎之脆者堅之衰者補之强者寫之各安其氣必清必靜則病氣衰去歸其所宗此治之大體也太陽氣寒少陰少陽氣熱厥陰氣温陽明氣清太陰氣濕有勝復則各倍其氣以調之故可使平也宗屬也調不失理則餘之氣自歸其所屬少之氣自安其所居勝復衰已則各補養而平定之必清必靜無妄撓之則六氣循環五神安泰若運氣之寒熱治之平之亦各歸司天地氣也帝曰善黄帝内經素問補註釋文卷之四十七

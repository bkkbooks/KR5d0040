front:
  text: 黄帝内經素問補註釋文卷之七
  hash: sha256:fe689dd19c66c0f98cf91ea238bbef892e6b99ec768150a8b4cf0ab3cf155715
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_007-001a, image: hfl/0650/0650-098.png}
body:
  text: 陰陽别論篇黄帝問曰人有四經十二從何謂經謂經脉從謂順從岐伯對曰四經應四時十二從應十二月十二月應十二脉春脉弦夏脉洪秋脉浮冬脉沉謂四時之經脉也從謂天氣順行十二辰之分故應十二月也十二月謂春建寅卯辰夏建巳午未秋建申酉戌冬建亥子丑之月也十二脉謂手三陰三陽足三陰三陽之脉也以氣數相應故參合之脉有陰陽知陽者知陰知陰者知陽深知則備識其變易凡陽有五五五二十五陽五陽謂五藏之陽氣也五藏應時各形一脉一脉之内包總五藏之陽五五相乘故二十五陽也新校正云按玉機眞藏論云故病有五變五五二十五變義與此通所謂陰者眞藏也見則爲敗敗必死也五藏爲陰故曰陰者真藏也然見者謂肝脉至中外急如循刀刃責責然如按琴瑟弦心脉至堅而搏如循薏苡子累累然肺脉至大而虚如以毛羽中人膚腎脉至摶而絶如以指彈石辟辟然脾脉至弱而乍數乍踈夫如是脉見者皆爲藏敗神去故必死也累力追切所謂陽者胃脘之陽也胃脘之陽謂人迎之氣也察其氣脉動靜小大與脉口應否也胃爲水穀之海故候其氣而知病處人迎在結喉兩傍脉動應手其脉之動常左小而右大左小常以候藏右大常以候府一云胃胞之陽非也脘音管别於陽者知病處也别於陰者知死生之期陽者衛外而爲固然外邪所中别於陽則知病處陰者藏神而内守若考眞正成敗别於陰則知病者死生之期新校正云按玉機眞藏論云别於陽者知病從來别於陰者知死生之期三陽在頭三陰在手所謂一也頭謂人迎手謂氣口兩者相應俱往俱來若引繩小大齊等者名曰平人故言所謂一也氣口在手魚際之後一寸人迎在結喉兩傍一寸五分皆可以候藏府之氣别於陽者知病忌時别於陰者知死生之期識氣定期故知病忌審明成敗故知死生之期謹熟陰陽無與衆謀謹量氣候精熟陰陽病忌之準可知生死之疑自决正行無惑何用衆謀議也所謂陰陽者去者爲陰至者爲陽靜者爲陰動者爲陽遲者爲陰數者爲陽言脉動之中也凡持眞脉之藏脉者肝至懸絶急十八日死心至懸絶九日死肺至懸絶十二日死腎至懸絶七日死脾至懸絶四日死眞脉之藏脉者謂眞藏之脉也十八日者金木成數之餘也九日者水火生成數之餘也十二日者金火生成數之餘也七日者水土生數之餘也四日者木生數之餘也故平人氣象論曰肝見庚辛死心見壬癸死肺見丙丁死腎見戊己死脾見甲乙死者以此數是者皆至所期不勝而死也何者以不勝剋賊之氣也曰二陽之病發心脾有不得隱曲女子不月二陽謂陽明大腸及胃之脉也隱曲謂隱蔽委曲之事也夫腸胃發病心脾受之心受之則血不流脾受之則味不化血不流故女子不月味不化則男子少精是以隱蔽委曲之事不能爲也陰陽應象大論曰精不足者補之以味由是則味不化而精氣少也奇病論曰胞胎者繫於腎又評熱病論曰月事不來者胞脉閉胞脉者屬於心而絡於胞中令氣上迫貫心氣不得下通故月事不來則其義也又上古天眞論曰女子二七天癸至任脉通太衝脉盛月事以時下丈夫二八天癸至精氣溢瀉由此則在女子爲不月在男子爲少精其傳爲風消其傳爲息賁者死不治言其深乆者也胃病深乆傳入於脾故爲風熱以消削大腸病甚傳入於肺爲喘息而上賁然腸胃脾肺兼及於心二藏二府互相剋薄故死不治賁音奔曰三陽爲病發寒熱下爲癰腫及爲痿厥腨㾓三陽謂大腸小腸及膀胱之脉也小腸之脉起於手循臂繞肩膊上頭膀胱之脉從頭别下背貫臀入膕中循腨故在上爲病則發寒熱在下爲病則爲癰腫腨㾓及爲痿厥㾓痠疼也痿無力也厥足冷即氣逆也腨時兖切㾓鳥兖切膕古或切其傳爲索澤其傳爲頽疝熱甚則精血枯涸故皮膚潤澤之氣皆散盡也然陽氣下墜陰脉上爭上爭則寒多下墜則筋緩故睾垂縱緩内作頽疝曰一陽發病少氣善咳善泄一陽謂少陽膽及三焦之脉也膽氣乘胃故善泄三焦内病故少氣陽上熏肺故善咳何故心火内應而然其傳爲心掣其傳爲膈膈氣乘心心熱故陽氣内掣三焦内結中熱故隔塞不便掣尺制切曳也二陽一陰發病主驚駭背痛善噫善欠名曰風厥一陰謂厥陰心主及肝之脉也心主之脉起於胸中出屬心經云心病膺背肩脾間痛又在氣爲噫故背痛善噫心氣不足則腎氣乘之肝主驚駭故驚駭善欠夫肝氣爲風腎氣陵逆既風又厥故名風厥二陰一陽發病善脹心滿善氣二陰謂少陰心腎之脉也腎膽同逆三焦不行氣控於上故心滿下虚上盛故氣泄出也三陽三陰發病爲偏枯痿易四支不舉三陰不足則發偏枯三陽有餘則爲痿易易謂變易常用而痿弱無力也鼓一陽曰鈎鼓一陰曰毛鼓陽勝急曰弦鼓陽至而絶曰石陰陽相過曰溜言何以知陰陽之病脉邪一陽鼓動脉見鈎也何以然一陽謂三焦心脉之府然一陽鼓動者則鈎脉當之鈎脉則心脉也此言正見者也一陰厥陰肝木氣也毛肺金脉也金來鼓木其脉則毛金氣内乘木陽尚勝急而内見脉則爲弦也若陽氣至而急脉名曰弦屬肝陽氣至而或如斷絶脉名曰石屬腎陰陽之氣相過無能勝負則脉如水溜也陰爭於内陽擾於外魄汗未藏四逆而起起則熏肺使人喘鳴若金鼓不已陽氣大勝兩氣相持内爭外擾則流汗不止手足反寒甚則陽氣内燔流汗不藏則熱攻於肺故起則熏肺使人喘鳴也陰之所生和本曰和陰謂五神藏也言五藏之所以能生而全天眞和氣者以各得自從其和性而安靜爾苟乖所適則爲他氣所乘百端之病由斯而起奉生之道可不愼哉是故剛與剛陽氣破散陰氣乃消亡剛謂陽也言陽氣内蒸外爲流汗灼而不已則陽勝又陽故盛不乆存而陽氣自散陽已破敗陰不獨存故陽氣破散陰氣亦消亡此乃爭勝招敗也淖則剛柔不和經氣乃絶血淖者陽常勝視人之血淖者宜謹和其氣常使流通若不能深思寡欲使氣序乖衰陽爲重陽内燔藏府則死且可待生其能久乎死陰之屬不過三日而死火乘金也生陽之屬不過四日而死木乘火也新校正云按别本作四日而生全元起注本作四日而已俱通詳上下文義作死者非所謂生陽死陰者肝之心謂之生陽母來親子故曰生陽匪惟以木生火亦自陽氣主生爾心之肺謂之死陰陰主刑殺火復乘金金得火亡故云死肺之腎謂之重陰亦母子也以俱爲陰氣故曰重陰腎之脾謂之辟陰死不治土氣辟併水乃可升土辟水升故云辟陰結陽者腫四支以四支爲諸陽之本故結陰者便血一升陰主血故再結二升三結三升二盛謂之再結三盛謂之三結陰陽結斜多陰少陽曰石水少腹腫所謂失法二陽結謂之消二陽結謂胃及大腸俱熱結也腸胃藏熱則喜消水穀新校正云詳此則少二陰結三陽結謂之隔三陽結謂小腸膀胱熱結也小腸結熱則血脉燥膀胱熱則津液涸故隔塞而不便寫三陰結謂之水三陰結謂脾肺之脉俱寒結也脾肺寒結則氣化爲水一陰一陽結謂之喉痹一陰謂心主之脉一陽謂三焦之脉也三焦心主脉并絡喉氣熱内結故爲喉痹痹音閉陰搏陽别謂之有子陰謂尺中也搏謂摶觸於手也尺脉摶擊與寸口殊别陽氣挺然則爲有任之兆何者陰中有别陽故任去聲陰陽虚腸辟死辟陰也然胃氣不留腸開勿禁陰中不廪是眞氣竭絶故死新校正云按全元起本辟作避陽加於陰謂之汗陽在下陰在上陽氣上搏陰能同之則蒸而爲汗陰虚陽搏謂之崩陰脉不足陽脉盛摶則内崩而血流下三陰俱搏二十日夜半死脾肺成數之餘也摶謂伏鼓異於常候也陰氣盛極故夜半死二陰俱搏十三日夕時死心腎之成數也陰氣未極故死在夕時一陰俱搏十日平旦死肝心生成之數也三陽俱搏且鼓三日死陽氣速急故三陰三陽俱搏心腹滿發盡不得隱曲五日死兼陰氣也隱曲謂便寫也二陽俱搏其氣濫死不治不過十日死腸胃之王數也新校正云詳此闕一陽摶黄帝内經素問補註釋文卷之七

  text: 黄帝内經素問補註釋文卷之十五終一
  hash: sha256:a29357c2a7f22a01d4a54af0809ddaf606d712b43a4c16dd01e8d88c17d95306
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_015-001a, image: hfl/0652/0652-004.png}
body:
  text: 唐太僕令啓玄子王氷次註宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤玉機眞藏論篇黄帝問曰春脉如弦何如而弦岐伯對曰春脉者肝也東方木也萬物之所以始生也故其氣來耎弱輕虚而滑端直以長故曰弦言端直而長狀如弦也新校正云按越人云春脉弦者東方木也萬物始生未有枝葉故其脉來濡弱而長四時經輕作寬反此者病反謂反常平之候帝曰何如而反岐伯曰其氣來實而强此謂太過病在外其氣來不實而微此謂不及病在中氣餘則病形於外氣少則病在於中也新校正云按吕廣云實强者陽氣盛也少陽當微弱今更實强謂之太過陽處表故令病在外厥陰之氣養於筋其脉弦今更虚微故曰不及陰處中故令病在内帝曰春脉太過與不及其病皆何如岐伯曰太過則令人善忘忽忽眩冒而巅疾其不及則令人胸痛引背下則兩脅胠滿忽忽不爽也眩謂目昡視如轉也冒謂冒悶也胠謂腋下脅也忘當爲怒字之誤也靈樞經曰肝氣實則怒肝厥陰脉自足而上入毛中又上貫鬲布脅肋循喉嚨之後上入頏顙上出額與督脉會於巔故病如是新校正云按氣交變大論云木太過甚則忽忽善怒眩冒巔疾則忘當作怒帝曰善夏脉如鈎何如而鈎岐伯曰夏脉者心也南方火也萬物之所以盛長也故其氣來盛去衰故曰鈎言其脉來盛去衰如鈎之曲也新校正云按越人云夏脉鈎者南方火也萬物之所盛垂枝布葉皆下曲如鈎故其脉來疾去遲吕廣云陽盛故來疾陰虚故去遲脉從下上至寸口疾還尺中遲也反此者病帝曰何如而反岐伯曰其氣來盛去亦盛此謂太過病在外其脉來盛去盛是陽之盛也心氣有餘是爲太過其氣來不盛去反盛此謂不及病在中新校正云詳越人云肝心肺腎四藏脉俱以强實爲太過虚微爲不及與素問不同帝曰夏脉太過與不及其病皆何如岐伯曰太過則令人身熱而膚痛爲浸淫其不及則令人煩心上見咳唾下爲氣泄心少陰脉起於心中出屬心系下鬲絡小腸又從心系却上肺故心太過則身熱膚痛而浸淫流布於形分不及則心煩上見咳唾下爲氣泄帝曰善秋脉如浮何如而浮岐伯曰秋脉者肺也西方金也萬物之所以收成也故其氣來輕虚以浮來急去散故曰浮脉來輕虚故名浮也來急以陽未沉下去散以陰氣上升也新校正云按越人云秋脉毛者西方金也萬物之所終草木華葉皆秋而落其枝獨在若毫毛也故其脉來輕虚以浮故曰毛反此者病帝曰何如而反岐伯曰其氣來毛而中央堅兩傍虚此謂太過病在外其氣來毛而微此謂不及病在中帝曰秋脉太過與不及其病皆何如岐伯曰太過則令人逆氣而背痛愠愠然其不及則令人喘呼吸少氣而咳上氣見血下聞病音肺太陰脉起於中焦下絡大腸還循胃口上鬲屬肺從肺系横出腋下復藏氣爲咳主喘息故氣盛則肩背痛氣逆不及則喘息變易呼吸少氣而咳上氣見血也下聞病音謂喘息則肺中有聲也帝曰善冬脉如營何如而營脉沉而深如營動也新校正云詳深一作濡又作摶按本經下文云其氣來沉以摶則深字當爲搏又按甲乙經摶字爲濡當從甲乙經爲得何以言之脉沉而濡濡古軟字乃冬脉之平調脉若沉而摶擊於手則冬脉之太過脉也故言當從甲乙經濡字岐伯曰冬脉者腎也北方水也萬物之所以合藏也故其氣來沉以搏故曰營言沉而摶擊於手也新校正云按甲乙經摶當作濡義如前說又越人云冬脉石者北方之水也萬物之所藏盛冬之時水凝如石故其脉來沉濡而滑故曰石也反此者病帝曰何如而反岐伯曰其氣來如彈石者此謂太過病在外其去如數者此謂不及病在中帝曰冬脉太過與不及其病皆何如岐伯曰太過則令人解㑊新校正云按解㑊之義具第五卷注脊脉痛而少氣不欲言其不及則令人心懸如病饑䏚中清脊中痛少腹滿小便變腎少陰脉自股内後廉貫脊屬腎絡膀胱其直行者從腎上貫肝鬲入肺中循喉嚨俠舌本其支别者從肺出絡心注胸中故病如是也眇者季脇之下俠脊兩傍空軟處也腎外當䏚故䏚中清冷也帝曰善帝曰四時之序逆從之變異也脉春弦夏鈎秋浮冬營爲逆順之變見異狀也然脾脉獨何主主謂主時月岐伯曰脾脉者土也孤藏以灌四傍者也納水穀化津液溉灌於肝心肺腎也以不正主四時故謂之孤藏溉古代切帝曰然則脾善惡可得見之乎岐伯曰善者不可得見惡者可見不正主時寄王於四季故善不可見惡可見也帝曰惡者何如可見岐伯曰其來如水之流者此謂太過病在外如鳥之喙者此謂不及病在中新校正云按平人氣象論云如烏之喙又别本喙作啄帝曰夫子言脾爲孤藏中央土以灌四傍其太過與不及其病皆何如岐伯曰太過則令人四支不舉以主四支故病不舉其不及則令人九竅不通名曰重强脾之孤藏以灌四傍今病則五藏不和故九竅不通也八十一難經曰五藏不和則九竅不通重謂藏氣重叠强謂氣不和順帝瞿然而起再拜而稽首曰善吾得脉之大要天下至數五色脉變揆度奇恒道在於一瞿然忙貌也言以太過不及而一貫之揆度奇恒皆通也神轉不迴迴則不轉乃失其機五氣循環不愆時序是爲神氣流轉不迴若却行衰王反天之常氣是則却迴而不轉由是却迴不轉乃失生氣之機矣至數之要迫近以微得至數之要道則應用切近以微妙也迫切也著之玉版藏之藏府每旦讀之名曰玉機著之玉版故以爲名言是玉版生氣之機新校正云詳至數至名曰玉機與前玉版論要文相重彼注頗詳五藏受氣於其所生傳之於其所勝氣舍於其所生死於其所不勝病之且死必先傳行至其所不勝病乃死受氣所生者謂受病氣於已之所生者也傳所勝者謂傳於己之所剋者也氣舍所生者謂舍於生己者也死所不勝者謂死於剋己者之分位也所傳不順故必死焉此言氣之逆行也故死所爲逆者次如下說肝受氣於心傳之於脾氣舍於腎至肺而死心受氣於脾傳之於肺氣舍於肝至腎而死脾受氣於肺傳之於腎氣舍於心至肝而死肺受氣於腎傳之於肝氣舍於脾至心而死腎受氣於肝傳之於心氣舍於肺至脾而死此皆逆死也一日一夜五分之此所以占死生之早暮也肝死於肺位秋庚辛餘四仿此然朝主甲乙晝主丙丁四季上主戊己晡主庚辛夜主壬癸由此則死生之早暮可知也新校正云按甲乙經生作者名曰蠱當此之時可按可藥弗治腎傳之心病筋脉相引而急病名曰瘛腎不足則水不生水不生則筋燥急故相引也陰氣内弱陽氣外燔筋脉受熱而自跳掣故名曰瘛當此之時可灸可藥弗治滿十曰法當死至心而氣極則如是矣若復傳行當如下說腎因傳之心心即復反傳而行之肺發寒熱法當三歲死因腎傳心心不受病即而復反傳與肺金肺已再傷故寒熱也三歲者肺至腎一歲腎至肝一歲肝至心一歲火又乘肺故云三歲死此病之次也謂傳勝之次第然其卒發者不必治於傳不必依傳之次故不必以傳治之或其傳化有不以次不以次入者憂恐悲喜怒令不得以其次故令人有大病矣憂恐悲喜怒發無常分觸遇則發故令病氣亦不次而生因而喜大虚則腎氣乘矣喜則心氣移於肺心氣不守故腎氣乘矣宣明五氣篇曰精氣并於心則喜怒則肝氣乘矣怒則氣逆故肝氣乘脾悲則肺氣乘矣悲則肺氣移於肝肝氣受邪故肺氣乘矣宣明五氣篇曰精氣并於肺則悲恐則脾氣乘矣恐則腎氣移於心腎氣不守故脾氣乘矣宣明五氣篇曰精氣并於腎則恐憂則心氣乘矣憂則肝氣移於脾肝氣不守故心氣乘矣宣明五氣篇曰精氣并於肝則憂此其道也此其不次之常道故病有五五五二十五變反其傳化五藏相并而各五之五而乘之則二十五變也然其變化以勝相傳傳而不次變化多端新校正云按陰陽别論云凡陽有五五五二十五陽義與此通傳乘之名也言傳者何相乘之異名爾大骨枯槁大肉陷下胸中氣滿喘息不便其氣動形期六月死眞藏脉見乃予之期日皮膚乾著骨間肉陷謂大骨枯槁大肉陷下也諸附骨際及空窳處亦同其類也胸中氣滿喘息不便是肺無主也肺司治節氣息由之其氣動形爲無氣相接故聳舉肩背以遠求報氣矣夫如是皆形藏已敗神藏亦傷見是證者期後一百八十日内死矣候見眞藏之脉乃與死日之期爾眞藏脉診下經備矣此肺之藏也窳音愈大骨枯槁大肉陷下胷中氣滿喘息不便内痛引肩項期一月死眞藏見乃予之期日火精外出陽氣上燔金受火災故内痛肩項如是者期後三十日内死此心之藏也大骨枯槁大肉陷下胷中氣滿喘息不便内痛引肩項身熱脫肉破䐃眞藏見十月之内死陰氣微弱陽氣内燔故身熱也䐃者肉之標脾主肉故肉如脫盡䐃如破敗也見斯證者期後三百日内死䐃謂肘膝後肉如塊者此脾之藏也䐃渠殞切大骨枯槁大肉陷下肩髓内消動作益衰眞藏來見期一歲死見其眞藏乃予之期日肩髓内消謂缺盆深也衰於動作字云占死者之早暮詳此經文專爲言氣之逆行也故死即不言生之早暮王氏改者作生義不若甲乙經中素問本文黄帝曰五藏相通移皆有次五藏有病則各傳其所勝以上文逆傳而死故言是逆傳所勝之次也新校正云詳逆傳所勝之次逆當作順上文既言逆傳下文所言乃順傳之次也不治法三月若六月若三日若六日傳五藏而當死是順傳所勝之次三月者謂一藏氣之遷移六月者謂至其所勝之位三日者三陽之數以合日也六日者謂兼三陰以數之爾熱論曰傷寒一日巨陽受二日陽明受三日少陽受四日太陰受五日少陰受六日厥陰受則其義也新校正云詳上文是順傳所勝之次七字乃是次前注誤在此經文之下不惟無義兼校之全元起本素問及甲乙經并無此七字直去之慮未達者致疑今存於注故曰别於陽者知病從來别於陰者知死生之期主辨三陰三陽之候則知中風邪氣之所不勝矣故下曰新校正云詳舊此段注寫作經合改爲注又按陰陽别論云别於陽者知病處也别於陰者知死生之期又云别於陽者知病忌時别於陰者知死生之期義同此言知至其所困而死困謂至所不勝也上文曰死於其所不勝是故風者百病之長也言先百病而有之新校正云按生氣通天論云風者百病之始今風寒客於人使人毫毛畢直皮膚閉而爲熱客謂客止於人形也風擊皮膚寒勝腠理故毫毛畢直玄府閉宻而熱生也當是之時可汗而發也邪在皮毛故可汗泄也陰陽應象大論曰善治者治皮毛此之謂也或痹不仁腫痛病生而變故如是也熱中血氣則𤸷痹不仁寒氣傷形故爲腫痛陰陽應象大論云寒傷形熱傷氣氣傷痛形傷腫當是之時可湯熨及火灸刺而去之皆謂釋散寒邪宣揚正氣弗治病入舍於肺名曰肺痹發咳上氣邪入諸陰則病而爲痹故入於肺名曰痹焉宣明五氣論曰邪入於陽則狂邪入於陰則痹肺在變動爲咳故咳則氣上故上氣也弗治肺即傳而行之肝病名曰肝痹一名曰厥脇痛出食肺金伐木氣下入肝故曰弗治行之肝也肝氣通膽膽善爲怒怒者氣逆故一名厥也肝厥陰脉從少腹屬肝絡膽上貫鬲布脅肋循喉嚨之後上入頏顙故脅痛而食入腹則出故曰出食當是之時可按若刺耳弗治肝傳之脾病名曰脾風發癉腹中熱煩心出黄肝氣應風木勝脾土土受風氣故曰脾風蓋爲風氣通肝而爲名也脾之爲病善發黄癉故發癉也脾太陰脉入腹屬脾絡胃上鬲俠咽連舌本散舌下其支别者復從胃别上鬲注心中故腹中熱而煩心出黄色於便寫之所也當此之時可按可藥可浴弗治脾傳之腎病名曰疝瘕少腹冤熱而痛出白一名曰蠱腎少陰脉自股内後廉貫脊屬腎絡膀胱故少腹冤熱而痛溲岀白液也冤熱内結消鑠脂肉如蟲之食日内損削故一交接漸微以餘藏尚全故期後三百六十五日内死此腎之藏也新校正云按全元起本及甲乙經眞藏來見來字當作未字之誤也大骨枯槁大肉陷下胸中氣滿腹内痛心中不便項肩身熱破䐃脫肉目匡陷眞藏見目不見人立死其見人者至其所不勝之時則死木生其火肝氣通心脉抵少腹上布脅肋循喉嚨之後上入頏顙故腹痛心中不便肩項身熱破䐃脫肉也肝主目故目匡陷及不見人立死也不勝之時謂於庚辛之月此肝之藏也急虚身中卒至五藏絶閉脉道不通氣不往來譬於墮溺不可爲期言五藏相移傳其不勝則可待眞藏脉見乃與死日之期卒急虚邪中於身内則五藏絶閉脉道不通氣不往來譬於墮墜没溺不可與爲死日之期也其脉絶不來若人一息五六至其形肉不脫眞藏雖不見猶死也是則急虚卒至之脉新校正云按人一息脉五六至何得爲死必息字誤息當作呼乃是眞肝脉至中外急如循刀刃責責然如按琴瑟弦色青白不澤毛折乃死眞心脉至堅而搏如循薏苡子累累然色赤黑不澤毛折乃死眞肺脉至大而虚如以毛羽中人膚色白赤不澤毛折乃死眞腎脉至搏而絶如指彈石辟辟然色黑黄不澤毛折乃死眞脾脉至弱而乍數乍疏色黄青不澤毛折乃死諸眞藏脉見者皆死不治也新校正云按楊上善云無餘物和雜故名眞也五藏之氣皆胃氣和之不得獨用如至剛不得獨用獨用則折和柔用之即固也五藏之氣和於胃氣即得長生若眞獨見必死欲知五藏眞見爲死和胃爲生者於寸口診即可知見者如弦是肝脉也微弦爲平和微弦謂二分胃氣一分弦氣俱動爲微弦三分并是弦而無胃氣爲見眞藏餘四藏準此黄帝曰見眞藏曰死何也岐伯曰五藏者皆禀氣於胃胃者五藏之本也胃爲水穀之海故五藏禀焉藏氣者不能自致於手太陰必因於胃氣乃至於手太陰也平人之常禀氣於胃胃氣者平人之常氣故藏氣因胃乃能至於手太陰也新校正云詳平人之常至下平人之常氣本平人氣象論文王氏引注此經按甲乙經云人常禀氣於胃脉以胃氣爲本與此小異然甲乙之文爲得故五藏各以其時自爲而至於手太陰也自爲其狀至於手太陰也故邪氣勝者精氣衰也故病甚者胃氣不能與之俱至於手太陰故眞藏之氣獨見獨見者病勝藏也故曰死是所謂脉無胃氣也平人氣象論曰人無胃氣曰逆逆者死帝曰善新校正云詳自黄帝問至此一節全元起本在第四卷太陰陽眀表裏篇中王冰移於此處必言此者欲明王氏之功於素問多矣黄帝曰凡治病察其形氣色澤脉之盛衰病之新故乃治之無後其時欲必先時而取之形氣相得謂之可治氣盛形盛氣虚形虚是相得也色澤以浮謂之易已氣色浮潤血氣相營故易已脉從四時謂之可治脉春弦夏鈎秋浮冬營謂順四時從順也脉弱以滑是有胃氣命曰易治取之以時侯可取之時而取之則萬舉萬全當以四時血氣所在而爲療爾新校正云詳取之以時甲乙經作治之趨之無後其時與王氏之文兩通形氣相失謂之難治形盛氣虚氣盛形虚皆相失也色夭不澤謂之難已夭謂不明而惡不澤謂枯燥也脉實以堅謂之益甚脉實以堅是邪氣盛故益甚也脉逆四時爲不可治以氣逆故矣上四句是謂四難所以下文曰必察四難而明告之此四粗之所易語工之所難爲所謂逆四時者春得肺脉夏得腎脉秋得心脉冬得脾脉其至皆懸絶沉澀者命曰逆四時春得肺脉秋來見也夏得腎脉冬來見也秋得心脉夏來見也冬得脾脉春來見也懸絶謂如懸物之絶去也未有藏形於春夏而脉沉濇新校正云按平人氣象論云而脉瘦義與此同秋冬而脉浮大名曰逆四時也未有謂未有藏脉之形狀也病熱脉靜泄而脉大脫血而脉實病在中脉實堅病在外脉不實堅者皆難治皆難治者以其與證不相應也新校正云按平人氣象論云病在中脉虚病在外脉澀堅與此相反此經誤彼論爲得自未有藏形春夏至此與平人氣象論相重注義備於彼黄帝曰余聞虚實以决死生願聞其情岐伯曰五實死五虚死五實謂五藏之實五虚謂五藏之虚帝曰願聞五實五虚岐伯曰脉盛皮熱腹脹前後不通悶瞀此謂五實實謂邪氣盛實然脉盛心也皮熱肺也腹脹脾也前後不通腎也悶瞀肝也脉細皮寒氣少泄利前後飲食不入此謂五虚虚謂眞氣不足也然脉細心也皮寒肺也氣少肝也泄利前後腎也飲食不入脾也帝曰其時有生者何也岐伯曰漿粥入胃泄注止則虚者活身汗得後利則實者活此其候也全注飲粥得入於胃胃氣和調其利漸止胃氣得實虚者得活言實者得汗外通後得便利自然調平黄帝内經素問補註釋文卷之十五

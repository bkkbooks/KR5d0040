front:
  text: 黄帝内經素問補註釋文卷之十七終三
  hash: sha256:c76eabb0e8c0246c03d02b0551e23965512b38c01c0d45ca6cd638d988f0c0cc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_017-001a, image: hfl/0652/0652-079.png}
body:
  text: 唐太僕令啓玄子王氷次註宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤經脉别論篇黄帝問曰人之居處動靜勇怯脉亦爲之變乎岐伯對曰凡人之驚恐恚勞動靜皆爲變也變謂變易常候是以夜行則喘出於腎腎王於夜氣合幽冥故夜行則喘息内從腎出也淫氣病肺夜行腎勞因而喘息氣淫不次則病肺也有所墮恐喘出於肝恐生於肝墮損筋血因而奔喘故出於肝也淫氣害脾肝木妄淫害脾土也有所驚恐喘出於肺驚則心無所依神無所歸氣亂胸中故喘出於肺也淫氣傷心驚則神越故氣淫反傷心矣度水跌仆喘出於腎與骨濕氣通腎骨腎主之故度水跌仆喘出腎骨矣跌謂足跌仆謂身倒也跌音仆音迭付當是之時勇者氣行則已怯者則著而爲病也氣有强弱神有壯懦故殊狀也故曰診病之道觀人勇怯骨肉皮膚能知其情以爲診法也通達性懷得其情狀乃爲深識診契物宜也故飲食飽甚汗出於胃飽甚胃滿故汗出於胃也驚而奪精汗出於心驚奪心精神氣浮越陽内薄之故汗出於心也持重遠行汗出於腎骨勞氣越腎復過疲故持重遠行汗出於腎也疾走恐懼汗出於肝暴役於筋肝氣罷極故疾走恐懼汗出於肝也摇體勞苦汗出於脾摇體勞苦謂動作施力非疾走遠行也然動作用力則穀精四布脾化水穀故汗出於脾也故春秋冬夏四時陰陽生病起於過用此爲常也不適其性而强云爲過即病生此其常理五藏受氣蓋有常分用而過耗是以病生故下文曰食氣入胃散精於肝淫氣於筋肝養筋故胃散穀精之氣入於肝則浸淫滋養於筋絡矣食氣入胃濁氣歸心淫精於脉濁氣穀氣也心居胃上故穀氣歸心淫溢精微入於脉也何者心主脉故脉氣流經經氣歸於肺肺朝百脉輸精於皮毛言脉氣流運乃爲大經經氣歸宗上朝於肺肺爲華蓋位復居高治節由之故受百脉之朝會也平人氣象論曰藏眞高於肺以行榮衛陰陽由此故肺朝百脉然乃布化精氣輸於皮毛矣毛脉合精行氣於府府謂氣之所聚處也是謂氣海在兩乳間名曰膻中也府精神明留於四藏氣歸於權衡膻中之布氣者分爲三隧其下者走於氣街上者走於息道宗氣留於海積於胸中命曰氣海也如是分化乃四藏安定三焦平均中外上下各得其所也權衡以平氣口成寸以决死生三世脉法皆以三寸爲寸關尺之分故中外高下氣緒均平則氣口之脉而成寸也夫氣口者脉之大要會也百脉盡朝故以其分决死生也飲入於胃游溢精氣上輸於脾水飲流下至於中焦水化精微上爲雲霧雲霧散變乃注於脾靈樞經曰上焦如霧中焦如樞此之謂也脾氣散精上歸於肺通調水道下輸膀胱水土合化上滋肺金金氣通腎故調水道轉注下焦膀胱禀化乃爲溲矣靈樞經曰下焦如瀆此之謂也水精四布五經並行合於四時五藏陰陽揆度以爲常也從是水精布經氣行筋骨成血氣順配合四時寒暑證符五藏陰陽睽度盈虚用爲常道度量也以用也新校正云按一本云陰陽動靜太陽藏獨至厥喘虚氣逆是陰不足陽有餘也陰謂腎陽謂膀胱也故下文曰表裏當俱寫取之下俞陽獨至謂陽氣盛至也陽獨至爲陽有餘陰不足則陽邪入故表裏俱寫取足六俞也下俞足俞也新校正云詳六當爲穴字之誤也按府有六俞藏止五俞今藏府俱寫不當言六俞六俞則不能兼藏言穴俞則藏府兼舉陽明藏獨至是陽氣重并也當寫陽補陰取之下俞陽氣重并故寫陽補陰少陽藏獨至是厥氣也蹻前卒大取之下俞蹻謂陽蹻脉在足外踝下足少陽脉行抵絶骨之端下出外踝之前循足跗然蹻前卒大則少陽之氣盛也故取足俞少陽也少陽獨至者一陽之過也一陽少陽也過謂大過也以其大過故蹻前卒大焉太陰藏搏者用心省眞見太陰之脉伏鼓則當用心省察之若是眞藏之脉不當治也五脉氣少胃氣不平三陰也三陰太陰脾之脉也五藏脉少胃氣不調是亦太陰之過也宜治其下俞補陽寫陰以陰氣大過故一陽獨嘯少陽厥也嘯謂耳中鳴如嘯聲也膽及三焦脉皆入耳故氣逆上則耳中鳴新校正云詳此上明三陽此言三陰今此再言少陽而不及少陰者疑此一陽乃二陰之誤也又按全元起本此爲少陰厥顯知此即二陰也陽并於上四脉爭張氣歸於腎心脾肝肺四脉爭張陽并於上者是腎氣不足故氣歸於腎也宜治其經絡寫陽補陰陰氣足則陽氣不復并於上矣一陰至厥陰之治也眞虚㾓心厥氣留薄發爲白汗調食和藥治在下俞一或作二誤也厥陰一陰也上言二陰至則當少陰治下言厥陰治則當一陰至也然三墳之經俗久淪墜人少披習字多傳寫誤㾓烏玄切骨節疼也帝曰太陽藏何象岐伯曰象三陽而浮也帝曰少陽藏何象岐伯曰象一陽也一陽藏者滑而不實也帝曰陽明藏何象岐伯曰象大浮也新校正云按太素及全元起本云象心之大浮也太陰藏摶言伏鼓也二陰摶至腎沉不浮也明前獨至之脉狀也新校正云詳前脫二陰此無一陰闕文可知藏氣法時論篇黄帝問曰合人形以法四時五行而治何如而從何如而逆得失之意願聞其事岐伯對曰五行者金木水火土也更貴更賤以知死生以决成敗而定五藏之氣間甚之時死生之期也帝曰願卒聞之岐伯曰肝主春以應木也足厥陰少陽主治厥陰肝脉少陽膽脉肝與膽合故治同其日甲乙甲乙爲木東方干也肝苦急急食甘以緩之甘性和緩新校正云按全元起本云肝苦急是其氣有餘心主夏以應火也手少陰太陽主治少陰心脉太陽小腸脉心與小腸合故治同其日丙丁丙丁爲火南方干也心苦緩急食酸以收之酸性收歛新校正云按全元起本云心苦緩是心氣虚脾主長夏長夏謂六月也夏爲土母土長於中以長而治故云長夏新校正云按全元起云脾王四季六月是火王之處蓋以脾主中央六月是十二月之中一年之半故脾王六月也足太陰陽明主治太陰脾脉陽明胃脉脾與胃合故治同其曰戊己戊己爲土中央干也脾苦濕急食苦以燥之苦性乾燥肺主秋以應金也手太陰陽明主治太陰肺脉陽明大腸脉肺與大腸合故治同其日庚辛庚辛爲金西方干也肺苦氣上逆急食苦以泄之苦性宣泄故肺用之新校正云按全元起云肺氣上逆是其氣有餘腎主冬以應水也足少陰太陽主治少陰腎脉太陽膀胱脉腎與膀胱合故治同其日壬癸壬癸爲水北方干也腎苦燥急食辛以潤之開腠理致津液通氣也辛性津潤也然腠理開津液達則肺氣下流腎與肺通故云通氣也病在肝愈於夏子制其鬼也餘愈同夏不愈甚於秋子休鬼復王也餘甚同秋不死持於冬鬼休而母養故氣執持於父母之鄉也餘持同起於春自得其位故復起餘起同禁當風以風氣通於肝故禁而勿犯肝病者愈在丙丁丙丁應夏丙丁不愈加於庚辛庚辛應秋庚辛不死持於壬癸壬癸應冬起於甲乙應春木也肝病者平旦慧下晡甚夜半靜木王之時故爽慧也金王之時故加甚也水王之時故靜退也餘慧甚同其靜小異肝欲散急食辛以散之以藏氣當散故以辛發散也陰陽應象大論曰辛甘發散爲陽也平人氣象論曰藏眞散於肝言其常發散也用辛補之酸寫之辛味散故補酸味收故寫新校正云按全元起本云用酸補之辛寫之自爲一義病在心愈在長夏長夏不愈甚於冬冬不死持於春起於夏如肝例也禁温食熱衣熱則心躁故禁止之心病者愈在戊己戊己應長夏也戊己不愈加於壬癸壬癸應冬壬癸不死持於甲乙甲乙應春起於丙丁應夏火也心病者日中慧夜半甚平旦靜亦休王之義也心欲耎急食鹹以耎之以藏氣好耎故以鹹柔耎也平人氣象論曰藏眞通於心言其常欲柔耎也用鹹補之甘寫之鹹補取其柔耎甘寫取其舒緩病在脾愈在秋秋不愈甚於春春不死持於夏起於長夏禁温食飽食濕地濡衣温濕及飽并傷脾氣故禁止之脾病者愈在庚辛應秋氣也庚辛不愈加於甲乙應春氣也甲乙不死持於丙丁應夏氣也起於戊己應長夏也脾病者日昳慧日出甚新校正云按甲乙經日出作平旦雖日出與平旦時等按前文言木王之時皆云平旦而不云日出蓋日出於冬夏之期有早晩不若平旦之爲得也下晡靜土王則爽慧木剋則增甚金扶則靜退亦休王之義也一本或云日中持者謬也爰五藏之病皆以勝相加至其所生而愈至其所不勝而甚至於所生而持自得其位而起由是故皆有間甚之時死生之期也脾欲緩急食甘以緩之甘性和緩順其靜也用苦寫之甘補之苦寫取其堅燥甘補取其安緩病在肺愈在冬冬不愈甚於夏夏不死持於長夏起於秋例如肝也禁寒飲食寒衣肺惡寒氣故衣食禁之靈樞經曰形寒寒飲則傷肺飲尚傷肺其食甚焉肺不獨惡寒亦畏熱也肺病者愈在壬癸應冬水也壬癸不愈加於丙丁應夏火也丙丁不死持於戊己長夏土也起於庚辛應秋金也肺病者下晡慧日中甚夜半靜金王則慧水王則靜火王則甚肺欲收急食酸以收之以酸性收歛故也用酸補之辛寫之酸收斂故補辛發散故寫病在腎愈在春春不愈甚於長夏長夏不死持於秋起於冬例如肝也禁犯焠㶼熱食温炙衣腎性惡燥故此禁之新校正云按别本焠作悴青對切㶼烏來切煩熱也腎病者愈在甲乙應春木也甲乙不愈甚於戊己長夏土也戊己不死持於庚辛應秋金也起於壬癸應冬水也腎病者夜半慧四季甚下晡靜水王則慧土王則甚金王則靜腎欲堅急食苦以堅之以苦性堅燥也用苦補之鹹寫之苦補取其堅也鹹寫取其耎也耎濕土制也故用寫之夫邪氣之客於身也以勝相加邪者不正之自風寒暑濕饑飽勞逸皆是邪也非唯鬼毒疫癘也至其所生而愈謂至己所生也至其所不勝而甚謂至剋己之氣也至於所生而持謂至生己之氣也自得其位而起居所主處謂自得其位也必先定五藏之脉乃可言間甚之時死生之期也五藏之脉者謂肝弦心鈎肺浮腎營脾代如是則可言死生間甚矣三部九候論曰必先知經脉然後知病脉此之謂也肝病者兩脅下痛引少腹令人善怒肝厥陰脉自足而上環陰器抵少腹又上貫肝鬲布脅肋故兩脅下痛引少腹也其氣實則善怒靈樞經曰肝氣實則怒虚則目𥆨𥆨無所見耳無所聞善恐如人將捕之肝厥陰脉自脅肋循喉嚨入頏顙連目系膽少陽脉其支者從耳後入耳中出走耳前至目鋭眦後故病如是也恐謂恐懼魂不安也取其經厥陰與少陽經謂經脉也非其絡病故取其經也取厥陰以治肝氣取少陽以調氣逆也故下文曰氣逆則頭痛耳聾不聦頰腫肝厥陰脉自目系上出額與督脉會於巅故頭痛膽少陽脉支别者從耳中出走耳前又支别者加頰車又厥陰之脉支别者從目系下頰裏故耳聾不聦頰腫也是以上文兼取少陽也取血者脉中血滿獨異於常乃氣逆之診隨其左右有則刺之心病者胸中痛脅支滿脅下痛膺背肩甲間痛兩臂内痛心少陰脉支别者循胸出脅又手心主厥陰之脉起於胸中其支别者亦循胸出脅下掖三寸上抵掖下下循臑内行太陰少陰之間入肘中下循臂行兩筋之間又心少陰之脉直行者復從心系却上肺上出掖下下循臑内後廉行太陰心主之後下肘内循臂内後廉抵掌後鋭骨之端又小腸太陽之脉自臂臑上繞肩甲交肩上故病如是臑人朱切虚則胷腹大脅下與腰相引而痛手心主厥陰之脉從胷中出屬心包下鬲歷絡三焦其支别者循胷出脇心少陰之脉自心系下鬲絡小腸故病如是也取其經少陰太陽舌下血者少陰之脉從心系上俠咽喉故取舌本下及經脉血也其變病刺郄中血者其或嘔變則刺少陰之郄血滿者也手少陰之郄在掌後脉中去腕半寸當小指之後脾病者身重善肌肉痿足不收行善瘈脚下痛脾象土而主肉故身重肉痿也痿謂痿無力也脾太陰之脉起於足大指之端循指内側上内踝前廉上腨内腎少陰之脉起於足小指之下斜趨足心上腨内出膕内廉故病則足不收行善瘈脚下痛也故下取少陰新校正云按甲乙經作善饑肌肉痿千金方云善饑足痿不收氣交變大論云肌肉痿足痿不收行善瘈痿於尼切濕病也足不能行也瘈音係小兒病又尺制切虚則腹滿腸鳴飧泄食不化脾太陰脉從股内前廉入腹屬脾絡胃故病如是靈樞經曰中氣不足則腹爲之善滿腸爲之善鳴也取其經太陰陽明少陰血者少陰腎脉也以前病行善瘈脚下痛故取之而出血血滿者出之肺病者喘咳逆氣肩背痛新校正云按千金方作肩息背痛汗出尻陰股膝新校正云按甲乙經脉經作膝攣髀腨胻足皆痛肺藏氣而主喘息在變動爲咳故病則喘咳逆氣也背爲胸中之府肩接近之故肩背痛也肺養皮毛邪盛則心液外泄故汗出也腎少陰之脉從足下上循腨内出膕内廉上股内後廉貫脊屬腎絡膀胱今肺病則腎脉受邪故尻陰股膝髀腨胻足皆痛故下取少陰也尻苦刀切腨時轉切跟也胻胡郎切脛也虚則少氣不能報息耳聾嗌乾氣虚少故不足以報入息也肺太陰之絡會於耳中故聾也腎少陰之脉從腎上貫肝鬲入肺中循喉嚨俠舌本今肺虚則腎氣不足以上潤於嗌故嗌乾也是以下文兼取少陰也取其經太陰足太陽之外厥陰内血者足太陽之外厥陰内者正謂腨内側内踝後之直上則少脉也視左右足脉少陰部分有血滿異於常者即時取之腎病者腹大脛腫新校正云按甲乙經云脛腫痛喘咳身重寢汗出憎風腎少陰脉起於足而上循腨復從横骨中俠齊循腹裏上行而入肺故腹大脛腫而喘咳也腎病則骨不能用故身重也腎邪攻肺心氣内微心液爲汗故寢汗出也脛既腫矣汗復津泄陰凝玄府陽爍上焦内熱外寒故憎風也憎風謂深惡之也虚則胷中痛大腹小腹痛清厥意不樂腎少陰脉從肺出絡心注胷中然腎氣既虚心無所制心氣熏肺故痛聚胷中也足太陽脉從項下行而至足腎虚則太陽之氣不能盛行於足故足冷而氣逆也清謂氣清冷厥謂氣逆也以清冷氣逆故大腹小腹痛志不足則神躁擾故不樂也新校正云按甲乙經大腹小腹作大腸小腸取其經少陰太陽血者凡刺之道虚則補之實則寫之不盛不虚以經取之是謂得道經絡有血刺而去之是謂守法猶當揣形定氣先去血脉而後乃平有餘不足焉三部九候論曰必先度其形之肥瘦以調其氣之虚實實則寫之虚則補之必先去其血脉而後調之此之謂也肝色青宜食甘粳米牛肉棗葵皆甘肝性喜急故食甘物而取其寬緩也新校正云詳肝色青至篇末全元起本在第六卷王氏移於此心色赤宜食酸小豆新校正云按甲乙經太素小豆作麻犬肉李韭皆酸心性喜緩故食酸物而取其收歛也肺色白宜食苦麥羊肉杏薤皆苦肺喜氣逆故食苦物而取其宣泄也脾色黄宜食鹹大豆豕肉栗藿皆鹹究斯宜食乃調利關機之義也腎爲胃關脾與胃合故假鹹柔耎以利其關關利而胃氣乃行胃行而脾氣方化故應脾宜味與衆不同也新校正云按上文曰肝苦急急食甘以緩之心苦緩急食酸以收之脾苦濕急食苦以燥之肺苦氣上逆急食苦以泄之腎苦燥急食辛以潤之此肝心肺腎食宜皆與前文合獨脾食鹹宜不用苦故王氏特注其義腎色黑宜食辛黄黍鷄肉桃葱皆辛腎性喜燥故食辛物而取其津潤也辛散酸收甘緩苦堅鹹耎皆自然之氣也然辛味苦味匪唯堅散而已辛亦能潤能散苦亦能燥能泄故上文曰脾苦濕急食苦以燥之肺苦氣上逆急食苦以泄之則其謂苦之燥泄也又曰腎苦燥急食辛以潤之則其謂辛之濡潤也耎音軟毒藥攻邪藥謂金玉土石草木菜果蟲魚鳥獸之類皆可以祛邪養正者也然辟邪安正惟毒乃能以其能然故通謂之毒藥也新校正云按本草云下藥爲佐使主治病以應地多毒不可乆服欲除寒熱邪氣破積聚愈疾者本下經故云毒藥攻邪五穀爲養謂粳米小豆麥大豆黄黍也五果爲助謂桃李杏栗棗也五畜爲益謂牛羊豕犬鷄也五菜爲充謂葵藿薤葱韭也新校正云按五常政大論曰大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九穀肉果菜食養盡之無使過之傷其正也氣味合而服之以補精益氣氣謂陽化味曰陰施氣味合和則補益精氣矣陰陽應象大論曰陽爲氣陰爲味味歸形形歸氣氣歸精精歸化精食氣形食味又曰形不足者温之以氣精不足者補之以味由是則補精益氣其義可知新校正云按孫思邈云精以食氣氣養精以榮色形以食味味養形以生力精順五氣以爲靈也若食氣相惡則傷精也形受味以成也若食味不調則損形也是以聖人先用食禁以存性後制藥以防命氣味温補以存精形此之謂氣味合而服之以補精益氣也此五者有辛酸甘苦鹹各有所利或散或收或緩或急或堅或耎四時五藏病隨五味所宜也用五味而調五藏配肝以甘心以酸脾以鹹肺以苦腎以辛者各隨其宜欲緩欲收欲耎欲泄欲散欲堅而爲用非以相生相養而爲義也黄帝内經素問補註釋文卷之十七

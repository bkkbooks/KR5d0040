front:
  text: 黄帝内經素問補註釋文卷之二十六宜二
  hash: sha256:6c4c4f022c25e0a2488c624918c3a4c41fa3b669dc3e0b8e8a9d2a244be1b6cb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_026-001a, image: hfl/0654/0654-058.png}
body:
  text: 唐太僕令啓玄子王氷次註宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤痹論篇黄帝問曰痹之安生安猶何也言何以生岐伯對曰風寒濕三氣雜至合而爲痹也雖合而爲痹發起亦殊矣其風氣勝者爲行痹寒氣勝者爲痛痹濕氣勝者爲著痹也風則陽受之故爲痹行寒則陰受之故爲痹痛濕則皮肉筋脉受之故爲痹著而不去也故乃痹從風寒濕之所生也帝曰其有五者何也言風寒濕氣各異則三痹生有五何氣之勝也岐伯曰以冬遇此者爲骨痹以春遇此者爲筋痹以夏遇此者爲脉痹以至陰遇此者爲肌痹以秋遇此者爲皮痹冬主骨春主筋夏王脉秋主皮至陰主肌肉故各爲其痹也至陰謂戊己月及土寄三月也帝曰内舍五藏六府何氣使然言皮肉筋骨脉痹以五時之外遇然内居藏府何以致之岐伯曰五藏皆有合病乆而不去者内舍於其合也肝合筋心合脉脾合肉肺合皮腎合骨乆病不去則入於是故骨瘦不已復感於邪内舍於腎筋痹不已復感於邪内舍於肝脉痹不已復感於邪内舍於心肌痹不已復感於邪内舍於脾皮痹不已復感於邪内舍於肺所謂痹者各以其時重感於風寒濕之氣也時謂氣王之月也肝王春心王夏肺王秋腎王冬脾王四季之月感謂感應也凡痹之客五藏者肺痹者煩滿喘而嘔以藏氣應息又其脉還循胃口故使煩滿喘而嘔心痹者脉不通煩則心下鼓暴上氣而喘嗌乾善噫厥氣上則恐心合脉受邪則脉不通利也邪氣内擾故煩也手心主心包之脉起於胸中出屬心包下鬲手少陰心脉起於心中出屬心系下鬲絡小腸其支别者從心系上俠咽喉其直者復從心系却上肺故煩則心下鼓滿暴上氣而喘嗌乾也心主爲噫以下鼓滿故噫之以出氣也暴足逆氣上乘於心則恐畏也神懼凌弱故爾肝痹者夜卧則驚多飲數小便上爲引如懷肝王驚駭氣相應故中夜卧則驚也肝之脉循股陰入髦中環陰器抵少腹俠胃屬肝絡膽上貫鬲布脇肋循喉嚨之後上入頏顙故多飲水數小便上引少腹如懷任之狀腎痹者善脹尻以代踵脊以代頭腎者胃之關關不利則胃氣不轉故善脹也尻以代踵謂足攣急也脊以代頭謂身踡屈也踵足跟也腎之脉起於足小指之下斜趣足心出於然骨之下循内踝之後别入跟中以上胻内出膕内廉上股内後廉貫脊屬腎絡膀胱其直行者從腎上貫肝鬲入肺中氣不足而受邪故不伸展新校正云詳然骨一作然穀脾痹者四支懈惰發咳嘔汁上爲大塞土王四季外主四支故四支懈惰又以其脉起於足循腨胻上膝股也然脾脉入腹屬脾絡胃上鬲俠咽故發咳嘔汁脾氣養肺胃復連咽故上爲大塞也腸痹者數飲而出不得中氣喘爭時發餐泄大腸之脉入缺盆絡肺下鬲屬大腸小腸之脉又入缺盆絡心循咽下鬲抵胃屬小腸今小腸有邪則脉不下鬲脉不下鬲則腸不行化而胃氣蓄熱故多飲水而不得下出也腸胃中陽氣與邪氣奔喘交爭得時通利以腸氣不化故時或得通則爲餐泄胞痹者少腹膀胱按之内痛若沃以湯濇於小便上爲清涕膀胱爲津液之府胞内居之少腹處關元之中内藏胞器然膀胱之脉起於目内眦上額交巅上入絡腦出别下項循肩髆内俠脊抵腰中入循膂絡腎屬膀胱其支别者從腰中下貫臀入膕中今胞受風寒濕氣則膀胱太陽之脉不得下流於足故少腹膀胱按之内痛若沃以湯澀於小便也小便既澀太陽之脉不得下行故上爍其腦而爲清涕出於鼻竅矣沃猶灌也新校正云按全元起本内痛二字作兩髀陰氣者靜則神藏躁則消亡陰謂五神藏也所以說神藏與消亡者言人安靜不涉邪氣則神氣寧以内藏人躁動觸冒邪氣則神被害而離散藏無所守故曰消亡此言五藏受邪之爲痹也飲食自倍腸胃乃傷藏以躁動致傷府以飲食見損皆謂過用越性則受其邪此言六府受邪之爲痹也淫氣喘息痹聚在肺淫氣憂思痹聚在心淫氣遺溺痹聚在腎淫氣乏竭痹聚在肝淫氣肌絶痹聚在脾淫氣謂氣之妄行者各隨藏之所主而入爲痹也新校正云詳從上凡痹之客五藏者至此全元起本在陰陽别論中此王氏之所移也諸痹不已亦益内也從外不去則益深至於身内其風氣勝者其人易已也帝曰痹其時有死者或疼乆者或易已者其故何也岐伯曰其入藏者死其留連筋骨間者疼乆其留皮膚間者易已入藏者死以神去也筋骨疼乆以其定也皮膚易已以浮淺也由斯深淺故有是不同帝曰其客於六府者何也岐伯曰此亦其食飲居處爲其病本也四方雖土地温凉高下不同物性剛柔食居不異但動過其分則六府致傷陰陽應象大論曰水穀之寒熱感則害六府新校正云按傷寒論曰物性剛柔餐居亦異六府亦各有俞風寒濕氣中其俞而食飲應之循俞而入各舍其府也六府俞亦謂背俞也膽俞在十椎之傍胃俞在十二椎之傍三焦俞在十三椎之傍大腸俞在十六椎之傍小腸俞在十八椎之傍膀胱俞在十九椎之傍隨形分長短而取之如是各去脊同身寸之一寸五分并足太陽脉氣之所發也新校正云詳六府俞并在本椎下兩傍此注言在椎之傍者文畧也帝曰以針治之奈何岐伯曰五藏有俞六府有合循脉之分各有所發各隨其過新校正云按甲乙經隨作治則病瘳也肝之俞曰太衝心之俞曰太陵脾之俞曰太白肺之俞曰太淵腎之俞曰太谿皆經脉之所注也太衝在足大指間本節後二寸陷者中新校正云按刺腰痛注云太衝在足大指本節後内間二寸陷者中動脉應手刺可入同身寸之三分留十呼若灸者可灸三壯太陵在手掌後骨兩筋間陷者中刺可入同身寸之六分留七呼若灸者可灸三壯太白在足内側核骨下陷者中刺可入同身寸之三分留七呼若灸者可灸三壯太淵在手掌後陷者中刺可入同身寸之二分留二呼若灸者可灸三壯太谿在足内踝後跟骨上動脉陷者中刺可入同身寸之三分留七呼若灸者可灸三壯胃合入於三里膽合入於陽陵泉大腸合入於曲池小腸合入於小海三焦合入於委陽膀胱合入於委中三里在膝下三寸隨外廉兩筋間刺可入同身寸之一寸留十呼若灸者可灸三壯陽陵泉在膝下一寸胻外廉陷者中刺可入同身寸之六分留十呼若灸者可灸三壯小海在肘内大骨外去肘端五分陷者中屈肘乃得之刺可入同身寸之二分留七呼若灸者可灸五壯曲池在肘外輔屈肘曲骨之中刺可入同身寸之五分留七呼若灸者可灸三壯委陽在足膕中外廉兩筋間刺可入同身寸之七分留五呼若灸者可灸三壯屈伸而取之委中在膕中央約文中動脉刺可入同身寸之五分留七呼若灸者可灸三壯新校正云按刺埶注委中在足膝後屈處餘并同此故經言循脉之分各有所發各隨其過則病瘳也過謂脉所經過處新校正云詳王氏以委陽爲三焦合按甲乙經云委陽三焦下輔俞也足太陽之别絡三焦之合自在手少陽經天井穴爲少陽脉之所入爲合詳此六府之合俱引本經所入之穴獨三焦不引本經所入之穴者王氏之誤也王氏但見甲乙經云三焦合於委陽彼說自異彼又以大腸合於巨虚上廉小腸合於下廉此以曲池小海易之故知當以天井穴爲合也帝曰榮衛之氣亦令人痹乎岐伯曰榮者水穀之精氣也和調於五藏灑陳於六府乃能入於脉也正理論曰穀入於胃脉道乃行水入於經其血乃成又靈樞經曰榮氣之道内穀爲實新校正云按别本實作寳穀入於胃氣傳與肺精專者上行經隧由此故水穀精氣合榮氣運行而入於脉也故循脉上下貫五藏絡六府也榮行脉内故無所不至衛者水穀之悍氣也其氣慓疾滑利不能入於脉也悍氣謂浮盛之氣也以其浮盛之氣故慓疾滑利不能入於脉中也故循皮膚之中分肉之間熏於肓膜散於胸腹皮膚之中分肉之間謂脉外也肓膜謂五藏之間鬲中膜也以其浮盛故能布散於胷腹之中空虚之處熏其肓膜令氣宣通也肓音荒逆其氣則病從其氣則愈不與風寒濕氣合故不爲痹帝曰善痹或痛或不痛或不仁或寒或熱或燥或濕其故何也岐伯曰痛者寒氣多也有寒故痛也風寒濕氣客於肉分之間迫切而爲沫得寒則聚聚則排分肉肉裂則痛故有寒則痛也其不痛不仁者病乆入深榮衛之行濇經絡時疏故不通新校正云按甲乙經不通作不痛詳甲乙經此條論不痛與不仁兩事後言不痛是載眀不痛之爲重也皮膚不營故爲不仁不仁者皮頏不知有無也其寒者陽氣少陰氣多與病相益故寒也病本生於風寒濕氣故陰氣益之也其熱者陽氣多陰氣少病氣勝陽遭陰故爲痹熱遭遇也言遇於陰氣陰氣不勝故爲熱新校正云按甲乙經遭作乘其多汗而濡者此其逢濕甚也陽氣少陰氣盛兩氣相感故汗出而濡也中表相應則相感也帝曰夫痹之爲病不痛何也岐伯曰痹在於骨則重在於脉則血凝而不流在於筋則屈不伸在於肉則不仁在皮則寒故具此五者則不痛也凡痹之類逢寒則蟲逢熱則縱帝曰善蟲謂皮中如蟲行縱謂縱緩不相就新校正云按甲乙經蟲作急痿論篇黄帝問曰五藏使人痿何也痿謂痿弱無力以運動岐伯對曰肺主身之皮毛心主身之血脉肝主身之筋膜新校正云按全元起本云膜者人皮下肉上筋膜也脾主身之肌肉腎主身之骨髓所主不同痿生亦各歸其所主故肺熱葉焦則皮毛虚弱急薄著則生痿躄也躄謂攣躄足不得伸以行也肺熱則腎受熱氣故爾躄必亦切心氣熱則下脉厥而上上則下脉虚虚則生脉痿樞折挈脛縱而不任地也心熱盛則火獨光火獨光則内炎上腎之脉常下行今火盛而上炎用事故腎脉亦隨火炎爍而逆上行也陰氣厥逆火復内燔陰上隔陽下不守位心氣通脉故生脉痿腎氣主足故膝腕樞紐如折去而不相提挈脛筋縱緩而不能任用於地也肝氣熱則膽泄口苦筋膜乾筋膜乾則筋急而攣發爲筋痿膽約肝葉而汁味至苦故肝熱則膽液滲泄膽病則口苦今膽液滲泄故口苦也肝主筋膜故熱則筋膜乾而攣急發爲筋痿也八十一難經曰膽在肝短葉間下脾氣熱則胃乾而渴肌肉不仁發爲肉痿脾與胃以膜相連脾氣熱則胃液滲泄故乾而渴也脾主肌肉今熱薄於内故肌肉不仁而發爲肉痿腎氣熱則腰脊不舉骨枯而髓减發爲骨痿腰爲腎府又腎脉上股内貫脊屬腎故腎氣熱則腰脊不舉也腎主骨髓故熱熱則骨枯而髓减發則爲骨痿也帝曰何以得之岐伯曰肺者藏之長也爲心之蓋也位高而布葉於胸中是故爲藏之長心之蓋有所失亡所求不得則發肺鳴鳴則肺熱葉焦志若不揚氣鬱故也肺藏氣氣鬱不利故喘息有聲而肺熱葉焦也故曰五藏因肺熱葉焦發爲痿躄此之謂也肺者所以行榮衛治陰陽故引曰五藏因肺熱而發爲痿躄也悲哀太甚則胞絡絶胞絡絶則陽氣内動發則心下崩數溲血也悲則心系急肺布葉舉而上焦不通榮衛不散熱氣在中故胞絡絶而陽氣内鼓動發則心下崩數溲血也心下崩謂心包内崩而下血也溲謂溺也新校正云按楊上善云胞絡者心上胞絡之脉也詳經注中胞字俱當作胞全本胞又作肌也故本病曰大經空虚發爲肌痹傳爲脉痿本病古經論篇名也大經謂大經脉也以心崩溲血故大經空虚脉空則熱内薄衛氣盛榮氣微故發爲肌痹也先見肌痹後漸脉痿故曰傳爲脉痿也思想無窮所願不得意淫於外入房太甚宗筋弛縱發爲筋痿及爲白淫思想所願爲祈欲也施寫勞損故爲筋痿及白淫也白淫謂白物淫衍如精之狀男子溺便而下女子陰器中綿綿而下也故下經曰筋痿者生於肝使内也下經上古之經名也使内謂勞役陰力費竭精氣也有漸於濕以水爲事苦有所留居處相濕肌肉濡漬痹而不仁發爲肉痿業惟近濕居處澤下皆水爲事也平者久而猶殆感之者尤甚矣肉屬於脾脾氣惡濕濕著肌肉則衛氣不榮故爲肉痿也故下經曰肉痿者得之濕地也陰陽應象大論曰地之濕氣感則害皮肉筋脉此之謂害肉也有所遠行勞倦逢大熱而渴渴則陽氣内伐内伐則熱舍於腎腎者水藏也今水不勝火則骨枯而髓虚故足不任身發爲骨痿陽氣内伐謂伐腹中之陰氣也水不勝火以熱舍於腎中也故下經曰骨痿者生於大熱也腎性惡燥熱反居中熱薄骨乾故骨痿無力也帝曰何以别之岐伯曰肺熱者色白而毛敗心熱者色赤而絡脉溢肝熱者色蒼而爪枯脾熱者色黄而肉蠕動腎熱者色黑而齒槁各求藏色及所主養而命之則其應也帝曰如夫子言可矣論言治痿者獨取陽明何也岐伯曰陽明者五藏六府之海陽明胃脉也胃爲水穀之海主潤宗筋宗筋主束骨而利機關也宗筋謂陰髦中横骨上下之堅筋也上絡胸腹下貫髖尻又經於背腹上頭項故云宗筋主束骨而利機關也然腰者身之大關節所以司屈伸故曰機關髖音寬尻枯熬切衝脉者經脉之海也靈樞經曰衝脉者十二經之海主滲灌谿谷與陽明合於宗筋尋此則横骨上下齊兩傍竪筋正宗筋也衝脉循腹俠齊傍各同身寸之五分而上陽明脉亦俠齊傍各同身寸之一寸五分而上宗筋脉於中故云與陽明合於宗筋也以爲十二經海故主滲灌谿谷也肉之大會爲谷小會爲谿新校正云詳宗筋脉於中一作宗筋總於中陰陽總宗筋之會會於氣街而陽明爲之長皆屬於帶脉而絡於督脉宗筋聚會會於横骨之中從上而下故云陰陽總宗筋之會總宗筋俠齊下合於横骨陽明輔其外衝脉居其中故云會於氣街而陽明爲之長也氣街則陰髦兩傍脉動處也帶脉者起於季脇回身一周而絡於督脉也督脉者起於關元上下循腹故云皆屬於帶脉而絡於督脉也督脉任脉衝脉三脉者同起而異行故經文或參差而引之故陽明虚則宗筋縱帶脉不引故足痿不用也陽明之脉從缺盆下乳内廉下俠齊至氣街中其支别者起胃下口循腹裏下至氣街中而合以下髀抵伏菟下入膝髕中下循胻外廉下足跗入中指内間其支别者下膝三寸而别以下入中指外間故陽明虚則宗筋縱緩帶脉不引而足痿弱不可用也引謂牽引髕音牝帝曰治之奈何岐伯曰各補其滎而通其俞調其虚實和其逆順筋脉骨肉各以其時受月則病已矣帝曰善時受月謂受氣時月也如肝王甲乙心王丙丁脾王戊己肺王庚辛腎王壬癸皆王氣法也時受月則正謂五常受氣月也黄帝内經素問補註釋文卷之二十六

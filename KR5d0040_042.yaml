front:
  text: 黃帝內經素問補注釋文卷之四十二今七
  hash: sha256:e688b63e24e330bfac63da3dba9ae8d716370fc527e7fb2b5aad7454fcb681ea
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_042-001a, image: hfl/0657/0657-133.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤五常政大論篇新校正云詳此篇統論五運有平氣不及太過之事次言地理有四方高下陰陽之異又言歲有不病而藏氣不應為天氣制之而氣有所從之說仍言六氣五類相制勝而歲有胎孕不育之理而後明在氣六化五味有薄厚之異而以治法終之此篇之大概如此而專名五常政大論者舉其所先者言也黃帝問曰太虛寥廓五運回薄衰盛不同損益相從願聞平氣何如而名何如而紀也岐伯對曰昭乎哉問也木曰敷和敷布和氣物以生榮火曰升明火氣高明土曰備化廣被化氣損於群品金曰審平金氣清審平而定水曰靜順水體清靜順於物也帝曰其不及奈何岐伯曰木曰委和陽和之氣委屈而少用也火曰伏眀明曜之氣屈伏不伸土曰卑監土雖卑少尤監萬物之生化也金曰從革從順革易堅成萬物水曰涸流水少故流注乾涸帝曰太過何謂岐伯曰木曰發生宣發生氣萬物以榮火曰赫曦盛明也土曰敦阜敦厚也阜高也土餘故高而厚金曰堅成氣爽風徑堅成庶物水曰流衍衍泮衍也溢也帝曰三氣之紀願聞其候岐伯曰悉乎哉問也新校正云詳此論與五運行大論及陰陽應象大論金匱真言論相通敷和之紀木德周行陽舒陰布五化宣平自當其位不與物爭故五氣之化各布政令於四方無相干犯新校正云按王注太過不及各紀年辰此平木運注不紀年辰者平氣之歲不可以定紀也或者欲補注云謂丁巳丁亥丁卯壬寅壬申歲者是未達也其氣端端直也麗也其性隨順於物化其用曲直曲直材幹皆應用也其化生榮木化宣行則物生榮而美其類草木木體堅高草形卑下然各有堅脆剛柔蔓結條屈者其政發散春氣發散物禀以生木之化也其候溫和和春之氣也其令風木之令行以和風其藏肝五藏之氣與肝同肝其畏清清金令也木性暄故畏清五運行大論曰木其性暄又曰燥勝風其主目陽升明見目與同也其穀麻色蒼也新校正云按金匱真言論云其穀麥與此不同其果李味酸也其實核中有堅核者其應春四時之中春化同其蟲毛木化宣行則毛蟲生其畜犬如草木之生無所避也新校正云按金匱真言論篇云其畜雞其色蒼木化宣行則物浮蒼翠也其養筋酸入筋其病裏急支滿木氣所生新校正云按金匱言論云是以知病之在筋也其味酸木化敷和則物酸味厚其音角調而直也其物中堅象土中之有木也其數八成數也升明之紀正陽而治德施周普五化均衡均等也衡平也其氣高火炎上其性速火性躁疾其用燔灼灼燒也燔之與灼皆火之用其化蕃茂長氣盛故物大其類火五行之氣與火類同其政明曜德合高眀火之政也其候炎暑氣之至也以是候之其令熱熱至乃令行其藏心心氣應之心其畏寒寒水令也心性暑熱故畏寒五運行大論曰心其性暑又曰寒勝熱其主舌火以燭幽舌申明也其穀麥色赤也新校正云按金匱真言論云其穀黍又藏氣法時論云麥也其果杏味苦也其實絡中有支絡者其應夏四時之氣夏氣同其蟲羽羽火象也火化宣行故羽蟲生其畜馬健决躁速火類同新校正云按金匱真言論云其畜羊其色赤色同又明其養血其病瞤瘛火之性動也新校正云按金匱真言論云是以知病之在脉也瞤如勻切其味苦升明氣化則物苦味純其音徵和而美其物脉中多支脉火之化也其數七成數也備化之紀氣協天休德流四政五化齊修土之德靜分助四方贊成金木水火之政土之氣厚應天休和之氣以生長收藏終而復始故五化齊修其氣平土之生也平而正其性順應順群品悉化成也其用高下世土高下皆應用也其化豐滿豐滿萬物非土化不可也其類土五行之化土類同其政安靜土體厚土德靜故政化亦然其候溽蒸溽濕也蒸熱也其令濕濕化不絶竭則土令延長其藏脾脾氣同脾其畏風風木令也脾性雖四氣兼并然其所主尤畏木也五運行大論云脾其性靜兼又曰風勝濕其主口土體包容口主受納其穀稷色黃也新校正云按金匱真言論作稷藏氣法時論作粳其果棗味甘也其實肉中有肌肉者其應長夏長夏謂長養之夏也六月氣同新校正云按王注藏氣法時論云夏為土母土長於中以長而治故云長夏又注六節藏象論云所謂長夏者六月也土生於火長在夏中既長而王故云長夏其蟲倮無毛羽鱗甲土形同其畜牛成彼稼穡土之用也牛之應用其緩而和其色黃土同也其養肉所養者厚而靜其病否土性擁礙新校正云按金匱真言論云病在舌本是以知病之在肉也其味甘備化氣豐則物味甘厚其音宫大而重其物膚物禀備化之氣則多肌肉其數五生數也正土不虛加故也審平之紀收而不爭殺而無犯五化宣明犯謂刑犯於物也收而不爭殺而無犯匪審平之德何以能為是哉其氣潔金氣以潔白瑩明為事其性剛性剛故摧缺於物其用散落金用則萬物散落其化堅斂收斂堅强金之化也其類金審平之化金類同其政徑肅化急速而整肅也徑鋭也其候清切清大凉也切急也風聲也其令燥燥乾也其藏肺肺氣之用同金化也肺其畏熱熱火令也肺性凉故畏火熱五運行大論曰肺其性凉其主鼻肺藏氣鼻通息也其穀稻色白也新校正云按金匱真言論作稻藏氣法時論作黃黍其果桃味辛也其實殼外有堅殼者其應秋四時之化秋氣同其蟲介外被堅甲者其畜雞性善鬥傷象金用也新校正云按金匱真言論云其畜馬其色白色同也其養皮毛堅同也其病咳有聲之病金之應也新校正云按金匱真言論云病在背是以知病之在皮毛其味辛審平化治則物辛味正其音商和利而揚其物外堅金化宣行則物體外堅其數九成數也靜順之紀藏而勿害治而善下五化咸整治化也水之性下所以德全江海所以能為百谷王者以其善下之也其氣明清靜明照水氣所生其性下歸流於下其用沃衍用非靜事故沫生而流溢沃沫也衍溢也其化凝堅藏氣布化則水物凝堅其類水靜順之化水同類其政流演井泉不竭河流不息則流演之義也其候凝肅凝寒也肅淨也寒來之氣候其令寒水令宣行則寒司物化其藏腎腎藏之用同水化也腎其畏濕濕土氣也腎性凛故畏土濕五運行大論曰腎其性凛其主二陰流注應同新校正云按金匱真言論曰北方黑色入通於腎開竅於二陰其穀豆色黑也新校正云按金匱真言論及藏氣法時論同其果栗味鹹也其實濡中有津液也其應冬四時之化冬氣同其蟲鱗鱗水化生其畜彘善下也彘豕也其色黑色同也其養骨髓氣入也其病厥厥氣逆也凌上也倒行不順也新校正云按金匱真言論云病在溪是以知病之在骨也其味鹹味同也其音羽深而和其物濡水化豐洽庶物濡潤其數六成數也故生而勿殺長而勿罰化而勿制收而勿害藏而勿抑是謂平氣生氣主歲收氣不能縱其殺長氣主歲藏氣不能縱其罰化氣主歲生氣不能縱其制收氣主歲長氣不能縱其害藏氣主歲化氣不能縱其抑夫如是者皆天氣平地氣正五化之氣不以勝剋為用故謂曰平和氣也委和之紀是謂勝生丁卯丁丑丁亥丁未丁酉丁巳之歲生氣不政化氣乃揚木少故生氣不政土寬故化氣乃揚長氣自平收令乃早火無忤犯故長氣自平木氣既少故收令乃早凉雨時降風雲並興凉金化也雨濕氣也風木化也雲濕氣也草木晚榮蒼乾凋落金氣有餘木不能勝故也新校正云詳委和之紀木不及而金氣乘之故蒼乾凋落非金氣有餘木不能勝也蓋木不足而金勝之也物秀而實膚肉內充歲生雖晚成者滿實土化氣速故如是其氣斂收斂兼金氣故其用聚不布散也其動緛戾拘緩緛縮短也戾了戾也拘拘急也緩不收也其發驚駭木屈卒伸驚駭象也其藏肝內應肝其果棗李棗土李木實也新校正云詳李木實也按火土金水不及之果李當作桃王注亦非其實核殼核木殼金主其穀稷稻金土穀也其味酸辛味酸之物熟兼辛也其色白蒼蒼色之物熟兼白也其畜犬雞木從金畜其蟲毛介毛從介其主霧露凄滄金之化也其聲角商角從商其病搖動注恐木受邪也從金化也木不自政故化從金少角與判商同少角木不及故半與商金化同判半也新校正云按火土金水之文判作少則此當云少角與少商同不云少商者蓋少角之運共有六年而丁巳丁亥上角與正角同丁卯丁酉上商與正商同丁未丁丑上宫與正宫同是六年者各有所同與火土金水之少運不同故不云同少商只大約而言半從商化也上角與正角同上見厥陰與敷和歲化同謂丁亥丁巳歲上之所見者也上商與正商同上見陽明則與平金歲化同丁卯丁酉歲上見陽明其病支發癰腫瘡瘍金刑木也其甘蟲子在母中邪傷肝也雖化悉與金同然其所傷則歸於肝木也上宫與正宫同土蓋其木與未出等也木未出土與無木同土自用事故與正土運歲化同也上見太陰是謂上宫丁丑丁未歲上見太陰司天之化也蕭飋肅殺則炎赫沸騰簫飋肅殺金無德也炎赫沸騰火之復也飋音瑟眚於三火為木復故其眚在東三東方也此言金之物勝也新校正云按六元正紀大論云灾三宫所謂復也復報復也其主飛蠹蛆雉飛羽蟲也蠹內生蟲也蛆蠅之生者此則物內自化爾雉鳥耗也乃為雷霆雷謂大聲生於太虛雲暝之中也霆謂迅雷卒如火之爆者即霹靂也伏明之紀是謂勝長藏氣勝長也謂癸酉癸未癸巳癸卯癸丑癸亥之歲也長氣不宣藏氣反布火之長氣不能施化故水之藏氣反布於時收氣自政化令乃衡金土之義與歲氣素無干犯故金自行其政土自平其氣寒清數舉暑令乃薄火氣不用故承化物生生而不長火令不政故承化生之物皆不長也成實而稚遇化已老物實成熟苗尚稚短及遇化氣未長極而氣已老矣陽氣屈伏蟄蟲早藏陽不用而陰勝也若上臨癸卯癸酉歲則蟄反不藏新校正云詳癸巳癸亥之歲蟄亦不藏其氣鬱鬱燠不舒暢其用暴速也其動彰伏變易彰明也伏隱也變易謂不常其象見也其發痛痛由心所生其藏心歲運之氣通於心其果栗桃栗水桃金果也其實絡濡絡支脉也濡有汁也其穀豆稻豆水稻金穀也其味苦鹹苦兼鹹也其色玄丹色丹之物熟兼玄也其畜馬彘火從水畜其蟲羽鱗羽從鱗其主氷雪霜寒水之氣也其聲徵羽徵從羽其病昏惑悲忘火之躁動不拘常律陰冒陽火故昏惑不治心氣不足故喜悲善忘也從水化也火弱水强故伏明之紀半從水之政化少徵與少羽同火少故半從水化新校正云詳少徵運六年內癸酉癸卯同正商癸巳癸亥同歲會外癸未癸丑二年少徵與少羽同故不云判羽也上商與正商同歲上見陽明則與平金歲化同也癸卯及癸酉歲上見陽明新校正云詳此不言上宫上角者蓋宫角於火無大剋伐故經不備言之邪傷心也受病者心凝慘凛冽則暴雨霖霪凝慘凛冽水無德也暴雨霖霪土之復也眚於七七南方也新校正云按六元正紀大論云灾七宫其主驟注雷霆震驚天地氣爭而生是變氣交之內害及粢盛及傷鱗類沉霒淫雨沈霒淫雨濕變所生也霒音陰又音今卑監之紀是謂減化謂化氣減少己巳己卯己丑己亥己酉己未之歲也化氣不令生政獨彰土少而木專其用長氣整雨乃愆收氣平不相干犯則平整化氣減故雨愆期風寒并興草木榮美風木也寒水也土少故寒氣得行生氣獨彰故草木敷榮而端美秀而不實成而秕也榮秀而美氣生於木化氣不滿故物實中空是以秕惡其氣散氣不安靜木且疏之從木之風故施散也其用靜定雖不能專政於時物然或舉用則終歸土德而靜定其動瘍涌分潰癰腫瘍瘡也涌嘔吐也分裂也潰爛也癰腫膿瘡也其發濡滯土性也濡濕也其藏脾主藏病其果李栗李木栗水果也其實濡核濡中有汁者核中堅者新校正云詳前後濡實主水此濡字當作肉王注亦非其穀豆麻豆水麻木穀也其味酸甘甘味之物熟兼酸也其色蒼黃色黃之物外兼蒼也其畜牛犬土從木畜其蟲倮毛倮從毛其主飄怒振發木之氣用也其聲宫角宫從角其病留滿否塞土氣擁礙故從木化也不勝故從他化少宫與少角同土少故半從木化也新校正云詳少宫之運六年內除己丑己未與正宫同己巳己亥與正角同外有己卯己酉二年少宫與少角同故不云判角也上宫與正宫同上見太陰則與平土運生化同也己丑己未其歲見也上角與正角同上見厥陰則悉是敷和之紀也己亥己巳其歲見也其病飱泄風之勝也邪傷脾也縱諸氣金病即自傷脾新校正云詳此不言上商者土與金無相剋伐故經不紀之也又注云縱諸氣金病即自傷脾也金字疑誤振拉飄揚則蒼乾散落振拉飄揚木無德也蒼乾散落金之復也其眚四維東南西南西北東北土之位也新校正云按六元正紀大論云災五宫其主敗折虎狼虎狼猴豺豹鹿馬獐麂諸四足之獸害於粢盛及生命也麂音几清氣乃用生政乃辱金氣行則木氣屈從革之紀是謂折收火折金收之氣也謂乙丑乙亥乙酉乙未乙巳乙卯之歲也收氣乃後生氣乃揚後不及時也收氣不能以時而行則生氣自應布揚而用之也長化合德火政乃宣庶類以蕃火土之氣同生化也宣行也其氣揚順火也其用躁切少雖後用用則切急隨火躁也其動鏗禁瞀厥鏗咳聲也禁謂二陰禁止也瞀悶也厥謂氣上逆也瞀音冒其發咳喘咳金之有聲喘肺藏氣也其藏肺主藏病其果李杏李木杏火果也其實殼絡外有殼內有支絡之實也其穀麻麥麻木麥火穀也麥色赤也其味苦辛苦味勝辛辛兼苦也其色白丹赤加白也其畜雞羊金從火土之兼化也新校正云詳火畜馬土畜牛今言羊故王注云從火土之兼化為羊也或者當去注中之土字甚非其蟲介羽介從羽其主明曜炎爍火之勝也其聲商徵商從徵其病嚏咳鼽衄金之病也從火化也火氣來勝故屈己以從之少商與少徵同金少故半同火化也新校正云詳少商運六年內除乙卯乙酉同正商乙巳乙亥同正角外乙丑乙未二年為少商同少徵故不云判徵也上商與正商同上見陽明則與平金運生化同乙卯乙酉其歲上見也上角與正角同上見厥陰則與平木運生化同乙巳乙亥其歲上見也新校正云詳金土無相勝剋故經不言上宫與正宫同也邪傷肺也有邪之勝則歸肺炎光赫烈則氷雪霜雹炎光赫烈火無德也冰雪霜雹水之復也水復之作雹形如半珠新校正云詳注云雹形如半珠半字疑誤眚於九九西方也新校正云按六元正紀大論云災九宫其主鱗伏彘鼠突戾潜伏歲主縱之以傷赤實及羽類也歲氣早至乃生大寒水之化也涸流之紀是謂反陽陰氣不及反為陽氣代之謂辛未辛巳辛卯辛酉辛亥辛丑之歲也藏令不舉化氣乃昌少水而土盛長氣宣布蟄蟲不藏太陽在泉經文背也厥陰陽明司天乃如經謂也土潤水泉減草木條茂榮秀滿盛長化之氣豐而厚也其氣滯從土也其用滲泄不能流也其動堅止謂便寫也水少不濡則乾而堅止歲氣不能固則注下而奔速其發燥槁陰少而陽盛故爾其藏腎主藏病也其果棗杏棗土杏火果也其實濡肉濡水肉土化也其穀黍稷黍火稷土穀也新校正云按本論上文麥為火之穀今言黍者疑麥字誤為黍也雖金匱真言論作黍然本論作麥當從本論之文也其味甘鹹甘入於鹹味甘美也其色黅玄黃加黑也其畜彘牛水從土畜其蟲鱗倮鱗從倮其主埃鬱昏翳土之勝也其聲羽宫羽從宫其病痿厥堅下水土參并故如是從土化也不勝於土故從他化少羽與少宫同水土各半化也新校正云詳少羽之運六年內除辛丑辛未與正宫同外辛卯辛酉辛巳辛亥四歲為同少宫故不言判宫也上宫與正宫同上見太陰則與平土運生化同辛丑辛未歲上見之新校正云詳此不言上角上商者蓋水於金木無相剋伐故也其病癃閟癃小便不通閟大便乾澀不利也邪傷腎也邪勝則歸腎埃昏驟雨則振拉摧拔埃昏驟雨土之虐也振拉摧拔木之復也眚於一一北方也諸謂方者國郡州縣境之方也新校正云按六元正紀大論云災一宫其主毛顯狐貉變化不藏毛顯謂毛蟲麋麂獐鹿貒兔虎狼顯見傷於黃實兼害倮蟲之長也變化謂為魅狐狸當之不藏謂害粢盛鼠貒兔狸貉當之所謂毛顯不藏也貒他端切故乘危而行不速而至暴虐無德灾反及之微者復徵甚者復甚氣之常也通言五行氣少而有勝復之大凡也乘彼孤危恃乎强盛不召而往專肆威刑怨禍自招又誰咎也假令木弱金氣來乘暴虐倉卒是無德也木被金害火必讎之金受火燔則灾及也夫如是者刑甚則復甚刑微則復微氣動之常固其宜也五行之理咸迭然乎新校正云按五運不及之詳具氣交變大論中發生之紀是謂啓物乘木氣以發生而啓其容質也是謂壬申壬寅壬子壬午壬辰壬戌之六歲化也古陳字土踈泄蒼氣達生氣上發故土體疏泄木之專政故蒼氣上達達通也出也行也陽和布化陰氣乃隨少陽先生發於萬物之表厥陰次隨營運於萬象之中也生氣淳化萬物以榮歲木有餘金不來勝生令布化故物以舒榮其化生其氣美木化宣行則物容端美其政散布散生榮無所不至其令條舒條直也理也舒啓也端直舒啓萬物隨之發生之化無非順理者也其動掉眩巔疾掉搖動也眩旋轉也巔上首也疾病氣也新校正云詳王不解其動之義按後敦阜之紀其動濡積并蓄王注云動謂變動又堅成之紀其動暴折瘍疰王注云動以生病蓋謂氣既變動因動以生病也則木火土金水之動義皆同也又按王注脉要精微論云巔疾上巔疾也又注奇病論云巔謂上巔則頭首也此注云上也疾病氣也氣字為衍也其德鳴靡啓拆風氣所生新校正云按六元正紀大論云其化鳴紊啓拆其變振拉摧拔振謂振怒拉謂中折摧謂仆落拔謂出本新校正云按六元正紀大論同其穀麻稻木化齊金其畜雞犬齊雞孕也其果李桃李齊桃實也其色青黃白青加於黃白自正也其味酸甘辛酸入於甘辛齊化也其象春如春之氣布散陽和其經足厥陰少陽厥陰肝脉少陽膽脉其藏肝脾肝勝脾其蟲毛介木餘故毛齊介育其物中堅外堅中堅有核之物齊等於皮殼之類也其病怒木餘故大角與上商同大過之木氣與金化齊等新校正云按大過五運獨太角言與上商同餘四運并不言者疑此文為衍上徵則其氣逆其病吐利上見少陰少陽則其氣逆行壬子壬午歲上見少陰壬寅壬申歲上見少陽木餘遇火故氣不順新校正云按五運行大論云氣相得而病者以下臨上不當位也不云上羽者水臨木為相得故也不務其德則收氣復秋氣徑切甚則肅殺清氣大至草木凋零邪乃傷肝恃已太過凌犯於土土氣屯極金為復讎金行殺令故邪傷肝木也赫曦之紀是謂蕃茂物過太陽則蕃而茂是謂戊辰戊寅戊子戊戌戊申戊午之歲也新校正云按或云注中太陽當作太徵詳木土金水之大過注俱不言角宫商羽等運而水太過注云陰氣大行此火太過是物遇太陽也安得謂之太徵乎陰氣內化陽氣外榮陰陽之氣得其序也炎暑施化物得以昌長氣多故爾其化長其氣高長化行則物容大高氣達則物色明其政動革易其象不常也其令鳴顯火之用而有聲火之燔而有焰象無所隱則其信也顯露也其動炎灼妄擾妄謬也擾撓也其德暄暑鬱蒸熱化所生長於物也新校正云按六元正紀大論云其化暄囂鬱燠又作暄曜其變炎烈沸騰勝復之有極於是也其穀麥豆火齊水化也其畜羊彘齊孕育也新校正云按本論上文馬為火之畜今言羊者疑馬字誤為羊金匱真言論及藏氣法時論俱作羊然本論作馬當從本論之文也其果杏栗等實也其色赤白玄赤色加白黑自正也其味苦辛鹹辛物兼苦與鹹化齊成也其象夏如夏氣之熱也其經手少陰太陽少陰心脉太陽小腸脉手厥陰少陽厥陰心包脉少陽三焦脉其藏心肺心勝肺其蟲羽鱗火餘故鱗羽齊化其物脉濡脉火物濡水物水火齊化新校正云詳脉即絡也文雖殊而義同其病笑瘧瘡瘍血流狂妄目赤火盛故上羽與正徵同其收齊其病痓上見太陽則天氣且制故太過之火反與平火運生化同也戊辰戊戌歲上見之若平火運同則五常之氣無相凌犯故金收之氣生化同等上徵而收氣後也上見少陰少陽則其生化自政金氣不能與之齊化戊子戊午歲上見少陰戊寅戊申歲上見少陽火盛故收氣後化新校正云按氣交變大論云歲火太過上臨少陰少陽火燔焫水泉涸物焦槁暴烈其政藏氣乃復時見凝慘甚則雨水霜雹切寒邪傷心也不務其德輕侮致之也新校正云按氣交變大論云雨冰霜寒與此互文也敦阜之紀是謂廣化土餘故化氣廣被於物也是謂甲子甲戌甲申甲午甲辰甲寅之歲也厚德清靜順長以盈土性順用無與物爭故德厚而不躁順火之長育使萬物化氣盈滿也至陰內實物化充成至陰土精氣也夫萬物所以化成者皆以至陰之靈氣生化於中也烟埃朦鬱見於厚土厚土山也烟埃土氣也大雨時行濕氣乃用燥政乃辟濕氣用則燥政辟自然之理爾其化圓其氣豐化氣豐圓以其清靜故也其政靜靜而能久故政常存其令周備氣緩故周備其動濡積并蓄動謂變動其德柔潤重淖靜而柔潤故厚德常存新校正云按六元正紀大論云其化柔潤重澤其變震驚飄驟崩潰震驚雷霆之作也飄驟暴風雨至也大雨暴注則山崩土潰隨水流沒其穀稷麻土木齊化其畜牛犬齊孕育也其果棗李土齊木化其色黅玄蒼黃色加黑蒼自正也其味甘鹹酸甘入於鹹酸齊化也其象長夏六月之氣生化同其經足太隂陽明太隂脾脉陽明胃脉其藏脾腎脾勝腎其蟲倮毛土餘故毛倮齊化其物肌核肌土核木化也其病腹滿四支不舉土性靜故病如是新校正云詳此不云上羽上徵者徵羽不能虧盈於土故無他候也大風迅至邪傷脾也木盛怒故土脾傷堅成之紀是謂收引引斂也陽氣收陰氣用故萬物收斂謂庚午庚辰庚寅庚子庚戌庚申之歲也天氣潔地氣明秋氣高潔金氣同陽氣隨隂治化陽順隂而生化燥行其政物以司成燥氣行化萬物專司其成孰無遺略也收氣繁布化洽不終收殺氣早土之化不得終其用也新校正云詳繁字疑誤其化成其氣削減削也其政肅肅清也靜也其令鋭切氣用不屈徑而急其動暴折瘍疰動以生病其德霧露蕭飋燥之化也簫飋風聲也靜為霧露用則風生新校正云按六元正紀大論云德作化其變肅殺凋零隕墜於物其穀稻黍金火齊化也新校正云按本論上文麥為火之穀當言其穀稻麥其畜雞馬齊孕育也其果桃杏金火齊實其色白青丹白加於青丹自正也其味辛酸苦辛入酸苦齊化其象秋氣爽清潔如秋之化其經手太陰陽明太陰肺脉陽明大腸脉其藏肺肝肺勝肝其蟲介羽金餘故介羽齊育其物殼絡殼金絡火化也其病喘喝胸憑仰息金氣餘故上徵與正商同其生齊其病咳上見少隂少陽則天氣且抑故其生化與平金歲同庚子庚午歲上見少隂庚寅庚申歲上見少陽土火制金故生氣與之齊化火乘金肺故病咳新校正云詳此不言上羽者水與金非相勝剋故政暴變則名木不榮柔脆焦首長氣斯救大火流炎爍且至蔓將槁邪傷肺也變謂太甚也政太甚則生氣抑故木不榮草首焦死政暴不已則火氣發怒故火流灸爍至柔條蔓草脆之類皆乾死也火乘金氣故肺氣傷也流衍之紀是謂封藏陰氣大行則天地封藏之化也謂丙寅丙子丙戌丙申丙午丙辰之歲也寒司物化天地嚴凝陰之氣也藏政以布長令不揚藏氣用則長化止故令不發揚其化凛其氣堅寒氣及物則堅定其政謐謐靜也其令流注水之象也其動漂泄沃涌沃沫也涌溢也其德凝慘寒氛寒之化也新校正云按六元正紀大論作其化凝慘栗冽其變冰雪霜雹非時而有其穀豆稷水齊土化其畜彘牛齊孕育也其果栗棗水土齊實其色黑丹黅黑加於丹黃自正也其味鹹苦甘鹹入於苦甘化齊焉其象冬氣序凝肅似冬之化其經足少陰太陽少陰腎脉太陽膀胱脉其藏腎心腎勝心其蟲鱗倮水餘故鱗倮齊育其物濡滿濡水滿土化也新校正云按土不及作肉土太過作肌此作滿互相成也其病脹水餘也上羽而長氣不化也上見太陽則天不能布化以長養也丙辰丙戌之歲上見天符水運也新校正云按氣交變大論云上臨太陽則雨冰雪霜不時降濕氣變物不云上徵者運所勝也政過則化氣大舉而埃昏氣交大雨時降邪傷腎也暴寒數舉是謂政過火被水凌土來仇復故天地昏翳土水氣交大雨斯降而邪傷腎也故曰不恆其德則所勝來復政恆其理則所勝同化此之謂也不恆謂恃已有餘凌犯不勝恆謂守常之化不肆威刑如是則克己之氣歲同治化也新校正云詳五運太過之說具氣交變大論中黃帝內經素問補注釋文卷之四十二

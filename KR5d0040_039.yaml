body:
  text: 唐太僕令啓玄子王氷次註宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤五運行大論篇黄帝坐明堂始正天綱臨觀八極考建五常明堂布政宫也八極八方目極之所也考謂考校建謂建立也五常謂五氣行天地之中者也端居正氣以候天和請天師而問之曰論言天地之動靜神明爲之紀陰陽之升降寒暑彰其兆新校正云詳論謂陰陽應象大論及氣交變大論文彼云陰陽之往復寒暑彰其兆余聞五運之數於夫子夫子之所言正五氣之各主歲耳首甲定運余因論之鬼臾區曰土主甲己金主乙庚水主丙辛木主丁壬火主戊癸子午之上少陰主之丑未之上太陰主之寅申之上少陽主之卯酉之上陽明主之辰戌之上太陽主之巳亥之上厥陰主之不合陰陽其故何也首甲謂六甲之初則甲子年也岐伯曰是明道也此天地之陰陽也上古聖人仰觀天象以正陰陽夫陰陽之道非不昭然而人昩宗元迷其本始則百端疑議從是而生黄帝恐至理眞宗便因誣廢愍念黎庶故啓問曰天師知道出從眞必非謬述故對上曰是眀道也此天地之陰陽也陰陽法曰甲巳合乙庚合丙辛合丁壬合戊癸合蓋取聖人仰觀天象之義不然則十干之位各在一方徵其離合事亦寥闊嗚呼遠哉百姓日用而不知爾故太上立言曰吾言甚易知甚易行天下莫能知莫能行此其類也新校正云詳金主乙庚者乙者庚之柔庚者乙之剛大而言之陰與陽小而言之夫與婦是剛柔之事也餘并如此夫數之可數者人中之陰陽也然所合數之可得者也夫陰陽者數之可十推之可百數之可千推之可萬天地陰陽者不以數推以象之謂也言智識偏淺不見源由雖所指彌遠其知彌近得其元始桴鼓非遥帝曰願聞其所始也岐伯曰昭乎哉問也臣覽太始天元册文丹天之氣經於牛女戊分黅天之氣經於心尾己分蒼天之氣經於危室柳鬼素天之氣經於亢氐昴畢玄天之氣經於張冀婁胃所謂戊己分者奎壁角軫則天地之門户也戊土屬乾己土屬巽遁甲經曰六戊爲天門六己爲地户晨暮占雨以西北東南義取此雨爲土用濕氣生之故此占焉夫候之所始道之所生不可不通也帝曰善論言天地者萬物之上下左右者陰陽之道路未知其所謂也論謂天元紀及陰陽應象論也岐伯曰所謂上下者歲上下見陰陽之所在也左右者諸上見厥陰左少陰右太陽見少陰左太陰右厥陰見太陰左少陽右少陰見少陽左陽明右太陰見陽明左太陽右少陽見太陽左厥陰右陽明所謂面北而命其位言其見也面向北而言之也上南也下北也左西也右東也帝曰何謂下岐伯曰厥陰在上則少陽在下左陽明右太陰少陰在上則陽明在下左太陽右少陽太陰在上則太陽在下左厥陰右陽明少陽在上則厥陰在下左少陰右太陽陽明在上則少陰在下左太陰右厥陰太陽在上則太陰在下左少陽右少陰所謂面南而命其位言其見也主歲者位在南故面北而言其左右在下者位在北故面南而言其左右也上天位也下地位也面南左東也右西也上下異而左右殊也上下相遘寒暑相臨氣相得則和不相得則病木火相臨金水相臨水木相臨火土相臨土金相臨爲相得也木土相臨土水相臨水火相臨火金相臨金木相臨爲不相得也上臨下爲順下臨上爲逆亦鬱抑而病生土臨相火君火之類者也帝曰氣相得而病者何也岐伯曰以下臨上不當位也六位相臨假令土臨火火臨木木臨水水臨金金臨土皆爲以下臨上不當位也父子之義子爲下父爲上以子臨父不亦逆乎帝曰動靜何如言天地之行左右也岐伯曰上者右行下者左行左右周天餘而復會也上天也下地也周天謂天周地五行之位也天垂六氣地布五行天順地而左回地承天而東轉木運之後天氣常餘餘氣不加於君火却退一步加臨相火之上是以每五歲已退一位而右遷故曰左右周天餘而復會會遇也合也言天地之道常五歲畢則以餘氣遷加復與五行座位再相會合而爲歲法也周天謂天周地位非周天之六氣也帝曰余聞鬼臾區曰應地者靜今夫子乃言下者左行不知其所謂也願聞何以生之乎詰異也新校正云按鬼臾區言應地者靜見天元紀大論中岐伯曰天地動靜五行遷復雖鬼臾區其上候而已猶不能遍明不能遍明無求行也夫變化之用天垂象地成形七曜緯虚五行麗地地者所以載生成之形類也虚者所以列應天之精氣也形精之動猶根本之與枝葉也仰觀其象雖遠可知也觀五星之東轉則地體左行之理昭然可知也麗著也有形之物未有不依據物而得全者也帝曰地之爲下否乎言轉不居爲下乎爲否乎岐伯曰地爲人之下太虚之中者也言人之所居可謂下矣徵其至理則是太虚之中一物爾易曰坤厚載物德合無疆此之謂也帝曰馮乎言太虚無礙地體何馮而止住馮扶氷切礙音艾岐伯曰大氣舉之也大氣謂造化之氣任持太虚者也所以太虚不屈地乆天長者蓋由造化之氣任持之也氣化而變不任持之則太虚之器亦敗壞矣夫落葉飛空不疾而下爲其乘氣故勢不得速焉凡之有形處地之上者皆有生化之氣任持之也然器有大小不同壞有遲速之異及至氣不任持則大小之壞一也燥以乾之暑以蒸之風以動之濕以潤之寒以堅之火以温之故風寒在下燥熱在上濕氣在中火游行其間寒暑六入故令虚而化生也地體之中凡有六入一曰燥二曰暑三曰風四曰濕五曰寒六曰火受燥故乾性生焉受暑故蒸性生焉受風故動性生焉受濕故潤性生焉受寒故堅性生焉受火故温性生焉此謂天之六氣也故燥勝則地乾暑勝則地熱風勝則地動濕勝則地泥寒勝則地裂火勝則地固矣六氣之用帝曰天地之氣何以候之岐伯曰天地之氣勝復之作不形於診也言平氣及勝復皆以形證觀察不以診知也脉法曰天地之變無以脉診此之謂也天地以氣不以位故不當以脉知之帝曰間氣何如岐伯曰隨氣所在期於左右於左右尺寸四部分位承之以知應與不應過與不過也帝曰期之奈何岐伯曰從其氣則和違其氣則病謂當沉不沉當浮不浮當濇不濇當鈎不鈎當弦不弦當大不大之類也新校正云按至眞要大論云厥陰之至其脉弦少陰之至其脉鈎太陰之至其脉沉少陽之至大而浮陽明之至短而濇太陽之至大而長至而和則平至而甚則病至而反則病至而不至者病未至而至者病陰陽易者危不當其位者病見於他位也迭移其位者病謂左見右脉右見左脉氣差錯故爾失守其位者危已見於他鄉本宫見賊殺之氣故病危尺寸反者死子午卯酉四歲有之反謂歲當陰在寸脉而反見於尺歲當陽在尺而脉反見於寸尺寸俱乃謂反也若尺獨然或寸獨然是不應氣非反也陰陽交者死寅申亥巳丑未辰戌八年有之交謂歲當陰在右脉反見左歲當陽在左脉反見右左右交見是謂交若左獨然或右獨然是不應氣非交也先立其年以知其氣左右應見然後乃可以言死生之逆順經言歲氣備矣新校正云詳此備六元正紀大論中帝曰寒暑燥濕風火在人合之奈何其於萬物何以生化合謂中外相應生謂承化而生化謂成立衆象也岐伯曰東方生風東者日之初風者教之始天之使也所以發號施令故生自東方也景霽山昏蒼埃際合崖谷若一巖岫之風也黄白昏埃晩空如堵獨見天垂川澤之風也加以黄黑白埃承下山澤之猛風也風生木陽升風鼓草木敷榮故曰風生木也此和氣之生化也若風氣施化則飄揚敷拆其爲變極則木拔草除也運乘丁卯丁丑丁亥丁酉丁未丁巳之歲則風化不足若乘壬申壬午壬辰壬寅壬子壬戌之歲則風化有餘於萬物也新校正云詳王注以丁壬分運之有餘不足或者以丁卯丁亥丁巳壬申壬寅五歲爲天符同天符正歲會非有餘不足爲平木運以王注爲非是不知大統也必欲細分雖除此五歲亦未爲盡下文火土金水運等并同此木生酸萬物味酸者皆始自木氣之生化也酸生肝酸味入胃生養於肝藏肝生筋酸味入肝自肝藏布化生成於筋膜也筋生心酸氣榮養筋膜畢已自筋流化乃入於心其在天爲玄玄謂玄冥也丑之終東方白寅之初天色反黑太虚皆闇在天爲玄象可見新校正云詳在天爲玄至化生氣七句通言六氣五行生化之大法非東方獨有之也而王注玄謂丑之終寅之初天色黑則專言在東方不兼諸方此注未通在人爲道正理之道生養之政化也在地爲化化生化也有生化而後有萬物萬物無非化氣以生成者化生五味金玉土石草木菜果根莖枝葉華殻實核無識之類皆地化生也道生智智正知也慮遠也知正則不疑於事慮遠則不涉於危以道處之理符於智靈樞經曰因慮而處物謂之智玄生神神用無方深微莫測迹見形隱物鮮能期由是則玄冥之中神明棲據隱而不見玄生神明也化生氣飛走蚑行鱗介毛倮羽五類變化内屬神機雖爲五味所該然其生禀則異故又曰化生氣也此上七句通言六氣五行生化之大法非獨東方有之也新校正云按陰陽應象大論及天元紀大論无化生氣一句神在天爲風鳴紊啓拆風之化也振拉摧拔風之用也歲屬厥陰在上則風化於天厥陰在下則風行於地在地爲木長短曲直木之體也幹舉機發木之用也在體爲筋維結束絡筋之體也繻縱卷舒筋之用也在氣爲柔木化宣發風化所行則物體柔耎在臓爲肝肝有二布葉一小葉如木甲拆之象也各有支絡脉游中以宣發陽和之氣䰟之宫也爲將軍之官謀慮出焉乘丁歲則肝藏及經絡先受邪而爲病也膽府同其性爲暄暄温也肝木之性也其德爲和敷布和氣於萬物木之德也新校正云按氣交變大論云其德敷和其用爲動風摇而動無風則萬類皆靜新校正云按木之用爲動火太過之政亦爲動蓋木火之主暴速故俱爲動其色爲蒼有形之類乘木之化則外色皆見薄青之色今東方之地草木之上色皆蒼遇丁歲則蒼物兼白及黄色不純也其化爲榮榮美色也四時之中物見華榮顔色鮮麗者皆木化之所生也新校正云按氣交變大論云其化生榮其蟲毛萬物發生如毛在皮其政爲散發散生氣於萬物新校正云按氣交變大論云其政舒卷詳木之政散平木之政發散木太過之政散土不及之氣散金之用散落木之災散落所以爲散之異有六而散之義惟二一謂發散之散是木之氣也二謂散落之散是金之氣所爲也其令宣發陽和之氣舒而散也其變摧拉摧拔成者也新校正云按氣交變大論云其變振發其眚爲隕隕墜也大風暴起草泯木墜新校正云按氣交變大論云其災散落眚所景切其味爲酸夫物之化之變而有酸味者皆木氣之所成敗也今東方之野生味多酸其志爲怒怒直聲也怒所以威物怒傷肝凡物之用極皆自傷也怒發於肝而反傷肝臓悲勝怒悲發而怒止勝之信也新校正云詳五志悲當爲憂蓋憂傷意悲傷魂故云悲勝怒也風傷肝亦猶風之折木也風生於木而反折之用極而衰新校正云按陰陽應象大論云風傷筋燥勝風風自木生燥爲金化風餘則制之以燥肝盛則治之以凉凉清所行金之氣也酸傷筋酸寫肝氣寫甚則傷其氣靈樞經曰酸走筋筋病无多食酸以此爾走筋謂宣行其氣速疾也氣血肉骨同新校正云詳注云靈樞經云乃是素問宣明五氣篇於文按甲乙經云以此爲素問王注云靈樞經者誤辛勝酸辛金味故勝木之酸酸餘故勝之以辛也南方生熱陽盛所生相火君火之政也太虚昏翳其若輕塵山川悉然熱之氣也大明不彰其色如丹鬱熱之氣也若彤雲暴升縱然葉積乍盈乍縮崖谷之熱也熱生火熱甚之氣火運盛明故曰熱生火火者盛陽之生化也熱氣施化則炎暑鬱燠其爲變極則燔灼消融運乘癸酉癸未癸巳癸卯癸丑癸亥歲則熱化不足若乘戊辰戊寅戊子戊戌戊申戊午歲則熱化有餘火有君火相火故曰熱生火又云火也火生苦物之味苦者皆始自火之生化也甘物遇火體焦則苦苦從火化其可徵也苦生心苦物入胃化入於心故諸癸歲則苦化少諸戌歲則苦化多心生血苦味自心化已則布化生血脉血生脾苦味營血已自血流化生養脾也其在天爲熱亦神化氣也暄暑鬱蒸熱之化也炎赫沸騰熱之用也歲屬少陰少陽在上則熱化於天在下則熱行於地也在地爲火光顯炳明火之體也燔燎焦然火之用也在體爲脉流行血氣脉之體也壅泄虚實脉之用也絡脉同在氣爲息息長也在臓爲心心形如未敷蓮花中有九空以導引天眞之氣神之宇也爲君主之官神明出焉乘癸歲則心與經絡受邪而爲病小腸府亦然其性爲暑暑熱也心之氣性也其德爲顯明顯見象定而可取火之德也新校正云按氣交變大論云其德彰顯其用爲躁火性躁動不專定也其色爲赤生化之物乘火化者悉表備赭丹之色今南方之地草木之上皆兼赤色乘癸歲則赤色之物兼黑及白也其化爲茂茂蕃盛也新校正云按氣交變大論云其化蕃茂其蟲羽參差長短象火之形其政爲明明曜彰見無所蔽匿火之政也新校正云按氣交變大論云其正明曜又按火之政明水之氣明水火異而明同者火之明明於外水之明明於内明雖同而實異也其令鬱蒸鬱盛也蒸熱也言盛熱氣如蒸也新校正云詳注謂鬱爲盛其義未安按王冰注五常政大論云鬱謂鬱燠不舒暢也當如此解也其變炎爍熱甚炎赫爍石流金火之極變也新校正云按氣交變大論云其變銷爍其眚燔焫燔焫山川旋及屋宇火之灾也新校正云按氣交變大論云其灾燔焫其味爲苦物之化之變而有苦味者皆火氣之所合散也今南方之野生物多苦其志爲喜喜悅樂也悅以和志喜傷心言其過也喜發於心而反傷心亦由風之折木也過則氣竭故見傷也恐勝喜恐至則喜樂皆泯勝喜之理目擊道存恐則水之氣也熱傷氣天熱則氣伏不見人熱則氣促喘急熱之傷氣理亦可徵此皆謂大熱也小熱之氣猶生諸氣也陰陽應象大論曰壯火散氣少火生氣此其義也寒勝熱寒勝則熱退陰盛則陽衰制熱以寒是求勝也苦傷氣大凡如此爾苦之傷氣以其燥也若加以熱則傷尤甚也何以明之飲酒氣促多則喘急此其信也苦寒之物偏服歲乆益火滋甚亦傷氣也暫以方治乃同少火反生氣也新校正云詳此論所傷之㫖有三東方曰風傷肝酸傷筋中央曰濕傷肉甘傷脾西方曰辛傷皮毛是自傷者也南方曰熱傷氣苦傷氣北方曰寒傷血鹹傷血是傷己所勝也西方曰熱傷皮毛是被勝傷己也凡此五方所傷之例有三若太素則俱云自傷焉鹹勝苦酒得鹽而解物理昭然火苦之勝制以水鹹中央生濕中央土也高山土濕泉出地中水源山隈雲生岩谷則其象也夫性内藴動而爲用則雨降雲騰中央生濕不遠信矣故歷候記土潤溽暑於六月謂是也溽音辱濕生土濕氣内藴土體乃全濕則土生乾則土死死則庶類凋喪生則萬物滋榮此濕氣之化爾濕氣施化則土宅而雲騰雨降其爲變極則驟住土崩也運乘己巳己卯己丑己亥己酉己未之歲則濕化不足乘甲子甲戌甲申甲午甲辰甲寅之歲則濕化有餘也土生甘物之味甘者皆始自土之生化也甘生脾甘物入胃先入於脾故諸己歲則甘少化諸甲歲甘多化脾生肉甘味入脾自脾藏布化長生脂肉肉生肺甘氣營肉已自肉流化乃生養肺臓也其在天爲濕言神化也柔潤重澤濕之化也埃鬱雲雨濕之用也歲屬太陰在上則濕化於天太陰在下則濕化於地在地爲土敦靜安鎮聚散復形群品以生土之體也含垢匿穢靜而下民爲變化母土之德也新校正云詳注云靜而下民爲土之德下民之義恐字誤也在體爲肉覆裹筋骨氣發其間肉之用也疏宻不時中外否閉肉之動也在氣爲充土氣施化則萬象盈在臓爲脾形象馬蹄内包胃脘象土形也經絡之氣交歸於中以營運眞靈之氣意之舍也爲倉廪之官化物出焉乘己歲則脾及經絡受邪而爲病新校正云詳肝心肺腎四藏注各言府同獨此注不言胃府同者闕文也其性靜兼兼謂兼寒熱暄凉之氣也白虎通曰脾之爲言并也謂四氣并之也其德爲濡津濕潤澤土之德也新校正云按氣交變大論云其德溽蒸其用爲化化謂兼諸四化并己爲五化所謂風化熱化燥化寒化周萬物而爲生長化成收藏也其色爲黄物乘土化則表見黅黄之色今中央之地草木之上皆兼黄色乘己歲則黄色之物兼蒼及黑黅音今其化爲盈盈滿也土化所及則萬物盈滿新校正云按氣交變大論云其化豐備其蟲倮倮露皮革无毛介也其政爲謐謐靜也土性安靜新校正云按氣交變大論云其政安靜詳土之政謐水太過其政謐者蓋水太過而土下承之故其政亦謐其令雲雨濕氣布化之所成其變動注動反靜也地之動則土失性風摇不安注雨久下也乆則垣岸復爲土矣新校正云按氣交變大論云其變驟注其眚淫潰淫久雨也潰土崩潰也新校正云按氣交變大論云其灾霖潰其味爲甘物之化之變而有甘味者皆土化之所終始也今中原之地故物味多甘淡其志爲思思以成霧新校正云按靈樞經曰因志而存變謂之思思傷脾思勞於智過則傷脾怒勝思怒則不思忿而忘禍則勝可知矣思甚不解以怒制之調性之道也濕傷肉濕甚爲水水盈則腫水下去已形肉已消傷肉之驗近可知矣風勝濕風木氣故勝土濕濕甚則制之以風甘傷脾過節也新校正云按陰陽應象大論云甘傷肉酸勝甘甘餘則制之以酸所以救脾氣也西方生燥陽氣已降陰氣復升氣爽風勁故生燥也夫岩谷青埃川原蒼翠烟浮草樹遠望氤氲此金氣所生燥之化也夜起白朦輕如微霧遐邇一色星月皎如此萬物陰成亦金氣所生白露之氣也太虚埃昏氣鬱黄黑視不見遠無風自行從陰之陽如雲如霧此殺氣也亦金氣所生霜之氣也山谷川澤濁昏如霧氣鬱蓬勃慘然戚然咫尺不分此殺氣將用亦金氣所生運之氣也大雨大霖和氣西起雲卷陽曜太虚廓清燥生西方義可徵也若西風大起木偃雲騰是爲燥與濕爭氣不勝也故當復雨然西風雨晴天之常氣假有東風雨止必有西風復雨因雨而乃自晴觀是之爲則氣有往復動有燥濕變化之象不同其用矣由此則天地之氣以和爲勝暴發奔驟氣所不勝則多爲復也燥生金氣勁風切金鳴聲遠燥生之信視聽可知此則燥化能令萬物堅定也燥之施化於物如是其爲變極則天地凄慘肅殺氣行人悉畏之草木凋落運乘乙丑乙卯乙巳乙未乙酉乙亥之歲則燥化不足乘庚子庚寅庚辰庚午庚申庚戌歲則燥化有餘歲氣不同生化異也金生辛物之有辛味者皆始自金化之所成辛生肺辛物入胃先入於肺故諸乙歲則辛少化諸庚歲則辛多化肺生皮毛辛味入肺自肺臓布化生養皮毛也皮毛生腎辛氣自入皮毛乃流化生氣入腎臓也其在天爲燥神化也霧露清勁燥之化也肅殺凋零燥之用也歲屬陽明在上則燥化於天陽明在下則燥行於地在地爲金從革堅剛金之體也鋒刃銛利金之用也新校正云按别本銛作括在體爲皮毛柔韌包裹皮毛之體也滲泄津液皮毛之用也在氣爲成物乘金化則堅成在臓爲肺肺之形似人肩二布葉數小葉中有二十四空行列以分布諸臓清濁之氣主臓𩲸也爲相傳之官治節出焉乘乙歲則肺與經絡受邪而爲病也大腸府亦然其性爲凉涼清也肺之性也其德爲清金以清凉爲德新校正云按氣交變大論云其德清潔其用爲固固堅定也其色爲白物乘金化則表彰縞素之色今西方之野草木之上色皆兼白乘乙歲則白色之物兼赤及蒼也其化爲歛歛收也金化流行則物體堅歛新校正云按氣交變大論云其化緊歛詳金之化爲歛而木不及之氣亦歛者蓋木不及而金勝之故歛也其蟲介介甲也外被介甲金堅之象也其政爲勁勁前銳也新校正云按氣交變大論云其政勁切其令霧露涼氣化生其變肅殺天地慘悽人所不喜則其氣也其眚蒼落青乾而凋落其味爲辛夫物之化之變而有辛味者皆金氣之所離合也今西方之野草木多辛其志爲憂憂慮也思也新校正云詳王注以憂爲思有害於義按本論思爲脾之志憂爲肺之志是憂非思明矣又靈樞經曰愁憂則閉塞而不行又云愁憂而不解則傷意若是則憂者愁也非思也憂傷肺愁憂則氣閉塞而不行肺臓氣故憂傷肺喜勝憂神悅則喜故喜勝憂熱傷皮毛火有二别故此再舉熱傷之形證也火氣薄爍則物焦乾故熱氣盛則皮毛傷寒勝熱以陰消陽故寒勝熱新校正云按太素作燥傷皮毛熱勝燥辛傷皮毛過節也辛熱又甚焉苦勝辛苦火味故勝金之辛北方生寒陽氣伏陰氣升政布而大行故寒生也太虚澄净黑氣浮空天色黯然高空之寒氣也若氣似散麻本末皆黑微見川澤之寒氣也太虚清白空尤雪映遐邇一色山谷之寒氣也太虚白昏火明不翳如霧雨氣遐邇肅然北望色玄凝雰夜落此水氣所生寒之化也太虚凝陰白埃昏翳天地一色遠視不分此寒濕凝結雪之將至也地裂水冰河渠乾涸枯澤淨鹹水歛土堅是土勝水水不得自清水所生寒之用也寒生水寒資陰化水所由生此寒氣之生化爾寒氣施化則水冰雪雰其爲變極則水涸冰堅運乘丙寅丙子丙戌丙申丙午丙辰之歲則寒氣大行乘辛未辛巳辛卯辛丑辛亥辛酉之歲則寒氣少水生鹹物之有鹹味者皆始自水化之所成結也水澤枯涸鹵鹹乃蕃滄海味鹹鹽從水化則鹹因水産其事炳然煎水味鹹近而可見鹹生腎鹹物入胃先歸於腎故諸丙歲鹹物多化諸辛歲鹹物少化腎生骨髓鹹味入腎自腎藏布化生養骨髓髓生肝鹹氣自生骨髓乃流化生氣入肝臓也其在天爲寒神化也凝慘冰雪寒之化也凛冽霜雹寒之用也歲屬太陽在上則寒化於天太陽在下則寒行於地在地爲水陰氣布化流於地中則爲水泉澄澈流衍水之體也漂蕩没溺水之用也在體爲骨强幹堅勁骨之體也包裹髓腦骨之用也在氣爲堅柔軟之物遇寒則堅寒之化也在臓爲腎腎臓有二形如紅豆相并而曲附於膂筋外有脂裹裏白表黑主臓精也爲作强之官伎巧出焉乘辛歲則腎臓及經絡受邪而爲病膀胱府同其性爲凛凛寒也腎之性也其德爲寒水以寒爲德化新校正云按氣交變大論云其德凄愴其用爲本闕其色爲黑物禀水成則表被玄黑之色今北方之野草木之上色皆兼黑乘辛歲則黑色之物兼黄及赤其化爲肅肅靜也新校正云按氣交變大論云其化清謐詳水之化爲肅而金之政太過者爲肅平金之政勁肅金之變肅殺者何也蓋水之化肅者靜也金之政肅者肅殺也文雖同而事異其蟲鱗鱗謂魚蛇之族類其政爲靜水性澄徹而清靜新校正云按氣交變大論云其政凝肅詳水之政爲靜而平土之政安靜土太過之政亦爲靜土不及之政亦爲靜定水土異而靜同者非同也水之靜清净也土之靜安靜也其令本闕其變凝冽寒甚故致是新校正云按氣交變大論云其變凛冽其眚冰雹非時而有及暴過也新校正云按氣交變大論云其灾冰雪霜雹其味爲鹹夫物之化之變而有鹹味者皆水化之所凝散也今北方川澤地多鹹鹵其志爲恐恐以遠禍恐傷腎恐甚動中則傷腎靈樞經曰恐懼而不解則傷精腎臓精故精傷而傷及於腎思勝恐思見禍機故无憂恐思一作憂非也寒傷血腎勝心也寒甚血凝故傷血也燥勝寒寒化則水積燥用則物堅燥與寒兼故相勝也天地之化物理之常也鹹傷血味過於鹹則咽乾引飲傷血之義斷可知乎甘勝鹹渴飲甘泉咽乾自己甘爲土味故勝水鹹新校正云詳自上岐伯曰至此與陰陽應象大論同小有增損而注頗異五氣更立各有所先當其歲時氣乃先也非其位則邪當其位則正先立運然後知非位與當位者也帝曰病之生變何如岐伯曰氣相得則微不相得則甚木居火位火居土位土居金位金居水位水居木位木居君位如是者爲相得又木居水位水居金位金居土位土居火位火居木位如是者雖爲相得終以子僭居父母之位下陵上猶爲小逆也木居金土位火居金水位土居水木位金居火木位水居火土位如是者爲不相得故病甚也皆先立運氣及司天之氣則氣之所在相得與不相得可知矣帝曰主歲何如岐伯曰氣有餘則制己所勝而侮所不勝其不及則己所不勝侮而乘之己所勝輕而侮之木餘則制土輕忽於金以金氣不爭故木恃其餘而欺侮也又木少金勝土反侮木以木不及故土妄凌之也四氣卒同侮謂侮慢而凌忽之侮反受邪或以己强盛或遇彼衰微不度卑弱妄行凌忽雖侮而求勝故終必受邪侮而受邪寡於畏也受邪各謂受己所不勝之邪也然捨己宫觀適他鄉邦外强中乾邪盛眞弱寡於敬畏由是納邪故曰寡於畏也新校正云按六節藏象論云未至而至此謂太過則薄所不勝而乘所勝命曰氣淫至而不至此謂不及則所勝妄行而所生受病所不勝而薄之命曰氣迫即此之義也帝曰善黄帝内經素問補註釋文卷之三十九

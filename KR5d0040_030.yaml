front:
  text: 黃帝內經素問補注釋文卷之三十宜六
  hash: sha256:7e4fdf8cb3a5180cd709ce0cab40060275293f19b508a99b5d728b8402661f29
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_030-001a, image: hfl/0654/0654-184.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤刺齊論篇黃帝問曰願聞刺淺深之分謂皮肉筋脉骨之分位也岐伯對曰刺骨者無傷筋刺筋者無傷肉刺肉者無傷脉刺脉者無傷皮刺皮者無傷肉刺肉者無傷筋刺筋者無傷骨帝曰余未知其所謂願聞其解岐伯曰刺骨無傷筋者針至筋而去不及骨也刺筋無傷肉者至肉而去不及筋也刺肉無傷脉者至脉而去不及肉也刺脉無傷皮者至皮而去不及脉也是皆謂遣邪也然筋有寒邪肉有風邪脉有濕邪皮有熱邪則如是遣之所謂邪者皆言其非順正氣而相干犯也新校正云詳此謂刺淺不至所當刺之處也下文則誡其太深也所謂刺皮無傷肉者病在皮中針入皮中無傷肉也刺肉無傷筋者過肉中筋也刺筋無傷骨者過筋中骨也此謂之反也此則誡過分大深也新校正云按全元起云刺如此者是謂傷此皆過過必損其血氣是謂逆也邪必因而入也刺禁論篇黃帝問曰願聞禁數岐伯對曰藏有要害不可不察肝生於左肝象木王於春春陽發生故生於左也肺藏於右肺象金王於秋秋陰收殺故藏於右也新校正云按楊上善云肝為少陽陽長之始故曰生肺為少陰陰藏之初故曰藏心部於表陽氣主外心象火也腎治於裏陰氣主內腎象水也新校正云按楊上善云心為五藏部主故得稱部腎間動氣內治五藏故曰治脾謂之使營動不已糟粕水穀故使者也胃為之市水穀所歸五味皆入如市雜故為市也鬲肓之上中有父母鬲肓之上氣海居中氣者生之原生者命之主故氣海為人之父母也新校正云按楊上善云心下鬲上為肓心為陽父也肺為陰母也肺主於氣心主於血共榮衛於身故為父母七節之傍中有小心小心謂真心神靈之宫室新校正云按太素小心作志心楊上善云脊有三七二十一節腎在下七節之傍腎神曰志五藏之靈皆各為神神之所以任得名為志者心之神也從之有福逆之有咎從謂隨順也八者人之所以生形之所以成故順之則福延逆之則咎至刺中心一日死其動為噫心在氣為噫刺中肝五日死其動為語肝在氣為語新校正云按全元起本并甲乙經語作缺元起云腎傷則缺子母相感也王氏改缺作語刺中腎六日死其動為𡁲腎在氣為嚏新校正云按全元起本及甲乙經六日作三日刺中肺三日死其動為咳肺在氣為咳刺中脾十日死其動為吞脾在氣為吞新校正云按全元起本及甲乙經十日作十五日刺中五藏與診要經終論并四時刺逆從論相重此叙五藏相次之法以所生為次甲乙經以心肺肝脾腎為次是以所克為次全元起本舊文則錯亂無次矣刺中膽一日半死其動為嘔膽氣勇故為嘔新校正云按診要經終論刺中膽下又云刺中鬲者為傷中其病雖愈不過一歲死刺跗上中大脉血出不止死跗為足跗大脉動而不止者則胃之大經也胃為水穀之海然血出不止則胃氣將傾海竭氣亡故死刺面中溜脉不幸為盲面中溜脉者手太陽任脉之交會手太陽脉自顴而斜行至目內眦任脉自鼻鼽兩傍上行至童子下故刺面中溜脉不幸為盲刺頭中腦户入腦立死腦户穴名也在枕骨上通於腦中然腦為髓之海真氣之所聚針入腦則真氣泄故立死刺舌下中脉太過血出不止為瘖舌下脉脾之脉也脾脉者俠咽連舌本散舌下血出不止則脾氣不能營運於舌故瘖不能言語刺足下布絡中脉血不出為腫布絡謂當內踝前足下空處布散之絡正當然谷穴分也絡中脉則衝脉也衝脉者并少陰之經下入內踝之後入足下也然刺之而血不出則腎脉與衝脉氣并歸於然谷之中故為腫刺郤中大脉令人仆脫色尋此經郤中主治與中誥流注經委中穴正同應郤中者以經穴為名委中處所為名亦猶寸口脉口氣口皆同一處爾然郤中大脉者足太陽經脉也足太陽之脉起於目內眦合手太陽手太陽脉自目內眦斜絡於顴足太陽脉上頭下項又循於足故刺之過禁則令人仆倒而面色如脫去也刺氣街中脉血不出為腫鼠僕氣街之中膽胃脉也膽之脉循脅裏出氣街胃之脉俠齊入氣街中其支别者起胃下口循腹裏至氣街中而合今刺之而血不出則血脉氣并聚於中故內結為腫如伏鼠之形也氣街在腹下俠齊兩傍相去四寸鼠僕上一寸動脉應手也新校正云按别本僕一作鼷氣府論注氣街在齊下橫骨兩端鼠鼷上一寸也刺脊間中髓為傴傴謂傴僂身腃屈也脊間謂脊骨節間也刺中髓則骨精氣泄故傴僂也刺乳上中乳房為腫根蝕乳之上下皆足陽明之脉也乳房之中乳液滲泄胸中氣血皆外凑之然刺中乳房則氣血交凑故為大腫中有膿根內蝕肌膚化為膿水而久故不愈也刺缺盆中內陷氣泄令人喘咳逆五藏者肺為之蓋缺盆為之道肺藏氣而主息又在氣為咳刺缺盆中內陷則肺氣外泄故令人喘咳逆也刺手魚腹內陷為腫手魚腹內肺脉所流故刺之內陷則為腫也新校正云按甲乙經肺脉所流當作留字無刺大醉令人氣亂脉數過度故因刺而亂也新校正云按靈樞經氣亂當作脉亂無刺大怒令人氣逆怒者氣逆故刺之益甚無刺大勞人經氣越也無刺新飽人氣盛滿也無刺大饑人氣不足也無刺大渴人血脉乾也無刺大驚人神蕩越而氣不治也新校正云詳無刺大醉至此七條與靈樞經相出入靈樞經云新內無刺已刺無內大怒無刺已刺無怒大勞無刺已刺無勞大醉無刺已刺無醉大飽無刺已刺無飽大饑無刺已刺無饑大渴無刺已刺無渴大驚大恐必定其氣乃刺之也刺陰股中大脉血出不止死陰股之中脾之脉也脾者中央土孤藏以灌四傍今血出不止脾氣將竭故死新校正云按刺陰股中大脉條皇甫士安移在前刺跗上中大脉下相續自後至篇末逐條與前條相間也刺客主人內陷中脉為內漏為聾客主人穴名也今名上關在耳前上廉起骨開口有空手少陽足陽明脉交會於中陷脉言刺太深也刺太深則交脉破决故為耳內之漏脉內漏則氣不營故聾新校正云詳客主人穴與氣穴論注同按甲乙經及氣府論注云手足少陽足陽明三脉之會疑此脫足少陽一脉也刺膝臏出液為跛膝為筋府筋會於中液出筋乾故跛臏音牝刺臂太陰脉出血多立死臂太陰者肺脉也肺者主行榮衛陰陽治節由之血出多則榮衛絶故立死刺足少陰脉重虛出血為舌難以言足少陰腎脉也足少陰脉貫腎絡肺繫舌本故重虛出血則舌難言也刺膺中陷中肺為喘逆仰息肺氣上泄逆所致也刺肘中內陷氣歸之為不屈伸肘中謂肘屈折之中尺澤穴中也刺過陷脉惡氣歸之氣固關節故不屈伸也刺陰股下三寸內陷令人遺溺股下三寸腎之絡也衝脉與少陰之絡皆起於腎下出於氣街并循於陰股其上行者出胞中故刺陷脉則令人遺溺也刺掖下脅間內陷令人咳掖下肺脉也肺之脉從肺係橫出掖下真心藏脉直行者從心系却上掖下刺陷脉則心肺俱動故咳也刺少腹中膀胱溺出令人少腹滿胞氣外泄穀氣歸之故少腹滿也少腹謂齊下也刺腨腸內陷為腫腨腸之中足太陽脉也太陽氣泄故為腫刺匡上陷骨中脉為漏為盲匡目匡也骨中謂目匡骨中也匡骨中脉目之系肝之脉也刺內陷則眼系絶故為目漏目盲刺關節中液出不得屈伸諸筋者皆屬於節津液滲潤之液出則筋膜乾故不得屈伸也黃帝內經素問補注釋文卷之三十

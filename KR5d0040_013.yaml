  text: 黃帝內經素問補注釋文卷之十三慎十一
  hash: sha256:9bdaa9c7b2d182dc9d18d026bb7e99c0ea1d992f024ad378a1c0751bba80fef0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_013-001a, image: hfl/0651/0651-110.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤脈要精微論篇黃帝問曰診法何如岐伯對曰診法常以平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻氣血未亂故乃可診有過之脈動謂動而降卑散謂散布而出也過謂異於常候也新校正云按脈經及千金方有過之脈作過此非也王注陰氣未動謂動而降卑按金匱真言論云平旦至日中天之陽陽中之陽也則平旦為一日之中純陽之時陰氣未動耳何有降卑之義切脈動靜而視精眀察五色觀五藏有餘不足六府強弱形之盛衰以此參伍決死生之分切謂以指切近於脈也精明穴名也在明堂左右兩目內青也以近於目故曰精明言以形氣盛衰脈之多少視精明之間氣色觀藏府不足有餘參其類伍以決死生之分夫脈者血之府也府聚也言血之多少皆聚見於經脈之中也故刺法論曰脈實血實脈虛血虛此其常也反此者病由是故也長則氣治短則氣病數則煩心大則病進夫脈長為氣和故治短為不足故病數急為熱故煩心大為邪盛故病進也長脈者往來長短脈者往來短數脈者往來急遠大脈者往來滿大也上盛則氣高新校正云按全元起本高作鬲下盛則氣脹代則氣衰細則氣少新校正云按太素細作滑澀則心痛上謂寸口下謂尺中盛謂盛滿代脈者動而中止不能自還細脈者動如莠蓬澀脈者往來時不利而蹇澀也渾渾革至如涌泉病進而色弊綿綿其去如弦絶死渾渾言脈氣濁亂也革至者謂脈來弦而大實而長也如涌泉者言脈汨汨但出而不返也綿綿言微微似有而不甚應手也如弦絶者言脈卒斷如弦之絶去也若病候日進而色弊惡如此之脈皆必死也新校正云按甲乙經及脈經作渾渾革革至如涌泉病進而危弊弊綽綽其去如弦絶者死夫精明五色者氣之華也五氣之精華者上見為五色變化於精明之間也六節藏象論曰天食人以五氣五氣入鼻藏於心肺上使五色修明此則明察五色也赤欲如帛裹朱不欲如赭白欲如鵝羽不欲如鹽新校正云按甲乙經作白欲如白璧之澤不欲如堊太素兩出之青欲如蒼璧之澤不欲如藍黃欲如羅裏雄黃不欲如黃土黑欲如重漆色不欲如地蒼新校正云按甲乙經作炭色五色精微象見矣其壽不久赭色鹽色籃色黃土色地蒼色見者皆精微之敗象故其壽不久夫精明者所以視萬物別白黑審短長以長為短以白為黑如是則精衰矣誡其誤也夫如是垎皆精明衰乃誤也五藏者中之守也身形之中五神安守之所也此皆明觀五藏也新校正云按甲乙經及太素守作府中威藏滿氣勝傷恐者聲如從室中言是中氣之濕也中謂腹中盛謂氣盛藏謂肺藏氣勝謂勝於呼吸而喘息變易也夫腹中氣盛肺藏充滿氣勝息變善傷於恐言聲不發如在室中者皆腹中有濕氣乃爾也言而徹終日乃復言者此奪氣也若言音徹細聲斷不續甚奪其氣乃如是也衣被不斂言語善惡不避親疏者此神明之亂也倉廪不藏者是門户不要也倉廪謂脾胃門户謂魄門靈蘭祕典論曰脾胃者倉廪之官也五藏别論曰魄門亦為五藏使水穀不得久藏也魄門則肚門也要謂禁要水泉不止者是膀胱不藏也水泉謂前陰之流注也得守者生失守者死夫如是倉廪不藏氣勝傷恐衣被不斂水泉不止者皆神氣得其所守則生失其所守則死也夫何以知神氣之不守即衣被不斂言語善惡不避親踈則亂之證也亂甚則不守於藏也夫五藏者身之強也藏安則神守神守則身強故曰身之強也頭者精明之府頭傾視深精神將奪矣背者胸中之府背曲肩隨府將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之府屈伸不能行則僂附新校正云按别本附一作俯太素作跗筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣皆以所居所由而為之府也得強則生失強則死強謂中氣強固以鎮守也岐伯曰新校正云詳此岐伯曰前無問反四時者有餘為精不足為消應太過不足為精應不足有餘為消陰陽不相應病名曰關格廣陳其脈應也夫反四時者諸不足皆為血氣消損諸有餘皆為邪氣勝精也陰陽之氣不相應合不得相營故曰關格帝曰脈其四時動奈何知病之所在奈何知病乍在內奈何知病乍在外奈何請問此五者可得聞乎言欲順四時及陰陽相應之狀候也岐伯曰新校正云詳此對與問不甚相應脈四時動病之所在病之所變按文頗對病在內在外之説後文殊不相當請言其與天運轉大也指可見陰陽之運轉以明陰陽之不可見也萬物之外六合之內天地之變陰陽之應彼春之暖為夏之暑彼秋之忿為冬之怒四變之動脈與之上下六合謂四方上下也春暖為夏暑言陽生而至盛秋忿為冬怒言陰少而之壯也忿一為急言秋氣徑急也新校正云按全元起本注暖作緩以春應中規春脈耎弱輕虛而滑如規之象中外皆然故以春應中規夏應中矩夏脈洪大兼之滑數如矩之象可正平之故以夏應中矩秋應中衡秋脈如毛輕澀而散如稱衡之象高下必平故以秋應中衡冬應中權冬脈如石兼沉而滑如稱權之象下遠於衡故以冬應中權也以秋中衡冬中權者言脈之高下異處如此爾此則隨陰陽之氣故有斯四應不同也是故冬至四十五日陽氣微上陰氣微下夏至四十五日陰氣微上陽氣微下陰陽有時與脈為期期而相失如脈所分分之有期故知死時察陰陽升降之準則知經脈遞遷之象審氣候遞遷之失則知氣血分合之期分期不差故知人死之時節微妙在脈不可不察察之有紀從陰陽始推陰陽升降精微妙用皆在經脈之氣候是以不可不察故始以陰陽為察候之綱紀始之有經從五行生生之有度四時為宜言始所以知有經脈之察候司應者何哉蓋從五行衰王而為準度也徵求太過不及之形證皆以應四時者為生氣所宜也新校正云按太素宜作數補寫勿失與天地如一有餘者寫之不足者補之是則應天地之常道也然天地之道損有餘而補不足是法天地之道也寫補之宜工切審之其治氣亦然得一之情以知死生曉天地之道補寫不差既得一情亦可知生死之準的是故聲合五音色合五行脈合陰陽聲表宫商角徵羽故合五音色見青黃赤白黑故合五行脈彰寒暑之休王故合陰陽之氣也是知陰盛則夢涉大水恐懼陰為水故夢涉水而恐懼也陰陽應象大論曰水為陰陽盛則夢大火燔灼陽為火故夢大火而燔灼也陰陽應象大論曰火為陽陰陽俱盛則夢相殺毁傷亦類交爭之氣象也上盛則夢飛下盛則夢墮氣上則夢上故飛氣下則夢下故墮甚飽則夢豫內有餘故甚飢則夢取內不足故肝氣盛則夢怒肝在志為怒肺氣盛則夢哭肺聲哀故夢哭新校正云詳是知陰盛則夢涉大水恐懼至此乃靈樞之文誤置於斯仍少心脾腎氣盛所夢今具甲乙經中短蟲多則夢聚衆身中短蟲多則夢聚衆長蟲多則夢相擊毁傷長蟲動則內不安內不安則神躁擾故夢是矣新校正云詳此二句亦不當出此應他經脫簡文也是故持脈有道虛靜為保前明脈應此舉持脈所由也然持脈之道必虛其心靜其志乃保定盈虛而不失新校正云按甲乙經保作寶春日浮如魚之遊在波雖出猶未全浮夏日在膚泛泛乎萬物有餘泛泛平貌陽氣大盛脈氣亦象萬物之有餘易取而洪大也秋日下膚蟄蟲將去隨陽氣之漸降故曰下膚何以明陽氣之漸降蟄蟲將欲藏去也冬日在骨蟄蟲周密君子居室在骨言脈深沉也蟄蟲周密言陽氣伏藏君子居室此人事也故曰知內者按而紀之知內者謂知脈氣也故按而為之綱紀知外者終而始之知外者謂知色象故以五色終而復始此六者持脈之大法見是六者然後可以知脈之遷變也新校正云詳此前對帝問脈其四時動奈何之事心脈搏堅而長當病舌卷不能言搏謂搏擊於手也諸脈摶堅而長者皆為勞心而藏脈氣虛極也心手少陰脈從心系上俠咽喉故令舌卷短而不能言也其耎而散者當消環自已諸脈耎散皆為氣實血虛也消謂消散環謂環周言其經氣如環之周當其火王自消散也新校正云按甲乙經環作渴肺脈搏堅而長當病唾血肺虛極則絡逆絡逆則血泄故唾出也其耎而散者當病灌汗至令不復散發也汗泄玄府津液奔湊寒水灌洗皮密汗藏因灌汗藏故言灌汗至令不復散發也灌謂灌洗盛暑多為此也新校正云詳下文諸藏各言色而心肺二藏不言色者疑闕文也肝脈搏堅而長色不青當病墜若搏因血在脅下令人喘逆諸脈見本經之氣而色不應者皆非病從內生是外病來勝也夫肝藏之脈端直以長故言曰色不青當病墜若搏也肝主兩脅故曰因血在脅下也肝厥陰脈布脅肋循喉嚨之後其支别者復從肝别貫鬲上注肺今血在脅下則血氣上熏於肺故令人喘逆也其耎而散色澤者當病溢飲溢飲者渴暴多飲而易入肌皮腸胃之外也面色浮澤是為中濕血虛中濕水液不消故言當病溢飲也以水飲滿溢故滲溢易而入肌皮腸胃之外也新校正云按甲乙經易作溢胃脈搏堅而長其色赤當病折髀胃虛色赤火氣救之心象於火故色赤也胃陽明脈從氣衝下髀抵伏兔故病則髀如折也其耎而散者當病食痹痹痛也胃陽明脈其支别者從大迎前下人迎循喉嚨入缺盆下鬲屬胃絡脾故食則痛悶而氣不散也新校正云詳謂痹為痛其義則未通脾脈搏堅而長其色黃當病少氣脾虛則肺無所養肺主氣故少氣也其耎而散色不澤者當病足胻腫若水狀也色氣浮澤為水之候色不潤澤故言若水狀也脾太陰脈自上內踝前廉上踹內循胻骨後交出厥陰之前上循膝股內前廉入腹故病足胻腫也腎脈搏堅而長其色黃而赤者當病折腰色氣黃赤是心脾干腎腎受客陽故腰如折也腰為腎府故病發於中其耎而散者當病少血至令不復也腎主水以生化津液今腎氣不化故當病少血至令不復也帝曰新校正云詳帝曰至以其勝治之愈全元起本在湯液篇診得心脈而急此為何病病形何如岐伯曰病名心疝少腹當有形也心為牡藏其氣應陽今脈反寒故為疝也諸脈徑急者皆為寒形謂病形也帝曰何以言之岐伯曰心為牡藏小腸為之使故曰少腹當有形也少腹小腸也靈蘭祕典論曰小腸者受盛之宫以其受盛故形居於內也帝曰診得胃脈病形何如岐伯曰胃脈實則脹虛則泄脈實者氣有餘故脹滿脈虛者氣不足故泄利新校正云詳此前對帝問知病之所在帝曰病成而變何謂岐伯曰風成為寒熱生氣通天論曰因於露風乃生寒熱故風成為寒熱也疸成為消中疸謂濕熱也熱積於內故變為消中也消中之證善食而瘦新校正云詳王注以善食而瘦為消中按本經多食數溲為之消中善食而瘦乃是食㑊之證當云善食而溲數厥成為巔疾厥謂氣逆也氣逆上而不已則變為上巔之疾也久風為飧泄久風不變但在胃中則食不化而泄利也以肝氣內合而乘胃故為是病焉陰陽應象大論曰風氣通於肝故內應於肝也脈風成為癘經風論曰風寒客於脈而不去名曰癘風又曰癘者有榮氣熱胕其氣不清故使其鼻柱壞而色敗皮膚瘍潰然此則癩也夫如是者皆脈風成結變而為也病之變化不可勝數新校正云詳此前對帝問知病之所變奈何帝曰諸癰腫筋攣骨痛此皆安生安何也言何以生之岐伯曰此寒氣之腫八風之變也八風八方之風也然癰腫者傷東南西南風之變也筋攣骨痛者傷東風北風之變也靈樞經曰風從東方來名曰嬰兒風其傷人也外在筋紐風從東南來名曰弱風其傷人也外在於肌風從西南來名曰謀風其傷人也外在於肉風從北方來名曰大剛風其傷人也外在於骨由此四風之變而三病乃生故下問對是也帝曰治之奈何岐伯曰此四時之病以其勝治之愈也勝謂勝剋也如金勝木木勝土土勝水水勝火火勝金此則相勝也帝曰有故病五藏發動因傷脈色各何以知其久暴至之病乎重以色氣明前五藏堅長之脈有自病故病及因傷候也岐伯曰悉乎哉問也徵其脈小色不奪者新病也氣乏而神猶強也徵其脈不奪其色奪者此久病也神持而邪凌其氣也徵其脈與五色俱奪者此久病也神與氣俱衰也徵其脈與五色俱不奪者新病也神與氣俱強也肝與腎脈并至其色蒼赤當病毁傷不見血已見血濕若中水也肝色蒼心色赤赤色見當脈洪腎脈見當色黑今腎脈來反見心色故當因傷而血不見也若已見血則是濕氣及水在腹中也何者以心腎脈色中外之候不相應也尺內兩傍則季脅也尺內謂尺澤之內也兩傍各謂尺之外側也季脅近腎尺主之故尺內兩傍則季脅也尺外以候腎尺裏以候腹中尺外謂尺之外側尺裏謂尺之內側也次尺外下兩傍則季脅之分季脅之上腎之分季脅之內則腹之分也附上左外以候肝內以候鬲肝主賁賁鬲也右外以候胃內以候脾脾居中故以內候之胃為市故以外候之上附上右外以候肺內以候胸中肺葉垂外故以外候之胸中主氣管故以內候之左外以候心內以候膻中心主鬲中也膻中則氣海也嗌也新校正云詳王氏以膻中為嗌也疑誤前以候前後以候後上前謂左寸口下前謂胸之前膺及氣海也上後謂右寸口下後謂胸之後背及氣管也上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也上竟上至魚際也下竟下謂盡尺之脈動處也少腹胞氣海在膀胱腰股膝脛足中之氣動靜皆分其近遠及連接處所名目以候之知其善惡也粗大者陰不足陽有餘為熱中也粗大謂脈洪大也脈洪為熱故曰熱中來疾去徐上實下虛為厥巔疾來徐去疾上虛下實為惡風也亦脈狀也故中惡風者陽氣受也以上虛故陽氣受也有脈俱沉細數者少陰厥也尺中之有脈沉細數者是腎少陰氣逆也何者尺脈不當見數有數故言厥也俱沉細數者言左右尺中也沉細數散者寒熱也陽干於陰陰氣不足故寒熱也正理論曰數為陽浮而散者為胸仆脈浮為虛散為不足氣虛而血不足故為頭眩而仆倒也胸音順諸浮不躁者皆在陽則為熱其有躁者在手言大法也但浮不躁則病在足陽脈之中躁者病在手陽脈之中也故又曰其有躁者在手也陽為火氣故為熱諸細而沉者皆在陰則為骨痛其有靜者在足細沉而躁則病生於手陰脈之中靜者病生於足陰脈之中也故又曰其有靜者在足也陰主骨故骨痛數動一代者病在陽之脈也泄及便膿血代止也數動一代是陽氣之生病故云病在陽之脈所以然者以泄利及膿血脈乃爾諸過者切之澀者陽氣有餘也滑者陰氣有餘也陽氣有餘則血少故脈澀陰氣有餘則氣多故脈滑也新校正云詳氣多疑誤當是血多也陽氣有餘為身熱無汗陰氣有餘為多汗身寒血少氣多斯可知也陰陽有餘則無汗而寒陽餘無汗陰餘身寒若陰陽有餘則當無汗而寒也推而外之內而不外有心腹積也脈附臂筋取之不審推筋令遠使脈外行內而不出外者心腹中有積乃爾推而內之外而不內身有熱也脈遠臂筋推之令近遠而不近是陽氣有餘故身有熱也推而上之上而不下腰足清也推筋按之尋之而上脈上涌盛是陽氣有餘故腰足冷也新校正云按甲乙經上而不下作下而不上推而下之下而不上頭項痛也推筋按之尋之而下脈沉下掣是陽氣有餘故頭項痛也新校正云按甲乙經下而不上作上而不下按之至骨脈氣少者腰脊痛而身有痹也陰氣大過故爾黃帝內經素問補注釋文卷之十三

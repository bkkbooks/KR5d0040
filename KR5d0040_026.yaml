front:
  text: 黃帝內經素問補注釋文卷之二十六宜二
  hash: sha256:24a1991fa1d3cafb2730ad1d84c51f0c5a71b9c0f0d092fe80ba9e98b0581282
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_026-001a, image: hfl/0654/0654-058.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤痹論篇黃帝問曰痹之安生安猶何也言何以生岐伯對曰風寒濕三氣雜至合而為痹也雖合而為痹發起亦殊矣其風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹也風則陽受之故為痹行寒則陰受之故為痹痛濕則皮肉筋脈受之故為痹著而不去也故乃痹從風寒濕之所生也帝曰其有五者何也言風寒濕氣各異則三痹生有五何氣之勝也岐伯曰以冬遇此者為骨痹以春遇此者為筋痹以夏遇此者為脈痹以至陰遇此者為肌痹以秋遇此者為皮痹冬主骨春主筋夏王脈秋主皮至陰主肌肉故各為其痹也至陰謂戊己月及土寄三月也帝曰內舍五藏六府何氣使然言皮肉筋骨脈痹以五時之外遇然內居藏府何以致之岐伯曰五藏皆有合病久而不去者內舍於其合也肝合筋心合脈脾合肉肺合皮腎合骨久病不去則入於是故骨瘦不已復感於邪內舍於腎筋痹不已復感於邪內舍於肝脈痹不已復感於邪內舍於心肌痹不已復感於邪內舍於脾皮痹不已復感於邪內舍於肺所謂痹者各以其時重感於風寒濕之氣也時謂氣王之月也肝王春心王夏肺王秋腎王冬脾王四季之月感謂感應也凡痹之客五藏者肺痹者煩滿喘而嘔以藏氣應息又其脈還循胃口故使煩滿喘而嘔心痹者脈不通煩則心下鼓暴上氣而喘嗌乾善噫厥氣上則恐心合脈受邪則脈不通利也邪氣內擾故煩也手心主心包之脈起於胸中出屬心包下鬲手少陰心脈起於心中出屬心系下鬲絡小腸其支别者從心系上俠咽喉其直者復從心系却上肺故煩則心下鼓滿暴上氣而喘嗌乾也心主為噫以下鼓滿故噫之以出氣也暴足逆氣上乘於心則恐畏也神懼凌弱故爾肝痹者夜卧則驚多飲數小便上為引如懷肝王驚駭氣相應故中夜卧則驚也肝之脈循股陰入髦中環陰器抵少腹俠胃屬肝絡膽上貫鬲布脅肋循喉嚨之後上入頏顙故多飲水數小便上引少腹如懷任之狀腎痹者善脹尻以代踵脊以代頭腎者胃之關關不利則胃氣不轉故善脹也尻以代踵謂足攣急也脊以代頭謂身踡屈也踵足跟也腎之脈起於足小指之下斜趣足心出於然骨之下循內踝之後别入跟中以上胻內出膕內廉上股內後廉貫脊屬腎絡膀胱其直行者從腎上貫肝鬲入肺中氣不足而受邪故不伸展新校正云詳然骨一作然穀脾痹者四支懈惰發咳嘔汁上為大塞土王四季外主四支故四支懈惰又以其脈起於足循腨胻上膝股也然脾脈入腹屬脾絡胃上鬲俠咽故發咳嘔汁脾氣養肺胃復連咽故上為大塞也腸痹者數飲而出不得中氣喘爭時發餐泄大腸之脈入缺盆絡肺下鬲屬大腸小腸之脈又入缺盆絡心循咽下鬲抵胃屬小腸今小腸有邪則脈不下鬲脈不下鬲則腸不行化而胃氣蓄熱故多飲水而不得下出也腸胃中陽氣與邪氣奔喘交爭得時通利以腸氣不化故時或得通則為餐泄胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕膀胱為津液之府胞內居之少腹處關元之中內藏胞器然膀胱之脈起於目內眥上額交巔上入絡腦出别下項循肩髆內俠脊抵腰中入循膂絡腎屬膀胱其支别者從腰中下貫臀入膕中今胞受風寒濕氣則膀胱太陽之脈不得下流於足故少腹膀胱按之內痛若沃以湯澀於小便也小便既澀太陽之脈不得下行故上爍其腦而為清涕出於鼻竅矣沃猶灌也新校正云按全元起本內痛二字作兩髀陰氣者靜則神藏躁則消亡陰謂五神藏也所以説神藏與消亡者言人安靜不涉邪氣則神氣寧以內藏人躁動觸冒邪氣則神被害而離散藏無所守故曰消亡此言五藏受邪之為痹也飲食自倍腸胃乃傷藏以躁動致傷府以飲食見損皆謂過用越性則受其邪此言六府受邪之為痹也淫氣喘息痹聚在肺淫氣憂思痹聚在心淫氣遺溺痹聚在腎淫氣乏竭痹聚在肝淫氣肌絶痹聚在脾淫氣謂氣之妄行者各隨藏之所主而入為痹也新校正云詳從上凡痹之客五藏者至此全元起本在陰陽别論中此王氏之所移也諸痹不已亦益內也從外不去則益深至於身內其風氣勝者其人易已也帝曰痹其時有死者或疼久者或易已者其故何也岐伯曰其入藏者死其留連筋骨間者疼久其留皮膚間者易已入藏者死以神去也筋骨疼久以其定也皮膚易已以浮淺也由斯深淺故有是不同帝曰其客於六府者何也岐伯曰此亦其食飲居處為其病本也四方雖土地溫涼高下不同物性剛柔食居不異但動過其分則六府致傷陰陽應象大論曰水穀之寒熱感則害六府新校正云按傷寒論曰物性剛柔餐居亦異六府亦各有俞風寒濕氣中其俞而食飲應之循俞而入各舍其府也六府俞亦謂背俞也膽俞在十椎之傍胃俞在十二椎之傍三焦俞在十三椎之傍大腸俞在十六椎之傍小腸俞在十八椎之傍膀胱俞在十九椎之傍隨形分長短而取之如是各去脊同身寸之一寸五分并足太陽脈氣之所發也新校正云詳六府俞并在本椎下兩傍此注言在椎之傍者文略也帝曰以針治之奈何岐伯曰五藏有俞六府有合循脈之分各有所發各隨其過新校正云按甲乙經隨作治則病瘳也肝之俞曰太衝心之俞曰太陵脾之俞曰太白肺之俞曰太淵腎之俞曰太溪皆經脈之所注也太衝在足大指間本節後二寸陷者中新校正云按刺腰痛注云太衝在足大指本節後內間二寸陷者中動脈應手刺可入同身寸之三分留十呼若灸者可灸三壯太陵在手掌後骨兩筋間陷者中刺可入同身寸之六分留七呼若灸者可灸三壯太白在足內側核骨下陷者中刺可入同身寸之三分留七呼若灸者可灸三壯太淵在手掌後陷者中刺可入同身寸之二分留二呼若灸者可灸三壯太溪在足內踝後跟骨上動脈陷者中刺可入同身寸之三分留七呼若灸者可灸三壯胃合入於三里膽合入於陽陵泉大腸合入於曲池小腸合入於小海三焦合入於委陽膀胱合入於委中三里在膝下三寸隨外廉兩筋間刺可入同身寸之一寸留十呼若灸者可灸三壯陽陵泉在膝下一寸胻外廉陷者中刺可入同身寸之六分留十呼若灸者可灸三壯小海在肘內大骨外去肘端五分陷者中屈肘乃得之刺可入同身寸之二分留七呼若灸者可灸五壯曲池在肘外輔屈肘曲骨之中刺可入同身寸之五分留七呼若灸者可灸三壯委陽在足膕中外廉兩筋間刺可入同身寸之七分留五呼若灸者可灸三壯屈伸而取之委中在膕中央約文中動脈刺可入同身寸之五分留七呼若灸者可灸三壯新校正云按刺藝注委中在足膝後屈處餘并同此故經言循脈之分各有所發各隨其過則病瘳也過謂脈所經過處新校正云詳王氏以委陽為三焦合按甲乙經云委陽三焦下輔俞也足太陽之别絡三焦之合自在手少陽經天井穴為少陽脈之所入為合詳此六府之合俱引本經所入之穴獨三焦不引本經所入之穴者王氏之誤也王氏但見甲乙經云三焦合於委陽彼説自異彼又以大腸合於巨虛上廉小腸合於下廉此以曲池小海易之故知當以天井穴為合也帝曰榮衛之氣亦令人痹乎岐伯曰榮者水穀之精氣也和調於五藏灑陳於六府乃能入於脈也正理論曰穀入於胃脈道乃行水入於經其血乃成又靈樞經曰榮氣之道內穀為實新校正云按别本實作寶穀入於胃氣傳與肺精專者上行經隧由此故水穀精氣合榮氣運行而入於脈也故循脈上下貫五藏絡六府也榮行脈內故無所不至衛者水穀之悍氣也其氣慓疾滑利不能入於脈也悍氣謂浮盛之氣也以其浮盛之氣故慓疾滑利不能入於脈中也故循皮膚之中分肉之間熏於肓膜散於胸腹皮膚之中分肉之間謂脈外也肓膜謂五藏之間鬲中膜也以其浮盛故能布散於胸腹之中空虛之處熏其肓膜令氣宣通也肓音荒逆其氣則病從其氣則愈不與風寒濕氣合故不為痹帝曰善痹或痛或不痛或不仁或寒或熱或燥或濕其故何也岐伯曰痛者寒氣多也有寒故痛也風寒濕氣客於肉分之間迫切而為沫得寒則聚聚則排分肉肉裂則痛故有寒則痛也其不痛不仁者病久入深榮衛之行澀經絡時疏故不通新校正云按甲乙經不通作不痛詳甲乙經此條論不痛與不仁兩事後言不痛是載眀不痛之為重也皮膚不營故為不仁不仁者皮頏不知有無也其寒者陽氣少陰氣多與病相益故寒也病本生於風寒濕氣故陰氣益之也其熱者陽氣多陰氣少病氣勝陽遭陰故為痹熱遭遇也言遇於陰氣陰氣不勝故為熱新校正云按甲乙經遭作乘其多汗而濡者此其逢濕甚也陽氣少陰氣盛兩氣相感故汗出而濡也中表相應則相感也帝曰夫痹之為病不痛何也岐伯曰痹在於骨則重在於脈則血凝而不流在於筋則屈不伸在於肉則不仁在皮則寒故具此五者則不痛也凡痹之類逢寒則蟲逢熱則縱帝曰善蟲謂皮中如蟲行縱謂縱緩不相就新校正云按甲乙經蟲作急痿論篇黃帝問曰五藏使人痿何也痿謂痿弱無力以運動岐伯對曰肺主身之皮毛心主身之血脈肝主身之筋膜新校正云按全元起本云膜者人皮下肉上筋膜也脾主身之肌肉腎主身之骨髓所主不同痿生亦各歸其所主故肺熱葉焦則皮毛虛弱急薄著則生痿躄也躄謂攣躄足不得伸以行也肺熱則腎受熱氣故爾躄必亦切心氣熱則下脈厥而上上則下脈虛虛則生脈痿樞折挈脛縱而不任地也心熱盛則火獨光火獨光則內炎上腎之脈常下行今火盛而上炎用事故腎脈亦隨火炎爍而逆上行也陰氣厥逆火復內燔陰上隔陽下不守位心氣通脈故生脈痿腎氣主足故膝腕樞紐如折去而不相提挈脛筋縱緩而不能任用於地也肝氣熱則膽泄口苦筋膜乾筋膜乾則筋急而攣發為筋痿膽約肝葉而汁味至苦故肝熱則膽液滲泄膽病則口苦今膽液滲泄故口苦也肝主筋膜故熱則筋膜乾而攣急發為筋痿也八十一難經曰膽在肝短葉間下脾氣熱則胃乾而渴肌肉不仁發為肉痿脾與胃以膜相連脾氣熱則胃液滲泄故乾而渴也脾主肌肉今熱薄於內故肌肉不仁而發為肉痿腎氣熱則腰脊不舉骨枯而髓減發為骨痿腰為腎府又腎脈上股內貫脊屬腎故腎氣熱則腰脊不舉也腎主骨髓故熱熱則骨枯而髓減發則為骨痿也帝曰何以得之岐伯曰肺者藏之長也為心之蓋也位高而布葉於胸中是故為藏之長心之蓋有所失亡所求不得則發肺鳴鳴則肺熱葉焦志若不揚氣鬱故也肺藏氣氣鬱不利故喘息有聲而肺熱葉焦也故曰五藏因肺熱葉焦發為痿躄此之謂也肺者所以行榮衛治陰陽故引曰五藏因肺熱而發為痿躄也悲哀太甚則胞絡絶胞絡絶則陽氣內動發則心下崩數溲血也悲則心系急肺布葉舉而上焦不通榮衛不散熱氣在中故胞絡絶而陽氣內鼓動發則心下崩數溲血也心下崩謂心包內崩而下血也溲謂溺也新校正云按楊上善云胞絡者心上胞絡之脈也詳經注中胞字俱當作胞全本胞又作肌也故本病曰大經空虛發為肌痹傳為脈痿本病古經論篇名也大經謂大經脈也以心崩溲血故大經空虛脈空則熱內薄衛氣盛榮氣微故發為肌痹也先見肌痹後漸脈痿故曰傳為脈痿也思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫思想所願為祈欲也施寫勞損故為筋痿及白淫也白淫謂白物淫衍如精之狀男子溺便而下女子陰器中綿綿而下也故下經曰筋痿者生於肝使內也下經上古之經名也使內謂勞役陰力費竭精氣也有漸於濕以水為事苦有所留居處相濕肌肉濡漬痹而不仁發為肉痿業惟近濕居處澤下皆水為事也平者久而猶殆感之者尤甚矣肉屬於脾脾氣惡濕濕著肌肉則衛氣不榮故為肉痿也故下經曰肉痿者得之濕地也陰陽應象大論曰地之濕氣感則害皮肉筋脈此之謂害肉也有所遠行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎腎者水藏也今水不勝火則骨枯而髓虛故足不任身發為骨痿陽氣內伐謂伐腹中之陰氣也水不勝火以熱舍於腎中也故下經曰骨痿者生於大熱也腎性惡燥熱反居中熱薄骨乾故骨痿無力也帝曰何以别之岐伯曰肺熱者色白而毛敗心熱者色赤而絡脈溢肝熱者色蒼而爪枯脾熱者色黃而肉蠕動腎熱者色黑而齒稿各求藏色及所主養而命之則其應也帝曰如夫子言可矣論言治痿者獨取陽明何也岐伯曰陽明者五藏六府之海陽明胃脈也胃為水穀之海主潤宗筋宗筋主束骨而利機關也宗筋謂陰髦中橫骨上下之堅筋也上絡胸腹下貫髖尻又經於背腹上頭項故云宗筋主束骨而利機關也然腰者身之大關節所以司屈伸故曰機關髖音寬尻枯熬切衝脈者經脈之海也靈樞經曰衝脈者十二經之海主滲灌溪谷與陽明合於宗筋尋此則橫骨上下齊兩傍竪筋正宗筋也衝脈循腹俠齊傍各同身寸之五分而上陽明脈亦俠齊傍各同身寸之一寸五分而上宗筋脈於中故云與陽明合於宗筋也以為十二經海故主滲灌溪谷也肉之大會為谷小會為溪新校正云詳宗筋脈於中一作宗筋總於中陰陽總宗筋之會會於氣街而陽明為之長皆屬於帶脈而絡於督脈宗筋聚會會於橫骨之中從上而下故云陰陽總宗筋之會總宗筋俠齊下合於橫骨陽明輔其外衝脈居其中故云會於氣街而陽明為之長也氣街則陰髦兩傍脈動處也帶脈者起於季脅回身一周而絡於督脈也督脈者起於關元上下循腹故云皆屬於帶脈而絡於督脈也督脈任脈衝脈三脈者同起而異行故經文或參差而引之故陽明虛則宗筋縱帶脈不引故足痿不用也陽明之脈從缺盆下乳內廉下俠齊至氣街中其支别者起胃下口循腹裏下至氣街中而合以下髀抵伏菟下入膝臏中下循胻外廉下足跗入中指內間其支别者下膝三寸而别以下入中指外間故陽明虛則宗筋縱緩帶脈不引而足痿弱不可用也引謂牽引臏音牝帝曰治之奈何岐伯曰各補其滎而通其俞調其虛實和其逆順筋脈骨肉各以其時受月則病已矣帝曰善時受月謂受氣時月也如肝王甲乙心王丙丁脾王戊己肺王庚辛腎王壬癸皆王氣法也時受月則正謂五常受氣月也黃帝內經素問補注釋文卷之二十六

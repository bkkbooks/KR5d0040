body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤陰陽應象大論篇黃帝曰陰陽者天地之道也謂變化生成之道也老子曰萬物負陰而抱陽冲氣以為和易繫辭曰一陰一陽之謂道此之謂也萬物之綱紀滋生之用也陽與之正氣以生陰為之主持以立故為萬物之綱紀也陰陽離合論曰陽與之正陰為之主則謂此也變化之父母異類之用也何者然鷹化為鳩田鼠化為鴽腐草化為螢雀入大水為蛤雉入大水為蜃如此皆異類因變化而成者也生殺之本始寒暑之用也萬物假陽氣溫而生因陰氣寒而死故知生殺本始是陰陽之所運為也神明之府也府官府言所以生殺變化之多端者何哉以神明居其中也下文曰天地之動靜神明為之綱紀故易繫辭曰陰陽不測之謂神亦謂居其中也新校正云詳陰陽至神明之府與天元紀大論同注頗異治病必求於本陰陽與萬類生殺變化猶然在於人身同相參合故治病之道必先求之故積陽為天積陰為地言陰陽為天地之道者何以此陰靜陽躁言應物類運用之標格也陽生陰長陽殺陰藏明前天地生殺之殊用也神農曰天以陽生陰長地以陽殺陰藏新校正云詳陰長陽殺之義或者疑之按周易八卦布四方之義則可見矣坤者陰也位西南隅時在六月七月之交萬物之所盛長也安謂陰無長之理乾者陽也位戌亥之分時在九月十月之交萬物之所收殺也孰謂陽無殺之理以是明之陰長陽殺之理可見矣此語又見天元紀大論其說自異矣陽化氣陰成形明前萬物滋生之綱紀也寒極生熱熱極生寒明前之大體也寒氣生濁熱氣生清言正氣也清氣在下則生飧泄濁氣在上則生䐜脹熱氣在下則穀不化故飧泄寒氣在上則氣不散故䐜脹何者以陰靜而陽躁也䐜昌真切肉脹起也此陰陽反作病之逆從也反謂反覆作謂作務反覆作務則病如是故清陽為天濁陰為地地氣上為雲天氣下為雨雨出地氣雲出天氣陰凝上結則合以成雲陽散下流則注而為雨雨從雲以施化故言雨出地雲憑氣以交合故言雲出天天地之理且然人身清濁亦如是也故清陽出上竅濁陰出下竅氣本乎天者親上氣本乎地者親下各從其類也上竅謂耳目鼻口下竅謂前陰後陰清陽發腠理濁陰走五藏腠理謂滲泄之門故清陽可以散發五藏為包藏之所故濁陰可以走之滲所禁切清陽實四支濁陰歸六府四支外動故清陽實之六府內化故濁陰歸之水為陰火為陽水寒而靜故為陰火熱而躁故為陽陽為氣陰為味氣惟散布故陽為之味曰從形故陰為之味歸形形歸氣氣歸精精歸化形食味故味歸形氣養形故形歸氣精食氣故氣歸精化生精故精歸化故下文曰精食氣形食味氣化則精生味和則形長故云食之也化生精氣生形精微之液惟血化而成形質之有資氣行營立故斯二者各奉生乎味傷形氣傷精過其節也精化為氣氣傷於味精承化養則食氣精若化生則不食氣精血內結鬱為穢腐攻胃則五味倨然不得入也女人重身精化百日皆傷於味也陰味出下竅陽氣出上竅味有質故下流於便寫之竅氣無形故上出於呼吸之門味厚者為陰薄為陰之陽氣厚者為陽薄為陽之陰陽為氣氣厚者為純陽陰為味味厚者為純陰故味薄者為陰中之陽氣薄者為陽中之陰味厚則泄薄則通氣薄則發泄厚則發熱陰氣潤下故味厚則泄利陽氣炎上故氣厚則發熱味薄為陰少故通泄氣薄為陽少故汗出發泄謂汗出也壯火之氣衰少火之氣壯火之壯者壯已必衰火之少者少已則壯壯火食氣氣食少火壯火散氣少火生氣氣生壯火故云壯火食氣少火滋氣故云氣食少火以壯火食氣故氣得壯火則耗散以少火益氣故氣得少火則生長人之陽氣壯少亦然氣味辛甘發散為陽酸苦涌泄為陰非惟氣味分正陰陽然辛甘酸苦之中復有陰陽之殊氣爾何者辛散甘緩故發散為陽酸收苦泄故涌泄為陰也陰勝則陽病陽勝則陰病勝則不病不勝則病陽勝則熱陰勝則寒是則太過而致也新校正云按甲乙經作陰病則熱陽病則寒文異意同重寒則熱重熱則寒物極則反亦猶壯火之氣衰少火之氣壯也寒傷形熱傷氣寒則衛氣不利故傷形熱則榮氣內消故傷氣雖陰成形陽化氣一過其節則形氣破蕩氣傷痛形傷腫氣傷則熱結於肉分故痛形傷則寒薄於皮腠故腫故先痛而後腫者氣傷形也先腫而後痛者形傷氣也先氣證而病形故曰氣傷形先形證而病氣故曰形傷氣風勝則動風勝則庶物皆搖故為動新校正云按左傳曰風淫末疾即此義也熱勝則腫熱勝則陽氣內鬱故洪腫暴作甚則榮氣逆於肉理聚為癰膿之腫燥勝則乾燥勝則津液竭涸故皮膚乾燥寒勝則浮寒勝則陰氣結於玄府玄府閉密陽氣內攻故為浮濕勝則濡寫濕勝則內攻於脾胃脾胃受濕則水穀不分水穀相和故大腸傳道而注寫也以濕內盛而寫故謂之濡寫新校正按左傳曰雨淫腹疾則其義也風勝則動至此五句與六元正紀大論文重彼注頗詳天有四時五行以生長收藏以生寒暑燥濕風春生夏長秋收冬藏謂四時之生長收藏冬水寒夏火暑秋金燥春木風長夏土濕謂五行之寒暑濕燥風也然四時之氣土雖寄王原其所主則濕屬中央故云五行以生寒暑燥濕風五氣也人有五藏化五氣以生喜怒悲憂恐五藏謂肝心脾肺腎五氣謂喜怒悲憂恐然是五氣更傷五藏之和氣矣新校正云按天元紀大論悲作思又本篇下文肝在志為怒心在志為喜脾在志為思肺在志為憂腎在志為恐玉機真藏論作悲諸論不同皇甫士安甲乙經精神五藏篇具有其說蓋言悲者以悲能勝怒取五志迭相勝而為言也舉思者以思為脾之志也各舉之則義俱不足兩見之則互相成義也故喜怒傷氣寒暑傷形喜怒之所生皆生於氣故云喜怒傷氣寒暑之所勝皆勝於形故云寒暑傷形近取諸凡則如斯矣細而言者則熱傷於氣寒傷於形暴怒傷陰暴喜傷陽怒則氣上喜則氣下故暴卒氣上則傷陰暴卒氣下則傷陽厥氣上行滿脉去形厥氣逆也逆氣上行滿於經絡則神氣浮越去離形骸矣喜怒不節寒暑過度生乃不固靈樞經曰智者之養生也必順四時而適寒暑和喜怒而安居處然喜怒不常寒暑過度天真之氣何可久長故重陰必陽重陽必陰言傷寒傷暑亦如是故曰冬傷於寒春必病溫夫傷於四時之氣皆能為病以傷寒為毒者最為殺厲之氣中而即病故曰傷寒不即病者寒毒藏於肌膚至春變為溫病至夏變為暑病故養生者必愼傷於邪也春傷於風夏生飧泄風中於表則內應於肝肝氣乘脾故飱泄新校正云按生氣通天論云春傷於風邪氣留連乃為洞泄夏傷於暑秋必痎瘧夏暑已甚秋熱復收兩熱相攻故為痎瘧痎瘦也秋傷於濕冬生咳嗽秋濕既多冬水復王水濕相得肺氣又衰故冬寒甚則為嗽新校正云按生氣通天論云秋傷於濕上逆而咳發為痿厥帝曰余聞上古聖人論理人形列别藏府端絡經脉會通六合各從其經氣穴所發各有處名溪谷屬骨皆有所起分部逆從各有條理四時陰陽盡有經紀外內之應皆有表裏其信然乎六合謂十二經脉之合也靈樞經曰太陰陽明為一合少陰太陽為一合厥陰少陽為一合手足之脉各三則為六合也手厥陰則心包絡脉也氣穴論曰肉之大會為谷肉之小會為溪肉分之間溪谷之會以行榮衛以會大氣屬骨者為骨相連屬處表裏者諸陽經脉皆為表諸陰經脉皆為裏新校正云詳帝曰至信其然乎全元起本及太素在上古聖人之教也上岐伯對曰東方生風陽氣上騰散為風也風者天之號令風為教始故生自東方風生木風鼓木榮則風生木也木生酸凡物之味酸者皆木氣之所生也尚書洪範曰曲直作酸酸生肝生謂生長也凡味之酸者皆先生長於肝肝生筋肝之精氣生養筋也筋生心陰陽書曰木生火然肝之木氣內養筋已乃生心火肝主目目見曰明類齊同也其在天為玄玄謂玄冥言天色高遠尚未盛明也在人為道道謂道化以道而化人則歸從在地為化化謂造化也庶類時育皆造化者也化生五味萬物生五味具皆變化為母而使生成也道生智智從正化而有故曰道生智玄生神玄冥之內神處其中故曰玄生神神在天為風飛揚鼓拆風之用也然發而周遠無所不通信乎神化而能爾在地為木柔軟曲直木之性也新校正云詳其在天至為木與天元紀大論同注頗異在體為筋束絡連綴而為力也在臟為肝其神魂也道經義曰魂居肝魂靜則至道不亂在色為蒼蒼謂薄青色象木色也在音為角角謂木音調而直也樂記曰角亂則憂其民怨在聲為呼呼謂叫呼亦謂之嘯在變動為握握所以牽就也新校正云按楊上善云握憂噦咳栗五者改志而有名曰變動也在竅為目目所以司見形色也在味為酸酸可用收斂也在志為怒怒所以禁非也怒傷肝怒傷肝者雖志為怒甚則自傷悲勝怒悲勝怒者悲則肺金并於肝木故勝怒也宣明五藏氣篇曰精氣并於肺則悲新校正云詳五志云怒喜思憂恐悲當云憂今變憂為悲者蓋以恚憂而不解則傷意悲哀而動中則傷魂故不云憂也風傷筋風勝則筋絡拘急新校正云按五運行大論曰風傷肝燥勝風燥為金氣故勝木風酸傷筋酸傷筋者過節也辛勝酸辛勝酸者辛金味故勝木酸也南方生熱陽氣炎爍故生熱熱生火鑽燧改火惟熱是生火生苦凡物之味苦者皆火氣之所生也尚書洪範曰炎上作苦苦生心凡味之苦者皆先生長於心心生血心之精氣生養血也血生脾陰陽書曰火生土然心火之氣內養血已乃生脾土新校正云按太素血作脉心主舌心别是非舌以言事故主舌其在天為熱暄暑熾燠熱之用也在地為火炎上翕赩火之性也赩許極切在體為脉通行榮衛而養血也在藏為心其神神也道經義曰神處心神守則血氣流通在色為赤象火也在音為徵徵謂火音和而美也樂記曰徵亂則哀其事勤在聲為笑笑喜聲也在變動為憂憂可以成務新校正云按楊上善云心之憂在心變動肺之憂在肺之志是則肺主於秋憂為正也而心主於夏變而生憂也在竅為舌舌所以司辨五味也金匱真言論曰南方赤色入通於心開竅於耳尋其為竅則舌義便乖以其主味故云舌也在味為苦在志為喜在味為苦者苦可用燥泄也在志為喜者喜所以和樂也喜傷心雖志為喜甚則自傷恐勝喜恐則腎水并於心火故勝喜也宣明五氣篇曰精氣并於腎則恐熱傷氣熱勝則喘息促急寒勝熱寒為水氣故勝火熱苦傷氣以火生也新校正云詳此篇論所傷之㫖其例有三東方云風傷筋酸傷筋中央云濕傷肉甘傷肉是自傷者也南方云熱傷氣苦傷氣北方云寒傷血鹹傷血是傷已所勝西方云熱傷皮毛是被勝傷已辛傷皮毛是自傷者也凡此五方所傷有此三例不同太素則俱云自傷鹹勝苦鹹水味故勝火苦中央生濕陽氣盛薄陰氣固升升薄相合故生濕也易義曰陽上薄陰陰能固之然後蒸而為雨眀濕生於固陰之氣也新校正云按楊上善云六月四陽二陰合蒸以生濕氣也濕生土土濕則固明濕生也新校正云按楊上善云四陽二陰合而為濕蒸腐萬物成土也土生甘凡物之味甘者皆土氣之所生也尚書洪範曰稼穡作甘甘生脾甘生脾者凡味之甘者皆先生長於脾脾生肉脾生肉者脾之精氣生養肉也肉生肺肉生肺者陰陽書曰土生金然脾土之氣內養肉已乃生肺金脾主口脾受水穀口納五味故主口其在天為濕霧露雲雨濕之用也在地為土安靜稼穡土之德也在體為肉覆裹筋骨充其形也在藏為脾其神意也道經義曰意托脾意寧則智無散越在色為黃象土色也在音為宫宫謂土音大而和也樂記曰宫亂則荒其君驕在聲為歌歌嘆聲也在變動為噦噦謂噦噫胃寒所生新校正云詳王謂噦為噦噫噫非噦也按楊上善云噦氣泝也噦乙劣切噫烏界切在竅為口口所以司納水穀在味為甘甘可用寬緩也在志為思思所以知遠也思傷脾雖志為思甚則自傷怒勝思怒則不思勝可知矣濕傷肉脾主肉而惡濕故濕勝則肉傷風勝濕風為木氣故勝土濕甘傷肉亦過節也新校正云按五運行大論云甘傷脾酸勝甘酸木味故勝土甘西方生燥天氣急切故生燥燥生金金燥有聲則生金也金生辛凡物之味辛者皆金氣之所生也尚書洪範曰從革作辛辛生肺凡味之辛者皆先生長於肺肺生皮毛肺之精氣生養皮毛皮毛生腎陰陽書曰金生水然肺金之氣養皮毛已乃生腎水肺主鼻肺藏氣鼻通息故主鼻其在天為燥輕急徑强燥之用也在地為金堅徑從革金之性也在體為皮毛包藏膚腠捍其邪也在藏為肺其神魄也道經義曰魄神肺魄安則德修壽延在色為白白者象金色也在音為商商謂金聲輕而徑也樂記曰商亂則陂其官壞在聲為哭哭哀聲也在變動為咳咳謂咳嗽所以利咽喉也在竅為鼻鼻所以司嗅呼吸在味為辛辛可用散潤也在志為憂憂深慮也憂傷肺雖志為憂過則損也喜勝憂喜則心火并於肺金故勝憂也宣明五氣篇曰精氣并於心則喜熱傷皮毛熱從火生耗津液故也寒勝熱陰制陽也新校正云按太素作燥傷皮毛熱勝燥又按王注五運行大論云火有二别故此再舉熱傷之形證辛傷皮毛過而招損也苦勝辛苦火味故勝金辛也北方生寒陰氣凝冽故生寒也寒生水寒氣盛凝變為水也水生鹹凡物之味鹹者皆水氣之所生也尚書洪範曰潤下作鹹鹹生腎凡味之鹹者皆先生長於腎腎生骨髓腎之精氣生養骨髓髓生肝陰陽書曰水生木然腎水之氣養骨髓已乃生肝木腎主耳腎屬北方位居幽暗聲入故主耳其在天為寒凝清慘冽寒之用也在地為水清潔潤下水之用也在體為骨端直貞幹以立身也在藏為腎其神志也道經義曰志藏腎志營則骨髓滿實在色為黑象水色也在音為羽羽謂水音沉而深也樂記曰羽亂則危其音匱在聲為呻呻吟聲也在變動為栗栗謂戰栗甚寒大恐而悉有之在竅為耳耳所以司聽五音新校正云按金匱真言論云開竅於二陰蓋以心寄竅於耳故與此不同在味為鹹鹹可用柔耎也在志為恐恐所以懼惡也恐傷腎恐而不已則內感於腎故傷也靈樞經曰恐懼而不解則傷精明感腎也思勝恐思深慮遠則見事源故勝恐也寒傷血寒則血凝傷可知也新校正云按太素血作骨也燥勝寒燥從熱生故勝寒也新校正云按太素燥作濕也鹹傷血食鹹而渴傷血可知新校正云按太素血作骨甘勝鹹甘土味故勝水鹹新校正云詳自前岐伯對曰至此與五運行論同兩注頗異當并用之故曰天地者萬物之上下也觀其覆載而萬物之上下可知矣陰陽者血氣之男女也陰主血陽主氣陰生女陽生男左右者陰陽之道路也陰陽間氣左右循環故左右為陰陽之道路也新校正云詳間氣之說貝六微㫖大論中楊上善云陰氣右行陽氣左行謂此也水火者陰陽之徵兆也觀水火之氣則陰陽徵兆可明矣陰陽者萬物之能始也謂能為變化生成之元始新校正云詳天地者至萬物之能始與天元紀大論同注頗異彼無陰陽者血氣之男女一句又以金木者生成之終始代陰陽者萬物之能始故曰陰在內陽之守也陽在外陰之使也陰靜故為陽之鎮守陽動故為陰之役使帝曰法陰陽奈何岐伯曰陽勝則身熱腠理閉喘粗為之俯仰汗不出而熱齒乾以煩冤腹滿死能冬不能夏陽勝故能冬熱甚故不能夏能奴代切下能夏形能并同上陰勝則身寒汗出身常清數栗而寒寒則厥厥則腹滿死厥謂氣逆能夏不能冬陰勝故能夏寒甚故不能冬此陰陽更勝之變病之形能也帝曰調此二者奈何調謂順天癸性而治身之血氣精氣也岐伯曰能知七損八益則二者可調不知用此則早衰之節也用謂房色也女子以七七為天癸之終丈夫以八八為天癸之極然知八可益知七可損則各隨氣分修養天真終其天年以度百歲上古天真論曰女子二七天癸至月事以時下丈夫二八天癸至精氣溢寫然陰七可損則海滿而血自下陽八宜益交會而泄精由此則七損八益理可知矣年四十而陰氣自半也起居衰矣內耗故陰减中乾故氣力始衰靈樞經曰人年四十腠理始疏榮華稍落髮斑白由此之節言之亦起居衰之次也年五十體重耳目不聰明矣衰之漸也年六十陰痿氣大衰九竅不利下虛上實涕泣俱出矣衰之甚矣故曰知之則强不知則老知謂知七損八益全形保性之道也故同出而名異耳同謂同於好欲異謂異其老壯之名智者察同愚者察異智者察同欲之間而能性道愚者見形容别異方乃效之自性則道益有餘放效則治生不足故下文曰放妃兩切愚者不足智者有餘先行故有餘後學故不足有餘則耳目聰明身體輕强老者復壯壯者益治夫保性全形蓋由知道之所致也故曰道者不可斯須離可離非道此之謂也是以聖人為無為之事樂恬淡之能從欲快志於虛無之守故壽命無窮與天地終此聖人之治身也聖人不為無益以害有益不為害性而順性故壽命長遠與天地終庚桑楚曰聖人之於聲色滋味也利於性則取之害於性則損之此全性之道也書曰不作無益害有益也天不足西北故西北方陰也而人右耳目不如左明也在上故法天地不滿東南故東南方陽也而人左手足不如右强也在下故法地帝曰何以然岐伯曰東方陽也陽者其精并於上并於卜則上明而下虛故使耳目聰明而手足不便也西方陰也陰者其精并於下并於下則下盛而上虛故其耳目不聰明而手足便也故俱感於邪其在上則右甚在下則左甚此天地陰陽所不能全也故邪居之夫陰陽之應天地猶水之在器也器圓則水圓器曲則水曲人之血氣亦如是故隨不足則邪氣留居之并去聲故天有精地有形天有八紀地有五里陽為天降精氣以施化陰為地布和氣以成形五行為生育之井里八風為變化之綱紀八紀謂八歲之紀五里謂五行化育之里故能為萬物之父母陽天化氣陰地成形五里運行八風鼓折收藏生長無替時宜夫如是故能為萬物變化之父母也清陽上天濁陰歸地所以能為萬物之父母者何以有是之升降也是故天地之動靜神明為之綱紀清陽上天濁陰歸地然其動靜誰所主司蓋由神明之綱紀爾上文曰神明之府此之謂也故能以生長收藏終而復始神明之運為乃能如是惟賢人上配天以養頭下象地以養足中傍人事以養五藏頭圓故配天足方故象地人事更易五藏遞遷故從而養也天氣通於肺居高故也地氣通於嗌次下故也嗌伊昔切風氣通於肝風生木故也雷氣通於心雷象火之有聲故也谷氣通於脾谷空虛脾受納故也雨氣通於腎腎主水故新校正云按千金方云風氣應於肝雷氣動於心穀氣感於脾雨潤於腎六經為川流注不息故腸胃為海以皆受納也靈樞經曰胃為水穀之海九竅為水注之氣清明者象水之內明流注者象水之流注以天地為之陰陽以人事配象則近指天地以為陰陽陽之汗以天地之雨名之夫人汗泄於皮腠者是陽氣之發泄爾然其取類於天地之間則雲騰雨降而相似也故曰陽之汗以天地之雨名之陽之氣以天地之疾風名之陽氣散發疾風飛揚故以應之舊經無名之二字尋前類例故加之暴風象雷暴風鼓擊鳴轉有聲故也逆氣象陽逆氣凌上陽氣亦然故治不法天之紀不用地之理則災害至矣背天之紀違地之理則六經反作五氣更傷真氣既傷則災害之至可知矣新校正云按上文天有八紀地有五里此文注中理字當作里故邪風之至疾如風雨至謂至於身形故善治者治皮毛止於萌也其次治肌膚救其已生其次治筋脉攻其已病也其次治六府治其已甚也其次治五藏治五藏者半死半生也治其已成神農曰病勢已成可得半愈然初成者獲愈固久者伐形故治五藏者半生半死也故天之邪氣感則害人五藏四時之氣八正之風皆天邪也金匱真言論曰八風發邪以為經風觸五藏邪氣發病故天之邪氣感則害人五藏水穀之寒熱感則害於六府熱傷胃及膀胱寒傷腸及膽氣地之濕氣感則害皮肉筋脉濕氣勝則榮衛之氣不行故感則害皮肉筋脉故善用針者從陰引陽從陽引陰以右治左以左治右以我知彼以表知裏以觀過與不及之理見微得過用之不殆深明故也善診者察色按脉先别陰陽别於陽者則知病處别於陰者則知死生之期審清濁而知部分謂察色之青赤黃白黑也部分謂藏府之位可占候處視喘息聽音聲而知所苦謂聽聲之宫商角徵羽也視喘息謂候呼吸之長短也觀權衡規矩而知病所主權謂稱權衡謂星衡規謂圓形矩謂方象然權也者所以察中外衡也者所以定高卑規也者所以表柔虛矩也者所以明强盛脉要精微論曰以春應中規言陽氣柔軟以夏應中矩言陽氣盛强以秋應中衡言陰升陽降氣有高下以冬應中權言陽氣居下也故善診之用必備見焉所主者謂應四時之氣所主生病之在高下中外也按尺寸觀浮沉滑澀而知病所生以治浮沉滑潘皆脉象也浮脉者浮於手下也沉脉者按之乃得也滑脉者往來易潘脉者往來難故審尺寸觀浮沉而知病之所生以治之也新校正云按甲乙經作知病所在以治則無過下無過二字續此為句潘音色無過以診則不失矣有過無過皆以診之則所主治無誤失也故曰病之始起也可刺而已以輕微也其盛可待衰而已病盛取之毀傷真氣故其盛者必可待衰故因其輕而揚之輕者發揚則邪去因其重而減之重者即減去之因其衰而彰之因病氣衰攻令邪去則真氣堅固血色彰明形不足者溫之以氣精不足者補之以味氣謂衛氣味謂五藏之味也靈樞經曰衛氣者所以溫分肉而充皮膚肥腠理而司開闔故衛氣溫則形分足矣上古天真論曰腎者主水受五藏六府之精而藏之故五藏盛方能寫由此則精不足者補五藏之味也其高者因而越之越謂越揚也其下者引而竭之引謂泄引也中滿者寫之於內內謂腹內其有邪者漬形以為汗邪謂風邪之氣風中於表則汗而發之漬疾賜切其在皮者汗而發之在外故汗發泄也其慓悍者按而收之慓疾也悍利也氣候疾利則按之以收斂也慓必遙切悍音汗其實者散而寫之陽實則發散陰實則宣寫故下文云審其陰陽以别柔剛陰曰柔陽曰剛陽病治陰陰病治陽所謂從陰引陽從陽引陰以右治左以左治右者也定其血氣各守其鄉鄉謂本經之氣位血實宜决之决謂决破其血氣虛宜𤙲引之𤙲讀為導導引則氣行條暢新校正云按甲乙經𤙲作掣黃帝內經素問補注釋文卷之五

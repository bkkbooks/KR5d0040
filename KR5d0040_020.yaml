front:
  text: 黃帝內經素問補注釋文卷之二十終六
  hash: sha256:73fb5602d719a8a0ab1f918cc6fcedceeb33f6585ede86fbb5f3ee3e03a6bb3b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_020-001a, image: hfl/0653/0653-004.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤通評虛實論篇黃帝問曰何謂虛實岐伯對曰邪氣盛則實精氣奪則虛奪謂精氣減少如奪去也帝曰虛實何如言五藏虛實之大體也岐伯曰氣虛者肺虛也氣逆者足寒也非其時則生當其時則死非時謂年直之前後也當時謂正直之年也餘藏皆如此五藏同帝曰何謂重實岐伯曰所謂重實者言大熱病氣熱脈滿是謂重實帝曰經絡俱實何如何以治之岐伯曰經絡皆實是寸脈急而尺緩也皆當治之故曰滑則從澀則逆也脈急謂脈口也夫虛實者皆從其物類始故五藏骨肉滑利可以長久也物之生則滑利物之死則枯澀故澀為逆滑為從從謂順也帝曰絡氣不足經氣有餘何如岐伯曰絡氣不足經氣有餘者脈口熱而尺寒也秋冬為逆春夏為從治主病者春夏陽氣高故脈口熱尺中寒為順也十二經十五絡各隨左右而有太過不足工當尋其至中應以施針艾故云治主病者也帝曰經虛絡滿何如岐伯曰經虛絡滿者尺熱滿脈口寒澀也此春夏死秋冬生也秋冬陽氣下故尺中熱脈口寒為順也帝曰治此者奈何岐伯曰絡滿經虛灸陰刺陽經滿絡虛刺陰灸陽以陰分主絡陽分主經故耳帝曰何謂重虛此反問前重實也岐伯曰脈氣上虛尺虛是謂重虛言尺寸脈俱虛新校正云按甲乙經作脈虛氣虛尺虛是謂重虛此少一虛字多一上字王注言尺寸脈俱虛則不兼氣虛也詳前熱病氣熱脈滿為重實此脈虛氣虛尺虛為重虛是脈與氣俱實為重實俱虛為重虛不但尺寸俱虛為重虛也帝曰何以治之岐伯曰所謂氣虛者言無常也尺虛者行步恇然寸虛則脈動無常尺虛則行步恇然不足新校正云按楊上善云氣虛者稟中氣不定也王謂寸虛則脈動無常非也脈虛者不象陰也不象太陰之候也何以言之氣口者脈之要會手太陰之動也如此者滑則生澀則死也帝曰寒氣暴上脈滿而實何如言氣熱脈滿已謂重實滑則從澀則逆今氣寒脈滿亦可謂重實乎其於滑澀生死逆從何如岐伯曰實而滑則生實而逆則死逆謂澀也新校正云詳王氏以逆為澀大非古文簡略辭多互文上言滑而下言逆舉滑則從可知言逆則澀可見非謂逆為澀也帝曰脈實滿手足寒頭熱何如岐伯曰春秋則生冬夏則死大略言之夏手足寒非病也是夏行冬令夏得則冬死冬脈實滿頭熱亦非病也是冬行夏令冬得則夏亡反冬夏以言之則皆不死春秋得之是病故生死皆在時之孟月也脈浮而澀澀而身有熱者死新校正云按甲乙經移續於此舊在後帝曰形度骨度脈度筋度何以知其度也下對問義不相類王氏頗知其錯簡而不知皇甫士安嘗移附於此今去後條移從於此帝曰其形盡滿何如岐伯曰其形盡滿者脈急大堅尺澀而不應也形盡滿謂四形藏盡滿也新校正云按甲乙經太素澀作滿如是者從則生逆則死帝曰何謂從則生逆則死岐伯曰所謂從者手足溫也所謂逆者手足寒也帝曰乳子而病熱脈懸小者何如懸謂如懸物之動也岐伯曰手足溫則生寒則死新校正云按太素無手字楊上善云足溫氣下故生足寒氣不下者逆而致死帝曰乳子中風熱喘鳴肩息者脈何如岐伯曰喘鳴肩息者脈實大也緩則生急則死緩謂如縱緩急謂如弦張之急非往來之緩急也正理傷寒論曰緩則中風故乳子中風脈緩則生急則死帝曰腸澼便血何如岐伯曰身熱則死寒則生熱為血敗故死寒為榮氣在故生帝曰腸澼下白沫何如岐伯曰脈沉則生脈浮則死陰病而見陽脈與證相反故死帝曰腸澼下膿血何如岐伯曰脈懸絶則死滑大則生帝曰腸澼之屬身不熱脈不懸絶何如岐伯曰滑大者曰生懸澀者曰死以藏期之肝見庚辛死心見壬癸死肺見丙丁死腎見戊己死脾見甲乙死是謂以藏期之帝曰癲疾何如岐伯曰脈搏大滑久自已脈小堅急死不治脈小堅急為陰陽病而見陰脈故死不治新校正云按巢元方云脈沉小急實死不治小牢急亦不可治帝曰癲疾之脈虛實何如岐伯曰虛則可治實則死以反證故帝曰消疸虛實何如岐伯曰脈實大病久可治脈懸小堅病久不可治久病血氣衰脈不當實大故不可治新校正云詳經言實大病久可治注意以為不可治按甲乙經太素全元起本并云可治又按巢元方云脈數大者生細小浮者死又云沉小者生實牢大者死疸徒丹切牢病也帝曰形度骨度脈度筋度何以知其度也形度具三備經筋度脈度骨度并具在靈樞經中此問亦合在彼經篇首錯簡也一經以此問為逆從論首非也帝曰春亟治經絡夏亟治經俞秋亟治六府冬則閉塞閉塞者用藥而少針石也亟猶急也閉塞謂氣之門户閉塞也所謂少針石者非癰疽之謂也冬月雖氣門閉塞然癰疽氣烈內作大膿不急寫之則爛筋腐骨故雖冬月亦宜針石以開除之癰疽不得頃時回所以癰疽之病冬月猶得用針石者何此病頃時回轉之間過而不寫則內爛筋骨穿通藏府癰不知所按之不應手乍來乍已刺手太陰傍三痏與纓脈各二但覺似有癰疽之候不的知發在何處故按之不應手也乍來乍已言不定痛於一處也手太陰傍足陽明脈謂胸部氣户等六穴之分也纓脈亦足陽明脈也近纓之脈故曰纓脈纓謂冠帶也以有左右故云各二掖癰大熱刺足少陽五刺而熱不止刺手心主三刺手太陰經絡者大骨之會各三大骨會肩也謂肩貞穴在肩髃後骨解間陷者中暴癰筋緛隨分而痛魄汗不盡胞氣不足治在經俞癰若暴發隨脈所過筋怒緛急肉分中痛汗液滲泄如不盡兼胞氣不足者悉可以本經脈穴俞補寫之新校正云按此二條舊散在篇中今移使相從腹暴滿按之不下取太陽經絡者胃之募也太陽為手太陽也手太陽經絡之所生故取中脘穴即胃之募也中誥曰中脘胃募也居蔽骨與齊之中手太陽少陽足陽明脈所生故云經絡者胃募也新校正云按甲乙經云取太陽經絡血者則已無胃之募也等字又楊上善注云足太陽其説各不同未知孰是少陰俞去脊椎三寸傍五用員利針謂取足少陰俞外去脊椎三寸兩傍穴各五痏也少陰俞謂第十四椎下兩傍腎之俞也新校正云按甲乙經云用員利針刺已如食頃久立已必視其經之過於陽者數刺之霍亂刺俞傍五霍亂者取少陰俞傍志室穴新校正云按楊上善云刺主霍亂俞傍五取之足陽明及上傍三足陽明言胃俞也取胃俞兼取少陰俞外兩傍向上第三穴則胃倉穴也刺癇驚脈五謂陽陵泉在膝上外陷者中也針手太陰各五刺經太陽五刺手少陰經絡傍者一足陽明一上踝五寸刺三針經太陽謂足太陽也手太陰五謂魚際穴在手大指本節後內側散脈經太陽五謂承山穴在足腨腸下分肉間陷者中也手少陰經絡傍者謂支正穴在腕後同身寸之五寸骨上廉肉分間手太陽絡别走少陰者足陽明一者謂解溪穴在足腕上陷者中也上踝五寸謂足少陽絡光明穴按內經明堂中誥圖經悉主霍亂各具明文新校正云按别本注云悉不主霍亂未詳所謂又按甲乙經太素刺癇驚脈五至此為刺驚癇王注為刺霍亂者王注非也凡治消疸仆擊偏枯痿厥氣滿發逆肥貴人則高梁之疾也隔則閉絶上下不通則暴憂之病也暴厥而聾偏塞閉不通內氣暴薄也不從內外中風之病故瘦留著也跖跛寒風濕之病也消謂內消疸謂伏熱厥謂氣逆高膏也梁粱也跖謂足也夫肥者令人熱中甘者令人中滿故熱氣內薄發為消渴偏枯氣滿逆也逆者謂違背常候與平人異也然愁憂者氣閉塞而不行故隔塞否閉氣脈斷絶而上下不通也氣固於內則大小便道偏不得通泄也何者藏府氣不化禁固而不宣散故爾外風中人伏藏不去則陽氣內受為熱外燔肌肉消爍故留薄肉分消瘦而皮膚著於筋骨也濕勝於足則筋不利寒勝於足則攣急風濕寒勝則衛氣結聚衛氣結聚則肉痛故足跛而不可履也跖之石切黃帝曰黃疸暴痛癲疾厥狂久逆之所生也五藏不平六府閉塞之所生也頭痛耳鳴九竅不利腸胃之所生也足之三陽從頭走足然久厥逆而不下行則氣怫積於上焦故為黃疸暴痛癲狂氣逆矣食飲失宜吐利過節故六府閉塞而令五藏之氣不和平也腸胃否塞則氣不順序氣不順序則上下中外互相勝負故頭痛耳鳴九竅不利也太陰陽明論篇黃帝問曰太陰陽明為表裏脾胃脈也生病而異者何也脾胃藏府皆合於土病生而異故問不同岐伯對曰陰陽異位更虛更實更逆更從或從內或從外所從不同故病異名也脾藏為陰胃府為陽陽脈下行陰脈上行陽脈從外陰脈從內故言所從不同病異名也新校正云按楊上善云春夏陽明為實太陰為虛秋冬太陰為實陽明為虛即更實更虛也春夏太陰為逆陽明為從秋冬陽明為逆太陰為從即更逆更從也帝曰願聞其異狀也岐伯曰陽者天氣也主外陰者地氣也主內是所謂陰陽異位也故陽道實陰道虛是所謂更實更虛也故犯賊風虛邪者陽受之食飲不節起居不時者陰受之是所謂或從內或從外也陽受之則入六府陰受之則入五藏入六府則身熱不時卧上為喘呼入五藏則䐜滿閉塞下為飧泄久為腸澼是所謂所從不同病異名也故喉主天氣咽主地氣故陽受風氣陰受濕氣同氣相求爾故陰氣從足上行至頭而下行循臂至指端陽氣從手上行至頭而下行至足是所謂更逆更從也靈樞經曰手之三陰從藏走手手之三陽從手走頭足之三陽從頭走足足之三陰從足走腹所行而異故更逆更從也故曰陽病者上行極而下陰病者下行極而上此言其大凡爾然足少陰脈下行則不同諸陰之氣也故傷於風者上先受之傷於濕者下先受之陽氣炎上故受風陰氣潤下故受濕蓋同氣相合故爾帝曰脾病而四支不用何也岐伯曰四支皆稟氣於胃而不得至經新校正云按太素至經作徑至楊上善云胃以水穀資四支不能徑至四支要因於脾得水穀津液營衛於四支必因於脾乃得稟也脾氣布化水穀精液四支乃可以稟受也今脾病不能為胃行其津液四支不得稟水穀氣日以衰脈道不利筋骨肌肉皆無氣以生故不用焉帝曰脾不主時何也肝主春心主夏肺主秋腎主冬四藏皆有正應而脾無正主也岐伯曰脾者土也治中央常以四時長四藏各十八日寄治不得獨主於時也脾藏者常著胃土之精也土者生萬物而法天地故上下至頭足不得主時也治主也著謂常約著於胃也土氣於四時之中各於季終寄王十八日則五行之氣各王七十二日以終一歲之日矣外主四季則在人內應於手足也帝曰脾與胃以膜相連耳新校正云按太素作以募相逆楊上善云脾陰胃陽脾內胃外其位各異故相逆也而能為之行其津液何也岐伯曰足太陰者三陰也其脈貫胃屬脾絡嗌故太陰為之行氣於三陰陽明者表也胃是脾之表也五藏六府之海也亦為之行氣於三陽藏府各因其經而受氣於陽明故為胃行其津液四支不得稟水穀氣日以益衰陰道不利筋骨肌肉無氣以生故不用焉又復明脾主四支之義也陽明脈解篇黃帝問曰足陽明之脈病惡人與火聞木音則惕然而驚鐘鼓不為動聞木音而驚何也願聞其故前篇言入六府則身熱不時卧上為喘呼然陽明者胃脈也今病不如前篇之旨而反聞木音而驚故問其異也岐伯對曰陽明者胃脈也胃者土也故聞木音而驚者土惡木也陰陽書曰木剋土故土惡木也帝曰善其惡火何也岐伯曰陽明主肉其脈新校正云按甲乙經脈作肌血氣盛邪客之則熱熱甚則惡火帝曰其惡人何也岐伯曰陽明厥則喘而惋惋則惡人惋熱內鬱故惡人煩新校正云按脈解云欲獨閉户牖而處何也陰陽相摶陽盡陰盛故獨閉户牖而處惋烏貫切帝曰或喘而死者或喘而生者何也岐伯曰厥逆連藏則死連經則生經謂經脈藏謂五神藏所以連藏則死者神去故也帝曰善病甚則棄衣而走登高而歌或至不食數日逾垣上屋所上之處皆非其素所能也病反能者何也素本也逾垣謂驀墻也怪其稍異於常踰音豫岐伯曰新校正云按脈解云陰陽爭而外并於陽四支者諸陽之本也陽盛則四支實實則能登高也陽受氣於四支故四支為諸陽之本也帝曰其棄衣而走者何也棄不用也岐伯曰熱盛於身故棄衣欲走也帝曰其妄言罵詈不避親疏而歌者何也岐伯曰陽盛則使人妄言罵詈不避親疏而不欲食不欲食故妄走也足陽明胃脈下鬲屬胃絡脾足太陰脾脈入腹屬脾絡胃上鬲俠咽連舌本散舌下故病如是黃帝內經素問補注釋文卷之二十

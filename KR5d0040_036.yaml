front:
  text: 黃帝內經素問補注釋文卷之三十六今一
  hash: sha256:ac58e942d8b07e5ddfb2791d163e066b010fa1ebce501d93fe5191c8734c53f6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_036-001a, image: hfl/0656/0656-004.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤調經論篇黃帝問曰余聞刺法言有餘寫之不足補之何謂有餘何謂不足岐伯對曰有餘有五不足亦有五帝欲何問帝曰願盡聞之岐伯曰神有餘有不足氣有餘有不足血有餘有不足形有餘有不足志有餘有不足凡此十者其氣不等也神屬心氣屬肺血屬肝形屬脾志屬腎以各有所宗故不等也帝曰人有精氣津液四支九竅五藏十六部三百六十五節乃生百病百病之生皆有虛實今夫子乃言有餘有五不足亦有五何以生之乎針經曰兩神相薄合而成形常先身生是謂精上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣腠理發泄汗出腠理是謂津津之滲於空竅留而不行者為液也十六部者謂手足二九竅九五藏五合為十六部也三百六十五節者非謂骨節是神氣出入之處也針經曰所謂節之交三百六十五會皆神氣出入遊行之所非骨節也言人身所有則多所舉則少病生之數何以論之岐伯曰皆生於五藏也謂五神藏也夫心藏神肺藏氣肝藏血脾藏肉腎藏志而此成形言所以病皆生於五臟者何哉以內臟五神而成形也志意通內連骨髓而成身形五臟志意者通言五神之大凡也骨髓者通言表裏之成化也言五神通泰骨髓化成身形既立乃五臟互相為有矣新校正云按甲乙經無五臟二字五臟之道皆出於經隧以行血氣血氣不和百病乃變化而生是故守經隧焉隧潛道也經脈伏行而不見故謂之經隧焉血氣者人之神邪侵之則血氣不正血氣不正故變化而百病乃生矣然經脈者所以決死生處百病調虛實故守經隧焉新校正云按甲乙經經隧作經渠義各同帝曰神有餘不足何如岐伯曰神有餘則笑不休神不足則悲心之藏也針經曰心藏脈脈舍神心氣虛則悲實則笑不休也悲一為憂誤也新校正云詳王注云悲一為憂誤也按甲乙經及太素并全元起注本并作憂皇甫士安云心虛則悲悲則憂心實則笑笑則喜夫心之與肺脾之與心互相成也故喜發於心而成於肺思發於脾而成於心一過其節則二臟俱傷楊上善云心之憂在心變動也肺之憂在肺之志是則肺主秋憂為正也心主於夏變而生憂也血氣未并五臟安定邪客於形灑淅起於毫毛未入於經絡也故命曰神之微并謂并合也未與邪合故曰未并也灑淅寒貌也始起於毫毛尚在於小絡神之微病故命曰神之微也新校正云按甲乙經灑淅作悽厥太素作洫泝楊上善云洫毛孔也水逆流曰泝謂邪氣入於腠理如水逆流於洫帝曰補寫奈何岐伯曰神有餘則寫其小絡之血出血勿之深斥無中其大經神氣乃平邪入小絡故可寫其小絡之脈出其血勿深推針針深則傷肉以邪居小絡故不欲令針中大經也絡血既出神氣自平斥推也小絡孫絡也針經曰經脈為裏支而橫者為絡絡之别者為孫絡平謂平調也新校正云詳此注引針經曰與三部九候論注兩引之在彼云靈樞而此曰針經則王氏之意指靈樞為針經也按今素問注中引針經者多靈樞之文但以靈樞今不全故未得盡知也神不足者視其虛絡按而致之刺而利之無出其血無泄其氣以通其經神氣乃平但通經脈令其和利抑按虛絡令其氣致以神不足故不欲出血及泄氣也新校正云按甲乙經按作切利作和帝曰刺微奈何覆前初起於毫毛未入於經絡者岐伯曰按摩勿釋著針勿斥移氣於不足神氣乃得復按摩其病處手不釋散著針於病處亦不推之使其人神氣內朝於針移其人神氣令自充足則微病自去神氣乃得復常新校正云按甲乙經及太素云移氣於足無不字楊上善云按摩使氣至於踵也帝曰善氣有餘不足奈何岐伯曰氣有餘則喘咳上氣不足則息利少氣肺之臟也肺臟氣息不利則喘針經曰肺氣虛則鼻息利少氣實則喘喝胸憑仰息也血氣未并五臟安定皮膚微病命曰白氣微泄肺合皮其色白故皮膚微病命曰白氣微泄帝曰補寫奈何岐伯曰氣有餘則寫其經隧無傷其經無出其血無泄其氣不足則補其經隧無出其氣氣謂榮氣也針寫若傷其經則血出而榮氣泄脫故不欲出血泄氣但寫其衛氣而已針補則又宜謹閉穴俞然其衛氣亦不欲泄之新校正云按楊上善云經隧者手太陰之别從手太陰走手陽明乃是手太陰向手陽明之道欲道藏府陰陽故補寫皆從正經别走之絡寫其陰經别走之路不得傷其正經也帝曰刺微奈何覆前白氣微泄者岐伯曰按摩勿釋出針視之曰我將深之適人必革精氣自伏邪氣散亂無所休息氣泄腠理真氣乃相得亦謂按摩其病處也革皮也我將深之適人必革者謂其深而淺刺之也如是脅從則人懷懼色故精氣潛伏也以其調適於皮精氣潛伏邪無所據故亂散而無休息發泄於腠理也邪氣既泄真氣乃與皮腠相得矣新校正云按楊上善云革改也夫人聞樂至則身心欣悅聞痛及體情必改異欣悅則百體俱縱改革則情志必拒拒則邪氣消伏帝曰善血有餘不足奈何岐伯曰血有餘則怒不足則恐肝之藏也針經曰肝藏血肝氣虛則恐實則怒新校正云按全元起本恐作悲甲乙經及太素同血氣未并五臟安定孫絡外溢則經有留血絡有邪盛則入於經故云孫絡外溢則經有留血帝曰補寫奈何岐伯曰血有餘則寫其盛經出其血不足則視其虛經內針其脈中久留而視新校正云按甲乙經云久留之血至太素同脈大疾出其針無令血泄脈盛滿則血有餘故出之經氣虛則血不足故無令血泄也久留疾出是謂補之針解論曰徐而疾則實義與此同帝曰刺留血奈何岐伯曰視其血絡刺出其血無令惡血得入於經以成其疾血絡滿者刺按出之則惡色之血不得入於經脈帝曰善形有餘不足奈何岐伯曰形有餘則腹脹涇溲不利不足則四支不用脾之藏也針經曰脾氣虛則四支不用五臟不安實則腹脹涇溲不利涇大便溲小便也新校正云按楊上善云涇作經女人月經也血氣未并五臟安定肌肉蠕動命曰微風邪薄肉分衛氣不通陽氣內鼓故肉蠕動新校正云按全元起本及甲乙經蠕作溢太素作濡帝曰補寫奈何岐伯曰形有餘則寫其陽經不足則補其陽絡并謂之經絡帝曰刺微奈何岐伯曰取分肉間無中其經無傷其絡衛氣得復邪氣乃索衛氣者所以溫分肉而充皮膚肥腠理而司開闔故肉蠕動即取分肉間但開肉分以出其邪故無中其經無傷其絡衛氣復舊而邪氣盡索散盡也帝曰善志有餘不足奈何岐伯曰志有餘則腹脹飧泄不足則厥腎之藏也針經曰腎藏精精含志腎氣虛則厥實則脹脹謂脹起厥謂逆行上衝也足少陰脈下行令氣不足故隨衝脈逆行而上衝也血氣未并五臟安定骨節有動腎合骨故骨有邪薄則骨節假動或骨節之中如有物鼓動之也帝曰補寫奈何岐伯曰志有餘則寫然筋血新校正云按甲乙經及太素云寫然筋血者出其血楊上善云然筋當是然谷下筋再詳諸處引然谷者多云然骨之前血者疑少骨之二字前字誤作筋字不足則補其復溜然謂然谷足少陰滎也在內踝之前大骨之下陷者中血絡盛則泄之其刺可入同身寸之三分留三呼若灸者可灸三壯復溜足少陰經也在內踝上同身寸之二寸陷者中刺可入同身寸之三分留三呼若灸者可灸五壯帝曰刺未并奈何岐伯曰即取之無中其經邪所乃能立虛不求穴俞而直取居邪之處故云即取之新校正云按甲乙經邪所作以去其邪帝曰善余已聞虛實之形不知其何以生岐伯曰氣血以并陰陽相傾氣亂於衛血逆於經血氣離居一實一虛衛行脈外故氣亂於衛血行經內故血逆於經血氣不和故一虛一實血并於陰氣并於陽故為驚狂氣并於陽則陽氣外盛故為驚狂血并於陽氣并於陰乃為炅中氣并於陰則陽氣內盛故為熱中炅熱也血并於上氣并於下心煩惋善怒血并於下氣并於上亂而喜忘上謂鬲上下謂鬲下帝曰血并於陰氣并於陽如是血氣離居何者為實何者為虛岐伯曰血氣者喜溫而惡寒寒則泣不能流溫則消而去之泣謂如雪在水中凝住而不行去也是故氣之所并為血虛血之所并為氣虛氣并於血則血少故血虛血并於氣則氣少故氣虛帝曰人之所有者血與氣耳今夫子乃言血并為虛氣并為虛是無實乎岐伯曰有者為實無者為虛氣并於血則血無血并於氣則氣無故氣并則無血血并則無氣今血與氣相失故為虛焉氣并於血則血失其氣血并於氣則氣失其血故曰血與氣相失絡之與孫脈俱輸於經血與氣并則為實焉血之與氣并走於上則為大厥厥則暴死氣復反則生不反則死帝曰實者何道從來虛者何道從去虛實之要願聞其故岐伯曰夫陰與陽皆有俞會陽注於陰陰滿之外陰陽勻平以充其形九候若一命曰平人平人謂平和之人夫邪之生也或生於陰或生於陽其生於陽者得之風雨寒暑其生於陰者得之飲食居處陰陽喜怒帝曰風雨之傷人奈何岐伯曰風雨之傷人也先客於皮膚傳入於孫脈孫脈滿則傳入於絡脈絡脈滿則輸於大經脈血氣與邪并客於分腠之間其脈堅大故曰實實者外堅充滿不可按之按之則痛帝曰寒濕之傷人奈何岐伯曰寒濕之中人也皮膚不收新校正云按全元起云不收不仁也甲乙經及太素云皮膚收無不字肌肉堅緊榮血泣衛氣去故曰虛虛者聶辟氣不足按之則氣足以溫之故快然而不痛聶謂聶皺辟謂辟疊也新校正云按甲乙經作攝辟太素作攝辟帝曰善陰之生實奈何實謂邪氣盛也岐伯曰喜怒不節則陰氣上逆上逆則下虛下虛則陽氣走之故曰實矣新校正云按經云喜怒不節則陰氣上逆疑剩喜字帝曰陰之生虛奈何虛謂精氣奪也岐伯曰喜則氣下悲則氣消消則脈虛空因寒飲食寒氣熏滿新校正云按甲乙經作動臟則血泣氣去故曰虛矣帝曰經言陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒余已聞之矣不知其所由然也經言謂上古經言也岐伯曰陽受氣於上焦以溫皮膚分肉之間今寒氣在外則上焦不通上焦不通則寒氣獨留於外故寒栗栗謂振栗也帝曰陰虛生內熱奈何岐伯曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通新校正云按甲乙經作下焦不通胃氣熱熱氣熏胸中故內熱甚用其力致勞倦也貪役不食故穀氣不盛也帝曰陽盛生外熱奈何岐伯曰上焦不通利則皮膚緻密腠理閉塞玄府不通新校正云按甲乙經及太素無玄府二字衛氣不得泄越故外熱外傷寒毒內薄諸陽寒外盛則皮膚收皮膚收則腠理密故衛氣蓄聚無所流行矣寒氣外薄陽氣內爭積火內燔故生外熱也帝曰陰盛生內寒奈何岐伯曰厥氣上逆寒氣積於胸中而不寫不寫則溫氣去寒獨留則血凝泣凝則脈不通新校正云按甲乙經作腠理不通其脈盛大以澀故中寒溫氣謂陽氣也陰逆內滿則陽氣去於皮外也帝曰陰與陽并血氣以并病形以成刺之奈何岐伯曰刺此者取之經隧取血於營取氣於衛用形哉因四時多少高下營主血陰氣也衛主氣陽氣也夫行針之道必先知形之長短骨之廣狹循三備法通計身形以施分寸故曰用形也四時多少高下具在下篇帝曰血氣以并病形以成陰陽相傾補寫奈何岐伯曰寫實者氣盛乃內針針與氣俱內以開其門如利其户針與氣俱出精氣不傷邪氣乃下外門不閉以出其疾搖大其道如利其路是謂大寫必切而出大氣乃屈言欲開其穴而泄其氣也切謂急也言急出其針也針經論曰疾而徐則虛者疾出針而徐按之也大氣謂大邪氣也屈謂退屈也帝曰補虛奈何岐伯曰持針勿置以定其意候呼內針氣出針入針空四塞精無從去方實而疾出針氣入針出熱不得還閉塞其門邪氣布散精氣乃得存動氣候時新校正云按甲乙經作動無後時近氣不失遠氣乃來是謂追之言但密閉穴俞勿令其氣散泄也近氣謂已至之氣遠氣謂未至之氣也欲動經氣而為補補者皆必候水刻氣之所在而刺之是謂得時而調之追言補也針經曰追而濟之安得無實則此謂也帝曰夫子言虛實者有十生於五臟五臟五脈耳夫十二經脈皆生其病新校正云按甲乙經云皆生百病太素同今夫子獨言五臟夫十二經脈者皆絡三百六十五節節有病必被經脈經脈之病皆有虛實何以合之岐伯曰五臟者故得六府與為表裏經絡支節各生虛實其病所居隨而調之從其左右經氣支節而調之病在脈調之血脈者血之府脈實血實脈虛血虛由此脈病而調之血也新校正云按全元起本及甲乙經云病在血調之也病在血調之絡血病則絡脈易故調之於絡也病在氣調之衛衛主氣故氣病而調之衛也病在肉調之分肉候寒熱而取之病在筋調之筋適緩急而刺尉之病在骨調之骨察輕重而調之燔針劫刺其下及與急者調筋法也筋急則燒針而劫刺之病在骨焠針藥尉調骨法也焠針火針也病不知所痛兩蹻為上兩蹻謂陰陽蹻脈陰蹻之脈出於照海陽蹻之脈出於申脈申脈在足外踝下陷者中容爪甲新校正云按刺腰痛注云在踝下五分刺可入同身寸之三分留六呼若灸者可灸三壯照海在足內踝下刺可入同身寸之四分留六呼若灸者可灸三壯身形有痛九候莫病則繆刺之莫病謂無病也繆刺者刺絡脈左痛刺右右痛刺左痛在於左而右脈病者巨刺之巨刺者刺經脈脈左痛刺右右痛刺左必謹察其九候針道備矣黃帝內經素問補注釋文卷之三十六

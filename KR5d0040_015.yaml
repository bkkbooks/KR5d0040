  text: 黃帝內經素問補注釋文卷之十五終一
  hash: sha256:f52daf9c14c29896f170692ea7da0bca5db5840b1fb9a54c8d3aebf8849ee506
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_015-001a, image: hfl/0652/0652-004.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤玉機真藏論篇黃帝問曰春脈如弦何如而弦岐伯對曰春脈者肝也東方木也萬物之所以始生也故其氣來耎弱輕虛而滑端直以長故曰弦言端直而長狀如弦也新校正云按越人云春脈弦者東方木也萬物始生未有枝葉故其脈來濡弱而長四時經輕作寬反此者病反謂反常平之候帝曰何如而反岐伯曰其氣來實而強此謂太過病在外其氣來不實而微此謂不及病在中氣餘則病形於外氣少則病在於中也新校正云按吕廣云實強者陽氣盛也少陽當微弱今更實強謂之太過陽處表故令病在外厥陰之氣養於筋其脈弦今更虛微故曰不及陰處中故令病在內帝曰春脈太過與不及其病皆何如岐伯曰太過則令人善忘忽忽眩冒而巔疾其不及則令人胸痛引背下則兩脅胠滿忽忽不爽也眩謂目昡視如轉也冒謂冒悶也胠謂腋下脅也忘當為怒字之誤也靈樞經曰肝氣實則怒肝厥陰脈自足而上入毛中又上貫鬲布脅肋循喉嚨之後上入頏顙上出額與督脈會於巔故病如是新校正云按氣交變大論云木太過甚則忽忽善怒眩冒巔疾則忘當作怒帝曰善夏脈如鈎何如而鈎岐伯曰夏脈者心也南方火也萬物之所以盛長也故其氣來盛去衰故曰鈎言其脈來盛去衰如鈎之曲也新校正云按越人云夏脈鈎者南方火也萬物之所盛垂枝布葉皆下曲如鈎故其脈來疾去遲吕廣云陽盛故來疾陰虛故去遲脈從下上至寸口疾還尺中遲也反此者病帝曰何如而反岐伯曰其氣來盛去亦盛此謂太過病在外其脈來盛去盛是陽之盛也心氣有餘是為太過其氣來不盛去反盛此謂不及病在中新校正云詳越人云肝心肺腎四藏脈俱以強實為太過虛微為不及與素問不同帝曰夏脈太過與不及其病皆何如岐伯曰太過則令人身熱而膚痛為浸淫其不及則令人煩心上見咳唾下為氣泄心少陰脈起於心中出屬心系下鬲絡小腸又從心系却上肺故心太過則身熱膚痛而浸淫流布於形分不及則心煩上見咳唾下為氣泄帝曰善秋脈如浮何如而浮岐伯曰秋脈者肺也西方金也萬物之所以收成也故其氣來輕虛以浮來急去散故曰浮脈來輕虛故名浮也來急以陽未沉下去散以陰氣上升也新校正云按越人云秋脈毛者西方金也萬物之所終草木華葉皆秋而落其枝獨在若毫毛也故其脈來輕虛以浮故曰毛反此者病帝曰何如而反岐伯曰其氣來毛而中央堅兩傍虛此謂太過病在外其氣來毛而微此謂不及病在中帝曰秋脈太過與不及其病皆何如岐伯曰太過則令人逆氣而背痛愠愠然其不及則令人喘呼吸少氣而咳上氣見血下聞病音肺太陰脈起於中焦下絡大腸還循胃口上鬲屬肺從肺系橫出腋下復藏氣為咳主喘息故氣盛則肩背痛氣逆不及則喘息變易呼吸少氣而咳上氣見血也下聞病音謂喘息則肺中有聲也帝曰善冬脈如營何如而營脈沉而深如營動也新校正云詳深一作濡又作摶按本經下文云其氣來沉以摶則深字當為搏又按甲乙經摶字為濡當從甲乙經為得何以言之脈沉而濡濡古軟字乃冬脈之平調脈若沉而摶擊於手則冬脈之太過脈也故言當從甲乙經濡字岐伯曰冬脈者腎也北方水也萬物之所以合藏也故其氣來沉以搏故曰營言沉而摶擊於手也新校正云按甲乙經摶當作濡義如前説又越人云冬脈石者北方之水也萬物之所藏盛冬之時水凝如石故其脈來沉濡而滑故曰石也反此者病帝曰何如而反岐伯曰其氣來如彈石者此謂太過病在外其去如數者此謂不及病在中帝曰冬脈太過與不及其病皆何如岐伯曰太過則令人解㑊新校正云按解㑊之義具第五卷注脊脈痛而少氣不欲言其不及則令人心懸如病飢䏚中清脊中痛少腹滿小便變腎少陰脈自股內後廉貫脊屬腎絡膀胱其直行者從腎上貫肝鬲入肺中循喉嚨俠舌本其支别者從肺出絡心注胸中故病如是也眇者季脅之下俠脊兩傍空軟處也腎外當䏚故䏚中清冷也帝曰善帝曰四時之序逆從之變異也脈春弦夏鈎秋浮冬營為逆順之變見異狀也然脾脈獨何主主謂主時月岐伯曰脾脈者土也孤藏以灌四傍者也納水穀化津液溉灌於肝心肺腎也以不正主四時故謂之孤藏溉古代切帝曰然則脾善惡可得見之乎岐伯曰善者不可得見惡者可見不正主時寄王於四季故善不可見惡可見也帝曰惡者何如可見岐伯曰其來如水之流者此謂太過病在外如鳥之喙者此謂不及病在中新校正云按平人氣象論云如烏之喙又别本喙作啄帝曰夫子言脾為孤藏中央土以灌四傍其太過與不及其病皆何如岐伯曰太過則令人四支不舉以主四支故病不舉其不及則令人九竅不通名曰重強脾之孤藏以灌四傍今病則五藏不和故九竅不通也八十一難經曰五藏不和則九竅不通重謂藏氣重疊強謂氣不和順帝瞿然而起再拜而稽首曰善吾得脈之大要天下至數五色脈變揆度奇恆道在於一瞿然忙貌也言以太過不及而一貫之揆度奇恆皆通也神轉不回回則不轉乃失其機五氣循環不愆時序是為神氣流轉不回若却行衰王反天之常氣是則却回而不轉由是却回不轉乃失生氣之機矣至數之要迫近以微得至數之要道則應用切近以微妙也迫切也著之玉版藏之藏府每旦讀之名曰玉機著之玉版故以為名言是玉版生氣之機新校正云詳至數至名曰玉機與前玉版論要文相重彼注頗詳五藏受氣於其所生傳之於其所勝氣舍於其所生死於其所不勝病之且死必先傳行至其所不勝病乃死受氣所生者謂受病氣於已之所生者也傳所勝者謂傳於己之所剋者也氣舍所生者謂舍於生己者也死所不勝者謂死於剋己者之分位也所傳不順故必死焉此言氣之逆行也故死所為逆者次如下説肝受氣於心傳之於脾氣舍於腎至肺而死心受氣於脾傳之於肺氣舍於肝至腎而死脾受氣於肺傳之於腎氣舍於心至肝而死肺受氣於腎傳之於肝氣舍於脾至心而死腎受氣於肝傳之於心氣舍於肺至脾而死此皆逆死也一日一夜五分之此所以占死生之早暮也肝死於肺位秋庚辛餘四仿此然朝主甲乙晝主丙丁四季上主戊己晡主庚辛夜主壬癸由此則死生之早暮可知也新校正云按甲乙經生作者名曰蠱當此之時可按可藥弗治腎傳之心病筋脈相引而急病名曰瘛腎不足則水不生水不生則筋燥急故相引也陰氣內弱陽氣外燔筋脈受熱而自跳掣故名曰瘛當此之時可灸可藥弗治滿十曰法當死至心而氣極則如是矣若復傳行當如下説腎因傳之心心即復反傳而行之肺發寒熱法當三歲死因腎傳心心不受病即而復反傳與肺金肺已再傷故寒熱也三歲者肺至腎一歲腎至肝一歲肝至心一歲火又乘肺故云三歲死此病之次也謂傳勝之次第然其卒發者不必治於傳不必依傳之次故不必以傳治之或其傳化有不以次不以次入者憂恐悲喜怒令不得以其次故令人有大病矣憂恐悲喜怒發無常分觸遇則發故令病氣亦不次而生因而喜大虛則腎氣乘矣喜則心氣移於肺心氣不守故腎氣乘矣宣明五氣篇曰精氣并於心則喜怒則肝氣乘矣怒則氣逆故肝氣乘脾悲則肺氣乘矣悲則肺氣移於肝肝氣受邪故肺氣乘矣宣明五氣篇曰精氣并於肺則悲恐則脾氣乘矣恐則腎氣移於心腎氣不守故脾氣乘矣宣明五氣篇曰精氣并於腎則恐憂則心氣乘矣憂則肝氣移於脾肝氣不守故心氣乘矣宣明五氣篇曰精氣并於肝則憂此其道也此其不次之常道故病有五五五二十五變反其傳化五藏相并而各五之五而乘之則二十五變也然其變化以勝相傳傳而不次變化多端新校正云按陰陽别論云凡陽有五五五二十五陽義與此通傳乘之名也言傳者何相乘之異名爾大骨枯稿大肉陷下胸中氣滿喘息不便其氣動形期六月死真藏脈見乃豫之期日皮膚乾著骨間肉陷謂大骨枯稿大肉陷下也諸附骨際及空窳處亦同其類也胸中氣滿喘息不便是肺無主也肺司治節氣息由之其氣動形為無氣相接故聳舉肩背以遠求報氣矣夫如是皆形藏已敗神藏亦傷見是證者期後一百八十日內死矣候見真藏之脈乃與死日之期爾真藏脈診下經備矣此肺之藏也窳音愈大骨枯稿大肉陷下胸中氣滿喘息不便內痛引肩項期一月死真藏見乃豫之期日火精外出陽氣上燔金受火災故內痛肩項如是者期後三十日內死此心之藏也大骨枯稿大肉陷下胸中氣滿喘息不便內痛引肩項身熱脫肉破䐃真藏見十月之內死陰氣微弱陽氣內燔故身熱也䐃者肉之標脾主肉故肉如脫盡䐃如破敗也見斯證者期後三百日內死䐃謂肘膝後肉如塊者此脾之藏也䐃渠殞切大骨枯稿大肉陷下肩髓內消動作益衰真藏來見期一歲死見其真藏乃豫之期日肩髓內消謂缺盆深也衰於動作字云占死者之早暮詳此經文專為言氣之逆行也故死即不言生之早暮王氏改者作生義不若甲乙經中素問本文黃帝曰五藏相通移皆有次五藏有病則各傳其所勝以上文逆傳而死故言是逆傳所勝之次也新校正云詳逆傳所勝之次逆當作順上文既言逆傳下文所言乃順傳之次也不治法三月若六月若三日若六日傳五藏而當死是順傳所勝之次三月者謂一藏氣之遷移六月者謂至其所勝之位三日者三陽之數以合日也六日者謂兼三陰以數之爾熱論曰傷寒一日巨陽受二日陽明受三日少陽受四日太陰受五日少陰受六日厥陰受則其義也新校正云詳上文是順傳所勝之次七字乃是次前注誤在此經文之下不惟無義兼校之全元起本素問及甲乙經并無此七字直去之慮未達者致疑今存於注故曰别於陽者知病從來别於陰者知死生之期主辨三陰三陽之候則知中風邪氣之所不勝矣故下曰新校正云詳舊此段注寫作經合改為注又按陰陽别論云别於陽者知病處也别於陰者知死生之期又云别於陽者知病忌時别於陰者知死生之期義同此言知至其所困而死困謂至所不勝也上文曰死於其所不勝是故風者百病之長也言先百病而有之新校正云按生氣通天論云風者百病之始今風寒客於人使人毫毛畢直皮膚閉而為熱客謂客止於人形也風擊皮膚寒勝腠理故毫毛畢直玄府閉密而熱生也當是之時可汗而發也邪在皮毛故可汗泄也陰陽應象大論曰善治者治皮毛此之謂也或痹不仁腫痛病生而變故如是也熱中血氣則𤸷痹不仁寒氣傷形故為腫痛陰陽應象大論云寒傷形熱傷氣氣傷痛形傷腫當是之時可湯尉及火灸刺而去之皆謂釋散寒邪宣揚正氣弗治病入舍於肺名曰肺痹發咳上氣邪入諸陰則病而為痹故入於肺名曰痹焉宣明五氣論曰邪入於陽則狂邪入於陰則痹肺在變動為咳故咳則氣上故上氣也弗治肺即傳而行之肝病名曰肝痹一名曰厥脅痛出食肺金伐木氣下入肝故曰弗治行之肝也肝氣通膽膽善為怒怒者氣逆故一名厥也肝厥陰脈從少腹屬肝絡膽上貫鬲布脅肋循喉嚨之後上入頏顙故脅痛而食入腹則出故曰出食當是之時可按若刺耳弗治肝傳之脾病名曰脾風發疸腹中熱煩心出黃肝氣應風木勝脾土土受風氣故曰脾風蓋為風氣通肝而為名也脾之為病善發黃疸故發疸也脾太陰脈入腹屬脾絡胃上鬲俠咽連舌本散舌下其支别者復從胃别上鬲注心中故腹中熱而煩心出黃色於便寫之所也當此之時可按可藥可浴弗治脾傳之腎病名曰疝瘕少腹冤熱而痛出白一名曰蠱腎少陰脈自股內後廉貫脊屬腎絡膀胱故少腹冤熱而痛溲出白液也冤熱內結消鑠脂肉如蟲之食日內損削故一交接漸微以餘藏尚全故期後三百六十五日內死此腎之藏也新校正云按全元起本及甲乙經真藏來見來字當作未字之誤也大骨枯稿大肉陷下胸中氣滿腹內痛心中不便項肩身熱破䐃脫肉目匡陷真藏見目不見人立死其見人者至其所不勝之時則死木生其火肝氣通心脈抵少腹上布脅肋循喉嚨之後上入頏顙故腹痛心中不便肩項身熱破䐃脫肉也肝主目故目匡陷及不見人立死也不勝之時謂於庚辛之月此肝之藏也急虛身中卒至五藏絶閉脈道不通氣不往來譬於墮溺不可為期言五藏相移傳其不勝則可待真藏脈見乃與死日之期卒急虛邪中於身內則五藏絶閉脈道不通氣不往來譬於墮墜沒溺不可與為死日之期也其脈絶不來若人一息五六至其形肉不脫真藏雖不見猶死也是則急虛卒至之脈新校正云按人一息脈五六至何得為死必息字誤息當作呼乃是真肝脈至中外急如循刀刃責責然如按琴瑟弦色青白不澤毛折乃死真心脈至堅而搏如循薏苡子纍纍然色赤黑不澤毛折乃死真肺脈至大而虛如以毛羽中人膚色白赤不澤毛折乃死真腎脈至搏而絶如指彈石辟辟然色黑黃不澤毛折乃死真脾脈至弱而乍數乍疏色黃青不澤毛折乃死諸真藏脈見者皆死不治也新校正云按楊上善云無餘物和雜故名真也五藏之氣皆胃氣和之不得獨用如至剛不得獨用獨用則折和柔用之即固也五藏之氣和於胃氣即得長生若真獨見必死欲知五藏真見為死和胃為生者於寸口診即可知見者如弦是肝脈也微弦為平和微弦謂二分胃氣一分弦氣俱動為微弦三分并是弦而無胃氣為見真藏餘四藏準此黃帝曰見真藏曰死何也岐伯曰五藏者皆稟氣於胃胃者五藏之本也胃為水穀之海故五藏稟焉藏氣者不能自致於手太陰必因於胃氣乃至於手太陰也平人之常稟氣於胃胃氣者平人之常氣故藏氣因胃乃能至於手太陰也新校正云詳平人之常至下平人之常氣本平人氣象論文王氏引注此經按甲乙經云人常稟氣於胃脈以胃氣為本與此小異然甲乙之文為得故五藏各以其時自為而至於手太陰也自為其狀至於手太陰也故邪氣勝者精氣衰也故病甚者胃氣不能與之俱至於手太陰故真藏之氣獨見獨見者病勝藏也故曰死是所謂脈無胃氣也平人氣象論曰人無胃氣曰逆逆者死帝曰善新校正云詳自黃帝問至此一節全元起本在第四卷太陰陽眀表裏篇中王冰移於此處必言此者欲明王氏之功於素問多矣黃帝曰凡治病察其形氣色澤脈之盛衰病之新故乃治之無後其時欲必先時而取之形氣相得謂之可治氣盛形盛氣虛形虛是相得也色澤以浮謂之易已氣色浮潤血氣相營故易已脈從四時謂之可治脈春弦夏鈎秋浮冬營謂順四時從順也脈弱以滑是有胃氣命曰易治取之以時侯可取之時而取之則萬舉萬全當以四時血氣所在而為療爾新校正云詳取之以時甲乙經作治之趨之無後其時與王氏之文兩通形氣相失謂之難治形盛氣虛氣盛形虛皆相失也色夭不澤謂之難已夭謂不明而惡不澤謂枯燥也脈實以堅謂之益甚脈實以堅是邪氣盛故益甚也脈逆四時為不可治以氣逆故矣上四句是謂四難所以下文曰必察四難而明告之此四粗之所易語工之所難為所謂逆四時者春得肺脈夏得腎脈秋得心脈冬得脾脈其至皆懸絶沉澀者命曰逆四時春得肺脈秋來見也夏得腎脈冬來見也秋得心脈夏來見也冬得脾脈春來見也懸絶謂如懸物之絶去也未有藏形於春夏而脈沉澀新校正云按平人氣象論云而脈瘦義與此同秋冬而脈浮大名曰逆四時也未有謂未有藏脈之形狀也病熱脈靜泄而脈大脫血而脈實病在中脈實堅病在外脈不實堅者皆難治皆難治者以其與證不相應也新校正云按平人氣象論云病在中脈虛病在外脈澀堅與此相反此經誤彼論為得自未有藏形春夏至此與平人氣象論相重注義備於彼黃帝曰余聞虛實以決死生願聞其情岐伯曰五實死五虛死五實謂五藏之實五虛謂五藏之虛帝曰願聞五實五虛岐伯曰脈盛皮熱腹脹前後不通悶瞀此謂五實實謂邪氣盛實然脈盛心也皮熱肺也腹脹脾也前後不通腎也悶瞀肝也脈細皮寒氣少泄利前後飲食不入此謂五虛虛謂真氣不足也然脈細心也皮寒肺也氣少肝也泄利前後腎也飲食不入脾也帝曰其時有生者何也岐伯曰漿粥入胃泄注止則虛者活身汗得後利則實者活此其候也全注飲粥得入於胃胃氣和調其利漸止胃氣得實虛者得活言實者得汗外通後得便利自然調平黃帝內經素問補注釋文卷之十五

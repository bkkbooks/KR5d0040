front:
  text: 黃帝內經素問補注釋文卷之十六終二
  hash: sha256:ac64cca9323fd9a44601d4acd3058b21327b16f74003ac6f6bad299e066a0d4b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_016-001a, image: hfl/0652/0652-047.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤三部九候論篇黃帝問曰余聞九針於夫子衆多博大不可勝數余願聞要道以屬子孫傳之後世著之骨髓藏之肝肺歃血而受不敢妄泄歃血飲血也令合天道新校正云按全元起本云令合天地必有終始上應天光星辰歷紀下副四時五行貴賤更立冬陰夏陽以人應之奈何願聞其方天光謂日月星也歷紀謂日月行歷於天二十八宿三百六十五度之分紀也言以人形血氣榮衛周流合時候之遷移應日月之行道然斗極旋運黃赤道差冬時日依黃道近南故陰多夏時月依黃道近北故陽盛也夫四時五行之氣以王者為貴相者為賤也岐伯對曰妙乎哉問也此天地之至數道貫精微故云妙問至數謂至極之數也帝曰願聞天地之至數合於人形血氣通决死生為之奈何岐伯曰天地之至數始於一終於九焉九奇數也故天地之數斯為極矣一者天三者地三者人因而三之三三者一以應九野爾雅曰邑外為郊郊外為甸甸外為牧牧外為林林外為坰坰外為野言其遠也新校正云詳王引爾雅為證與今爾雅或不同已具前六節藏象論注中坰古螢切故人有三部部有三候以决死生以處百病以調虛實而除邪疾所謂三部者言身之上中下部非謂寸關尺也三部之內經隧由之故察候存亡悉因於是針之補寫邪疾可除也帝曰何謂三部岐伯曰有下部有中部有上部部各有三候三候者有天有地有人也必指而導之乃以為真言必當咨受於帥也徵四失論曰受師不卒妄作雜術謬言為道更名自功妄用砭石後遺身咎此其誡也禮曰疑事無質質成也上部天兩額之動脉在額兩傍動應於手足少陽脉氣所行也上部地兩頰之動脉在鼻孔下兩傍近於巨髎之分動應於手足陽明脉氣之所行上部人耳前之動脉在耳前陷者中動應於手手少陽脉氣之所行也中部天手太陰也謂肺脉也在掌後寸口中是謂經渠動應於手中部地手陽明也謂大腸脉也在手大指次指歧骨間合谷之分動應於手也中部人手少陰也謂心脉也在掌後鋭骨之端神門之分動應於手也靈樞經持針縱捨論問曰少陰無輸心不病乎對曰其外經病而藏不病故獨取其經於掌後鋭骨之端正謂此也下部天足厥陰也謂肝脉也在毛際外羊矢下一寸半陷中五里之分卧而取之動應於手也女子取太衝在足大指本節後二寸陷中是下部地足少陰也謂腎脉也在足內踝後跟骨上陷中大溪之分動應手下部人足太陰也謂脾脉也在魚腹上越筋間直五里下箕門之分寬鞏足單衣沉取乃得之而動應於手也候胃氣者當取足跗之上衝陽之分穴中脉動乃應手也新校正云詳自上部天至此一段舊在當篇之末文不相接此正謂三部九候宜處於斯今依皇甫謐甲乙經編次例自篇末移置此故下部之天以候肝足厥陰脉行其中也地以候腎足少陰脉行其中也人以候脾胃之氣足太陰脉行其中也脾藏與胃以膜相連故以候脾兼候胃也帝曰中部之候奈何岐伯曰亦有天亦有地亦有人天以候肺手太陰脉當其處也地以候胸中之氣手陽明脉當其處也經云腸胃同候故以候胸中也人以候心手少陰脉當其處也帝曰上部以何候之岐伯曰亦有天亦有地亦有人天以候頭角之氣位在頭角之分故以候頭角之氣也地以候口齒之氣位近口齒故以候之人以候耳目之氣以位當耳前脉抵於目外眥故以候之三部者各有天各有地各有人三而成天新校正云詳三而成天至合為九藏與六節藏象論文重注義具彼篇三而成地三而成人三而三之合則為九九分為九野九野為九藏以是故應天地之至數故神藏五形藏四合為九藏所謂神藏者肝藏魂心藏神脾藏意肺藏魄腎藏志也以其皆神氣居之故云神藏五也所謂形藏者皆如器外張虛而不屈合藏於物故云形藏也所謂形藏四者一頭角二耳目三口齒四胸中也新校正云詳注說神藏宣明五氣篇文又與生氣通天論注六節藏象論注重五藏已敗其色必夭夭必死矣天謂死色異常之候也色者神之旗藏者神之舍故神去則藏敗藏敗則色見異常之候死也帝曰以候奈何岐伯曰必先度其形之肥瘦以調其氣之虛實實則寫之虛則補之度謂量也實寫虛補此所謂順天之道也老子曰天之道損有餘補不足也必先去其血脉而後調之無問其病以平為期血脉滿堅謂邪留止故先刺去血而後乃調之不當詢問病者盈虛要以脉氣平調為之期準爾帝曰决死生奈何度形肥瘦調氣盈虛不問病人以平為準死生之證以决之也岐伯曰形盛脉細少氣不足以息者危形氣相反故生氣至危玉機真藏論曰形氣相得謂之可治今脉氣不足形盛有餘證不相扶故當危也危者言其近死猶有生者也刺志論曰氣實形實氣虛形虛此其常也反此者病今脉細少氣是為氣弱體壯盛是為形盛形盛氣弱故生氣傾危新校正按全元起注及甲乙經脉經危并作死字形瘦脉大胸中多氣者死是則形氣不足脉氣有餘故死形瘦脉大胸中氣多形藏已傷故云死也凡如是類皆形氣不相得也形氣相得者生參伍不調者病參謂參校伍謂類伍參校類伍而有不調謂不率其常則病也三部九候皆相失者死失謂氣候不相類也相失之候診凡有七七診之狀如下文云上下左右之脉相應如參舂者病甚上下左右相失不可數者死三部九候上下左右凡十八診也如參舂者謂大數而鼓如參舂杵之上下也脉要精微論曰大則病進故病甚也不可數者謂一息十至已上也脉法曰人一呼脉再至一吸脉亦再至曰平三至曰離經四至曰脫精五至曰死六至曰命盡今相失而不可數者是過十至之外也至五尚死况至十者乎中部之候雖獨調與衆藏相失者死中部之候相減者死中部左右凡六診也上部下部已不相應中部獨調固非其久減於上下是亦氣衰故皆死也減謂偏少也新校正云詳舊云中部之候相減者死八字按全元起注本及甲乙經添之且注有解减之說而經闕其文此脫在王注之後也目內陷者死言太陽也太陽之脉起於目內眦目內陷者太陽絶也故死所以言太陽者太陽主諸陽之氣故獨言之帝曰何以知病之所在岐伯曰察九候獨小者病獨大者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病相失之候診凡有七者此之謂也然脉見七診謂參伍不調隨其獨異以言其病爾以左手足上上去踝五寸按之庶右手足當踝而彈之手足皆取之然手踝之上手太陰脉足踝之上足太陰脉足太陰脉主肉應於下部手太陰脉主氣應於中部是以下文云脫肉身不去者死中部乍踈乍數者死新校正按甲乙經及全元起注本并云以左手足當去踝五寸而按之右手當踝而彈之全元起注云內踝之上陰交之出通於膀胱系於腎腎為命門是以取之以明吉凶今文少一之字而多一庶字及足字王注以手足皆取為解殊為穿鑿當從全元起注舊本及甲乙經為正其應過五寸以上蠕蠕然者不病氣和故也其應疾中手渾渾然者病中手徐徐然者病渾渾亂也徐徐緩也其應上不能至五寸彈之不應者死氣絶故不應也是以脫肉身不去者死穀氣外衰則肉如脫盡天真內竭故身不能行真穀并衰故死之至矣去猶行去也中部乍踈乍數者死乍疏乍數氣之喪亂也故死其脉代而鈎者病在絡脉鈎謂夏脉又夏氣在絡故病在絡脉也絡脉受邪則經脉滯吝故代止也九候之相應也上下若一不得相失上下若一言遲速小大等也一候後則病二候後則病甚三候後則病危所謂後者應不俱也俱猶同也一也察其府藏以知死生之期夫病入府則愈入藏則死故死生期準察以知之必先知經脉然後知病脉經脉四時五藏之脉真藏脉見者勝死所謂真藏脉者真肝脉至中外急如循刀刃責責然如按琴瑟弦真心脉至堅而搏如循薏苡子纍纍然真脾脉至弱而乍數乍疏真肺脉至大而虛如毛羽中人膚真腎脉至搏而絶如指彈石辟辟然凡此五者皆謂得真藏脉而無胃氣也平人氣象論曰胃者平人之常氣也人無胃氣曰逆逆者死此之謂也勝死者謂勝剋於己之時則死也平人氣象論曰肝見庚辛死心見壬癸死脾見甲乙死肺見丙丁死腎見戊己死是謂勝死也足太陽氣絶者其足不可屈伸死必戴眼足太陽脉起於目內眦上額交巔上從巔入絡腦還出别下項循肩膊內俠脊抵腰中其支者復從肩膊别下貫臀過髀樞下合膕中貫腨循踵至足外側太陽氣絶死如是矣新校正云按診要經終論載三陽三陰脉終之證此獨犯足太陽氣絶一證餘應闕文也又注貫臀甲乙經作貫胂王氏注厥論刺瘧論各作貫胂又注刺腰論作貫臀詳甲乙經注臀當作胂帝曰冬陰夏陽奈何言死時也岐伯曰九候之脉皆沉細懸絶者為陰主冬故以夜半死盛躁喘數者為陽主夏故以日中死位無常居物極則反也乾坤之爻陰極則龍戰於野陽極則亢龍有悔是以陰陽極脉死於夜半日中也是故寒熱病者以平旦死亦物極則變也平曉木王木氣為風故木王之時寒熱病死生氣通天論曰因於露風乃生寒熱由此則寒熱之病風薄所為也熱中及熱病者以日中死陽之極也病風者以日夕死卯酉衝也病水者以夜半死水王故也其脉乍疏乍數乍遲乍疾者日乘四季死辰戌丑未土寄王之脾氣內絶故日乘四季而死也形肉已脫九候雖調猶死亦謂形氣不相得也證前脫肉身不去者九候雖平調亦死也七診雖見九候皆從者不死但九候順四時之令雖七診互見亦生矣從謂順從也所言不死者風氣之病及經月之病似七診之病而非也故言不死風病之脉診大而數月經之病脉小以微雖候與七診之狀略同而死生之證乃異故不死也若有七診之病其脉候亦敗者死矣言雖七診見九候從者不死若病同七診之狀而脉應敗亂縱九候皆順猶不得生也必發噦噫胃精內竭神不守心故死之時發斯噦噫宣明五氣篇曰心為噫胃為噦也必審問其所始病與今之所方病方正也言必當原其始而要終也而後各切循其脉視其經絡浮沉以上下逆從循之其脉疾者不病氣强盛故其脉遲者病氣不足故脉不往來者死精神去也皮膚著者死骨乾枯也帝曰其可治者奈何岐伯曰經病者治其經求有過者孫絡病者治其孫絡血有血留止刺而去之新校正云按甲乙經云絡病者治其絡血無二孫字血病身有痛者治其經絡靈樞經曰經脉為裏支而橫者為絡絡之别者為孫絡由是孫絡則經之别支而橫也新校正云按甲乙經無血病二字其病者在奇邪奇邪之脉則繆刺之奇謂奇繆不偶之氣而與經脉繆處也由是故繆刺之繆刺者刺絡脉左取右右取左也留瘦不移節而刺之病氣淹留形容减瘦證不移易則消息節級養而刺之此又重明前經無問其病以平為期者也上實下虛切而從之索其結絡脉刺出其血以見通之結謂血結於絡中也血去則經遂通矣前經云先去血脉而後調復明其結絡乃先去也新校正云詳經文以見通之甲乙經作以通其氣瞳子高者太陽不足戴眼者太陽已絶此决死生之要不可不察也此復明前太陽氣欲絶及已絶之候也手指及手外踝上五指留針錯簡文也黃帝內經素問補注釋文卷之十六

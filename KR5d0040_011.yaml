front:
  text: 黃帝內經素問補注釋文卷之十一慎九
  hash: sha256:300e17ff262cf071d7163c578ae78494279f6a56a413454e215173d511e556d5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_011-001a, image: hfl/0651/0651-034.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤五藏别論篇黃帝問曰余聞方士或以腦髓為藏或以腸胃為藏或以為府敢問更相反皆自謂是不知其道願聞其説方士謂明悟方術之士也言互為藏府之差異者經中猶有之矣靈蘭祕典論以腸胃為十二藏相使之次六節藏象論云十一藏取決於膽五藏生成篇云五藏之象可以類推五藏相音可以意識此則互相矛楯爾腦髓為藏應在别經楯堅久切岐伯對曰腦髓骨脈膽女子胞此六者地氣之所生也皆藏於陰而象於地故藏而不寫名曰奇恆之府腦髓骨脈雖名為府不正與神藏為表裏膽與肝合而不同六府之傳寫胞雖出納納則受納精氣出則化出形容形容之出謂化極而生然出納之用有殊於六府故言藏而不寫名曰奇恆之府也夫胃大腸小腸三焦膀胱此五者天氣之所生也其氣象天故寫而不藏此受五藏濁氣名曰傳化之府此不能久留輸寫者也言水穀入已糟粕變化而泄出不能久久留住於中但當化已輸寫令去而已傳寫諸化故曰傳化之府也魄門亦為五藏使水穀不得久藏謂肚之門也內通於肺故曰魄門受已化物則為五藏行使然水穀亦不得久藏於中所謂五藏者藏精氣而不寫也故滿而不能實精氣為滿水穀為實但藏精氣故滿而不能實新校正云按全元起本及甲乙經太素精氣作精神六府者傳化物而不藏故實而不能滿也以不藏精氣但受水穀故也所以然者水穀入口則胃實而腸虛以未下也食下則腸實而胃虛水穀下也故曰實而不滿滿而不實也帝曰氣口何以獨為五藏主氣口則寸口也亦謂脈口以寸口可候氣之盛衰故云氣口可以切脈之動靜故云脈口皆同取於手魚際之後同身寸之一寸是則寸口也岐伯曰胃者水穀之海六府之大源也人有四海水穀之海則其一也受水穀已榮養四傍以其當運化之源故為六府之大源也五味入口藏於胃以養五藏氣氣口亦太陰也氣口在手魚際之後同身寸之一寸氣口之所候脈動者是手太陰脈氣所行故言氣口亦太陰也是以五藏六府之氣味皆出於胃變見於氣口榮氣之道內穀為實新校正云詳此注出靈樞實作寶穀入與胃氣傳於肺精專者循肺氣行於氣口故云變見於氣口也新校正云按全元起本出作入故五氣入鼻藏於心肺心肺有病而鼻為之不利也凡治病必察其下適其脈觀其志意與其病也下謂目下所見可否也調適其脈之盈虛觀量志意之邪正及病深淺成敗之宜乃守法以治之也新校正云按太素作必察其上下適其脈候觀其志意與其病能拘於鬼神者不可與言至德志意邪則好祈禱言至德則事必達故不可與言至德也惡於針石者不可與言至巧惡於針石則巧不得施故不可與言至巧矣惡音污病不許治者病必不治治之無功矣心不許人治之是其必死強為治者功亦不成故曰治之無功矣異法方宜論篇黃帝問曰醫之治病也一病而治各不同皆愈何也不同謂針石灸焫毒藥導引按蹻也岐伯對曰地勢使然也謂法天地生長收藏及高下燥濕之勢故東方之域天地之所始生也法春氣也魚鹽之地海濱傍水魚鹽之地海之利也濱水際也隨業近之其民食魚而嗜鹹皆安其處美其食豐其利故居安恣其味故食美魚者使人熱中鹽者勝血魚發瘡則熱中之信鹽發渴則勝血之徵故其民皆黑色疏理其病皆為癰瘍血弱而熱故善為癰瘍其治宜砭石砭石謂以石為針也山海經曰高氏之山有石如玉可能為針則砭石也新校正云按氏一作伐故砭石者亦從東方來東人今用之西方者金玉之域沙石之處天地之所收引也法秋氣也引謂牽引使收斂也其民陵居而多風水土剛強居室如陵故曰陵居金氣肅殺故水土剛強也新校正云詳大抵西方地高民居高陵故多風也不必室如陵矣其民不衣而褐薦其民華食而脂肥不衣絲綿故曰不衣褐謂毛布也薦謂細草也華謂鮮美酥酪骨肉之類也以食鮮美故人體脂肥故邪不能傷其形體其病生於內水土剛強飲食脂肥膚腠閉封血氣充實故邪不能傷也內謂喜怒悲憂恐及飲食男女之過甚也新校正云詳悲一作思當作思已具陰陽應象大論注中其治宜毒藥能攻其病則謂之毒藥以其血氣盛肌肉堅飲食華水土強故病宜毒藥方制御之藥謂草木蟲魚鳥獸之類皆能除病者也故毒藥者亦從西方來西人方術今奉之北方者天地所閉藏之域也其地高陵居風寒冰冽法冬氣也其民樂野處而乳食藏寒生滿病水寒冰冽故生病於藏寒也新校正云按甲乙經無滿字其治宜灸焫火艾燒灼謂之灸焫故灸焫者亦從北方來北人正行其法南方者天地所長養陽之所盛處也其地下水土弱霧露之所聚也法夏氣也地下則水流歸之水多故土弱而霧露聚其民嗜酸而食胕言其所食不芬香新校正云按全元起云食魚也故其民皆緻理而赤色其病攣痹酸味收斂故人皆肉理密緻陽盛之處故色赤濕氣內滿熱氣外薄故筋攣脈痹也其治宜微針微細小也細小之針調脈衰盛也故九針者亦從南方來南人盛崇之中央者其地平以濕天地所以生萬物也衆法土德之用故生物衆然東方海南方下西方北方高中央之地平以濕則地形斯異生病殊焉其民食雜而不勞四方輻輳而萬物交歸故人食紛雜而不勞也故其病多痿厥寒熱濕氣在下故多病痿弱氣逆及寒熱也陰陽應象大論曰地之濕氣感則害皮肉筋脈居近於濕故爾其治宜導引按蹻導引謂搖筋骨動支節按謂抑按皮肉蹻謂捷舉手足故導引按蹻者亦從中央出也中央用為養神調氣之正道也故聖人雜合以治各得其所宜隨方而用各得其宜唯聖人法乃能然矣故治所以異而病皆愈者得病之情知治之大體也達性懷故然移精變氣論篇黃帝問曰余聞古之治病惟其移精變氣可祝由而已今世治病毒藥治其內針石治其外或愈或不愈何也移謂移易變謂變改皆使邪不傷正精神復強而內守也生氣通天論曰聖人傳精神服天氣上古天真論曰精神內守病安從來岐伯對曰往古人居禽獸之間動作以避寒陰居以避暑內無眷慕之纍外無伸宦之形新校正云按全元起本伸作臾此恬憺之世邪不能深入也故毒藥不能治其內針石不能治其外故可移精祝由而已古者巢居穴處夕隱朝遊禽獸之間斷可知矣然動躁陽盛故身熱足以禦寒涼氣生寒故陰居可以避暑矣夫志捐思想則內無眷慕之纍心亡願欲故外無伸宦之形靜保天真自無邪勝是以移精變氣無假毒藥祝説病由不勞針石而已新校正云按全元起云祝由南方神今之世不然情慕云為遠於道也憂患緣其內苦形傷其外又失四時之從逆寒暑之宜賊風數至虛邪朝夕內至五藏骨髓外傷空竅肌膚所以小病必甚大病必死故祝由不能已也帝曰善余欲臨病人觀死生決嫌疑欲知其要如日月光可得聞乎岐伯曰色脈者上帝之所貴也先師之所傳也上帝謂上古之帝先師謂岐伯祖世之師僦貸季也上古使僦貸季理色脈而通神明合之金木水火土四時八風六合不離其常先師以色白脈毛而合金應秋以色青脈弦而合木應春以色黑脈石而合水應冬以色赤脈洪而合火應夏以色黃脈代而合土應長夏及四季然以是色脈下合五行之體王上副四時之往來故六合之間八風鼓拆不離常候盡可與期何者以見其變化而知之也故下文曰變化相移以觀其妙以知其要欲知其要則色脈是矣言所以知四時五行之氣變化相移之要妙者何以色脈故也色以應日脈以應月常求其要則其要也言脈應月色應日者占候之期準也常求色脈之差忒是則平人之診要也夫色之變化以應四時之脈此上帝之所貴以合於神明也所以遠死近生觀色脈之藏否曉死生之徵兆故能常遠於死而近於生也生道以長命曰聖王上帝聞道勤而行之生道以長惟聖王乃爾而常用也中古之治病至而治之湯液十日以去八風五痹之病八風謂八方之風五痹謂皮肉筋骨脈之痹也靈樞經曰風從東方來名曰嬰兒風其傷人也外在於筋紐內舍於肝風從東南來名曰弱風其傷人也外在於肌內舍於胃風從南方來名曰大弱風其傷人也外在於脈內舍於心風從西南來名曰謀風其傷人也外在於肉內舍於脾風從西方來名曰剛風其傷人也外在於皮內舍於肺風從西北來名曰折風其傷人也外在於手太陽之脈內舍於小腸風從北方來名曰大剛風其傷人也外在於骨內舍於腎風從東北來名曰凶風其傷人也外在於掖脅內舍於大腸又痹論曰以春甲乙傷於風者為筋痹以夏丙丁傷於風者為脈痹以秋庚辛傷於風者為皮痹以冬壬癸傷於邪者為骨痹以至陰遇此者為肉痹是所謂八風五痹之病也新校正云按此注引痹論今經中痹論不如此當云風論曰以春甲乙傷於風者為肝風以夏丙丁傷於風者為心風季夏戊己傷於邪者為脾風以秋庚辛中於邪者為肺風以冬壬癸中於邪者為腎風痹論曰風寒濕三氣雜至合而為痹以冬遇此者為骨痹以春遇此者為筋痹以夏遇此者為脈痹以至陰遇此者為肌痹以秋遇此者為皮痹十日不已治以草蘇草荄之枝本末為助標本已得邪氣乃服草蘇謂藥煎也草荄謂草根也枝謂莖也言以諸藥根苗合成其煎俾相佐助而以服之凡藥有用根者有用莖者有用枝者有用華實者有用根莖枝華實者湯液不去則盡用之故云本末為助也標本已得邪氣乃服者言工人與病主療相應則邪氣率服而隨時順也湯液醪醴論曰病為本工為標標本不得邪氣不服此之謂主療不相應也或謂取標本論末云針也新校正云按全元起本又云得其標本邪氣乃散矣暮世之治病也則不然治不本四時不知日月不審逆從四時之氣各有所在不本其處而即妄攻是反古也四時刺逆從論曰春氣在經脈夏氣在孫絡長夏氣在肌肉秋氣在皮膚冬氣在骨髓工當各隨所在而辟伏其邪爾不知日月者謂日有寒溫明暗月有空滿虧盈也八正神明論曰凡刺之法必候日月星辰四時八正之氣氣定乃刺之是故天溫日明則人血淖液而衛氣浮故血易寫氣易行天寒日陰則人血凝泣而衛氣沉月始生則血氣始精衛氣始行月郭滿則血氣盛肌肉堅月郭空則肌肉減經絡虛衛氣去形獨居是以因天時而調血氣也是故天寒無刺天溫無凝月生無寫月滿無補月郭空無治是謂得時而調之因天之序盛虛之時移光定位正立而待之故曰月生而寫是謂藏虛月滿而捕血氣盈溢絡有流血命曰重實月郭空而治是謂亂經陰陽相錯真邪不别沉以留止外虛內亂淫邪乃起此之謂也不審逆從者謂不審量其病可治與不可治也故下文曰病形已成乃欲微針治其外湯液治其內言心意粗略不精審也粗工凶凶以為可攻故病未已新病復起粗謂粗略也凶凶謂不料事宜之可否也何以言之假令飢人形氣羸劣食令極飽能不霍乎豈其與食而為惡邪蓋為失時復過節也非病逆針石湯液失時過節則其害反增矣新校正云按别本霍一作害帝曰願聞要道岐伯曰治之要極無失色脈用之不惑治之大則惑謂惑亂則謂法則也言色脈之應昭然不欺但順用而不亂紀綱則治病審當之大法也逆從到行標本不得亡神失國逆從到行謂反順為逆標本不得謂工病失宜夫以反理到行所為非順豈惟治人而神氣受害若使之輔佐君主亦令國祚不保康寧矣去故就新乃得真人標本不得工病失宜則當去故逆理之人就新明悟之士乃得至真精曉之人以全已也帝曰余聞其要於夫子矣夫子言不離色脈此余之所知也岐伯曰治之極於一帝曰何謂一岐伯曰一者因得之因問而得之也帝曰奈何岐伯曰閉户塞牖繫之病者數問其情以從其意問其所欲而察是非也得神者昌失神者亡帝曰善黃帝內經素問補注釋文卷之十一

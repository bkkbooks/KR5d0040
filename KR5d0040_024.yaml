front:
  text: 黃帝內經素問補注釋文卷之二十四終十
  hash: sha256:ebdf164b9792ac9f9a2cb73c18d335e84eb7fd2e09328f3272038318f27d374d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_024-001a, image: hfl/0653/0653-173.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤舉痛論篇黃帝問曰余聞善言天者必有驗於人善言古者必有合於今善言人者必有厭於己如此則道不惑而要數極所謂明明也善言天者言天四時之氣溫涼寒暑生長收藏在人形氣五藏參應可驗而指示善惡故曰必有驗於人善言古者謂言上古聖人養生損益之迹與今養生損益之理可合而與論成敗故曰必有合於今也善言人者謂言形骸骨節更相支柱筋脈束絡皮肉包裏而五藏六府次居其中假七神五藏而運用之氣絶神去則之於死是以知彼浮形不能堅久靜慮於己亦與彼同故曰必有厭於己也夫如此者是知道要數之極悉無疑惑深明至理而乃能然矣今余問於夫子令言而可知視而可見捫而可得令驗於己而發蒙解惑可得而聞乎言如發開童蒙之耳解於疑惑者之心令一一條理而目視手循驗之可得捫猶循也岐伯再拜稽首對曰何道之問也請示起端也帝曰願聞人之五藏卒痛何氣使然岐伯對曰經脈流行不止環周不休寒氣入經而稽遲泣音澀而不行客於脈外則血少客於脈中則氣不通故卒然而痛帝曰其痛或卒然而止者或痛甚不休者或痛甚不可按者或按之而痛止者或按之無益者或喘動應手者或心與背相引而痛者或脅肋與少腹相引而痛者或腹痛引陰股者或痛宿昔而成積者或卒然痛死不知人少間復生者或痛而嘔者或腹痛而後泄者或痛而閉不通者凡此諸痛各不同形别之奈何欲明異候之所起岐伯曰寒氣客於脈外則脈寒脈寒則縮蜷縮踡則脈絀急絀急則外引小絡故卒然而痛得炅則痛立止脈左右環故得寒則縮踡絀急縮踡絀急則衛氣不得流通故外引於小絡脈也衛氣不入寒內薄之脈急不縱故痛生也得熱則衛氣復行寒氣退辟故痛止炅熱也止已也絀丁骨切因重中於寒則痛久矣重寒難釋故痛久不消寒氣客於經脈之中與炅氣相薄則脈滿滿則痛而不可按也按之痛甚者其義貝下文寒氣稽留炅氣從上則脈充大而血氣亂故痛甚不可按也脈既滿大血氣復亂按之則邪氣攻內故不可按也寒氣客於腸胃之間膜原之下血不得散小絡急引故痛按之則血氣散故按之痛止膜謂鬲間之膜原謂鬲肓之原血不得散謂鬲膜之中小絡脈內血也絡滿則急故牽引而痛生也手按之則寒氣散小絡緩故痛止寒氣客於俠脊之脈則深按之不能及故按之無益也俠脊之脈者當中之督脈也次兩傍足太陽脈也督脈者循脊裏太陽者貫膂筋故深按之不能及也若按當中則脊節曲按兩傍則膂筋蹙合曲與蹙合皆衛氣不得行過寒氣益聚而內畜故按之無益寒氣客於衝脈衝脈起於關元隨腹直上寒氣客則脈不通脈不通則氣因之故喘動應手矣衝脈奇經脈也關元穴名在齊下三寸言起自此穴即隨腹而上非生出於此也其本生出乃起於腎下也直謂上行會於咽喉也氣因之謂衝脈不通足少陰氣因之上滿衝脈與少陰并行故喘動而應手也矣寒氣客於背俞之脈則血脈泣脈泣則血虛血虛則痛其俞注於心故相引而痛按之則熱氣至熱氣至則痛止矣背俞謂心俞脈亦足太陽脈也夫俞者皆內通於藏故曰其俞注心相引而痛也按之則溫氣入溫氣入則心氣外發故痛止寒氣客於厥陰之脈厥陰之脈者絡陰器繫於肝寒氣客於脈中則血泣脈急故脅肋與少腹相引痛矣厥陰者肝之脈入髦中環陰器抵少腹上貫肝鬲布脅肋故曰絡陰器繫於肝脈急引脅與少腹痛也厥氣客於陰股寒氣上及少腹血泣在下相引故腹痛引陰股亦厥陰肝脈之氣也以其脈循陰股入髦中環陰器上抵少腹故曰厥氣客於陰股寒氣上及於少腹也寒氣客於小腸膜原之間絡血之中血泣不得注於大經血氣稽留不得行故宿昔而成積矣言血為寒氣之所凝結而乃成積寒氣客於五藏厥逆上泄陰氣竭陽氣未入故卒然痛死不知人氣復反則生矣言藏氣被寒擁胃而不行氣復得通則已也新校正云詳注中擁胃疑作擁冒寒氣客於腸胃厥逆上出故痛而嘔也腸胃客寒留止則陽氣不得下流而反上行寒不去則痛生陽上行則嘔逆故痛而嘔也寒氣客於小腸小腸不得成聚故後泄腹痛矣小腸為受盛之府中滿則寒邪不居故不得結聚而傳下入於回腸回腸廣腸也為傳導之府物不得停留故後泄而痛熱氣留於小腸腸中痛疸熱焦渴則堅乾不得出故痛而閉不通矣熱滲津液故便堅也帝曰所謂言而可知者也視而可見奈何謂候色也岐伯曰五藏六府固盡有部謂面上之分部視其五色黃赤為熱中熱則色黃赤白為寒陽氣少血不上榮於色故白青黑為痛血熱泣則變惡故色青黑則痛此所謂視而可見者也帝曰捫而可得奈何捫摸也以手循摸也岐伯曰視其主病之脈堅而血及陷下者皆可捫而得也帝曰善余知百病生於氣也夫氣之為用虛實逆順緩急皆能為病故發此問端怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收炅則氣泄驚則氣亂新校正云按太素驚作憂勞則氣耗思則氣結九氣不同何病之生岐伯曰怒則氣逆甚則嘔血及飧泄新校正云按甲乙經及太素飱泄作食而氣逆故氣上矣怒則陽氣逆上而肝氣乘脾故甚則嘔血及飱泄也何以明其然怒則面赤甚則色蒼靈樞經曰盛怒而不止則傷志明怒則氣逆上而不下也喜則氣和志達榮衛通利故氣緩矣氣脈和調故志達暢榮衛通利故氣徐緩悲則心系急肺布葉舉而上焦不通榮衛不散熱氣在中故氣消矣布葉謂布蓋之大葉新校正云按甲乙經及太素而上焦不通作兩焦不通又王注肺布葉舉謂布蓋之大葉疑非全元起云悲則損於心心系急則動於肺肺氣繫諸經逆故肺布而葉舉安得謂肺布為肺布蓋之大葉恐則精却却則上焦閉閉則氣還還則下焦脹故氣不行矣恐則陽精却上而不下流故却則上焦閉也上焦既閉氣不行流下焦陰氣亦還回不散而聚為脹也然上焦固禁下焦氣還各守一處故氣不行也新校正云詳氣不行當作氣下行也寒則腠理閉氣不行故氣收矣腠謂津液滲泄之所理謂文理逢會之中閉謂密閉氣謂衛氣行謂流行收謂收斂也身寒則衛氣沉故皮膚文理及滲泄之處皆閉密而氣不流行衛氣收斂於中而不發散也新校正云按甲乙經氣不行作營衛不行炅則腠理開榮衛通汗大泄故氣泄矣人在陽則舒在陰則慘故熱則膚腠開發榮衛大通津液外滲而汗大泄驚則心無所倚神無所歸慮無所定故氣亂矣氣奔越故不調理新校正云按太素驚作憂字勞則喘且汗出外內皆越故氣耗矣疲力役則氣奔速故喘息氣奔速則陽外發故汗出然喘且汗出內外皆逾越於常經故氣耗損也思則心有所存神有所歸正氣留而不行故氣結矣繫心不散故氣亦停留新校正云按甲乙經歸正二字作止字腹中論篇黃帝問曰有病心腹滿旦食則不能暮食此為何病岐伯對曰名為鼓脹心腹脹滿不能再食形如鼓脹故名鼓脹也新校正云按太素鼓作穀字帝曰治之奈何岐伯曰治之以雞矢醴一劑知二劑已按古本草雞矢并不治鼓脹惟大利小便微寒今方制法當取用處湯漬服之帝曰其時有復發者何也復謂再發言如舊也岐伯曰此飲食不節故時有病也雖然其病且已時故當病氣聚於腹也飲食不節則傷胃胃脈者循腹裏而下行故飲食不節時有病者復病氣聚於腹中也帝曰有病胸脅支滿者妨於食病至則先聞腥臊臭出清液先唾血四支清目眩時時前後血病名為何何以得之清液清水也亦謂之清涕清涕者謂從窈漏中漫液而下水出清冷也眩謂目視眩轉也前後血謂前陰後陰出血也岐伯曰病名血枯此得之年少時有所大脫血若醉入房中氣竭肝傷故月事衰少不來也出血多者謂之脫血漏下鼻衄嘔吐出血皆同焉夫醉則血脈盛血脈盛則內熱因而入房髓液皆下故腎中氣竭也肝藏血以養人脫血故肝傷也然於丈夫則精液衰乏若女子則月事滯澀而不來也帝曰治之奈何復以何術岐伯曰以四烏鰂骨一藘茹二物并合之丸以雀卵大如小豆以五丸為後飯飲以鮑魚汁利腸中新校正云按别本一作傷中鰂昨則切藘茹上力居切下音如字及傷肝也飯後藥先謂之後飯按古本草經云烏鰂魚骨藘茹等并不治血枯然經法用之是攻其所生所起爾夫醉勞力以入房則腎中精氣耗竭月事衰少不至則中有惡血淹留精氣耗竭則陰萎不起而無精惡血淹留則血痹著中而不散故先兹四藥用入方焉古本草經曰烏鰂魚骨味鹹冷平無毒主治女子血閉藘茹味辛寒平有小毒主散惡血雀卵味甘溫平無毒主治男子陰萎不起強之令熱多精有子鮑魚味辛臭溫平無毒主治瘀血血痹在四支不散者尋文會意方義如此而處治之也新校正云按甲乙經及太素蘆茹作䕡茹詳王注性味乃䕡茹當改藘作䕡又按本草烏鰂魚骨冷作微溫雀卵甘作酸與王注異帝曰病有少腹盛上下左右皆有根此為何病可治不岐伯曰病名曰伏梁伏粱心之積也新校正云詳此伏梁與心積之伏梁大異病有名同而實異者非一如此之類是也帝曰伏梁何因而得之岐伯曰裹大膿血居腸胃之外不可治治之每切按之致死帝曰何以然岐伯曰此下則因陰必下膿血上則迫胃脘生鬲俠胃脘內癰正當衝脈帶脈之部分也帶脈者起於季脅回身一周橫絡於齊下衝脈者與足少陰之絡起於腎下出於氣街循陰股其上行者出齊下同身寸之三寸關元之分俠齊直上循腹各行會於咽喉故病當其分則少腹盛上下左右皆有根也以其上下堅盛如有潛梁故曰病名伏梁不可治也以裹大膿血居腸胃之外按之痛悶不堪故每切按之致死也以衝脈下行者絡陰上行者循腹故也上則迫近於胃脘下則因薄於陰器也若因薄於陰則便下膿血若迫近於胃則病氣上出於鬲復俠胃脘內長其癰也何以然哉以本有大膿血在腸胃之外故也生當為出傳文誤也新校正云按太素俠胃作使胃此久病也難治居齊上為逆居齊下為從勿動亟奪若裏大膿血居齊上則漸傷心藏故為逆居齊下則去心稍遠猶得漸攻故為從從順也亟數也奪去也言不可移動但數數去之則可矣論在刺法中今經亡帝曰人有身體髀股胻皆腫環齊而痛是為何病岐伯曰病名伏梁此二十六字錯簡在奇病論中若不有此二十六字則下文無據也新校正云詳此并無注解盡在下卷奇病論中此風根也此四字此篇本有奇病論中亦有之其氣溢於大腸而著於肓肓之原在齊下故環齊而痛也不可動之動之為水溺澀之病亦衝脈也齊下謂脖胦在齊下同身寸之一寸半靈樞經曰肓之原名曰脖胦脖薄沒切胦烏朗切帝曰夫子數言熱中消中不可服高梁芳草石藥石藥發癲芳草發狂多飲數溲謂之熱中多食數溲謂之消中多喜曰癲多怒曰狂芳美味也夫熱中消中者皆富貴人也今禁高梁是不合其心禁芳草石藥是病不愈願聞其説熱中消中者脾氣之上溢甘肥之所致故禁食高梁芳美之草也通評虛實論曰凡治消疸甘肥貴人則高梁之疾也又奇病論曰夫五味入於口藏於胃脾為之行其精氣津液在脾故令人口甘此肥美之所發也此人必數食甘美而多肥也肥者令人內熱甘者令人中滿故其氣上溢轉為消渴此之謂也夫富貴人者驕恣縱欲輕入而無能禁之禁之則逆其志順之則加其病帝思難誥故發問之高膏梁米也石藥英乳也芳草濃美也然此五者富貴人常服之難禁也岐伯曰夫芳草之氣美石藥之氣悍二者其氣急疾堅徑故非緩心和人不可以服此二者脾氣溢而生病氣美則重盛於脾消熱之氣躁疾氣悍則又滋其熱若人性和心緩氣候舒勻不與物爭釋然寬泰則神不躁迫無懼內傷故非緩心和人不可以服此二者悍利也堅定也固也徑剛也言其芳草石藥之氣堅定固久剛烈而卒不歇滅此二者是也帝曰不可以服此二者何以然岐伯曰夫熱氣慓悍藥氣亦然二者相遇恐內傷脾慓疾也脾者土也而惡木服此藥者至甲乙日更論熱氣栗盛則木氣內餘故心非和緩則躁怒數起躁怒數起則熱氣因木以傷脾甲乙為木故至甲乙日更論脾病之增感也帝曰善有病膺腫新校正云按甲乙經作癰腫頸痛胸滿腹脹此為何病何以得之膺鎢傍也頸項前也胸膺間也岐伯曰名厥逆氣逆所生故名厥逆帝曰治之奈何岐伯曰灸之則瘖石之則狂須其氣并乃可治也石謂以石針開破之帝曰何以然岐伯曰陽氣重上有餘於上灸之則陽氣入陰入則瘖石之則陽出內虛則狂灸之則火氣助陽陽盛故入陰石之則陽氣出陽氣出則內不足故狂須其氣并而治之可使全也并謂并合也待自并合則兩氣俱全故可治若不爾而灸石之則偏致勝負故不得全而瘖狂也帝曰善何以知懷子之且生也岐伯曰身有病而無邪脈也病謂經閉也脈法曰尺中之脈來而斷絶者經閉也月水不利若尺中脈絶者經閉也今病經閉脈反如常者婦人妊娠之證故云身有病而無邪脈帝曰病熱而有胻痛者何也岐伯曰病熱者陽脈也以三陽之動也人迎一盛少陽二盛太陽三盛陽明入陰也夫陽入於陰故病在頭與腹乃䐜脹而頭痛也帝曰善新校正云按六節藏象論云人迎一盛病在少陽二盛病在太陽三盛病在陽明與此論同又按甲乙經三盛陽明無入陰也三字黃帝內經素問補注釋文卷之二十四

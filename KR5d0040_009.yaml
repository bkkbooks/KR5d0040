body:
  text: 六節藏象論篇黃帝問曰余聞天以六六之節以成一歲人以九九制會新校正云詳下文云地以九九制會計人亦有三百六十五節以為天地久矣不知其所謂也六六之節謂六竟於六甲之日以成一歲之節限九九制會謂九周於九野之數以制人形之會通也言人之三百六十五節以應天之六六之節久矣若復以九九為紀法則兩歲大半乃曰一周不知其法真原安謂也新校正云詳王注云兩歲大半乃曰一周按九九制會當云兩歲四分歲之一乃曰一周也岐伯對曰昭乎哉問也請遂言之夫六六之節九九制會者所以正天之度氣之數也六六之節天之度也九九制會氣之數也所謂氣數者生成之氣也周天之分凡三百六十五度四分度之一以十二節氣均之則氣有三百六十日而終兼之小月日又不足其數矣是以六十四氣而常置閏焉何者以其積差分故也天地之生育本址於陰陽人神之運為始終於九氣然九之為用豈不大哉律書曰黃鍾之律管長九寸冬至之日氣應灰飛由此則萬物之生成因於九氣矣古之九寸即今之七寸三分大小不同以其先秬黍之制而有異也新校正云按别本三分一作二分天度者所以制日月之行也氣數者所以紀化生之用也制謂準度紀謂綱紀準日月之行度者所以明日月之行遲速也紀化生之為用也所以彰氣至而斯應也氣應無差則生成之理不替遲速以度大小之月生焉故日異長短月移寒暑收藏生長無失畤宜也天為陽地為陰日為陽月為陰行有分紀周有道理日行一度月行十三度而有奇焉故大小月三百六十五日而成歲積氣餘而盈閏矣日行遲故晝夜行天之一度而三百六十五日一周天而猶有度之奇分矣月行速故晝夜行天之十三度餘而二十九日一周天也言有奇者謂十三度外復行十九分度之七故云月行十三度而有奇也禮義及漢律曆志云二十八宿及諸星皆從東而循天西行日月及五星皆從西而循天東行今太史説云并循天而東行從東而西轉也諸曆家説月一日至四日月行最疾日夜行十四度餘自五日至八日行次疾日夜行十三度餘自九日至十九日其行遲日夜行十二度餘二十日至二十三日行又小疾日夜行十三度餘二十四日至晦日行又大疾日夜行十四度餘今太史説月行之率不如此矣月行有十五日前疾有十五日後遲者有十五日前遲有十五日後疾者大率一月四分之而皆有遲疾遲速之度固無常準矣雖爾終以二十七日月行一周天凡行三百六十一度二十九日日行二十九度月行三百八十七度少七度而不及日也至三十日日復遷計率至十三分日之八月方及日矣此大盡之月也大率其計率至十三分日之半者亦大盡法也其計率至十三分日之五之六而及日者小盡之月也故云大小月三百六十五日而成歲也正言之者三百六十五日四分日之一乃一歲法以奇不成日故舉六以言之若通以六小為法則歲止有三百五十四日歲少十一日餘矣取月所少之辰加歲外餘之日故從閏後三十二日而盈閏焉尚書曰期三百有六旬有六日以閏月定四時成歲則其義也積餘盈閏者盡以月之大小不盡天度故也立端於始表正於中推餘於終而天度畢矣端首也始初也表彰示也正斗建也中月半也推退位也言立首氣於初節之日示斗建於月半之辰退餘閏於相望之後是以閏之前則氣不及月閏之後則月不及氣故常月之制建初立中閏月之紀無初無中縱曆有之皆他節氣也故曆無云其候閏某月節閏某月中也推終之義斷可知乎故曰立端於始表正於中推餘於終也由斯推日成閏故能令天度畢焉帝曰余已聞天度矣願聞氣數何以合之岐伯曰天以六六為節地以九九制會新校正云詳篇首云人以九九制會天有十日日六竟而周甲甲六復而終歲三百六十日法也十日謂甲乙丙丁戊己庚辛壬癸之日也十者天地之至數也易繫辭曰天九地十則其義也六十日而周甲子之數甲子六周而復始則終一歲之日是三百六十日之歲法非天度之數也此蓋十二月各三十日者若除小月其日又差也夫自古通天者生之本本於陰陽其氣九州九竅皆通乎天氣通天謂元氣即天真也然形假地生命惟天賦故奉生之氣通繫於天稟於陰陽而為根本也寶命全形論曰人生於地懸命於天天地合氣命之曰人四氣調神大論曰陰陽四時者萬物之終始也死生之本也又曰逆其根則伐其本壞其真矣此其義也九州謂冀兖青徐揚荆豫梁雍也然地列九州人施九竅精神往復氣與參同故曰九州九竅也靈樞經曰地有九州人有九竅則其義也先言其氣者謂天真之氣常繫屬於中也天氣不絶真靈內屬行藏動靜悉與天通故曰皆通乎天氣也故其生五其氣三形之所存假五行而運用徵其本始從三氣以生成故云其生五其氣三也氣之三者亦副三元故下文曰新校正云詳夫自古通天者至此與生氣通天論同注頗異當兩觀之三而成天三而成地三而成人非惟人獨由三氣以生天地之道亦如是矣故易乾坤諸卦皆必三矣三而三之合則為九九分為九野九野為九藏九野者應九藏而為義也爾雅曰邑外為郊郊外為甸甸外為牧牧外為林林外為坰坰外為野則此之謂也新校正云按今爾雅云邑外謂之郊郊外謂之牧牧外謂之野野外謂之林林外謂之坰與王氏所引有異故形藏四神藏五合為九藏以應之也形藏四者一頭角二耳目三口齒四胸中也形分於外故以名焉神藏五者一肝二心三脾四肺五腎也神藏於內故以名焉所謂神藏者肝藏魂心藏神脾藏意肺藏魄腎藏志也故此二别爾新校正云詳此乃宣明五氣篇文與生氣通天注重又與三部九候論注重所以名神藏形藏之説具三部九候論注帝曰余已聞六六九九之會也夫子言積氣盈閏願聞何謂氣請夫子發蒙解惑焉請宣揚旨要啓所未聞解疑惑者之心開蒙昧者之耳令其曉達咸使深明岐伯曰此上帝所祕先師傳之也上帝則上古帝君也先師岐伯祖之師僦貸季上古之理色脈者也移精變氣論曰上古使僦貸季理色脈而通神明八素經序云天師對黃帝曰我於僦貸季理色脈已三世矣言可知乎新校正云詳素一作索或以八為大按今太素無此文僦即就切帝曰請遂聞之遂盡也岐伯曰五日謂之候三候謂之氣六氣謂之時四時謂之歲而各從其主治焉日行天之五度則五日也三候正十五日也六氣凡九十日正三月也設其多之矣故十八候為六氣六氣謂之時也四時凡三百六十日故曰四時謂之歲也各從主治謂一歲之日各歸從五行之一氣而為之主以王也故下文曰五運相襲而皆治之終期之日周而復始時立氣布如環無端候亦同法故曰不知年之所加氣之盛衰虛實之所起不可以為工矣五運謂五行之氣應天之運而主化者也襲謂承襲如嫡之承襲也言五行之氣父子相承主統一周之日常如是無已周而復始也時謂立春之前當至時也氣謂當主之脈氣也春前氣至脈氣亦至故曰時立氣布也候謂日行五度之候也言一候之日亦五氣相生而直之差則病矣移精變氣論曰上古使僦貸季理色脈而通神明合之金木水火土四時八風六合不離其常此之謂也工謂工於修養者也言必明於此乃可橫行天下矣新校正云詳王注時立氣布謂立春前當至時當王之脈氣也按此正謂歲立四時時布六氣如環之無端故又曰候亦同法帝曰五運之始如環無端其太過不及何如岐伯曰五氣更立各有所勝盛虛之變此其常也言盛虛之變見此乃天之常道爾帝曰平氣何如岐伯曰無過者也不愆常候則無過也帝曰太過不及奈何岐伯曰在經有也言玉機真藏論篇具言五氣平和太過不及之旨也新校正云詳王注言玉機真藏論已具按本篇言脈之太過不及即不論運氣之太過不及與平氣當云氣交變大論五常政大論篇已具言也帝曰何謂所勝岐伯曰春勝長夏長夏勝冬冬勝夏夏勝秋秋勝春所謂得五行時之勝各以氣命其藏春應木木勝土長夏應土土勝水冬應水水勝火夏應火火勝金秋應金金勝木常如是矣四時之中加之長夏故謂得五行時之勝也所謂長夏者六月也土生於火長在夏中既長而王故云長夏也以氣命藏者春之木內合肝長夏土內合脾冬之水內合腎夏之火內合心秋之金內合肺故曰各以氣命其藏也命名也帝曰何以知其勝岐伯曰求其至也皆歸始春始春謂立春之日也春為四時之長故候氣皆歸於立春前之日也未至而至此謂太過則薄所不勝而乘所勝也命曰氣淫不分邪僻內生工不能禁此上十字文義不倫應古文錯簡次後五治下乃其義也今朱書之至而不至此謂不及則所勝妄行而所生受病所不勝薄之也命曰氣迫所謂求其至者氣至之時也凡氣之至皆謂立春前十五日乃候之初也未至而至謂所直之氣未應至而先期至也先期而至是氣有餘故曰太過至而不至謂所直之氣應至不至而後期至後期而至是氣不足故曰不及太過則薄所不勝而乘所勝不及則所勝妄行而所生受病所不勝薄之者凡五行之氣我剋者為所勝剋我者為所不勝生我者為所生假令肝木有餘是肺金不足金不制木故木太過木氣既餘則反薄肺金而乘於脾土矣故曰太過則薄所不勝而乘所勝也此皆五藏之氣內相淫併為疾故命曰氣淫也餘太過例同之又如肝木氣少不能制土土氣無畏而遂妄行木被土凌故云所勝妄行而所生受病也肝木之氣不平肺金之氣自薄故曰所不勝薄之然木氣不平土金交薄相迫為疾故曰氣迫也餘不及例皆同謹候其時氣可與期失時反候五治不分邪僻內生工不能禁也時謂氣至時也候其年則始於立春之日候其氣則始於四氣定期候其日則隨於候日故曰謹候其時氣可與期也反謂反背也五治謂五行所治主統一歲之氣也然不分五治謬引入邪天真氣運尚未該通人病之由安能精達故曰工不能禁也帝曰有不襲乎言五行之氣有不相承襲者乎岐伯曰蒼天之氣不得無常也氣之不襲是謂非常非常則變矣變謂變易天常也帝曰非常而變奈何岐伯曰變至則病所勝則微所不勝則甚因而重感於邪則死矣故非其時則微當其時則甚也言蒼天布氣尚不越於五行人在氣中豈不應於天道夫人之氣亂不順天常故有病死之徵矣左傳曰違天不祥此其類也假令木直之年有火氣至後二歲病矣土氣至後三歲病矣金氣至後四歲病矣水氣至後五歲病矣真氣不足復重感邪真氣內微故重感於邪則死也假令非王直年而氣相干者且為微病不必內傷於神藏故非其時則微而且持也若當所直之歲則易中邪氣故當其直時則病疾甚也諸氣當其王者皆必受邪故云非其時則微當其時則甚也通評虛實論曰非其時則生當其時則死當謂正直之年也帝曰善余聞氣合而有形因變以正名天地之運陰陽之化其於萬物孰少孰多可得聞乎新校正云詳從前岐伯曰昭乎哉問也至此全元起注本及太素并無疑王氏之所捕也岐伯曰悉乎哉問也天至廣不可度地至大不可量大神靈問請陳其方言天地廣大不可度量而得之造化玄微豈可以人心而遍悉大神靈問讚聖深明舉大説凡粗言綱紀故曰請陳其方草生五色五色之變不可勝視草生五味五味之美不可勝極言物生之衆稟化各殊目視口味尚無能盡之况於人心乃能包括耶嗜欲不同各有所通言色味之衆雖不可遍盡所由然人所嗜所欲則自隨己心之所愛耳故曰嗜欲不同各有所通天食人以五氣地食人以五味天以五氣食人者臊氣湊肝焦氣湊心香氣湊脾腥氣湊肺腐氣湊腎也地以五味食人者酸味入肝苦味入心甘味入脾辛味入肺鹹味入腎也清陽化氣而上為天濁陰成味而下為地故天食人以氣地食人以味也陰陽應象大論曰清陽為天濁陰為地又曰陽為氣陰為味五氣入鼻藏於心肺上使五色修明音聲能彰五味入口藏於腸胃味有所藏以養五氣氣和而生津液相成神乃自生心榮面色肺主音聲故氣藏於心肺上使五色修潔分明音聲彰著氣為水母故味藏於腸胃內養五氣五氣和化津液方生津液與氣相副化成神氣乃能生而宣化也帝曰藏象何如象謂所見於外可閲者也岐伯曰心者生之本神之變也其華在面其充在血脈為陽中之太陽通於夏氣心者君主之官神明出焉然君主者萬物繫之以興亡故曰心者生之本神之變也火氣炎上故華在面也心養血其主脈故充在血脈也心王於夏氣合太陽以太陽居夏火之中故曰陽中之太陽通於夏氣也金匱真言論曰平旦至日中天之陽陽中之陽也新校正云詳神之變全元起本并太素作神之處肺者氣之本魄之處也其華在毛其充在皮為陽中之太陰通於秋氣肺藏氣其神魄其養皮毛故曰肺者氣之本魄之處華在毛充在皮也肺藏為太陰之氣主王於秋晝日為陽氣所行位非陰處以太陰居於陽分故曰陽中之太陰通於秋氣也金匱真言論曰日中至黃昏天之陽陽中之陰也新校正云按太陰甲乙經并太素作少陰當作少陰肺在十二經雖為太陰然在陽分之中當為少陰也腎者主蟄封藏之本精之處也其華在髮其充在骨為陰中之少陰通於冬氣地户封閉蟄蟲深藏腎又主水受五藏六府之精而藏之故曰腎者主蟄封藏之本精之處也腦者髓之海腎主骨髓髮者腦之所養故華在髮充在骨也以盛陰居冬陰之分故曰陰中之少陰通於冬氣也金匱真言論曰合夜至雞鳴天之陰陰中之陰也新校正云按全元起本并甲乙經太素少陰作太陰當作太陰腎在十二經雖為少陰然在陰分之中當為太陰肝者罷極之本魂之居也其華在爪其充在筋以生血氣其味酸其色蒼新校正云詳此六字當去按太素心其味苦其色赤肺其味辛其色白腎其味鹹其色黑今惟肝脾二藏載其味其色陰陽應象大論已著色味詳矣此不當出之今更不添心肺腎三藏之色味只去肝脾二藏之色味可矣其注中所引陰陽應象大論文四十一字亦當去之罷音疲此為陽中之少陽通於春氣夫人之運動者皆筋力之所為也肝主筋其神魂故曰肝者罷極之本魂之居也爪者筋之餘筋者肝之養故華在爪充在筋也東方為發生之始故以生血氣也陰陽應象大論曰東方生風風生木木生酸肝合木故其味酸也又曰神在藏為肝在色為蒼故其色蒼也以少陽居於陽位而王於春故曰陽中之少陽通於春氣也金匱真言論曰平旦至日中天之陽陽中之陽也新校正云按全元起本并甲乙經太素作陰中之少陽當作陰中之少陽詳王氏引金匱真言論云平旦至日中天之陽陽中之陽也以為證則王意以為陽中之少陽也再詳上文心藏為陽中之太陽王氏以引平旦至日中天之説為證今肝藏又引為證反不引雞鳴至平旦天之陰陰中之陽為證則王注之失可見當從全元起本及甲乙經太素作陰中之少陽為得脾胃大腸小腸三焦膀胱者倉廪之本營之居也名曰器能化糟粕轉味而入出者也皆可受盛轉運不息故為倉廪之本名曰器也營起於中焦中焦為脾胃之位故云營之居也然水穀滋味入於脾胃脾胃糟粕轉化其味出於三焦膀胱故曰轉味而入出者也其華在唇四白其充在肌其味甘其色黃新校正云詳此六字當去并注中引陰陽應象大論文四十字亦當去已解在前條此至陰之類通於土氣口為脾官脾主肌肉故曰華在唇四白充在肌也四白謂唇四際之白色肉也陰陽應象大論曰中央生濕濕生土土生甘脾合土故其味甘也又曰在藏為脾在色為黃故其色黃也脾藏土氣土合至陰故曰此至陰之類通於土氣也金匱真言論曰陰中之至陰脾也凡十一藏取決於膽也上從心藏下至於膽為十一也然膽者中正剛斷無私偏故十一藏取決於膽也故人迎一盛病在少陽二盛病在太陽三盛病在陽明四盛已上為格陽陽脈法也少陽膽脈也太陽膀胱脈也陽明胃脈也靈樞經曰一盛而躁在手少陽二盛而躁在手太陽三盛而躁在手陽明手少陽三焦脈手太陽小腸脈手陽明大腸脈一盛者謂人迎之脈大於寸口一倍也餘盛同法四倍已上陽盛之極故格拒而食不得入也正理論曰格則吐逆寸口一盛病在厥陰二盛病在少陰三盛病在太陰四盛已上為關陰陰脈法也厥陰肝脈也少陰腎脈也太陰脾脈也靈樞經曰一盛而躁在手厥陰二盛而躁在手少陰三盛而躁在手太陰手厥陰心包脈也手少陰心脈也手太陰肺脈也盛法同陽四倍已上陰盛之極故關閉而溲不得通也正理論曰閉則不得溺溲小便也人迎與寸口俱盛四倍已上為關格關格之脈羸不能極於天地之精氣則死矣俱盛謂俱大於平常之脈四倍也物不可以久盛極則衰敗故不能極於天地之精氣則死矣靈樞經曰陰陽俱盛不得相營故曰關格關格者不得盡期而死矣此之謂也新校正云詳羸當作盈脈盛四倍已上非羸也乃盛極也古文羸與盈通用黃帝內經素問補注釋文卷之九

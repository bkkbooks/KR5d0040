front:
  text: 黃帝內經素問補注釋文卷之二十三終九
  hash: sha256:528de98ee6a30ca98c6446757e5d15f524dbc56e7629c708a1be6914b1b95585
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_023-001a, image: hfl/0653/0653-129.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤刺瘧篇足太陽之瘧令人腰痛頭重寒從背起足太陽脈從巔入絡腦還出别下項循肩膊內俠脊抵腰中其支别者從膊內左右别下貫胂過髀樞故令腰痛頭重寒從背起新校正云按三部九候論注貫胂作貫臀刺腰痛注亦作貫臀厥論注作貫胂甲乙經作貫胂先寒後熱熇熇暍暍然熇熇甚熱狀暍暍亦熱盛也太陽不足故先寒寒極則生熱故後熱也暍音謁熱止汗出難已熱生是為氣虛熱止則為氣復氣復而汗反出此為邪氣盛而真不勝故難已新校正云按全元起本并甲乙經太素巢元方并作先寒後熱渴渴止汗出與此文異刺郤中出血太陽之郤是謂金門金門在足外踝下一名曰關梁陽維所别屬也刺可入同身寸之三分若灸者可灸三壯黃帝中誥圖經云委中主之則古法以委中為郤中也委中在膕中央約文中動脈足太陽脈之所入也刺可入同身寸之五分留七呼若灸者可灸三壯新校正云詳刺郤中甲乙經作膕中今王氏兩注之當以膕中為正也足少陽之瘧令人身體解㑊身體解㑊次如下句寒不甚熱不甚陽氣未盛故令其然惡見人見人心惕惕然膽與肝合肝虛則其邪薄其氣故惡見人見人心惕惕然也熱多汗出甚邪盛則熱多中風故汗出刺足少陽俠溪主之俠溪在足小指次指歧骨間本節前陷者中少陽之滎刺可入同身寸之三分留三呼若灸者可灸三壯足陽明之瘧令人先寒灑淅灑淅寒甚久乃熱熱去汗出喜見日月光火氣乃快然陽虛則外先寒陽虛極則復盛故寒甚久乃熱也熱去汗已陰又內強陽不勝陰故喜見日月光火氣乃快然也刺足陽明跗上衝陽穴也在足跗上同身寸之五寸骨間動脈上去陷谷同身寸之三寸陽明之原刺可入同身寸之三分留十呼若灸者可灸三壯跗音付足太陰之瘧令人不樂好大息心氣流於肺則喜令脾藏受病心母救之火氣下入於脾不上行於肺又太陰脈支别者復從胃上鬲注心中故令人不樂好大息也不嗜食多寒熱汗出脾主化穀營助四傍今邪薄之諸藏無稟土寄四季王則邪氣交爭故不嗜食多寒熱而汗出新校正云按甲乙經云多寒少熱病至則善嘔嘔已乃衰足太陰脈入腹屬脾絡胃上鬲俠咽故病氣來至則嘔嘔已乃衰退也即取之待病衰去即而取之其言衰即取之井俞及公孫也公孫在足大指本節後同身寸之一寸太陰絡也刺可入同身寸之四分留七呼若灸者可灸三壯足少陰之瘧令人嘔吐甚多寒熱熱多寒少足少陰脈貫肝鬲入肺中循喉嚨故嘔吐甚多寒熱也腎為陰藏陰氣生寒今陰氣不足故熱多寒少新校正云按甲乙經云嘔吐甚多寒少熱也欲閉户牖而處其病難已胃陽明脈病欲獨閉户牖而處今謂胃土病證反見腎水之中土刑於水故其病難已也太鐘太溪悉主之太鐘在足內踝後街中少陰絡也刺可入同身寸之二分留七呼若灸者可灸三壯太溪在足內踝後跟骨上動脈陷者中少陰俞也刺可入同身寸之三分留七呼若灸者可灸三壯新校正云按甲乙經云其病難已取太溪又按太鐘穴甲乙經作跟後衝中刺腰痛篇注作跟後街中動脈水穴注云在內踝後此注云內踝後街中諸注不同當以甲乙經為正足厥陰之瘧令人腰痛少腹滿小便不利如癃狀非癃也數便意恐懼氣不足腹中悒悒足厥陰脈循股陰入髦中環陰器抵少腹故病如是癃謂不得小便也悒悒不暢之貌新校正云按甲乙經數便意三字作數噫二字刺足厥陰太衝主之在足大指本節後同身寸之二寸陷者中厥陰俞也刺可入同身寸之三分留十呼若灸者可灸三壯新校正云按刺腰痛篇注云在本節後內間動脈應手肺瘧者令人心寒寒甚熱熱間善驚如有所見者刺手太陰陽明列缺主之列缺在手腕後同身寸之一寸半手太陰絡也刺可入同身寸之三分留三呼若灸者可灸五壯陽明穴合谷主之合谷在手大指次指歧骨間手陽明脈之所過也刺可入同身寸之三分留六呼若灸者可灸三壯心瘧者令人煩心甚欲得清水反寒多不甚熱刺手少陰神門主之神門在掌後鋭骨之端陷者中手少陰俞也刺可入同身寸之三分留七呼若灸者可灸三壯新校正云按太素云欲得清水及寒多寒不甚熱甚肝瘧者令人色蒼蒼然太息其狀若死者刺足厥陰見血中封主之中封在足內踝前同身寸之一寸半陷者中仰足而取之伸足乃得之足厥陰經也刺出血止常刺者可入同身寸之四分留七呼若灸者可灸三壯脾瘧者令人寒腹中痛熱則腸中鳴鳴已汗出刺足太陰商丘主之商丘在足內踝下微前陷者中足太陰經也刺可入同身寸之三分留七呼若灸者可灸三壯腎瘧者令人灑灑然腰脊痛宛轉大便難目胸胸然手足寒刺足太陽少陰太鐘主之取如前足少陰瘧中法胃瘧者令人且病也善飢而不能食食而支滿腹大胃熱脾虛故善飢而不能食食而支滿腹大也是以下文兼刺太陰新校正云按太素且病作疽病刺足陽明太陰橫脈出血厲兊解溪三里主之厲兊在足大指次指之端去爪甲如韭葉陽明井也刺可入同身寸之一分留一呼若灸者可灸一壯解溪在衝陽後同身寸之三寸半腕上陷者中陽明經也刺可入同身寸之五分留五呼若灸者可灸三壯三里在膝下同身寸之三寸胻骨外廉兩筋肉分間陽明合也刺可入同身寸之一寸留七呼若灸者可灸三壯然足陽明取此三穴足太陰刺其橫脈出血也橫脈謂足內踝前斜過大脈則太陰之經脈也新校正云詳解溪在衝陽後三寸半按甲乙經一寸半氣穴論注二寸半瘧發身方熱刺跗上動脈則陽明之脈也開其空出其血立寒陽明之脈多血多氣熱盛氣壯故出其血而立可寒也瘧方欲寒刺手陽明太陰足陽明太陰亦謂開穴而出其血也當隨井俞而刺之也瘧脈滿大急刺背俞用中針傍五胠俞各一適肥瘦出其血也瘦者淺刺少出血肥者深刺多出血背俞謂大杼五胠俞謂譩嘻胠去魚切瘧脈小實急灸脛少陰刺指井灸脛少陰是謂復溜復溜在內踝上同身寸之二寸陷者中足少陰經也刺可入同身寸之三分留三呼若灸者可灸五壯刺指井謂刺至陰至陰在足小指外側去爪甲角如韭葉足太陽井也刺可入同身寸之一分留五呼若灸者可灸三壯瘧脈滿大急刺背俞用五胠俞背俞各一適行於血也謂調適肥瘦穴度深淺循三備法而行針令至於血脈也謂大杼五胠俞謂譩嘻主之新校正云詳此條從瘧脈滿大至此注終文注共五十五字當從刪削經文與次前經文重復王氏隨而注之别無義例不若士安之精審不復出也瘧脈緩大虛便用藥不宜用針緩者中風大為氣實虛者血虛血虛氣實風又攻之故宜藥治以遣其邪不宜針寫而出血也凡治瘧先發如食頃乃可以治過之則失時也先其發時真邪異居波隴不起故可治過時則真邪相合攻之則反傷真氣故曰失時新校正云詳從前瘧脈滿大至此全元起本在第四卷中王氏移續於此也諸瘧而脈不見刺十指間出血血去必已先視身之赤如小豆者盡取之十二瘧者其發各不同時察其病形以知其何脈之病也隨其形證而病脈可知先其發時如食頃而刺之一刺則衰二刺則知三刺則已不已刺舌下兩脈出血釋具下文不已刺郤中盛經出血又刺項已下俠脊者必已并足太陽之脈氣也郤中則委中也俠脊者謂大杼風門熱府穴也大杼在項第一椎下兩傍相去各同身寸之一寸半陷者中刺可入同身寸之三分留七呼若灸者可灸五壯風門熱府在第二椎下兩傍各同身寸之一寸半刺可入同身寸之五分留七呼若灸者可灸五壯新校正云詳大杼穴灸五壯按甲乙經作七壯氣穴論注作七壯刺熱論及熱穴注并作五壯舌下兩脈者廉泉也廉泉穴名在頷下結喉上舌本下陰維任脈之會刺可入同身寸之三分留三呼若灸者可灸三壯刺瘧者必先問其病之所先發者先刺之先頭痛及重者先刺頭上及兩額兩眉間出血頭上謂上星百會兩額謂懸顱兩眉間謂攢竹等穴也先項背痛者先刺之項風池風府主之背大杼神道主之先腰脊痛者先刺郤中出血先手臂痛者先刺手少陰陽明十指間新校正云按别本作手陰陽全本亦作手陰陽先足脛酸痛者先刺足陽明十指間出血各以邪居之所以脫寫之風瘧瘧發則汗出惡風刺三陽經背俞之血者三陽太陽也新校正云按甲乙經云足三陽胻酸痛甚按之不可名曰胕髓病以鑱針針絶骨出血立已陽輔穴也取如氣穴論中府俞法胕洪付切鑱鋤銜切身體小痛刺至陰新校正云按甲乙經無至陰二字諸陰之井無出血間日一刺諸井皆在指端足少陰井在足心宛宛中瘧不渴間日而作刺足太陽新校正云按九卷云足陽明太素同渴而間日作刺足少陽新校正云按九卷云手少陽太素同溫瘧汗不出為五十九刺自胃瘧下至此尋黃帝中誥圖經所主或有不與此文同應古之别法也氣厥論篇黃帝問曰五藏六府寒熱相移者何岐伯曰腎移寒於肝癰腫少氣肝藏血然寒入則陽氣不散陽氣不散則血聚氣澀故為癰腫又為少氣也新校正云按全元起本云腎移寒於脾元起注云腎傷於寒而傳於脾脾主肉寒生於肉則結為堅堅化為膿故為癰也血傷氣少故曰少氣甲乙經亦作移寒於脾王因誤本遂解為肝亦智者之一失也脾移寒於肝癰腫筋攣脾藏主肉肝藏主筋肉溫則筋舒肉冷則筋急故筋攣也肉寒則衛氣結聚故為癰腫肝移寒於心狂隔中心為陽藏神處其中寒薄之則神亂離故狂也陽氣與寒相薄故隔塞而中不通也心移寒於肺肺消肺消者飲一溲二死不治心為陽藏反受諸寒寒氣不消乃移於肺寒隨心火內鑠金精金受火邪故中消也然肺藏消鑠氣無所持故令飲一而溲二也金火相賊故死不能治肺移寒於腎為涌水涌水者按腹不堅水氣客於大腸疾行則鳴濯濯如囊裹漿水之病也肺藏氣腎主水夫肺寒入腎腎氣有餘腎氣有餘則上奔於肺故云涌水也大腸為肺之府然肺腎俱為寒薄上下皆無所之故水氣客於大腸也腎受凝寒不能化液大腸積水而不流通故其疾行則腸鳴而濯濯有聲如囊裏漿而為水病也新校正云按甲乙經水之病也作治主肺者脾移熱於肝則為驚衄肝藏血又主驚故熱薄之則驚而鼻中血出肝移熱於心則死兩陽和合火木相燔故肝熱入心則當死也陰陽别論曰肝之心謂之生陽生陽之屬不過四日而死新校正云按陰陽别論之文義與此殊王氏不當引彼誤文附會此義心移熱於肺傳為鬲消心肺兩間中有斜鬲膜鬲膜下際內連於橫鬲膜故心熱入肺久久傳化內為鬲熱消渴而多飲也肺移熱於腎傳為柔痓柔謂筋柔而無力痓謂骨痓而不隨氣骨皆熱髓不內充故骨痓強而不舉筋柔緩而無力也痓音職腎移熱於脾傳為虛腸澼死不可治脾土制水腎反移熱以與之是脾土不能制水而受病故久久傳為虛損也腸澼死者腎主下焦象水而冷今乃移熱是精氣內消下焦無主以守持故腸澼除而氣不禁止胞移熱於膀胱則癃溺血膀胱為津液之府胞為受納之司故熱入膀胱胞中外熱陰絡內溢故不得小便而溺血也正理論曰熱在下焦則溺血此之謂也膀胱移熱於小腸鬲腸不便上為口麋小腸脈絡心循咽下隔抵胃屬小腸故受熱以下令腸隔塞而不便上則口生瘡而麋爛也麋謂爛也糜武悲切小腸移熱於大腸為虙瘕為沉小腸熱已入大腸兩熱相薄則血溢而為伏瘕也血澀不利則月事沉滯而不行故云為伏瘕為沉也虙與伏同瘕一為疝傳寫誤也大腸移熱於胃善食而瘦入謂之食亦胃為水穀之海其氣外養肌肉熱消水穀又鑠肌肉故善食而瘦入也食亦者謂食入移易而過不生肌膚也亦易也新校正云按甲乙經入作又王氏注云善食而瘦入也殊為無義不若甲乙經作又讀連下文胃移熱於膽亦曰食亦義同上膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不止也腦液下滲則為濁涕涕下不止如彼水泉故曰鼻淵也頞謂鼻頞也足太陽脈起於目內眥上額交巔上入絡腦足陽明脈起於鼻交頞中傍約太陽之脈今腦熱則足太陽逆與陽明之脈俱盛薄於頞中故鼻頞辛也辛謂酸痛故下文曰傳為衄衊瞑目以足陽明脈交頞中傍約太陽之脈故耳熱盛則陽絡溢陽絡溢則衄出汗血也衊謂汗血也血出甚陽明太陽脈衰不能榮養於目故目瞑瞑暗也衊莫結切故得之氣厥也厥者氣逆也皆由氣逆而得之咳論篇黃帝問曰肺之令人咳何也岐伯對曰五藏六府皆令人咳非獨肺也帝曰願聞其狀岐伯曰皮毛者肺之合也皮毛先受邪氣邪氣以從其合也邪謂寒氣其寒飲食入胃從肺脈上至於肺則肺寒肺寒則外內合邪因而客之則為肺咳肺脈起於中焦下絡大腸還循胃口上鬲屬肺故云從肺脈上至於肺也五藏各以其時受病非其時各傳以與之時謂王月也非王月則不受邪故各傳以與之人與天地相參故五藏各以治時感於寒則受病微則為咳甚者為泄為痛寒氣微則外應皮毛內通肺故咳寒氣甚則入於內內裂則痛入於腸胃則泄痢乘秋則肺先受邪乘春則肝先受之乘夏則心先受之乘至陰則脾先受之乘冬則腎先受之以當用事之時故先受邪氣新校正云按全元起本及太素無乘秋則三字疑此文誤多也帝曰何以異之欲明其證也岐伯曰肺咳之狀咳而喘息有音甚則唾血肺藏氣而應息故咳則喘息而喉中有聲甚則肺絡逆故唾血也心咳之狀咳則心痛喉中介介如梗狀甚則咽腫喉痹手心主脈起於胸中出屬心包少陰之脈起於心中出屬心系其支别者從心系上俠咽喉故病如是新校正云按甲乙經介介如梗狀作喝喝又少陰之脈上俠咽不言俠喉肝咳之狀咳則兩脅下痛甚則不可以轉轉則兩胠下滿足厥陰脈上貫鬲布胠肋循喉嚨之後故如是胠亦脅也脾咳之狀咳則右胠下痛陰陰引肩背甚則不可以動動則咳劇足太陰脈上貫鬲俠咽其支别者復從胃别上鬲故病如是也脾氣連肺故痛引肩背也脾氣主右故右胠陰陰然深慢痛也劇音極腎咳之狀咳則腰背相引而痛甚則咳涎足少陰脈上股內後廉貫脊屬腎絡膀胱其直行者從腎上貫肝鬲入肺中循喉嚨俠舌本又膀胱脈從肩髆內别下俠脊抵腰中入循膂絡腎故病如是帝曰六府之咳奈何安所受病岐伯曰五藏之久咳乃移於六府脾咳不已則胃受之胃咳之狀咳而嘔嘔甚則長蟲出脾與胃合又胃之脈循喉嚨入缺盆下鬲屬胃絡脾故脾咳不已胃受之也胃寒則嘔嘔甚則腸氣逆上故蛔出蛔音回肝咳不已則膽受之膽咳之狀咳嘔膽汁肝與膽合又膽之脈從缺盆以下胸中貫鬲絡肝故肝咳不已膽受之也膽氣好逆故嘔溫苦汁也肺咳不已則大腸受之大腸咳狀咳而遺失肺與大腸合又大腸脈入缺盆絡肺故肺咳不已大腸受之大腸為傳送之府故寒入則氣不禁焉新校正云按甲乙經遺失作遺矢心咳不已則小腸受之小腸咳狀咳而失氣氣與咳俱失心與小腸合又小腸脈入缺盆絡心故心咳不已小腸受之小腸寒盛氣入大腸咳則小腸氣下奔故失氣也腎咳不已則膀胱受之膀胱咳狀咳而遺溺腎與膀胱合又膀胱脈從肩髆內俠脊抵腰中入循膂絡腎屬膀胱故腎咳不已膀胱受之膀胱為津液之府是故還溺久咳不已則三焦受之三焦咳狀咳而腹滿不欲食飲此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也三焦者非謂手少陽也正謂上焦中焦耳何者上焦者出於胃上口并咽以上貫鬲布胸中走腋中焦者亦至於胃口出上焦之後此所受氣者泌糟粕蒸津液化其精微上注於肺脈乃化而為血故言皆聚於胃關於肺也兩焦受病則邪氣熏肺而肺氣滿故使人多涕唾而面浮腫氣逆也腹滿不欲食者胃寒故也胃脈者從缺盆下乳內廉下循腹至氣街其支者復從胃下口循腹裏至氣街中而合今胃受邪故病如是也何以明其不謂下焦然下焦者别於回腸注於膀胱故水穀者常并居於胃中盛糟粕而俱下於大腸泌别汁循下焦而滲入膀胱尋此行化乃與胃口懸遠故不謂此也新校正云按甲乙經胃脈下循腹作下俠臍帝曰治之奈何岐伯曰治藏者治其俞治府者治其合浮腫者治其經諸藏俞者皆脈之所起第三穴諸府合者皆脈之所起第六穴也經者藏脈之所起第四穴府脈之所起第五穴靈樞經曰脈之所注為俞所行為經所入為合此之謂也帝曰善黃帝內經素問補注釋文卷之二十三

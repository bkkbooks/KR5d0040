front:
  text: 黃帝內經素問補注釋文卷之二十五宜一
  hash: sha256:9625eaa552fd78b07acb8977316d8355bf5b088cd1360c26a053329421463dd1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_025-001a, image: hfl/0654/0654-004.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤刺腰痛篇足太陽脈令人腰痛引項脊尻背如重狀足太陽脈别下項循肩髆內俠脊抵腰中别下貫臀故令人腰痛引項脊尻背如重狀也新校正云按甲乙經貫臀作貫胂刺瘧注亦作貫胂三部九候注作貫臀尻苦笑切刺其郤中太陽正經出血春無見血郤中委中也在膝後屈處膕中央約文中動脈足太陽脈之所入也刺可入同身寸之五分留七呼若灸者可灸三壯太陽合腎腎王於冬水衰於春故春無見血也少陽令人腰痛如以針刺其皮中循循然不可以俯仰不可以顧足少陽脈繞髮際橫入髀厭中故令腰痛如以針刺其皮中循循然不可俯仰少陽之脈起於目鋭眥上抵頭角下耳後循頭行手陽明之前至肩上交出手少陽之後其支别者目鋭眥下大迎合手少陽於頤下加頰車下頸合缺盆故不可以顧新校正云按甲乙經行手陽明之前作行手少陽之前也刺少陽成骨之端出血成骨在膝外廉之骨獨起者夏無見血成骨謂膝外近下胻骨上端兩起骨相并間陷容指者也胻骨所成柱膝髀骨故謂之成骨也少陽合肝肝主於春木衰於夏故無見血也陽明令人腰痛不可以顧顴如有見者善悲足陽明脈起於鼻交頞中下循鼻外入上齒中還出俠口環唇下交承漿却循頤後下廉出大迎其支别者從大迎前下人迎循喉嚨入缺盆又其支别者起胃下口循腹裏至氣街中而合以下髀故令人腰痛不可顧顧如有見者陽虛故悲也刺陽明於胻前三痏上下和之出血秋無見血按內經中誥流注圖經陽明脈穴俞之所主此腰痛者悉刺胻前三痏則正三里穴也三里在膝下同身寸之三寸胻骨外廉兩筋肉分間刺可入同身寸之一寸留七呼若灸者可灸三壯陽明合脾脾王長夏土衰於秋故秋無見血新校正云按甲乙經胻作骭足少陰令人腰痛痛引脊內廉足少陰脈上股內後廉貫脊屬腎故令人腰痛痛引脊內廉也新校正云按全元起本脊內廉作脊內痛太素亦同此前少足太陰腰痛證并刺足太陰法應古文脫簡也刺少陰於內踝上二痏春無見血出太多不可復也按內經中誥流注圖經少陰脈穴俞所主此腰痛者當刺內踝上則正復溜穴也復溜見內踝後上同身寸之二寸動脈陷者中刺可入同身寸之三分留三呼若灸者可灸五壯厥陰之脈令人腰痛腰中如張弓弩弦足厥陰脈自陰股環陰器抵少腹其支别者與太陰少陽結於腰髀下俠脊第三第四骨空中其穴即中髎下髎故腰痛則中如張弓弩之弦也如張弦者言強急之甚刺厥陰之脈在腨踵魚腹之外循之纍纍然乃刺之腨踵者言脈在腨外側下當足跟也腨形勢如卧魚之腹故曰魚腹之外也循其分肉有血絡纍纍然乃刺出之此正當蠡溝穴分足厥陰之絡在內踝上五寸别走少陽者刺可入同身寸之二分留三呼若灸者可灸三壯厥陰三經作居陰是傳寫草書厥字為居也新校正按經云厥陰之脈令人腰痛次言刺厥陰之脈注言刺厥陰之絡經注相違疑經中脈字乃絡字之誤也喘時轉切其病令人善言默默然不慧刺之三痏厥陰之脈循喉嚨之後上入頏顙絡於舌本故病則善言風盛則昏冒故不爽慧也三刺其處腰痛乃除新校正云按經云善言默默然不慧詳善言默默二病難相兼全元起本無善字於義為允又按甲乙經厥陰之脈不絡舌本王氏於素問之中五處引注而注厥論與刺熱及此三篇皆云絡舌本注風論注痹論二篇不言絡舌本蓋王氏亦疑而兩言之也解脈令人腰痛痛而引肩目𥆨𥆨然時遺溲解脈散行脈也言不合而别行也此足太陽之經起於目內眥上額交巔上循肩髆俠脊抵腰中入循膂絡腎屬膀胱下入膕中故病斯候也又其支别者從髆內别下貫胂循髀外後廉而下合於膕中二脈如繩之解股故名解脈也刺解脈在膝筋內分間郤外廉之橫脈出血血變而止膝後兩傍大筋雙上股之後兩筋之間橫文之處弩肉高起則郤中之分也古中誥以膕中為太陽之郤當取郤外廉有血脈橫見迢然紫黑而盛滿者乃刺之當見黑血必候其血色變赤乃止血不變赤極而寫之必行血色變赤乃止此太陽中經之為腰痛也解脈令人腰痛如引帶常如折腰狀善恐足太陽之别脈自肩而别下循背脊至腰而橫入髀外後廉而下合膕中故若引帶如折腰之狀新校正云按甲乙經如引帶作如裂善恐作善怒刺解脈在邸中結絡如黍米刺之血射以黑見赤血而已郤中則委中穴足太陽合也在膝後屈處膕中央約文中動脈刺可入同身寸之五分留七呼若灸者可灸三壯此經刺法也今則取其結絡大如黍米者當黑血箭射而出見血變赤然可止也新校正云按全元起云有兩解脈病源各異恐誤未詳同陰之脈令人腰痛痛如小錘居其中怫然腫足少陽之别絡也并少陽經上行去足外踝上同身寸之五十乃别走厥陰並經下絡足跗故曰同陰脈也怫怒也言睡如嗔怒也新校正云按太素小錘作小針怫音弗剌同陰之脈在外踝上絶骨之端為三痏絶骨之端如前同身寸之三分陽輔穴也足少陽脈所行剌可入同身寸之五分留七呼若炎者可炙三壯陽維之脈令人腰痛痛上怫然腫陽維起於陽則太陽之所生竒經八脈此其一也剌陽維之脈脈與太陽合腨下間去地一尺所太陽所主與正經並行而上至腨下復與太陽合而上也腨下去地正同身寸之一尺是則承光穴在鋭腨陽下肉分間陷者中剌可入同身寸之七分若炎者可炎五壯以其取腨腸下肉分間故云合腨下間新校正云按穴之所在乃承山穴非承光也山字誤為光衡絡之脈令人腰痛不可以俯仰則恐仆得之舉重傷腰衡絡絶惡血歸之衡橫也謂太陽之外絡自腰中橫入髀外後廉而下與中經合於膕中者今舉重傷腰則橫絡絶中經獨盛故腰痛不可以俯仰矣一經作行絶之脈傳寫魚魯之誤也若是行脈中誥不應取太陽脈委陽殷門之穴也刺之在郤陽筋之間上郤數寸衡居為二痏出血橫居二穴謂委陽殷門平視橫相當也郤陽謂浮郤穴上側委陽穴也筋之間謂膝後膕上兩筋之間殷門穴也二穴各去臀下橫文同身寸之六寸故曰上郤數寸也委陽刺可入同身寸之七分留五呼若灸者可灸三壯殷門刺可入同身寸之五分留七呼若灸者可灸三壯故曰行居為二痏新校正云詳王氏云浮郤穴上側委陽穴也按甲乙經委陽在浮郤穴下一寸不得言上側也會陰之脈令人腰痛痛上漯漯然汗出汗乾令人欲飲飲已欲走足太陽之中經也其脈循腰下會於後陰故曰會陰之脈其經自腰下行至足今陽氣大盛故痛上漯漯然汗出汗液既出則腎燥陰虛故汗乾令人欲飲水以救腎也水入腹已腎氣復生陰氣流行太陽又盛故飲水已反欲走也刺直陽之脈上三痏在蹻上郤下五寸橫居視其盛者出血直陽之脈則太陽之脈俠脊下行貫臀下至膕中下循腨過外踝之後條直而行者故曰直陽之脈也蹻謂陽蹻所生申脈穴在外踝下也郤下則膕下也言此刺處在膕下同身寸之五寸上承郤中之穴下當申脈之位是謂承筋穴即腨中央如外陷者中也太陽脈氣所發禁不可刺可灸三壯今云刺者謂刺其血絡之盛滿者也兩腨皆有太陽經氣下行當視兩腨中央有血絡盛滿者乃刺出之故曰視其盛者出血新校正云詳上云會陰之脈令人腰痛此云刺直陽之脈者詳此直陽之脈即會陰之脈也文變而事不殊又承筋穴注云腨中央如外按甲乙經及骨空論注無如外二字飛陽之脈令人腰痛痛上怫怫然甚則悲以恐是陰維之脈也去內踝上同身寸之五寸腨分中并少陰經而上也少陰之脈前則陰維脈所行也足少陰之脈從腎上貫肝鬲入肺中循喉嚨俠舌本其支别者從肺出絡心注胸中故甚則悲以恐也恐者生於腎悲者生於心刺飛陽之脈在內踝上五寸新校正云按甲乙經作二寸少陰之前與陰維之會內踝後上同身寸之五寸復溜穴少陰脈所行刺可入同身寸之三分內踝之後築賔穴陰維之郤刺可入同身寸之三分若灸者可灸五壯少陰之前陰維之會以三脈會在此穴分位也刺可入同身寸之三分若灸者可灸五壯今中誥經文正同此法新校正云按甲乙經足太陽之絡别走少陰者名曰飛陽在外踝上七寸又云築賔陰維之郤在內踝上腨分中復溜穴在內踝上二寸今此經注都與甲乙不合者疑經注中五寸字當作二寸則素問與甲乙相應矣昌陽之脈令人腰痛痛引膺目𥆨𥆨然甚則反折舌卷不能言陰蹻脈也陰蹻者足少陰之别也起於然骨之後上內踝之上直上循陰股入陰而循腹上入胸裏入缺盆上出人迎之前入頏內廉屬目內眥合於太陽陽蹻而上行故腰痛之狀如此刺內筋為二痏在內躁上大筋前太陰後上踝二寸所內筋謂大筋之前分內也太陰後大筋前即陰蹻之郤交信穴也在內踝上同身寸之二寸少陰前太陰後筋骨之間陷者之中刺可入同身寸之四分留五呼若灸者可灸三壯今中誥經文正主此散脈令人腰痛而熱熱甚生煩腰下如有橫木居其中甚則遺溲散脈足太陰之别也散行而上故以名焉其脈循股內入腹中與少陰少陽結於腰髁下骨空中故病則腰下如有橫木居其中甚乃遺溲也刺散脈在膝前骨肉分間絡外廉束脈為三痏謂膝前內側也骨肉分謂膝內輔骨之下下廉腨肉之兩間也絡外廉則太陰之絡色青而見者也輔骨之下後有大筋擷束膝胻之骨令其連屬取此筋骨繫束之處脈以去其病是曰地機三刺而已故曰束脈為之三痏也肉里之脈令人腰痛不可以咳咳則筋縮急肉里之脈少陽所生則陽維之脈氣所發也里裏也刺肉里之脈為二痏在太陽之外少陽絶骨之後分肉主之一經云少陽絶骨之前傳寫誤也絶骨之前足少陽脈所行絶骨之後陽維脈所過故指曰在太陽之外少陽絶骨之後也分肉穴在足外踝直上絶骨之端如後同身寸之二分筋肉分間陽維脈氣所發刺可入同身寸之五分留十呼若灸者可灸三壯新校正云按分肉之穴甲乙經不見與氣穴注兩出而分寸不同氣穴注二分作三分五分作三分十呼作七呼腰痛俠脊而痛至頭几几然目𥆨𥆨欲僵仆刺足太陽郤中出血郤中委中新校正云按太素作頭沉沉然腰痛上寒刺足太陽陽眀上熱刺足厥陰不可以俯仰刺足少陽中熱而喘刺足少陰刺郤中出血此法玄妙中誥不同莫可窺測當用知其應不爾皆應先去血絡乃調之也腰痛上寒不可顧刺足陽明上寒陰市主之陰市在膝上同身寸之三寸伏菟下陷者中足陽明脈氣所發刺可入同身寸之三分留七呼若灸者可灸三壯不可顧三里主之三里在膝下同身寸之三寸脈外廉兩筋肉分間足陽明脈之所入也刺可入同身寸之三寸留七呼若灸者可灸三壯上熱刺足太陰地機主之地機在膝下同身寸之五寸足太陰之郤也刺可入同身寸之三分若灸者可灸三壯新校正云按甲乙經作五壯中熱而喘刺足少陰涌泉太鍾悉主之涌泉在足心陷者中屈足捲指宛宛中足少陰脈之所出刺可入同身寸之三分留三呼若灸者可灸三壯太鍾在足跟後街中動脈足少陰之絡刺可入同身寸之二分留七呼若灸者可灸三壯新校正云按刺瘧注大鍾在內踝後街中水穴論注在內踝後此注在跟後街中動脈三注不同甲乙經亦云在跟後衝中當從甲乙經為正大便難刺足少陰涌泉主之少腹滿刺足厥陰太衝主之在足大指本節後內間同身寸之二寸陷者中脈動應手足厥陰脈之所注也刺可入同身寸之三分留十呼若灸者可灸三壯如折不可以俯仰不可舉刺足太陽如折束骨主之不可以俯仰京骨崑崙悉主之不可舉申脈僕參悉主之束骨在足小指外側本節後赤白肉際陷者中足太陽脈之所注也刺可入同身寸之三分留三呼若灸者可灸三壯京骨在足外側大骨下赤白肉際陷者中按而得之足太陽脈之所過也刺可入同身寸之三分留七呼若灸者可灸三壯崑崙在足外踝後跟骨上陷者中細脈動應手足太陽脈之所行也刺可入同身寸之五分留十呼若灸者可灸三壯申脈在外踝下同身寸之五分容爪甲陽蹻之所生也刺可入同身寸之六分留十呼若灸者可灸三壯僕參在跟骨下陷者中足太陽陽蹻二脈之會刺可入同身寸之三分留七呼若灸者可灸三壯新校正云按甲乙經申脈在外踝下陷者中無五分字刺入六分作三分留十呼作六呼氣穴注作七呼僕參留七呼甲乙經作六呼引脊內廉刺足少陰復溜主之取用飛陽注從腰痛上寒不可顧至此件經語除注并合朱書新校正云按全元起本及甲乙經并太素自腰痛上寒至此并無乃王氏所添也今注云從腰痛上寒至并合朱書十九字非王冰之語蓋後人所加也腰痛引少腹控䏚不可以仰新校正云按甲乙經作不可以俯仰字䏚音抄刺腰尻交者兩髁胂上以月生死為痏數發針立已此邪客於足太陰之絡也控通引也䏚謂季脅下之空軟處也腰尻交者謂髁下尻骨二傍四骨空左右八穴俗呼此骨為八髎骨也此腰痛取腰髁下第四髎即下髎穴也足太陰厥陰少陽三脈左右交結於中故曰腰尻交者也兩髁脾謂兩髁骨下堅起肉也胂上非脾之上巔正當刺胂肉矣直刺胂肉即胂上也何者胂之上巔别有中膂肉俞白環俞雖并主腰痛考其形證經不相應矣髁骨即腰脊兩傍起骨也俠脊兩傍腰髁之下各有胂肉隴起而斜趣於髁骨之後內承其髁故曰兩髁胂也下承髁胂肉左右兩胂各有四骨空故曰上髎次髎中髎下髎上髎當髁骨下陷者中餘三髎少斜下按之陷中是也四空悉主腰痛唯下髎所主文與經同即太陰厥陰少陽所結者也刺可入同身寸之三寸留十呼若灸者可灸三壯以月生死為痏數者月初向圓為月生月半向空為月死死月刺少生月刺多繆刺論曰月生一日一痏二日二痏漸多之十五日十五痏十六日十四痏漸少之其痏數多少如此即知之髁苦瓦切髎音遼左取右右取左痛在左針取右痛在右針取左所以然者以其脈左右交結於尻骨之中故也新校正云詳此腰痛引少腹一節與繆刺論重風論篇黃帝問曰風之傷人也或為寒熱或為熱中或為寒中或為癘風或為偏枯或為風也其病各異其名不同或內至五藏六府不知其解願聞其説傷謂人自中之岐伯對曰風氣藏於皮膚之間內不得通外不得泄腠理開踈則邪風入風氣入已玄府閉封故內不得通外不得泄也風者善行而數變腠理開則灑然寒閉則熱而悶灑然寒貌悶不爽貌腠理開則風飄揚故寒腠理閉則風混亂故悶其寒也則衰食飲其熱也則消肌肉故使人怢栗而不能食名曰寒熱寒風入胃故食飲衰熱氣內藏故消肌肉寒熱相合故怢栗而不能食名曰寒熱也怢栗卒振寒貌新校正云詳怢栗全元起本作失味甲乙經作解㑊風氣與陽明入胃循脈而上至目內眥其人肥則風氣不得外泄則為熱中而目黃人瘦則外泄而寒則為寒中而泣出陽明者胃脈也胃脈起於鼻交頞中下循鼻外入上齒中還出俠口環唇下交承漿却循頤後下廉循喉嚨入缺盆下鬲屬胃故與陽明入胃循脈而上至目內眥也人肥則腠理密緻故不得外泄則為熱中而目黃人瘦則腠理開踈風得外泄則寒中而泣出也風氣與太陽俱入行諸脈俞散於分肉之間與衛氣相干其道不利故使肌肉憤䐜而有瘍衛氣有所凝而不行故其肉有不仁也肉分之間衛氣行處風與衛氣相薄俱行於肉分之間故氣道澀而不利也氣道不利風氣內攻衛氣相持故肉憤䐜而瘡出也瘍瘡也若衛氣被風吹之不得流轉所在偏併凝而不行則肉有不仁之處也不仁謂𤸷而不知寒熱痛癢癘者有榮衛熱胕其氣不清故使鼻柱壞而色敗皮膚瘍潰此則風入於經脈之中也榮行脈中故風入脈中內攻於血與榮氣合合熱而血胕壞也其氣不清言潰亂也然血脈潰亂榮復挾風陽脈盡上於頭鼻為呼吸之所故鼻柱壞而色惡皮膚破而潰爛也脈要精微論曰脈風盛為癘潰胡對切風寒客於脈而不去名曰癘風或名曰寒熱始為寒熱熱成曰癘風新校正云按别本成一作盛以春甲乙傷於風者為肝風以夏丙丁傷於風者為心風以季夏戊己傷於邪者為脾風以秋庚辛中於邪者為肺風以冬壬癸中於邪者為腎風春甲乙木肝主之夏丙丁火心主之季夏戊己土脾主之秋庚辛金肺主之冬壬癸水腎主之風中五藏六府之俞亦為藏府之風各入其門户所中則為偏風隨俞左右而偏中之則為偏風風氣循風府而上則為腦風風入係頭則為目風眼寒風府穴名正入項髮際一寸大筋內宛宛中督脈陽維之會自風府而上則腦户也腦户者督脈足太陽之會故循風府而上則為腦風也足太陽之脈起於目內眥上額交巔上入絡腦還出故風入係頭則為目風眼寒也飲酒中風則為漏風熱鬱腠疏中風汗出多如液漏故曰漏風經具名曰酒風入房汗出中風則為內風內耗其精外開腠理因內風襲故曰內風經具名曰勞風新沐中風則為首風沐髮中風舍於頭故曰首風久風入中則為腸風餐泄風在腸中上熏於胃故食不化而下出焉餐泄者食不化而出也新校正云按全元起云餐泄者水穀不分為利外在腠理則為泄風風居腠理則玄府開通風薄汗泄故云泄風故風者百病之長也至其變化乃為他病也無常方然致有風氣也長先也先百病而有也新校正云按全元起本及甲乙經致字作故帝曰五藏風之形狀不同者何願聞其診及其病能診謂可言之證能謂內作病形岐伯曰肺風之狀多汗惡風色皏然白時咳短氣晝日則差暮則甚診在眉上其色白凡內多風氣則熱有餘熱則腠理開故多汗也風薄於內故惡風焉皏謂薄白色也肺色白在變動為咳主藏氣風內迫之故色皏然白時咳短氣也晝則陽氣在表故差暮則陽氣入裏風內應之故甚也眉上謂兩眉間之上闕庭之部所以外司肺候故診在焉白肺色也心風之狀多汗惡風焦絶善怒嚇赤色病甚則言不可快診在口其色赤焦絶謂唇焦而文理斷絶也何者熱則皮剝故也風薄於心則神亂故善怒而嚇人也心脈支别者從心系上俠咽喉而主舌故病甚則言不可快也口唇色赤故診在焉赤者心色新校正云按甲乙經無嚇字肝風之狀多汗惡風善悲色微蒼嗌乾善怒時憎女子診在目下其色青肝病在心藏無養心氣虛故善悲肝合木木色蒼故色微蒼也肝脈者循股陰入髦中環陰器抵少腹俠胃屬肝絡膽上貫鬲布脅肋循喉嚨之後入頏顙上出額與督脈會於巔其支别者從目系下故嗌乾善怒時憎女子診在目下也青肝色也脾風之狀多汗惡風身體怠墮四支不欲動色薄微黃不嗜食診在鼻上其色黃脾脈起於足上循胻骨又上膝股內前廉入腹屬脾絡胃上鬲俠咽連舌本散舌下其支别者復從胃别上鬲注心中心脈出於手循臂故身體怠墮四支不欲動而不嗜食脾氣合土主中央鼻於面部亦居中故診在焉黃脾色也新校正云按王注脾風不當引心脈出於手循臂七字於義無取脾主四支脾風則四支不欲動矣腎風之狀多汗惡風面痝然浮腫脊痛不能正立其色炲隱曲不利診在肌上其色黑痝然言腫起也炲黑色也腎者陰也目下亦陰也故腎藏受風則面痝然而浮腫腎脈者起於足下上循腨內出膕內廉上股內後廉貫脊故脊痛不能正立也隱曲者謂隱蔽委曲之處也腎藏精外應交接今藏被風薄精氣內微故隱蔽委曲之事不通利所為也陰陽應象大論曰氣歸精精食氣今精不足則氣內歸精氣不注皮故肌皮上黑也黑腎色也胃風之狀頸多汗惡風食飲不下鬲塞不通腹善滿失衣則䐜脹食寒則泄診形瘦而腹大胃之脈支别者從頤後下廉過人迎循喉嚨入缺盆下鬲屬胃絡脾其直行者從缺盆下乳內廉下俠齊入氣街中其支别者起胃下口循腹裏至氣街中而合故頸多汗食飲不下鬲塞不通腹善滿也然失衣則外寒而中熱故腹䐜脹食寒則寒物薄胃而陽不內消故泄利胃合脾而主肉胃氣不足則肉不長故瘦也胃中風氣蓄聚故腹大也新校正云按孫思邈云新食竟取風為胃風首風之狀頭面多汗惡風當先風一日則病甚頭痛不可以出內至其風日則病少愈頭者諸陽之會風客之則文腠疏故頭面多汗也夫人陽氣外合於風故先當風一日則病甚以先風甚故亦先衰是以至其風日則病少愈內謂室屋之內也不可以出室屋之內者以頭痛甚而不喜外風故也新校正云按孫思邈云新沐浴竟取風為首風漏風之狀或多汗常不可單衣食則汗出甚則身汗喘息惡風衣裳濡口乾善渴不能勞事肺胃風熱故不可單衣腠理開踈故食則汗出甚則風薄於肺故身汗喘息惡風衣裳濡口乾善渴也形勞則喘息故不能勞事新校正云按孫思邈云因醉取風為漏風其狀惡風多汗少氣口乾善渴近衣則身熱如火臨食則汗流如雨骨節懈惰不欲自勞泄風之狀多汗汗出泄衣上口中乾上漬其風不能勞事身體盡痛則寒上漬謂皮上濕如水漬也以多汗出故爾汗多則津液涸故口中乾形勞則汗出甚故不能勞事身體盡痛以其汗多汗多則亡陽故寒也新校正云按孫思邈云新房室竟取風為內風其狀惡風汗流沾衣裳疑此泄風乃內風也按本論前文先云漏風內風首風次言入中為腸風在外為泄風今有泄風而無內風孫思邈載內風乃此泄風之狀故知此泄字內之誤也帝曰善黃帝內經素問補注釋文卷之二十五

front:
  text: 黃帝內經素問補注釋文卷之三十一宜七
  hash: sha256:dc00c99ea189d4303a5d23be8513e1125341896785dda080a75b31f90b931a4c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_031-001a, image: hfl/0655/0655-004.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤刺志論篇黃帝問曰願聞虛實之要岐伯對曰氣實形實氣虛形虛此其常也反此者病陰陽應象大論曰形歸氣由是故虛實同焉反謂不相合應失常平之候也形氣相反故病生氣謂脉氣形謂身形也穀盛氣盛穀虛氣虛此其常也反此者病靈樞經曰榮氣之道內穀為實穀入於胃氣傳與肺精專者上行經隧由是故穀氣虛實占必同焉候不相應則為病也新校正云按甲乙經實作寶脉實血實脉虛血虛此其常也反此者病脉者血之府故虛實同焉反不相應則為病也帝曰如何而反岐伯曰氣虛身熱此謂反也氣虛為陽氣不足陽氣不足當身寒反身熱者脉氣當盛脉不盛而身熱證不相符故謂反也新校正云按甲乙經云氣盛身寒氣虛身熱此謂反也當補此四字穀入多而氣少此謂反也胃之所出者穀氣而布於經脉也穀入於胃脉道乃散今穀入多而氣少者是胃氣不散故謂反也穀不入而氣多此謂反也胃氣外散肺并之也脉盛血少此謂反也脉少血多此謂反也經脉行氣絡脉受血經氣入絡絡受經氣候不相合故皆反常也氣盛身寒得之傷寒氣虛身熱得之傷暑傷謂觸冒也寒傷形故氣盛身寒熱傷氣故氣虛身熱穀入多而氣少者得之有所脫血濕居下也脫血則血虛血虛則氣盛內鬱化成津液流入下焦故云濕居下也穀入少而氣多者邪在胃及與肺也胃氣不足肺氣下流於胃中故邪在胃然肺氣入胃則肺氣不自守氣不自守則邪氣從之故云邪在胃及與肺也脉小血多者飲中熱也飲謂留飲也飲留脾胃之中則脾氣溢脾氣溢則發熱中脉大血少者脉有風氣水漿不入此之謂也風氣盛滿則水漿不入於脉夫實者氣入也虛者氣出也入為陽出為陰陰生於內故出陽生於外故入氣實者熱也氣虛者寒也陽盛而陰內拒故熱陰盛而陽外微故寒入實者左手開針空也入虛者左手閉針空也言用針之補寫也右手持針左手捻穴故實者右手開針空以寫之虛者左手開針空以補之也捻音涅針解篇黃帝問曰願聞九針之解虛實之道岐伯對曰刺虛則實之者針下熱也氣實乃熱也滿而泄之者針下寒也氣虛乃寒也菀陳則除之者出惡血也菀積也陳久也除去也言絡脉之中血積而久者針刺而除去之也邪盛則虛之者出針勿按邪者不正之目非本經氣是則謂邪非言鬼毒精邪之所勝也出針勿按穴俞且開故得經虛邪氣發泄也徐而疾則實者徐出針而疾按之疾而徐則虛者疾出針而徐按之徐出謂得經氣已久乃出之疾按謂針出穴已速疾按之則真氣不泄經脉氣全故徐而疾乃實也疾出針謂針入穴已至於經脉即疾出之徐按謂針出穴已徐緩按之則邪氣得泄精氣復固故疾而徐乃虛也言實與虛者寒溫氣多少也寒溫謂經脉陰陽之氣也若無若有者疾不可知也言其冥昧不可即而知也夫不可即知故若無慧然神悟故若有也察後與先者知病先後也知病先後乃補寫之為虛與實者工勿失其法針經曰經氣已至愼守勿失此之謂也新校正云按甲乙經云若有若亡為虛與實若得若失者離其法也妄為補寫離亂大經誤補實者轉令若得誤寫虛者轉令若失故曰若得若失也針經曰無實實無虛虛此其誡也新校正云詳自篇首至此與太素九針解篇經同而解異二經互相發明也虛實之要九針最妙者為其各有所宜也熱在頭身宜鑱針肉分氣滿宜員針脉氣虛少宜匙針寫熱出血發泄固病宜鋒針破癰腫出膿血宜䤵針調陰陽去暴痹宜員利針治經絡中痛痹宜毫針痹深居骨解腰脊節腠之間者宜長針虛風舍於骨解皮膚之間宜大針此之謂各有所宜也新校正云按别本䤵一作鈹匙音氐補寫之時者與氣開闔相合也氣當時刻謂之開已過未至謂之闔時刻者然水下一刻人氣在太陽水下二刻人氣在少陽水下三刻人氣在陽明水下四刻人氣在陰分水下不已氣行不已如是則當刻者謂之開過刻及未至者謂之闔也針經曰謹候其氣之所在而刺之是謂逢時此所謂補寫之時也新校正云詳自篇首至此文出靈樞經素問解之互相發明也甲乙經補寫之時以針為之者此脫此四字九針之名各不同形者針窮其所當補寫也各不同形謂長短鋒穎不等窮其補寫謂各隨其療而用之也新校正云按九針之形今具甲乙經刺實須其虛者留針陰氣隆至乃去針也刺虛須其實者陽氣隆至針下熱乃去針也言要以氣至而有效也經氣已至愼守勿失者勿變更也變謂變易更謂改更皆變法也言得氣至必宜謹守無變其法反招損也淺深在志者知病之內外也志一為意志意皆行針之用也近遠如一者深淺其候等也言氣雖近遠不同然其側候皆以氣至而有效也如臨深淵者不敢墯也言氣候補寫如臨深淵不敢墯慢失補寫之法也手如握虎者欲其壯也壯謂持針堅定也針經曰持針之道堅者為實則其義也新校正云按甲乙經實字作寶神無營於衆物者靜志觀病人無左右視也目絶妄視心專一務則用之必中無惑誤也新校正詳從刺實須其虛至此文見寶命全形論此又為之解亦互相發眀也義無邪下者欲端以正也正指直刺針無左右必正其神者欲瞻病人目制其神令氣易行也檢彼精神令無散越則氣為神使中外易調也所謂三里者下膝三寸也所謂跗之者新校正云按全元起本跗之作低胻太素作付之按骨空論跗之疑作跗上舉膝分易見也三里穴名正在膝下三寸胻外兩筋肉分間極重按之則足跗上動脉止矣故曰舉膝分易見巨虛者蹻足胻獨陷者巨虛穴名也蹻謂舉也取巨虛下廉當舉足取之則胻外兩筋之間陷下也下廉者陷下者也欲知下廉穴者胻外兩筋之間獨陷下者則其處也帝曰余聞九針上應天地四時陰陽願聞其方令可傳於後世以為常也岐伯曰夫一天二地三人四時五音六律七星八風九野身形亦應之針各有所宜故曰九針新校正云詳此文與靈樞經相出入人皮應天覆蓋於物天之象也人肉應地柔厚安靜地之象也人脉應人人筋應時人脉應人者盛衰變易人之象也人筋應時者堅固貞定時之象也人聲應音備五音故人陰陽合氣應律交會氣通相生無替則律之象新校正云按别本氣一作度人齒面目應星人面應七星者所謂面有七孔應之也新校正云詳此注乃全元起之辭也人出入氣應風動出往來風之象也人九竅三百六十五絡應野身形之外野之象也故一針皮二針肉三針脉四針筋五針骨六針調陰陽七針益精八針除風九針通九竅除三百六十五節氣此之謂各有所主也一鑱針二員針三匙針四鋒針五䤵針六員利針七毫針八長針九大針新校正云按别本䤵一作鈹人心意應八風動靜不形風之象也人氣應天運行不息天之象也人髮齒耳目五聲應五音六律髮齒生長耳目清通五聲應同故應五音及六律也人陰陽脉血氣應地人陰陽有交會生成脉血氣有虛盈盛衰故應地也人肝目應之九肝氣通目木生數三三而三之則應之九也九竅三百六十五新校正云按全元起本無此七字人一以觀動靜天二以候五色七星應之以候髮毋澤五音一以候宫商角徵羽六律有餘不足應之二地一以候高下有餘九野一節俞應之以候閉節三人變一分人候齒泄多血少十分角之變五分以候緩急六分不足三分寒關節第九分四時人寒溫燥濕四時一應之以候相反一四方各作解此一百二十四字蠹簡爛文義理殘缺莫可尋究而上古書故且載之以佇後之具本也新校正云詳王氏云一百二十四字今有一百二十三字又亡一字長刺節論篇刺家不診聽病者言在頭頭疾痛為藏針之藏猶深也言深刺之故下文曰新校正云按全元起本云為針之無藏字刺至骨病已上無傷骨肉及皮皮者道也皮者針之道故刺骨無傷骨肉及皮也陰刺入一傍四處治寒熱頭有寒熱則用陰刺法治之陰刺謂卒刺之如此數也新校正云按别本卒刺一作平刺按甲乙經陽刺者正內一傍內四陰刺者左右卒刺之此陰刺疑是陽刺深專者刺大藏寒熱病氣深專攻中者當刺五藏以拒之迫藏刺背背俞也迫近也漸近於藏則刺背五藏之俞也刺之迫藏藏會言刺近於藏者何也以是藏氣之會發也腹中寒熱去而止言刺背俞者無問其數要以寒熱去乃止針與刺之要發針而淺出血若與諸俞刺之則如此治腐腫者刺腐上視癰小大深淺刺腐腫謂腫中肉腐敗為膿血者癰小者淺刺之癰大者深刺之新校正云按全元起本及甲乙經腐作癰刺大者多血小者深之必端內針為故正癰之大者多出血癰之小者但直針之而已新校正云按甲乙經云刺大者多而深之必端內針為故正也此文云小者深之疑此誤病在少腹有積刺皮𩩻以下至少腹而止刺俠脊兩傍四椎間刺兩髂髎季脅肋間導腹中氣熱下已少腹積謂寒熱之氣結積也皮𩩻謂齊下同身寸之五寸橫約文審刺而勿過深之刺禁論曰刺少腹中膀胱溺出令人少腹滿由此故不可深之矣俠脊四椎之間據經無俞恐當云五椎間五椎之下兩傍正心之俞心應少腹故當言之間也髂謂腰骨髎一為髀字形相近之誤也髎謂居髎腰側穴也季脅肋間當是刺季肋之間京門穴也新校正云按釋音皮𩩻作皮䯏是䯏誤作𩩻也及遍尋篇韵中無𩩻字只有䯏骨端也皮䯏者蓋謂齊下橫骨之端也全元起本作皮髓元起注云齊傍埵起也亦未為得髂口亞切䯏光抹切病在少腹腹痛不得大小便病名曰疝得之寒刺少腹兩股間刺腰髁骨間刺而多之盡炅病已厥陰之脉環陰器抵少腹衝脉與少陰之絡皆起於腎下出於氣街循陰股其後行者自少腹以下骨中央女子入繫廷孔其絡循陰器合篡間繞篡後别繞臀至少陰與巨陽中絡者合少陰上股內後廉貫脊屬腎其男子循莖下至篡與女子等故刺少腹及兩股間又刺腰髁骨間也腰髁骨者腰房俠脊平立陷者中按之有骨處也疝為寒生故多刺之少腹盡熱乃止針炅熱也新校正云按别本篡一作基又初患反病在筋筋攣節痛不可以行名曰筋痹刺筋上為故刺分肉間不可中骨也分謂肉分間有筋維絡處也刺筋無傷骨故不可中骨也病起筋炅病已止筋雍痹生故得筋熱病已乃止病在肌膚肌膚盡痛名曰肌痹傷於寒濕刺大分小分多發針而深之以熱為故大分謂大肉之分小分謂小肉之分無傷筋骨傷筋骨癰發若變針經曰病淺針深內傷良肉皮膚為癰又曰針太深則邪氣反沉病益甚傷筋骨則針太深故癰發若變也諸分盡熱病已止熱可消寒故病已則止病在骨骨重不可舉骨髓酸痛寒氣至名曰骨痹深者刺無傷脉肉為故其道大分小分骨熱病已止骨痹刺無傷脉肉者何自刺其氣通肉之大小分中也病在諸陽脉且寒且熱諸分且寒且熱曰狂氣狂亂也刺之虛脉視分盡熱病已止病初發歲一發不治月一發不治月四五發名曰癲病刺諸分諸脉其無寒者以針調之病已止新校正云按甲乙經云刺諸分其脉尤寒以針補之病風且寒且熱炅汗出一日數過先刺諸分理絡脉汗出且寒且熱三曰一刺百日而已病大風骨節重鬚眉墮名曰大風刺肌肉為故汗出百日泄衛氣之拂熱刺骨髓汗出百日泄榮氣之拂熱凡二百日鬚眉生而止針拂熱屏退陰氣內復故多汗出鬚眉生也黃帝內經素問補注釋文卷之三十一

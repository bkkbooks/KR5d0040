front:
  text: 黄帝内經素問補註釋文卷之三十五宜十一
  hash: sha256:fcd4e607746b55d76e0d1f6f2806762b00a34d753f923704296e4afe3ea17faf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_035-001a, image: hfl/0655/0655-196.png}
body:
  text: 唐太僕令啓玄子王氷次註宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤水熱穴論篇黄帝問曰少陰何以主腎腎何以主水岐伯對曰腎者至陰也至陰者盛水也肺者太陰也少陰者冬脉也故其本在腎其末在肺皆積水也陰者謂寒也冬月至寒腎氣合應故云腎者至陰也水王於冬故云至陰者盛水也腎少陰脉從腎上貫肝鬲入肺中故云其本在腎其末在肺也腎氣上逆則水氣客於肺中故云皆積水也帝曰腎何以能聚水而生病岐伯曰腎者胃之關也關門不利故聚水而從其類也關者所以司出入也腎主下焦膀胱爲府主其分注關竅二陰故腎氣化則二陰通二陰閟則胃填滿故云腎者胃之關也關閉則水積水積則氣停氣停則水生水生積則氣溢氣水同類故云關閉不利聚水而從其類也靈樞經曰下焦溢爲水此之謂也閟音祕上下溢於皮膚故爲胕腫胕腫者聚水而生病也上謂肺下謂腎肺腎俱溢故聚水於腹中而生病也帝曰諸水皆生於腎乎岐伯曰腎者牝藏也牝陰也亦主陰位故云牝藏地氣上者屬於腎而生水液也故曰至陰勇而勞甚則腎汗出腎汗出逢於風内不得入於藏府外不得越於皮膚客於玄府行於皮裏傳爲胕腫本之於腎名曰風水勇而勞甚謂力房也勞勇汗出則玄府開汗出逢風則玄府復閉玄府閉已則餘汗未出内伏皮膚傳化爲水從風而水故名風水所謂玄府者汗空也汗液色玄從空而出以汗聚於裏故謂之玄府府聚也帝曰水俞五十七處者是何主也岐伯曰腎俞五十七穴積陰之所聚也水所從出入也尻上五行行五者此腎俞背部之俞凡有五行當其中者督脉氣所發次兩傍四行皆足太陽脉氣也故水病下爲胕腫大腹上爲喘呼水下居於腎則腹至足而胕腫上入於肺則喘息賁急而大呼也不得卧者標本俱病標本者肺爲標腎爲本如此者是肺腎俱水爲病也故肺爲喘呼腎爲水腫肺爲逆不得卧肺爲喘呼氣逆不得卧者以其主呼吸故也腎爲水腫者以其主水故也分爲相輸俱受者水氣之所留也分其居處以名之則是氣相輸應本其俱受病氣則皆是水所留也留力救切伏菟上各二行行五者此腎之街也街謂道也腹部正俞凡有五行俠齊兩傍則腎藏足少陰脉有及衝脉氣所發次兩則胃府足陽明脉氣所發此四行穴則伏菟之上也菟音兔三陰之所交結於脚也躁上各一行行六者此腎脉之下行也名曰太衝腎脉與衝脉并下行循足合而盛大故曰太衝凡五十七穴者皆藏之陰絡水之所客也經所謂五十七者然尻上五行行五則背脊當中行督脉氣所發者脊中懸樞命門腰俞長强當其處也次俠督脉兩傍足太陽脉氣所發者有大腸俞小腸俞膀胱俞中膂内俞白環俞當其處也又次外俠兩傍足太陽脉氣所發者有胃倉肓門志室胞肓秩邊當其處也伏菟上各二行行五者腹部正俞俠中行任脉兩傍衝脉足少陰之會者有中注四滿氣穴大赫横骨當其處也次俠衝脉足少陰兩傍足陽明脉氣所發者有外陵大巨水道歸來氣街當其處也踝上各一行行六者足内踝之上有足少陰陰蹻脉并循腨上行足少陰脉有大鍾復溜陰谷三穴陰蹻脉有照海交信築賔三穴陰蹻既足少陰脉之别亦可通而主之兼此數之猶少一穴脊中在第十一椎節下間俯而取之刺可入同身寸之五分不可灸令人僂懸樞在第十三椎節下間俯而取之刺可入同身寸之三分若灸者可灸三壯命門在第十四椎節下間伏而取之刺可入同身寸之五分若灸者可灸三壯腰俞在第二十一椎節下間刺可入同身寸之二分新校正云按甲乙經及繆刺論注并熱穴注俱云刺入二寸而刺熱注氣府注并此注作二分宜從二分之說留七呼若灸者可灸三壯長强在脊骶端督脉别絡少陰所結刺可入同身寸之二分留七呼若灸者可灸三壯此五穴者并督脉氣所發也新校正云詳王氏云少一穴按氣府論注十二椎節下有陽關一穴若通數陽關則不少矣次俠督脉兩傍大腸俞在第十六椎下俠督脉兩傍去督脉各同身寸之一寸半刺可入同身寸之三分留六呼若灸者可灸三壯小腸俞在第十八椎下兩傍相去及刺灸分壯法如大腸俞膀胱俞在第十九椎下兩傍相去及刺灸分壯法如大腸俞中膂内俞在第二十椎下兩傍相去及刺灸分壯法如大腸俞俠脊膂胂起肉留十呼白環俞在第二十一椎下兩傍相去如大腸俞伏而取之刺可入同身寸之五分若灸者可灸三壯新校正云按甲乙經云刺可入八分不可灸此五穴者并足太陽脉氣所發所謂腎俞者則此也又次外兩傍胃倉在第十二椎下兩傍相去各同身寸之三寸刺可入同身寸之五分若灸者可灸三壯肓門在第十三椎下兩傍相去及刺灸分壯法如胃倉志室在第十四椎下兩傍相去及刺灸分壯法如胃倉正坐取之胞肓在第十九椎下兩傍相去及刺灸分壯法如胃倉伏而取之秩邊在第二十一椎下兩傍相去及刺灸分壯法如胃倉伏而取之此五穴者并足太陽脉氣所發也次伏菟上兩行中注在齊下同身寸之五分兩傍相去任脉各同身寸之五分新校正云按甲乙經同氣府注云俠中行方一寸文異而義同四滿在中注下同身寸之一寸氣穴在四滿下同身寸之一寸大赫在氣穴下同身寸之一寸横骨在大赫下同身寸之一寸各横相去同身寸之一寸并衝脉足少陰之會刺可入同身寸之一寸若灸者可灸五壯次外兩傍穴外陵在齊下同身寸之一寸新校正云按氣府論注云外陵在天樞下一寸與此正同兩傍去衝脉各同身寸之一寸半大巨在外陵下同身寸之一寸水道在大巨下同身寸之三寸歸來在水道下同身寸之三寸氣街在歸來下新校正云按氣府注刺熱注熱穴注云在腹齊下横骨兩端鼠鼷上一寸刺禁注云在腹下俠齊兩傍相去四寸鼠僕上一寸動脉應手骨空注云在毛際兩傍鼠鼷上諸注不同今備録之鼠鼷上同身寸之一寸各横相去同身寸之二寸此五穴者并足陽明脉氣所發水道刺可入同身寸之二寸半若灸者可灸五壯氣街刺可入同身寸之三分留七呼若灸者可灸三壯餘三穴并刺可入同身寸之八分若灸者并可五壯所謂腎之街者則此也踝上各一行行六者大鐘在足内踝後街中新校正云按甲乙經云跟後衝中刺瘧注刺腰痛注作跟後街中動脉此云内踝後此注非足少陰絡别走太陽者刺可入同身寸之二分留三呼若灸者可灸三壯復溜在内踝上同身寸之二寸陷者中足少陰脉之所行也刺可入同身寸之三分留三呼若灸者可灸五壯照海在内踝下刺可入同身寸之四分留六呼若灸者可灸三壯交信在内踝上同身寸之二寸少陰前太陰後筋骨間陰蹻之郄刺可入同身寸之四分留五呼若灸者可灸三壯築賔在内踝上腨分中陰維之郄刺可入同身寸之三分若灸者可灸五壯陰谷在膝下内輔骨之後大筋之下小筋之上按之應手屈膝而得之足少陰脉之所入也刺可入同身寸之四分若灸者可灸三壯所謂腎經之下行名曰太衝者則此也帝曰春取絡脉分肉何也岐伯曰春者木始治肝氣始生肝氣急其風疾經脉常深其氣少不能深入故取絡脉分肉間帝曰夏取盛經分腠何也岐伯曰夏者火始治心氣始長脉瘦氣弱陽氣留溢新校正云按别本留一作流熱熏分腠内至於經故取盛經分腠絶膚而病去者邪居淺也絶謂絶破令病得出也所謂盛經者陽脉也帝曰秋取經俞何也岐伯曰秋者金始治肺將收殺三陰已升故漸將收殺金將勝火陽氣在合金王火衰故云金將勝火陰氣初勝濕氣及體以漸於雨濕霧露故云濕氣及體陰氣未盛未能深入故取俞以寫陰邪取合以虚陽邪陽氣始衰故取於合新校正云按皇甫士安云是謂始秋之治變帝曰冬取井滎何也岐伯曰冬者水始治腎方閉陽氣衰少陰氣堅盛巨陽伏沉陽脉乃去去謂下去故取井以下陰逆取滎以實陽氣新校正云按全元起本實作遣甲乙經千金方作通故曰冬取井滎春不鼽衂新校正云按皇甫士安云是謂未冬之治變此之謂也新校正云按此與四時刺逆從論及診要經終論義頗不同與九卷之義相通帝曰夫子言治熱病五十九俞余論其意未能領别其處願聞其處因聞其意岐伯曰頭上五行行五者以越諸陽之熱逆也頭上五行者當中行謂上星囟會前頂百會後頂次兩傍謂五處承光通天絡却玉枕又次兩傍謂臨泣目窗正營承靈腦空也上星在顱上直鼻中央入髮際同身寸之一寸陷者中容豆刺可入同身寸之三分囟會在上星後同身寸之一寸陷者中刺可入同身寸之四分前頂在囟會後同身寸之一寸五分骨間陷者中刺如囟會法百會在前頂後同身寸之一寸五分頂中央旋毛中陷容指督脉足太陽脉之交會刺如上星法後頂在百會後同身寸之一寸五分枕骨上刺如囟會法然是五者皆督脉氣所發也上星留六呼若灸者并可灸五壯次兩傍穴五處在上星兩傍同身寸之一寸五分承光在五處後同身寸之一寸通天在承光後同身寸之一寸五分絡却在通天後同身寸之一寸五分玉枕在絡却後同身寸之七分然是五者并足太陽脉氣所發刺可入同身寸之三分五處通天各留七呼絡却留五呼玉枕留三呼若灸者可灸三壯新校正云按甲乙經承光不灸玉枕刺入二分又次兩傍臨泣在頭直目上入髮際同身寸之五分足太陽少陽陽維三脉之會目窗正營遞相去同身寸之一寸承靈腦空遞相去同身寸之一寸五分然是五者并足少陽陽維二脉之會腦空一穴刺可入同身寸之四分餘并可刺入同身寸之三分臨泣留七呼若灸者可灸五壯大杼膺俞缺盆背俞此八者以寫胸中之熱也大杼在項第一椎下兩傍相去各同身寸之一寸半陷者中督脉别絡手足太陽三脉氣之會刺可入同身寸之三分留七呼若灸者可灸五壯新校正云按甲乙經并氣穴注作七壯刺瘧注刺熱注作五壯膺俞者膺中之俞也正名中府在胷中行兩傍相去同身寸之六寸雲門下一寸乳上三肋間動脉應手陷者中仰而取之手足太陰脉之會刺可入同身寸之三分留五呼若灸者可灸五壯缺盆在肩上横骨陷者中手陽明脉氣所發刺可入同身寸之二分留七呼若灸者可灸三壯背俞即風門熱府俞也在第二椎下兩傍各同身寸之一寸五分督脉足太陽之會刺可入同身寸之五分留七呼若灸者可灸五壯今中誥孔穴圖經雖不名之既曰風門熱府即治熱之背俞也新校正云按王氏注刺熱論云背俞未詳何處注此指名風門熱府注氣穴論以大杼爲背俞三注不同者蓋亦疑之者也氣街三里巨虚上下廉此八者以寫胃中之熱也氣街在腹齊下横骨兩端鼠鼷上同身寸之一寸動脉應手足陽明脉氣所發刺可入同身寸之三分留七呼若灸者可灸三壯新校正云按氣街諸注不同具前水穴注中三里在膝下同身寸之三寸胻外廉兩筋肉分間足陽明脉之所入也刺可入同身寸之一寸留七呼若灸者可灸三壯巨虚上廉足陽明與太陽合在三里下同身寸之三寸足陽明脉氣所發刺可入同身寸這八分若灸者可灸三壯巨虚下廉足陽明與少陽合在上廉下同身寸之三寸足陽明脉氣所發刺可入同身寸之三分若灸者可灸三壯也雲門髃骨委中髓空此八者以寫四支之熱也雲門在巨骨下胸中行兩傍相去同身寸之六寸動脉應手足太陰脉氣所發也新校正云按甲乙經同氣穴注作手太陰刺熱注亦作手太陰舉臂取之刺可入同身寸之七分若灸者可灸五壯驗今中誥孔穴圖經無髃骨穴有肩髃穴在肩端兩骨間手陽明蹻脉之會刺可入同身寸之六分留六呼若灸者可灸三壯委中在足膝後屈處膕中央約文中動脉足太陽脉之所入也刺可入同身寸之五分留七呼若灸者可灸三壯按今中誥孔穴圖經云腰俞穴一名髓空在脊中第二十一椎節下主汗不出足清不仁督脉氣所發也刺可入同身寸之二寸留七呼若灸者可灸三壯新校正云詳腰俞刺入二寸當作二分已具前水穴注中五藏俞傍五此十者以寫五藏之熱也俞傍五者謂魄户神堂魂門意舍志室五穴俠脊兩傍各相去同身寸之三寸并足太陽脉氣所發也魄户在第三椎下兩傍正坐取之刺可入同身寸之五分若灸者可灸五壯神堂在第五椎下兩傍刺可入同身寸之三分若灸者可灸五壯䰟門在第九椎下兩傍正坐取之刺可入同身寸之五分若灸者可灸三壯意舍在第十一椎下兩傍正坐取之刺可入同身寸之五分若灸者可灸三壯志室在第十四椎下兩傍正坐取之刺可入同身寸之五分若灸者可灸三壯凡此五十九穴者皆熱之左右也帝曰人傷於寒而傳爲熱何也岐伯曰夫寒盛則生熱也寒氣外凝陽氣内鬱腠理堅緻玄府閉封緻則氣不宣通封則濕氣内結中外相薄寒盛熱生故人傷於寒轉而爲熱汗之而愈則外凝内鬱之理可知斯乃新病數日者也緻馳二切黄帝内經素問補註釋文卷之三十五

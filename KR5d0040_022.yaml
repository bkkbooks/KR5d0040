  text: 黃帝內經素問補注釋文卷之二十二終八
  hash: sha256:6e1b80278d895c3f28099a581995b9a995686ebc9c44e75b8e50e1c9d95fa047
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_022-001a, image: hfl/0653/0653-085.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤評熱病論篇黃帝問曰有病溫者汗出輒復熱而脉躁疾不為汗衰狂言不能食病名為何岐伯對曰病名陰陽交交者死也交謂交合陰陽之氣不分别也帝曰願聞其說岐伯曰人所以汗出者皆生於穀穀生於精言穀氣化為精精氣勝乃為汗今邪氣交爭於骨肉而得汗者是邪却而精勝也言初汗也精勝則當能食而不復熱復熱者邪氣也汗者精氣也今汗出而輒復熱者是邪勝也不能食者精無俾也無俾言無可使為汗也穀不化則精不生精不化流故無可使病而留者其壽可立而傾也如是者若汗出疾速留著而不去則其人壽命立致傾危也新校正云詳病而留者按王注病當作疾又按甲乙經作而熱留者且夫熱論曰汗出而脉尚躁盛者死熱論謂上古熱論也凡汗後脉當遲靜而反躁急以盛滿者是真氣竭而邪盛故知必死也今脉不與汗相應此不勝其病也其死明矣脉不靜而躁盛是不相應狂言者是失志失志者死志舍於精今精無可使是志無所居志不留居則失志也今見三死不見一生雖愈必死也汗出脉躁盛一死不勝其病二死狂言失志者三死也帝曰有病身熱汗出煩滿煩滿不為汗解此為何病岐伯曰汗出而身熱者風也汗出而煩滿不解者厥也病名曰風厥帝曰願卒聞之岐伯曰巨陽主氣故先受邪少陰與其為表裏也得熱則上從之從之則厥也上從之謂少陰隨從於太陽而上也帝曰治之奈何岐伯曰表裏刺之飲之服湯謂寫太陽補少陰也飲之湯者謂止迎上之腎氣也帝曰勞風為病何如岐伯曰勞風法在肺下從勞風生故曰勞風勞謂腎勞也腎脉者從腎上貫肝鬲入肺中故腎勞風生上居肺下也其為病也使人强上冥視新校正云按楊上善云强上好仰也冥視謂合眼視不明也又千金方冥視作目眩唾出若涕惡風而振寒此為勞風之病膀胱脉起於目內眥上額交巔上入絡腦還出别下項循肩膊內俠脊抵腰中入循膂絡腎今腎精不足外吸膀胱膀胱氣不能上營故使人頭項强而視不明也肺被風薄勞氣上熏故令唾出若鼻涕狀腎氣不足陽氣內攻勞熱相合故惡風而振寒帝曰治之奈何岐伯曰以救俯仰救猶止也俯仰謂屈伸也言止屈伸放動作不使勞氣滋蔓巨陽引精者三日中年者五日不精者七日新校正云按甲乙經作三日中若五日千金方作俟之三日及五日中不精明者是也與此不同咳出青黃涕其狀如膿大如彈丸從口中若鼻中出不出則傷肺傷肺則死也巨陽者膀胱之脉也膀胱與腎為表裏故巨陽引精也巨大也然太陽之脉吸引精氣上攻於肺者三日中年者五日素不以精氣用事者七日當咳出稠涕其色青黃如膿狀平調咳者從咽而上出於口暴卒咳者氣衝突於蓄門而出於鼻夫如是者皆腎氣勞竭肺氣內虛陽氣奔迫之所為故不出則傷肺也肺傷則榮衛散解魄不內治故死新校正云按王氏云卒暴咳者氣衝突於蓄門而出於鼻按難經云衝門無蓄門之名疑是賁門楊操云賁者鬲也胃氣之所出胃出穀氣以傳於肺肺在鬲上故胃為賁門帝曰有病腎風者面胕痝然壅害於言可刺不痝然腫起貌壅謂目下壅如卧蠶形也腎之脉從腎上貫肝鬲入肺中循喉嚨俠舌本故妨害於言語痝莫江切岐伯曰虛不當刺不當刺而刺後五曰其氣必至至謂病氣來至也然謂藏配一日而五日至腎夫腎已不足風內薄之謂腫為實以針大泄反傷藏氣真氣不足不可復故刺後五日其氣必至也帝曰其至何如岐伯曰至必少氣時熱時熱從胸背上至頭汗出手熱口乾苦渴小便黃目下腫腹中鳴身重難以行月事不來煩而不能食不能正偃正偃則咳病名曰風水論在刺法中刺法篇名今經亡帝曰願聞其說岐伯曰邪之所凑其氣必虛陰虛者陽必凑之故少氣時熱而汗出也小便黃者少腹中有熱也不能正偃者胃中不和也正偃則咳甚上迫肺也諸有水氣者微腫先見於目下也帝曰何以言岐伯曰水者陰也目下亦陰也腹者至陰之所居故水在腹者必使目下腫也真氣上逆故口苦舌乾卧不得正偃正偃則咳出清水也諸水病者故不得卧卧則驚驚則咳甚也腹中鳴者病本於胃也薄脾則煩不能食食不能下者胃脘鬲也身重難以行者胃脉在足也月事不來者胞脉閉也胞脉者屬心而絡於胞中今氣上迫肺心氣不得下通故月事不來也考上文所釋之義未解熱從胸背上至頭汗出手熱口乾苦渴之義應古論簡脫而此差謬之爾如是者何腎少陰之脉從腎上貫肝鬲入肺中循喉嚨俠舌本又膀胱太陽之脉從目內眥上額交巔上其支者從巔至耳上角其直者從巔入絡腦還出别下項循肩膊內俠脊抵腰中入循膂今陰不足而陽有餘故熱從胸背上至頭而汗出口乾苦渴也然心者陽藏也其脉行於臂手腎者陰藏也其脉循於胸足腎不足則心氣有餘故手熱矣又以心腎之脉俱是少陰脉也帝曰善逆調論篇黃帝問曰人身非常溫也非常熱也為之熱而煩滿者何也異於常候故曰非常新校正云按甲乙經無為之熱三字岐伯對曰陰氣少而陽氣勝故熱而煩滿也帝曰人身非衣寒也中非有寒氣也寒從中生者何言不知誰為元主邪岐伯曰是人多痹氣也陽氣少陰氣多故身寒如從水中出言自由形氣陰陽之為是非衣寒而中有寒也帝曰人有四支熱逢風寒如炙如火者何也新校正云按全元起本無如火二字太素云如炙於火當從太素云岐伯曰是人者陰氣虛陽氣盛四支者陽也兩陽相得而陰氣虛少少水不能滅盛火而陽獨治獨治者不能生長也獨勝而止耳水為陰火為陽今陽氣有餘陰氣不足故云少水不能滅盛火也治者王也勝者盛也故云獨勝而止逢風而如炙如火者是人當肉爍也爍者言消也言久久此人當肉消削也新校正云詳如炙如火當從太素作如炙於火帝曰人有身寒湯火不能熱厚衣不能溫然不凍栗是為何病岐伯曰是人者素腎氣勝以水為事太陽氣衰腎脂枯不長一水不能勝兩火腎者水也而生於骨腎不生則髓不能滿故寒甚至骨也以水為事言盛欲也所以不能凍栗肝一陽也心二陽也腎孤藏也一水不能勝二火故不能凍栗病名曰骨痹是人當攣節也腎不生則髓不滿髓不滿則筋乾縮故節攣拘帝曰人之肉苛者雖近於衣絮猶尚苛也是謂何疾苛謂𤸷苛胡歌切岐伯曰榮氣虛衛氣實也榮氣虛則不仁衛氣虛則不用榮衛俱虛則不仁且不用肉如故也人身與志不相有曰死身用志不應志為身不就兩者似不相有也新校正云按甲乙經曰死作三十日死也帝曰人有逆氣不得卧而息有音者有不得卧而息無音者有起居如故而息有音者有得卧行而喘者有不得卧不能行而喘者有不得卧卧而喘者皆何藏使然願聞其故岐伯曰不得卧而息有音者是陽明之逆也足三陽者下行今逆而上行故息有音也陽明者胃脉也胃者六府之海水穀海也其氣亦下行陽明逆不得從其道故不得卧也下經曰胃不和則卧不安此之謂也下經上古經也夫起居如故而息有音者此肺之絡脉逆也絡脉不得隨經上下故留經而不行絡脉之病人也微故起居如故而息有音也夫不得卧卧則喘者是水氣之客也夫水者循津液而流也腎者水藏主津液主卧與喘也帝曰善尋經所解之㫖不得卧而息無音有得卧行而喘有不得卧不能行而喘此三義悉闕而未論亦古之脫簡也瘧論篇黃帝問曰夫痎瘧皆生於風其蓄作有時者何也痎猶老也亦瘦也新校正云按甲乙經云夫瘧疾者皆生於風其以日作以時發何也與此文異太素同今文楊上善云㾬有云二日一發為㾬瘧此經但夏傷於暑至秋為病或為㾬瘧或但云瘧不必以日發間日以定㾬也但應四時其形有異以為㾬爾已岐伯對曰瘧之始發也先起於毫毛伸缺乃作寒栗鼓頷栗謂戰栗鼓謂振動腰脊俱痛寒去則內外皆熱頭痛如破渴欲冷飲帝曰何氣使然願聞其道岐伯曰陰陽上下交爭虛實更作陰陽相移也陽氣者下行極而上陰氣者上行極而下故曰陰陽上下交爭也陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒由此寒去熱生則虛實更作陰陽之氣相移易也陽并於陰則陰實而陽虛陽明虛則寒栗鼓頷也陽并於陰言陽氣入於陰分也陽明胃脉也胃之脉自交承漿却分行循頤後下廉出大迎其支别者從大迎前下人迎故氣不足則惡寒戰栗而頤頷振動也巨陽虛則腰背頭項痛巨陽者膀胱脉其脉從頭别下項循肩膊內俠脊抵腰中故氣不足則腰背頭項痛也膊音博三陽俱虛則陰氣勝陰氣勝則骨寒而痛寒生於內故中外皆寒陽盛則外熱陰虛則內熱內外皆熱則喘而渴故欲冷飲也熱傷氣故內外皆熱則喘而渴此皆得之夏傷於暑熱氣盛藏於皮膚之內腸胃之外此榮氣之所舍也腸胃之外榮氣所主故云榮氣所舍也舍猶居也此令人汗空踈新校正云按全元起本作汗出空踈甲乙經太素同腠理開因得秋氣汗出遇風及得之以浴水氣舍於皮膚之內與衛氣并居衛氣者晝日行於陽夜行於陰此氣得陽而外出得陰而內薄內外相薄是以日作作發作也帝曰其間日而作者何也間日謂隔日也岐伯曰其氣之舍深內薄於陰陽氣獨發陰邪內著陰與陽爭不得出是以間日而作也不與衛氣相逢會故隔日而發也帝曰善其作日晏與其日早者何氣使然晏猶日暮也岐伯曰邪氣客於風府循膂而下風府穴名在項上入髮際同身寸之二寸大筋內宛宛中也膂謂脊兩傍衛氣一日一夜大會於風府其明日日下一節故其作也晏此先客於脊背也每至於風府則腠理開腠理開則邪氣入邪氣入則病作以此日作稍益晏也節謂脊骨之節然邪氣遠則逢會遲故發暮也其出於風府日下一節二十五日下至骶骨二十六日入於脊內注於伏膂之脉項已下至尾骶凡二十四節故日下一節二十五日下至骶骨二十六日入於脊內注於伏膂之脉也伏膂之脉者謂膂筋之間腎脉之伏行者也腎之脉循股內後廉貫脊屬腎其直行者從腎上貫肝鬲入肺中以其貫脊又不正應行穴但循膂伏行故謂之伏膂脉新校正云按全元起本二十五日作二十一日二十六日作二十二日甲乙經太素并同伏膂之脉甲乙經作太衝之脉巢元方作伏衝其氣上行九日出於缺盆之中其氣日高故作日益早也以腎脉貫脊屬腎上入肺中肺者缺盆為之道其氣之行速故其氣上行九日出於缺盆之中其間日發者由邪氣內薄於五藏橫連募原也其道遠其氣深其行遲不能與衛氣俱行不得皆出故間日乃作也募原謂鬲募之原系新校正云按全元起本募作膜太素巢元方并同舉痛論亦作膜原帝曰夫子言衛氣每至於風府腠理乃發發則邪氣入入則病作今衛氣日下一節其氣之發也不當風府其曰作者奈何岐伯曰新校正云按全元起本及甲乙經太素自此邪氣客於頭項至下則病作故八十八字並無此邪氣客於頭項循膂而下者也故虛實不同邪中異所則不得當其風府也故邪中於頭項者氣至頭項而病中於背者氣至背而病中於腰脊者氣至腰脊而病中於手足者氣至手足而病故下篇各以居邪之所而刺之衛氣之所在與邪氣相合則病作故風無常府衛氣之所發必開其腠理邪氣之所合則其府也虛實不同邪中異所衛邪相合病則發焉不必悉當風府而發作也新校正云按甲乙經巢元方則其府也作其病作帝曰善夫風之與瘧也相似同類而風獨常在瘧得有時而休者何也風瘧皆有盛衰故云相似同類岐伯曰風氣留其處故常在瘧氣隨經絡沉以內薄新校正云按甲乙經作次以內傳故衛氣應乃作留謂留止隨謂隨從帝曰瘧先寒而後熱者何也岐伯曰夏傷於大暑其汗大出腠理開發因遇夏氣凄滄之水寒新校正云按甲乙經太素水寒作小寒迫之藏於腠理皮膚之中秋傷於風則病成矣暑為陽氣中風者陽氣受之故秋傷於風則病成矣夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱也病以時作名曰寒瘧露形觸冒則風寒傷之帝曰先熱而後寒者何也岐伯曰此先傷於風而後傷於寒故先熱而後寒也亦以時作名曰溫瘧以其先熱故謂之溫其但熱而不寒者陰氣先絶陽氣獨發則少氣煩冤手足熱而欲嘔名曰疸瘧疸熱也極熱為之也疸徒干切帝曰夫經言有餘者寫之不足者補之今熱為有餘寒為不足夫瘧者之寒湯火不能溫也及其熱冰水不能寒也此皆有餘不足之類當此之時良工不能止必須其自衰乃刺之其故何也願聞其說言何暇不早使其盛極而自止乎岐伯曰經言無刺熇熇之熱新校正云按全元起本及太素熱作氣熇火妖切無刺渾渾之脉無刺漉漉之汗故為其病逆未可治也熇熇盛熱也渾渾言無端緒也漉漉言汗大出也漉音鹿夫瘧之始發也陽氣并於陰當是之時陽虛而陰盛外無氣故先寒栗也陰氣逆極則復出之陽陽與陰復并於外則陰虛而陽實故先熱而渴陰盛則胃寒故先寒戰栗陽盛則胃熱故先熱欲飲也夫瘧氣者并於陽則陽勝并於陰則陰勝陰勝則寒陽勝則熱瘧者風寒之氣不常也病極則復復謂復舊也言其氣發至極還復如舊至新校正云按甲乙經作瘧者風寒之暴氣不常病極則復至全元起本及太素作瘧風寒氣也不常病極則復至至字連上句與王氏之意異病之發也如火之熱如風雨不可當也以其盛熾故不可當也故經言曰方其盛時必毁新校正云按太素云勿敢必毁因其衰也事必大昌此之謂也方正也正盛寫之或傷真氣故必毁病氣衰已補其經氣則邪氣弭退正氣安平故必大昌也夫瘧之未發也陰未并陽陽未并陰因而調之真氣得安邪氣乃亡所寫必中所補必當故真氣得安邪氣乃亡也故工不能治其已發為其氣逆也真氣寢息邪氣大行真不勝邪是為逆也帝曰善攻之奈何早晏何如岐伯曰瘧之且發也陰陽之且移也必從四末始也陽已傷陰從之故先其時堅束其處令邪氣不得入陰氣不得出審候見之在孫絡盛堅而血者皆取之此真往而未得并者也言牢縛四支令氣各在其處則邪所居處必自見之既見之則刺出其血爾往猶去也新校正云按甲乙經真往作其往太素作直往帝曰瘧不發其應何如岐伯曰瘧氣者必更盛更虛當氣之所在也病在陽則熱而脉躁在陰則寒而脉靜陰靜陽躁故脉亦隨之極則陰陽俱衰衛氣相離故病得休衛氣集則復病也相薄至極物極則反故極則陰陽俱衰帝曰時有間二日或至數日發或渴或不渴其故何也岐伯曰其間日者邪氣與衛氣客於六府而有時相失不能相得故休數日乃作也氣不相會故數日不能發也瘧者陰陽更勝也或甚或不甚故或渴或不渴陽勝陰甚則渴陽勝陰不甚則不渴也勝謂强盛於彼之氣也帝曰論言夏傷於暑秋必病瘧新校正云按生氣通天論并陰陽應象大論二論俱云夏傷於暑秋必痎瘧今瘧不必應者何也言不必皆然岐伯曰此應四時者也其病異形者反四時也其以秋病者寒甚秋氣清凉陽氣下降熱藏肌肉故寒甚也以冬病者寒不甚冬氣嚴冽陽氣伏藏不與寒爭故寒不甚以春病者惡風春氣溫和陽氣外泄內腠開發故惡於風以夏病者多汗夏氣暑熱津液充盈外泄皮膚故多汗也帝曰夫病溫瘧與寒瘧而皆安舍舍於何藏安何也舍居止也藏謂五神藏也岐伯曰溫瘧得之冬中於風寒氣藏於骨髓之中至春則陽氣大發邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或有所用力邪氣與汗皆出此病藏於腎其氣先從內出之於外也腎主於冬冬主骨髓腦為髓海上下相應厥熱上熏故腦髓銷爍銷爍則熱氣外薄故肌肉减削而病藏於腎也如是者陰虛而陽盛陽盛則熱矣陰虛謂腎藏氣虛陽盛謂膀胱太陽氣盛衰則氣復反入入則陽虛陽虛則寒矣故先熱而後寒名曰溫瘧衰謂病衰退也復反入謂入腎陰脉中帝曰疸瘧何如岐伯曰疸瘧者肺素有熱氣盛於身厥逆上衝中氣實而不外泄因有所用力腠理開風寒舍於皮膚之內分肉之間而發發則陽氣盛陽氣盛而不衰則病矣其氣不及於陰新校正云按全元起本及太素作不反之陰巢元方作不及之陰故但熱而不寒氣內藏於心而外舍於分肉之間令人消爍脫肉故命曰疸瘧帝曰善黃帝內經素問補注釋文卷之二十二

front:
  text: 黄帝内經素問補註釋文卷之二十八宜四
  hash: sha256:ab6a7014a0514dc6c5f2ed2f47abde3f7cd37d17765bd97ed551b30c39b96528
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_028-001a, image: hfl/0654/0654-114.png}
body:
  text: 唐太僕令啓玄子王氷次註宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤病能論篇黄帝問曰人病胃脘癰者診當何如岐伯對曰診此者當候胃脉其脉當沉細沉細者氣逆胃者水穀之海其血盛氣壯今反脉沉細者是逆常平也新校正云按甲乙經沉細作沉濇太素作沉細逆者人迎甚盛甚盛則熱沉細爲寒寒氣格陽故人迎脉盛人迎者陽明之脉故盛則熱也人迎謂結喉傍脉動應手者人迎者胃脉也胃脉循喉嚨而入缺盆故云人迎者胃脉也逆而盛則熱聚於胃口而不行故胃脘爲癰也血氣壯盛而熱内薄之兩氣合熱故結爲癰也帝曰善人有卧而有所不安者何也岐伯曰藏有所傷及精有所之寄則安故人不能懸其病也五藏有所傷損及之水穀精氣有所之寄扶其下則卧安以傷及於藏故人不能懸其病處於空中也新校正云按甲乙經精有所之寄則安作情有所倚則卧不安太素作精有所倚則不安帝曰人之不得偃卧者何也謂不得仰卧也岐伯曰肺者藏之蓋也居高布葉四藏下之故言肺者藏之蓋也肺氣盛則脉大脉大則不得偃卧肺氣盛滿偃卧則氣促喘奔故不得偃卧也論在奇恒陰陽中奇恒陰陽上古經篇名世本闕帝曰有病厥者診右脉沉而緊左脉浮而遲不然病主安在不然言不沉也新校正云按甲乙經不然作不知岐伯曰冬診之右脉固當沉緊此應四時左脉浮而遲此逆四時在左當主病在腎頗關在肺當腰痛也以冬左脉浮而遲浮爲肺脉故言頗關在肺也腰者腎之府故腎受病則腰中痛也帝曰何以言之岐伯曰少陰脉貫腎絡肺今得肺脉腎爲之病故腎爲腰痛之病也左脉浮遲非肺來見以左腎不足而脉不能沉故得肺脉腎爲病也帝曰善有病頸癰者或石治之或鍼灸治之而皆已其眞安在言所攻則異所愈則同故問眞法何所在也岐伯曰此同名異等者也言雖同曰頸癰然其皮中别異不一等也故下云夫癰氣之息者宜以鍼開除去之夫氣盛血聚者宜石而寫之此所謂同病異治也息瘜也死肉也石砭石也可以破大癰出膿今以䤵針代之帝曰有病怒狂者新校正云按太素怒狂作善怒此病安生岐伯曰生於陽也帝曰陽何以使人狂怒不慮禍故謂之狂岐伯曰陽氣者因暴折而難决故善怒也病名曰陽厥言陽氣被折鬱不散也此人多怒亦曾因暴折而心不踈暢故爾如是者皆陽逆躁極所生故病名陽厥帝曰何以知之岐伯曰陽明者常動巨陽少陽不動不動而動大疾此其候也言頸項之脉皆動不止也陽明常動者動於結喉傍是謂人迎氣舍之分位也若以少陽之動動於曲頰下是謂天窗天牖之分位也若巨陽之動動於項兩傍大筋前陷者中是謂天柱天容之分位也不應常動而反動甚動當病也新校正云詳王注以天窗爲少陽之分位天容爲太陽之分位按甲乙經天窗乃太陽脉氣所發天容乃少陽脉氣所發二位交互當以甲乙經爲正也帝曰治之奈何岐伯曰奪其食即已夫食入於陰長氣於陽故奪其食即已食少則氣衰故節去其食即病自止新校正云按甲乙經奪作衰太素同也使之服以生鐵洛爲飲新校正云按甲乙經鐵洛作鐵落爲飲作爲後飯夫生鐵洛者下氣疾也之或爲人傳文誤也鐵洛味辛微温平主治下氣方俗或呼爲鐵漿非是生鐵液也帝曰善有病身熱懈惰汗出如浴惡風少氣此爲何病岐伯曰病名曰酒風飲酒中風者也風論曰飲酒中風則爲漏風是亦名漏風也夫極飲者陽氣盛而腠理疏玄府開發陽盛則筋痿弱故身體解惰也腠理疏則風内攻玄府發則氣外泄故汗出如浴也風氣外薄膚腠理開汗多内虚癉熱熏肺故惡風少氣也因酒而病故曰酒風解音介惰徒卧切帝曰治之奈何岐伯曰以澤瀉术各十分麋銜五分合以三指撮爲後飯术味苦温平主治大風止汗麋銜味苦寒平主治風濕筋痿澤瀉味甘寒平主治風濕益氣由此功用方故先之飯後藥先謂之後飯所謂深之細者其中手如針也摩之切之聚者堅也博者大也上經者言氣之通天也下經者言病之變化也金匱者决死生也揆度者切度之也奇恒者言奇病也所謂奇者使奇病不得以四時死也恒者得以四時死也新校正云按楊上善云得病傳之至於勝時而死此爲恒中生喜怒今病次傳者此爲奇所謂揆者方切求之也言切求其脉理也度者得其病處以四時度之也凡言所謂者皆釋未了義今此所謂尋前後經文悉不與此篇義相接似今數句少成文義者終是别釋經文世本既闕第七二篇應彼闕經錯簡文也古文斷裂謬續於此奇病論篇黄帝問曰人有重身九月而瘖此爲何也重身謂身中有身則懷妊者也瘖謂不得言語也妊娠九月足少陰脉養胎約氣斷則瘖不能言也岐伯對曰胞之絡脉絶也絶謂脉斷絶而不通流而不能言非天眞之氣斷絶也帝曰何以言之岐伯曰胞絡者繫於腎少陰之脉貫腎繫舌本故不能言少陰腎脉也氣不營養故舌不能言帝曰治之奈何岐伯曰無治也當十月復十月胎去胞絡復通腎脉上營故復舊而言也刺法曰無損不足益有餘以成其疹疹謂乆病反法而治則胎死不去遂成乆固之疹病然後調之新校正云按甲乙經及太素無此四字按全元起注云所謂不治者其身九月而瘖身重不得爲治須十月滿生後復如常也然後調之則此四字本全元起注文誤書於此當删去之所謂無損不足者身羸瘦無用鑱石也妊娠九月筋骨瘦勞力少身重又拒於穀故身形羸瘦不可以鑱石傷也鑱鋤銜切無益其有餘者腹中有形而泄之泄之則精出而病獨擅中故曰疹成也胎約胞絡腎氣不通因而泄之腎精隨出精液内竭胎則不全胎死腹中著而不去由此獨擅故疹成焉帝曰病脅下滿氣逆二三歲不已是爲何病岐伯曰病名曰息積此不妨於食不可灸刺積爲導引服藥藥不能獨治也腹中無形脅下逆滿頻歲不愈息且形之氣逆息難故名息積也氣不在胃故不妨於食也灸之則火熱内爍氣化爲風刺之則必寫其經轉成虚敗故不可灸刺是可積爲導引使氣流行乆以藥攻内消瘀蓄則可矣若獨憑其藥而不積爲導引則藥亦不能獨治之也帝曰人有身體髀股胻皆腫環齊而痛是爲何病岐伯曰病名曰伏梁以衝脉病故名曰伏梁然衝脉者與足少陰之絡起於腎下出於氣街循陰股内廉斜入膕中循胻骨内廉并足少陰經下入内踝之後入足下其上行者出齊下同身寸之三寸關元之分俠齊直上循腹各行會於咽喉故身體髀皆腫繞齊而痛名曰伏粱環謂圓繞如環也此風根也其氣溢於大腸而著於肓肓之原在齊下故環齊而痛也大腸廣腸也經說大腸當言迴腸也何者靈樞經曰迴腸當齊右環迴周葉積而下廣腸附脊以受迴腸左環葉積上下辟大尋此則是迴腸非應言大腸也然大腸迴腸俱與肺合從合而命故通曰大腸也不可動之動之爲水溺澀之病也以衝脉起於腎下出於氣街其上行者起於胞中上出齊下關元之分故動之則爲水而溺澀也動謂齊其毒藥而擊動之使其大下也此一問答之義與腹中論同以爲奇病故重出於此帝曰人有尺脉數甚筋急而見此爲何病筋急謂掌後尺中兩筋急也脉要精微論曰尺外以候腎尺裏以候腹中今尺脉數急脉數爲熱熱當筋緩反尺中筋急而見腹中筋當急故問爲病乎靈樞經曰熱即筋緩寒即筋急岐伯曰此所謂疹筋是人腹必急白色黑色見則病甚腹急謂俠齊腎筋俱急以尺裏候腹中故見尺中筋急則必腹中拘急矣色見謂見於面部也夫相五色者白爲寒黑爲寒故二色見病彌甚也帝曰人有病頭痛以數歲不已此安得之名爲何病頭痛之疾不當逾月數年不愈故怪而問之岐伯曰當有所犯大寒内至骨髓髓者以腦爲主腦逆故令頭痛齒亦痛夫腦爲髓主齒是骨餘腦逆反寒骨亦寒入故令頭痛齒亦痛病名曰厥逆帝曰善全注人先生於腦縁有腦則有骨髓齒者骨之本也帝曰有病口甘者病名爲何何以得之岐伯曰此五氣之溢也名曰脾癉癉謂熱也脾熱則四藏同禀故五氣上溢也生因脾熱故曰脾癉夫五味入口藏於胃脾爲之行其精氣津液在脾故令人口甘也脾熱内滲津液在脾胃穀化餘精氣隨溢口通脾氣故口甘津液在脾是脾之濕此肥美之所發也新校正云按太素發作致此人必數食甘美而多肥也肥者令人内熱甘者令人中滿故其氣上溢轉爲消渴食肥則腠理宻陽氣不得外泄故肥令人内熱甘者性氣和緩而發散逆故甘令人中滿然内熱則陽氣炎上炎上則欲飲而嗌乾中滿則陳氣有餘有餘則脾氣上溢故曰其氣上溢轉爲消渴也陰陽應象大論曰辛甘發散爲陽靈樞經曰甘多食之令人悶然從中滿以生之新校正云按甲乙經消渴作消癉治之以蘭除陳氣也蘭謂蘭草也神農曰蘭草味辛熱平利水道辟不祥胸中痰澼也除謂去也陳謂乆也言蘭除陳乆甘肥不化之氣者以辛能發散故也藏氣法時論曰辛者散也新校正云按本草蘭性平不言熱帝曰有病口苦取陽陵泉口苦者病名爲何何以得之岐伯曰病名曰膽癉亦謂熱也膽汁味苦故口苦新校正云按全元起本及太素無口苦取陽陵泉六字詳前後文勢疑此爲誤夫肝者中之將也取决於膽咽爲之使靈蘭秘典論曰肝者將軍之官謀慮出焉膽者中正之官决斷出焉肝與膽合氣性相通故諸謀慮取决於膽咽膽相應故咽爲使焉新校正云按甲乙經曰膽者中精之府五藏取决於膽咽爲之使疑此文誤此人者數謀慮不决故膽虚氣上溢而口爲之苦治之以膽募俞胷腹曰募背脊曰俞膽募在乳下二肋外期門下同身寸之五分俞在脊第十椎下兩傍相去各同身寸之一寸半治在陰陽十二官相使中言治法具於彼篇今經已亡帝曰有癃者一日數十溲此不足也身熱如炭頸膺如格人迎躁盛喘息氣逆此有餘也是陽氣太盛於外陰氣不足故有餘也新校正云詳此十五字舊作文寫按甲乙經太素并無此文再詳乃是全元起注後人誤書於此今作注書太陰脉細微如髮者此不足也其病安在名爲何病癃小便不得也溲小便也頸膺如格言頸與胷膺如相格拒不順應也人迎躁盛謂結喉兩傍脉動盛滿急數非常躁速也胃脉也太陰脉細微如髮者謂手大指後同身寸之一寸骨高脉動處脉則肺脉也此正手太陰脉氣之所流可以候五藏也岐伯曰病在太陰其盛在胃頗在肺病名曰厥死不治病癃數溲身熱如炭頸膺如格息氣逆者皆手太陰脉當洪大而數今太陰脉反微細如髮者是病與脉相反也何以致之肺氣逆陵於胃而爲是主使人迎躁盛也故曰病在太陰其盛在胃也以喘息氣逆故云頗亦在肺也病因氣逆證不相應故病名曰厥死不治也此所謂得五有餘二不足也帝曰何謂五有餘二不足岐伯曰所謂五有餘者五病之氣有餘也二不足者亦病氣之不足也今外得五有餘内得二不足此其身不表不裏亦正死明矣外五有餘者一身熱如炭二頸膺如格三人迎躁盛四喘息五氣逆也内二不足者一病癃一目數十溲二太陰脉微細如髮夫如是者謂其病在表則内有二不足謂其病在裏則外得五有餘表裏既不可馮補寫固難爲法故曰此其身不表不裏亦正死明矣帝曰人生而有病巔疾者病名曰何安所得之夫百病者皆生於風雨寒暑陰陽喜怒也然始生有形未犯邪氣已有巅疾豈邪氣素傷邪故問之巔謂上巅則頭首也岐伯曰病名爲胎病此得之在母腹中時其母有所大驚氣上而不下精氣并居故令子發爲巔疾也精氣謂陽之精氣也帝曰有病痝然如有水狀切其脉大緊身無痛者形不瘦不能食食少名爲何病痝然謂面目浮起而色雜也大緊謂如弓弦也大即爲氣緊即爲寒寒氣内薄而反無痛與衆别異常故問之也岐伯曰病生在腎名爲腎風脉如弓弦大而且緊勞氣内蓄寒復内爭勞氣薄寒故化爲風風勝於腎故曰腎風腎風而不能食善驚驚已心氣痿者死腎水受風心火痿弱火水俱困故必死帝曰善黄帝内經素問補註釋文卷之二十八

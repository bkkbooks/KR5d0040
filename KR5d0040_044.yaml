front:
  text: 黄帝内經素問補註釋文卷之四十四榮二
  hash: sha256:d20eb1f08d7bcf3944843b861d72b66839e6283b82d09e6645b001e338a55350
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_044-001a, image: hfl/0658/0658-059.png}
body:
  text: 唐太僕令啓玄子王氷次註宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤六元正紀大論篇上黄帝問曰六化六變勝復淫治甘苦辛鹹酸淡先後余知之矣夫五運之化或從五氣新校正云詳五氣疑作天氣則與下文相叶或逆天氣或從天氣而逆地氣或從地氣而逆天氣或相得或不相得余未能明其事欲通天之紀從地之理和其運調其化使上下合德無相奪倫天地升降不失其宜五運宣行勿乖其政調之正味從逆奈何氣同謂之從氣異謂之逆勝制爲不相得相生爲相得司天地之氣更淫勝復各有主治法則欲令平調氣性不違忤天地之氣以致清靜和平也岐伯稽首再拜對曰昭乎哉問也此天地之綱紀變化之淵源非聖帝孰能窮其至理歟臣雖不敏請陳其道令終不滅乆而不易氣主循環同於天地太過不及氣序常然不言永定之制則久而更易去聖遼遠何以明之帝曰願夫子推而次之從其類序分其部主别其宗司昭其氣數明其正化可得聞乎部主謂分六氣所部主者也宗司謂配五氣運行之位也氣數謂天地五運氣更用之正數也正化謂歲直氣味所宜酸苦甘辛鹹寒温冷熱也岐伯曰先立其年以明其氣金木水火土運行之數寒暑燥濕風火臨御之化則天道可見民氣可調陰陽卷舒近而無惑數之可數者請遂言之遂盡也帝曰太陽之政奈何岐伯曰辰戌之紀也大陽大角太陰壬辰壬戌其運風其化鳴紊啓拆新校正云按五常政大論云其德鳴靡啓拆其變振拉摧拔新校正云詳此其運其化其變從太角等運起其病眩掉曰暝新校正云詳此病證以運加司夭地爲言太角初正少徵太宫少商太羽終太陽太徵太陰戊辰戊戌同正徵新校正云按五常政大論云赫曦之紀上羽與正徵同其運熱其化暄暑鬱燠新校正云按五常政大論燠作蒸其變炎烈沸騰其病熱鬱太徵少宫太商少羽終少角初太陽太宫太陰甲辰歲會同天符甲戌歲會同天符新校正云按天元紀大論云承歲爲歲直又六微㫖大論云木運臨卯火運臨午土運臨四季金運臨酉水運臨子所謂歲會氣之平也王冰云歲直亦曰歲會此甲爲太宫辰戌爲四季故曰歲會又云同天符者按本論下文云太過而加同天符是此歲一爲歲會又爲同天符也其運陰埃新校正云詳太宫三運兩曰陰雨獨此曰陰埃埃疑作雨其化柔潤重澤新校正云按五常政大論澤作淖其變震驚飄驟其病濕下重太宫少商太羽終太角初少徵太陽太商太陰庚辰庚戌其運凉其化霧露蕭飋其變肅殺凋零其病燥背瞀胸滿太商少羽終少角初太徵少宫太陽太羽新校正云按五常政大論云上羽而長氣不化太陰丙辰天符丙戌天符新校正云按天元紀大論云應天爲天符又六微㫖大論云土運之歲上見太陰火運之歲上見少陽少陰金運之歲上見陽明木運之歲上見厥陰水運之歲上見大陽曰天與之會故曰天符又本論下文云五運行同天化者命曰天符又云臨者大過不及皆曰天符其運寒新校正云詳太羽三運此爲上羽少陽少陰司天爲太徵而少陽司天運言寒肅此與少陰司天運言其運寒者疑此太陽司天運司太羽當言其運寒肅少陽少陰司天運當云其運寒其化凝慘凓冽新校正云按五常政大論作凝慘寒雰其變冰雪霜雹其病大寒留於谿谷太羽終大角少徵大宫少商凡此太陽司天之政氣化運行先天六步之氣生長化成收藏皆先天時而應至也餘歲先天同之也天氣肅地氣靜寒臨太虚陽氣不令水土合德上應辰星鎮星明而大也其穀玄黅天地正氣之所生長化成也黅黄也其政肅其令徐寒政大舉澤無陽焰則火發待時寒甚則火鬱待四氣乃發暴爲炎熱也少陽中治時雨乃涯止極雨散還於太陰雲朝北極濕化乃布北極雨府也澤流萬物寒敷於上雷動於下寒濕之氣持於氣交歲氣之大非也民病寒濕發肌肉萎足痿不收濡寫血溢新校正云詳血溢者火發待時所爲之病也初之氣地氣遷氣乃大温畏火致之草乃早榮民乃厲温病乃作身熱頭痛嘔吐肌腠瘡瘍赤斑也是爲膚腠中瘡在皮内也二之氣大凉反至民乃慘草乃遇寒火氣遂抑民病氣鬱中滿寒乃始自凉而反之於寒氣故寒氣始來近人也三之氣天政布寒氣行雨乃降民病寒反熱中癰疽注下心熱瞀悶不治則死當寒反熱是反天常熱起於心則神之危亟不急扶救神必消亡故治者則生不治則死四之氣風濕交爭風化爲雨乃長乃化乃成民病大熱少氣肌肉萎足痿注下赤白五之氣陽復化草乃長乃化乃成民乃舒大火臨御故萬物舒榮終之氣地氣正濕令行陰凝太虚埃昏郊野民乃慘悽寒風以至反者孕乃死故歲宜苦以燥之温之新校正云詳故歲宜苦以燥之温之九字當在避虚邪以安其正下錯簡在此必折其鬱氣先資其化原化原謂九月迎而取之以補心火新校正云詳水將勝也先於九月迎取其化原先寫腎之源也蓋以水王十月故先於九月迎而取之寫水所以補火也抑其運氣扶其不勝太角歲脾不勝太徵歲肺不勝太宫歲腎不勝太商歲肝不勝太羽歲心不勝歲之宜也如此然太陽司天五歲之氣通宜先助心後扶腎氣無使暴過而生其疾食歲穀以全其眞避虚邪以安其正木過則脾病生火過則肺病生土過則腎病生金過則肝病生水過則心病生天地之氣過亦然也歲穀謂黄色黑色穀也虚邪謂從衝後來風也適氣同異多少制之同寒濕者燥熱化異寒濕者燥濕化大宫太商太羽歲同寒濕宜治以燥熱化大角太徵歲異寒濕宜治以燥濕化用寒遠寒用凉遠凉用温遠温用熱遠熱食宜同法有假者反常反是者病所謂時也時謂春夏秋冬及間氣所在同則遠之即雖其時若六氣臨御假寒熱温凉以除疾病者則勿遠之如太陽司天寒爲病者假熱以療則熱用不遠夏餘氣例同故曰有假反常也食同藥法爾若無假反法則爲病之媒非方制養生之道新校正云按用寒遠寒及有假者反常等事下文備矣帝曰善陽明之政奈何岐伯曰卯酉之紀也陽明少角少隂清熱勝復同同正商清勝少角熱復清氣故曰清熱勝復同也餘少運皆同也同正商者上見陽眀上商與正商同言歲木不及也餘準此新校正云按五常政大論云委和之紀上商與正商同丁卯歲會丁酉其運風清熱不及之運常兼勝復之氣言之風運氣也清勝氣也熱復氣也餘少運悉同少角初正太徵少宫太商少羽終陽明少徵少陰寒雨勝復同同正商新校正云按伏明之紀上商與正商同癸卯同歲會癸酉同歲會新校正云按本論下文云不及而加同歲會此運少徵爲不及下加少陰故云同歲會其運熱寒雨少徵太宫少商太羽終太角初陽明少宫少陰風凉勝復同己卯己酉其運雨風凉少宫太商少羽終少角初太徵陽明少商少陰寒熱勝復同同正商新校正云按五常政大論云從革之紀上商與正商同乙卯天符乙酉歲會太一天符新校正云按天元紀大論云三合爲治又六微㫖大論云天符歲會曰太一天符王冰云是謂三合一者天會二者歲會三者運會或云此歲三合曰太一天符不當更曰歲會者甚不然也乙酉本爲歲會又爲太一天符歲會之名不可去也或云己丑己未戊午何以不連言歲會而單言太一天符曰舉一隅不以三隅反舉一則三者可知去之則是太一天符不爲歲會也故曰不可去也其運涼熱寒少商太羽終太角初少徵太宫陽明少羽少陰雨風勝復同辛卯少官同新校正云按五常政大論云五運不及除同正角正商正宫外癸丑癸未當云少徵與少羽同己卯己酉少宫與少角同乙丑乙未少商與少徵同辛卯辛酉辛巳辛亥少羽與少宫同合有十年今此論獨於此言少宫同者蓋以癸丑癸未丑未爲土故不更同少羽己卯己酉爲金故不更同少角辛巳辛亥爲木故不更同少宫乙丑乙未下見太陽爲水故不更同少徵又除此八年外只有辛卯辛酉二年爲少羽同少宫也辛酉辛卯其運寒雨風少羽終少角初太徵大宫太商凡此陽明司天之政氣化運行後天六步之氣生長化成庶務動靜皆後天時而應餘少歲同天氣急地氣明陽專其令炎暑大行物燥以堅淳風乃治風燥横運流於氣交多陽少陰雲趨雨府濕化乃敷雨府太陰之所在也燥極而澤燥氣欲終則化爲雨澤是謂三氣之分也其穀白丹天地正氣所化生也間穀命太者命太者謂前文太角商等氣之化者間氣化生故云間穀也新校正云按玄珠云歲穀與間穀者此即在泉爲歲穀及在泉之左右間者皆爲歲穀其司天及運間而化者名間穀又别有一名間穀者是地化不及即反所勝而生者故名間穀即邪氣之化又名并化之穀也亦名間穀與王注頗異其耗白甲品羽白色中蟲多品羽類有羽翼者耗散粢盛蟲鳥甲兵歲爲災以耗竭物類金火合德上應太白熒惑見大而眀其政切其令暴蟄蟲乃見流水不冰民病咳嗌塞寒熱發暴振栗癃閟清先而勁毛蟲乃死熱後而暴介蟲乃殃其發暴勝復之作擾而大亂金先勝木已承害故毛蟲死火後勝金不勝故介蟲復殃勝而行殺羽者已亡復者後來强者又反非大亂氣其其謂也清熱之氣持於氣交初之氣地氣遷陰始凝氣始肅水乃冰寒雨化其病中熱脹面目浮腫善眠鼽衂嚏欠嘔小便黄赤甚則淋大陰之化新校正云詳氣肅水冰凝非大陰之化二之氣陽乃布民乃舒物乃生榮厲大至民善暴死臣位君故爾三之氣天政布凉乃行燥熱交合燥極而澤民病寒熱寒熱瘧也四之氣寒雨降病暴仆振栗譫妄少氣嗌乾引飲及爲心痛癰腫瘡瘍瘧寒之疾骨痿血便骨痿無力五之氣春令反行草乃生榮民氣和終之氣陽氣布候反温蟄蟲來見流水不冰民乃康平其病温君之化也故食歲穀以安其氣食間穀以去其邪歲宜以鹹以苦以辛汗之清之散之安其運氣無使受邪折其鬱氣資其化源化源謂六月迎而取之也新校正云按金王七月故迎於一月寫金氣以寒熱輕重少多其制同熱者多天化同清者多地化少角少徵歲同熱用方多以天清之化治之少宫少商少羽歲同清田方多以地熱之化口治之火在地故同清者多地化金在天故同熱者多天化用凉遠凉用熱遠熱用寒遠寒用温遠温食宜同法有假者反之此其道也反之者亂天地之經擾陰陽之紀也帝曰善少陽之政奈何岐伯曰寅申之紀也少陽太角新校正云按五常政大論云上徵則其氣逆厥陰壬寅同天符壬申同天符其運風鼓新校正云詳風火合勢故其運風鼓少陰司天太角運亦同其化鳴紊啓拆新校正云按五常政大論云其德鳴靡啓拆其變振拉摧拔其病掉眩支脅驚駭太角初正少徵太宫少商大羽終少陽太徵新校正云按五常政大論云上徵而收氣灾厥隂戊寅天符戊申天符其運暑其化暄囂鬱燠新校正云按五常政大論作暄暑鬱燠此變暑爲囂者以臨少陽故也其變炎烈沸騰其病上熱鬱血溢血泄心痛太徵少宫太商少羽終少角初少陽太宫厥陰甲寅甲申其運陰雨其化柔潤重澤其變震驚飄驟其病體重胕腫痞飲太宫少商太羽終太角初少徵少陽太商厥陰庚寅庚申同正商新校正云按五常政大論堅成之紀上徵與正商同其運凉其化霧露清切新校正云按五常政大論云霧露蕭飋又大商三運兩言蕭飋獨此言清切詳此下如厥陰當此蕭飋其變肅殺凋零其病肩背胷中大商少羽終少角初太徵少宫少陽大羽厥陰丙寅丙申其運寒肅新校正云詳此運不當言寒肅以注大陽司天太羽運中其化凝慘凓冽新校正云按五常政大論云作凝慘寒雰其變冰雪霜雹其病寒浮腫太羽終太角初少徵大宫少商凡此少陽司天之政氣化運行先天天氣正新校正云詳少陽司天太陰司地正得天地之正又厥陰少陽司地各云得其正者以地主生榮爲言也本或作天氣止者少陽火之性用動躁云止義不通地氣擾風乃暴舉木偃沙飛炎火乃流陰行陽化雨乃時應火木同德上應熒惑歲星見明而大新校正云詳六氣惟少陽厥陰司天司地爲上下通和無相勝剋故言火木同德餘氣皆有勝剋故言合德其穀丹蒼其政嚴其令擾故風熱慘布雲物沸騰太陰横流寒乃時至凉雨并起民病寒中外發瘡瘍内爲泄滿故聖人遇之和而不爭往復之作民病寒熱瘧泄聾瞑嘔吐上怫腫色變初之氣地氣遷風勝乃摇寒乃去候乃大温草木早榮寒來不殺温病乃起其病氣怫於上血溢目赤咳逆頭痛血𡹌今詳𡹌字當作崩脅滿膚腠中瘡少陰之化二之氣火反鬱太陰分故爾白埃四起雲趨雨府風不勝濕雨乃零民乃康其病熱鬱於上咳逆嘔吐瘡發於中胷嗌不利頭痛身熱昏憒音會膿瘡三之氣天政布炎暑至少陽臨上雨乃涯民病熱中聾瞑血溢膿瘡咳嘔鼽衂渴嚏欠喉痹目赤善暴死四之氣涼乃至炎暑間化白露降民氣和平其病滿身重五之氣陽乃去寒乃來雨乃降氣門乃閉新校正云按王注生氣通天論氣門玄府也所以發泄經脉榮衛之氣故謂之氣門剛木早凋民避寒邪君子周宻終之氣地氣正風乃至萬物反生霿霧以行其病關閉不禁心痛陽氣不藏而咳抑其運氣贊所不勝必折其鬱氣先取化源化源年之前十二月迎而取之新校正云詳王注資取化源俱注云取其意有四等太陽司天取九月陽明司天取六月是二者先取在天之氣也少陽司天取年前十二月太陰司天取九月是二者乃先時取在地之氣也少陰司天取年前十二月厥陰司天取四月義不可解按玄珠之說則不然太陽陽明之月與王注合少陽少陰俱取三月太陰取五月厥陰取年前十二月玄珠之義可解王注之月疑有誤也暴過不生苛疾不起苛重也新校正云詳此不言食歲穀間穀者蓋此歲天地氣正上下通和故不言也故歲宜鹹宜辛宜酸滲之泄之漬之發之觀氣寒温以調其過同風熱者多寒化異風熱者少寒化大角太徵歲同風熱以寒化多之太宫大商大羽歲異風熱以凉調其過也用熱遠熱用温遠温用寒遠寒用涼遠凉食宜同法此其道也有假者反之反是者病之階也黄帝内經素問補註釋文卷之四十四

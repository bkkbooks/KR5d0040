front:
  text: 黃帝內經素問補注釋文卷之四十今五
  hash: sha256:c38bc71b0be429a29600d37624a95e6d5122f8ce5c55c4ad48d54f1c7f572104
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_040-001a, image: hfl/0657/0657-004.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤六微㫖大論篇黃帝問曰嗚呼遠哉天之道也如迎浮雲若視深淵視深淵尚可測迎浮雲莫知其極深淵靜瀅而澄徹故視之可測其深淺浮雲飄泊而合散故迎之莫詣其邊涯言蒼天之象如淵可視乎鱗介運化之道尤雲莫測其去留六氣深微其於運化當如是喻矣新校正云詳此文與疏五過論重夫子數言謹奉天道余聞而藏之心私異之不知其所謂也願夫子溢志盡言其事令終不滅久而不絶天之道可得聞乎運化生成之道也岐伯稽首再拜對曰明乎哉問天之道也此因天之序盛衰之時也帝曰願聞天道六六之節盛衰何也六六之節經已啓問天師未敷其㫖故重問之岐伯曰上下有位左右有紀上下謂司天地之氣二也餘左右四氣在歲之左右也故少陽之右陽明治之陽明之右太陽治之太陽之右厥隂治之厥陰之右少陰治之少隂之右太陰治之太陰之右少陽治之此所謂氣之標蓋南面而待之也標末也聖人南面而立以閲氣之至也故曰因天之序盛衰之時移光定位正立而待之此之謂也移光謂日移光定位謂面南觀氣正立觀歲數氣之至則氣可待之也少陽之上火氣治之中見厥陰少陽南方火故上見火氣治之與厥陰合故中見厥陰也陽明之上燥氣治之中見太陰陽明西方金故上燥氣治之與太陰合故燥氣之下中見太陰也太陽之上寒氣治之中見少陰太陽北方水故上寒氣治之與少陰合故寒氣之下中見少陰也新校正云按六元正紀大論云太陽所至為寒生中為溫與此義同厥陰之上風氣治之中見少陽厥陰東方木故上風氣治之與少陽合故風氣之下中見少陽也少陰之上熱氣治之中見太陽少陰東南方君火故上熱氣治之與太陽合故熱氣之下中見太陽也新校正云按六元正紀大論云少陰所至為熱生中為寒與此義同太陰之上濕氣治之中見陽明太陰西南方土故上濕氣治之與陽明合故濕氣之下中見陽明也所謂本也本之下中之見也見之下氣之標也本謂元氣也氣别為王則文言著矣新校正云詳注云文言著矣疑誤本標不同氣應異象本者應之元標者病之始病生形用求之標方施其用求之本標本不同求之中見法萬全新校正云按至真要大論云六氣標本不同氣有從本者有從標本者有不從標本者少陽太陰從本少陰太陽從本從標陽明厥陰不從標本從乎中故從本者化生於本從標本者有標本之化從中者以中氣為化帝曰其有至而至有至而不至有至而太過何也皆謂天之六氣也初之氣起於立春前十五日餘二三四五終氣次至而分治六十日餘八十七刻半岐伯曰至而至者和至而不至來氣不及也未至而至來氣有餘也時至而氣至和平之應此為平歲也假令甲子歲氣有餘於癸亥歲未當至之期先期而至也乙丑歲氣不足於甲子歲當至之期後時而至也故曰來氣不及來氣有餘也言初氣之至期如此歲氣有餘六氣之至皆先期歲氣不及六氣之至皆後時先時後至後時先至各差十三日而應也新校正云按金匱要略云有未至而至有至而不至有至而不去有至而太過冬至之後得甲子夜半少陽起少隂之時陽始生天得溫和以未得甲子天因溫和此為未至而至也以得甲子而天未溫和此為至而不至以得甲子而天大寒不解此為至而不去以得甲子而天溫如盛夏時此為至而太過此亦論氣應之一端也帝曰至而不至未至而至如何言太過不及歲當至晚至早之時應也岐伯曰應則順否則逆逆則變生變生則病當期為應愆時為否天地之氣生化不息無止礙也不應有而有應有而不有是造化之氣失常失常則氣變變常則氣血紛撓而為病也天地變而失常則萬物皆病帝曰善請言其應岐伯曰物生其應也氣脉其應也物之生榮有常時脉之至有常期有餘歲早不及歲晚皆依時至也帝曰善願聞地理之應六節氣位何如岐伯曰顯明之右君火之位也君火之右退行一步相火治之日出謂之顯明則卯地氣分春也自春分後六十日有奇斗建卯正至於巳正君火位也自斗建巳正未之中三之氣分相火治之所謂少陽也君火之位所謂少陰熱之分也天度至此暄淑大行居熱之分不行炎暑君之德也少陽居之為僭逆大熱早行疫癘乃生陽明居之為溫凉不時太陽居之為寒雨間熱厥陰居之為風濕雨生羽蟲少陰居之為天下疵疫以其得位君令宣行故也太陰居之為時雨火有二位故以君火為六氣之始也相火則夏至日前後各三十日也少陽之分火之位矣天度至此炎熱大行少陽居之為熱暴至草萎河乾炎亢濕化晚布陽明居之為凉氣間發太陽居之為寒暑間至熱爭冰雹厥陰居之為風熱大行雨生羽蟲少陰居之為大暑炎亢太陰居之為雲雨雷電退謂南面視之在位之右也一步凡六十日又八十七刻半餘氣同法復行一步土氣治之雨之分也即秋分前六十日而有奇斗建未正至酉之中四之氣也天度至此雲雨大行濕蒸乃作少陽居之為炎熱沸騰雲雨雷雹陽明居之為清雨霧露太陽居之為寒雨害物厥陰居之為暴風雨摧拉雨生倮蟲少陰居之為寒熱氣反用山澤浮雲暴雨溽蒸太陰居之為大雨霪霔霪音淫復行一步金氣治之燥之分也即秋分後六十日而有奇自斗建酉正至亥之中五之氣也天度至此萬物皆燥少陽居之為溫清更正萬物乃榮陽明居之為大凉燥疾太陽居之為早寒厥陰居之為涼風大行雨生介蟲少陰居之為秋濕熱病時行太陰居之為時雨沉陰復行一步水氣治之寒之分也即冬至日前後各三十日自斗建亥至丑之中六之氣也天度至此寒氣大行少陽居之為冬溫蟄蟲不藏流水不冰陽明居之為燥寒徑切太陽居之為大寒凝冽厥陰居之為寒風飄揚雨生鱗蟲少陰居之為蟄蟲出見流水不冰太陰居之為凝陰寒雪地氣濕也復行一步木氣治之風之分也即春分前六十日而有奇也自斗建丑正至卯之中初之氣也天度至此風氣乃行天地神明號令之始也天之使也少陽居之為溫疫至陽明居之為清風霧露朦昧太陽居之為寒風切烈霜雪水冰厥陰居之為大風發榮雨生毛蟲少陰居之為熱風傷人時氣流行太陰居之為風雨凝陰不散復行一步君火治之熱之分也復春分始也自斗建卯正至巳之中二之氣也凡此六位終統一年六六三百六十日六八四百八十刻六七四十二刻其餘半刻分而為三約終三百六十五度也餘奇細分率之可也相火之下水氣承之熱盛水承條蔓柔弱凑潤衍溢水象可見新校正云按六元正紀大論云少陽所至為火生終為蒸溽則水承之義可見又云少陽所至為摽風燔燎霜凝亦下承之水氣也水位之下土氣承之寒甚物堅水冰流涸土象斯見承下明矣新校正云按六元正紀大論注云太陽所至為寒雪冰雹白埃則土氣承之之義也土位之下風氣承之疾風之後時雨乃零是則濕為風吹化而為雨新校正云按六元正紀大論云太陰所至為濕生終為注雨則土位之下風氣承之而為雨也又云太陰所至為雷霆驟注烈風則風承之義也風位之下金氣承之風動氣清萬物皆燥金承木下其象昭然新校正云按六元正紀大論云厥陰所至為風生終為肅則金承之義可見又云厥陰所至為飄怒大凉亦金承之義金位之下火氣承之鍛金生熱則火流金乘火之上理無妄也新校正云按六元正紀大論云陽明所至為散落溫則火乘之義也君火之下陰精承之君火之位大熱不行蓋為陰精制承其下也諸以所勝之氣乘於下者皆折其標盛此天地造化之大體爾新校正云按六元正紀大論云少陰所至為熱生中為寒則陰承之義可知又云少陰所至為大暄寒亦其義也又按六元正紀云水發而雹雪土發而飄驟木發而毁折金發而清明火發而曛昧何氣使然曰氣有多少發有微甚微者當其氣甚者兼其下徵其下氣而見可知也所謂徵其下者即此六承氣也帝曰何也岐伯曰亢則害承乃制制則生化外列盛衰害則敗亂生化大病亢過極也物惡其極帝曰盛衰何如岐伯曰非其位則邪當其位則正邪則變甚正則微帝曰何謂當位岐伯曰木運臨卯火運臨午土運臨四季金運臨酉水運臨子所謂歲會氣之平也非太過非不及是謂平運主歲也平歲之氣物生脉應皆必合期無先後也新校正云詳木運臨卯丁卯歲也火運臨午戊午歲也土運臨四季甲辰甲戌己丑已未歲也金運臨酉乙酉歲也水運臨子丙子歲也內戊午己丑己未乙酉又為太一天符帝曰非位何如岐伯曰歲不與會也不與本辰相逢會也帝曰土運之歲上見太陰火運之歲上見少陽少陰少陰少陽皆火氣金運之歲上見陽明木運之歲上見厥陰水運之歲上見太陽奈何岐伯曰天之與會也天氣與運氣相逢會也新校正云詳土運之歲上見太隂己丑己未也火運之歲上見少陽戊寅戊申也上見少陰戊子戊午也金運之歲上見陽明乙卯乙酉也木運之歲上見厥隂丁巳丁亥也水運之歲上見太陽丙辰丙戌也內己酉己未戊午乙酉又為太一天符按六元正紀大論云太過而同天化者三不及而同天化者亦三戊子戊午太徵上臨少陰戊寅戊申太徵上臨少陽丙辰丙戌太羽上臨太陽如是者三丁巳丁亥少角上臨厥陰乙卯乙酉少商上臨陽明己丑己未少宫上臨太陰如是者三臨者太過不及皆曰天符也故天元册曰天符天符歲會何如岐伯曰太一天符之會也是謂三合一者天會二者歲會三者運會也天元紀大論曰三合為治此之謂也新校正云按太一天符之詳具天元紀大論注中帝曰其貴賤何如岐伯曰天符為執法歲位為行令太一天符為貴人執法猶相輔行令猶方伯貴人猶君主帝曰邪之中也奈何岐伯曰中執法者其病速而危執法官人之繩準自為邪僻故病速而危中行令者其病徐而持方伯無執法之權故無速害病但執持而已中貴人者其病暴而死義無凌犯故病則暴而死帝曰位之易也何如岐伯曰君位臣則順臣位君則逆逆則其病近其害速順則其病遠其害微所謂二火也相火居君火是臣位居君位故逆也君火居相火是君位居臣位君臨臣位故順也遠謂里遠近謂里近也帝曰善願聞其步何如岐伯曰所謂步者六十度而有奇奇謂八十七刻又十分刻之五也故二十四步積盈百刻而成日也此言天度之餘也夫言周天之度者三百六十五度四分度之一也二十四步正四歲也四分度之一二十五刻也四歲氣成積已盈百刻故成一日度一日也帝曰六氣應五行之變何如岐伯曰位有終始氣有初中上下不同求之亦異也位地位也氣天氣也氣與位互有差移故氣之初天用事氣之中地主之地主則氣流於地天用則氣騰於天初與中皆分天步而率刻爾初中各三十日餘四十三刻四分刻之三也帝曰求之奈何岐伯曰天氣始於甲地氣始於子子甲相合命曰歲立謹候其時氣可與期子甲相合命曰歲立則甲子歲也謹候水刻早晏則六氣悉可與期爾帝曰願聞其歲六氣始終早晏何如岐伯曰明乎哉問也甲子之歲初之氣天數始於水下一刻常起於平明寅初一刻艮中之南也新校正云按戊辰壬申丙子庚辰甲申戊子壬辰丙申庚子甲辰戊申壬子丙辰庚申歲同此所謂辰申子歲氣會同陰陽法以是為三合終於八十七刻半子正之中夜之半也外十二刻半入二氣之初諸餘刻同入也二之氣始於八十七刻六分子中之左也終於七十五刻戌之後四刻也外二十五刻入次三氣之初率三之氣始於七十六刻亥初之一刻終於六十二刻半酉正之中也外三十七刻半差入後四之氣始於六十二刻六分酉中之北終於五十刻未後之四刻也外五十刻差入後五之氣始於五十一刻申初之一刻終於三十七刻半午正之中晝之半也外六十二刻半差入後六之氣始於三十七刻六分午中之南終於二十五刻辰正之後四刻外七十五刻差入後所謂初六天之數也天地之數二十四氣乃大會而同故命此曰初六天數也乙丑歲初之氣天數始於二十六刻巳初之一刻新校正云按己巳癸酉丁丑辛巳乙酉己丑癸巳丁酉辛丑乙巳已酉癸丑丁巳辛酉歲同所謂巳酉丑歲氣會同也終於一十二刻半卯正之中二之氣始於一十二刻六分卯中之南終於水下百刻丑後之四刻三之氣始於一刻又寅初之一刻終於八十七刻半子正之中四之氣始於八十七刻六分子中正東終於七十五刻戌後之四刻五之氣始於七十六刻亥初之一刻終於六十二刻半酉正之中六之氣始於六十二刻六分酉中之北終於五十刻未後之四刻所謂六二天之數也一六為初六二六為六二名次也丙寅歲初之氣天數始於五十一刻申初之一刻新校正云按庚午甲戌戊寅壬午丙戌庚寅甲午戊戌壬寅丙午庚戌甲寅戊午壬戌歲同此所謂寅午戌歲氣會同終於三十七刻半午正之中二之氣始於三十七刻六分午中之西終於二十五刻辰後之四刻三之氣始於二十六刻巳初之一刻終於一十二刻半卯正之中四之氣始於一十二刻六分卯中之南終於水下百刻丑後之四刻五之氣始於一刻寅初之一刻終於八十七刻半子正之中六之氣始於八十七刻六分子中之左終於七十五刻戌後之四刻所謂六三天之數也丁卯歲初之氣天數始於七十六刻亥初之一刻新校正云按辛未乙亥己卯癸未丁亥辛卯乙未己亥癸卯丁未辛亥乙卯己未癸亥歲同此所謂卯未亥歲氣會同終於六十二刻半酉正之中二之氣始於六十二刻六分酉中之北終於五十刻未後之四刻三之氣始於五十一刻申初之一刻終於三十七刻半午正之中四之氣始於三十七刻六分午中之西終於二十五刻辰後之四刻五之氣始於二十六刻巳初之一刻終於一十二刻半卯正之中六之氣始於一十二刻六分卯中之南終於水下百刻丑後之四刻所謂六四天之數也次戊辰歲初之氣復始於一刻常如是無已周而復始始自甲子年終於癸亥歲常以四歲為一小周一十五周為一大周以辰命歲則氣可與期帝曰願聞其歲候何如岐伯曰悉乎哉問也日行一周天氣始於一刻甲子歲也日行再周天氣始於二十六刻乙丑歲也日行三周天氣始於五十一刻丙寅歲也日行四周天氣始於七十六刻丁卯歲也日行五周天氣復始於一刻戊辰歲也餘五十五歲循環周而復始也所謂一紀也法以四年為一紀循環不已餘三歲一會同故有三合也是故寅午戌歲氣會同卯未亥歲氣會同辰申子歲氣會同巳酉丑歲氣會同終而復始陰陽法以是為三合者緣其氣會同也不爾則各在一方義無由合帝曰願聞其用也岐伯曰言天者求之本言地者求之位言人者求之氣交本謂天六氣寒暑燥濕風火也三隂三陽由是生化故云本所謂六元者也位謂金木火土水君火也天地之氣上下相交人之所處者也帝曰何謂氣交岐伯曰上下之位氣交之中人之居也自天之下地之上則二氣交合之分也人居地上故氣交之中人之居也是以化生變易皆在氣交之中故曰天樞之上天氣主之天樞之下地氣主之氣交之分人氣從之萬物由之此之謂也天樞當齊之兩傍也所謂身半矣伸臂指天則天樞正當身之半也三分折之上分應天下分應地中分應氣交天地之氣交合之際所過寒暑燥濕風火勝復之變之化故人氣從之萬物生化悉由而合散也帝曰何謂初中岐伯曰初凡三十度而有奇中氣同法竒謂三十日餘四十三刻又四十分刻之三十也初中相合則六十日餘八十七刻半也以各餘四十分刻之三十故云中氣同法也帝曰初中何也岐伯曰所以分天地也以是知氣高下生人病主之也帝曰願卒聞之岐伯曰初者地氣也中者天氣也氣之初天用事天用事則地氣上騰於太虛之內氣之中地氣主之地氣主則天氣下降於有質之中帝曰其升降何如岐伯曰氣之升降天地之更用也升謂上升降謂下降升極則降降極則升升降不已故彰天地之更用也帝曰願聞其用何如岐伯曰升已而降降者謂天降已而升升者謂地氣之初地氣升氣之中天氣降升已而降以下彰天氣之下流降已而升以上表地氣之上應天氣下降地氣上騰天地交合泰之象也易曰天地交泰是以天地之氣升降常以三十日半下上下上不已故萬物生化無有休息而各得其所也天氣下降氣流於地地氣上升氣騰於天故高下相召升降相因而變作矣氣有勝復故變生也新校正云按六元正紀大論云天地之氣盈虛何如曰天氣不足地氣隨之地氣不足天氣從之運居其中而常先也惡所不勝歸所和同隨運歸從而生其病也故上勝則天氣降而下下勝則地氣遷而上多少而差其分微者小差甚者大差甚則位易氣交易則大變生而病作矣帝曰善寒濕相遘燥熱相臨風火相值其有間乎岐伯曰氣有勝復勝復之作有德有化有用有變變則邪氣居之夫撫掌成聲沃火生沸物之交合象出其間萬類交合亦由是矣天地交合則八風鼓拆六氣交馳於其間故氣不能正者反成邪氣帝曰何謂邪乎邪者不正之目也天地勝復則寒暑燥濕風火六氣互為邪也岐伯曰夫物之生從於化物之極由乎變變化之相薄成敗之所由也夫氣之有生化也不見其形不知其情莫測其所起莫究其所止而萬物自生自化近成無極是謂天和見其象彰其動震烈剛暴飄泊驟卒拉堅摧殘摺拆鼓栗是謂邪氣故物之生也靜而化成其毁也躁而變革是以生從於化極由乎變變化不息則成敗之由常在生有涯分者言有終始爾新校正云按天元紀大論云物生謂之化物極謂之變故氣有往復用有遲速四者之有而化而變風之來也天地易位寒暑移方水火易處當動用時氣之遲速往復故不常在雖不可究識意端然微甚之用而為化為變風所由來也人氣不勝因而感之故病生焉風匪求勝於人也帝曰遲速往復風所由生而化而變故因盛衰之變耳成敗倚伏游乎中何也夫倚伏者禍福之萌也有禍者福之所倚也有福者禍之所伏也由是故禍福互為倚伏物盛則衰樂極則哀是福之極故為禍所倚否極之泰未濟之濟是禍之極故為福所伏然吉凶成敗目擊道存不可以終自然之理故無尤也岐伯曰成敗倚伏生乎動動而不已則變作矣動靜之理氣有常運其微也為物之化其甚也為物之變化流於物故物得之以生變行於物故物得之以死由是成敗倚伏生於動之微甚遲速爾豈唯氣獨有是哉人在氣中養生之道進退之用當皆然也新校正云按至真要大論云陰陽之氣清靜則生化治動則苛疾起此之謂也帝曰有期乎岐伯曰不生不化靜之期也人之期可見者二也天地之期不可見也夫二可見者一曰生之終也其二曰變易與土同體然後捨小生化歸於大化以死後猶化變未已故可見者二也天地終極人壽有分長短不相及故人見之者鮮矣帝曰不生化乎言亦有不生不化者乎岐伯曰出入廢則神機化滅升降息則氣立孤危出入謂喘息也升降謂化氣也夫毛羽倮鱗介及飛走蚑行皆生氣根於身中以神為動靜之主故曰神機也然金玉土石鎔埏草木皆生氣根於外假氣以成立主持故曰氣立也五常政大論曰根於中者命曰神機神去則機息根於外者命曰氣立氣止則化絶此之謂也故無是四者則神機與氣立者生死皆絶新校正云按易云本乎天者親上本乎地者親下周禮大宗伯有天産地産大司徒云動物植物即此神機氣立之謂也蚑音祁故非出入則無以生長壯老已非升降則無以生長化收藏夫自東自西自南自北者假出入息以為化主因物以全質者承陰陽升降之氣以作生源若非此道則無能致是生者也是以升降出入無器不有包藏生氣者皆謂生化之器觸物然矣夫竅橫者皆有出入去來之氣竅堅者皆有陰陽升降之氣往復於中何以明之則壁窗户牖兩面伺之皆承來氣衛擊於人是則出入氣也夫陽升則井寒陰升則水暖以物投井及葉墜空中翩翩不疾皆升氣所礙也虛管溉滿捻上懸之水固不泄為無升氣而不能降也空瓶小口頓溉不入為氣不出而不能入也由是觀之升無所不降降無所不升無出則不入無入則不出夫群品之中皆出入升降不失常守而云非化者未之有也有失無失有情無情去出入已升降而云存者未之有也故曰升降出入無器不有故器者生化之宇器散則分之生化息矣器謂天地及諸身也宇謂屋宇也以其身形包藏府臟受納神靈與天地同故皆名器也諸身者小生化之器宇太虛者廣生化之器宇也生化之器自有小大無不散也夫小大器皆生有涯分散有遠近者也故無不出入無不升降真生假立形器者無不有此二者化有小大期有近遠近者不見遠謂遠者無涯遠者無常見近而嘆有其涯矣既近遠不同期合散殊時節即有無交競異見常乖及至分散之時則近遠同歸於一變四者之有而貴常守四者謂出入升降也有出入升降則為常守有出無入有入無出有升無降有降無升則非生之氣也若非胎息道成居常而生則未之有屏出入息泯升降氣而能存其生化者故貴常守反常則灾害至矣出入升降生化之元主故不可無之反常之道則神去其室生化微絶非灾害而何哉故曰無形無患此之謂也夫喜於遂悅於色畏於難懼於禍外惡風寒暑濕內繁饑飽愛欲皆以形無所隱故常嬰患纍於人間也若便想慕滋蔓嗜欲無厭外附權門內豐情僞則動以牢綱坐招燔炳欲思釋縛其可得乎是以身為患階爾老子曰吾所以有大患者為吾有身及吾無身吾有何患此之謂也夫身與形與太虛釋然消散復未知生化之氣為有而聚耶為無而滅乎帝曰善有不生不化乎言人有逃陰陽免生化而不生不化無始無終同太虛自然者乎岐伯曰悉乎哉問也與道合同惟真人也真人之身隱見莫測出入天地內外順道至真以生其為小也入於無間其為大也過虛空界不與道如一其孰能爾乎帝曰善黃帝內經素問補注釋文卷之四十

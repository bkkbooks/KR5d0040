front:
  text: 黃帝內經素問補注釋文卷之三十三宜九
  hash: sha256:827df1e67a3852f262e48b3f9744d5fbbafb57863b0be3f3c05db463ecf34c91
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_033-001a, image: hfl/0655/0655-097.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤氣府論篇足太陽脉氣所發者七十八穴兼氣浮薄相通者言之當言九十三穴非七十八穴也正經脉會發者七十八穴浮薄相通者一十五穴則其數也兩眉頭各一謂攢竹穴也所在刺灸分壯與氣穴同法入髮至項三寸半傍五相去三寸謂大杼風門各二穴也所在刺灸分壯與氣穴同法新校正云按别本云入髮至項三寸又注云寸同身寸也諸寸同法與此注全别此注謂大杼風門各二穴所在灸刺分壯與此氣穴同法今氣穴篇中無風門穴而注言與注同法此注之非可見此非王氏之誤誤在後人詳此入髮至項三寸半傍五相去三寸蓋是說下文浮氣之在皮中五行行五之穴故王都不解釋直云寸為同身寸也但以頂誤作項剩半字耳所以言入髮至頂者自入髮囟會穴至頂百會凡三寸自百會後至後頂又三寸故云入髮至頂三寸傍五者為兼中行傍數有五行也相去三寸者蓋謂自百會頂中數左右前後各三寸有五行行五共二十五穴也後人誤將頂為項以為大杼風門此甚誤也况大杼在第一椎下兩傍風門又在第三椎下上云髮際非止三寸半也其誤甚明囟信其浮氣在皮中者凡五行行五五五二十五浮氣謂氣浮而通之可以去熱者也五行謂頭上自髮際中同身寸之二寸後至頂之後者也二十五者其中行則囟會前頂百會後頂强間五督脉氣也次俠傍兩行則五處承光通天絡却玉枕各五本經氣也又次傍兩行則臨泣目窗正營承靈腦空各五足少陽氣也兩傍四行各五則二十穴中行五則二十五也其刺灸分壯與水熱穴同法項中大筋兩傍各一謂天柱二穴也所在刺灸分壯與氣穴同法風府兩傍各一謂風池二穴也刺灸分壯與氣穴同法新校正云按甲乙經風池足少陽陽維之會非太陽之所發也經言風府兩傍乃天柱穴之分位此亦覆明上項中大筋兩傍穴也此注剩出風池二穴於九十三數外更剩前大杼風門及此風池六穴也俠脊以下至尻尾二十一節十五間各一十五間各一者今中誥孔穴圖經所存者十三穴左右共二十六謂附分魄户神堂譩嘻鬲關魂門陽綱意舍胃倉肓門志室胞肓秩邊十三也附分在第二椎下附項內廉兩傍各相去俠脊同身寸之二寸足太陽之會刺可入同身寸之八分若灸者可灸五壯魄户在第三椎下兩傍上直附分足太陽脉氣所發下十二穴并同正坐取之刺可入同身寸之五分若灸者如附分法神堂在第五椎下兩傍上直魄户刺可入同身寸之三分灸同附分法諳嘻在第六椎下兩傍上直神堂新校正云按骨空論注云以手厭之令病人呼譩嘻之聲則指下動矣刺可入同身寸之六分留七呼灸如附分法鬲關在第七椎下兩傍上直譩嘻正坐開肩取之刺可入同身寸之五分若灸者可灸三壯新校正云按甲乙經云可灸五壯魂門在第九椎下兩傍上直鬲關正坐取之刺灸分壯如鬲關法陽綱在第十椎下兩傍上直魂門正坐取之刺灸分壯如魂門法意舍在第十一椎下兩傍上直陽綱正坐取之刺灸分壯如陽綱法胃倉在第十二椎下兩傍上直意舍刺灸分壯如意舍法肓門在第十三椎下兩傍上直胃倉刺同胃倉可灸三十壯新校正云按肓門灸三十壯與甲乙經同水穴注作灸三壯志室城第十四椎下兩傍上直肓門正坐取之刺灸分壯如魄户法胞肓在第十九椎下兩傍上直志室伏而取之刺灸分壯如魄户法新校正云按志室胞肓灸如魄户五壯甲乙經作三壯水穴注亦作三壯熱穴注志室亦作三壯秩邊在第二十一椎下兩傍上直胞肓伏而取之刺灸分壯如魄户法譩嘻上衣下喜五藏之俞各五六府之俞各六肺俞在第三椎下兩傍俠脊相去各同身寸之一寸半刺可入同身寸之三分留七呼若灸者可灸三壯心俞在第五椎下兩傍相去及刺如肺俞法留七呼肝俞在第九椎下兩傍相去及刺如心俞法留六呼脾俞在第十一椎下兩傍相去及刺如肝俞法留七呼腎俞在第十四椎下兩傍相去及刺如脾俞法留七呼膽俞在第十椎下兩傍相去及刺如肺俞法正坐取之刺可入同身寸之五分留七呼胃俞在第十二椎下兩傍相去及刺如脾俞法留七呼三焦俞在第十三椎下兩傍相去及刺如膽俞法大腸俞在第十六椎下兩傍相去及刺如肺俞法留六呼小腸俞在第十八椎下兩傍相去及刺如心俞法留六呼膀胱俞在第十九椎下兩傍相去及刺如腎俞法留六呼五藏六府之俞若灸者并可灸三壯新校正云詳或者疑經中各五各六以各字為誤者非也所以言各者謂左右各五各六非謂每藏府而各五各六也委中以下至足小指傍各六俞謂委中崑崙京骨束骨通谷至陰六穴也左右言之則十二俞也其所在刺灸如氣穴法經言脉氣所發者七十八穴今此所有兼亡者九十三穴由此則大數差錯傳寫有誤也新校正云詳王氏云兼亡者九十三穴今兼大杼風門風池為九十九穴以此王氏總數考之明知此三穴後之妄增也足少陽脉氣所發者六十二穴兩角上各三謂天衝曲鬢左右各二也天衝在耳上如前同身寸之三分足太陽少陽二脉之會刺可入同身寸之三分若灸者可灸三壯曲鬢在耳上入髮際曲陽陷者中鼓頷有空足太陽少陽二脉之會刺灸分壯如天衝法直目上髮際內各五謂臨泣目窗正營承靈腦空左右是也臨泣在直目上入髮際同身寸之五分足太陽少陽陽維三脉之會留七呼目窗在臨泣後同身寸之一寸正營在目窗後同身寸之一寸承靈在正營後同身寸之一寸半腦空在承靈後同身寸之一寸半俠枕骨後枕骨上并足少陽陽維二脉之會刺可入同身寸之四分餘并刺可入同身寸之三分若灸者并可灸五壯新校正云按腦空在枕骨後枕骨上甲乙經作玉枕骨下耳前角上各一謂頷厭二穴也在曲角下顳顬之上上廉手足少陽足陽明三脉之會刺可入同身寸之七分留七呼若灸者可灸三壯刺深令人耳無所聞顳仁涉切顬汝車切耳前角下各一謂懸釐二穴也在曲角上顳顬之下廉手足少陽陽明四脉之交會刺可入同身寸之三分留七呼若灸者可灸三壯新校正云按後手少陽中云角上此云角下必有一誤鋭髮下各一謂和髎二穴也在耳前鋭髮下橫動脉手足少陽二脉之會刺可入同身寸之三分若灸者可灸三壯新校正云按甲乙經云手足少陽手太陽之會客主人各一客主人穴名也在耳前上廉起骨開口有空手足少陽足陽明三脉之會刺可入同身寸之三分留七呼若灸者可灸三壯新校正云按甲乙經及氣穴注刺禁注并云手少陽足陽明之會與此異耳後陷中各一謂翳風二穴也在耳後陷者中按之引耳中手足少陽二脉之會刺可入同身寸之三分若灸者可灸三壯下關各一下關穴名也所在刺灸氣穴同法耳下牙車之後各一謂頰車二穴也刺灸分壯氣穴同法缺盆各一缺盆穴名也在肩上橫骨陷者中足陽明脉氣所發刺可入同身寸之二分留七呼若灸者可灸三壯太深令人逆息新校正云按骨空注作手陽明掖下三寸脅下至胠八間各一掖下三寸同身寸也掖下謂淵掖輒筋天池脅下至胠則日月章門帶脉五樞維道居髎九穴也左右共十八穴也淵掖在掖下同身寸之三寸足少陽脉氣所發舉臂得之刺可入同身寸之三分禁不可灸輒筋在掖下同身寸之三寸復前行同身寸之一寸搓脅新校正云按甲乙經搓作著下同足少陽脉氣所發刺可入同身寸之六分若灸者可灸三壯天池在乳後同身寸之二寸新校正云按甲乙經作一寸掖下三寸搓脅直掖撅肋間手心主足少陽二脉之會刺可入同身寸之三分新校正云按甲乙經作七分若灸者可灸三壯日月膽募也在第三脉端橫直心蔽骨傍各同身寸之二寸五分上直兩乳新校正云按甲乙經云日月在期門下五分足太陰少陽二脉之會刺可入同身寸之七分若灸者可灸五壯章門脾募也在季肋端足厥陰少陽二脉之會側卧屈上足伸下足舉臂取之刺可入同身寸之八分留六呼若灸者可灸三壯帶脉在季肋下同身寸之一寸八分足少陽帶脉二經之會刺可入同身寸之六分若灸者可灸五壯五樞在帶脉下同身寸之三寸足少陽帶脉二經之會刺可入同身寸之一寸若灸者可灸五壯維道在章門下同身寸之五寸三分足少陽帶脉二經之會刺灸分壯如章門法居髎在章門下同身寸之四寸三分骼骨上新校正云按甲乙經作監骨上陷者中陽蹻足少陽二脉之會刺灸分壯如維道法所以謂之八間者自掖下三寸至季脉凡八脉骨髀樞中傍各一謂環銚二穴也刺灸分壯氣穴同法新校正云按氣穴論云兩髀厭分中王注為環銚穴又甲乙經注環銚在髀樞中今云髀樞中傍各一者蓋謂此穴在髀樞中也傍各一者謂左右各一穴也非謂環銚在髀樞中傍也膝以下至足小指次指各六俞謂陽陵泉陽輔丘虛臨泣俠溪竅陰六穴也左右言之則十二俞也其所在刺灸分壯氣穴同法足陽明脉氣所發者六十八穴額顱髮際傍各三謂懸顱陽白頭維左右共六穴也正面髮際橫行數之懸顱在曲角上顳顬之中足陽明脉氣所發刺入同身寸之三分留三呼若灸者可灸三壯陽白在眉上同身寸之一寸直瞳子足陽明陰維二脉之會刺可入同身寸之三分灸三壯頭維在額角髮際俠本神兩傍各同身寸之一寸五分足少陽陽明二脉之交會刺可入同身寸之五分禁不可灸新校正云按甲乙經陽白足少陽陽維之會今王氏注云足陽明陰維之會詳此在足陽明脉氣所發中則足陽明近是然陽明經不到此又不與陰維會疑王注非甲乙經為得矣面鼽骨空各一謂四白穴也在目下同身寸之一寸足陽明脉氣所發刺可入同身寸之四分不可灸新校正云按甲乙經刺入三分灸七壯大迎之骨空各一大迎穴名也在曲頷前同身寸之一寸三分骨陷者中動脉足陽明脉氣所發刺可入同身寸之三分留七呼若灸者可灸三壯人迎各一人迎穴名也在頸俠結喉傍大脉動應手足陽明脉氣所發刺可入同身寸之四分過深殺人禁不可灸缺盆外骨空各一謂天髎二穴也在肩缺盆中上伏骨之陬陷者中手足少陽陽維三脉之會刺可入同身寸之八分若灸者可灸三壯新校正云按甲乙經伏骨作毖骨毖音必膺中骨間各一謂膺窗等六穴也膺窗在胸兩傍俠中行各相去同身寸之四寸巨骨下同身寸之四寸八分陷者中足陽明脉氣所發仰而取之刺可入同身寸之四分若灸者可灸五壯此穴之上又有氣户庫房屋翳下又有乳中乳根氣户在巨骨下下直膺窗去膺窗上同身寸之四寸八分庫房在氣户下同身寸之一寸六分屋翳在氣户下同身寸之三寸二分下即膺窗也膺窗之下即乳中也乳中穴下同身寸之一寸六分陷者中則乳根穴也并足陽明脉氣所發仰而取之乳中禁不可灸刺灸刺之不幸生蝕瘡瘡中有清汁膿血者可治瘡中有瘜肉若蝕瘡者死餘五穴并刺可入同身寸之四分若灸者可灸三壯新校正云按甲乙經灸五壯俠鳩尾之外當乳下三寸俠胃脘各五謂不容承滿粱門關門太乙五穴也左右共一寸也俠腹中行兩傍相去各同身寸之四寸新校正云按甲乙經云各二寸疑此注剩各字不容在第四肋端下至太乙各上下相去同身寸之一寸并足陽明脉氣所發刺可入同身寸之八分若灸者可灸三壯新校正云按甲乙經不容刺入五分此云并入八分疑此注誤俠齊廣三寸各三廣謂去齊橫廣也廣三寸者各如太乙之遠近也各三者謂滑肉門天樞外陵也滑肉門下同身寸之一寸正當於齊外陵在天樞下同身寸之一寸并足陽明脉氣所發天樞刺可入同身寸之五分留七呼滑肉門外陵各刺可入同身寸之八分若灸者并可五壯新校正云按甲乙經天樞在齊傍各二寸上曰滑肉門下曰外陵是三穴者去齊各二寸也今此經注云廣三寸素問甲乙經不同然甲乙經分寸與諸書同特此經為異也下齊二寸俠之各三下齊二寸則外陵下同身寸之一寸大巨穴也各三者謂大巨水道歸來也大巨在外陵下同身寸之一寸足陽明脉氣所發刺可入同身寸之八分若灸者可灸五壯水道在大巨下同身寸之三寸足陽明脉氣所發刺可入同身寸之二寸半若灸者可灸五壯歸來在水道下同身寸之二寸刺可入同身寸之八分若灸者可灸五壯氣街動脉各一氣街穴名也在歸來下鼠鼷上同身寸之一寸脉動應手足陽明脉氣所發刺可入同身寸之三分留七呼若灸者可灸三壯新校正云詳此注與甲乙經同刺熱注及熱穴注云氣街在腹臍下橫骨兩端鼠鼷上刺禁論注在腹下俠齊兩傍相去四寸鼠僕上骨空注云在毛際兩傍鼠鼷上諸注不同今備録之伏菟上各一謂髀關二穴也在膝上伏菟後交分中刺可入同身寸之六分若灸者可灸三壯三里以下至足中指各八俞分之所在穴空謂三里上廉下廉解溪衝陽陷谷內庭厲兌八穴也左右言之則十六俞也上廉足陽明與大腸合下廉足陽眀與小腸合其所在刺灸分壯與氣穴同法所謂分之所在穴空者足陽明脉自三里穴分而下行其直者循胻過跗入中指出其端則厲兌也其支者與直俱行至足跗上入中指次間故云分之所在穴空也之往也言分而各行往指間穴空處也手太陽脉氣所發者三十六穴目內眥各一謂睛明二穴也在目內眦手足太陽足陽明陰蹻陽蹻五脉之會刺可入同身寸之一分留六呼若灸者可灸三壯諸穴有云數脉會發而不於所會刺脉下言之者出從其正者也目外各一謂瞳子髎二穴也在目外去眦同身寸之五分手太陽手足少陽三脉之會刺可入同身寸之三分若灸者可灸三壯鼽骨下各一謂顴髎二穴也鼽頄也頄面顴也在面頄骨下陷者中手太陽少陽二脉之會刺可入同身寸之三分頄音仇耳郭上各一謂角孫二穴也在耳上郭表之中間上髮際之下開口有空手太陽手足少陽三脉之會刺可入同身寸之三分若灸者可灸三壯新校正云按甲乙經手太陽作手陽明耳中各一謂聽宫二穴也所在刺灸分壯與氣穴同法巨骨穴各一巨骨穴名也在肩端上行兩叉骨間陷者中手陽明蹻脉二經之會刺可入同身寸之一寸半若灸者可灸三壯新校正云按甲乙經作五壯曲掖上骨穴各一謂臑俞二穴也在肩臑後大骨下脾上廉陷者中手太陽陽維蹻脉三經之會舉臂取之刺可入同身寸之八分若灸者可灸三壯新校正云按甲乙經作手足太陽柱骨上陷者各一謂肩井二穴也在肩上陷解中缺盆上大骨前手足少陽陽維三脉之會刺可入同身寸之五分若灸者可灸三壯上天窗四寸各一謂天窗竅陰四穴也所在刺灸分壯與氣穴同法肩解各一謂秉風二穴也在肩上小髃骨後舉臂有空手太陽陽明手足少陽四脉之會舉臂取之刺可入同身寸之五分若灸者可灸三壯新校正云按甲乙經灸五壯肩解下三寸各一謂天宗二穴也在秉風後大骨下陷者中手太陽脉氣所發刺可入同身寸之五分留六呼若灸者可灸三壯肘以下至手小指本各六俞六俞所起於指端經言至小指本則以端為本言上之本也下文陽明少陽同也六俞謂小海陽谷腕骨後溪前谷少澤六穴也左右言之則十二俞也其所在刺灸分壯氣穴同法新校正云按此手太陽陽明少陽三經各言至手某指本王注以端為本者非也詳手三陽之井穴盡出手某指之端爪甲下際此言本者是逐指爪甲之本也又安得以端為本哉手陽明脉氣所發者二十二穴鼻空外廉項上各二謂迎香扶突各二穴也迎香在鼻下孔傍手足陽明二脉之會刺可入同身寸之三分扶突在曲頰下同身寸之二寸人迎後手陽明脉氣所發仰而取之刺可入同身寸之四分若灸者可灸三壯大迎骨空各一大迎穴名也在曲頷前同身寸之一寸三分骨陷者中動脉足陽明脉氣所發刺可入同身寸之三分留七呼若灸者可灸三壯新校正云詳大迎穴已見前足陽明經中今又見於此王氏不注所以當如顴髎穴兩出之義柱骨之會各一謂天鼎二穴也在頸缺盆上直扶突氣舍後同身寸之半寸手陽明脉氣所發刺可入同身寸之四分若灸者可灸三壯新校正云按甲乙經作一寸半髃骨之會各一謂肩髃二穴也所在刺灸分壯與氣穴同法新校正云按髃骨氣穴注中無刺熱注水熱穴注骨空論注中有之肘以下至手大指次指本各六俞謂三里陽溪合谷三間二間商陽六穴也左右言之則十二俞也所在刺灸分壯與氣穴同法新校正云按氣穴論注有曲池而無三里曲池手陽明之合也此誤出三里而遺曲池也手少陽脉氣所發三十二穴鼽骨下各下謂顴髎二穴也所在刺灸分壯與手少陽脉同法此穴中手少陽太陽脉氣俱會於中等無優劣故重說於此下有者同眉後各一謂絲竹空二穴也在眉後陷者中手少陽脉氣所發刺可入同身寸之三分留六呼不可灸灸之不幸使人目小及盲新校正云按甲乙經手少陽作足少陽留六呼作三呼角上各一謂懸釐二穴也此與足少陽脉中同以是二脉之會也新校正云按足少陽脉中言角下此云角上疑此誤下完骨後各一謂天牖二穴也所在刺灸分壯與氣穴同法項中足太陽之前各一謂風池二穴也在耳後陷者中按之引於耳中手足少陽脉之會刺可入同身寸之四分若灸者可灸三壯新校正云按甲乙經在顳顬後髮際足少陽陽維之會刺可入三分俠扶突各一謂天窗二穴也在曲頰下扶突後動脉應手陷者中手太陽脉氣所發刺可入同身寸之六分若灸者可灸三壯肩貞各一肩貞穴名也在肩曲胛下兩骨解間肩髃後陷者中手太陽脉氣所發刺可入同身寸之八分若灸者可灸三壯肩貞下三寸分間各一謂肩髎臑會消濼各二穴也其穴各在肉分間也肩髎在肩端臑上斜舉臂取之手少陽脉氣所發刺可入同身寸之七分若灸者可灸三壯臑會在臂前廉去肩端同身寸之三寸手陽明少陽二絡氣之會刺可入同身寸之五分灸者可灸五壯消濼在肩下臂外關掖斜肘分下行間手少陽脉之會刺可入同身寸之五分若灸者可灸三壯肘以下至手小指次指本各六俞謂天井支溝陽池中渚液門關衝六穴也左右言之則十二俞也所在刺灸分壯與氣穴同法督脉氣所發者二十八穴今少一穴新校正云按會陽二穴為二十九穴乃剩一穴非少也少當作剩字項中央二是謂風府瘖門二穴也悉在項中餘一穴今亡風府在項上入髮際同身寸之一寸大筋內宛宛中督脉陽維之會刺可入同身寸之四分留三呼不可妄灸灸之不幸令人瘖瘖門在項髮際宛宛中去風府同身寸之一寸督脉陽維二經之會仰頭取之刺可入同身寸之四分禁不可灸灸之令人瘖新校正云按王氏云風府瘖門悉在項中餘一穴今亡者非謂此二十八穴中亡一穴也王氏蓋見氣穴論大椎上兩傍各一穴亦在項之穴也今亡故云餘一穴今亡也髮際後中八謂神庭上星囟會前頂百會後頂强間腦户八穴也其正髮際之中也神庭在髮際直鼻督脉足太陽陽明脉三經之會禁不可刺若刺之令人癲疾目失睛若灸者可灸三壯上星在顱上直鼻中央入髮際同身寸之一寸陷者中容豆囟會在上星後同身寸之一寸陷者中前頂在囟會後同身寸之一寸五分骨間陷者中百會在前頂後同身寸之一寸五分頂中央旋毛中陷容指督脉足太陽之交會後頂在百會後同身寸之一寸五分强間在後頂後同身寸之一寸五分腦户在强間後同身寸之一寸五分督脉足太陽之會不可灸此八者并督脉氣所發也上星百會强間腦户各刺可入同身寸之三分上星留六呼腦户留三呼餘并刺可入同身寸之四分若灸者可灸五壯新校正云按甲乙經腦户不可灸骨空論注云不可妄灸面中三謂素髎水溝齦交三穴也素髎在鼻柱上端督脉氣所發刺可入同身寸之三分水溝在鼻柱下人中直唇取之督脉手陽明之會刺可入同身寸之三分留六呼若灸者可灸三壯齦交在唇內齒上齦縫督脉任脉二經之會可逆刺之入同身寸之三分若灸者可灸三壯此三者正居面左右之中也大椎以下至尻尾及傍十五穴脊椎之間有大椎陶道身柱神道靈臺至陽筋縮中樞脊中懸樞命門陽關腰俞長强會陽十五俞也大椎在第一椎上陷者中三陽督脉之會陶道在項大椎節下間督脉足太陽之會俯而取之身柱在第二椎節下間俯而取之神道在第五椎節下間俯而取之靈臺在第六椎節下間俯而取之至陽在第七椎節下間俯而取之筋縮在第九椎節下間俯而取之中樞在第十椎節下間俯而取之脊中在第十一椎節下間俯而取之禁不可灸令人僂懸樞在第十三椎節下間俯而取之命門在第十四椎節下間俯而取之陽關在第十六椎節下間坐而取之腰俞在第二十一椎節下間長强在脊骶端督脉别絡少陰二脉所結會陽穴在陰尾骨兩傍凡此十五者并督脉氣所發腰俞長强各刺可入同身寸之二分新校正云按甲乙經作二寸水穴論注作二分腰俞穴繆刺論注作二寸熱穴注作二寸刺熱注作二分諸注不同雖甲乙經作二寸疑大深與其失之深不若失之淺宜作二分之說留七呼懸樞刺可入同身寸之三分會陽刺可入同身寸之八分餘并刺可入同身寸之五分陶道神道各留五呼陶道身柱神道筋縮可灸五壯大椎可九壯餘并可三壯新校正云按甲乙經無靈臺中樞陽關三陽至骶下凡二十一節脊椎法也通項骨三節即二十四節任脉之氣所發者二十八穴今少一穴喉中央二謂廉泉天突二穴也廉泉在頷下結喉上舌本下陰維任脉之會刺可入同身寸之三分留三呼若灸者可灸三壯天突在頸結喉下同身寸之四寸中央宛宛中陰維任脉之會低針取之刺可入同身寸之一寸留七呼若灸者可灸三壯膺中骨陷中各一謂璇璣華蓋紫宫玉堂膻中中庭六穴也璇璣在天突下同身寸之一寸華蓋在璇璣下同身寸之一寸紫宫玉堂膻中中庭各相去同身寸之一寸六分陷者中并任脉氣所發仰而取之各刺可入同身寸之三分若灸者可灸五壯鳩尾下三寸胃脘五寸胃脘以下至橫骨六寸半一新校正云詳一字疑誤腹脉法也鳩尾心前穴名也其正當心蔽骨之端言其骨垂下如鳩鳥尾形故以為名也鳩尾下有鳩尾巨闕上脘中脘建里下脘水分齊中陰交脖胦丹田關元中極曲骨十四俞也鳩尾在臆前蔽骨下同身寸之五分任脉之别不可灸刺人無蔽骨者從歧骨際下行同身寸之一寸新校正云按甲乙經云一寸半為鳩尾處也下次巨闕上脘中脘建里下脘水分遞相去同身寸之一寸上脘則足陽明手太陽之會中脘則手太陽少陽足陽明三脉所生也齊中禁不可刺若刺之使人齊中惡瘍潰矢出者死不治陰交在齊下同身寸之一寸任脉陰衝之會脖胦在齊下同身寸之一寸半丹田三焦募也在齊下同身寸之二寸關元小腸募也在齊下同身寸之三寸足三陰任脉之會也中極在關元下一寸足三陰之會也曲骨在橫骨上中極下同身寸之一寸足厥陰之會凡此十四者并任脉氣所發建里丹田并刺可入同身寸之六分留七呼新校正云按甲乙經作五分十呼上脘陰交并刺可入同身寸之八分下脘水分并刺可入同身寸之一寸中脘脖胦并刺可入同身寸之一寸二分曲骨刺可入同身寸之一寸半留七呼餘并刺可入同身寸之一寸二分若灸者關元中脘各可灸七壯齊中中極曲骨各三壯餘并可五壯自鳩尾下至陰間并任脉主之腹脉法也新校正云據此注云餘并刺入一寸二分關元在中與甲乙經及氣穴骨空注刺入二寸不同當從甲乙經之寸數下陰别一謂會陰一穴也自曲骨下至陰陰之下兩陰之間則此穴也是任脉别絡俠督脉者衝脉之會故曰下陰别一也刺可入同身寸之二寸留七呼若灸者可灸三壯新校正云按甲乙經七呼作三呼曰下各一謂承泣二穴也在目下同身寸之七分上直瞳子陽蹻任脉足陽明三經之會刺可入同身寸之三分不可灸下唇一謂承漿穴也在頤前下唇之下足陽明脉任脉之會開口取之刺可入同身寸之二分留五呼若灸者可灸三壯新校正云按甲乙經作六呼齦交一齦交穴名也所在刺灸分壯與脉法同衝脉氣所發者二十二穴俠鳩尾外各半寸至齊寸一謂幽門通谷陰都石關商曲肓俞六穴左右則十二穴也幽門俠巨闕兩傍相去各同身寸之半寸陷者中下五穴各相去同身寸之一寸并衝脉足少陰二經之會各刺可入同身寸之一寸若灸者可灸五壯新校正云按此云各刺入一寸按甲乙經云幽門通谷刺入五分俠齊下傍各五分至橫骨寸一腹脉法也謂中注髓府胞門陰關下極五穴左右則十穴也中注在肓俞下同身寸之五分上直幽門下四穴各相去同身寸之一寸并衝脉足少陰二經之會各刺可入同身寸之一寸若灸者可灸五壯足少陰舌下厥陰毛中急脉各一足少陰舌下二穴在人迎前陷中動脉前是日月本左右二也足少陰脉氣所發刺可入同身寸之四分急脉在陰髦中陰上兩傍相去同身寸之二寸半按之隱指堅然甚按則痛引上下也其左者中寒則上引少腹下引陰丸善為痛為小腹急中寒此兩脉皆厥陰之大絡通行其中故曰厥陰急脉即皋之系也可灸而不可刺病疝少腹痛即可灸新校正云詳舌下毛中之穴甲乙經無手少陰各一謂手少陰郤穴也在腕後同身寸之半寸手少陰郤也刺可入同身寸之三分若灸者可灸三壯左右二也陰陽蹻各一陰蹻一謂交信穴也交信在足內踝上同身寸之二寸少陰前太陰後筋骨間陰蹻之郤刺可入同身寸之四分留五呼若灸者可灸三壯陽蹻一謂附陽穴也附陽在足外踝上同身寸之三寸太陽前少陽後筋骨間謹取之陽蹻之郤刺可入同身寸之六分留七呼若灸者可灸三壯左右四也手足諸魚際脉氣所發者凡三百六十五穴也經之所存者多凡一十九穴此所謂氣府也然散穴俞諸經脉部分皆有之故經或不言而甲乙經經脉流注多少不同者以此黃帝內經素問補注釋文卷之三十三

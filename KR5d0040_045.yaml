front:
  text: 黄帝内經素問補註釋文卷之四十五榮三
  hash: sha256:2082d16a2cba73eaacffccb44ba0f43865e8ab4fbb45f250505e253d4ba16aa3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_045-001a, image: hfl/0658/0658-099.png}
body:
  text: 唐太僕令啓玄子王氷次註宋光禄卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤六元正紀大論篇中帝曰太陰之政奈何岐伯曰丑未之紀也太陰少角太陽清熱勝復同同正宫新校正云按五常政大論云委和之紀上宫與正宫同丁丑丁未其運風清熱少角初正太徵少宫大商少羽終太陰少徵太陽寒雨勝復同癸丑癸未其運熱寒雨少徵太宫少商太羽終太角太陰少宫太陽風清勝復同同正宫新校正云按五常政大論云卑監之紀上宫與正宫同己丑太一天符己未太一天符其運雨風清少宫太商少羽終少角初太徵太陰少商太陽熱寒勝復同乙丑乙未其運凉熱寒少商太羽終太角初少徵太宫太陰少羽太陽雨風勝復同同正宫新校正云按五常政大論云涸流之紀上宫與正宫同或以此二歲爲同歲會爲平水運欲去同正宫三字者非也蓋此歲有二義而輒去其一甚不可也辛丑同歲會辛未同歲會共運寒雨風少羽終少角初太徵少宫太商凡此太陰司天之政氣化運行後天萬物生長化成皆後天時而生成也陰專其政陽氣退辟大風時起新校正云詳此太陰之政何以言大風時起蓋厥陰爲初氣居木位春氣正風乃來故言大風時起天氣下降地氣上騰原野昏霧白埃四起雲奔南極寒雨數至物成於差夏南極雨府也差夏謂立秋之後一十日也民病寒濕腹滿身䐜憤胕腫痞逆寒厥拘急濕寒合德黄黑埃昏流行氣交上應鎮星辰星見大而明其政肅其令寂其穀黅玄正氣所生成也故陰凝於上寒積於下寒水勝火則爲氷雹陽光不治殺氣乃行黄黑昏埃是謂殺氣自北及西流行於東及南也故有餘宜高不及宜下有餘宜晚不及宜早有餘土之利氣之化也民氣亦從之間穀命其太也以間氣之大者言其穀也初之氣地氣遷寒乃去春氣至風乃來生布萬物以榮民氣條舒風濕相薄雨乃後降民病血溢筋絡拘强關節不利身重筋痿二之氣大火正物承化民乃和其病厲大行遠近咸若濕蒸相薄雨乃時降應順天常不愆時候謂之時雨新校正云詳此以少陰居君火之位故言大火正三之氣天政布濕氣降地氣騰雨乃時降寒乃隨之感於寒濕則民病身重胕腫胸腹滿四之氣畏火臨溽蒸化地氣騰天氣否隔寒風曉暮蒸熱相薄草木凝烟濕化不流則白露陰布以成秋令萬物得之以成民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫五之氣慘令已行寒露下霜乃早降草木黄落寒氣及體君子周宻民病皮腠終之氣寒大舉濕大化霜乃積陰乃凝水堅冰陽光不治感於寒則病人關節禁固腰脽痛寒濕持於氣交而爲疾也必折其鬱氣而取化源九月化源近而取之以補益也益其歲氣無使邪勝食歲穀以全其眞食間穀以保其精故歲宜以苦燥之温之甚者發之泄之不發不泄則濕氣外溢肉潰皮拆而水血交流必贊其陽火令禦甚寒冬之分其用五步量氣用之也從氣異同少多其判也通言歲運之同異也同寒者以熱化同濕者以燥化少宫少商少羽歲同寒少宫歲又同濕濕過故宜燥寒過故宜熱少角少徵歲平和處之也異者少之同者多之用凉遠凉用寒遠寒用温遠温用熱遠熱食宜同法假者反之此其道也反是者病也帝曰善少陰之政奈何岐伯曰子午之紀也少隂大角新校正云按五常政大論云上徵則其氣逆陽明壬子壬午其運風鼓其化鳴紊啓拆新校正云按五常政大論云其德鳴靡啓拆其變振拉摧拔其病支滿太角初正少徵大宫少商太羽終少陰太徵新校正云按五常政大論云上徵而收氣後陽明戊子天符戊午太一天符其運炎暑新校正云詳太徵運太陽司天曰熱少陽司天曰暑少陰司天曰炎暑兼司天之氣而言運也其化暄曜鬱燠新校正云按五常政大論作暄暑鬱燠此變暑爲曜者以上臨少陰故也其變炎烈沸騰其病上熱血溢太徵少宫太商少羽終少角初少陰大宫陽明甲子甲午其運陰雨其化柔潤時雨新校正云按五常政大論云柔潤重淖又大宫三運兩作柔潤重澤此時雨二字疑誤其變震驚飄驟其病中滿身重大宫少商太羽終太角初少徵少陰太商陽明庚子同天符庚午同天符同正商新校正云按五常政大論云堅成之紀上徵與正商同其運涼勁新校正云詳此以運合在泉故云凉勁其化霧露蕭飋其變肅殺凋零其病下清太商少羽少角初太徵少宫少陰大羽陽明丙子歲會丙午其運寒其化凝慘凓冽新校正云按五常政大論作凝慘寒雰其變氷雪霜雹其病寒下太羽終太角初少徵大宫少商凡此少陰司天之政氣化運行先天地氣肅天氣明寒交暑熱加燥新校正云詳此云寒交暑者謂前歲終之氣少陽今歲初之氣太陽太陽寒交前歲少陽之暑也熱加燥者少陰在上而陽明在下也雲馳雨府濕化乃行時雨乃降金火合德上應熒惑太白見而明大其政明其令切其穀丹白水火寒熱持於氣交而爲病始也熱病生於上清病生於下寒熱凌犯而爭於中民病咳喘血溢血泄鼽嚏目赤眦瘍寒厥入胃心痛腰痛腹大嗌乾腫上初之氣地氣遷燥將去新校正云按陽明在泉之前歲爲少陽少陽者暑暑往而陽明在地太陽初之氣故上文寒交暑是暑去而寒始也此燥字乃暑字之誤也寒乃始蟄復藏水乃冰霜復降風乃至新校正云按王注六微㫖大論太陽居木位爲寒風切冽此風乃至當作風乃冽陽氣鬱民反周宻關節禁固腰脽痛炎暑將起中外瘡瘍二之氣陽氣布風乃行春氣以正萬物應榮寒氣時至民乃和其病淋目暝目赤氣鬱於上而熱三之氣天政布大火行庶類番鮮寒氣時至民病氣厥心痛寒熱更作咳喘目赤四之氣溽暑至大兩時行寒熱互至民病寒熱嗌乾黄癉鼽衂飲發五之氣畏火臨暑反至陽乃化萬物乃生乃長榮民乃康其病温終之氣燥令行餘火内格腫於上咳喘甚則血溢寒氣數舉則霧霿翳病生皮腠内舍於脅下連小腹而作寒中地將易也氣終則遷何可長也必抑其運氣資其歲勝折其鬱發先取化源先於年前十二月迎而取之無使暴過而生其病也食歲穀以全眞氣食間穀以避虚邪歲宜鹹以軟之而調其上甚則以苦發之以酸收之而安其下甚則以苦泄之適氣同異而多少之同天氣者以寒清化同地氣者以温熱化太角大徵歲同天氣宜以寒清治之大宫大商太羽歲同地氣宜以温熱治之化治也用熱遠熱用凉遠凉用温遠温用寒遠寒食宜同法有假則反此其道也反是者病作矣帝曰善厥陰之政奈何岐伯曰巳亥之紀也厥陰少角少陽清熱勝復同同正角新校正云按五常政大論云委和之紀上角與正角同丁巳天符丁亥天符其運風清熱少角初正大徵少宫大商少羽終厥隂少徵少陽寒雨勝復同癸巳同歲會癸亥同歲會其運熱寒雨少徵大宫少商太羽終大角初厥隂少宫少陽風清勝復同同正角新校正云按五常政大論云卑監之紀上隂與正角同己巳己亥其運雨風清少宫大商少羽終少角初大徵厥陰少商少陽熱寒勝復同同正角新校正云按五常政大論云從革之紀上角與正角同乙巳乙亥其運凉熱寒少商大羽終大角初少徵大宫厥陰少羽少陽雨風勝復同辛巳辛亥其運寒雨風少羽終少角初大徵少宫太商凡此厥陰司天之政氣化運行後天諸同正歲氣化運行同天太過歲運化氣行先天時不及歲化生成後天時同正歲化生成與天二十四氣遲速同無先後也新校正云詳此注云同正歲與二十四氣同疑非恐是與大寒日交司氣候同天氣擾地氣正風生高遠炎熱從之雲趨雨府濕化乃行風火同德上應歲星熒惑其政撓其令速其穀蒼丹間穀言太者其耗文角品羽風燥火熱勝復更作蟄蟲來見流水不冰熱病行於下風病行於上風燥勝復形於中初之氣寒始肅殺氣方至民病寒於右之下二之氣寒不去華雪水冰殺氣施化霜乃降名草上焦寒雨數至陽復化民病熱於中三之氣天政布風乃時舉民病泣出耳鳴掉眩四之氣溽暑濕熱相薄爭於左之上民病黄癉而爲胕腫五之氣燥濕更勝沉陰乃布寒氣及體風雨乃行終之氣畏火司令陽乃大化蟄蟲出見流水不冰地氣大發草乃生人乃舒其病温厲必折其鬱氣資其化源化源四月也迎而取之贊其運氣無使邪勝歲宜以辛調上以鹹調下畏火之氣無妄犯之新校正云詳此運何以不言適氣同異少多之制者蓋厥陰之政與少陽之政同六氣分政惟厥陰與少陽之政上下無剋罰之異治化惟一故不再言同風熱者多寒化異風熱者少寒化也用温遠温用熱遠熱用凉遠凉用寒遠寒食宜同法有假反常此之道也反是者病帝曰善夫子言可謂悉矣然何以明其應乎岐伯曰昭乎哉問也夫六氣者行有次止有位故常以正月朔日平旦視之覩其位而知其所在矣陰之所在天應以雲陽之所在天應以清淨自然分布象見不差運有餘其至先運不及其至後先後者寅時之先後也先則丑後後則卯初此天之道氣之常也天道昭然當期必應見無差失是氣之常運非有餘非不足是謂正歲其至當其時也當時謂當寅之正也帝曰勝復之氣其常在也災眚時至候也奈何岐伯曰非氣化者是謂災也十二變備矣帝曰天地之數終始奈何岐伯曰悉乎哉問也是明道也數之始起於上而終於下歲半之前天氣主之歲半之後地氣主之歲半謂立秋之日也新校正云詳初氣交司在前歲大寒日歲半當在立秋前一氣十五日不得云立秋之日也上下交互氣交主之歲紀畢矣交互互體也上體下體之中有二互體也故曰位明氣月可知乎所謂氣也大凡一氣主六十日而有奇以立位數之位同一氣則月之節氣中氣可知也故言天地氣者以上下體言勝復者以氣交言横運者以上下互皆以節氣準之候之灾眚變復可期矣帝曰余司其事則而行之不合其數何也岐伯曰氣用有多少化治有盛衰衰盛多少同其化也帝曰願聞同化何如岐伯曰風温春化同熱曛昏火夏化同勝與復同燥清烟露秋化同雲雨昏暝埃長夏化同寒氣霜雪冰冬化同此天地五運六氣之化更用盛衰之常也帝曰五運行同天化者命曰天符余知之矣願聞同地化者何謂也岐伯曰太過而同天化者三不及而同天化者亦三太過而同地化者三不及而同地化者亦三此凡二十四歲也六十年中同天地之化者凡二十四歲餘悉隨已多少帝曰願聞其所謂也岐伯曰甲辰甲戌大宫下加太陰壬寅壬申大角下加厥陰庚子庚午太商下加陽明如是者三癸巳癸亥少徵下加少陽辛丑辛未少羽下加太陽癸卯癸酉少徵下加少陰如是者三戊子戊午大徵上臨少陰戊寅戊申太徵上臨少陽丙辰丙戌大羽上臨太陽如是者三丁巳丁亥少角上臨厥陰乙卯乙酉少商上臨陽明己丑己未少宫上臨太陰如是者三除此二十四歲則不加不臨也帝曰加者何謂岐伯曰太過而加同天符不及而加同歲會也帝曰臨者何謂岐伯曰太過不及皆曰天符而變行有多少病形有徵甚生死有早晏耳帝曰夫子言用寒遠寒用熱遠熱余未知其然也願聞何謂遠岐伯曰熱無犯熱寒無犯寒從者和逆者病不可不敬畏而遠之所謂時與六位也四時氣王之月藥及食衣寒熱温凉同者皆宜避之差四時同犯則以水濟水以火助火病必生也帝曰温凉何如温凉减於寒熱可輕犯之乎岐伯曰司氣以熱用熱無犯司氣以寒用寒無犯司氣以凉用凉無犯司氣以温用温無犯間氣同其主無犯異其主則小犯之是謂四畏民謹察之帝曰善其犯者何如須犯者岐伯曰天氣反時則可依時反甚爲病則可依時及勝其主則可犯夏熱甚則可以熱犯熱寒氣不甚則不可犯之以平爲期而不可過氣平則止過則病生過而病生與犯同也是謂邪氣反勝者氣動有勝是謂邪客勝於主不可不禦也六步之氣於六位中應寒反熱應熱反寒應温反涼應凉反温是謂六步之邪勝也差冬反温差夏反冷差秋反熱差春反凉是謂四時之邪勝也勝則反其氣以平之故曰無失天信無逆氣宜無冀其勝無贊其復是謂至治天信謂至時必定翼贊皆佐之謹守天信是謂至眞妙理也黄帝内經素問補註釋文卷之四十五

front:
  text: 黃帝內經素問補注釋文卷之四慎四
  hash: sha256:ed55cb98499c19826a6f47e54022fd3cbc382bfe9821c6b882b3d6532b913f66
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_004-001a, image: hfl/0649/0649-110.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤金匱真言論篇黃帝問曰天有八風經有五風何謂經謂經脉所以流通營衛血氣者也岐伯對曰八風發邪以為經風觸五藏邪氣發病原其所起則謂八風發邪經脉受之則循經而觸於五臟以邪干正故發病也所謂得四時之勝者春勝長夏長夏勝冬冬勝夏夏勝秋秋勝春所謂四時之勝也春木夏火長夏土秋金冬水皆以所剋殺而為勝也言五時之相勝者不謂八風中人則病各謂隨其不勝則發病也勝謂制剋之也東風生於春病在肝俞在頸項春風發榮於萬物之上故俞在頸項曆忌曰甲乙不治頸此之謂也南風生於夏病在心俞在胸脅心少陰脉循胸出脅故俞在焉西風生於秋病在肺俞在肩背肺處上焦背為胸府肩背相次故俞在焉北風生於冬病在腎俞在腰股腰為腎府股接次之以氣相連故兼言也中央為土病在脾俞在脊以脊應土言居中爾故春氣者病在頭春氣謂肝氣也各隨其藏氣之所應新校正云按周禮云春時有痟首疾夏氣者病在藏心之應也秋氣者病在肩背肺之應也冬氣者病在四支四支氣少寒毒善傷隨所受邪則為病處故春善病鼽衄以氣在頭也禮記月令曰季秋行夏令則民多鼽嚏仲夏善病胸脅心之脉循胸脅故也長夏善病洞泄寒中土主於中是為倉廪糟粕水穀故為洞泄寒中也秋善病風瘧以凉折暑乃為是病生氣通天論曰𩲸汗未盡形弱而氣爍穴俞以閉發為風瘧此謂以凉折暑之義也禮記月令曰孟秋行夏令則民多瘧疾冬善病痹厥血象於水寒則冰凝以氣薄流故為痹厥故冬不按蹻春不鼽衄按謂按摩蹻謂如蹻捷者之舉動手足是所謂導引也然擾動筋骨則陽氣不藏春陽氣上升重熱熏肺肺通於鼻病則形之故冬不按蹻春不鼽衄鼽謂鼻中水出衄謂鼻中血出蹻音喬春不病頸項仲夏不病胸脅長夏不病洞泄寒中秋不病風瘧冬不病痹厥飧泄而汗出也此上五句并為冬不按蹻之所致也新校正云詳飱泄而汗出也六字上文疑剩夫精者身之本也故藏於精者春不病溫此正謂冬不按蹻則精氣伏藏以陽不妄升故春無溫病夏暑汗不出者秋成風瘧此正謂以風凉之氣折暑汗也新校正云詳此下義與上文不相接此平人脉法也謂平病人之脉法也故曰陰中有陰陽中有陽言其初起與其王也平旦至日中天之陽陽中之陽也日中至黃昏天之陽陽中之陰也日中陽盛故曰陽中之陽黃昏陰盛故曰陽中之陰陽氣主晝故平旦至黃昏皆為天之陽而中復有陰陽之殊也合夜至雞鳴天之陰陰中之陰也雞鳴至平旦天之陰陰中之陽也雞鳴陽氣未出故也天之陰平旦陽氣已升故曰陰中之陽故人亦應之夫言人之陰陽則外為陽內為陰言人身之陰陽則背為陽腹為陰言人身之臟府中陰陽則臟者為陰府者為陽臟謂五神臟府謂六化府肝心脾肺腎五臟皆為陰膽胃大腸小腸膀胱三焦六府皆為陽靈樞經曰三焦者上合於手心主又曰足三焦者太陽之别名也正理論曰三焦者有名無形上合於手心主下合右腎主謁道諸氣名為使者所以欲知陰中之陰陽中之陽者何也為冬病在陰夏病在陽春病在陰秋病在陽皆視其所在為施針石也故背為陽陽中之陽心也心為陽藏位處上焦以陽居陽故為陽中之陽也靈樞經曰心為牡藏牡陽也背為陽陽中之陰肺也肺為陰藏位處上焦以陰居陽故謂陽中之陰也靈樞經曰肺為牝藏謂陰也腹為陰陰中之陰腎也腎為陰藏位處下焦以陰居陰故謂陰中之陰也靈樞經曰腎為牝藏牝陰也腹為陰陰中之陽肝也肝為陽藏位處中焦以陽居陰故謂陰中之陽也靈樞經曰肝為牡藏牡陽也腹為陰陰中之至陰脾也脾為陰藏位處中焦以太陰居陰故謂陰中之至陰也靈樞經曰脾為牝藏牝陰也此皆陰陽表裏內外雌雄相輸應也故以應天之陰陽也以其氣象參合故能上應於天帝曰五藏應四時各有收受乎岐伯曰有東方青色入通於肝開竅於目藏精於肝精謂精氣也木精之氣其神魂陽升之方以目為用故開竅於目其病發驚駭象木屈伸有搖動也新校正詳東方云病發驚駭餘方各闕者按五常政大論委和之紀其發驚駭疑此文為衍其味酸其類草木性柔脆而曲直其畜雞以雞為畜取巽言之易曰巽為雞其穀麥五穀之長者麥故東方用之本草曰麥為五穀之長新校正按五常政大論云其畜犬其穀麻其應四時上為歲星木之精氣上為歲星十二年一周天是以春氣在頭也萬物發榮於上故春氣在頭新校正詳東方言春氣在頭不言故病在頭餘方言故病在某不言某氣在某者互文也其音角角木聲也孟春之月律中太簇林鐘所生三分益一管率長八寸仲春之月律中夾鐘夷則所生三分益一管率長七寸五分新校正按鄭康成云七寸二千一百八十七分之寸千七十五季春之月律中姑洗南吕所生三分益一管率長七寸又一十分寸之一新校正按鄭康成云九分寸之一凡是三管皆本氣應之其數八木生數三成數八尚書洪範曰三曰木是以知病之在筋也木之堅柔類筋氣故其臭臊凡氣因木變則為臊新校正云詳臊月令作膻南方赤色入通於心開竅於耳藏精於心火精之氣其神神舌為心之官當言於舌舌用非竅故云耳也繆刺論曰手少陰之絡會於耳中義取此也故病在五藏以夏氣在藏也其味苦其類火性炎上而燔灼其畜羊以羊為畜言其未也以土同王故通而言之新校正云按五常政大論云其畜馬其穀黍黍色赤其應四時上為熒惑星火之精氣上為熒惑星七百四十日一周天是以知病之在脉也火之躁動類於脉氣其音徵徵火聲也孟夏之月律中仲吕無射所生三分益一管率長六寸七分新校正云按鄭康成云六寸萬九千六百八十三分寸之萬二千九百七十四仲夏之月律中蕤賔應鐘所生三分益一管率長六寸三分新校正云按鄭康成云六寸八十一分寸之二十六季夏之月律中林鍾黃鍾所生三分减一管率長六寸凡是三管皆火氣應之其數七火生數二成數七尚書洪範曰二曰火其臭焦凡氣因火變則為焦中央黃色入通於脾開竅於口藏精於脾土精之氣其神意脾為化穀口主迎糧故開竅於口故病在舌本脾脉上連於舌本故病氣居之其味甘其類土性安靜而化造其畜牛土王四季故畜取丑牛又以牛色黃也其穀稷色黃而味甘也其應四時上為鎮星土之精氣上為鎮星二十八年一周天是以知病之在肉也土之柔厚類肉氣故其音宫宫土聲也律書以黃鍾為濁宫林鍾為清宫蓋以林鐘當六月管也五音以宫為主律吕初起於黃鐘為濁宫林鐘為清宫也其數五土數五尚書洪範曰五曰土其臭香凡氣因土變則為香西方白色入通於肺開竅於鼻藏精於肺金精之氣其神魄肺藏氣鼻通息故開竅於鼻故病在背以肺在胸中背為胸中之府也其味辛其類金性音聲而堅徑其畜馬畜馬者取乾也易曰乾為馬新校正云按五常政大論云其畜雞其穀稻稻堅白其應四時上為太白星金之精氣上為太白星三百六十五日一周天是以知病之在皮毛也金之堅密類皮毛也其音商商金聲也孟秋之月律中夷則大吕所生二分减一管率長五寸七分仲秋之月律中南吕太簇所生三分减一管率長五寸三分季秋之月律中無射夾鐘所生三分减一管率長五寸凡是三管皆金氣應之其數九金生數四成數九尚書洪範曰四曰金其臭腥凡氣因金變則為腥膻之氣也北方黑色入通於腎開竅於二陰藏精於腎水精之氣其神志腎藏精陰泄注故開竅於二隂也故病在溪溪謂肉之小會也氣穴論曰肉之大會為谷肉之小會為溪其味鹹其類水性潤下而滲灌其畜彘其穀豆其畜彘者彘豕也其穀豆者豆黑色也其應四時上為辰星水之精氣上為辰星三百六十五日一周天是以知病之在骨也骨主幽暗骨體內藏以類相同故病居骨也其音羽羽水聲也孟冬之月律中應鍾姑洗所生三分减一管率長四寸七分半仲冬之月律中黃鍾仲吕所生三分益一管率長九寸季冬之月律中大吕蕤賔所生三分益一管率長八寸四分凡是三管皆水氣應之其數六水生數一成數六尚書洪範曰一曰水其臭腐凡氣因水變則為腐朽之氣也故善為脉者謹察五藏六府一逆一從陰陽表裏雌雄之紀藏之心意合心於精心合精微則深知通變非其人勿教非其真勿授是謂得道隨其所能而與之是謂得師資教授之道也靈樞經曰明目者可使視色聰耳者可使聽音捷疾辭語者可使論語徐而安靜手巧而心審諦者可使行針艾理血氣而調諸逆順察陰陽而兼諸方緩節柔筋而心和調者可使導引行氣痛毒言語輕人者可使唾癰咒病爪苦手毒為事善傷者可使按積抑搏由是則各得其能方乃可行其名乃彰故曰非其人勿教非其真勿授也黃帝內經素問補注釋文卷之四

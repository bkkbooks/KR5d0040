body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤皮部論篇黃帝問曰余聞皮有分部脈有經紀筋有結絡骨有度量其所生病各異别其分部左右上下陰陽所在病之始終願聞其道岐伯對曰欲知皮部以經脈為紀者諸經皆然循經脈行止所主則皮部可知諸經謂十二經脈也十二經脈皆同陽明之陽名曰害蜚蜚生化也害殺氣也殺氣行則化生弭故曰害蜚蜚扶沸切上下同法視其部中有浮絡者皆陽明之絡也上謂手陽明下謂足陽明也其色多青則痛多黑則痹黃赤則熱多白則寒五色皆見則寒熱也絡盛則入客於經陽主外陰主內陽謂陽絡陰謂陰絡此通言之也手足身分所見經絡皆然少陽之陽名曰樞持樞謂樞要持謂執持上下同法視其部中有浮絡者皆少陽之絡也絡盛則入客於經故在陽者主內在陰者主出以滲於內諸經皆然太陽之陽名曰關樞關司外動以靜鎮為事如樞之運則氣和平也上下同法視其部中有浮絡者皆太陽之絡也絡盛則入客於經少陰之陰名曰樞儒儒順也守要而順陰陽開闔之用也新校正云按甲乙經儒作濡上下同法視其部中有浮絡者皆少陰之絡也絡盛則入客於經其入經也從陽部注於經其出者從陰內注於骨心主之陰名曰害肩心主脈入掖下氣不和則妨害肩掖之動運上下同法視其部中有浮絡者皆心主之絡也絡盛則入客於經太陰之陰名曰關蟄關閉蟄類使順行藏新校正云按甲乙經蟄作執上下同法視其部中有浮絡者皆太陰之絡也絡盛則入客於經部皆謂本經絡之所部分浮謂浮見也凡十二經絡脈者皮之部也列陰陽位部主於皮故曰皮之部也是故百病之始生也必先於皮毛邪中之則腠理開開則入客於絡脈留而不去傳入於經留而不去傳入於府廪於腸胃廪積也聚也邪之始入於皮也泝然起毫毛開腠理泝然惡寒也起謂毛起堅也腠理皆謂皮空及文理也其入於絡也則絡脈盛色變盛謂盛滿變謂易其常也其入客於經也則感虛乃陷下經虛邪入故曰感虛脈虛氣少故陷下也其留於筋骨之間寒多則筋攣骨痛熱多則筋弛骨消肉爍䐃破毛直而敗攣急也弛緩也消爍也針經曰寒則筋急熱則筋緩寒勝為痛熱勝為氣消䐃者肉之標故肉消則䐃破毛直而敗也䐃渠殞切帝曰夫子言皮之十二部其生病皆何如岐伯曰皮者脈之部也脈氣流行各有陰陽氣隨經所過而部主之故云脈之部邪客於皮則腠理開開則邪入客於絡脈絡脈滿則注於經脈經脈滿則入舍於府藏也故皮者有分部不與而生大病也脈行皮中各有部分脈受邪氣隨則病生非由皮氣而能生也新校正云按甲乙經不與作不愈全元起本作不與元起云言不與經脈調和則氣傷於外邪流入於內必生大病也帝曰善經絡論篇黃帝問曰夫絡脈之見也其五色各異青黃赤白黑不同其故何也岐伯對曰經有常色而絡無常變也經行氣故色見常應於時絡主血故受邪則變而不一矣帝曰經之常色何如岐伯曰心赤肺白肝青脾黃腎黑皆亦應其經脈之色也帝曰絡之陰陽亦應其經乎岐伯曰陰絡之色應其經陽絡之色變無常隨四時而行也順四時氣化之行止寒多則凝泣凝泣則青黑熱多則淖澤淖澤則黃赤此皆常色謂之無病五色具見者謂之寒熱淖濕也澤潤液也謂微濕潤也帝曰善氣穴論篇黃帝問曰余聞氣穴三百六十五以應一歲未知其所願卒聞之岐伯稽首再拜對曰窘乎哉問也其非聖帝孰能窮其道焉因請溢意盡言其處孰誰也帝捧手逡巡而却曰夫子之開余道也目未見其處耳未聞其數而目以明耳以聰矣目以明耳以聰言心志通明迥如意也岐伯曰此所謂聖人易語良馬易御也帝曰余非聖人之易語也世言真數開人意今余所訪問者真數發蒙解惑未足以論也開氣穴真數庶將解彼蒙昧之疑惑未足以論述深微之意也然余願聞夫子溢志盡言其處令解其意請藏之金匱不敢復出言其處謂穴俞處所岐伯再拜而起曰臣請言之背與心相控而痛所治天突與十椎及上紀天突在頸結喉下同身寸之四寸中央宛宛中陰維任脈之會低針取之刺可入同身寸之一寸留七呼若灸者可灸三壯按今甲乙經經脈流注孔穴圖經當脊十椎下并無穴目恐是七椎也此則督脈氣所主之上紀之處次如下説新校正云按甲乙經云天突在結喉下五寸上紀者胃脘也謂中皖也脘者胃募也在上脘下同身寸之一寸居心蔽骨與齊之中手太陽少陽足陽明三脈所生任脈氣所發也刺可入同身寸之一寸二分若灸者可灸七壯新校正云按甲乙經云任脈之會也蔽必寐切下紀者關元也關元者小腸募也在齊下同身寸之三寸足三陰任脈之會刺可入同身寸之二寸留七呼若灸者可灸七壯背胸邪繫陰陽左右如此其病前後痛澀胸脅痛而不得息不得卧上氣短氣偏痛新校正云按别本偏一作滿脈滿起斜出尻脈絡胸脅支心貫鬲上肩加天突斜下肩交十椎下尋此支絡脈流注病形證悉是督脈支絡自尾骶出各上行斜絡脅支心貫鬲上加天突斜之肩而下交於十椎新校正云詳自背與心相控而痛至此疑是骨空論文簡脫誤於此藏俞五十穴藏謂五藏肝心脾肺腎非兼四形藏也俞謂井滎俞經合非背俞也然井滎俞經合者肝之井者大敦也滎行間也俞太衝也經中封也合曲泉也大敦在足大指端去爪甲角如韭葉及三毛之中足厥陰脈之所出也刺可入同身寸之三分留十呼若灸者可灸三壯行間在足大指之間脈動應手陷者中足厥陰之所流也新校正云按甲乙經留作流餘所流并作留刺可入同身寸之三分留十呼若灸者可灸三壯太衝在足大指本節後同身寸之二寸陷者中新校正云按刺腰痛注云本節後內間同身寸之二寸陷者中動脈應手足厥陰脈之所注也刺可入同身寸之三分留十呼若灸者可灸三壯中封在足內踝前同身寸之一寸半新校正云按甲乙經云一寸陷者中仰足而取之伸足乃得之足厥陰脈之所行也刺可入同身寸之四分留七呼若灸者可灸三壯曲泉在膝內輔骨下大筋上小筋下陷者中屈膝而得之足厥陰脈之所入也刺可入同身寸之六分留十呼若灸者可灸三壯心包之井者中衝也滎勞宫也俞太陵也經間使也合曲澤也中衝在手中指之端去爪甲角如韭葉陷者中手心主脈之所出也刺可入同身寸之一分留三呼若灸者可灸一壯勞宫在掌中央動脈手心主脈之所流也刺可入同身寸之三分留六呼若灸者可灸三壯太陵在掌後骨兩筋間陷者中手心主脈之所注也刺可入同身寸之六分留七呼若灸者可灸三壯間使在掌後同身寸之三寸兩筋間陷者中手心主脈之所行也刺可入同身寸之六分留七呼若灸者可灸七壯新校正云按甲乙經云灸三壯曲澤在肘內廉下陷者中屈肘而得之手心主脈之所入也刺可入同身寸之三分留七呼若灸者可灸三壯脾之井者隱白也滎大都也俞太白也經商丘也合陰陵泉也隱白在足大指之端內側去爪甲角如韭葉足太陰脈之所出也刺可入同身寸之一分留三呼若灸者可灸三壯大都在足大指本節後陷者中足太陰脈之所流也刺可入同身寸之三分留七呼若灸者可灸三壯太白在足內側核骨下陷者中足太陰脈之所注也刺可入同身寸之三分留七呼若灸者可灸三壯商丘在足內踝下微前陷者中足太陰脈之所行也刺可入同身寸之四分留七呼若灸者可灸三壯陰陵泉在膝下內側輔骨下陷者中伸足乃得之足太陰脈之所入也刺可入同身寸之五分留七呼若灸者可灸三壯肺之井者少商也滎魚際也俞太淵也經經渠也合尺澤也少商在手大指之端內側去爪甲角如韭葉手太陰脈之所出也刺可入同身寸之一分留一呼若灸者可灸三壯新校正云按甲乙經作一壯魚際在手大指本節後內側散脈手太陰脈之所流也刺可入同身寸之二分留三呼若灸者可灸三壯太淵在掌後陷者中手太陰脈之所注也刺可入同身寸之二分留二呼若灸者可灸三壯經渠在寸口陷者中手太陰脈之所行也刺可入同身寸之三分留三呼不可灸傷人神明尺澤在肘中約上動脈手太陰脈之所入也刺可入同身寸之三分留三呼若灸者可灸三壯腎之井者涌泉也滎然谷也俞太溪也經復溜也新校正云按甲乙經溜作留餘溜字并同合陰谷也涌泉在足心陷者中屈足捲指宛宛中足少陰脈之所出也刺可入同身寸之三分留二呼若灸者可灸三壯然谷在足內踝前起大骨下陷者中足少陰脈之所流也刺可入同身寸之三分留三呼若灸者可灸三壯刺此多見血令人立飢欲食太溪在足內踝後跟骨上動脈陷者中足少陰脈之所注也刺可入同身寸之三分留七呼若灸者可灸三壯復溜在足內踝上同身寸之二寸陷者中新校正云按刺腰痛篇注云在內踝後上二寸動脈足少陰脈之所行也刺可入同身寸之三分留三呼若灸者可灸五壯陰谷在膝下內輔骨之後大筋之下小筋之上按之應手屈膝而得之足少陰脈之所入也刺可入同身寸之四分若灸者可灸三壯如是五藏之俞藏各五穴則二十五俞以左右脈具而言之則五十穴府俞七十二穴府謂六府非兼九形府也俞亦謂井滎俞原經合非背俞也肝之府膽膽之井者竅陰也滎俠溪也俞臨泣也原丘虛也經陽輔也合陽陵泉也竅陰在足小指次指之端去爪甲角如韭葉足少陽脈之所出也刺可入同身寸之一分留一呼新校正云按甲乙經作三呼若灸者可灸三壯俠溪在足小指次指歧骨間本節前陷者中足少陽脈之所流也刺可入同身寸之三分留三呼若灸者可灸三壯臨泣在足小指次指本節後間陷者中去俠溪同身寸之一寸半足少陽脈之所注也刺可入同身寸之三分新校正云按甲乙經作二分留五呼若灸者可灸三壯丘虛在足外踝下如前陷者中去臨泣同身寸之三寸足少陽脈之所過也刺可入同身寸之五分留七呼若灸者可灸三壯陽輔在足外踝上新校正云按甲乙經云外踝上四寸輔骨前絶骨之端如前同身寸之三分所去丘虛同身寸之七寸足少陽脈之所行也刺可入同身寸之五分留七呼若灸者可灸三壯陽陵泉在膝下同身寸之一寸胻外廉陷者中足少陽脈之所入也刺可入同身寸之六分留十呼若灸者可灸三壯脾之府胃胃之井者厲兌也滎內庭也俞陷谷也原衝陽也經解溪也合三里也厲兌在足大指次指之端去爪甲角如韭葉足陽明脈之所出也刺可入同身寸之一分留一呼若灸者可灸一壯內庭在足大指次指外間陷者中足陽明脈之所流也刺可入同身寸之三分留十呼新校正云按甲乙經云作二十呼若灸者可灸三壯陷谷在足大指次指外間本節後陷者中去內庭同身寸之二寸足陽明脈之所注也刺可入同身寸之五分留七呼若灸者可灸三壯衝陽在足跗上同身寸之五寸骨間動脈上去陷谷同身寸之三寸足陽明脈之所過也刺可入同身寸之三分留十呼若灸者可灸三壯解溪在衝陽後同身寸之二寸半新校正云按甲乙經作一寸半刺瘧注作三寸半素問二注不同當從甲乙經之説腕上陷者中足陽明脈之所行也刺可入同身寸之五分留五呼若灸者可灸三壯三里在膝下同身寸之三寸胻骨外廉兩筋肉分間足陽明脈之所入也刺可入同身寸之一寸留七呼若灸者可灸三壯肺之府大腸大腸之井者商陽也滎二間也俞三間也原合谷也經陽溪也合曲池也商陽在手大指次指內側去爪甲角如韭葉手陽明脈之所出也刺可入同身寸之一分留一呼若灸者可灸三壯二間在手大指次指本節前內側陷者中手陽明脈之所流也刺可入同身寸之三分留六呼若灸者可灸三壯三間在手大指次指本節內側陷者中手陽明脈之所注也刺可入同身寸之三分留三呼若灸者可灸三壯合谷在手大指次指歧骨之間手陽明脈之所過也刺可入同身寸之三分留六呼若灸者可灸三壯陽溪在腕中上側兩筋間陷者中手陽明脈之所行也刺可入同身寸之三分留七呼若灸者可灸三壯曲池在肘外輔屈肘兩骨之中手陽明脈之所入也以手拱胸取之刺可入同身寸之五分留七呼若灸者可灸三壯心之府小腸小腸之井者少澤也滎前谷也俞後溪也原腕骨也經陽谷也合少海也少澤在手小指之端去爪甲下同身寸之一分陷者中手太陽脈之所出也刺可入同身寸之一分留二呼若灸者可灸一壯前谷在手小指外側本節前陷者中手太陽脈之所流也刺可入同身寸之一分留三呼若灸者可灸三壯後溪在手小指外側本節後陷者中手太陽脈之所注也刺可入同身寸之一分留二呼若灸者可灸一壯腕骨在手外側腕前起骨下陷者中手太陽脈之所過也刺可入同身寸之二分留三呼若灸者可灸三壯陽谷在手外側腕中鋭骨之下陷者中手太陽脈之所行也刺可入同身寸之二分留三呼新校正云按甲乙經作二呼若灸者可灸三壯少海在肘內大骨外去肘端同身寸之五分陷者中屈肘乃得之手太陽脈之所入也刺可人同身寸之二分留七呼若灸者可灸五壯心包之府三焦三焦之井者關衝也滎液門也俞中渚也原陽池也經支溝也合天井也關衝在手小指次指之端去爪甲角如韭葉手少陽脈之所出也刺可入同身寸之一分留三呼若灸者可灸三壯液門在手小指次指間陷者中手少陽脈之所流也刺可入同身寸之二分留二呼若灸者可灸三壯中渚在手小指次指本節後間陷者中手少陽脈之所注也刺可入同身寸之二分留三呼若灸者可灸三壯陽池在手表腕上陷者中手少陽脈之所過也刺可入同身寸之二分留六呼若灸者可灸三壯支溝在腕後同身寸之三寸兩骨之間陷者中手少陽脈之所行也刺可入同身寸之二分留七呼若灸者可灸三壯天井在肘外大骨之後同身寸之一寸兩筋間陷者中屈肘得之手少陽脈之所入也刺可入同身寸之一寸留七呼若灸者可灸三壯腎之府膀胱膀胱之井者至陰也滎通谷也俞束骨也原京骨也經崑崙也合委中也至陰在足小指外側去爪甲角如韭葉足太陽脈之所出也刺可入同身寸之一分留五呼若灸者可灸三壯通谷在小指外側本節前陷者中太陽脈之所流也刺可入同身寸之二分留五呼若灸者可灸三壯束骨在足小指外側本節後赤白肉際陷者中足太陽脈之所注也刺可入同身寸之三分留三呼若灸者可灸三壯京骨在足外側大骨下赤白肉際陷者中按而得之足太陽脈之所過也刺可入同身寸之三分留七呼若灸者可灸三壯崑崙在足外踝後跟骨上陷者中細脈動應手足太陽脈之所行也刺可入同身寸之五分留十呼若灸者可灸三壯委中在膕中央約文中動脈新校正云詳委中穴與甲乙經及刺瘧篇注痹論注同又骨空論云在膝解之後曲腳之中背面取之又熱穴論注刺熱篇注云在足膝後屈處足太陽脈之所入也刺可入同身寸之五分留七呼若灸者可灸三壯如是六府之俞府各六穴則三十六俞以左右脈俱而言之則七十二穴熱俞五十九穴水俞五十七穴并具水熱論中新校正云按熱俞又見刺熱篇注頭上五行行五五五二十五穴此亦熱俞之五十九穴也中呂兩傍各五凡十穴謂五藏之背俞也肺俞在第三椎下兩傍心俞在第五椎下兩傍肝俞在第九椎下兩傍脾俞在第十一椎下兩傍腎俞在第十四椎下兩傍此五藏俞者各俠脊相去同身寸之一寸半并足太陽脈之會刺可入同身寸之三分肝俞留六呼餘并留七呼若灸者可灸三壯俠脊數之則十穴也大椎上兩傍各一凡二穴今甲乙經經脈流注孔穴圖經并不載未詳何俞也新校正云按大椎上傍無穴大椎下傍穴名大杼後有故王氏云未詳目瞳子浮白二穴瞳子髎在目外去眥同身寸之五分手太陽手足少陽三脈之會刺可入同身寸之三分若灸者可灸三壯浮白在耳後入髮際同身寸之一寸足太陽少陽二脈之會刺可入同身寸之三分若灸者可灸三壯左右言之各二為四也兩髀厭分中二穴謂環銚穴也在髀樞後足少陽太陽二脈之會刺可入同身寸之一寸留二呼若灸者可灸三壯新校正云按王氏云在髀樞後按甲乙經云在髀樞中後當作中灸三壯甲乙經作五壯犢鼻二穴在膝臏下胻上俠解大筋中足陽明脈氣所發刺可入同身寸之六分若灸者可灸三壯耳中多所聞二穴聽宫穴也在耳中珠子大如赤小豆手足少陽手太陽三脈之會刺可入同身寸之一分若灸者可灸三壯新校正云按甲乙經云刺可入三分眉本二穴攢竹穴也在眉頭陷者中足太陽脈氣所發刺可入同身寸之三分留六呼若灸者可灸三壯完骨二穴在耳後入髮際同身寸之四分足太陽少陽之會刺可入同身寸之三分留七呼若灸者可灸三壯新校正云刺可入三分灸七壯項中央一穴風府穴也在項上入髮際同身寸之一寸大筋內宛宛中督脈陽維二經之會疾言其肉立起言休其肉立下刺可入同身寸之四分留三呼灸之不幸使人瘖枕骨二穴竅陰穴也在完骨上枕骨下搖動應手足太陽少陽之會刺可入同身寸之三分若灸者可灸三壯新校正云按甲乙經云刺可入四分灸可五壯上關二穴針經所謂刺之則呿不能欠者也在耳前上廉起骨開口有空手少陽足陽明之會刺可入同身寸之三分留七呼若灸者可灸三壯刺深令人耳無所聞大迎二穴在曲頷前同身寸之一寸三分骨陷者中動脈足陽明脈氣所發刺可入同身寸之二分留七呼若灸者可灸三壯下關二穴針經所謂刺之則欠不能呿者也在上關下耳前動脈下廉合口有空張口而閉足陽明少陽二脈之會刺可入同身寸之三分留七呼若灸者可灸三壯耳中有乾擲之不得灸也新校正云按甲乙經擲之作擲抵擲音摘呿丘庶切天柱二穴在俠項後髮際大筋外廉陷者中足太陽脈氣所發刺可入同身寸之二分留六呼若灸者可灸三壯虛上下廉四穴上廉足陽眀與太陽合也在膝犢鼻下胻外廉同身寸之六寸足陽明脈氣所發刺可入同身寸之八分若灸者可灸三壯下廉足陽明與少陽合也在上廉下同身寸之三寸足陽明脈氣所發刺可入同身寸之三分若灸者可灸三壯新校正云按甲乙經并刺熱篇注水熱穴注上廉在二里下三寸此云犢鼻下六寸者蓋三里在犢鼻下三寸上廉又在三里下三寸故云六寸也曲牙二穴頰車穴也在耳下曲頰端陷者中開口有空足陽明脈氣所發刺可入同身寸之三分若灸者可灸三壯天突一穴已前釋也天府一穴在掖下同身寸之三寸臂臑內廉動脈手太陰脈氣所發禁不可灸刺可入同身寸之四分留三呼臑奴到切天牖二穴在頸筋間缺盆上天容後天柱前完骨下髮際上手少陽脈氣所發刺可入同身寸之一寸留七呼灸者可灸三壯扶突一穴在頸當曲頽下同身寸之一寸人迎後手陽明脈氣所發仰而取之刺可入同身寸之四分若灸者可灸三壯天窗二穴在曲頽下扶突後動脈應手陷者中手太陽脈氣所發刺可入同身寸之六分若灸者可灸三壯肩解二穴謂肩井也在肩上陷解中缺盆上大骨前手足少陽陽維之會刺可入同身寸之五分若灸者可灸三壯新校正云按甲乙經灸五壯關元一穴新校正云詳此已前釋舊當篇再注今去之委陽二穴三焦下輔俞也在膕中外廉兩筋間此足太陽之别絡刺可入同身寸之七分留五呼若灸者可灸三壯屈伸而取之肩貞二穴在肩曲甲下兩骨解間肩髃後陷者中手太陽脈氣所發刺可入同身寸之八分若灸者可灸三壯瘖門一穴在項髮際宛宛中入係舌本督脈陽維二經之會仰頭取之刺可入同身寸之四分不可灸之令人瘖新校正云按氣府注云去風府一寸齊一穴齊中也禁不可刺刺之使人齊中惡瘍潰矢出者死不可治若灸者可灸三壯胸俞十二穴謂俞府或中神藏靈墟神封步廊左右則十二穴也俞府在巨骨下俠任脈兩傍橫去任脈各同身寸之二寸陷者中下五穴遞相去同身寸之一寸六分陷者中并足少陰脈氣所發仰而取之刺可入同身寸之四分若灸者可灸五壯背俞二穴大杼穴也在脊第一椎下兩傍相去各同身寸之一寸半陷者中督脈别絡手足太陽三脈氣之會刺可入同身寸之三分留七呼若灸者可灸七壯膺俞十二穴謂雲門中府周滎胸卿天溪食竇左右則十二穴也新校正云按甲乙經作周滎胸卿雲門在巨骨下俠任脈傍橫去任脈各同身寸之六寸新校正云按水熱穴注作胸中行兩傍與此文雖異處所無别陷者中動脈應手雲門中府相去同身寸之一寸餘五穴遞相去同身寸之一寸六分陷者中并手太陰脈氣所發雲門食竇舉臂取之餘并仰而取之雲門刺可入同身寸之七分太深令人逆息中府刺可入同身寸之三分留五呼餘刺可入同身寸之四分若灸者可灸五壯新校正云詳王氏以此十二穴并手太陰按甲乙經雲門乃手太陰中府乃手足太陰之會周滎已下乃足太陰非十二穴并手太陰也分肉二穴在足外踝上絶骨之端同身寸之三分筋肉分間陽維脈氣所發刺可入同身寸之三分留七呼若灸者可灸三壯新校正云按甲乙經無分肉穴詳處所疑是陽輔在足外踝上輔骨前絶骨端如前三分所又按刺腰痛注作絶骨之端如後二分刺入五分留十呼與此注小異躁上橫二穴內踝上者交信穴也交信去內踝上同身寸之二寸少陰前太陰後筋骨間足陰蹻之郤刺可入同身寸之四分留五呼若灸者可灸三壯外踝上附陽穴也附陽去外踝上同身寸之三寸太陽前少陽後筋骨間陽蹻之郤刺可入同身寸之六分留七呼若灸者可灸三壯新校正云按甲乙經附陽作付陽陰陽蹻四穴陰蹻穴在足內踝下是謂照海陰蹻所生刺可入同身寸之四分留六呼若灸者可灸三壯陽蹻穴是謂申脈陽蹻所生在外踝下陷者中新校正云按刺腰痛篇注作在外踝下五分繆刺論注云外踝下半寸容爪甲刺可入同身寸之三分留七呼若灸者可灸三壯新校正云按甲乙經留七呼作六呼刺腰痛篇注作十呼水俞在諸分分謂肉之分理間治水取之熱俞在氣穴寫熱則取之寒熱俞在兩骸厭中二穴骸厭謂膝外俠膝之骨厭中也大禁二十五在天府下五寸謂五里穴所以謂之大禁者謂其禁不可刺也針經曰迎之五里中道而上五至而已五往而藏之氣盡矣故五五二十五而竭其俞矣蓋謂此也又曰五里者尺澤之後五里與此文同凡三百六十五穴針之所由行也新校正云詳自藏俞五十至此并重復共得三百六十穴通前天突十椎上紀下紀共三百六十五穴除重復實有三百一十三穴帝曰余已知氣穴之處遊針之居願聞孫絡溪谷亦有所應乎孫絡小絡也謂絡之支别者岐伯曰孫絡三百六十五穴會亦以應一歲以溢奇邪以通榮衛榮衛稽留衛散榮溢氣竭血著外為發熱內為少氣疾寫無怠以通榮衛見而寫之無問所會榮積衛留內外相薄者見其血絡當即寫之亦無問其脈之俞會帝曰願聞溪谷之會也岐伯曰肉之大會為谷肉之小會為溪肉分之間溪谷之會以行榮衛以會大氣新校正云按甲乙經作以舍大氣邪溢氣壅脈熱肉敗榮衛不行必將為膿內銷骨髓外破大膕熱過故致是留於節湊必將為敗若留於骨節之間津液所湊之處則骨節之間髓液皆潰為膿故必敗爛筋骨而不得屈伸矣積寒留舍榮衛不居卷內縮筋新校正云按全元起本作寒肉縮筋肋肘不得伸內為骨痹外為不仁命曰不足大寒留於溪谷也邪氣盛甚真氣不榮髓溢內消故為是也不足謂陽氣不足也寒邪外薄久積淹留陽不外勝內消筋髓故曰不足大寒留於溪谷之中也溪谷三百六十五穴會亦應一歲其小痹淫溢循脈往來微針所及與法相同若小寒之氣流行淫溢隨脈往來為痹病用針調者與常法相同爾帝乃辟左右而起再拜曰今曰發蒙解惑藏之金匱不敢復出乃藏之金蘭之室署曰氣穴所在岐伯曰孫絡之脈别經者其血盛而當寫者亦三百六十五脈并注於絡傳注十二絡脈非獨十四絡脈也十四絡者謂十二經絡兼任脈督脈之絡也脾之大絡起自於脾故不并言之也內解寫於中者十脈解謂骨解之中經絡也雖則别行然所受邪亦還注寫於五藏之脈左右各五故十脈也黃帝內經素問補注釋文卷之三十二

front:
  text: 黃帝內經素問補注釋文卷之一
  hash: sha256:f4c606b580fab4884ae7c393a0c9d99e21ff8b535f6ba16bc5a92a6578a9a9c2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0040_HFL_001-001a, image: hfl/0649/0649-018.png}
body:
  text: 唐太僕令啓玄子王氷次注宋光祿卿直祕閣林億等校正宋守尚書屯田郎孫兆重改誤新校正云按王氏不解所以名素問之義及素問之名起於何代按隋書經籍志始有素問之名甲乙經序晉皇甫謐之文已云素問論病精辨五叔和西晉人撰脈經云出素問針經漢張仲景撰傷寒卒病論集云撰用素問是則素問之名著於隋志上見於漢代也自仲景已前無文可見莫得而知據今世所存之書則素問之名起漢世也所以名素問之義全元起有説云素者本也問者黃帝問岐伯也方陳性情之源五行之本故曰素問元起雖有此解義未甚明按乾鑿度云夫有形者生於無形故有太易有太初有太始有太素太易者未見氣也太初者氣之始也太始者形之始也太素者質之始也氣形質具而疴瘵由是萌生故黃帝問此太素質之始也素問之名義或由此上古天真論篇第一新校正按全九起注本王氏重次篇第移冠篇首今綻逐篇必具全無起本之卷第者欲存素問舊第目見今之篇次皆王氏之所移也昔在黃帝生而神靈弱而能言幼而徇齊長而敦敏成而登天有熊國君少典之子姓公孫徇疾也敦信也敏達也習用干戈以征不享平定天下殄滅蚩尤以土德王都軒轅之丘故號之曰軒轅黃帝後鑄鼎於鼎湖山鼎成而白日升天群臣葬衣冠於橋山墓今猶在徇徐閏切乃問於天師曰余聞上古之人春秋皆度百歲而動作不衰今時之人年半百而動作皆衰者時世異耶人將失之耶天師岐伯也岐伯對曰上古之人其知道者法於陰陽和於術數上古謂玄古也知道謂知修養之道也夫陰陽者天地之常道術數者保生之大倫故修養者必謹先之老子曰萬物負陰而抱陽沖氣以為和四氣調神大論曰陰陽四時者萬物之終始死生之本逆之則災害生從之則苛疾不起是謂得道此之謂也食飲有節起居有常不妄作勞食飲者充虛之滋味起居者動止之綱紀故修養者謹而行之痹論曰飲食自倍腸胃乃傷生氣通天論曰起居如驚神氣乃浮是惡妄動也廣成子曰必靜必清無勞汝形無搖汝精乃可以長生故聖人先之也新校正云按全元起注本云飲食有常節起居有常度不妄不作太素同楊上善云以理而取聲色芳味不妄視聽也循理而動不為分外之事故能形與神俱而盡終其天年度百歲乃去形與神俱同臻壽分謹於修養以奉天真故盡得終其天年去謂去離於形骸也靈樞經曰人百歲五藏皆虛神氣皆去形骸獨居而終矣以其知道故年長壽延年度百歲謂至一百二十歲也尚書洪範曰一曰壽百二十歲也今時之人不然也動之死地離於道也以酒為漿以妄為常醉以入房以酒為漿溺於飲也以妄為常寡於信也醉以入房過於色也以欲竭其精以耗散其真樂色曰欲輕用曰耗樂色不節則精竭輕用不止則真散是以聖人愛精重施髓滿骨堅老子曰弱其志強其骨河上公曰有欲者亡身曲禮曰欲不可縱新校正云按甲乙經耗作好不知持滿不時御神言輕用而縱欲也老子曰持而盈之不如其已言愛精保神如持盈滿之器不愼而動則傾竭天真真誥曰常不能愼事自致百疴豈可怨咎於神明乎此之謂也新校正云按别本時作解務快其心逆於生樂快於心欲之用則逆養生之樂矣老子曰甚愛必大費此之類歟夫甚愛而不能救議道而以為未然者伐生之大患也起居無節故半百而衰也亦耗散而致是也夫道者不可斯須離於道則壽不能終盡於天年矣老子曰物壯則老謂之不道不道早已此之謂離道也夫上古聖人之教下也皆謂之虛邪賊風避之有時邪乘虛入是謂虛邪竊害中和謂之賊風避之有時謂八節之日及太一入從之於中宫朝八風之日也靈樞經曰邪氣不得其虛不能獨傷人謂人虛乃邪勝之也新校正云按全元起注本云上古聖人之教也下皆為之太素千金同楊上善云上古聖人使人行者身先行之為不言之教不言之教勝有言之教故下百姓仿行者衆故曰下皆為之太一入從於中宫朝八風義具天元玉册中恬憺虛無真氣從之精神內守病安從來恬憺虛無靜也法道清靜精氣內持故其虛邪不能為害是以志間而少欲心安而不懼形勞而不倦內機息故少欲外紛靜故心安然情欲兩亡是非一貫起居皆適故不倦也氣從以順各從其欲皆得所願志不貪故所欲皆順心易足故所願必從以不異求故無難得也老子曰知足不辱知止不殆可以長久故美其食任其服樂其俗美其食者順精粗也任其服者隨美惡也樂其俗者去傾慕也新校正云按别本美一作甘高下不相慕其民故曰朴至無求也是所謂心足也老子曰禍莫大於不知足咎莫大於欲得故知足之足常足矣蓋非謂物足者為知足心足者乃為知足矣不恣於欲是則朴同故聖人云我無欲而民自朴新校正云按别本曰作日是以嗜欲不能勞其目淫邪不能惑其心目不妄視故嗜欲不能勞心與玄同故淫邪不能惑老子曰不見可欲使心不亂又曰聖人為腹不為目愚智賢不肖不懼於物故合於道情計兩亡不為謀府冥心一觀勝負俱捐故心志保安合同於道庚桑楚曰養汝形抱汝生無使汝思慮營營新校正云按全元起注本云合於道數所以能年皆度百歲而動作不衰者以其德全不危也不涉於危故德全也莊子曰執道者德全德全者形全形全者聖人之道也又曰無為而性命不全者未之有也帝曰人年老而無子者材力盡邪將天數然也材謂材幹可以立身者岐伯曰女子七歲腎氣盛齒更髮長老陽之數極於九少陽之數次於七女子為少陰之氣故以少陽數偶之明陰陽氣和乃能生成其形體故七歲腎氣盛齒更髮長二七而天癸至任脈通太衝脈盛月事以時下故有子癸謂壬癸北方水干名也任脈衝脈皆奇經脈也腎氣全盛衝任流通經血漸盈應時而下天真之氣降與之從事故云天癸也然衝為血海任主胞胎二者相資故能有子所以謂之月事者平和之氣常以三旬而一見也故愆期者謂之有病新校正云按全元起注本及太素甲乙經俱作伏衝下太衝同三七腎氣平均故真牙生而長極真牙謂牙之最後生者腎氣平而真牙生者表牙齒為骨之餘也四七筋骨堅髮長極身體盛壯女子天癸之數七七而終年居四七材力之半故身體盛壯長極於斯五七陽明脈衰面始焦髮始墮陽明之脈氣營於面故其衰也髮墮面焦靈樞經曰足陽明之脈起於鼻交頞中下循鼻外入上齒中還出俠口環唇下交承漿却循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱手陽明之脈上頸貫頰入下齒縫中還出俠口故面焦髮墮也頞於葛切俠胡莢切顱落胡切六七三陽脈衰於上面皆焦髮始白三陽之脈盡上於頭故三陽衰則面皆焦髮始白所以衰者婦人之生也有餘於氣不足於血以其經月數泄脫之故七七任脈虛太衝脈衰少天癸竭地道不通故形壞而無子也經水絶止是為地道不通衝任衰微故云形壞無子丈夫八歲腎氣實髮長齒更老陰之數極於十少陰之數次於八男子為少陽之氣故以少陰數合之易繫辭曰天九地十則其數也二八腎氣盛天癸至精氣溢寫陰陽和故能有子男女有陰陽之質不同天癸則精血之形亦異陰靜海滿而去血陽動應合而泄精二者通和故能有子易繫辭曰男女構精萬物化生此之謂也三八腎氣平均筋骨徑強故真牙生而長極以其好用故爾四八筋骨隆盛肌肉滿壯丈夫天癸八八而終年居四八亦材之半也五八腎氣衰髮墮齒稿腎主於骨齒為骨餘腎氣既衰精無所養故令髮墮齒復乾枯六八陽氣衰竭於上面焦髮鬢頒白陽氣亦陽明之氣也靈樞經曰足陽明之脈起於鼻交頞中下循鼻外入上齒中還出俠口環唇下交承漿却循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱故衰於上則面焦髮黃白也七八肝氣衰筋不能動天癸竭精少腎藏衰形體皆極肝氣養筋肝衰故筋不能動腎氣養骨腎衰故形體疲極天癸已竭故精少也匪惟材力衰謝固當天數使然八八則齒髮去陽氣竭精氣衰故齒髮不堅離形骸矣去落也腎者主水受五藏六府之精而藏之故五藏盛乃能寫五臟六府精氣淫溢而滲灌於腎腎藏乃受而臟之何以明之靈樞經曰五臟主臟精臟精者不可傷由是則五臟各有精隨用而灌注於腎此乃腎為都會關司之所非腎一藏而獨有精故曰五藏盛乃能寫也今五藏皆衰筋骨解墮天癸盡矣故髮鬢白身體重行步不正而無子耳所謂物壯則老謂之天道者也帝曰有其年已老而有子者何也言似非天癸之數也岐伯曰此其天壽過度氣脈常通而腎氣有餘也所稟天真之氣本自有餘也此雖有子男不過盡八八女不過盡七七而天地之精氣皆竭矣雖老而生子子壽亦不能過天癸之數帝曰夫道者年皆百數能有子乎岐伯曰夫道者能却老而全形身年雖壽能生子也是所謂得道之人也道成之證如下章云黃帝曰余聞上古有真人者提挈天地把握陰陽真人謂成道之人也夫真人之身隱見莫測其為小也入於無間其為大也遍於空境其變化也出入天地內外莫見迹順至真以表道成之證凡如此者故能提挈天地把握陰陽也呼吸精氣獨立守神肌肉若一真人心合於氣氣合於神神合於無故呼吸精氣獨立守神肌膚若冰雪綽約如處子新校正云按全元起注本云身肌宗一太素同楊上善云真人身之肌體與太極同質故云宗一故能壽敝天地無有終時體同於道壽與道同故能無有終時而壽盡天地也敝皮祭切盡也此其道生惟至道生乃能如是中古之時有至人者淳德全道全其至道故曰至人然至人以此淳朴之德全彼妙用之道新校正云詳楊上善云積精全神能至於德故稱至人也和於陰陽調於四時和謂同和調謂調適言至人動靜必適中於四時生長收藏之令參同於陰陽寒暑升降之宜去世離俗積精全神心遠世紛身離俗染故能積精而復全神遊行天地之間視聽八遠之外神全故也庚桑楚曰神全之人不慮而通不謀而當精照無外志凝宇宙若天地然又曰體合於心心合於氣氣合於神神合於無其有介然之有唯然之音雖遠際八荒之外近在眉睫之內來干我者吾必盡知之夫如是者神全故所以能矣睫音接此蓋益其壽命而強者也亦歸於真人同歸於道也其次有聖人者處天地之和從八風之理與天地合德與日月合明與四時合其序與鬼神合其吉凶故曰聖人所以處天地之淳和順八風之正理者欲其養正避彼虛邪適嗜欲於世俗之間無恚嗔之心聖人志深於道故適於嗜欲心全廣愛故不有恚嗔是以常德不離殁身不殆行不欲離於世被服章新校正云詳被服章三字疑衍此三字一下文不屬舉不欲觀於俗聖人舉事行止雖常在時俗之間然其見為則與時俗有異爾何者貴法道之清靜也老子曰我獨異於人而貴求食於母母亦諭道也外不勞形於事內無思想之患聖人為無為事無事是以內無思想外不勞形以恬愈為務以自得為功恬靜也愈悅也法道清靜適性而動故曰而自得也形體不敝精神不散亦可以百數外不勞形內無思想故形體不敝精神保全神守不離故年登百數此皆全性之所致爾庚桑楚曰聖人之於聲色滋味也利於性則取之害於性則捐之此全性之道也敝疲敝也其次有賢人者法則天地象似日月次聖人者謂之賢人然自強不息精了百端不慮而通發謀必當志同於天地心燭於洞幽故云法則天地象似日月也辨列星辰逆從陰陽分别四時星衆星也辰北辰也辨列者謂定內外星官座位之所於天三百六十五度遠近之分次也逆從陰陽者謂以六甲等法逆順數而推步吉凶之徵兆也陰陽書曰人中甲子從甲子起以乙丑為次順數之地下甲子從甲戌起以癸酉為次逆數之此之謂逆從也分别四時者謂分其氣序也春溫夏暑熱秋清涼冬冰冽此四時之氣序也將從上古合同於道亦可使益壽而有極時將從上古合同於道謂如上古知道之人法於陰陽和於術數食飲有節起居有常不妄作勞也上古知道之人年度百歲而去故可使益壽而有極時也黃帝內經素問補注釋文卷之一
